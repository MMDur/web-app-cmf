 "a abraçar amb ànim alegre", "la pobresa, l'abnegació i el sacrifici", "per a dilatar el vostre Regne", "Us ho demanem units de cor a Vós,", "present ara en el misteri eucarístic que venerem", "i amb qui compartim la vida i ministeri", "Vós que viviu i regneu amb el Pare i l'Esperit Sant", "pels segles dels segles."]}, {"id": "131", "n": "131", "title": "Veni, Sancte Spiritus", "theme": "reunions", "body": ["Veniu, Esperit Sant, ompliu els cors dels vostres fidels", "i enceneu-hi el foc del vostre amor.", "V/. Envieu el vostre Esperit i seran creats.", "R/. I renovareu la faç de la terra.", "Preguem:", "Oh Déu,", "que heu il·luminat els cors dels vostres fidels", "amb la llum de l'Esperit Sant;", "feu-nos sempre dòcils a aquest mateix Esperit,", "perquè puguem fer sempre el bé", "i gaudir del seu consol.", "Per Crist Senyor nostre. Amén."], "src": "Per a començar una reunió"}, {"id": "132", "n": "132", "title": "Reunits en el vostre nom", "theme": "reunions", "body": ["Senyor, ara que ens reunim en nom vostre,", "volem estar a la vostra presència;", "concediu-nos un esperit dialogant,", "il·lumineu les nostres ments amb la llum de la vostra veritat", "i enfortiu el nostre esperit fraternal", "perquè, sempre units, maldem per conèixer i fer la vostra voluntat.", "Per Crist Senyor nostre. Amén."], "src": "Per a començar una reunió"}, {"id": "133", "n": "133", "title": "Doneu-nos la saviesa (Sa 9,1-6.9-11)", "theme": "reunions", "body": ["Déu dels pares i Senyor misericordiós,", "que heu fet l’univers amb la vostra paraula,", "i amb la vostra saviesa heu format l'home,", "perquè sotmeti totes les criatures que han vingut a l’existència,", "perquè governi el món de manera santa i justa,", "i administri la justícia amb rectitud de cor.", "Doneu-me la Saviesa que seu amb vós en el vostre tron.", "No em tingueu per indigne de ser comptat entre els vostres fills,", "perquè jo sóc el vostre servent, fill de la vostra serventa,", "home feble i de curta durada,", "poc intel·ligent per a exercir la justícia i aplicar les lleis.", "Ja que, per molt madur que sigui un home, el tindran per no res si li manca la Saviesa que ve de Vós.", "Amb Vós hi ha la saviesa, que coneix les vostres obres,", "I era present quan creàveu el món.", "Ella sap què us complau", "què és conforme als vostres manaments.", "Envieu-la des de les altures santes del cel,", "feu-la baixar del vostre tron gloriós,", "perquè treballi fent-me costat i jo conegui allò que us plau.", "Ella que ho sap tot i ho comprèn tot,", "em guiarà assenyadament en les meves empreses,", "i em guardarà en la seva presència gloriosa.", "Gloria al Pare."], "src": "Per a començar una reunió"}, {"id": "134", "n": "134", "title": "Cercar i complir junts la voluntat de Déu", "theme": "reunions", "body": ["Antífona:", "Diu el Senyor: on dos o tres estan reunits en el meu nom, jo estic enmig d'ells.", "Preguem:", "Déu i Pare nostre, el vostre Fill va prometre la seva presència", "a aquells que es reunissin en el seu nom:", "Feu que el sentim present ara entre nosaltres,", "que expressem la comunió de vida i missió", "de tot l'Institut,", "perquè caminem en una vida nova", "- en obediència a l'Esperit", "i amb plena fidelitat al nostre carisma missioner -,", "i, una vegada coneguda la vostra voluntat,", "la complim amb un mateix sentir i voler", "per a realitzar la nostra comuna missió en l'Església.", "Per Crist Senyor nostre.", "Amén."], "src": "Per a començar una reunió"}, {"id": "135", "n": "135", "title": "Gràcia i disposicions per al diàleg", "theme": "reunions", "body": ["Ens trobem aquí, Senyor,", "reunits en el vostre nom i desitjosos de dilatar el vostre Regne.", "Que l'Esperit Sant que heu enviat als nostres cors", "i manté viva la vostra presència en nosaltres,", "ens ensenyi què hem de fer", "i vers on ens cal caminar", "per tal que, enfortits amb la vostra gràcia,", "puguem realitzar els vostres designis.", "Sigueu Vós, Esperit Sant,", "l'inspirador i animador del nostre discerniment.", "Ensenyeu-nos a escoltar els altres,", "a deixar-nos il·luminar per les seves llums;", "ensenyeu-nos a proposar i a no imposar;", "i feu que cerquem sempre la veritat.", "Allibereu-nos de la ceguesa de qui creu que sempre té raó,", "dels favoritismes i de tota accepció de persones.", "Uniu-nos a Vós perquè mai no ens apartem de la veritat.", "Amén."], "src": "Per a començar una reunió"}, {"id": "136", "n": "136", "title": "Llum per descobrir l'exigència de l'Evangeli", "theme": "reunions", "body": ["Mireu, Pare de bondat,", "a aquesta comunitat reunida en el vostre nom", "per compartir la fraternitat i dialogar en la veritat,", "concediu-li que descobreixi amb major claredat les exigències de l'Evangeli", "per a ser llum del món i sal de la terra.", "Per Crist Senyor nostre.", "Amén."], "src": "Per a començar una reunió"}, {"id": "137", "n": "137", "title": "Oració per a iniciar una reunió", "theme": "reunions", "body": ["Senyor, que la vostra gràcia inspiri, sostingui i acompanyi les nostres obres,", "perquè el nostre treball comenci en Vós, com la seva font,", "i tendeixi sempre a Vós, com a la seva fi.", "Per Crist Senyor nostre.", "Amén."], "src": "Per a començar una reunió"}, {"id": "138", "n": "138", "title": "Acció de gràcies per la trobada", "theme": "reunions", "body": ["Pare de bondat,", "us donem gràcies per aquesta trobada", "en la que hem compartit les nostres il·lusions i desil·lusions,", "els nostres projectes i dificultats.", "Feu que responguem sempre eficaçment", "a la nostra vocació i missió en l'Església,", "a imitació de Claret, el nostre Pare.", "Per Crist Senyor nostre.", "Amén."], "src": "Per a finalitzar una reunió"}, {"id": "139", "n": "139", "title": "Un sol cor i una sola ànima", "theme": "reunions", "body": ["Senyor, us regraciem", "per aquesta trobada comunitària,", "per la vostra bondat i la vostra presència entre nosaltres,", "feu que amb esperit fraternal", "tinguem un sol cor i una sola ànima per a ser una comunitat", "evangelitzada i evangelitzadora.", "Per Crist Senyor nostre.", "Amén."], "src": "Per a finalitzar una reunió"}, {"id": "144", "n": "144", "title": "Oració del P. Fundador al començament dels exercicis", "theme": "reunions", "body": ["Mare de Déu, Mare meva,", "Vós que tinguéreu el consol de veure reunits", "els Apòstols i deixebles en el Cenacle", "i finalment el goig de veure'ls tots", "plens de l'Esperit Sant;", "amb tota confiança us demano", "que m'obtingueu totes les gràcies que necessito", "per a fer bé aquests Exercicis", "sota la vostra direcció.", "Refermeu-me en el meu propòsit de fer tot el que conegui que sigui profitós per a major glòria de Déu i bé de la meva ànima.", "Mare meva, socorreu-me i empareu-me ara i sempre.", "Amén."]}, {"id": "157", "n": "157", "title": "Lletanies de Sant Josep", "theme": "sant-josep", "body": ["Senyor, tingueu pietat.", "Senyor, tingueu pietat.", "Crist, tingueu pietat.", "Crist, tingueu pietat.", "Senyor, tingueu pietat.", "Senyor, tingueu pietat.", "Crist, oïu-nos.", "Crist, oïu-nos.", "Crist, escolteu-nos.", "Crist, escolteu-nos.", "Déu, Pare celestial.", "Tingueu pietat de nosaltres.", "Déu, Fill, Redemptor del món.", "Déu, Esperit Sant.", "Trinitat Santa, un sol Déu.", "Santa Maria.", "Pregueu per nosaltres.", "Sant Josep.", "Descendent il·lustre de David.", "Llum dels Patriarques.", "Espòs de la Mare de Déu.", "Cast custodi de la Verge.", "Educador del Fill de Déu.", "Diligent defensor de Crist.", "Cap de la Santa Família.", "Josep justíssim.", "Josep castíssim.", "Josep prudentíssim.", "Josep fortíssim.", "Josep obedientíssim.", "Josep fidelíssim.", "Mirall de paciència.", "Aimant de la pobresa.", "Treballador exemplar.", "Honor de la vida familiar.", "Custodi de les verges.", "Sosteniment de les famílies.", "Consol dels afligits.", "Esperança dels malalts.", "Patró dels moribunds.", "Protector de la Santa Església.", "Anyell de Déu que lleveu el pecat del món", "- perdoneu-nos, Senyor.", "Anyell de Déu que lleveu el pecat del món", "- escolteu-nos, Senyor.", "Anyell de Déu que lleveu el pecat del món", "- tingueu pietat de nosaltres.", "V/. El va constituir senyor de casa seva.", "R/. I cap de totes les seves possessions.", "Preguem:", "Oh Déu, que en la vostra inefable providència, us dignàreu escollir Sant Josep com a espòs de la Mare del vostre Fill, concediu-nos, us demanem, que el qui venerem a la terra com a protector, el mereixem tenir com a intercessor en el cel. Vós, que viviu i regneu pels segles dels segles.", "Amén."]}, {"id": "158", "n": "158", "title": "Benaurat Josep", "theme": "sant-josep", "body": ["Benaurat Josep,", "per l'amor que us va mantenir unit a la Verge Mare de Déu", "i pel paternal amor amb què cuidàreu el Nen Jesús,", "humilment us demanem que mireu benignament la família del vostre Fill,", "adquirida per la seva sang, i amb el vostre auxili socorreu les nostres necessitats.", "Aparteu de nosaltres tot error i tot pecat;", "assistiu-nos en la nostra lluita contra el poder del mal,", "i defenseu l'Església santa de Déu de tota adversitat;", "protegiu cadascun de nosaltres,", "perquè, a exemple vostre i sostinguts pel vostre auxili,", "puguem viure santament,", "morir piadosament i arribar a l'eterna benaurança.", "Amén."]}, {"id": "159", "n": "159", "title": "Oració a Sant Josep de Lleó XIII", "theme": "sant-josep", "body": ["A vós, benaurat Josep,", "acudim en la nostra necessitat", "i invoquem el vostre patrocini juntament amb el de la Verge Maria, la vostra esposa.", "Pel sant amor que us va unir a Maria, Mare de Déu,", "i per la custòdia paterna del Nen Jesús,", "mireu benignament el poble que Crist va adquirir amb la seva sang;", "amb la vostra ajuda socorreu-nos en les nostres necessitats.", "Custodi de la Sagrada Família,", "protegiu l'Església dels mals que afligeixen el món,", "i assistiu-nos propici en la lluita contra el poder del mal.", "Ajudeu-nos a viure santament,", "a morir en pau amb Déu", "i a arribar a l'eterna benaurança del cel.", "Amén."]}, {"id": "160", "n": "160", "title": "Oració a Sant Josep de Joan XXIII", "theme": "sant-josep", "body": ["Oh San Josep, custodi de Jesús,", "espòs puríssim de Maria,", "que heu viscut en el compliment perfecte del vostre deure,", "mantenint amb el treball de les vostres mans", "la sagrada Família de Natzaret,", "protegiu propici els qui a vós acudim.", "Vós coneixeu les nostres aspiracions, les nostres angoixes i esperances:", "a vós venim,", "perquè sabem que trobarem en vós un protector.", "També vós heu experimentat la prova i el defalliment:", "però el vostre esperit, ple de la més profunda pau,", "va exultar de goig per la intimitat amb el Fill de Déu que us va ser confiat", "i amb Maria, la seva Mare.", "Ajudeu-nos a comprendre", "que no estem sols en el nostre treball,", "a saber descobrir Jesús al nostre costat,", "a acollir-lo amb la gràcia i a custodiar-lo fidelment com ho vau fer vós.", "I feu que, a la nostra Congregació,", "tot sigui santificat en la caritat,", "en la paciència, en la justícia i en la recerca del bé.", "Amén."]}, {"id": "161", "n": "161", "title": "Oració a Sant Josep", "theme": "sant-josep", "body": ["Salve, Josep, espòs virginal de Maria", "i pare davídic del Messies.", "Sou beneït entre tots els homes", "i beneït és Jesús, el Fill de Déu que us va ser confiat.", "Sant Josep,", "patró de l'Església universal i de la nostra Congregació,", "guardeu les nostres comunitats i les nostres famílies", "en la pau i en la gràcia divina", "i socorreu-nos a l'hora de la nostra mort.", "Amén."]}, {"id": "162", "n": "162", "title": "Oració a Sant Josep", "theme": "sant-josep", "body": ["Pare sant, que elegíreu Sant Josep", "per a un ofici singular", "i li concedíreu les gràcies necessàries", "per a complir-lo fidelment a la casa de Natzaret;", "concediu-nos també a nosaltres", "les gràcies necessàries", "per a ser fidels en el compliment", "del nostre ministeri,", "segons el carisma i l'esperit de la Congregació.", "Per Crist Senyor nostre.", "Amén."]}, {"id": "165", "n": "165", "title": "Oració als Màrtirs de Barbastre", "theme": "martirs", "body": ["Senyor, Pare sant,", "Vós que concedíreu a Felip de Jesús Munàrriz i als seus companys,", "fidelitat plena a la vocació missionera", "seguint Crist fins al martiri,", "i els féreu testimonis de caritat perfecta", "en el perdó dels seus perseguidors:", "concediu-nos, per la seva intercessió,", "fermesa perseverant en la fe,", "i una caritat sincera", "per a estimar en Crist tots els germans.", "Per Crist Senyor nostre.", "Amén."]}, {"id": "166", "n": "166", "title": "Màrtirs de Barbastre", "theme": "martirs", "body": ["Déu, Pare nostre,", "que ens heu donat en els Màrtirs Claretians de Barbastre", "un model de fidelitat a la Causa de Jesús,", "d'amor al Cor de Maria i a l'Església,", "de lleialtat als germans i de perdó als enemics,", "concediu-nos d’imitar el seu exemple", "en la vivència fidel i joiosa de la nostra consagració", "i en l'anunci de l'Evangeli", "per a glòria de Déu i salvació de tots els homes.", "Per Crist Senyor nostre.", "Amén."]}, {"id": "169", "n": "169", "title": "Oració", "theme": "martirs", "body": ["Senyor, Pare nostre,", "que heu escollit amb predilecció", "tots els Fills del Cor de la Verge Maria", "i heu fet que alguns d'ells fossin exemples eximis en la virtut;", "fecundeu l'Església amb la seva glorificació", "i feu que siguin per a nosaltres models a imitar", "Per Crist Senyor nostre.", "Amén."]}, {"id": "170", "n": "170", "title": "Oració", "theme": "martirs", "body": ["Senyor, que voleu que siguin sants", "els qui heu cridat a la nostra Congregació,", "concediu als nostres germans missioners", "que han seguit més de prop les petjades del Sant Fundador", "i han lliurat la seva vida al servei de l'Evangeli,", "que siguin glorificats a la terra i comptats entre els sants del cel.", "Per Crist Senyor nostre."]}, {"id": "171", "n": "171", "title": "Oració", "theme": "martirs", "body": ["Oh Déu, que exalceu els humils i rebutgeu els superbs,", "Digneu-vos glorificar el vostre servent N. i feu resplendir el seu nom entre el dels vostres sants", "Multipliqueu les vostres gràcies a favor dels qui us supliquen", "per la seva intercessió;", "i concediu que l'Església honori un dia la seva memòria,", "el proposi com a model a imitar i", "com a protector que ens ajudi a superar les dificultats de la nostra vida missionera", "i a arribar a la vida eterna.", "Per Crist Senyor nostre.", "Amén."]}, {"id": "172", "n": "172", "title": "Oració per demanar la beatificació", "theme": "martirs", "body": ["Senyor, Déu nostre,", "que heu elegit alguns germans nostres,", "Fills del Cor Immaculat de Maria,", "i els heu fet resplendir", "amb l'exemple d'una santedat exímia en la vida missionera,", "digneu-vos enriquir i fecundar la santa Església amb la seva glorificació,", "i feu que cadascun de nosaltres, seguint el seu testimoniatge evangèlic,", "ens afanyem amb ardor a buscar en totes les coses", "la vostra glòria i la salvació dels nostres germans.", "Per Crist Senyor nostre.", "Amén."]}, {"id": "183", "n": "183", "title": "Oració pel capítol (o durant la seva celebració)", "theme": "capitol", "body": ["Veniu, oh Esperit Sant, ompliu el cor dels vostres fidels", "i enceneu-hi la flama del vostre amor.", "R/. Envieu el vostre Esperit i renaixerà la creació.", "V/. I renovareu la vida sobre la terra.", "Preguem:", "Oh Déu, que heu il·luminat el cor dels vostres fidels", "amb la claror de l'Esperit Sant,", "concediu-nos de fruir sempre de la llum de la seva veritat", "i de ser consolats amb els fruits de la seva presència.", "Per Crist, Senyor nostre.", "Amén."]}, {"id": "186", "n": "186", "title": "Oració pel capítol", "theme": "capitol", "body": ["Oh Esperit Divinal,", "que enviat pel Pare en el nom de Jesús,", "assistiu i guieu infal·liblement la vostra Església,", "infoneu sobre el Capítol la plenitud dels vostres dons.", "Oh Mestre dolç i Consolador,", "il·lumineu les ments dels Capitulars;", "feu que d'aquest Capítol brollin fruits abundants,", "nou vigor en el compromís de santificació i d’apostolat,", "sobretot en la difusió de la llum", "i de la força de l'Evangeli entre els homes.", "Oh dolç hoste de les ànimes,", "confirmeu les ments en la veritat,", "disposeu a l'obediència el cor de tots", "a fi que les conclusions del Capítol", "trobin generós acolliment i total acompliment.", "Renoveu en la nostra Congregació,", "i en cadascun de nosaltres,", "l'esperit que animà Sant Antoni Maria Claret, el nostre Pare.", "Concediu-nos, que,", "reunits en unànime i intensa pregària,", "entorn del Cor de Maria, la nostra Mare,", "procurem sempre i únicament", "la major glòria de Déu i la salvació de les ànimes.", "Amén."]}, {"id": "187", "n": "187", "title": "Pregàries pel capítol", "theme": "capitol", "body": ["Senyor i Pare nostre,", "per la intercessió de Maria,", "Mare i Fundadora de la nostra Congregació,", "envieu-nos el vostre Esperit", "per a sentir-nos empesos com el vostre Fill Jesús", "per l'amor a Vós i als homes,", "per a tenir ulls penetrants i oïdes atentes", "a les urgències del món,", "mantenir la unitat per damunt de les diferències,", "congregats en la mateixa comunitat", "i realitzant la missió que hem rebut", "a través de Sant Antoni Maria Claret, el nostre Pare.", "Vós que viviu i regneu pels segles dels segles.", "Amén."]}, {"id": "201", "n": "201", "title": "Festes de la Verge Maria", "theme": "taula", "body": ["Alegreu-vos, Maria, plena de gràcia. El Senyor és amb vós.", "Beneït sigueu per sempre, Senyor.", "Senyor Jesús, que per intercessió de la vostra Mare a Canà de Galilea", "vàreu convertir l'aigua en vi,", "beneïu aquests aliments que anem a prendre,", "i concediu-nos, en recordar avui la Verge Maria,", "de posar-nos, com ella, al servei del vostre pla de salvació per a tots els homes.", "Vós que viviu i regneu pels segles dels segles.", "Amén."], "festa": "Festes de la Verge Maria"}, {"id": "202", "n": "202", "title": "Sant Josep · 19 març / 1 maig", "theme": "taula", "body": ["El Senyor el va estimar perquè fou l’home just", "i va donar el cent per u en el seu treball.", "Beneït sigueu per sempre, Senyor.", "Déu provident, que confiàreu a la fidel custòdia", "de Sant Josep el vostre Fill Unigènit i la seva Mare, Maria,", "beneïu el pa fruit de la nostra suor i concediu-nos", "treballar sense descans en l'extensió del vostre Regne.", "Per Crist Senyor nostre.", "Amén."], "festa": "Sant Josep · 19 març / 1 maig"}, {"id": "203", "n": "203", "title": "Festa del Cor de Maria", "theme": "taula", "body": ["Us donem gràcies, Senyor, i us beneïm", "pel do inestimable d'anomenar-nos i ser de veritat “Fills del Cor Immaculat de Maria”.", "Beneït sigueu per sempre, Senyor.", "Senyor, Déu nostre,", "que us heu dignat convocar-nos en la Congregació,", "fent-nos fills del Cor Immaculat de la vostra Mare,", "concediu-nos de viure intensament la pietat filial a Maria", "i beneïu-nos ara que ens trobem reunits entorn d'aquesta taula", "en la qual expressem i compartim la nostra fraternitat", "Per Crist Senyor nostre.", "Amén."], "festa": "Festa del Cor de Maria"}, {"id": "204", "n": "204", "title": "Santa Caterina de Siena, copatrona · 29 abril", "theme": "taula", "body": ["Us lloem, Senyor, perquè en Santa Caterina de Siena", "ens doneu una mostra del vostre poder i de la vostra saviesa.", "Beneït sigueu per sempre, Senyor.", "Senyor Déu nostre,", "que inflamàreu d'amor a Vós i a l'Església", "santa Caterina de Siena,", "en beneir ara els aliments que anem a prendre,", "concediu-nos que ens mantinguem sempre en la vostra presència", "i que siguem agents de comunió en la vostra Església.", "Per Crist Senyor nostre.", "Amén."], "festa": "Santa Caterina de Siena, copatrona · 29 abril"}, {"id": "205", "n": "205", "title": "Festes dels apòstols, copatrons", "theme": "taula", "body": ["Beneït sigueu, Jesús, enviat i testimoni del Pare.", "Beneït sigueu per sempre, Senyor.", "Beneït sigueu, Senyor, pels fruits de la terra i d resa de Jesús, copatrona · 15 octubre"}, {"id": "215", "n": "215", "title": "Sant Antoni Maria Claret, Fundador · 24 octubre", "theme": "taula", "body": ["Beneït sigueu Senyor Jesús,", "Fill i Enviat del Pare.", "Beneït sigueu per sempre, Senyor.", "Beneïu, Senyor, aquests aliments que anem a prendre", "i infoneu en nosaltres el mateix esperit", "que va animar Sant Antoni Maria Claret, el nostre Pare,", "perquè, esperonats per ell,", "estiguem sempre disposats a proclamar la vostra Paraula", "i a donar la vida pels germans.", "Vós que viviu i regneu pels segles dels segles.", "Amén."], "festa": "Sant Antoni Maria Claret, Fundador · 24 octubre"}]};

const $app = document.getElementById('app');
const $q = document.getElementById('q');
const $box = document.getElementById('searchbox');
const byId = {};
DATA.prayers.forEach(p => byId[p.id] = p);
const themeById = {};
DATA.themes.forEach((t,i) => { t.index = i+1; themeById[t.id] = t; });
const circById = {};
DATA.circumstances.forEach(c => circById[c.id] = c);

// ---- utils ----
function norm(s){
  return s.toLowerCase()
    .normalize('NFD').replace(/[\u0300-\u036f]/g,'')
    .replace(/[·''`"]/g,' ')
    .replace(/\s+/g,' ').trim();
}
DATA.prayers.forEach(p=>{
  p._search = norm(p.title + ' ' + (p.src||'') + ' ' + (p.festa||'') + ' ' + p.body.join(' '));
  p._tnorm = norm(p.title);
});
function esc(s){return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}
function roman(n){const R=[[10,'X'],[9,'IX'],[5,'V'],[4,'IV'],[1,'I']];let r='';for(const[v,s]of R){while(n>=v){r+=s;n-=v;}}return r;}

// ---- rendering ----
function chipHTML(c){
  return `<button class="chip" data-go="#/circ/${c.id}">${esc(c.name)}</button>`;
}
function themeCardHTML(t){
  return `<button class="theme-card" data-go="#/tema/${t.id}">
    <span class="tnum">${roman(t.index)}</span>
    <span><span class="tname">${esc(t.name)}</span><span class="tsub">${esc(t.sub)}</span></span>
    <span class="tcount">${t.prayers.length}</span>
  </button>`;
}
function prayerRowHTML(p, ctx){
  const sub = p.festa && p.theme==='taula' ? '' : (p.src ? `<span class="psub">${esc(p.src)}</span>` : '');
  const title = (p.theme==='taula' && p.festa) ? p.festa : p.title;
  return `<li><button class="prow" data-go="#/p/${p.id}" data-ctx="${ctx||''}">
    <span class="pnum">${p.n || '·'}</span>
    <span><span class="ptitle">${esc(title)}</span>${sub}</span>
  </button></li>`;
}
function listHTML(prayers, ctx){
  if(!prayers.length) return `<div class="empty">No s’ha trobat cap pregària. Prova amb una altra paraula o un número.</div>`;
  return `<ul class="plist">${prayers.map(p=>prayerRowHTML(p,ctx)).join('')}</ul>`;
}

function renderHome(){
  $app.innerHTML = `
    <div class="label">Segons la circumstància</div>
    <div class="chips">${DATA.circumstances.map(chipHTML).join('')}</div>
    <div class="label">Índex temàtic</div>
    <div class="themes">${DATA.themes.map(themeCardHTML).join('')}</div>`;
}

function renderTheme(id){
  const t = themeById[id];
  if(!t){ location.hash = '#/'; return; }
  const prayers = t.prayers.map(pid=>byId[pid]).filter(Boolean);
  $app.innerHTML = `
    <div class="toolbar"><button class="btn" data-go="#/">← Inici</button></div>
    <div class="list-head">
      <div class="rubric" style="text-align:left">${roman(t.index)}</div>
      <h2>${esc(t.name)}</h2>
      <div class="lsub">${esc(t.sub)}</div>
    </div>
    ${listHTML(prayers, 'tema/'+id)}`;
}

function renderCirc(id){
  const c = circById[id];
  if(!c){ location.hash = '#/'; return; }
  const prayers = c.prayers.map(pid=>byId[pid]).filter(Boolean);
  $app.innerHTML = `
    <div class="toolbar"><button class="btn" data-go="#/">← Inici</button></div>
    <div class="list-head">
      <h2>${esc(c.name)}</h2>
      <div class="lsub">Pregàries adients per a aquesta circumstància</div>
    </div>
    ${listHTML(prayers, 'circ/'+id)}`;
}

function renderSearch(query){
  const qn = norm(query);
  let results = [];
  if(/^\d+\s*b?$/.test(qn)){
    const num = qn.replace(/\s+/g,'');
    results = DATA.prayers.filter(p => p.id === num || p.id === num.replace(/b$/,'')+'b' || p.id.startsWith(num));
    results.sort((a,b)=> (a.id===num?-1:0)-(b.id===num?-1:0));
  } else if(qn.length >= 2){
    const inTitle = DATA.prayers.filter(p=>p._tnorm.includes(qn) || (p.festa && norm(p.festa).includes(qn)));
    const inBody = DATA.prayers.filter(p=>!inTitle.includes(p) && p._search.includes(qn));
    results = inTitle.concat(inBody);
  }
  $app.innerHTML = `
    <div class="list-head" style="margin-top:.6rem">
      <h2>Resultats de la cerca</h2>
      <div class="lsub">${results.length} pregàri${results.length===1?'a':'es'} per a «${esc(query)}»</div>
    </div>
    ${listHTML(results, 'cerca')}`;
}

function bodyHTML(p){
  return p.body.map((line,i)=>{
    let cls = '';
    let html = esc(line);
    if(/^(V\/|R\/|℣|℟)/.test(line)){
      cls = 'verse';
      html = html.replace(/^(V\/\.|R\/\.|V\/|R\/)/, m=>`<span class="vr">${m}</span>`);
    }
    return `<p class="${cls}">${html}</p>`;
  }).join('');
}

function renderPrayer(id, ctx){
  const p = byId[id];
  if(!p){ location.hash = '#/'; return; }
  const t = themeById[p.theme];
  // navigation context: list of ids
  let ctxIds = t.prayers, backHash = '#/tema/'+t.id, backLabel = t.name;
  if(ctx && ctx.startsWith('circ/')){
    const c = circById[ctx.slice(5)];
    if(c){ ctxIds = c.prayers; backHash = '#/circ/'+c.id; backLabel = c.name; }
  }
  const i = ctxIds.indexOf(id);
  const prev = i>0 ? byId[ctxIds[i-1]] : null;
  const next = i>=0 && i<ctxIds.length-1 ? byId[ctxIds[i+1]] : null;
  const rubric = p.n ? `Pregària ${p.n}` : 'Pregària';
  const srcLine = p.festa ? p.festa : (p.src || t.name);
  const showTitle = (p.theme==='taula' && p.festa) ? 'Benedicció de la taula' : p.title;

  $app.innerHTML = `
    <div class="toolbar">
      <button class="btn" data-go="${backHash}">← ${esc(backLabel)}</button>
      <span class="spacer"></span>
      <button class="btn icon" id="sizeDown" aria-label="Redueix la mida del text">A−</button>
      <button class="btn icon" id="sizeUp" aria-label="Augmenta la mida del text">A+</button>
      <button class="btn" id="copyBtn">Copia el text</button>
    </div>
    <article class="prayer">
      <div class="rubric">${esc(rubric)}</div>
      <h2>${esc(showTitle)}</h2>
      <div class="psource">${esc(srcLine)}</div>
      <div class="orn" aria-hidden="true">✦</div>
      <div class="ptext" id="ptext">${bodyHTML(p)}</div>
    </article>
    <div class="pnav">
      ${prev?`<button class="btn" data-go="#/p/${prev.id}" data-ctx="${ctx||''}"><span class="dir">←</span><span class="t">${prev.n?prev.n+'. ':''}${esc((prev.theme==='taula'&&prev.festa)?prev.festa:prev.title)}</span></button>`:''}
      ${next?`<button class="btn" data-go="#/p/${next.id}" data-ctx="${ctx||''}" style="justify-content:flex-end"><span class="t">${next.n?next.n+'. ':''}${esc((next.theme==='taula'&&next.festa)?next.festa:next.title)}</span><span class="dir">→</span></button>`:''}
    </div>`;

  document.getElementById('sizeUp').onclick = ()=>adjustSize(0.1);
  document.getElementById('sizeDown').onclick = ()=>adjustSize(-0.1);
  document.getElementById('copyBtn').onclick = ()=>{
    const text = `${rubric}. ${showTitle}\n\n` + p.body.join('\n');
    navigator.clipboard?.writeText(text).then(()=>toast('Text copiat'),()=>toast('No s’ha pogut copiar'));
  };
  window.scrollTo({top:0});
}

let prayerSize = 1.25;
function adjustSize(d){
  prayerSize = Math.min(2.1, Math.max(0.95, prayerSize + d));
  document.documentElement.style.setProperty('--prayer-size', prayerSize + 'rem');
}

let toastTimer;
function toast(msg){
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(()=>t.classList.remove('show'), 1800);
}

// ---- routing ----
let currentCtx = '';
function route(){
  const h = location.hash.replace(/^#\/?/,'');
  if($q.value && !h.startsWith('cerca')) { /* keep search text but show route */ }
  if(h.startsWith('tema/')) { currentCtx = h; renderTheme(h.slice(5)); }
  else if(h.startsWith('circ/')) { currentCtx = h; renderCirc(h.slice(5)); }
  else if(h.startsWith('p/')) { renderPrayer(h.slice(2), currentCtx); }
  else { currentCtx=''; if($q.value.trim()) renderSearch($q.value); else renderHome(); }
  if(!h.startsWith('p/')) window.scrollTo({top:0});
}
window.addEventListener('hashchange', route);

document.body.addEventListener('click', e=>{
  const el = e.target.closest('[data-go]');
  if(!el) return;
  const ctx = el.getAttribute('data-ctx');
  if(ctx !== null && ctx !== '') currentCtx = ctx;
  else if(el.getAttribute('data-go') === '#/') { currentCtx=''; $q.value=''; $box.classList.remove('has-q'); }
  const target = el.getAttribute('data-go');
  if(location.hash === target) route(); else location.hash = target;
});

document.getElementById('homeTitle').addEventListener('click', ()=>{
  $q.value=''; $box.classList.remove('has-q'); currentCtx='';
  if(location.hash==='#/'||location.hash===''||location.hash==='#') route(); else location.hash='#/';
});

// ---- search ----
let searchTimer;
$q.addEventListener('input', ()=>{
  $box.classList.toggle('has-q', !!$q.value);
  clearTimeout(searchTimer);
  searchTimer = setTimeout(()=>{
    if($q.value.trim()){
      currentCtx = 'cerca';
      if(location.hash !== '#/' && location.hash !== '' ) location.hash = '#/';
      renderSearch($q.value);
    } else {
      route();
    }
  }, 120);
});
$q.addEventListener('keydown', e=>{
  if(e.key === 'Enter'){
    const qn = norm($q.value);
    if(/^\d+b?$/.test(qn) && byId[qn]){ location.hash = '#/p/'+qn; }
  }
});
document.getElementById('clearQ').addEventListener('click', ()=>{
  $q.value=''; $box.classList.remove('has-q'); $q.focus(); route();
});
document.addEventListener('keydown', e=>{
  if(e.key === '/' && document.activeElement !== $q){ e.preventDefault(); $q.focus(); }
});

route();
</script>
</body>
</html>
