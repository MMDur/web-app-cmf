<!DOCTYPE html>
<html lang="ca">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pregàries Claretianes</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Marcellus&family=EB+Garamond:ital,wght@0,400;0,500;0,600;1,400&display=swap" rel="stylesheet">
<style>
:root{
  --paper:#FBF7EF;
  --paper-2:#F4EDDF;
  --ink:#2B2320;
  --ink-soft:#5C5047;
  --garnet:#77202F;
  --garnet-deep:#571522;
  --gold:#A9843E;
  --line:#E3D8C4;
  --prayer-size:1.25rem;
  --radius:10px;
}
*{box-sizing:border-box;margin:0;padding:0}
html{scroll-behavior:smooth}
@media (prefers-reduced-motion:reduce){
  html{scroll-behavior:auto}
  *,*::before,*::after{animation:none!important;transition:none!important}
}
body{
  background:var(--paper);
  color:var(--ink);
  font-family:"EB Garamond",Georgia,"Times New Roman",serif;
  font-size:18px;
  line-height:1.55;
  -webkit-font-smoothing:antialiased;
}
button{font:inherit;color:inherit;background:none;border:none;cursor:pointer}
a{color:var(--garnet)}
:focus-visible{outline:3px solid var(--gold);outline-offset:2px;border-radius:4px}

/* ---------- Header ---------- */
.cover{
  background:linear-gradient(170deg,var(--garnet) 0%,var(--garnet-deep) 100%);
  color:#F6EBDD;
  padding:1.6rem 1.2rem 1.4rem;
  text-align:center;
  position:relative;
}
.cover::after{
  content:"";
  display:block;
  position:absolute;left:0;right:0;bottom:0;height:4px;
  background:linear-gradient(90deg,transparent,var(--gold) 30%,var(--gold) 70%,transparent);
  opacity:.85;
}
.cover .mark{width:44px;height:44px;margin:0 auto .5rem;display:block;color:#D9B368}
.cover h1{
  font-family:Marcellus,Georgia,serif;
  font-weight:400;
  font-size:clamp(1.7rem,5.5vw,2.4rem);
  letter-spacing:.06em;
  cursor:pointer;
}
.cover .sub{
  font-style:italic;
  color:#E4CBA8;
  font-size:1rem;
  margin-top:.15rem;
}

/* ---------- Search ---------- */
.searchwrap{
  max-width:720px;margin:-1.35rem auto 0;padding:0 1rem;position:relative;z-index:2;
}
.searchbox{
  display:flex;align-items:center;gap:.6rem;
  background:#fff;
  border:1px solid var(--line);
  border-radius:999px;
  padding:.65rem 1.1rem;
  box-shadow:0 6px 18px rgba(87,21,34,.14);
}
.searchbox svg{flex:none;color:var(--garnet)}
.searchbox input{
  flex:1;border:none;background:none;font:inherit;font-size:1.05rem;color:var(--ink);min-width:0;
}
.searchbox input:focus{outline:none}
.searchbox input::placeholder{color:#A79A8C;font-style:italic}
.searchbox .clear{color:#A79A8C;font-size:1.3rem;line-height:1;padding:0 .1rem;display:none}
.searchbox.has-q .clear{display:block}

/* ---------- Layout ---------- */
main{max-width:720px;margin:0 auto;padding:1.4rem 1rem 4rem}
.label{
  font-family:Marcellus,Georgia,serif;
  font-size:.82rem;
  letter-spacing:.22em;
  text-transform:uppercase;
  color:var(--gold);
  margin:1.6rem 0 .7rem;
  display:flex;align-items:center;gap:.8rem;
}
.label::after{content:"";flex:1;height:1px;background:var(--line)}

/* ---------- Circumstance chips ---------- */
.chips{display:flex;flex-wrap:wrap;gap:.5rem}
.chip{
  border:1px solid var(--line);
  background:#fff;
  border-radius:999px;
  padding:.42rem .95rem;
  font-size:.98rem;
  color:var(--ink);
  transition:border-color .15s,background .15s;
}
.chip:hover{border-color:var(--garnet);background:var(--paper-2)}

/* ---------- Theme index ---------- */
.themes{display:grid;grid-template-columns:1fr;gap:.45rem}
@media(min-width:560px){.themes{grid-template-columns:1fr 1fr}}
.theme-card{
  display:flex;align-items:baseline;gap:.75rem;
  text-align:left;
  background:#fff;
  border:1px solid var(--line);
  border-radius:var(--radius);
  padding:.8rem .95rem;
  transition:border-color .15s,transform .15s;
}
.theme-card:hover{border-color:var(--garnet);transform:translateY(-1px)}
.theme-card .tnum{
  font-family:Marcellus,Georgia,serif;
  color:var(--garnet);
  font-size:.95rem;
  min-width:1.6rem;
}
.theme-card .tname{
  font-family:Marcellus,Georgia,serif;
  font-size:1.08rem;
  line-height:1.25;
}
.theme-card .tsub{display:block;font-family:"EB Garamond",serif;font-style:italic;color:var(--ink-soft);font-size:.92rem;margin-top:.15rem}
.theme-card .tcount{margin-left:auto;color:#A79A8C;font-size:.88rem;white-space:nowrap}

/* ---------- Prayer list ---------- */
.list-head{margin:.4rem 0 1rem}
.list-head h2{font-family:Marcellus,Georgia,serif;font-weight:400;font-size:1.55rem;color:var(--garnet-deep);line-height:1.2}
.list-head .lsub{font-style:italic;color:var(--ink-soft)}
.plist{list-style:none}
.plist li{border-bottom:1px solid var(--line)}
.prow{
  display:flex;align-items:baseline;gap:.9rem;
  width:100%;text-align:left;
  padding:.75rem .3rem;
  transition:background .15s;
}
.prow:hover{background:var(--paper-2)}
.prow .pnum{
  font-family:Marcellus,Georgia,serif;
  color:var(--garnet);
  font-size:1rem;
  min-width:2.4rem;
  text-align:right;
  flex:none;
}
.prow .ptitle{font-size:1.12rem;line-height:1.3}
.prow .psub{display:block;font-style:italic;color:var(--ink-soft);font-size:.9rem}
.empty{
  text-align:center;color:var(--ink-soft);font-style:italic;padding:2.5rem 1rem;
}

/* ---------- Back / toolbar ---------- */
.toolbar{display:flex;align-items:center;gap:.6rem;margin-bottom:.9rem;flex-wrap:wrap}
.btn{
  display:inline-flex;align-items:center;gap:.4rem;
  border:1px solid var(--line);
  background:#fff;
  border-radius:999px;
  padding:.35rem .9rem;
  font-size:.95rem;
  transition:border-color .15s,background .15s;
}
.btn:hover{border-color:var(--garnet)}
.btn.icon{padding:.35rem .7rem}
.spacer{flex:1}

/* ---------- Prayer view ---------- */
article.prayer{
  background:#fff;
  border:1px solid var(--line);
  border-radius:14px;
  padding:clamp(1.3rem,4vw,2.4rem);
  box-shadow:0 2px 10px rgba(87,21,34,.05);
}
.rubric{
  font-family:Marcellus,Georgia,serif;
  color:var(--garnet);
  letter-spacing:.24em;
  text-transform:uppercase;
  font-size:.85rem;
  text-align:center;
}
article.prayer h2{
  font-family:Marcellus,Georgia,serif;
  font-weight:400;
  font-size:clamp(1.45rem,4.5vw,1.9rem);
  text-align:center;
  color:var(--garnet-deep);
  line-height:1.25;
  margin:.35rem 0 .2rem;
}
.psource{text-align:center;font-style:italic;color:var(--ink-soft);font-size:.98rem}
.orn{
  display:flex;align-items:center;justify-content:center;gap:.7rem;
  margin:1rem 0 1.3rem;color:var(--gold);
}
.orn::before,.orn::after{content:"";width:64px;height:1px;background:var(--line)}
.ptext{font-size:var(--prayer-size);line-height:1.62}
.ptext p{margin:0}
.ptext p+p{margin-top:.22em}
.ptext p.verse{margin-top:.9em}
.ptext p:first-child::first-letter{
  font-family:Marcellus,Georgia,serif;
  color:var(--garnet);
  font-size:2.9em;
  float:left;
  line-height:.82;
  padding:.04em .09em 0 0;
}
.ptext .vr{color:var(--garnet);font-family:Marcellus,Georgia,serif;font-size:.85em;letter-spacing:.03em}
.pnav{display:flex;gap:.6rem;margin-top:1.2rem}
.pnav .btn{flex:1;justify-content:center;padding:.6rem .9rem}
.pnav .btn .dir{color:var(--garnet);font-family:Marcellus,Georgia,serif;font-size:.85rem;letter-spacing:.1em}
.pnav .btn span.t{overflow:hidden;text-overflow:ellipsis;white-space:nowrap;max-width:22ch}
.toast{
  position:fixed;left:50%;bottom:1.4rem;transform:translateX(-50%) translateY(20px);
  background:var(--garnet-deep);color:#F6EBDD;
  padding:.55rem 1.2rem;border-radius:999px;font-size:.95rem;
  opacity:0;pointer-events:none;transition:opacity .25s,transform .25s;
  z-index:50;
}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}

footer{
  text-align:center;color:#A79A8C;font-style:italic;font-size:.9rem;
  padding:0 1rem 2.5rem;
}
</style>
</head>

, "144"]}, {"id": "sant-josep", "name": "Sant Josep", "sub": "Lletanies i oracions", "prayers": ["157", "158", "159", "160", "161", "162"]}, {"id": "martirs", "name": "Màrtirs i causes dels sants", "sub": "Màrtirs de Barbastre; beatificació i canonització", "prayers": ["165", "166", "169", "170", "171", "172"]}, {"id": "capitol", "name": "Pel Capítol", "sub": "Abans i durant la seva celebració", "prayers": ["183", "186", "187"]}, {"id": "taula", "name": "Benedicció de la taula", "sub": "Per a les festes de l’any claretià", "prayers": ["201", "202", "203", "204", "205", "206", "207", "208", "209", "210", "211", "212", "213", "214", "215"]}], "circumstances": [{"id": "c-reunio-inici", "name": "Començar una reunió", "prayers": ["131", "132", "133", "134", "135", "136", "137"]}, {"id": "c-reunio-final", "name": "Acabar una reunió", "prayers": ["138", "139"]}, {"id": "c-taula", "name": "Beneir la taula", "prayers": ["201", "202", "203", "204", "205", "206", "207", "208", "209", "210", "211", "212", "213", "214", "215"]}, {"id": "c-eucaristia", "name": "Adoració eucarística", "prayers": ["113", "114", "115", "116", "117", "118", "119"]}, {"id": "c-vocacions", "name": "Demanar vocacions", "prayers": ["84", "85", "86", "87", "88", "89", "90", "139b"]}, {"id": "c-malalts", "name": "Pels malalts", "prayers": ["91", "92"]}, {"id": "c-difunts", "name": "Pels difunts", "prayers": ["claretians_difunts", "95", "96", "97"]}, {"id": "c-capitol", "name": "Pel Capítol", "prayers": ["183", "186", "187"]}, {"id": "c-exercicis", "name": "Exercicis espirituals", "prayers": ["144"]}, {"id": "c-aniversari", "name": "Aniversari de la Fundació · 16 juliol", "prayers": ["34", "209"]}, {"id": "c-claret", "name": "Festa del P. Claret · 24 octubre", "prayers": ["215", "29", "30", "31"]}, {"id": "c-cor-maria", "name": "Festa del Cor de Maria", "prayers": ["203", "20", "21", "22", "23"]}], "prayers": [{"id": "2", "n": "2", "title": "Providència de Déu", "theme": "pare", "body": ["Beneït sigueu, Senyor, per la vostra providència", "i per la cura que sempre i a tot arreu heu tingut de mi. Amén."]}, {"id": "3", "n": "3", "title": "Estimar i servir Déu", "theme": "pare", "body": ["Beneït sigueu, Senyor, pel vostre amor i misericòrdia amb mi.", "Feu que us estimi i us serveixi", "i que us faci estimar i servir de totes les criatures. Amén."]}, {"id": "4", "n": "4", "title": "Petició del do de l'amor", "theme": "pare", "body": ["Foc, que sempre cremeu i mai no us apagueu,", "amor, que sempre bulliu i mai no us esmorteïu,", "abruseu-me perquè us estimi.", "Us estimo, Jesús, amb tot el meu cor,", "amb tota la meva ànima, amb totes les meves forces.", "Voldria estimar-vos més i que tots us estimessin.", "Voldria estimar-vos per mi i per totes les vostres criatures.", "Verge Santíssima, concediu-me la gràcia", "que tots se salvin i ningú no es condemni. Amén."]}, {"id": "5", "n": "5", "title": "Unió amb Déu", "theme": "pare", "body": ["Senyor, així com l'aigua s'ajunta al vi en l'eucaristia,", "així desitjo unir-me a Vós i oferir-me amb Vós a la Santíssima Trinitat. Amén."]}, {"id": "6", "n": "6", "title": "Déu Pare, vida, amor i esperança", "theme": "pare", "body": ["Senyor meu, Vós sou el meu amor, la meva honra, la meva esperança, el meu refugi.", "Vós la meva vida, la meva glòria, la meva fi, el meu Mestre, el meu Pare, el meu amor. Amén."]}, {"id": "7", "n": "7", "title": "Déu provident i salvador", "theme": "pare", "body": ["Gràcies, Senyor per la vostra bondat,", "perquè us valeu de tots els mitjans per a la conversió dels pecadors.", "Beneïda sigui la vostra providència, que sempre vetlla per mi.", "Ara i sempre cantaré la vostra eterna misericòrdia. Amén."]}, {"id": "8", "n": "8", "title": "Només Déu", "theme": "pare", "body": ["Senyor, Vós sou el meu amor, la meva honra, la meva esperança i el meu refugi.", "Vós sou la meva glòria i la meva fi. El meu mestre, el meu Pare.", "Ajudeu-me a no buscar-vos, només a Vós, ni saber res que no sigui la vostra voluntat per complir-la.", "Només us vull a Vós, i en Vós i per Vós i per a Vós, les altres coses.", "Vós sou per a mi suficientíssim.", "Feu que us estimi com Vós m'estimeu, i com voleu que jo us estimi. Amén."]}, {"id": "9", "n": "9", "title": "Tot per a la glòria de Déu", "theme": "pare", "body": ["Vull estimar-vos, Déu meu,", "amb tot el meu cor, amb tot el meu ésser, amb totes les meves forces:", "us consagro els meus pensaments, desigs, paraules i accions,", "tot el que tinc i el que pugui tenir.", "Feu que esmerci tot el que tinc per a major honra i glòria vostra segons la vostra voluntat. Amén."]}, {"id": "10", "n": "10", "title": "Per demanar l'Esperit", "theme": "pare", "body": ["Us demano, Senyor, que, a causa de la meva fragilitat,", "m'envieu el vostre Esperit perquè m'il·lumini i encengui en el vostre amor,", "em dirigeixi i encamini pel camí recte de Jesucrist", "i de la Verge Maria, Mare de Déu i mare meva. Amén."]}, {"id": "11", "n": "11", "title": "Per demanar les virtuts", "theme": "pare", "body": ["Crec, Senyor, però que la meva fe sigui més ferma.", "Espero, Senyor, però que esperi amb més seguretat.", "Estimo, Senyor, però que estimi amb més ardor.", "Tinc dolor, Senyor, però que el tingui més vehement.", "Us demano, Senyor, què voleu que faci?", "Ensenyeu-me a complir la vostra voluntat, perquè Vós sou el meu Déu.", "Concediu-me un cor despert per jutjar el vostre poble,", "i discernir entre el bé i el mal.", "Pare, doneu-me humilitat, mansuetud,", "castedat, paciència i caritat.", "Pare, ensenyeu-me la bondat, la ciència i la disciplina.", "Pare, doneu-me el vostre amor amb la vostra gràcia i seré ric amb escreix.", "Déu meu, Jesús meu i totes les meves coses.", "Visc en la creu i en la creu vull morir,", "i espero davallar de la creu, no per les mans meves, sinó per les d’altri,", "un cop s’haurà consumat el meu sacrifici.", "Ara el que és jo, Déu me’n guard de posar la meva glòria en res més", "que en la creu del Senyor meu Jesucrist,", "pel qual el món és per a mi un crucificat i jo sóc un crucificat per al món.", "Amén."]}, {"id": "12", "n": "12", "title": "Exercici d'amor de Déu", "theme": "pare", "body": ["Déu meu, sigueu Déu com sou i per sempre:", "m'alegro que ho sigueu.", "Vós teniu poder infinit:", "sigueu Déu Totpoderós com ho sou.", "Vós teniu saviesa infinita:", "lloat sigueu;", "tingueu infinita saviesa com la teniu.", "Vós teniu bondat infinita,", "caritat infinita i clemència infinita.", "Tingueu, Senyor, bondat,", "caritat i clemència infinita com la teniu.", "Vós, Senyor, tingueu misericòrdia,", "providència i liberalitat com la teniu.", "Vós, Senyor, sou gloriós i benaurat per sempre més;", "sigueu gloriós i benaurat com ho sou.", "Vós, Senyor, sou Tri i U,", "Pare, Fill i Esperit Sant,", "tres persones distintes i un sol Déu veritable;", "sigueu Tri i U com ho sou.", "Sou Salvador i glorificador nostre", "i de totes les criatures; lloat sigueu.", "Vós, Senyor, sou Senyor universal", "a qui estimen, lloen i serveixen els àngels", "i els benaurats al cel i els homes a la terra;", "sigueu Vós Senyor de tots,", "i tots al cel i a la terra us estimem,", "lloem i servim per sempre.", "Cor de Jesús, estimeu Déu per mi.", "Cor de Maria, estimeu Déu per mi.", "Cor de tots els sants, estimeu Déu per mi.", "Cors de tots els àngels, estimeu Déu per mi.", "Criatures totes, estimeu Déu per mi.", "Foc diví que sempre cremeu i mai no us extingiu.", "Cor de Jesús, que sempre cremeu i mai no us esmorteïu,", "feu que el meu cor cremi sempre en el foc de l’amor diví. Amén."]}, {"id": "13", "n": "13", "title": "Lletania claretiana d'invocacions a Maria", "theme": "cor-maria", "body": ["Santa Maria, Filla del Pare.", "- R/. Pregueu per nosaltres.", "Santa Maria, Mare del Fill.", "Santa Maria, Temple de l'Esperit Sant.", "Terme i coronació de la Trinitat.", "Delícia de Déu.", "L'obra més perfecta de Déu.", "Concebuda en gràcia.", "En qui brillen l’omnipotència, saviesa i bondat de Déu.", "Concebuda en gràcia, confirmada en gràcia i plena de gràcia.", "Exempta de tot contagi de pecat.", "Criatura singularíssima i predilecta.", "Purificada i santificada en la seva mateixa concepció.", "Preservada de tota culpa.", "Hereva del cel.", "Confirmada en gràcia.", "Enlairada a dignitat gairebé infinita.", "Plena de gràcia.", "La més pura i de més encesa caritat.", "Mare de Déu i dels homes.", "Mare de Déu humanat.", "Mare veritable.", "Mare espiritual.", "Mare del bell amor.", "Mare de caritat.", "Mare de pietat i de misericòrdia.", "Mare dels vivents.", "Mare entranyable.", "Mare, mestra i directora.", "Mare que ens va rebre de Déu com a fills.", "Formadora i guia d'apòstols i missioners.", "Mare i advocada dels pecadors.", "Mare, alleujament, fortalesa i consol.", "Dispensadora de misericòrdies.", "Canal de gràcia.", "Refugi de desvalguts.", "Nord de navegants.", "Salut de malalts.", "Alè de moribunds.", "Redemptora de captius.", "Insigne advocada.", "Consol d'afligits.", "Escala del cel.", "Finestra del paradís.", "Reina de cel i terra.", "Reina i senyora de la gràcia.", "Cor de l'Església.", "Cor del món cristià."], "src": "Del Pare Fundador"}, {"id": "14", "n": "14", "title": "Súplica a Maria", "theme": "cor-maria", "body": ["Verge i Mare de Déu,", "gireu els vostres ulls misericordiosos vers nosaltres", "que ens trobem en aquesta vall de llàgrimes,", "i que confiem en vós perquè som els vostres fills.", "Ajudeu-nos a anunciar la Bona Nova del Regne", "en fidelitat i fortalesa,", "perquè són molts els qui s'hi oposen", "per ambició de poder, per afany de riqueses o per ànsia de plaers.", "Disposeu de mi per a cooperar amb el vostre ofici maternal", "a la missió apostòlica.", "Amén."], "src": "Del Pare Fundador"}, {"id": "15", "n": "15", "title": "Invocacions a Maria", "theme": "cor-maria", "body": ["Déu vos salve, Immaculada Maria, Filla de Déu Pare.", "Déu vos salve, Immaculada Maria, Mare de Déu Fill.", "Déu vos salve, Immaculada Maria, Temple de Déu Esperit Sant.", "Déu vos salve Maria, mare i advocada dels pecadors.", "Beneïda sou entre totes les dones.", "Vós sou la glòria de Jerusalem,", "l'alegria d'Israel i l'honor del nostre poble.", "Vós sou l'empara dels desvalguts,", "el consol dels afligits, el nord dels navegants.", "Vós sou la salut dels malalts, l'alè dels moribunds,", "i la porta del cel.", "Vós sou, després de Jesucrist, fruit beneït del vostre ventre,", "tota la nostra esperança.", "Oh clement, oh pia, oh dolça i Immaculada Maria."], "src": "Del Pare Fundador"}, {"id": "16", "n": "16", "title": "Mare de l‘Amor diví", "theme": "cor-maria", "body": ["Maria, Mare meva, Mare de l’Amor diví! No puc demanar res que us sigui més agradable ni més fàcil de concedir", "que l’amor diví.", "Concediu-me'l, Mare meva.", "Mare meva, tinc fam i set d'amor.", "Socorreu-me, sacieu-me.", "Oh, Cor de Maria, farga i instrument de l'amor,", "enceneu-me en l'amor de Déu i del proïsme!"], "src": "Del Pare Fundador"}, {"id": "17", "n": "17", "title": "Fill i Ministre de Maria", "theme": "cor-maria", "body": ["Oh Verge i Mare de Déu!,", "sabeu prou bé que som fills i ministres vostres,", "formats per Vós mateixa", "en la farga de la vostra misericòrdia i amor.", "Som com una fletxa posada en la vostra mà poderosa.", "Llanceu-nos, Mare nostra,", "contra tot el que s'oposa al Regne de Déu.", "Confiats en la vostra protecció,", "anunciarem l'Evangeli", "sense més armes que l’espasa de dos talls", "de la Paraula divina,", "sense més títols que el de fills del vostre Cor Immaculat.", "Vostra serà, Mare, la victòria.", "Amén."], "src": "Del Pare Fundador"}, {"id": "18", "n": "18", "title": "Configuració amb Crist", "theme": "cor-maria", "body": ["Senyor i Déu nostre,", "que vau escollir Maria, la sempre Verge", "com a Mare del vostre Fill i Mare nostra;", "feu que, pel lliurament fidel al seu Cor maternal,", "ens configurem més plenament a Crist", "i cooperem amb el seu ofici maternal", "a la missió apostòlica.", "Per Crist Senyor nostre.", "Amén."], "src": "De la Congregació"}, {"id": "19", "n": "19", "title": "Lletanies de la Mare de Déu inspirades en les Constitucions", "theme": "cor-maria", "body": ["Oh Maria, els Fills del vostre Cor Immaculat,", "per la vostra fe obedient i per la vostra caritat ardent", "us proclamem “Benaurada” i us invoquem:", "- Mare de Déu i mare nostra.", "R/. Beneïda sou vós entre totes les dones.", "- Mare de Jesucrist, nostre Senyor, enviat pel Pare.", "- Mare del Verb, fet home per obra de l'Esperit.", "- Mare del Fill ungit per a evangelitzar els pobres.", "- Fundadora, Patrona i Titular de la nostra Congregació.", "- Primera deixebla de Crist.", "- Model nostre en el seguiment de Jesús.", "- Primera entre els pobres del Senyor.", "- Esclava consagrada totalment a la persona i a l'obra del vostre Fill.", "- Mare i Mestra de Missioners.", "- Formadora d'Apòstols.", "Preguem:", "Déu Pare nostre, us donem gràcies", "perquè ens diem i som Fills del Cor Immaculat de Maria,", "feu que venerem amb amor i confiança la nostra Mare", "i ens lliurem a Ella perquè ens configuri a Crist", "i cooperem amb el seu ofici maternal", "a la missió apostòlica que ens heu confiat.", "Amén."], "src": "De la Congregació"}, {"id": "20", "n": "20", "title": "Oració filial i apostòlica al Cor de Maria", "theme": "cor-maria", "body": ["Oh Verge i Mare de Déu!,", "jo m’ofereixo per fill i servent vostre.", "Em consagro al vostre amor maternal", "perquè formeu en mi Jesús,", "el Fill i l'Enviat del Pare,", "l’Ungit per l'Esperit Sant", "per anunciar la Bona Nova als pobres.", "Em poso a les vostres mans", "per tal que Ell m’enviï a tots els homes,", "fills vostres i germans meus.", "Feu que els reveli el Pare.", "Ensenyeu-me a guardar, com vós, la Paraula en el cor,", "fins a transformar-me en Evangeli viu", "del vostre amor matern,", "perquè es formin nous fills per a l’Evangeli.", "Demaneu la força de l'Esperit", "perquè sigui testimoni de Crist entre els homes.", "Infoneu-me el vostre amor matern", "perquè els reveli el Pare", "i sentin l'alegria de ser fills de Déu", "en la comunió fraterna de l'Església.", "Mare, aquí teniu el vostre fill. Formeu-me.", "Mare, aquí teniu el vostre fill. Envieu-me.", "Mare, aquí teniu el vostre fill. Parleu per mi. Estimeu per mi.", "Guardeu-me, no sigui que anunciant a d’altres l'Evangeli,", "quedi jo exclòs del Regne.", "En Vós, Mare meva,", "he posada tota la meva confiança.", "Mai no quedaré confós. Amén."], "src": "De la Congregació"}, {"id": "21", "n": "21", "title": "Lletanies al Cor de Maria", "theme": "cor-maria", "body": ["Senyor, tingueu pietat.", "Crist, tingueu pietat.", "Senyor, tingueu pietat.", "Crist, oïu-nos.", "Crist, escolteu-nos.", "Déu, Pare celestial. Tingueu pietat de nosaltres.", "Déu, Fill redemptor del món.", "Déu, Esperit Sant.", "Trinitat Santa, un sol Déu.", "Cor de Maria, modelat pel Pare. Pregueu per nosaltres.", "Cor de Maria, el més semblant al Cor de Jesús.", "Cor de Maria, ornat amb tots els dons de l'Esperit Sant.", "Cor de Maria, que estimeu el Pare amb amor de filla.", "Cor de Maria, que estimeu el Fill amb amor de mare.", "Cor de Maria, que estimeu l'Esperit Sant amb amor d'esposa.", "Cor de Maria, que conserveu fidelment les paraules i accions de Jesús.", "Cor de Maria, traspassat amb l'espasa de dolor.", "Cor de Maria, clavat en la creu amb Crist crucificat.", "Cor de Maria, vivificat per l'alegria de la resurrecció de Jesús.", "Cor de Maria, curull de nova plenitud de gràcia en la vinguda de l'Esperit Sant.", "Cor de Maria, morada de Déu, plena de la seva glòria.", "Cor de Maria, arca de l'aliança de Déu amb els homes.", "Cor de Maria, habitacle de Déu i dels homes.", "Cor de Maria, que heu portat la salvació del món.", "Cor de Maria, sempre Immaculat.", "Cor de Maria, ple de gràcia.", "Cor de Maria, beneït entre tots els cors.", "Cor de Maria, abisme d'humilitat.", "Cor de Maria, tron de misericòrdia.", "Cor de Maria, forja d'amor diví.", "Cor de Maria, que obteniu la gràcia als pecadors.", "Cor de Maria, roca invencible de fe.", "Cor de Maria, font d'amistat perfecta.", "Cor de Maria, suport de l'Església en el seu caminar vers el Pare.", "Cor de Maria, forja d'amor que ens configura amb Jesús.", "Cor de Maria, Mare i formadora nostra.", "Cor de Maria, consol d'afligits.", "Cor de Maria, refugi de pecadors.", "Cor de Maria, auxili dels agonitzants.", "Cor de Maria, esperança del món.", "Cor de Maria, senyora dels nostres cors.", "Cor de Maria, reina de la pau.", "Anyell de Déu que lleveu el pecat del món.", "- Perdoneu-nos, Senyor.", "Anyell de Déu que lleveu el pecat del món.", "- Escolteu-nos, Senyor.", "Anyell de Déu que lleveu el pecat del món.", "- Tingueu pietat de nosaltres.", "Pregueu per nosaltres, Santa Mare de Déu.", "-perquè siguem dignes d'obtenir les promeses de Jesucrist", "Preguem:", "Senyor, Déu nostre,", "que vau fer del Cor Immaculat de Maria", "una mansió per al vostre Fill i un santuari de l'Esperit Sant,", "doneu-nos un cor net i dòcil,", "perquè, complint sempre la vostra voluntat,", "us estimem sobre totes les coses", "i ajudem els germans en les seves necessitats.", "Per Crist Senyor nostre.", "Amén."], "src": "De la Congregació"}, {"id": "22", "n": "22", "title": "Acció de gràcies pel cor de Maria", "theme": "cor-maria", "body": ["Us donem gràcies, Pare sant,", "perquè donàreu a la Mare de Déu un cor savi i dòcil,", "disposat sempre a agradar-vos,", "un cor nou i humil,", "per a gravar-hi la llei de la nova Aliança;", "un cor senzill i net,", "que la va fer digna de concebre virginalment el vostre Fill", "i capaç de contemplar-vos eternament;", "un cor ferm i amatent", "per a suportar amb fortalesa l'espasa de dolor,", "i esperar, plena de fe, la resurrecció del seu Fill.", "Doneu-nos un cor savi i dòcil, nou i humil,", "senzill i net, ferm i amatent,", "perquè l’imitem i cooperem amb més fidelitat a la vostra obra de salvació.", "Amén."], "src": "De la Congregació"}, {"id": "23", "n": "23", "title": "Lliurament al Cor de Maria", "theme": "cor-maria", "body": ["Mare del Senyor, Cor de Maria!", "Vós que presidíreu com a Fundadora", "l'origen de la nostra Congregació,", "sigueu sempre la nostra inspiradora i", "el cor de la nostra Congregació,", "necessitada de contemplació i de noves il·lusions,", "en aquest món, tan estimat pel Pare", "i tan afectat per la increença i la injustícia;", "parleu per nosaltres", "i testifiqueu a través de la nostra vida", "el missatge del Regne.", "Mare del Senyor,", "pregueu perquè vingui a nosaltres", "l'Esperit, que és impuls vers el món nou.", "Mare, amb el vostre Cor", "pregueu per nosaltres!", "intercediu per nosaltres!"], "src": "De la Congregació"}, {"id": "24", "n": "24", "title": "Oferiment al Cor de Maria", "theme": "cor-maria", "body": ["Verge Maria, Mare de Déu i Mare nostra:", "em confio al vostre amor maternal", "perquè feu de mi un missioner", "a imatge i semblança del vostre Fill, l'Enviat del Pare,", "per a anunciar la Bona Nova als pobres.", "Ensenyeu-me a creure, estimar i servir com Vós.", "Feu-me generós i agraït", "per a viure amb alegria", "el do de la meva vocació missionera.", "Amén."], "src": "De la Congregació"}, {"id": "25", "n": "25", "title": "Cor de Maria", "theme": "cor-maria", "body": ["Senyor, Déu nostre,", "que elegíreu Maria, sempre Verge", "com a Mare del vostre Fill i Mare nostra:", "feu que, per la consagració fidel al seu Cor maternal,", "ens configurem més plenament a Crist", "i, urgits per la seva caritat,", "ens dediquem amb més generositat", "a proclamar l'Evangeli a tots els homes.", "Per Crist Senyor nostre.", "Amén."], "src": "De la Congregació"}, {"id": "26", "n": "26", "title": "Mare i Mestra", "theme": "cor-maria", "body": ["Maria, Mare i Mestra de Missioners, intercediu davant el Pare", "perquè els fills del vostre Cor", "reproduïm els trets de Jesús", "i siguem homes universals,", "d'ulls penetrants i oïdes atentes", "a les urgències del món.", "Que com Vós,", "siguem homes de misericòrdia,", "tendresa i compassió.", "Que ens obrim sempre a nous horitzons missioners,", "disposats a acceptar la diversitat.", "I la caritat apostòlica que brolla", "de la forja del vostre Cor", "ens impulsi en tota circumstància", "on l'Esperit ens posi.", "Amén."], "src": "De la Congregació"}, {"id": "27", "n": "27", "title": "Invocació a Maria Mare de l'Església", "theme": "cor-maria", "body": ["Mare de Déu, Mare de l'Església,", "us confiem tota l'Església.", "Recordeu-vos de tots els vostres fills;", "doneu ardor a les seves oracions davant Déu;", "conserveu sòlida llur fe;", "fortifiqueu llur esperança", "i augmenteu llur caritat.", "Encomanem al vostre Cor Immaculat", "tot el gènere humà:", "conduïu-lo al coneixement", "de l'únic i veritable salvador, Crist Jesús;", "allunyeu d'ell el càstig del pecat;", "concediu a tot el món la pau en la veritat,", "en la justícia, en la llibertat i en l'amor.", "I feu que tota l'Església", "pugui enlairar al Déu de les misericòrdies", "un himne de lloança, d'agraïment i d'alegria,", "ja que el Senyor ha obrat coses grans per mitjà vostre,", "oh clement, piadosa i dolça Verge Maria.", "Amén."], "src": "De la Congregació"}, {"id": "29", "n": "29", "title": "Fundador i model", "theme": "claret", "body": ["Senyor, Déu nostre,", "que vau escollir Sant Antoni Maria Claret", "perquè fundés la nostra Família,", "i el vau inflamar d’un amor tan ardent,", "que el feia viure content i joiós enmig de les privacions, calúmnies i turments;", "concediu-nos, benigne, que,", "adherint-nos fidelment als seus ensenyaments,", "proclamem la vostra glòria en tot el món", "i busquem sempre amb sol·licitud", "la salvació de tots els homes.", "Per Crist Senyor nostre.", "Amén."]}, {"id": "30", "n": "30", "title": "Fidels al seu esperit", "theme": "claret", "body": ["Déu Pare nostre,", "que concedíreu a Sant Antoni Maria Claret", "un ardent i filial amor al Santíssim Sagrament", "i al Cor Immaculat de Maria,", "perquè realitzés en l'Església de Déu", "grans meravelles per a la glòria divina", "i la salvació de les ànimes:", "concediu-nos que,", "encesos a imitació seva", "en els mateixos sants amors,", "i continuant amb la més gran eficàcia", "la seva obra evangelitzadora,", "mereixem de viure i morir a la Congregació", "com a dignes Fills del Cor Immaculat de Maria.", "Amén."]}, {"id": "31", "n": "31", "title": "Per continuar la seva obra", "theme": "claret", "body": ["Senyor,", "que vau fer de Sant Antoni Maria Claret, el nostre Pare,", "un fervent apòstol de la glòria de Déu i de la salvació dels homes,", "concediu-nos la caritat ardent que abrusava el seu cor,", "perquè continuem amb intensitat i eficàcia", "la seva obra apostòlica.", "Feu que es multipliquin els seus fills", "per estendre el Regne de Jesucrist,", "i que a l’hora de la nostra mort", "mereixem ser reconeguts com a \"servents fidels\" de Crist i de l'Evangeli.", "Amén."]}, {"id": "32", "n": "32", "title": "Magníficat de la vocació", "theme": "congregacio", "body": ["Senyor Déu nostre, beneït sigueu", "per haver-vos dignat escollir", "els vostres humils servents", "per a fills del Cor Immaculat de la vostra Mare!", "Oh, Mare beneïda,", "sigueu lloada mil vegades", "per la finesa del vostre Cor Immaculat", "d’haver-nos acceptat com a fills vostres!", "Feu, Mare nostra, que corresponguem a tanta bondat;", "que cada dia siguem més humils, més fervorosos", "i més zelosos de la salvació de les ànimes.", "Amén."]}, {"id": "33", "n": "33", "title": "Oració del claretià", "theme": "congregacio", "body": ["Renovelleu, Senyor, en la nostra Congregació", "i en cadascun de nosaltres", "l’esperit que animà", "Sant Antoni Maria Claret, el nostre Pare.", "Feu, que els Missioners", "Fills del Cor Immaculat de Maria", "siguem homes arborats de caritat", "i que abrusem la terra per on passem.", "Que desitgem eficaçment i procurem per tots els mitjans possibles", "d’encendre tothom en el foc de l’amor diví.", "Que res ni ningú no ens faci enrere.", "Que sapiguem gaudir en les privacions,", "abordar els treballs, abraçar els sacrificis,", "complaure'ns en les calúmnies que ens aixequin,", "alegrar-nos en els turments i dolors que hàgim de patir", "i gloriar-nos en la creu de Jesucrist.", "Que no pensem sinó com seguirem", "i imitarem més de prop Jesucrist", "a pregar, treballar i sofrir", "i procurar sempre i únicament la major glòria de Déu", "i la salvació de les ànimes.", "Amén."]}, {"id": "34", "n": "34", "title": "Oració per a l'aniversari de la Fundació", "theme": "congregacio", "body": ["Senyor,", "que atorgàreu a Sant Antoni Maria Claret, el nostre Pare,", "d’abrusar-se en caritat", "i una sol·licitud apostòlica", "per la salvació dels homes de tot el món.", "Des de petit el vau anar conduint", "al coneixement més ple del misteri de Crist.", "Empès per la caritat, es va lliurar a l'anunci de l'Evangeli,", "va ser pacient en els treballs i calúmnies,", "i va ratificar la seva vida amb la seva sang i l’exili.", "Per continuar la seva obra,", "i per mitjà de la Verge Maria,", "va fundar la nostra Congregació i ens va deixar el seu esperit.", "Avui, en recordar el nostre origen en l'Església,", "us demanem, per intercessió de la nostra Mare,", "que ens feu fills seus fidels", "en el ministeri de la Paraula;", "que el seu cor continuï sent per a nosaltres", "el bàcul de la confiança;", "que beneïu amb noves vocacions", "aquesta família claretiana", "i que ens doneu un amor perseverant a Jesús", "a tots els qui ens diem i som", "fills del Cor Immaculat de Maria", "i treballem per la glòria de Déu", "a l'Església.", "Amén."]}, {"id": "35", "n": "35", "title": "Per la nostra Congregació", "theme": "congregacio", "body": ["Preguem:", "Us demanem, Senyor, que,", "per intercessió del Cor Immaculat de Maria,", "allibereu de tot mal la nostra Congregació", "perquè, amb esperit humil i generós, com Sant Antoni Maria Claret,", "es dediqui al vostre pla de salvació sobre tots els homes", "Per Crist Senyor nostre.", "Amén."]}, {"id": "36", "n": "36", "title": "Per la nostra Congregació", "theme": "congregacio", "body": ["V/. Santa Maria.", "R/. Pregueu per nosaltres.", "V/. Sant Miquel i tots els sants Àngels.", "R/. Pregueu per nosaltres.", "V/. Sant Josep.", "R/. Pregueu per nosaltres.", "V/. Sants Apòstols.", "R/. Pregueu per nosaltres.", "V/. Sant Alfons-Maria de Liguori.", "R/. Pregueu per nosaltres.", "V/. Sant Ignasi de Loiola.", "R/. Pregueu per nosaltres.", "V/. Sant Francesc Xavier.", "R/. Pregueu per nosaltres.", "V/. Sant Vicenç de Paül.", "R/. Pregueu per nosaltres.", "V/. Sant Antoni Maria Claret.", "R/. Pregueu per nosaltres.", "V/. Santa Teresa de Jesús.", "R/. Pregueu per nosaltres.", "V/. Santa Caterina de Siena.", "R/. Pregueu per nosaltres.", "V/. Beats Màrtirs de la Família Claretiana.", "R/. Pregueu per nosaltres.", "V/. Tots els Sants i Santes de Déu.", "R/. Pregueu per nosaltres.", "V/. Recordeu-vos, Senyor de la vostra Congregació.", "R/. Que posseíreu des del principi.", "V/. Que compleixi la seva missió d'anunciar l'Evangeli.", "R/. Perquè tots els homes se salvin.", "V/. Us preguem que vingueu en auxili dels vostres servents.", "R/. Que redimíreu amb la vostra sang preciosa.", "V/. Salveu, Senyor, la vostra Congregació.", "R/. Sigueu el seu pastor i guieu-la sempre.", "V/. Tingueu pietat de nosaltres, Senyor.", "R/. Tingueu pietat de nosaltres.", "V/. Que la vostra misericòrdia, Senyor, davalli sobre nosaltres.", "R/. Com ho esperem de Vós.", "V/. Senyor, escolteu la nostra súplica.", "R/. I arribi a Vós el nostre clam.", "V/. El Senyor sigui amb vosaltres.", "R/. I amb el vostre esperit.", "Preguem:", "Us preguem, Senyor, que,", "per la intercessió de la Verge Maria,", "allibereu de tot mal aquesta Congregació,", "vesseu abundosament la vostra gràcia sobre els seus fills,", "i ompliu-los del vostre esperit", "perquè us complaguin sempre en la veritat.", "Per Crist Senyor nostre.", "Amén."]}, {"id": "37", "n": "37", "title": "Oració per la Congregació", "theme": "congregacio", "body": ["Pare de bondat i de misericòrdia,", "us lloem i us beneïm", "per haver enriquit la vostra Església", "amb l'estil de santificació i apostolat", "de Sant Antoni Maria Claret,", "el nostre Fundador i Pare.", "Us supliquem humilment:", "envieu nous operaris a la nostra Congregació", "i infoneu el vostre Esperit en els qui heu elegit.", "Confirmeu-nos a tots en la vocació missionera,", "i feu que, esperonats per la caritat de Crist,", "com a veritables Fills", "del Cor Immaculat de Maria,", "anunciem a tots els pobles", "la Bona Nova del Regne.", "Per Crist Senyor nostre. Amén."]}, {"id": "38", "n": "38", "title": "Per a la renovació de l'esperit claretià", "theme": "congregacio", "body": ["Renovelleu, Senyor, en la nostra Congregació", "l'esperit que va animar Sant Antoni Maria Claret, el nostre Pare,", "per tal que, plens d’ell i envigorits per ell,", "maldem per estimar el que ell va estimar", "i dur a la pràctica allò que ens va ensenyar.", "Per Crist Senyor nostre.", "Amén."]}, {"id": "39", "n": "39", "title": "Evangelitzadors fidels", "theme": "congregacio", "body": ["Vós, Senyor,", "decretàreu misericordiosament", "que la vostra Paraula s'encarnés en el si de la Verge Maria;", "concediu-nos de guardar-la en els nostres cors", "de manera que siguem sempre fidels servidors", "en la proclamació de la Bona Nova de salvació a tots els homes.", "Per Crist Senyor nostre.", "Amén."]}, {"id": "40", "n": "40", "title": "Constitucions", "theme": "congregacio", "body": ["Pare, que ens heu concedit el do", "de seguir Jesús", "i anunciar el vostre Regne entre els homes", "a l'estil de Claret i els seus deixebles.", "Ajudeu-nos a observar amb tota la cura possible les nostres Constitucions,", "camí d'Evangeli per a nosaltres.", "Concediu-nos d’escoltar la vostra Paraula amb tota docilitat, com la vostra Mare,", "per tal de ser Fills fidels del seu Cor,", "i cooperar amb el seu ofici maternal en la missió apostòlica.", "Pel mateix Crist Senyor nostre.", "Amén."]}, {"id": "41", "n": "41", "title": "Acció de gràcies per la vocació", "theme": "congregacio", "body": ["Gràcies us dono, oh Mare, per la vocació rebuda.", "Feu-me la gràcia de ser-hi fidel tota la meva vida."]}, {"id": "42", "n": "42", "title": "Definició del Missioner Claretià", "theme": "congregacio", "body": ["V/. Senyor, per intercessió del Cor Immaculat de Maria, infoneu en nosaltres l'esperit d'amor perquè siguem homes abrandats de caritat i que abrusem per on passem.", "R/. Amén.", "V/. I perquè desitgem eficaçment i procurem, per tots els mitjans, d’encendre tot el món en el foc de l’amor diví.", "R/. Amén.", "V/. Senyor, per intercessió del Cor Immaculat de Maria, infoneu en nosaltres l'esperit de fortalesa per tal que res no ens espanti, ens gaudim en les privacions i abordem coratjosament els treballs apostòlics.", "R/. Amén.", "V/. I perquè abracem amb joia els sacrificis, ens complaguem en les calúmnies i ens alegrem en els turments.", "R/. Amén.", "V/. Senyor, per intercessió del Cor Immaculat de Maria, infoneu en nosaltres l'esperit missioner que animà Jesús, el vostre Fill, perquè no pensem sinó com seguir-lo i imitar-lo a pregar, treballar i sofrir.", "R/. Amén.", "V/. I perquè, com Jesús, procurem sempre i únicament la vostra major glòria i la salvació dels homes.", "R/. Amén."]}, {"id": "43", "n": "43", "title": "Professió de la identitat claretiana", "theme": "congregacio", "body": ["Creiem que l'Esperit Sant", "ens ha convocat en l'Església per Sant Antoni Maria Claret", "perquè, com a Congregació,", "ens anomenem i siguem Missioners Fills del Cor Immaculat de Maria.", "Creiem que el Pare ens convoca", "a viure autènticament i significativament", "el misteri i la missió apostòlica del seu Fill", "en fraternitat evangelitzada i evangelitzadora.", "És ell, i no els nostres projectes,", "qui ens fa veritables deixebles de Crist.", "Aquest amor que configura la nostra vida fraterna", "volem significar-lo, cada vegada més, en l'Eucaristia.", "Creiem que Maria és a l'origen de la nostra vocació", "i exerceix la seva maternitat configurant les nostres vides amb la de Crist, el seu Fill.", "En el seu Cor de Mare es formen els apòstols de la Congregació.", "I la seva presència en nosaltres és impuls evangelitzador i amor misericordiós", "que transforma i anima els creients.", "Creiem que el Pare Claret va ser elegit i proposat per Déu com el nostre prototipus", "i model de missioners al servei de l'Evangeli en l'Església universal.", "Creiem que la nostra comuna vocació-missió comporta un seguiment,", "en fidelitat perfecta i en disponibilitat absoluta, a Crist en l'Església,", "segons les exigències evangèliques viscudes pel nostre Fundador i Pare,", "i transmeses pels nostres avantpassats.", "Creiem que l'Esperit de Jesús ressuscitat", "ens ungeix profèticament perquè anunciem la Bona Nova als pobres,", "i, urgits per la seva mateixa caritat sacrificada i redemptora,", "abrusem per on passem.", "Creiem que hem estat cridats", "com a esforçats col·laboradors del Sant Pare i dels Bisbes", "en el ministeri de la Paraula per a l’extensió del Regne de Déu per tot el món.", "Per això, emprant tots els mitjans possibles,", "volem atendre allò que és més urgent, oportú i eficaç.", "Creiem que la Congregació és obra de Déu", "i que Jesús i Maria no l'abandonaran, suscitant vocacions", "i donant l'Esperit als cridats,", "perquè, vivint en fraternitat la mateixa consagració i missió,", "glorifiquem el Pare, perllonguem el testimoniatge de comunió eclesial", "i fem més eficaç l'acció evangelitzadora.", "Creiem, Senyor. Augmenteu-nos la fe."]}, {"id": "45", "n": "45", "title": "Caritat apostòlica", "theme": "consagracio", "body": ["Oh Déu meu!", "Doneu-me caritat apostòlica,", "de manera que actuï en tot amb fortalesa i suaument,", "amb mansuetud i caritat.", "Amén."]}, {"id": "46", "n": "46", "title": "Pràctica de les virtuts", "theme": "consagracio", "body": ["Jesús, doneu-me la vostra gràcia per a imitar-vos fidelment", "en la pràctica de totes les virtuts.", "Amb Vós tot ho puc, sense Vós absolutament res.", "Amén."]}, {"id": "47", "n": "47", "title": "Pobresa", "theme": "consagracio", "body": ["Salvador nostre,", "que us vàreu fer pobre,", "que vàreu voler néixer pobre,", "viure pobrament i morir en la major pobresa.", "Feu que els vostres missioners coneguem el valor de la pobresa,", "que l'estimem i la practiquem com Vós ens ensenyeu,", "amb obres i paraules;", "que, a exemple dels Apòstols,", "ho deixem tot per a seguir-vos en l'anunci de l'Evangeli.", "Amén."]}, {"id": "48", "n": "48", "title": "Mansuetud", "theme": "consagracio", "body": ["Oh Déu meu,", "Doneu-me un zel discret i prudent", "a fi que actuï en totes les coses", "amb fortalesa i suaument,", "amb mansuetud i bones formes.", "Ajudeu-me a comportar-me en tot amb una santa prudència,", "conreada per l'estudi,", "fortificada amb l'edat,", "discernida amb el diàleg,", "i consumada amb l'experiència dels esdeveniments.", "Amén."]}, {"id": "49", "n": "49", "title": "Mortificació", "theme": "consagracio", "body": ["Oh Senyor!,", "sé que les penes, dolors i treballs", "són la divisa de l'apòstol.", "Amb la vostra gràcia els abraço", "Ajudeu-me Vós, Senyor,", "a beure el calze de penes interiors", "i a rebre aquest baptisme de penes exteriors.", "Feu que no em gloriï en altra cosa", "que en la Creu on Vós esteu clavat per mi.", "Amén."]}, {"id": "50", "n": "50", "title": "La nostra consagració", "theme": "consagracio", "body": ["Déu i Pare meu,", "responent a la vostra crida", "vull procurar amb la major dedicació", "que sempre es compleixi la vostra voluntat.", "Desitjo amb tot el cor dedicar-me plenament a Vós,", "seguint Jesús, com els Apòstols,", "perquè tots els homes tinguin vida en abundància.", "Impulsat per l'Esperit Sant", "renovo el meu lliurament a Vós, Pare,", "perquè em configureu a imatge i semblança del vostre Fill Jesús.", "Confiat en l’ajut maternal del Cor Immaculat de Maria,", "us prometo viure en aquesta comunitat de vida apostòlica", "cast, pobre, obedient,", "observant les Constitucions de la nostra Congregació", "amb tota la cura possible.", "Ungiu-me, Pare Sant, amb el vostre Esperit de santedat,", "perquè en el servei de la Paraula", "sigui fidel al carisma de Sant Antoni Maria Claret", "i assoleixi la perfecció en el manament de l'amor.", "Amén."]}, {"id": "51", "n": "51", "title": "Configuració amb Crist", "theme": "consagracio", "body": ["Gràcies, Pare, perquè ens heu ungit pel vostre Esperit", "i ens heu fet participar de la plenitud de Crist, el vostre Fill.", "Beneït sigueu per haver-nos cridat a seguir-lo", "i a col·laborar amb Ell en l'obra que Vós li vau encomanar.", "Us demanem que, moguts pel seu Esperit,", "no siguem nosaltres els qui visquem,", "sinó que sigui Crist el qui realment visqui en nosaltres,", "a fi de ser instruments aptes per anunciar el Regne del cel.", "Que maldem per aconseguir la nostra configuració amb Ell", "a la nostra comunitat missionera,", "segons el nostre carisma propi en l'Església.", "Ell, que viu i regna pels segles dels segles.", "Amén."]}, {"id": "53", "n": "53", "title": "El do de la castedat", "theme": "consagracio", "body": ["Us beneïm, Déu nostre, per haver-nos concedit", "el do de la castedat pel Regne del cel,", "pel qual podem consagrar-nos de tot cor a les coses del Pare,", "a imitació del vostre Fill Jesucrist", "i segons l'exemple de la Verge Maria.", "Demanem, Senyor, la vostra ajuda amb humilitat", "per a dominar les inclinacions de la nostra naturalesa,", "rebre amb goig el do de la castedat", "i conrear-lo amb tota diligència.", "Per Crist Senyor nostre.", "Amén."]}, {"id": "54", "n": "54", "title": "Castedat", "theme": "consagracio", "body": ["Beneït sigueu, Senyor,", "perquè pel do de la castedat pel Regne del cel,", "es manifesta el poder de la vostra glòria", "en la fragilitat de la nostra naturalesa,", "a fi de desvetllar en els homes l'esperança de la vida futura.", "Feu que la castedat que professem", "afavoreixi una nova comunió fraterna en Crist", "i construeixi una comunitat que no es fonamenta ni en la carn ni en la sang,", "sinó en la vostra voluntat.", "I que, com a signe d'amor perfecte,", "es converteixi en una font especial de fecunditat espiritual per al món", "i ens inflami en amor a Vós i a tots els homes.", "Per Crist Senyor nostre.", "Amén."]}, {"id": "55", "n": "55", "title": "Vós, essent ric", "theme": "consagracio", "body": ["Vós, essent ric,", "us heu fet pobre per nosaltres", "a fi que nosaltres ens enriquíssim.", "Dedicat a anunciar la Bona Nova del Regne,", "no teníeu on reposar el cap.", "Concediu-nos de compartir la vostra pobresa,", "per a recordar als homes els béns del món futur,", "viure com Maria, la primera entre els pobres del Senyor,", "i a semblança dels Apòstols que, abandonant-ho tot, us van seguir.", "Vós que viviu i regneu pels segles dels segles.", "Amén."]}, {"id": "56", "n": "56", "title": "Buscar primer de tot el Regne de Déu", "theme": "consagracio", "body": ["Us demanem, Senyor,", "que posant tota la nostra confiança en Vós,", "i mai en el poder i les riqueses,", "busquem primer de tot el Regne que pertany als pobres.", "Amén."]}, {"id": "57", "n": "57", "title": "Comunió de béns", "theme": "consagracio", "body": ["Concediu-nos, Senyor,", "que amb la nostra pobresa voluntària", "construïm la comunitat fraterna", "en la unitat de cor i d’esperit", "i l'expressem en la comunió de béns,", "espirituals i materials,", "amb els pobres i en el seu servei.", "Amén."]}, {"id": "58", "n": "58", "title": "Pobresa", "theme": "consagracio", "body": ["Us donem gràcies, Pare sant,", "perquè heu volgut manifestar-nos el valor de la pobresa", "i la benaurança dels qui no posen el seu guany en les riqueses.", "Concediu-nos que tota la nostra vida i activitat.", "estiguin informades per l'esperit de pobresa.", "Que siguem pobres de fet i d'esperit", "i ens sentim obligats a la llei universal del treball,", "compartint la condició dels pobres.", "Que tinguem els nostres béns a disposició dels altres,", "i ens alegrem quan experimentem alguns efectes de la pobresa,", "no dubtant de la vostra providència.", "Per Crist Senyor nostre.", "Amén."]}, {"id": "59", "n": "59", "title": "Per fer la vostra voluntat", "theme": "consagracio", "body": ["Per a fer la vostra voluntat, Pare, ens enviàreu el vostre Fill Jesús.", "A exemple de la Verge Santíssima,", "que es va consagrar totalment com a esclava del Senyor", "a l'obra del Fill,", "us oferim, Senyor,", "la lliure facultat de disposar de la nostra vida", "per a configurar-nos amb Jesucrist,", "que es va fer obedient fins a la mort de creu,", "i unir-nos en tot a la vostra voluntat salvífica.", "Per Crist Senyor nostre.", "Amén."]}, {"id": "60", "n": "60", "title": "Obedients en la missió", "theme": "consagracio", "body": ["Compartint la mateixa vocació,", "volem buscar junts, Senyor, la vostra voluntat", "per dur a terme la nostra missió en l'Església.", "Il·lumineu els qui expressen la unitat d'amor", "i de missió en la comunitat", "perquè promoguin la cooperació de tots", "en bé de l'Església i de la Congregació,", "i feu que tots, impulsats per l'amor,", "sapiguem obeir promptament i perfecta.", "Per Crist Senyor nostre.", "Amén."]}, {"id": "61", "n": "61", "title": "Obediència", "theme": "consagracio", "body": ["Us donem gràcies, Pare,", "perquè ens concediu la lliure facultat", "de disposar de la nostra vida,", "i ens moveu a oferir-vos-la per la força del vostre Esperit.", "Gràcies per haver-nos cridat a configurar-nos", "amb vostre Fill Jesucrist", "en la seva obediència fins a la mort en creu.", "Beneït sigueu per haver volgut que", "en Ell participem de la vostra voluntat salvadora.", "Per Crist Senyor nostre.", "Amén."]}, {"id": "62", "n": "62", "title": "Obediència en comunió", "theme": "consagracio", "body": ["Concediu-nos, Senyor,", "de buscar, conèixer i fer junts la vostra voluntat", "a fi de poder realitzar la missió comuna", "que tenim en l'Església.", "Concediu-nos que en la recerca i el compliment de la vostra voluntat,", "ens comprometem a oferir la nostra ajuda als germans", "amb l'oració, el consell i el diàleg fratern.", "Per Crist Senyor nostre.", "Amén."]}, {"id": "63", "n": "63", "title": "Pels superiors", "theme": "consagracio", "body": ["Enfortiu, Senyor, els nostres Superiors", "perquè busquin abans de tot la vostra voluntat,", "exerceixin l'autoritat segons les Constitucions", "i en esperit de servei,", "donant la seva vida pels germans.", "I concediu-nos a tots d’obeir-vos", "impulsats per l'amor,", "promptament i perfecta,", "sotmetent-nos als homes per Vós.", "Per Crist Senyor nostre.", "Amén."]}, {"id": "64", "n": "64", "title": "Disponibilitat", "theme": "consagracio", "body": ["Doneu-nos, Senyor, el do de la disponibilitat", "per a ser enviats a qualsevol part del món,", "a fi de posar totes les nostres energies al servei del ministeri", "que ens sigui encomanat per la Congregació.", "Per Crist Senyor nostre.", "Amén."]}, {"id": "65", "n": "65", "title": "Imitar l'oració de Jesús", "theme": "consagracio", "body": ["Déu omnipotent i etern", "que us heu dignat associar-nos", "a l'obra missionera de Crist:", "obriu el nostre cor", "perquè ens convertim a l'Evangeli,", "i doneu-nos constància perquè l’imitem", "en la seva oració assídua.", "Pel mateix Crist Senyor nostre.", "Amén."]}, {"id": "66", "n": "66", "title": "Progrés en la caritat", "theme": "consagracio", "body": ["Pare misericordiós,", "concediu-nos que la caritat de Crist ens urgeixi", "amb el mateix amor amb què Vós ens estimeu,", "i que, amb d'esperit ferm,", "estiguem disposats a morir cada dia pels germans.", "Feu, que, com a estrangers i pelegrins,", "ens abstinguem dels desigs de la carn,", "que guardem amb molta cura", "els nostres sentits,", "i que ens alegrem en tota adversitat.", "Per Crist Senyor nostre.", "Amén."]}, {"id": "67", "n": "67", "title": "L’amor de Crist ens esperona", "theme": "consagracio", "body": ["Pare sant,", "Jesucrist, urgit per un ardent a Vós i als homes,", "es va lliurar als treballs, a la passió, i fins i tot a la mort.", "Concediu-nos la caritat apostòlica i el goig de l'Esperit", "perquè aconseguim", "que tots els homes us coneguin, us estimin i us serveixin,", "i arribin a la benaurança del vostre Regne.", "Per Crist Senyor nostre.", "Amén."]}, {"id": "68", "n": "68", "title": "Vós, Pare", "theme": "comunitat", "body": ["Vós, Pare,", "heu infós en els nostres cors", "l'amor a Vós i als germans per l'Esperit Sant,", "que ens configura amb Crist i edifica la nostra comunió.", "Us demanem que acollim aquest do vostre", "per tal que tota la nostra vida missionera", "estigui regida i informada per aquest amor", "i assolim en la comunitat missionera", "la plenitud personal a la qual Vós ens crideu.", "Per Crist Senyor nostre.", "Amén."]}, {"id": "69", "n": "69", "title": "Oració de la comunitat", "theme": "comunitat", "body": ["Us donem gràcies, Pare Sant,", "per haver-nos reunit en aquesta comunitat", "des de la qual voleu que anunciem el vostre Regne", "amb una vida perfectament consagrada", "i amb un dedicació total al servei de l'Evangeli.", "Volem proclamar amb tot el nostre ser i actuar,", "com a veritables Fills del Cor de Maria,", "les meravelles del vostre amor entre els homes.", "Renovem el nostre propòsit de ser millors cada dia,", "d'ajudar-nos mútuament en el seguiment del vostre Fill,", "de secundar les inspiracions del vostre Esperit Sant,", "i de col·laborar en el acompliment de la Missió", "que ens heu confiat en l'Església.", "No permeteu, Senyor, que aquesta bona voluntat", "es vagi esmorteint inadvertidament", "per l'egoisme, la rutina o la inconstància.", "Revifeu la fe i l'esperança d'aquesta comunitat apostòlica", "a l'hora de discernir les inevitables diferències,", "i eixampleu els nostres cors per al necessari perdó.", "Des de la consciència de la nostra debilitat", "us demanem que ens mantingueu atents a la vostra gràcia:", "que l'assídua meditació de la vostra Paraula ens recreï,", "i que la convivència fraterna ens estimuli", "a donar aquell testimoniatge d'amor que el món necessita per a creure,", "i que les necessitats i urgències dels més pobres", "ens estimulin a sortir de nosaltres mateixos", "i ens obliguin a treballar per ells sens parar.", "Ens encomanem a Maria, la Mare de Jesús,", "exemple de vida consagrada,", "per tal que ens formi en el seu mateix Cor", "i ens faci seguir el camí de perfecció i de servei apostòlic", "que Sant Antoni Maria Claret, amb la seva vida i doctrina,", "ens va traçar en l'Església i en el món.", "Segelleu, Pare, amb la vostra fidelitat eterna", "això que ara és la nostra aspiració més sincera.", "Per Crist Senyor nostre."]}, {"id": "70", "n": "70", "title": "Caritat fraterna", "theme": "comunitat", "body": ["Us supliquem humilment, Senyor Déu nostre,", "que uniu en uns mateixos sentiments els qui compartim l'esperit", "del vostre servent Antoni Maria;", "perquè d’acord amb l’amor mutu,", "puguem ser testimonis de la vostra caritat", "entre els homes.", "Per Crist Senyor nostre.", "Amén."]}, {"id": "71", "n": "71", "title": "Oració per la pròpia comunitat", "theme": "comunitat", "body": ["Pare, avui vull demanar-vos pels meus germans de comunitat.", "Vós els coneixeu personalment:", "coneixeu els seus noms i els seus cognoms,", "les seves virtuts i els seus defectes,", "les seves alegries i les seves penes,", "la seva fortalesa i la seva feblesa, sabeu tota la seva història;", "els accepteu com són,", "i els vivifiqueu amb el vostre Esperit.", "Vós, Senyor, els estimeu", "no perquè siguin bons", "sinó perquè són fills vostres.", "Ensenyeu-me a estimar-los de debò, a imitació de Jesucrist,", "no per llurs paraules o per llurs obres, sinó per ells mateixos,", "descobrint en cadascun,", "especialment en els més febles,", "el misteri del vostre amor infinit.", "Us agraeixo, Pare,", "que m’hàgiu donat germans.", "Tots són un regal per a mi, un veritable sagrament,", "signe sensible i eficaç de la presència del vostre Fill.", "Doneu-me la mirada de Jesús per contemplar-los,", "i doneu-me el seu cor per estimar-los fins a l'extrem,", "perquè també jo vull ser per a cadascun d'ells", "sagrament viu de la presència de Jesús.", "Pel mateix Crist Senyor nostre.", "Amén."]}, {"id": "72", "n": "72", "title": "Oració apostòlica", "theme": "missio", "body": ["Déu meu i Pare meu!", "Que us conegui i us faci conèixer;", "que us estimi i us faci estimar;", "que us serveixi i us faci servir;", "que us lloï i us faci lloar de totes les criatures.", "Concediu-me, Pare meu, que tots els pecadors es converteixin,", "que tots els justos perseverin en la gràcia", "i tots aconseguim l'eterna glòria.", "Amén."]}, {"id": "73", "n": "73", "title": "Conèixer Déu per servir-lo", "theme": "missio", "body": ["Concediu-me, Senyor,", "que tots coneguin la vostra bondat i proximitat", "per tal que us estimin i serveixin amb tota fidelitat,", "perquè sou bo i la vostra misericòrdia és infinita.", "Amén."]}, {"id": "74", "n": "74", "title": "Instrument del Regne", "theme": "missio", "body": ["Aquí em teniu, Senyor,", "si ho voleu, feu de mi un instrument per a l'anunci del vostre Regne.", "Feu, Senyor, que el menjar sigui per tenir força i servir-vos millor;", "que usi de les coses d'aquest món en quant les necessiti,", "que estudiï per a conèixer-vos i estimar-vos i per ajudar els meus germans;", "que el meu descans sigui per a refer les forces gastades i servir-vos millor.", "Amén."]}, {"id": "75", "n": "75", "title": "Pel fruit apostòlic dels Missioners", "theme": "missio", "body": ["Pare de bondat,", "que sense cap mèrit nostre ens heu elegit i ens envieu com enviàreu el vostre Fill Jesús.", "Comuniqueu-nos el vostre Esperit,", "feu-nos ministres idonis de l'Evangeli,", "i concediu-nos la força necessària", "perquè exercim eficaçment el ministeri de la salvació dels homes.", "Doneu, Senyor, increment als nostres treballs,", "i feu que la vostra Paraula, Crist, parli per nosaltres.", "Beneïu-nos i ajudeu-nos,", "perquè tots els homes acceptin l'Evangeli", "i us estimin cada dia més.", "No permeteu, Senyor, que us ofenguem;", "preserveu-nos de tots els perills i enfortiu-nos amb la vostra gràcia.", "Amén."]}, {"id": "76", "n": "76", "title": "Missioners", "theme": "missio", "body": ["Senyor,", "que ens crideu com als Apòstols,", "feu que ens esforcem amb tots els nostres mitjans i recursos", "per aconseguir que sigueu estimat, conegut i servit per tots.", "Doneu-nos un cor obert", "per estimar tots els homes sense excepció,", "procurant-los la benaurança del Regne,", "que ja s'ha iniciat a la terra.", "Que, de tots els dons que creiem posseir,", "us en donem únicament a Vós la glòria,", "procurant fer-los fructificar copiosament,", "i recordem les nostres pròpies limitacions i defectes,", "reconeixent així la nostra total dependència de Vós.", "Que expressem aquest convenciment", "en la nostra manera d'obrar i en les nostres relacions amb els altres,", "estant disposats a demanar perdó per les nostres faltes i equivocacions.", "Que busquem brindar als nostres germans", "els serveis del nostre amor,", "de manera que cadascun de nosaltres s’estigui enmig d'ells com qui serveix.", "Per Crist Senyor nostre. Amén."]}, {"id": "77", "n": "77", "title": "Missió Claretiana", "theme": "missio", "body": ["Pare sant,", "Vós vau cridar Sant Antoni Maria Claret a seguir al vostre Fill,", "i ell, urgit pel seu amor,", "va esmerçar totalment la seva vida a lluitar per la seva Causa: el Regne.", "Desvetlleu en nosaltres el seu esperit evangelitzador", "per tal que copsem allò que és més urgent, oportú i eficaç", "i realitzem la missió de propagar la fe, dòcils a l'Esperit,", "i obedients a la vostra voluntat.", "Animats, com Claret, per la força del vostre Esperit,", "també nosaltres volem optar per la Causa del Regne", "i acceptar els riscos de la denúncia i el compromís profètic", "que comporta la nostra missió evangelitzadora.", "Volem solidaritzar-nos i compartir les angoixes,", "les privacions i les esperances dels homes", "als quals som enviats.", "I, tot confessant que el vostre Fill està viu entre els homes,", "volem treballar per acabar amb la incredulitat, l'odi, la injustícia,", "la mentida, l'opressió, el dolor, la solitud, la fam, la ignorància", "i tantes altres urgències d'amor que són urgències del Regne.", "Us ho demanem pel vostre Fill Jesucrist, que viu i regna pels segles dels segles.", "Amén."]}, {"id": "78", "n": "78", "title": "Oració missionera", "theme": "missio", "body": ["Oh Pare,", "que heu vessat els dons del vostre Esperit", "sobre la benaurada Verge Maria,", "quan pregava amb els Apòstols al Cenacle,", "feu que perseverem unànimes en l'oració", "amb Maria, la nostra Mare, per a dur al món,", "amb la força de l'Esperit,", "la Bona Nova de la salvació.", "Per Crist Senyor nostre.", "Amén.", "78b. Per les missions populars.", "Senyor, Déu i Pare nostre!", "Vós ens heu enviat el vostre Fill Jesucrist:", "Ell ens ensenya a caminar vers Vós.", "Escolteu benigne la nostra pregària:", "Feu-nos oberts a rebre i anunciar", "la vostra Paraula de Vida.", "Ajudeu tots aquell que se senten", "indecisos, indiferents o allunyats.", "Que la missió evangelitzadora... (Lloc on es fa)", "doni fruits abundosos d’una fe renovellada,", "d’una esplèndida unió en comunitat cristiana,", "d’una ferma dedicació en el servei als altres,", "principalment els més febles.", "Que la Verge Maria, amb el seu Cor de Mare,", "vetlli perquè la Paraula de Jesús", "sigui ben acollida i viscuda", "per tots els fills i veïns de... (Lloc de la missió).", "Amén."]}, {"id": "79", "n": "79", "title": "Per l'Església", "theme": "missio", "body": ["Senyor Jesús,", "que per amor als homes", "pregàreu per la fe dels vostres deixebles,", "intercedíreu pels pecadores,", "i us compadíreu de tota misèria humana:", "acolliu les súpliques que us elevem a favor de l'Església,", "escolteu les nostres oracions per la vida del món", "i admeteu-nos a tots en el goig del Regne etern,", "on viviu i regneu pels segles dels segles.", "Amén."]}, {"id": "80", "n": "80", "title": "El Senyor, present a la Missió", "theme": "missio", "body": ["Senyor Jesús,", "el vostre mandat de missió ens va dispersar un dia arreu del món.", "La vostra Paraula de comunió ens aplega avui en aquesta cruïlla de tots els camins,", "on trobar-nos és trobar-vos,", "on estimar-nos és donar testimoni de Vós,", "on encendre esperances és anunciar la vostra vinguda.", "Com els Dotze,", "tornem a Vós des de les senderes de la nostra missió,", "portant a la vostra presència el dolor i les humiliacions dels nostres pobles,", "el clam dels pobres que ens heu enviat a evangelitzar,", "les esperances dels humils que han obert el seu cor al vostre missatge", "i que per onsevulla el fan florir en fraternitat, a l'Església.", "Concediu-nos que, celebrant i contemplant la vostra Paraula,", "aprenguem a discernir en la fe els signes d'aquest temps,", "i a proclamar-vos a Vós, que sou la Veritat completa -sempre nova-,", "enmig de les ambigüitats i contradiccions d'aquest món.", "Que la vostra presència ressuscitada entre nosaltres", "esvaeixi les nostres pors i desànims,", "i ens faci optar amb llibertat i fortalesa,", "per la vostra proposta de vida, de justícia i de fraternitat,", "allà on es coven projectes de destrucció, d'opressió i de violència.", "Envieu-nos el vostre Esperit", "per tal que, com en Maria, la Mare Verge,", "creeu en nosaltres un cor nou,", "encès en caritat apostòlica,", "disponible davant els desafiaments de la nova evangelització,", "fecund en obres d'amor i de servei als més necessitats.", "Feu que siguem instruments de comunió i de reconciliació", "a fi que en els pobles als quals ens heu enviat,", "la comunitat dels qui creuen en Vós", "sigui transparència del vostre designi de salvació i glorifiqui el vostre nom.", "Amén."]}, {"id": "83", "n": "83", "title": "Volem fer la vostra voluntat", "theme": "missio", "body": ["Pare nostre,", "Pare de bondat i misericòrdia:", "som aquí reunits en nom de l'amor que ens teniu.", "Us lloem, us beneïm i us donem gràcies.", "Amb goig responem a la crida que per mitjà del vostre Fill ens dirigiu", "i encoratjats per la força de l'Esperit,", "us diem confiats: “Volem fer la vostra voluntat”.", "Doneu-nos una mirada neta, una intel·ligència oberta i un cor ardent", "per a comprendre i abraçar el designi que teniu sobre nosaltres.", "Quan pensem en la missió que ens confieu,", "ens adonem de les profundes i constants exigències que hem de complir.", "Augmenteu en nosaltres la generositat i l'esperança", "i obriu-nos a les necessitats més urgents dels homes.", "Que encertem a expressar en la nostra vida", "l'amor universal de Jesucrist, el seu incondicional lliurament", "i el total oblit que va tenir de si mateix", "en la realització de la seva missió salvadora en aquest món.", "Confirmeu-nos en la veritat; doneu-nos set de la vostra justícia", "i feu-nos instruments idonis per a la pau.", "Que siguem forces vives de comunió en aquesta Església pelegrina", "i aconseguim ser testimonis del poder sobirà de Crist ressuscitat", "enmig d'aquest poble que sofreix la seva passió de llibertat.", "Que siguem responsables en tota acció i compromís,", "i no permeteu que, proclamant l'Evangeli, busquem els nostres propis interessos.", "Concediu-nos, Senyor, la caritat apostòlica de Sant Antoni Maria Claret, el nostre Pare.", "Ensenyeu-nos, com a ell, a discernir sempre el que us agrada,", "el que és just i el que construeix el vostre Regne entre els homes.", "Us ho demanem per Crist Senyor nostre.", "Amén."]}, {"id": "84", "n": "84", "title": "Per les vocacions", "theme": "vocacions", "body": ["Senyor Jesucrist, que vàreu dir:", "“Pregueu el Senyor dels sembrats que enviï obrers als seus sembrats”:", "Us demanem humilment", "que us digneu enviar molts missioners a la nostra Congregació.", "Infoneu el vostre Esperit en els qui heu elegit", "i confirmeu-los en la vocació,", "per tal que anunciant dignament i fructuosament el sant Evangeli", "ens anomenem i siguem de veritat", "Fills del Cor Immaculat de la Santíssima Verge Maria,", "us estimem de tot cor, de paraula i d'obra,", "i no defallim mai en la vostra lloança.", "Amén."]}, {"id": "85", "n": "85", "title": "Vocació", "theme": "vocacions", "body": ["Senyor, Vós, que cridàreu els Apòstols", "perquè fossin pescadors d'homes,", "crideu a la Família Claretiana", "nous membres", "que siguin sal de la terra i llum del món", "i difonguin per tot arreu la caritat", "que urgia el vostre servent Antoni Maria.", "Per Crist Senyor nostre.", "Amén."]}, {"id": "86", "n": "86", "title": "Per intercessió del Cor Immaculat de Maria", "theme": "vocacions", "body": ["Senyor Déu nostre, que pel Cor Immaculat de Maria,", "ornàreu Sant Antoni Maria Claret", "d’un gran amor vers el vostre Fill Jesús", "i l’inspiràreu la fundació de la Congregació de Missioners,", "per a salvar tots els homes,", "beneïu amb noves vocacions la Congregació Claretiana,", "iconcediu-nos de perseverar fins a la fi", "en l'anunci de l'Evangeli.", "Amén."]}, {"id": "87", "n": "87", "title": "Pregària per a demanar al Senyor vocacions claretianes", "theme": "vocacions", "body": ["Senyor, per a continuar la gran obra de Sant Antoni Maria Claret en tot el món", "- Envieu-nos molts i sants Missioners.", "Senyor, per a santificar els pobles cristians amb la predicació i altres treballs apostòlics,", "- Envieu-nos molts i sants Missioners.", "Senyor, per a dur la llum de l'Evangeli als qui no us coneixen,", "- Envieu-nos molts i sants Missioners.", "Senyor, per a instaurar el Regnat del Cor Immaculat de Maria,", "- Envieu-nos molts i sants Missioners.", "Senyor, per tal que per mitjà del Cor Immaculat de Maria es compleixi sempre la vostra voluntat,", "- Envieu-nos molts i sants Missioners.", "Senyor, perquè totes les persones siguin educades cristianament i tinguem una societat més justa i més humana, segons la vostra voluntat,", "- Envieu-nos molts i sants Missioners.", "Jesús, primer Fills del Cor Immaculat de Maria,", "- Envieu-nos molts i sants Missioners", "Cor Immaculat de Maria, mare de tots els homes,", "- Envieu-nos molts i sants Missioners.", "Oració:", "Pare nostre,", "que voleu que tots els homes se salvin", "i arribin al coneixement de la veritat,", "us preguem que envieu obrers als vostres sembrats", "i els concediu de predicar amb confiança la vostra Paraula,", "perquè la veritat es difongui i resplendeixi", "i tots els homes us coneguin a Vós, únic Déu veritable.", "Per Crist Senyor nostre.", "Amén."]}, {"id": "88", "n": "88", "title": "Per les vocacions missioneres", "theme": "vocacions", "body": ["Oh Déu,", "que voleu que tots els homes se salvin", "i arribin al coneixement de la veritat,", "atraieu cap a Vós seguidors del vostre Fill,", "a l'estil de Sant Antoni Maria Claret,", "i envieu-los al camp del món", "perquè hi prediquin l'Evangeli a tota criatura,", "i el vostre poble, congregat per la Paraula de vida", "i sostingut per la força dels sagraments,", "camini per les sendes de la salvació i de l'amor.", "Per Crist Senyor nostre.", "Amén."]}, {"id": "89", "n": "89", "title": "Oració per les vocacions i la perseverança", "theme": "vocacions", "body": ["Vós, Senyor, que heu dit que la collita és abundant, i els treballadors pocs,", "i voleu que es multipliqui el nombre d'apòstols i evangelitzadors", "que eixamplin el vostre Regne i transformin la faç de la terra;", "us preguem que augmenteu el nombre", "i la qualitat evangèlica dels qui treballen pel bé dels homes.", "Us donem gràcies per les vocacions que ens heu concedit", "pel Cor Immaculat de Maria, la nostra Mare.", "Concediu-nos la vostra presència i la vostra intercessió", "perquè vinguin moltes vocacions al nostre Institut,", "i ajudeu-nos a tots a perseverar en la nostra vocació.", "Per Crist Senyor nostre.", "Amén."]}, {"id": "90", "n": "90", "title": "Per les vocacions a tots els estats de vida i ministeris", "theme": "vocacions", "body": ["Il·luminats i animats per la vostra Paraula,", "us demanem, Senyor, per tots aquells", "que ja han escoltat la vostra crida i l'han seguida.", "Us preguem que ens escolteu.", "Pel papa, els bisbes, preveres, diaques", "i pels missioners i tots els consagrats", "perquè visquin amb goig la seva vocació", "i amb la seva vida i la seva paraula us facin present enmig dels homes.", "Us preguem que ens escolteu.", "Pels laics i els seglars que", "treballen generosament en els ministeris", "instituïts per l'Església", "i en els serveis necessaris per a la comunitat.", "Us preguem que ens escolteu.", "Sosteniu-los en les dificultats,", "Conforteu-los en els sofriments,", "assistiu-los en la solitud,", "protegiu-los en la persecució", "i confirmeu-los en la fidelitat.", "Us preguem que ens escolteu.", "Us demanem, Senyor, per aquells", "que obren el seu cor a la vostra crida", "i es preparen per a seguir-la.", "Us preguem que ens escolteu.", "Que la vostra Paraula els il·lumini,", "la vostra persona els captivi,", "i el vostre Esperit els guiï fins a arribar", "a la professió religiosa o els ordes sagrats.", "Us preguem que ens escolteu.", "Sigueu per a ells, Senyor, suport ferm", "i feu que trobin qui els pugui", "aconsellar, acompanyar i ajudar", "amb la força de convicció i amor", "que només Vós podeu comunicar.", "Us preguem que ens escolteu.", "Us ho demanem per Crist Senyor nostre.", "Amén."]}, {"id": "139b", "n": "139 b", "title": "Envieu, Senyor, el vostre Esperit", "theme": "vocacions", "body": ["Envieu, Senyor, el vostre Esperit", "sobre els cors dels vostres elegits", "per tal que, coneixent la vostra crida", "a la santedat i al servei,", "abracin el sacerdoci i la vida consagrada", "a fi que la vostra Església", "sigui testimoni de santedat i d’amor", "i la Bona Nova sigui predicada en tot el món.", "Us ho demanem per Jesucrist, el vostre Fill,", "que viu i regna pels segles dels segles.", "Amén."]}, {"id": "91", "n": "91", "title": "Pels germans que pateixen malaltia", "theme": "malalts", "body": ["V/. Mireu, Senyor, amb amor els nostres germans malalts.", "R/. Que esperen confiadament en Vós.", "V/. Assistiu-los amb la vostra bondat.", "R/. Consoleu els seus cors i alleugeriu-los els sofriments.", "V/. Escolteu, Pare, les seves oracions i súpliques.", "R/. I doneu-los força i pau per a complir la vostra voluntat.", "V/. Feu que els malalts es recordin sempre de Vós.", "R/. I en les hores de vetlla i insomni meditin en Vós.", "V/. Perquè heu estat el seu auxili.", "R/. Que perseverin sempre units a Vós.", "V/. Recordeu-vos, Pare, de tots els homes i dones que sofreixen.", "R/. Reconforteu-los i feu que ens en sentim solidaris, ajudant-los i assistint-los amb amor.", "Preguem:", "Us demanem, Pare de bondat, que alleugeriu el dolor dels nostres germans malalts,", "guariu la seva malaltia, aviveu la seva esperança,", "reconforteu-los i consoleu-los amb la vostra gràcia,", "per tal que, restablerts segons la vostra voluntat i misericòrdia,", "s'incorporin novament a la vida de la comunitat i al servei de l'Evangeli", "Per Crist Senyor nostre.", "Amén.", "O bé:", "Preguem:", "Vós volguéreu, Pare de bondat,", "que el vostre Fill suportés les nostres febleses,", "per palesar el valor de la malaltia i de la paciència;", "escolteu les pregàries que us adrecem", "pels nostres germans malalts de la Congregació,", "i concediu a tots els qui es troben sotmesos al dolor, l'aflicció o la malaltia", "la gràcia d'unir-se a la passió de Crist per a la redempció del món.", "Per Crist Senyor nostre.", "Amén.", "O bé:", "Preguem:", "Déu i Senyor nostre,", "salvació de tots els qui creuen en Vós,", "escolteu les oracions que us dirigim pels nostres germans malalts de la Congregació (comunitat),", "alleugeu-los amb l'auxili de la vostra misericòrdia", "per tal que, recuperada la salut, puguin servir-vos en la realització del vostre Regne.", "Per Crist Senyor nostre.", "Amén."]}, {"id": "92", "n": "92", "title": "Pels nostres germans malalts", "theme": "malalts", "body": ["V/. Salveu, Senyor els vostres servents,", "R/. Que esperen en Vós.", "V/. Envieu-los el vostre auxili des del Santuari.", "R/. I protegiu-los des de Sió.", "V/. Sigueu el seu baluard, Senyor,", "R/. Enfront de l'enemic", "V/. Concediu-los la vostra fortalesa,", "R/. En el llit del dolor", "V/. Senyor, escolteu la nostra pregària.", "R/. I el nostre clam arribi a Vós.", "V/. El Senyor sigui amb vosaltres.", "R/. I amb el vostre esperit.", "Preguem:", "Oh Déu,", "que sempre us compadiu i perdoneu,", "acolliu la nostra pregària", "per tal que la vostra pietat misericordiosa ens absolgui benignament", "a nosaltres i als vostres servents malalts.", "Per Crist Senyor nostre.", "Amén.", "O bé:", "Oh Déu, empara singular de la debilitat humana,", "mostreu la força del vostre auxili sobre els vostres servents malalts,", "perquè, ajudats per la vostra misericòrdia, puguin novament presentar-se restablerts davant la vostra Església.", "Per Crist Senyor nostre.", "Amén.", "O bé:", "Us demanem, Senyor,", "que nosaltres, els vostres servents, gaudim sempre de salut", "en el cos i l’esperit", "i, per la intercessió de la sempre Verge Maria,", "allibereu-nos de les tristeses de la vida present i doneu-nos l’alegrie de la vida futura.", "Per Crist Senyor nostre.", "Amén."]}, {"id": "claretians_difunts", "n": "", "title": "Oració pels claretians difunts", "theme": "difunts", "body": ["Oh Déu, que manteniu l'esperança de la nostra felicitat futura,", "en el misteri pasqual del vostre Fill,", "us supliquem humilment, que", "tots els qui a la terra participaren de la nostra fraternitat claretiana", "i esmerçaren la seva vida en la propagació del Regne,", "arribin al goig de la felicitat eterna amb els estadants de la pàtria celestial.", "Per Crist Senyor nostre.", "Amén."]}, {"id": "95", "n": "95", "title": "Oració pels pares difunts", "theme": "difunts", "body": ["Oh Déu, que ens heu manat honorar pare i mare,", "tingueu misericòrdia dels nostres pares:", "perdoneu els seus pecats i feu que ens reunim", "un dia amb ells en la claror de la vostra glòria.", "Per Crist Senyor nostre.", "Amén."]}, {"id": "96", "n": "96", "title": "Oració pels familiars i benefactors", "theme": "difunts", "body": ["Oh Déu, que pel misteri pasqual del vostre Fill", "manteniu l'esperança de la nostra resurrecció,", "us demanem humilment", "que tots els qui van participar a la terra", "de la nostra fraternitat claretiana", "i van col·laborar en la nostra missió d'anunciar l'Evangeli", "arribin al goig de la felicitat eterna.", "Per Crist Senyor nostre.", "Amén."]}, {"id": "97", "n": "97", "title": "Oració pels germans, parents i benefactors", "theme": "difunts", "body": ["Oh Déu que concediu el perdó dels pecats", "i voleu la salvació dels homes:", "per intercessió de Santa Maria Verge i de tots els sants,", "concediu als nostres germans, parents i benefactors", "que han sortit ja d'aquest món", "arribar a l'eterna benaurança.", "Per Crist Senyor nostre.", "Amén."]}, {"id": "113", "n": "113", "title": "Il·lumineu, Senyor, els nostres cors", "theme": "eucaristia", "body": ["Il·lumineu, Senyor, amb la llum de la fe els nostres cors", "i inflameu-los amb el foc de la caritat", "perquè adorem, en esperit i en veritat,", "a qui reconeixem en aquest Sagrament", "com el nostre Déu i Senyor.", "Ell que viu i reina pels segles dels segles."]}, {"id": "114", "n": "114", "title": "Oh Déu, que redimíreu tots els homes", "theme": "eucaristia", "body": ["Oh Déu que redimíreu tots els homes", "amb el misteri pasqual de Crist,", "que en aquest Sagrament s'ofereix Ell mateix pels germans,", "concediu-nos que, venerant constantment el misteri de la nostra redempció,", "mereixem d’aconseguir el seu fruit", "i desvetllar en els homes el record de la presència del Senyor.", "Per Crist Senyor nostre.", "O bé:", "Oh Déu, Vós ens heu deixat un sagrament admirable per memorial de la vostra Passió. Concediu-nos una devoció tan gran als misteris del vostre Cos i de la vostra Sang, que experimentem constantment en nosaltres els efectes de la vostra redempció.", "Vós que viviu i regneu dels segles dels segles."]}, {"id": "115", "n": "115", "title": "El Sagrament de l’Eucaristia", "theme": "eucaristia", "body": ["Que el Sagrament de l'Eucaristia, Senyor,", "ompli del vostre amor i de zel apostòlic els nostres cors", "perquè ens esperonin a desitjar", "que tots els homes us coneguin, us estimin i us serveixin,", "i a procurar-los la benaurança d'aquest Regne", "iniciada ja a la terra.", "Per Crist Senyor nostre."]}, {"id": "116", "n": "116", "title": "Partícips d’un mateix pa", "theme": "eucaristia", "body": ["Senyor, Vós que ens heu fet partícips d'un mateix pa i d’un mateix Esperit,", "concediu-nos que, units a Vós com les sarments al cep,", "siguem u amb Vós per a edificar la nostra comunió", "i perquè el món cregui.", "Per Crist Senyor nostre."]}, {"id": "117", "n": "117", "title": "Identificat amb els qui sofreixen", "theme": "eucaristia", "body": ["Senyor Jesús, que us identificàreu plenament amb els qui sofreixen", "i ens heu dit “veniu a mi tots els cansats i aclaparats sota la càrrega, i jo us faré reposar”,", "solidaris amb els homes que pateixen malaltia, dolor, injustícia i opressió, venim a la vostra presència", "perquè ens inflameu en la vostra caritat", "fins que ens alegrem en els sofriments", "i ens gloriem en la vostra creu.", "Vós que viviu i regneu pels segles dels segles."]}, {"id": "118", "n": "118", "title": "Pel misteri pasqual", "theme": "eucaristia", "body": ["Senyor, que pel misteri pasqual", "heu realitzat la salvació dels homes,", "concediu-nos d’adorar-vos present en aquest Sagrament", "i proclamar amb fe el que ara venerem.", "Per Crist Senyor nostre."]}, {"id": "119", "n": "119", "title": "Inflameu-nos en la fe", "theme": "eucaristia", "body": ["Senyor Jesús,", "inflameu-nos en la fe", "que va moure a tants predicadors de la divina paraula",
