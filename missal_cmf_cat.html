<div class="pl"><span class="vr">&#8479;.</span> Al·leluia, al·leluia, al·leluia!</div>
<div class="pl">Us dono un manament nou:
que us estimeu els uns als altres tal com jo us he estimat. <span class="vr">&#8479;.</span></div>
<h3 class="rub">Evangeli <span class="ref">Jn 15, 9.17</span></h3>
<p class="lema">Aquest és el meu manament: que us estimeu els uns als altres tal com jo us he estimat</p>
<p class="pr">Lectura de l’evangeli segons sant Joan.</p>
<p class="pr">En aquell temps, Jesús va dir als seus deixebles: Tal com el Pare m’estima, també jo us estimo a vosaltres. Manteniu-vos en el meu amor. Si guardeu els meus manaments, us mantindreu en el meu amor, tal com jo guardo els manaments del meu Pare i em mantinc en el seu amor.</p>
<p class="pr">»Us he dit tot això perquè la meva joia sigui també la vostra, i la vostra joia sigui completa. Aquest és el meu manament: que us estimeu els uns als altres tal com jo us he estimat. Ningú no té un amor més gran que el qui dona la vida pels seus amics. Vosaltres sou els meus amics si feu el que jo us mano. Ja no us dic servents, perquè el servent no sap què fa el seu amo. A vosaltres us he dit amics perquè us he fet conèixer tot allò que he sentit del meu Pare. No m’heu escollit vosaltres a mi; soc jo qui us he escollit a vosaltres i us he confiat la missió d’anar pertot arreu i donar fruit, i un fruit que duri per sempre. I tot allò que demanareu al Pare en nom meu, ell us ho concedirà. Això us mano: que us estimeu els uns als altres.</p>
<p class="fin">Paraula del Senyor</p>
<div class="obien">O bé <span class="ref">Col 3,15</span></div>
<p class="pr"><span class="vr">&#8479;.</span> Al·leluia, al·leluia, al·leluia!</p>
<div class="pl">Que la pau de Crist coroni en els vostres cors els combats
que manteniu; en aquesta pau heu estat cridats a formar un sol cos. <span class="vr">&#8479;.</span></div>
<h3 class="rub">Evangeli <span class="ref">Jn 17, 1a. 20-26</span></h3>
<p class="lema">Que tots siguin u</p>
<p class="pr">Lectura de l’evangeli segons sant Joan.</p>
<p class="pr">En aquell temps, Jesús va alçar els ulls al cel i digué: «No prego només per ells, sinó també pels qui creuran en mi gràcies a la seva paraula. Que tots siguin u, com tu, Pare, estàs en mi i jo en tu. Que també ells estiguin en nosaltres, perquè el món cregui que tu m’has enviat. Jo els he donat la glòria que tu m’has donat, perquè siguin u com nosaltres som u. Que jo estigui en ells i tu en mi, perquè siguin plenament u. Així el món reconeixerà que tu m’has enviat i que els has estimat a ells com m’has estimat a mi. Pare, vull que els qui m’has confiat estiguin amb mi allà on jo estic i vegin la meva glòria, la glòria que m’has donat perquè m’estimaves des d’abans de crear el món. Pare bo, el món no t’ha conegut, però jo t’he conegut, i ells han reconegut que tu m’has enviat. Jo els he fet conèixer el teu nom, i els el faré conèixer més encara, perquè l’amor amb què m’has estimat estigui en ells, i jo també hi estigui.»</p>
<p class="fin">Paraula del Senyor</p>
<h3 class="rub">Oració sobre les ofrenes</h3>
<div class="pl">Rebeu, Senyor, les ofrenes que us presentem
i feu que per aquest sacrifici
creixi sense parar l’amor que espereu de nosaltres
i s’edifiqui la nostra comunitat.
Per Crist, nostre Senyor.</div>
<h3 class="rub">Antífona de comunió <span class="ref">Jn 15,12</span></h3>
<div class="pl">El meu manament és que us estimeu els uns als altres
tal com jo us he estimat.</div>
<h3 class="rub">Oració després de la comunió</h3>
<div class="pl">Que aquests sagraments de la unitat i de l’amor
amb què ens heu nodrit, Senyor Déu nostre,
ens uneixin ben estretament amb Vós i amb els germans
a fi que el món cregui en el vostre Fill
i trobi en Ell la salvació.
Pel mateix Crist Senyor nostre.</div>
`},
{id:'vocacions',grupo:'necesidades',color:'verde',fecha:'Per diverses necessitats',
titulo:'Missa per les vocacions claretianes',rango:'',
html:`
<p class="nota">Tots els elements com al Missal Romà i al Leccionari «Per les vocacions sacerdotals i religioses». Podeu utilitzar, tanmateix, les següents oracions i antífones:</p>
<h3 class="rub">Antífona d’introducció <span class="ref">MT 9,37-38</span></h3>
<div class="pl">La collita és abundant, però hi ha pocs segadors.
Demaneu a l’amo dels sembrats
que hi faci anar més segadors,
diu el Senyor als seus deixebles.</div>
<div class="obien">O bé <span class="ref">Mt 4,1</span></div>
<div class="pl">Veniu amb mi, diu el Senyor,
i us faré pescadors d’homes.</div>
<h3 class="rub">Oració col·lecta</h3>
<div class="pl">Senyor,
que vau cridar els Apòstols
perquè fossin pescadors d’homes:
aplegueu en la família claretiana nous germans
que siguin sal de la terra i llum del món
i difonguin pertot arreu
l’amor que esperonava
el vostre servent Antoni Maria Claret.
Per nostre Senyor Jesucrist.</div>
<p class="nota">Es poden escollir les lectures de les misses per diverses circumstàncies: per les vocacions; o les següents</p>
<h3 class="rub">Lectura primera <span class="ref">1Sa 3,1-10</span></h3>
<p class="pr">Lectura del primer llibre de Samuel:</p>
<p class="pr">El noi Samuel vivia dedicat al servei del Senyor a les ordres d’Elí. En aquell temps, el Senyor comunicava rarament la seva paraula: no solia mostrar-se en visió. Elí anava perdent la vista; gairebé no hi veia.</p>
<p class="pr">Una nit, Elí se n’havia anat a dormir a la seva cambra. Samuel dormia al santuari del Senyor, on hi havia l’arca de Déu. Abans que s’apagués la llàntia del santuari de Déu, el Senyor va cridar Samuel. Ell respongué: «Soc aquí». Va anar corrents cap on era Elí i li digué: «Soc aquí. He sentit que em cridaves». Elí va respondre: «No t’he pas cridat. Torna-te’n a dormir».</p>
<p class="pr">Ell se’n tornà a dormir. Però el Senyor el cridà altra vegada. Samuel es va llevar, tornà on era Elí i li digué: «Soc aquí. He sentit que em cridaves». Elí va respondre: «No t’he pas cridat, fill meu. Torna-te’n a dormir».</p>
<p class="pr">Samuel encara no sabia reconèixer el Senyor, perquè la seva paraula encara no se li havia revelat. El Senyor va cridar Samuel per tercera vegada. Ell es va llevar, anà on era Elí i li digué: «Soc aquí. He sentit que em cridaves». Elí va comprendre que era el Senyor qui cridava el noi, i digué a Samuel: «Ves, torna-te’n a dormir i, si algú et cridava, digues: “Parla, Senyor, que el teu servent escolta”.»</p>
<p class="pr">Samuel se’n tornà al seu lloc a dormir. El Senyor va entrar, se li acostà i el cridà com les altres vegades: «Samuel, Samuel!» Ell va respondre: «Parla, que el teu servent escolta».</p>
<p class="fin">Paraula de Déu</p>
<div class="obien">O bé <span class="ref">Jr 1, 4-9</span></div>
<p class="lema">Ves on jo t’enviaré</p>
<p class="pr">Lectura del llibre de Jeremies.</p>
<p class="pr">En aquell temps, el Senyor em va comunicar la seva paraula:</p>
<p class="pr">Em digué: «Abans de formar-te en les entranyes de la mare, jo et coneixia; abans que sortissis del seu ventre et vaig consagrar profeta destinat a les nacions». Jo vaig replicar: «Ah, Senyor, Déu meu! Soc massa jove. Com sabré parlar?».</p>
<p class="pr">El Senyor em respongué: «No diguis que ets massa jove. Ves on jo t’enviaré, digues el que jo t’ordenaré. No tinguis por de ningú. Jo seré al teu costat per alliberar-te. T’ho dic jo, el Senyor.</p>
<p class="pr">Aleshores el Senyor va allargar la mà, em tocà els llavis i em digué: «Poso les meves paraules a la teva boca».</p>
<p class="fin">Paraula de Déu</p>
<h3 class="rub">Salm responsorial <span class="ref">Sl 39,2 i 4ab.7.8-9.10</span></h3>
<div class="pl"><span class="vr">&#8479;.</span> Aquí em teniu: Déu meu, vull fer la vostra voluntat.</div>
<div class="pl">Tenia posada l’esperança en el Senyor,
i ell, inclinant-se cap a mi,
ha inspirat als meus llavis un càntic nou,
un himne de lloança al nostre Déu. <span class="vr">&#8479;.</span></div>
<div class="pl">Però vós no voleu oblacions ni sacrificis,
i m’heu parlat a cau d’orella;
no exigiu l’holocaust ni l’expiació. <span class="vr">&#8479;.</span></div>
<div class="pl">Per això us dic: «Aquí em teniu:
com està escrit de mi en el llibre,
Déu meu, vull fer la vostra voluntat,
guardo la vostra llei al fons del cor». <span class="vr">&#8479;.</span></div>
<div class="pl">Anuncio amb goig la salvació
davant el poble en dia de gran festa.
No puc deixar d’anunciar-la,
ho sabeu prou, Senyor. <span class="vr">&#8479;.</span></div>
<div class="pl">I Vós, Senyor, no aparteu la vostra misericòrdia;
que el teu amor fidel em guardi sempre. <span class="vr">&#8479;.</span></div>
<div class="obien">O bé</div>
<h3 class="rub">Salm responsorial <span class="ref">26,1.4.13-14</span></h3>
<div class="pl"><span class="vr">&#8479;.</span> Arribar davant vostre és el que vull</div>
<div class="pl">El Senyor m’il·lumina i em salva,
qui em pot fer por?
El Senyor és el mur que protegeix la meva vida,
qui em pot esfereir? <span class="vr">&#8479;.</span></div>
<div class="pl">Una sola cosa he demanat al Senyor,
i la desitjo amb tota l’ànima:
poder viure a la casa del Senyor
tots els dies de la vida,
per fruir-hi de l’estima del Senyor
i vetllar pel seu temple. <span class="vr">&#8479;.</span></div>
<div class="pl">Ell m’amaga al seu costat,
en dies de desgràcia;
m’oculta dintre el recer de casa seva,
m’encamina a la roca inaccessible. <span class="vr">&#8479;.</span></div>
<div class="pl">Escolteu el meu clam, Senyor,
compadiu-vos de mi, responeu-me.
De part vostra, em diu el cor:
«Busca la meva presència!» <span class="vr">&#8479;.</span></div>
<div class="pl">Arribar davant vostre és el que vull;
Senyor, no us amagueu.
No sigueu sever fins a rebutjar el vostre servent,
vós que sou el meu ajut. <span class="vr">&#8479;.</span></div>
<div class="pl">No em deixeu abandonat,
Déu meu, Salvador meu.
Ensenyeu-me, Senyor, la vostra ruta,
conduïu-me per camins planers;
penseu que tinc enemics. <span class="vr">&#8479;.</span></div>
<h3 class="rub">Lectura segona <span class="ref">Fl 3, 8-14</span></h3>
<p class="lema">M’he avingut a perdre-ho tot a canvi de guanyar-lo a ell</p>
<p class="pr">Lectura de la carta de sant Pau als cristians de Filips.</p>
<p class="pr">Germans: Tot ho considero una pèrdua, comparat amb el bé suprem que és conèixer Jesucrist, el meu Senyor.</p>
<p class="pr">Per ell m’he avingut a perdre-ho tot i a considerar-ho escòria, a canvi de guanyar-lo a ell i de viure unit a ell; no tinc, doncs, una justícia pròpia, la que prové de la Llei, sinó que tinc la justícia que se’ns dona per la fe en Crist, la que prové de Déu i es fonamenta en aquesta fe. Així conec el Crist i la força de la seva resurrecció i puc entrar en comunió amb els seus sofriments, tot configurant-me a la seva mort, esperant d’arribar a la resurrecció d’entre els morts.</p>
<p class="pr">No vull dir que ja hagi assolit tot això o que ja sigui perfecte. Hi corro al darrere per tal d’apoderar-me’n, ja que també Jesucrist es va apoderar de mi. Germans, no em penso pas que ja me n’hagi apoderat, però tinc un objectiu: oblidar-me del que queda enrere i llançar-me cap allò que hi ha al davant. Corro cap a la meta per aconseguir el premi que Déu ha convocat allà dalt per mitjà de Jesucrist.</p>
<p class="fin">Paraula de Déu</p>
<h3 class="rub">Al·leluia</h3>
<div class="pl"><span class="vr">&#8479;.</span> Al·leluia, al·leluia, al·leluia!</div>
<div class="pl">Veniu amb mi, diu el Senyor,
i us faré pescadors d’homes. <span class="vr">&#8479;.</span></div>
<h3 class="rub">Evangeli <span class="ref">Lc, 1-11</span></h3>
<p class="lema">D’ara en endavant sereu pescadors d’homes</p>
<p class="pr">Lectura de l’evangeli segons sant Lluc:</p>
<p class="pr">En una ocasió la gent s’aglomerava sobre Jesús per escoltar la paraula de Déu. Ell, es trobava vora l’estany de Genesaret, veié dues barques a la platja. Els pescadors n’havien baixat i rentaven les xarxes. Pujà en una de les barques, que era de Simó, li demanà que l’apartés una mica de terra, s’assegué i ensenyava la gent de la barca estant.</p>
<p class="pr">Quan acabà de parlar, digué a Simó: «Tira endins, i caleu les xarxes per pescar». Simó li respongué: “Mestre, ens hi hem escarrassat tota la nit i no hem pescat res, però ja que vós ho dieu calaré les xarxes”.</p>
<p class="pr">Així que ho feren, agafaren tant de peix que les xarxes s’esquinçaven. Llavors feren senyal als pescadors de l’altra barca que vinguessin a ajudar-los. Ells hi anaren, i ompliren tant les barques que quasi s’enfonsaven.</p>
<p class="pr">Simó Pere, en veure això, es llançà als genolls de Jesús i li deia: “Senyor, allunyeu-vos de mi, que soc un pecador”. Ni ell, ni cap dels qui anaven amb ell no se sabien avenir d’una pesca com aquella. Igual passà amb Jaume i Joan, fills de Zebedeu, que eren socis de Simó. Però Jesús digué a Simó: “No tinguis por: des d’ara seràs pescador d’homes”. Llavors tornaren a terra les barques ho deixaren tot i se n’anaren amb ell.</p>
<p class="fin">Paraula del Senyor</p>
<h3 class="rub">Oració sobre les ofrenes</h3>
<div class="pl">Senyor, acolliu de bon grat
les pregàries i ofrenes que us presentem,
i, puix compartim la joia de sentir-nos germans i claretians
feu que ens mantinguem sempre fidels
a la vocació evangèlica.
Per Crist Senyor nostre.</div>
<h3 class="rub">Antífona de comunió <span class="ref">Mt 5,14-16</span></h3>

<div class="obien">O bé <span class="ref">Jn 15,16</span></div>
<div class="pl">No sou vosaltres els qui m’heu escollit:
Soc jo qui us he escollit per confiar-vos la missió

<h3 class="rub">Oració després de la comunió</h3>

html:`
<h3 class="rub">Antífona d’introducció <span class="ref">cf. Sl 66, 2-3</span></h3>
<div class="pl">Que Déu tingui pietat i ens beneeixi,
il·lumini el seu rostre sobre nosaltres,
perquè coneguem a la terra els vostres camins,
tots els pobles la vostra salvació.</div>
<h3 class="rub">Oració col·lecta</h3>
<div class="pl">Senyor, Déu nostre,
que voleu que tota la humanitat se salvi
i arribi al coneixement de la veritat,
beneïu els esforços de la nostra fraternitat missionera
per dur la vostra Paraula a tots els confins de la terra.
Pel nostre Senyor Jesucrist, el vostre Fill.
Es poden escollir algunes de les lectures següents</div>
<h3 class="rub">Lectura primera <span class="ref">Is 49, 1-6</span></h3>
<p class="lema">T’he fet llum de les nacions</p>
<p class="pr">Lectura del llibre d’Isaïes.</p>
<div class="pl">Escolteu els qui viviu lluny, a les illes!
Estigueu atents, pobles llunyans!
Abans de néixer, el Senyor em va cridar,
va pronunciar el meu nom
quan era a les entranyes de la mare.</div>
<div class="pl">Ha fet dels meus llavis una espasa tallant,
m’amaga a l’ombra de la seva mà.
M’ha convertit en una fletxa aguda,
ben guardada en el seu buirac.</div>
<div class="pl">M’ha dit: «Ets el meu servent;
en tu, Israel, faig resplendir la meva glòria.»</div>
<div class="pl">Jo pensava: «M’he cansat en va,
he consumit per no res les meves forces.»
Però el Senyor té a les mans la meva causa,
el meu Déu m’ha guardat la recompensa.</div>
<div class="pl">Ara ha parlat el Senyor,
ell que m’ha format des del si de la mare
perquè fos el seu servent,
perquè fes tornar cap a ell el poble de Jacob
i aplegués Israel al seu voltant.</div>
<div class="pl">Als ulls del Senyor jo soc preciós;
el meu Déu és la meva força.</div>
<div class="pl">M’ha dit: «És massa poc
que siguis el meu servent
per a restablir les tribus de Jacob
i fer tornar els supervivents d’Israel.</div>
<div class="pl">Jo t’he fet llum de les nacions
perquè portis la meva salvació
d’un cap a l’altre de la terra.»</div>
<p class="fin">Paraula de Déu</p>
<div class="obien">O bé <span class="ref">Is 52, 7-10</span></div>
<p class="lema">La benedicció de l’enviament: missatgers d’esperança i d’alliberament</p>
<div class="pl">Que en són, de bonics, per les muntanyes
els peus del missatger de bones noves
que anuncia la pau i el benestar,
que anuncia la salvació
i diu a la ciutat de Sió:
«El teu Déu ja regna!»</div>
<div class="pl">Criden els teus sentinelles, alcen la veu,
tots junts criden de goig
quan veuen amb els seus ulls
que el Senyor torna a Sió.</div>
<div class="pl">Esclateu totes alhora en clams de joia,
ruïnes de Jerusalem:
el Senyor ha consolat el seu poble,
ha alliberat Jerusalem!</div>
<div class="pl">Als ulls de tots els pobles
el Senyor ha estès el seu sant braç,
i d’un cap a l’altre de la terra
tothom veurà la salvació del nostre Déu.</div>
<p class="fin">Paraula de Déu</p>
<div class="obien">O bé <span class="ref">1Co 9, 16-27</span></div>
<p class="lema">Ai de mi si no anunciés l’evangeli!</p>
<p class="pr">Germans: Jo no puc gloriar-me d’anunciar l’evangeli, perquè és una obligació que m’han imposat: ai de mi si no anunciés l’evangeli! Si m’ho hagués triat, tindria dret a un salari; però no ho he triat: és un encàrrec que tinc confiat.</p>
<p class="pr">Quin és, doncs, el meu salari? Oferir de franc l’evangeli que anuncio, sense fer ús dels drets que l’evangeli em dona.</p>
<p class="pr">Jo, que no era esclau de ningú, m’he fet esclau de tots per guanyar-ne tants com pugui. M’he fet jueu amb els jueus per guanyar els jueus; tot i no estar sotmès a la Llei, he viscut amb els qui hi estan sotmesos com si jo també hi estigués, per guanyar-los a tots ells. I per guanyar els qui no tenen Llei he viscut amb ells com si jo tampoc no en tingués, encara que no estic pas sense Llei de Déu, ja que Crist és la meva llei. M’he fet feble amb els febles per guanyar els febles; m’he fet tot amb tots per salvar-ne alguns, costés el que costés. Tot ho faig a causa de l’evangeli, per poder-hi tenir part.</p>
<p class="pr">¿No sabeu que a l’estadi tots els corredors es llancen a la cursa, però només un s’emporta el premi? Correu bé per poder-vos-el endur! L’atleta s’absté de moltes coses, i tot per guanyar-se una corona que es marceix, mentre que nosaltres n’hem de guanyar una que mai no es marcirà. Així, doncs, jo corro, però no sense una meta; combato donant cops de puny, però no pas a l’aire. Tracto amb duresa el meu cos i el tinc dominat, no fos cas que, després de proclamar la victòria dels altres, quedés desqualificat jo mateix.</p>
<p class="fin">Paraula de Déu</p>
<h3 class="rub">Salm responsorial <span class="ref">Sl 96, 1-5 i 11-12</span></h3>
<div class="pl"><span class="vr">&#8479;.</span> Canteu al Senyor un càntic nou,
canteu al Senyor arreu de la terra.</div>
<div class="pl">Canteu al Senyor un càntic nou,
canteu al Senyor arreu de la terra,
canteu al Senyor, beneïu el seu nom,
anuncieu de dia en dia que ens ha salvat. <span class="vr">&#8479;.</span></div>
<div class="pl">Conteu a les nacions la seva glòria,
conteu a tots els pobles els seus prodigis. <span class="vr">&#8479;.</span></div>
<div class="pl">El Senyor és gran i digne de tota lloança,
és més temible que tots els déus;
perquè els déus dels pobles no són res,
però el Senyor ha fet el cel. <span class="vr">&#8479;.</span></div>
<div class="pl">El cel se n’alegra, la terra ho celebra,
bramula el mar amb tot el que s’hi mou,
1jubilen els camps amb tot el que hi ha,
criden de goig els arbres del bosc. <span class="vr">&#8479;.</span></div>
<div class="obien">O bé <span class="ref">Sl 127, 1-5</span></div>
<div class="pl"><span class="vr">&#8479;.</span> Si el Senyor no construeix la casa,
és inútil l’afany dels constructors.</div>
<div class="pl">És inútil que us lleveu tan de matí
i aneu tan tard a reposar,
per menjar un pa que us guanyeu a dures penes:
fins quan dormen, ell el dona als seus amics! <span class="vr">&#8479;.</span></div>
<div class="pl">L’herència del Senyor són els fills,
els descendents són la millor recompensa;
els fills que heu tingut quan éreu joves
són com les fletxes en mans d’un guerrer. <span class="vr">&#8479;.</span></div>
<div class="pl">Feliç l’home que se n’omple el buirac!
Si discuteix a la plaça amb l’adversari,
no haurà de retirar-se avergonyit. <span class="vr">&#8479;.</span></div>
<h3 class="rub">Al·leluia <span class="ref">Sl 27, 1</span></h3>
<div class="pl"><span class="vr">&#8479;.</span> Al·leluia, al·leluia, al·leluia!</div>
<div class="pl">El Senyor m’il·lumina i em salva: qui em pot fer por?
El Senyor és el mur que protegeix la meva vida:
qui em pot esfereir? <span class="vr">&#8479;.</span></div>
<h3 class="rub">Evangeli <span class="ref">Mt 28, 18-20</span></h3>
<p class="lema">Aneu a convertir tots els pobles</p>
<p class="pr">Lectura de l’evangeli segons sant Mateu:</p>
<p class="pr">En aquell temps, Jesús s’acostà als seus deixebles i els digué: «Déu m’ha donat plena autoritat al cel i a la terra. Aneu a convertir tots els pobles, bategeu-los en el nom del Pare, del Fill i de l’Esperit Sant i ensenyeu-los a guardar tot el que jo us he manat. Jo seré amb vosaltres cada dia fins a la fi del món».</p>
<p class="fin">Paraula del Senyor</p>
<div class="obien">O bé</div>
<p class="pr"><span class="vr">&#8479;.</span> Al·leluia, al·leluia, al·leluia!</p>
<div class="pl">Obrim els nostres cors a l’ensenyament del Senyor,
que ens mostra el camí de la vida eterna. <span class="vr">&#8479;.</span></div>
<h3 class="rub">Evangeli <span class="ref">Mt, 9 35-38</span></h3>
<p class="lema">Jesús recorria totes les viles i pobles anunciant la bona nova del Regne</p>
<p class="pr">Lectura de l’evangeli segons sant Mateu.</p>
<p class="pr">En aquell temps, Jesús recorria totes les viles i pobles, ensenyant a les sinagogues, anunciant la bona nova del Regne i guarint malalties i xacres de tota mena. En veure les multituds, se’n compadí, perquè estaven malmenades i abatudes, com ovelles sense pastor. Llavors digué als seus deixebles: «La collita és abundant, però els segadors són pocs. Pregueu, doncs, a l’amo dels sembrats que hi enviï més segadors».</p>
<p class="fin">Paraula del Senyor</p>
<div class="obien">O bé</div>
<p class="pr"><span class="vr">&#8479;.</span> Al·leluia, al·leluia, al·leluia!</p>
<div class="pl">Enaltiu el Senyor: que n’és, de bo!
Perdura eternament el seu amor. <span class="vr">&#8479;.</span></div>
<h3 class="rub">Evangeli <span class="ref">Jn 20, 19-23</span></h3>
<p class="lema">Com el Pare m’ha enviat a mi, també jo us envio a vosaltres</p>
<p class="pr">Lectura de l’evangeli segons sant Joan.</p>
<p class="pr">Al capvespre d’aquell mateix dia, que era diumenge, els deixebles, per por dels jueus, tenien tancades les portes del lloc on es trobaven. Jesús va arribar, es posà al mig i els digué: «Pau a vosaltres».</p>
<p class="pr">Dit això, els va mostrar les mans i el costat. Els deixebles s’alegraren de veure el Senyor. Ell els tornà a dir: «Pau a vosaltres. Com el Pare m’ha enviat a mi, també jo us envio a vosaltres».</p>
<p class="pr">Llavors va alenar damunt d’ells i els digué: «Rebeu l’Esperit Sant. A qui perdonareu els pecats, li quedaran perdonats; a qui no els perdoneu, li quedaran sense perdó».</p>
<h3 class="rub">Oració secreta</h3>
<div class="pl">Mireu, Senyor, amb bondat
els dons que us presentem,
i per intercessió del Cor Immaculat de Maria,
concediu-nos de viure i anunciar sempre la vostra Paraula
amb fidelitat i alegria.
Per Crist, Senyor nostre.</div>
<h3 class="rub">Antífona de comunió <span class="ref">Jn 15, 16</span></h3>
<p class="pr">No m’heu escollit vosaltres a mi; soc jo qui us he escollit a vosaltres i us he confiat la missió d’anar pertot arreu i donar fruit, i un fruit que duri per sempre.</p>
<h3 class="rub">Oració després de la comunió</h3>
<div class="pl">Alimentats amb el Cos i la Sang del vostre Fill,
us demanem, Senyor, que procurem sempre
amb el més gran afany la vostra glòria
i que col·laborem amb el vostre Esperit
per encendre tot el món en el foc del vostre amor.
Per Jesucrist, nostre Senyor.</div>
`}

/* ---------- fechas ---------- */
function pascua(y){
  const a=y%19,b=Math.floor(y/100),c=y%100,d=Math.floor(b/4),e=b%4,
  f=Math.floor((b+8)/25),g=Math.floor((b-f+1)/3),h=(19*a+b-d-g+15)%30,
  i=Math.floor(c/4),k=c%4,l=(32+2*e+2*i-h-k)%7,m=Math.floor((a+11*h+22*l)/451),
  mes=Math.floor((h+l-7*m+114)/31),dia=((h+l-7*m+114)%31)+1;
  return new Date(y,mes-1,dia);
}
function fechaCorazon(y){
  const d=pascua(y); d.setDate(d.getDate()+69); return d; // Pentecostés+20
}
function fechaDe(c,y){
  if(c.movil==='corazon') return fechaCorazon(y);
  if(c.mes) return new Date(y,c.mes-1,c.dia);
  return null;
}
function mismaFecha(a,b){return a&&b&&a.getFullYear()===b.getFullYear()&&a.getMonth()===b.getMonth()&&a.getDate()===b.getDate();}
const MESES=['gener','febrer','març','abril','maig','juny','juliol','agost','setembre','octubre','novembre','desembre'];
function fmt(d){const m=MESES[d.getMonth()];const prep='aeiou'.includes(m[0])?"d'":'de ';return d.getDate()+' '+prep+m;}

/* ---------- render ---------- */
const app=document.getElementById('app');
const GRUPOS=[['propio','Propi dels sants'],['rituales','Misses rituals'],['votivas','Missa votiva'],['necesidades','Per diverses necessitats']];

function portada(){
  const hoy=new Date(); const y=hoy.getFullYear();
  let html='';
  const deHoy=DATA.find(c=>mismaFecha(fechaDe(c,y),hoy));
  if(deHoy){
    html+='<div class="hoy" onclick="location.hash=\'#/'+deHoy.id+'\'">'+
      '<div class="etq">Avui · '+fmt(hoy)+'</div>'+
      '<div class="nom">'+deHoy.titulo+'</div>'+
      (deHoy.rango?'<div class="sub">'+deHoy.rango+'</div>':'')+'</div>';
  }else{
    // próxima celebración
    let prox=null,proxF=null;
    DATA.forEach(c=>{
      let f=fechaDe(c,y); if(!f)return;
      if(f<hoy){f=fechaDe(c,y+1);}
      if(!proxF||f<proxF){proxF=f;prox=c;}
    });
    if(prox){
      html+='<div class="hoy" onclick="location.hash=\'#/'+prox.id+'\'">'+
        '<div class="etq">Propera celebració · '+fmt(proxF)+'</div>'+
        '<div class="nom">'+prox.titulo+'</div>'+
        (prox.rango?'<div class="sub">'+prox.rango+'</div>':'')+'</div>';
    }
  }
  GRUPOS.forEach(([g,nombre])=>{
    const items=DATA.filter(c=>c.grupo===g);
    if(!items.length)return;
    html+='<section class="grupo"><h2>'+nombre+'</h2>';
    items.forEach(c=>{
      html+='<div class="tarjeta" onclick="location.hash=\'#/'+c.id+'\'">'+
        '<span class="punto p-'+c.color+'"></span>'+
        '<span class="fecha">'+(c.mes?c.dia+' '+MESES[c.mes-1].slice(0,3)+'.':(c.movil?'mòbil':'—'))+'</span>'+
        '<span><span class="nom">'+c.titulo+'</span>'+
        (c.rango?'<br><span class="rango">'+c.rango+'</span>':'')+'</span></div>';
    });
    html+='</section>';
  });
  app.innerHTML=html;
  window.scrollTo(0,0);
}

function celebracion(id){
  const c=DATA.find(x=>x.id===id);
  if(!c){portada();return;}
  let fechaTxt=c.fecha;
  if(c.movil==='corazon'){
    fechaTxt+=' · Enguany: '+fmt(fechaCorazon(new Date().getFullYear()));
  }
  app.innerHTML='<button class="volver" onclick="location.hash=\'\'">&larr; Índex</button>'+
    '<article class="celeb">'+
    '<div class="fecha-lit">'+fechaTxt+'</div>'+
    '<h2 class="tit">'+c.titulo+'</h2>'+
    (c.rango?'<div class="rango">'+c.rango+'</div>':'')+
    '<div class="adorno">&#10011;</div>'+
    c.html+
    '<footer>&#10011;</footer></article>';
  window.scrollTo(0,0);
}

function ruta(){
  const h=location.hash;
  if(h.startsWith('#/')) celebracion(h.slice(2)); else portada();
}
window.addEventListener('hashchange',ruta);

/* ---------- controles ---------- */
let fs=parseInt(localStorage.getItem('missal_cat_fs')||'100',10);
function aplicaFs(){document.documentElement.style.setProperty('--fs',fs+'%');localStorage.setItem('missal_cat_fs',fs);}
document.getElementById('btnMenos').onclick=()=>{if(fs>75){fs-=5;aplicaFs();}};
document.getElementById('btnMas').onclick=()=>{if(fs<160){fs+=5;aplicaFs();}};
aplicaFs();

const btnTema=document.getElementById('btnTema');
function aplicaTema(osc){
  document.documentElement.classList.toggle('oscuro',osc);
  btnTema.innerHTML=osc?'&#9788;':'&#9789;';
  localStorage.setItem('missal_cat_tema',osc?'oscuro':'claro');
}
btnTema.onclick=()=>aplicaTema(!document.documentElement.classList.contains('oscuro'));
aplicaTema(localStorage.getItem('missal_cat_tema')==='oscuro');

ruta();
</script>
</body>
</html>
