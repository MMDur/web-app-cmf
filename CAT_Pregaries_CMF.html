missió popular"],"lines":[{"t":"p","x":"Senyor, Déu i Pare nostre!"},{"t":"p","x":"Vós ens heu enviat el vostre Fill Jesucrist:"},{"t":"p","x":"Ell ens ensenya a caminar vers Vós."},{"t":"p","x":"Escolteu benigne la nostra pregària:"},{"t":"p","x":"Feu-nos oberts a rebre i anunciar"},{"t":"p","x":"la vostra Paraula de Vida."},{"t":"p","x":"Ajudeu tots aquell que se senten"},{"t":"p","x":"indecisos, indiferents o allunyats."},{"t":"p","x":"Que la missió evangelitzadora... (Lloc on es fa)"},{"t":"p","x":"doni fruits abundosos d’una fe renovellada,"},{"t":"p","x":"d’una esplèndida unió en comunitat cristiana,"},{"t":"p","x":"d’una ferma dedicació en el servei als altres,"},{"t":"p","x":"principalment els més febles."},{"t":"p","x":"Que la Verge Maria, amb el seu Cor de Mare,"},{"t":"p","x":"vetlli perquè la Paraula de Jesús"},{"t":"p","x":"sigui ben acollida i viscuda"},{"t":"p","x":"per tots els fills i veïns de... (Lloc de la missió)."},{"t":"p","x":"Amén."}]},{"id":"79","num":"79","title":"Per l'Església","theme":"missio","sub":null,"tags":[],"lines":[{"t":"p","x":"Senyor Jesús,"},{"t":"p","x":"que per amor als homes"},{"t":"p","x":"pregàreu per la fe dels vostres deixebles,"},{"t":"p","x":"intercedíreu pels pecadores,"},{"t":"p","x":"i us compadíreu de tota misèria humana:"},{"t":"p","x":"acolliu les súpliques que us elevem a favor de l'Església,"},{"t":"p","x":"escolteu les nostres oracions per la vida del món"},{"t":"p","x":"i admeteu-nos a tots en el goig del Regne etern,"},{"t":"p","x":"on viviu i regneu pels segles dels segles."},{"t":"p","x":"Amén."}]},{"id":"80","num":"80","title":"El Senyor, present a la Missió","theme":"missio","sub":null,"tags":[],"lines":[{"t":"p","x":"Senyor Jesús,"},{"t":"p","x":"el vostre mandat de missió ens va dispersar un dia arreu del món."},{"t":"p","x":"La vostra Paraula de comunió ens aplega avui en aquesta cruïlla de tots els camins,"},{"t":"p","x":"on trobar-nos és trobar-vos,"},{"t":"p","x":"on estimar-nos és donar testimoni de Vós,"},{"t":"p","x":"on encendre esperances és anunciar la vostra vinguda."},{"t":"p","x":"Com els Dotze,"},{"t":"p","x":"tornem a Vós des de les senderes de la nostra missió,"},{"t":"p","x":"portant a la vostra presència el dolor i les humiliacions dels nostres pobles,"},{"t":"p","x":"el clam dels pobres que ens heu enviat a evangelitzar,"},{"t":"p","x":"les esperances dels humils que han obert el seu cor al vostre missatge"},{"t":"p","x":"i que per onsevulla el fan florir en fraternitat, a l'Església."},{"t":"p","x":"Concediu-nos que, celebrant i contemplant la vostra Paraula,"},{"t":"p","x":"aprenguem a discernir en la fe els signes d'aquest temps,"},{"t":"p","x":"i a proclamar-vos a Vós, que sou la Veritat completa -sempre nova-,"},{"t":"p","x":"enmig de les ambigüitats i contradiccions d'aquest món."},{"t":"p","x":"Que la vostra presència ressuscitada entre nosaltres"},{"t":"p","x":"esvaeixi les nostres pors i desànims,"},{"t":"p","x":"i ens faci optar amb llibertat i fortalesa,"},{"t":"p","x":"per la vostra proposta de vida, de justícia i de fraternitat,"},{"t":"p","x":"allà on es coven projectes de destrucció, d'opressió i de violència."},{"t":"p","x":"Envieu-nos el vostre Esperit"},{"t":"p","x":"per tal que, com en Maria, la Mare Verge,"},{"t":"p","x":"creeu en nosaltres un cor nou,"},{"t":"p","x":"encès en caritat apostòlica,"},{"t":"p","x":"disponible davant els desafiaments de la nova evangelització,"},{"t":"p","x":"fecund en obres d'amor i de servei als més necessitats."},{"t":"p","x":"Feu que siguem instruments de comunió i de reconciliació"},{"t":"p","x":"a fi que en els pobles als quals ens heu enviat,"},{"t":"p","x":"la comunitat dels qui creuen en Vós"},{"t":"p","x":"sigui transparència del vostre designi de salvació i glorifiqui el vostre nom."},{"t":"p","x":"Amén."}]},{"id":"83","num":"83","title":"Volem fer la vostra voluntat","theme":"missio","sub":null,"tags":[],"lines":[{"t":"p","x":"Pare nostre,"},{"t":"p","x":"Pare de bondat i misericòrdia:"},{"t":"p","x":"som aquí reunits en nom de l'amor que ens teniu."},{"t":"p","x":"Us lloem, us beneïm i us donem gràcies."},{"t":"p","x":"Amb goig responem a la crida que per mitjà del vostre Fill ens dirigiu"},{"t":"p","x":"i encoratjats per la força de l'Esperit,"},{"t":"p","x":"us diem confiats: “Volem fer la vostra voluntat”."},{"t":"p","x":"Doneu-nos una mirada neta, una intel·ligència oberta i un cor ardent"},{"t":"p","x":"per a comprendre i abraçar el designi que teniu sobre nosaltres."},{"t":"p","x":"Quan pensem en la missió que ens confieu,"},{"t":"p","x":"ens adonem de les profundes i constants exigències que hem de complir."},{"t":"p","x":"Augmenteu en nosaltres la generositat i l'esperança"},{"t":"p","x":"i obriu-nos a les necessitats més urgents dels homes."},{"t":"p","x":"Que encertem a expressar en la nostra vida"},{"t":"p","x":"l'amor universal de Jesucrist, el seu incondicional lliurament"},{"t":"p","x":"i el total oblit que va tenir de si mateix"},{"t":"p","x":"en la realització de la seva missió salvadora en aquest món."},{"t":"p","x":"Confirmeu-nos en la veritat; doneu-nos set de la vostra justícia"},{"t":"p","x":"i feu-nos instruments idonis per a la pau."},{"t":"p","x":"Que siguem forces vives de comunió en aquesta Església pelegrina"},{"t":"p","x":"i aconseguim ser testimonis del poder sobirà de Crist ressuscitat"},{"t":"p","x":"enmig d'aquest poble que sofreix la seva passió de llibertat."},{"t":"p","x":"Que siguem responsables en tota acció i compromís,"},{"t":"p","x":"i no permeteu que, proclamant l'Evangeli, busquem els nostres propis interessos."},{"t":"p","x":"Concediu-nos, Senyor, la caritat apostòlica de Sant Antoni Maria Claret, el nostre Pare."},{"t":"p","x":"Ensenyeu-nos, com a ell, a discernir sempre el que us agrada,"},{"t":"p","x":"el que és just i el que construeix el vostre Regne entre els homes."},{"t":"p","x":"Us ho demanem per Crist Senyor nostre."},{"t":"p","x":"Amén."}]},{"id":"84","num":"84","title":"Per les vocacions","theme":"vocacions","sub":null,"tags":[],"lines":[{"t":"p","x":"Senyor Jesucrist, que vàreu dir:"},{"t":"p","x":"“Pregueu el Senyor dels sembrats que enviï obrers als seus sembrats”:"},{"t":"p","x":"Us demanem humilment"},{"t":"p","x":"que us digneu enviar molts missioners a la nostra Congregació."},{"t":"p","x":"Infoneu el vostre Esperit en els qui heu elegit"},{"t":"p","x":"i confirmeu-los en la vocació,"},{"t":"p","x":"per tal que anunciant dignament i fructuosament el sant Evangeli"},{"t":"p","x":"ens anomenem i siguem de veritat"},{"t":"p","x":"Fills del Cor Immaculat de la Santíssima Verge Maria,"},{"t":"p","x":"us estimem de tot cor, de paraula i d'obra,"},{"t":"p","x":"i no defallim mai en la vostra lloança."},{"t":"p","x":"Amén."}]},{"id":"85","num":"85","title":"Vocació","theme":"vocacions","sub":null,"tags":[],"lines":[{"t":"p","x":"Senyor, Vós, que cridàreu els Apòstols"},{"t":"p","x":"perquè fossin pescadors d'homes,"},{"t":"p","x":"crideu a la Família Claretiana"},{"t":"p","x":"nous membres"},{"t":"p","x":"que siguin sal de la terra i llum del món"},{"t":"p","x":"i difonguin per tot arreu la caritat"},{"t":"p","x":"que urgia el vostre servent Antoni Maria."},{"t":"p","x":"Per Crist Senyor nostre."},{"t":"p","x":"Amén."}]},{"id":"86","num":"86","title":"Per intercessió del Cor Immaculat de Maria","theme":"vocacions","sub":null,"tags":[],"lines":[{"t":"p","x":"Senyor Déu nostre, que pel Cor Immaculat de Maria,"},{"t":"p","x":"ornàreu Sant Antoni Maria Claret"},{"t":"p","x":"d’un gran amor vers el vostre Fill Jesús"},{"t":"p","x":"i l’inspiràreu la fundació de la Congregació de Missioners,"},{"t":"p","x":"per a salvar tots els homes,"},{"t":"p","x":"beneïu amb noves vocacions la Congregació Claretiana,"},{"t":"p","x":"i concediu-nos de perseverar fins a la fi"},{"t":"p","x":"en l'anunci de l'Evangeli."},{"t":"p","x":"Amén."}]},{"id":"87","num":"87","title":"Pregària per a demanar al Senyor vocacions claretianes","theme":"vocacions","sub":null,"tags":["responsorial"],"lines":[{"t":"p","x":"Senyor, per a continuar la gran obra de Sant Antoni Maria Claret en tot el món"},{"t":"r","x":"Envieu-nos molts i sants Missioners."},{"t":"p","x":"Senyor, per a santificar els pobles cristians amb la predicació i altres treballs apostòlics,"},{"t":"r","x":"Envieu-nos molts i sants Missioners."},{"t":"p","x":"Senyor, per a dur la llum de l'Evangeli als qui no us coneixen,"},{"t":"r","x":"Envieu-nos molts i sants Missioners."},{"t":"p","x":"Senyor, per a instaurar el Regnat del Cor Immaculat de Maria,"},{"t":"r","x":"Envieu-nos molts i sants Missioners."},{"t":"p","x":"Senyor, per tal que per mitjà del Cor Immaculat de Maria es compleixi sempre la vostra voluntat,"},{"t":"r","x":"Envieu-nos molts i sants Missioners."},{"t":"p","x":"Senyor, perquè totes les persones siguin educades cristianament i tinguem una societat més justa i més humana, segons la vostra voluntat,"},{"t":"r","x":"Envieu-nos molts i sants Missioners."},{"t":"p","x":"Jesús, primer Fills del Cor Immaculat de Maria,"},{"t":"r","x":"Envieu-nos molts i sants Missioners"},{"t":"p","x":"Cor Immaculat de Maria, mare de tots els homes,"},{"t":"r","x":"Envieu-nos molts i sants Missioners."},{"t":"rub","x":"Oració:"},{"t":"p","x":"Pare nostre,"},{"t":"p","x":"que voleu que tots els homes se salvin"},{"t":"p","x":"i arribin al coneixement de la veritat,"},{"t":"p","x":"us preguem que envieu obrers als vostres sembrats"},{"t":"p","x":"i els concediu de predicar amb confiança la vostra Paraula,"},{"t":"p","x":"perquè la veritat es difongui i resplendeixi"},{"t":"p","x":"i tots els homes us coneguin a Vós, únic Déu veritable."},{"t":"p","x":"Per Crist Senyor nostre."},{"t":"p","x":"Amén."}]},{"id":"88","num":"88","title":"Per les vocacions missioneres","theme":"vocacions","sub":null,"tags":[],"lines":[{"t":"p","x":"Oh Déu,"},{"t":"p","x":"que voleu que tots els homes se salvin"},{"t":"p","x":"i arribin al coneixement de la veritat,"},{"t":"p","x":"atraieu cap a Vós seguidors del vostre Fill,"},{"t":"p","x":"a l'estil de Sant Antoni Maria Claret,"},{"t":"p","x":"i envieu-los al camp del món"},{"t":"p","x":"perquè hi prediquin l'Evangeli a tota criatura,"},{"t":"p","x":"i el vostre poble, congregat per la Paraula de vida"},{"t":"p","x":"i sostingut per la força dels sagraments,"},{"t":"p","x":"camini per les sendes de la salvació i de l'amor."},{"t":"p","x":"Per Crist Senyor nostre."},{"t":"p","x":"Amén."}]},{"id":"89","num":"89","title":"Oració per les vocacions i la perseverança","theme":"vocacions","sub":null,"tags":[],"lines":[{"t":"p","x":"Vós, Senyor, que heu dit que la collita és abundant, i els treballadors pocs,"},{"t":"p","x":"i voleu que es multipliqui el nombre d'apòstols i evangelitzadors"},{"t":"p","x":"que eixamplin el vostre Regne i transformin la faç de la terra;"},{"t":"p","x":"us preguem que augmenteu el nombre"},{"t":"p","x":"i la qualitat evangèlica dels qui treballen pel bé dels homes."},{"t":"p","x":"Us donem gràcies per les vocacions que ens heu concedit"},{"t":"p","x":"pel Cor Immaculat de Maria, la nostra Mare."},{"t":"p","x":"Concediu-nos la vostra presència i la vostra intercessió"},{"t":"p","x":"perquè vinguin moltes vocacions al nostre Institut,"},{"t":"p","x":"i ajudeu-nos a tots a perseverar en la nostra vocació."},{"t":"p","x":"Per Crist Senyor nostre."},{"t":"p","x":"Amén."}]},{"id":"90","num":"90","title":"Per les vocacions a tots els estats de vida i ministeris","theme":"vocacions","sub":null,"tags":["responsorial"],"lines":[{"t":"p","x":"Il·luminats i animats per la vostra Paraula,"},{"t":"p","x":"us demanem, Senyor, per tots aquells"},{"t":"p","x":"que ja han escoltat la vostra crida i l'han seguida."},{"t":"r","x":"Us preguem que ens escolteu."},{"t":"p","x":"Pel papa, els bisbes, preveres, diaques"},{"t":"p","x":"i pels missioners i tots els consagrats"},{"t":"p","x":"perquè visquin amb goig la seva vocació"},{"t":"p","x":"i amb la seva vida i la seva paraula us facin present enmig dels homes."},{"t":"r","x":"Us preguem que ens escolteu."},{"t":"p","x":"Pels laics i els seglars que"},{"t":"p","x":"treballen generosament en els ministeris"},{"t":"p","x":"instituïts per l'Església"},{"t":"p","x":"i en els serveis necessaris per a la comunitat."},{"t":"r","x":"Us preguem que ens escolteu."},{"t":"p","x":"Sosteniu-los en les dificultats,"},{"t":"p","x":"Conforteu-los en els sofriments,"},{"t":"p","x":"assistiu-los en la solitud,"},{"t":"p","x":"protegiu-los en la persecució"},{"t":"p","x":"i confirmeu-los en la fidelitat."},{"t":"r","x":"Us preguem que ens escolteu."},{"t":"p","x":"Us demanem, Senyor, per aquells"},{"t":"p","x":"que obren el seu cor a la vostra crida"},{"t":"p","x":"i es preparen per a seguir-la."},{"t":"r","x":"Us preguem que ens escolteu."},{"t":"p","x":"Que la vostra Paraula els il·lumini,"},{"t":"p","x":"la vostra persona els captivi,"},{"t":"p","x":"i el vostre Esperit els guiï fins a arribar"},{"t":"p","x":"a la professió religiosa o els ordes sagrats."},{"t":"r","x":"Us preguem que ens escolteu."},{"t":"p","x":"Sigueu per a ells, Senyor, suport ferm"},{"t":"p","x":"i feu que trobin qui els pugui"},{"t":"p","x":"aconsellar, acompanyar i ajudar"},{"t":"p","x":"amb la força de convicció i amor"},{"t":"p","x":"que només Vós podeu comunicar."},{"t":"r","x":"Us preguem que ens escolteu."},{"t":"p","x":"Us ho demanem per Crist Senyor nostre."},{"t":"p","x":"Amén."}]},{"id":"91","num":"91","title":"Pels germans que pateixen malaltia","theme":"malalts","sub":null,"tags":["responsorial"],"lines":[{"t":"v","x":"Mireu, Senyor, amb amor els nostres germans malalts."},{"t":"r","x":"Que esperen confiadament en Vós."},{"t":"v","x":"Assistiu-los amb la vostra bondat."},{"t":"r","x":"Consoleu els seus cors i alleugeriu-los els sofriments."},{"t":"v","x":"Escolteu, Pare, les seves oracions i súpliques."},{"t":"r","x":"I doneu-los força i pau per a complir la vostra voluntat."},{"t":"v","x":"Feu que els malalts es recordin sempre de Vós."},{"t":"r","x":"I en les hores de vetlla i insomni meditin en Vós."},{"t":"v","x":"Perquè heu estat el seu auxili."},{"t":"r","x":"Que perseverin sempre units a Vós."},{"t":"v","x":"Recordeu-vos, Pare, de tots els homes i dones que sofreixen."},{"t":"r","x":"Reconforteu-los i feu que ens en sentim solidaris, ajudant-los i assistint-los amb amor."},{"t":"rub","x":"Preguem:"},{"t":"p","x":"Us demanem, Pare de bondat, que alleugeriu el dolor dels nostres germans malalts,"},{"t":"p","x":"guariu la seva malaltia, aviveu la seva esperança,"},{"t":"p","x":"reconforteu-los i consoleu-los amb la vostra gràcia,"},{"t":"p","x":"per tal que, restablerts segons la vostra voluntat i misericòrdia,"},{"t":"p","x":"s'incorporin novament a la vida de la comunitat i al servei de l'Evangeli"},{"t":"p","x":"Per Crist Senyor nostre."},{"t":"p","x":"Amén."},{"t":"rub","x":"O bé:"},{"t":"rub","x":"Preguem:"},{"t":"p","x":"Vós volguéreu, Pare de bondat,"},{"t":"p","x":"que el vostre Fill suportés les nostres febleses,"},{"t":"p","x":"per palesar el valor de la malaltia i de la paciència;"},{"t":"p","x":"escolteu les pregàries que us adrecem"},{"t":"p","x":"pels nostres germans malalts de la Congregació,"},{"t":"p","x":"i concediu a tots els qui es troben sotmesos al dolor, l'aflicció o la malaltia"},{"t":"p","x":"la gràcia d'unir-se a la passió de Crist per a la redempció del món."},{"t":"p","x":"Per Crist Senyor nostre."},{"t":"p","x":"Amén."},{"t":"rub","x":"O bé:"},{"t":"rub","x":"Preguem:"},{"t":"p","x":"Déu i Senyor nostre,"},{"t":"p","x":"salvació de tots els qui creuen en Vós,"},{"t":"p","x":"escolteu les oracions que us dirigim pels nostres germans malalts de la Congregació (comunitat),"},{"t":"p","x":"alleugeu-los amb l'auxili de la vostra misericòrdia"},{"t":"p","x":"per tal que, recuperada la salut, puguin servir-vos en la realització del vostre Regne."},{"t":"p","x":"Per Crist Senyor nostre."},{"t":"p","x":"Amén."}]},{"id":"92","num":"92","title":"Pels nostres germans malalts","theme":"malalts","sub":null,"tags":["responsorial"],"lines":[{"t":"v","x":"Salveu, Senyor els vostres servents,"},{"t":"r","x":"Que esperen en Vós."},{"t":"v","x":"Envieu-los el vostre auxili des del Santuari."},{"t":"r","x":"I protegiu-los des de Sió."},{"t":"v","x":"Sigueu el seu baluard, Senyor,"},{"t":"r","x":"Enfront de l'enemic"},{"t":"v","x":"Concediu-los la vostra fortalesa,"},{"t":"r","x":"En el llit del dolor"},{"t":"v","x":"Senyor, escolteu la nostra pregària."},{"t":"r","x":"I el nostre clam arribi a Vós."},{"t":"v","x":"El Senyor sigui amb vosaltres."},{"t":"r","x":"I amb el vostre esperit."},{"t":"rub","x":"Preguem:"},{"t":"p","x":"Oh Déu,"},{"t":"p","x":"que sempre us compadiu i perdoneu,"},{"t":"p","x":"acolliu la nostra pregària"},{"t":"p","x":"per tal que la vostra pietat misericordiosa ens absolgui benignament"},{"t":"p","x":"a nosaltres i als vostres servents malalts."},{"t":"p","x":"Per Crist Senyor nostre."},{"t":"p","x":"Amén."},{"t":"rub","x":"O bé:"},{"t":"p","x":"Oh Déu, empara singular de la debilitat humana,"},{"t":"p","x":"mostreu la força del vostre auxili sobre els vostres servents malalts,"},{"t":"p","x":"perquè, ajudats per la vostra misericòrdia, puguin novament presentar-se restablerts davant la vostra Església."},{"t":"p","x":"Per Crist Senyor nostre."},{"t":"p","x":"Amén."},{"t":"rub","x":"O bé:"},{"t":"p","x":"Us demanem, Senyor,"},{"t":"p","x":"que nosaltres, els vostres servents, gaudim sempre de salut"},{"t":"p","x":"en el cos i l’esperit"},{"t":"p","x":"i, per la intercessió de la sempre Verge Maria,"},{"t":"p","x":"allibereu-nos de les tristeses de la vida present i doneu-nos l’alegria de la vida futura."},{"t":"p","x":"Per Crist Senyor nostre."},{"t":"p","x":"Amén."}]},{"id":"s-n","num":null,"title":"Oració pels claretians difunts","theme":"difunts","sub":null,"tags":[],"lines":[{"t":"p","x":"Oh Déu, que manteniu l'esperança de la nostra felicitat futura,"},{"t":"p","x":"en el misteri pasqual del vostre Fill,"},{"t":"p","x":"us supliquem humilment, que"},{"t":"p","x":"tots els qui a la terra participaren de la nostra fraternitat claretiana"},{"t":"p","x":"i esmerçaren la seva vida en la propagació del Regne,"},{"t":"p","x":"arribin al goig de la felicitat eterna amb els estadants de la pàtria celestial."},{"t":"p","x":"Per Crist Senyor nostre."},{"t":"p","x":"Amén."}]},{"id":"95","num":"95","title":"Oració pels pares difunts","theme":"difunts","sub":null,"tags":[],"lines":[{"t":"p","x":"Oh Déu, que ens heu manat honorar pare i mare,"},{"t":"p","x":"tingueu misericòrdia dels nostres pares:"},{"t":"p","x":"perdoneu els seus pecats i feu que ens reunim"},{"t":"p","x":"un dia amb ells en la claror de la vostra glòria."},{"t":"p","x":"Per Crist Senyor nostre."},{"t":"p","x":"Amén."}]},{"id":"96","num":"96","title":"Oració pels familiars i benefactors","theme":"difunts","sub":null,"tags":[],"lines":[{"t":"p","x":"Oh Déu, que pel misteri pasqual del vostre Fill"},{"t":"p","x":"manteniu l'esperança de la nostra resurrecció,"},{"t":"p","x":"us demanem humilment"},{"t":"p","x":"que tots els qui van participar a la terra"},{"t":"p","x":"de la nostra fraternitat claretiana"},{"t":"p","x":"i van col·laborar en la nostra missió d'anunciar l'Evangeli"},{"t":"p","x":"arribin al goig de la felicitat eterna."},{"t":"p","x":"Per Crist Senyor nostre."},{"t":"p","x":"Amén."}]},{"id":"97","num":"97","title":"Oració pels germans, parents i benefactors","theme":"difunts","sub":null,"tags":[],"lines":[{"t":"p","x":"Oh Déu que concediu el perdó dels pecats"},{"t":"p","x":"i voleu la salvació dels homes:"},{"t":"p","x":"per intercessió de Santa Maria Verge i de tots els sants,"},{"t":"p","x":"concediu als nostres germans, parents i benefactors"},{"t":"p","x":"que han sortit ja d'aquest món"},{"t":"p","x":"arribar a l'eterna benaurança."},{"t":"p","x":"Per Crist Senyor nostre."},{"t":"p","x":"Amén."}]},{"id":"113","num":"113","title":"Il·lumineu, Senyor, els nostres cors","theme":"eucaristia","sub":null,"tags":[],"lines":[{"t":"p","x":"Il·lumineu, Senyor, amb la llum de la fe els nostres cors"},{"t":"p","x":"i inflameu-los amb el foc de la caritat"},{"t":"p","x":"perquè adorem, en esperit i en veritat,"},{"t":"p","x":"a qui reconeixem en aquest Sagrament"},{"t":"p","x":"com el nostre Déu i Senyor."},{"t":"p","x":"Ell que viu i reina pels segles dels segles."}]},{"id":"114","num":"114","title":"Memorial de la nostra redempció","theme":"eucaristia","sub":null,"tags":[],"lines":[{"t":"p","x":"Oh Déu que redimíreu tots els homes"},{"t":"p","x":"amb el misteri pasqual de Crist,"},{"t":"p","x":"que en aquest Sagrament s'ofereix Ell mateix pels germans,"},{"t":"p","x":"concediu-nos que, venerant constantment el misteri de la nostra redempció,"},{"t":"p","x":"mereixem d’aconseguir el seu fruit"},{"t":"p","x":"i desvetllar en els homes el record de la presència del Senyor."},{"t":"p","x":"Per Crist Senyor nostre."},{"t":"rub","x":"O bé:"},{"t":"p","x":"Oh Déu, Vós ens heu deixat un sagrament admirable per memorial de la vostra Passió. Concediu-nos una devoció tan gran als misteris del vostre Cos i de la vostra Sang, que experimentem constantment en nosaltres els efectes de la vostra redempció."},{"t":"p","x":"Vós que viviu i regneu dels segles dels segles."}]},{"id":"115","num":"115","title":"L'Eucaristia i el zel apostòlic","theme":"eucaristia","sub":null,"tags":[],"lines":[{"t":"p","x":"Que el Sagrament de l'Eucaristia, Senyor,"},{"t":"p","x":"ompli del vostre amor i de zel apostòlic els nostres cors"},{"t":"p","x":"perquè ens esperonin a desitjar"},{"t":"p","x":"que tots els homes us coneguin, us estimin i us serveixin,"},{"t":"p","x":"i a procurar-los la benaurança d'aquest Regne"},{"t":"p","x":"iniciada ja a la terra."},{"t":"p","x":"Per Crist Senyor nostre."}]},{"id":"116","num":"116","title":"Partícips d'un mateix pa","theme":"eucaristia","sub":null,"tags":[],"lines":[{"t":"p","x":"Senyor, Vós que ens heu fet partícips d'un mateix pa i d’un mateix Esperit,"},{"t":"p","x":"concediu-nos que, units a Vós com les sarments al cep,"},{"t":"p","x":"siguem u amb Vós per a edificar la nostra comunió"},{"t":"p","x":"i perquè el món cregui."},{"t":"p","x":"Per Crist Senyor nostre."}]},{"id":"117","num":"117","title":"Solidaris amb els qui sofreixen","theme":"eucaristia","sub":null,"tags":[],"lines":[{"t":"p","x":"Senyor Jesús, que us identificàreu plenament amb els qui sofreixen"},{"t":"p","x":"i ens heu dit “veniu a mi tots els cansats i aclaparats sota la càrrega, i jo us faré reposar”,"},{"t":"p","x":"solidaris amb els homes que pateixen malaltia, dolor, injustícia i opressió, venim a la vostra presència"},{"t":"p","x":"perquè ens inflameu en la vostra caritat"},{"t":"p","x":"fins que ens alegrem en els sofriments"},{"t":"p","x":"i ens gloriem en la vostra creu."},{"t":"p","x":"Vós que viviu i regneu pels segles dels segles."}]},{"id":"118","num":"118","title":"Adorar el misteri pasqual","theme":"eucaristia","sub":null,"tags":[],"lines":[{"t":"p","x":"Senyor, que pel misteri pasqual"},{"t":"p","x":"heu realitzat la salvació dels homes,"},{"t":"p","x":"concediu-nos d’adorar-vos present en aquest Sagrament"},{"t":"p","x":"i proclamar amb fe el que ara venerem."},{"t":"p","x":"Per Crist Senyor nostre."}]},{"id":"119","num":"119","title":"Inflameu-nos en la fe","theme":"eucaristia","sub":null,"tags":[],"lines":[{"t":"p","x":"Senyor Jesús,"},{"t":"p","x":"inflameu-nos en la fe"},{"t":"p","x":"que va moure a tants predicadors de la divina paraula"},{"t":"p","x":"a abraçar amb ànim alegre"},{"t":"p","x":"la pobresa, l'abnegació i el sacrifici"},{"t":"p","x":"per a dilatar el vostre Regne"},{"t":"p","x":"Us ho demanem units de cor a Vós,"},{"t":"p","x":"present ara en el misteri eucarístic que venerem"},{"t":"p","x":"i amb qui compartim la vida i ministeri"},{"t":"p","x":"Vós que viviu i regneu amb el Pare i l'Esperit Sant"},{"t":"p","x":"pels segles dels segles."}]},{"id":"131","num":"131","title":"Veni, Sancte Spiritus","theme":"reunions","sub":"Per començar","tags":["Esperit Sant"],"lines":[{"t":"p","x":"Veniu, Esperit Sant, ompliu els cors dels vostres fidels"},{"t":"p","x":"i enceneu-hi el foc del vostre amor."},{"t":"v","x":"Envieu el vostre Esperit i seran creats."},{"t":"r","x":"I renovareu la faç de la terra."},{"t":"rub","x":"Preguem:"},{"t":"p","x":"Oh Déu,"},{"t":"p","x":"que heu il·luminat els cors dels vostres fidels"},{"t":"p","x":"amb la llum de l'Esperit Sant;"},{"t":"p","x":"feu-nos sempre dòcils a aquest mateix Esperit,"},{"t":"p","x":"perquè puguem fer sempre el bé"},{"t":"p","x":"i gaudir del seu consol."},{"t":"p","x":"Per Crist Senyor nostre. Amén."}]},{"id":"132","num":"132","title":"Reunits en el vostre nom","theme":"reunions","sub":"Per començar","tags":[],"lines":[{"t":"p","x":"Senyor, ara que ens reunim en nom vostre,"},{"t":"p","x":"volem estar a la vostra presència;"},{"t":"p","x":"concediu-nos un esperit dialogant,"},{"t":"p","x":"il·lumineu les nostres ments amb la llum de la vostra veritat"},{"t":"p","x":"i enfortiu el nostre esperit fraternal"},{"t":"p","x":"perquè, sempre units, maldem per conèixer i fer la vostra voluntat."},{"t":"p","x":"Per Crist Senyor nostre. Amén."}]},{"id":"133","num":"133","title":"Doneu-nos la saviesa (Sa 9,1-6.9-11)","theme":"reunions","sub":"Per començar","tags":[],"lines":[{"t":"p","x":"Déu dels pares i Senyor misericordiós,"},{"t":"p","x":"que heu fet l’univers amb la vostra paraula,"},{"t":"p","x":"i amb la vostra saviesa heu format l'home,"},{"t":"p","x":"perquè sotmeti totes les criatures que han vingut a l’existència,"},{"t":"p","x":"perquè governi el món de manera santa i justa,"},{"t":"p","x":"i administri la justícia amb rectitud de cor."},{"t":"p","x":"Doneu-me la Saviesa que seu amb vós en el vostre tron."},{"t":"p","x":"No em tingueu per indigne de ser comptat entre els vostres fills,"},{"t":"p","x":"perquè jo sóc el vostre servent, fill de la vostra serventa,"},{"t":"p","x":"home feble i de curta durada,"},{"t":"p","x":"poc intel·ligent per a exercir la justícia i aplicar les lleis."},{"t":"p","x":"Ja que, per molt madur que sigui un home, el tindran per no res si li manca la Saviesa que ve de Vós."},{"t":"p","x":"Amb Vós hi ha la saviesa, que coneix les vostres obres,"},{"t":"p","x":"I era present quan creàveu el món."},{"t":"p","x":"Ella sap què us complau"},{"t":"p","x":"què és conforme als vostres manaments."},{"t":"p","x":"Envieu-la des de les altures santes del cel,"},{"t":"p","x":"feu-la baixar del vostre tron gloriós,"},{"t":"p","x":"perquè treballi fent-me costat i jo conegui allò que us plau."},{"t":"p","x":"Ella que ho sap tot i ho comprèn tot,"},{"t":"p","x":"em guiarà assenyadament en les meves empreses,"},{"t":"p","x":"i em guardarà en la seva presència gloriosa."},{"t":"rub","x":"Gloria al Pare."}]},{"id":"134","num":"134","title":"Cercar i complir junts la voluntat de Déu","theme":"reunions","sub":"Per començar","tags":[],"lines":[{"t":"rub","x":"Antífona:"},{"t":"p","x":"Diu el Senyor: on dos o tres estan reunits en el meu nom, jo estic enmig d'ells."},{"t":"rub","x":"Preguem:"},{"t":"p","x":"Déu i Pare nostre, el vostre Fill va prometre la seva presència"},{"t":"p","x":"a aquells que es reunissin en el seu nom:"},{"t":"p","x":"Feu que el sentim present ara entre nosaltres,"},{"t":"p","x":"que expressem la comunió de vida i missió"},{"t":"p","x":"de tot l'Institut,"},{"t":"p","x":"perquè caminem en una vida nova"},{"t":"r","x":"en obediència a l'Esperit"},{"t":"p","x":"i amb plena fidelitat al nostre carisma missioner -,"},{"t":"p","x":"i, una vegada coneguda la vostra voluntat,"},{"t":"p","x":"la complim amb un mateix sentir i voler"},{"t":"p","x":"per a realitzar la nostra comuna missió en l'Església."},{"t":"p","x":"Per Crist Senyor nostre."},{"t":"p","x":"Amén."}]},{"id":"135","num":"135","title":"Gràcia i disposicions per al diàleg","theme":"reunions","sub":"Per començar","tags":["discerniment","diàleg"],"lines":[{"t":"p","x":"Ens trobem aquí, Senyor,"},{"t":"p","x":"reunits en el vostre nom i desitjosos de dilatar el vostre Regne."},{"t":"p","x":"Que l'Esperit Sant que heu enviat als nostres cors"},{"t":"p","x":"i manté viva la vostra presència en nosaltres,"},{"t":"p","x":"ens ensenyi què hem de fer"},{"t":"p","x":"i vers on ens cal caminar"},{"t":"p","x":"per tal que, enfortits amb la vostra gràcia,"},{"t":"p","x":"puguem realitzar els vostres designis."},{"t":"p","x":"Sigueu Vós, Esperit Sant,"},{"t":"p","x":"l'inspirador i animador del nostre discerniment."},{"t":"p","x":"Ensenyeu-nos a escoltar els altres,"},{"t":"p","x":"a deixar-nos il·luminar per les seves llums;"},{"t":"p","x":"ensenyeu-nos a proposar i a no imposar;"},{"t":"p","x":"i feu que cerquem sempre la veritat."},{"t":"p","x":"Allibereu-nos de la ceguesa de qui creu que sempre té raó,"},{"t":"p","x":"dels favoritismes i de tota accepció de persones."},{"t":"p","x":"Uniu-nos a Vós perquè mai no ens apartem de la veritat."},{"t":"p","x":"Amén."}]},{"id":"136","num":"136","title":"Llum per descobrir l'exigència de l'Evangeli","theme":"reunions","sub":"Per començar","tags":[],"lines":[{"t":"p","x":"Mireu, Pare de bondat,"},{"t":"p","x":"a aquesta comunitat reunida en el vostre nom"},{"t":"p","x":"per compartir la fraternitat i dialogar en la veritat,"},{"t":"p","x":"concediu-li que descobreixi amb major claredat les exigències de l'Evangeli"},{"t":"p","x":"per a ser llum del món i sal de la terra."},{"t":"p","x":"Per Crist Senyor nostre."},{"t":"p","x":"Amén."}]},{"id":"137","num":"137","title":"Oració per a iniciar una reunió","theme":"reunions","sub":"Per començar","tags":[],"lines":[{"t":"p","x":"Senyor, que la vostra gràcia inspiri, sostingui i acompanyi les nostres obres,"},{"t":"p","x":"perquè el nostre treball comenci en Vós, com la seva font,"},{"t":"p","x":"i tendeixi sempre a Vós, com a la seva fi."},{"t":"p","x":"Per Crist Senyor nostre."},{"t":"p","x":"Amén."}]},{"id":"138","num":"138","title":"Acció de gràcies per la trobada","theme":"reunions","sub":"Per acabar","tags":[],"lines":[{"t":"p","x":"Pare de bondat,"},{"t":"p","x":"us donem gràcies per aquesta trobada"},{"t":"p","x":"en la que hem compartit les nostres il·lusions i desil·lusions,"},{"t":"p","x":"els nostres projectes i dificultats."},{"t":"p","x":"Feu que responguem sempre eficaçment"},{"t":"p","x":"a la nostra vocació i missió en l'Església,"},{"t":"p","x":"a imitació de Claret, el nostre Pare."},{"t":"p","x":"Per Crist Senyor nostre."},{"t":"p","x":"Amén."}]},{"id":"139","num":"139","title":"Un sol cor i una sola ànima","theme":"reunions","sub":"Per acabar","tags":[],"lines":[{"t":"p","x":"Senyor, us regraciem"},{"t":"p","x":"per aquesta trobada comunitària,"},{"t":"p","x":"per la vostra bondat i la vostra presència entre nosaltres,"},{"t":"p","x":"feu que amb esperit fraternal"},{"t":"p","x":"tinguem un sol cor i una sola ànima per a ser una comunitat"},{"t":"p","x":"evangelitzada i evangelitzadora."},{"t":"p","x":"Per Crist Senyor nostre."},{"t":"p","x":"Amén."}]},{"id":"139b","num":"139b","title":"Envieu, Senyor, el vostre Esperit","theme":"vocacions","sub":null,"tags":[],"lines":[{"t":"p","x":"Envieu, Senyor, el vostre Esperit"},{"t":"p","x":"sobre els cors dels vostres elegits"},{"t":"p","x":"per tal que, coneixent la vostra crida"},{"t":"p","x":"a la santedat i al servei,"},{"t":"p","x":"abracin el sacerdoci i la vida consagrada"},{"t":"p","x":"a fi que la vostra Església"},{"t":"p","x":"sigui testimoni de santedat i d’amor"},{"t":"p","x":"i la Bona Nova sigui predicada en tot el món."},{"t":"p","x":"Us ho demanem per Jesucrist, el vostre Fill,"},{"t":"p","x":"que viu i regna pels segles dels segles."},{"t":"p","x":"Amén."}]},{"id":"144","num":"144","title":"Oració del P. Fundador al començament dels exercicis","theme":"exercicis","sub":null,"tags":["recés"],"lines":[{"t":"p","x":"Mare de Déu, Mare meva,"},{"t":"p","x":"Vós que tinguéreu el consol de veure reunits"},{"t":"p","x":"els Apòstols i deixebles en el Cenacle"},{"t":"p","x":"i finalment el goig de veure'ls tots"},{"t":"p","x":"plens de l'Esperit Sant;"},{"t":"p","x":"amb tota confiança us demano"},{"t":"p","x":"que m'obtingueu totes les gràcies que necessito"},{"t":"p","x":"per a fer bé aquests Exercicis"},{"t":"p","x":"sota la vostra direcció."},{"t":"p","x":"Refermeu-me en el meu propòsit de fer tot el que conegui que sigui profitós per a major glòria de Déu i bé de la meva ànima."},{"t":"p","x":"Mare meva, socorreu-me i empareu-me ara i sempre."},{"t":"p","x":"Amén."}]},{"id":"157","num":"157","title":"Lletanies de Sant Josep","theme":"sant-josep","sub":null,"tags":["lletania"],"lines":[{"t":"p","x":"Senyor, tingueu pietat."},{"t":"p","x":"Senyor, tingueu pietat."},{"t":"p","x":"Crist, tingueu pietat."},{"t":"p","x":"Crist, tingueu pietat."},{"t":"p","x":"Senyor, tingueu pietat."},{"t":"p","x":"Senyor, tingueu pietat."},{"t":"p","x":"Crist, oïu-nos."},{"t":"p","x":"Crist, oïu-nos."},{"t":"p","x":"Crist, escolteu-nos."},{"t":"p","x":"Crist, escolteu-nos."},{"t":"p","x":"Déu, Pare celestial."},{"t":"p","x":"Tingueu pietat de nosaltres."},{"t":"p","x":"Déu, Fill, Redemptor del món."},{"t":"p","x":"Déu, Esperit Sant."},{"t":"p","x":"Trinitat Santa, un sol Déu."},{"t":"p","x":"Santa Maria."},{"t":"p","x":"Pregueu per nosaltres."},{"t":"p","x":"Sant Josep."},{"t":"p","x":"Descendent il·lustre de David."},{"t":"p","x":"Llum dels Patriarques."},{"t":"p","x":"Espòs de la Mare de Déu."},{"t":"p","x":"Cast custodi de la Verge."},{"t":"p","x":"Educador del Fill de Déu."},{"t":"p","x":"Diligent defensor de Crist."},{"t":"p","x":"Cap de la Santa Família."},{"t":"p","x":"Josep justíssim."},{"t":"p","x":"Josep castíssim."},{"t":"p","x":"Josep prudentíssim."},{"t":"p","x":"Josep fortíssim."},{"t":"p","x":"Josep obedientíssim."},{"t":"p","x":"Josep fidelíssim."},{"t":"p","x":"Mirall de paciència."},{"t":"p","x":"Aimant de la pobresa."},{"t":"p","x":"Treballador exemplar."},{"t":"p","x":"Honor de la vida familiar."},{"t":"p","x":"Custodi de les verges."},{"t":"p","x":"Sosteniment de les famílies."},{"t":"p","x":"Consol dels afligits."},{"t":"p","x":"Esperança dels malalts."},{"t":"p","x":"Patró dels moribunds."},{"t":"p","x":"Protector de la Santa Església."},{"t":"p","x":"Anyell de Déu que lleveu el pecat del món"},{"t":"r","x":"perdoneu-nos, Senyor."},{"t":"p","x":"Anyell de Déu que lleveu el pecat del món"},{"t":"r","x":"escolteu-nos, Senyor."},{"t":"p","x":"Anyell de Déu que lleveu el pecat del món"},{"t":"r","x":"tingueu pietat de nosaltres."},{"t":"v","x":"El va constituir senyor de casa seva."},{"t":"r","x":"I cap de totes les seves possessions."},{"t":"rub","x":"Preguem:"},{"t":"p","x":"Oh Déu, que en la vostra inefable providència, us dignàreu escollir Sant Josep com a espòs de la Mare del vostre Fill, concediu-nos, us demanem, que el qui venerem a la terra com a protector, el mereixem tenir com a intercessor en el cel. Vós, que viviu i regneu pels segles dels segles."},{"t":"p","x":"Amén."}]},{"id":"158","num":"158","title":"Benaurat Josep","theme":"sant-josep","sub":null,"tags":[],"lines":[{"t":"p","x":"Benaurat Josep,"},{"t":"p","x":"per l'amor que us va mantenir unit a la Verge Mare de Déu"},{"t":"p","x":"i pel paternal amor amb què cuidàreu el Nen Jesús,"},{"t":"p","x":"humilment us demanem que mireu benignament la família del vostre Fill,"},{"t":"p","x":"adquirida per la seva sang, i amb el vostre auxili socorreu les nostres necessitats."},{"t":"p","x":"Aparteu de nosaltres tot error i tot pecat;"},{"t":"p","x":"assistiu-nos en la nostra lluita contra el poder del mal,"},{"t":"p","x":"i defenseu l'Església santa de Déu de tota adversitat;"},{"t":"p","x":"protegiu cadascun de nosaltres,"},{"t":"p","x":"perquè, a exemple vostre i sostinguts pel vostre auxili,"},{"t":"p","x":"puguem viure santament,"},{"t":"p","x":"morir piadosament i arribar a l'eterna benaurança."},{"t":"p","x":"Amén."}]},{"id":"159","num":"159","title":"Oració a Sant Josep de Lleó XIII","theme":"sant-josep","sub":null,"tags":[],"lines":[{"t":"p","x":"A vós, benaurat Josep,"},{"t":"p","x":"acudim en la nostra necessitat"},{"t":"p","x":"i invoquem el vostre patrocini juntament amb el de la Verge Maria, la vostra esposa."},{"t":"p","x":"Pel sant amor que us va unir a Maria, Mare de Déu,"},{"t":"p","x":"i per la custòdia paterna del Nen Jesús,"},{"t":"p","x":"mireu benignament el poble que Crist va adquirir amb la seva sang;"},{"t":"p","x":"amb la vostra ajuda socorreu-nos en les nostres necessitats."},{"t":"p","x":"Custodi de la Sagrada Família,"},{"t":"p","x":"protegiu l'Església dels mals que afligeixen el món,"},{"t":"p","x":"i assistiu-nos propici en la lluita contra el poder del mal."},{"t":"p","x":"Ajudeu-nos a viure santament,"},{"t":"p","x":"a morir en pau amb Déu"},{"t":"p","x":"i a arribar a l'eterna benaurança del cel."},{"t":"p","x":"Amén."}]},{"id":"160","num":"160","title":"Oració a Sant Josep de Joan XXIII","theme":"sant-josep","sub":null,"tags":[],"lines":[{"t":"p","x":"Oh San Josep, custodi de Jesús,"},{"t":"p","x":"espòs puríssim de Maria,"},{"t":"p","x":"que heu viscut en el compliment perfecte del vostre deure,"},{"t":"p","x":"mantenint amb el treball de les vostres mans"},{"t":"p","x":"la sagrada Família de Natzaret,"},{"t":"p","x":"protegiu propici els qui a vós acudim."},{"t":"p","x":"Vós coneixeu les nostres aspiracions, les nostres angoixes i esperances:"},{"t":"p","x":"a vós venim,"},{"t":"p","x":"perquè sabem que trobarem en vós un protector."},{"t":"p","x":"També vós heu experimentat la prova i el defalliment:"},{"t":"p","x":"però el vostre esperit, ple de la més profunda pau,"},{"t":"p","x":"va exultar de goig per la intimitat amb el Fill de Déu que us va ser confiat"},{"t":"p","x":"i amb Maria, la seva Mare."},{"t":"p","x":"Ajudeu-nos a comprendre"},{"t":"p","x":"que no estem sols en el nostre treball,"},{"t":"p","x":"a saber descobrir Jesús al nostre costat,"},{"t":"p","x":"a acollir-lo amb la gràcia i a custodiar-lo fidelment com ho vau fer vós."},{"t":"p","x":"I feu que, a la nostra Congregació,"},{"t":"p","x":"tot sigui santificat en la caritat,"},{"t":"p","x":"en la paciència, en la justícia i en la recerca del bé."},{"t":"p","x":"Amén."}]},{"id":"161","num":"161","title":"Oració a Sant Josep","theme":"sant-josep","sub":null,"tags":[],"lines":[{"t":"p","x":"Salve, Josep, espòs virginal de Maria"},{"t":"p","x":"i pare davídic del Messies."},{"t":"p","x":"Sou beneït entre tots els homes"},{"t":"p","x":"i beneït és Jesús, el Fill de Déu que us va ser confiat."},{"t":"p","x":"Sant Josep,"},{"t":"p","x":"patró de l'Església universal i de la nostra Congregació,"},{"t":"p","x":"guardeu les nostres comunitats i les nostres famílies"},{"t":"p","x":"en la pau i en la gràcia divina"},{"t":"p","x":"i socorreu-nos a l'hora de la nostra mort."},{"t":"p","x":"Amén."}]},{"id":"162","num":"162","title":"Oració a Sant Josep (pel ministeri)","theme":"sant-josep","sub":null,"tags":[],"lines":[{"t":"p","x":"Pare sant, que elegíreu Sant Josep"},{"t":"p","x":"per a un ofici singular"},{"t":"p","x":"i li concedíreu les gràcies necessàries"},{"t":"p","x":"per a complir-lo fidelment a la casa de Natzaret;"},{"t":"p","x":"concediu-nos també a nosaltres"},{"t":"p","x":"les gràcies necessàries"},{"t":"p","x":"per a ser fidels en el compliment"},{"t":"p","x":"del nostre ministeri,"},{"t":"p","x":"segons el carisma i l'esperit de la Congregació."},{"t":"p","x":"Per Crist Senyor nostre."},{"t":"p","x":"Amén."}]},{"id":"165","num":"165","title":"Oració als Màrtirs de Barbastre","theme":"martirs","sub":null,"tags":["13 agost"],"lines":[{"t":"p","x":"Senyor, Pare sant,"},{"t":"p","x":"Vós que concedíreu a Felip de Jesús Munàrriz i als seus companys,"},{"t":"p","x":"fidelitat plena a la vocació missionera"},{"t":"p","x":"seguint Crist fins al martiri,"},{"t":"p","x":"i els féreu testimonis de caritat perfecta"},{"t":"p","x":"en el perdó dels seus perseguidors:"},{"t":"p","x":"concediu-nos, per la seva intercessió,"},{"t":"p","x":"fermesa perseverant en la fe,"},{"t":"p","x":"i una caritat sincera"},{"t":"p","x":"per a estimar en Crist tots els germans."},{"t":"p","x":"Per Crist Senyor nostre."},{"t":"p","x":"Amén."}]},{"id":"166","num":"166","title":"Màrtirs de Barbastre","theme":"martirs","sub":null,"tags":["13 agost"],"lines":[{"t":"p","x":"Déu, Pare nostre,"},{"t":"p","x":"que ens heu donat en els Màrtirs Claretians de Barbastre"},{"t":"p","x":"un model de fidelitat a la Causa de Jesús,"},{"t":"p","x":"d'amor al Cor de Maria i a l'Església,"},{"t":"p","x":"de lleialtat als germans i de perdó als enemics,"},{"t":"p","x":"concediu-nos d’imitar el seu exemple"},{"t":"p","x":"en la vivència fidel i joiosa de la nostra consagració"},{"t":"p","x":"i en l'anunci de l'Evangeli"},{"t":"p","x":"per a glòria de Déu i salvació de tots els homes."},{"t":"p","x":"Per Crist Senyor nostre."},{"t":"p","x":"Amén."}]},{"id":"169","num":"169","title":"Oració (I)","theme":"beatificacio","sub":null,"tags":[],"lines":[{"t":"p","x":"Senyor, Pare nostre,"},{"t":"p","x":"que heu escollit amb predilecció"},{"t":"p","x":"tots els Fills del Cor de la Verge Maria"},{"t":"p","x":"i heu fet que alguns d'ells fossin exemples eximis en la virtut;"},{"t":"p","x":"fecundeu l'Església amb la seva glorificació"},{"t":"p","x":"i feu que siguin per a nosaltres models a imitar"},{"t":"p","x":"Per Crist Senyor nostre."},{"t":"p","x":"Amén."}]},{"id":"170","num":"170","title":"Oració (II)","theme":"beatificacio","sub":null,"tags":[],"lines":[{"t":"p","x":"Senyor, que voleu que siguin sants"},{"t":"p","x":"els qui heu cridat a la nostra Congregació,"},{"t":"p","x":"concediu als nostres germans missioners"},{"t":"p","x":"que han seguit més de prop les petjades del Sant Fundador"},{"t":"p","x":"i han lliurat la seva vida al servei de l'Evangeli,"},{"t":"p","x":"que siguin glorificats a la terra i comptats entre els sants del cel."},{"t":"p","x":"Per Crist Senyor nostre."}]},{"id":"171","num":"171","title":"Oració (III)","theme":"beatificacio","sub":null,"tags":[],"lines":[{"t":"p","x":"Oh Déu, que exalceu els humils i rebutgeu els superbs,"},{"t":"p","x":"Digneu-vos glorificar el vostre servent N. i feu resplendir el seu nom entre el dels vostres sants"},{"t":"p","x":"Multipliqueu les vostres gràcies a favor dels qui us supliquen"},{"t":"p","x":"per la seva intercessió;"},{"t":"p","x":"i concediu que l'Església honori un dia la seva memòria,"},{"t":"p","x":"el proposi com a model a imitar i"},{"t":"p","x":"com a protector que ens ajudi a superar les dificultats de la nostra vida missionera"},{"t":"p","x":"i a arribar a la vida eterna."},{"t":"p","x":"Per Crist Senyor nostre."},{"t":"p","x":"Amén."}]},{"id":"172","num":"172","title":"Oració per demanar la beatificació","theme":"beatificacio","sub":null,"tags":[],"lines":[{"t":"p","x":"Senyor, Déu nostre,"},{"t":"p","x":"que heu elegit alguns germans nostres,"},{"t":"p","x":"Fills del Cor Immaculat de Maria,"},{"t":"p","x":"i els heu fet resplendir"},{"t":"p","x":"amb l'exemple d'una santedat exímia en la vida missionera,"},{"t":"p","x":"digneu-vos enriquir i fecundar la santa Església amb la seva glorificació,"},{"t":"p","x":"i feu que cadascun de nosaltres, seguint el seu testimoniatge evangèlic,"},{"t":"p","x":"ens afanyem amb ardor a buscar en totes les coses"},{"t":"p","x":"la vostra glòria i la salvació dels nostres germans."},{"t":"p","x":"Per Crist Senyor nostre."},{"t":"p","x":"Amén."}]},{"id":"183","num":"183","title":"Oració pel capítol (o durant la seva celebració)","theme":"capitol","sub":null,"tags":[],"lines":[{"t":"p","x":"Veniu, oh Esperit Sant, ompliu el cor dels vostres fidels"},{"t":"p","x":"i enceneu-hi la flama del vostre amor."},{"t":"r","x":"Envieu el vostre Esperit i renaixerà la creació."},{"t":"v","x":"I renovareu la vida sobre la terra."},{"t":"rub","x":"Preguem:"},{"t":"p","x":"Oh Déu, que heu il·luminat el cor dels vostres fidels"},{"t":"p","x":"amb la claror de l'Esperit Sant,"},{"t":"p","x":"concediu-nos de fruir sempre de la llum de la seva veritat"},{"t":"p","x":"i de ser consolats amb els fruits de la seva presència."},{"t":"p","x":"Per Crist, Senyor nostre."},{"t":"p","x":"Amén."}]},{"id":"186","num":"186","title":"Oració pel capítol","theme":"capitol","sub":null,"tags":[],"lines":[{"t":"p","x":"Oh Esperit Divinal,"},{"t":"p","x":"que enviat pel Pare en el nom de Jesús,"},{"t":"p","x":"assistiu i guieu infal·liblement la vostra Església,"},{"t":"p","x":"infoneu sobre el Capítol la plenitud dels vostres dons."},{"t":"p","x":"Oh Mestre dolç i Consolador,"},{"t":"p","x":"il·lumineu les ments dels Capitulars;"},{"t":"p","x":"feu que d'aquest Capítol brollin fruits abundants,"},{"t":"p","x":"nou vigor en el compromís de santificació i d’apostolat,"},{"t":"p","x":"sobretot en la difusió de la llum"},{"t":"p","x":"i de la força de l'Evangeli entre els homes."},{"t":"p","x":"Oh dolç hoste de les ànimes,"},{"t":"p","x":"confirmeu les ments en la veritat,"},{"t":"p","x":"disposeu a l'obediència el cor de tots"},{"t":"p","x":"a fi que les conclusions del Capítol"},{"t":"p","x":"trobin generós acolliment i total acompliment."},{"t":"p","x":"Renoveu en la nostra Congregació,"},{"t":"p","x":"i en cadascun de nosaltres,"},{"t":"p","x":"l'esperit que animà Sant Antoni Maria Claret, el nostre Pare."},{"t":"p","x":"Concediu-nos, que,"},{"t":"p","x":"reunits en unànime i intensa pregària,"},{"t":"p","x":"entorn del Cor de Maria, la nostra Mare,"},{"t":"p","x":"procurem sempre i únicament"},{"t":"p","x":"la major glòria de Déu i la salvació de les ànimes."},{"t":"p","x":"Amén."}]},{"id":"187","num":"187","title":"Pregàries pel capítol","theme":"capitol","sub":null,"tags":[],"lines":[{"t":"p","x":"Senyor i Pare nostre,"},{"t":"p","x":"per la intercessió de Maria,"},{"t":"p","x":"Mare i Fundadora de la nostra Congregació,"},{"t":"p","x":"envieu-nos el vostre Esperit"},{"t":"p","x":"per a sentir-nos empesos com el vostre Fill Jesús"},{"t":"p","x":"per l'amor a Vós i als homes,"},{"t":"p","x":"per a tenir ulls penetrants i oïdes atentes"},{"t":"p","x":"a les urgències del món,"},{"t":"p","x":"mantenir la unitat per damunt de les diferències,"},{"t":"p","x":"congregats en la mateixa comunitat"},{"t":"p","x":"i realitzant la missió que hem rebut"},{"t":"p","x":"a través de Sant Antoni Maria Claret, el nostre Pare."},{"t":"p","x":"Vós que viviu i regneu pels segles dels segles."},{"t":"p","x":"Amén."}]},{"id":"188","num":"188","title":"Pregària pel XXVII capítol general","theme":"capitol","sub":null,"tags":["XXVII capítol"],"lines":[{"t":"p","x":"Veniu, Esperit Sant,"},{"t":"p","x":"alè del Pare"},{"t":"p","x":"i foc viu del Fill ressuscitat:"},{"t":"p","x":"renoveu la nostra Congregació."},{"t":"p","x":"Feu de la preparació del Capítol General"},{"t":"p","x":"un temps de gràcia, escolta i discerniment."},{"t":"p","x":"Vesseu sobre nosaltres una nova Pentecosta"},{"t":"p","x":"perquè puguem caminar junts en comunió,"},{"t":"p","x":"com a missioners místics i profètics"},{"t":"p","x":"al servei de l'única Missió de Crist."},{"t":"p","x":"Units a Maria, la nostra Mare,"},{"t":"p","x":"a Sant Antoni Maria Claret,"},{"t":"p","x":"i al testimoni fidel dels nostres màrtirs,"},{"t":"p","x":"ensenyeu-nos a escoltar la vostra veu en el crit dels pobres,"},{"t":"p","x":"en les ferides del món,"},{"t":"p","x":"i en la vida de les nostres comunitats."},{"t":"p","x":"Forgeu-nos a la Farga del Cor Immaculat de Maria"},{"t":"p","x":"perquè, guiats pel vostre Esperit,"},{"t":"p","x":"ens convertim en signes de fraternitat,"},{"t":"p","x":"d'esperança i foc missioner"},{"t":"p","x":"per a l'Església i per al món."},{"t":"p","x":"Amén."}]},{"id":"201","num":"201","title":"Festes de la Verge Maria","theme":"taula","sub":null,"tags":["benedicció"],"lines":[{"t":"p","x":"Alegreu-vos, Maria, plena de gràcia. El Senyor és amb vós."},{"t":"r","x":"Beneït sigueu per sempre, Senyor."},{"t":"p","x":"Senyor Jesús, que per intercessió de la vostra Mare a Canà de Galilea"},{"t":"p","x":"vàreu convertir l'aigua en vi,"},{"t":"p","x":"beneïu aquests alimen /* ---------- utilitats ---------- */
const norm = s => (s||'').toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g,'');
const perTema = id => DADES.filter(p=>p.theme===id);
const idxDe = p => DADES.indexOf(p);
const troba = id => DADES.find(p=>String(p.id)===String(id));
const esc = s => s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
const incipit = p => { const l=p.lines.find(l=>l.t==='p'||l.t==='v'); return l?l.x:''; };

/* ---------- favorits ---------- */
let favs = new Set(); let favsMem = true;
async function carregaFavs(){
  try{ const r = await window.storage.get('cmf-favorits'); if(r&&r.value){favs=new Set(JSON.parse(r.value)); favsMem=false;} else {favsMem=false;} }
  catch(e){ favsMem=false; /* clau inexistent: ok */ }
}
async function desaFavs(){
  try{ await window.storage.set('cmf-favorits', JSON.stringify([...favs])); }catch(e){}
}
function toggleFav(id){ if(favs.has(id)) favs.delete(id); else favs.add(id); desaFavs(); render(); }

/* ---------- mida del text ---------- */
let mida = 1.28;
function canviaMida(d){ mida = Math.min(2.4, Math.max(.95, mida + d)); document.documentElement.style.setProperty('--fs-preg', mida+'rem'); }

/* ---------- índex lateral ---------- */
function pintaIdx(temaActiu){
  const nav = document.getElementById('idxNav');
  let h = '<div class="idx-titol">Temes</div>';
  for(const t of TEMES){
    const n = perTema(t.id).length;
    h += `<a href="#/tema/${t.id}" class="${temaActiu===t.id?'actiu':''}">${esc(t.nom)}<span class="n">${n}</span></a>`;
  }
  if(favs.size) h += `<div class="idx-titol">Preparació</div><a href="#/favorits" class="${temaActiu==='__fav'?'actiu':''}">Les meves pregàries<span class="n">${favs.size}</span></a>`;
  nav.innerHTML = h;
}

/* ---------- cerca ---------- */
function cercaHTML(valor){
  return `<div class="cerca-wrap"><span class="cerca-ico">⌕</span>
  <input id="cerca" class="cerca" type="search" value="${esc(valor||'')}" placeholder="Cerca per número, títol o paraules… (p. ex. «33», «malalts», «Cor de Maria»)" aria-label="Cerca de pregàries" autocomplete="off"></div>`;
}
function lligaCerca(){
  const el = document.getElementById('cerca'); if(!el) return;
  el.addEventListener('input', ()=>{ const q=el.value.trim();
    history.replaceState(null,'', q? '#/cerca/'+encodeURIComponent(q) : '#/');
    pintaResultats(q);
  });
  el.addEventListener('keydown', e=>{ if(e.key==='Enter'){ const q=el.value.trim(); const ex=DADES.find(p=>String(p.num)===q); if(ex) location.hash='#/p/'+ex.id; } });
}
function cercaPreg(q){
  const nq = norm(q); if(!nq) return [];
  const numEx = DADES.filter(p=>String(p.num||'')===q.trim());
  const res = DADES.map(p=>{
    let s=0;
    if(String(p.num||'')===q.trim()) s+=100;
    else if(String(p.num||'').startsWith(q.trim()) && /^\d/.test(q)) s+=40;
    if(norm(p.title).includes(nq)) s+=30;
    if(norm(p.sub||'').includes(nq)) s+=14;
    if((p.tags||[]).some(t=>norm(t).includes(nq))) s+=14;
    const cos = norm(p.lines.map(l=>l.x).join(' '));
    if(cos.includes(nq)) s+=8;
    return {p,s};
  }).filter(r=>r.s>0).sort((a,b)=>b.s-a.s).map(r=>r.p);
  return res;
}
function itemHTML(p, mostraTema){
  const t = TEMES.find(t=>t.id===p.theme);
  return `<li class="preg-item"><a href="#/p/${p.id}">
    <span class="foli">${p.num?esc(String(p.num)):'·'}</span>
    <span><span class="tt">${esc(p.title)}${favs.has(String(p.id))?' <span class="fav-cinta">❧</span>':''}</span>
    <span class="inc">${esc(incipit(p))}</span></span>
    ${mostraTema&&t?`<span class="res-tema">${esc(t.nom)}</span>`:(p.sub?`<span class="etq">${esc(p.sub)}</span>`:'')}
  </a></li>`;
}
function pintaResultats(q){
  const cont = document.getElementById('resultats'); if(!cont) return;
  if(!q){ cont.innerHTML = portadaCos(); return; }
  const res = cercaPreg(q);
  cont.innerHTML = res.length
    ? `<div class="res-cap">${res.length} pregàri${res.length===1?'a':'es'} trobad${res.length===1?'a':'es'}</div><ul class="llista">${res.map(p=>itemHTML(p,true)).join('')}</ul>`
    : `<div class="buit">No s\u2019ha trobat cap pregària amb «${esc(q)}».<br>Proveu amb el número, una paraula del títol o del text.</div>`;
}

function vistaPortada(q){

function vistaTema(id){
  const t = TEMES.find(t=>t.id===id); if(!t){ location.hash='#/'; return; }
  pintaIdx(id);
  const pl = perTema(id);
  const subs = [...new Set(pl.map(p=>p.sub).filter(Boolean))];
  let llista='';
  if(subs.length>1){
    for(const s of subs){ llista += `<div class="sub-grup">${esc(s)}</div><ul class="llista">${pl.filter(p=>p.sub===s).map(p=>itemHTML(p)).join('')}</ul>`; }
    const sense = pl.filter(p=>!p.sub);
    if(sense.length) llista = `<ul class="llista">${sense.map(p=>itemHTML(p)).join('')}</ul>` + llista;
  } else {
    llista = `<ul class="llista">${pl.map(p=>itemHTML(p)).join('')}</ul>`;
  }
  document.getElementById('pagina').innerHTML = cercaHTML('') +
   `<a class="torna" href="#/">← Tots els temes</a>
    <div class="tema-cap"><h2>${esc(t.nom)}</h2><div class="desc">${esc(t.desc)}</div></div>${llista}`;
  lligaCerca();
  window.scrollTo(0,0);
}

   (pl.length?`<ul class="llista">${pl.map(p=>itemHTML(p,true)).join('')}</ul>`
    :`<div class="buit">Encara no heu marcat cap pregària.<br>Obriu-ne una i toqueu «Marca-la» per guardar-la aquí.</div>`);
  lligaCerca(); window.scrollTo(0,0);

function liniaHTML(l, prev){
  if(l.t==='rub') return `<p class="rub">${esc(l.x)}</p>`;
  if(l.t==='v') return `<p class="vers${prev&&prev.t==='r'?' espai':''}">${esc(l.x)}</p>`;
  if(l.t==='r') return `<p class="resp">${esc(l.x)}</p>`;
  const espai = prev && (prev.t==='r') ? ' espai':'';
  return `<p class="${espai.trim()}">${esc(l.x)}</p>`;
}
function vistaPreg(id){
  const p = troba(id); if(!p){ location.hash='#/'; return; }
  pintaIdx(p.theme);
  const t = TEMES.find(t=>t.id===p.theme);
  const i = idxDe(p), ant = DADES[i-1], seg = DADES[i+1];
  let cos=''; let prev=null;
  for(const l of p.lines){ cos += liniaHTML(l, prev); prev=l; }
  const fav = favs.has(String(p.id));
  document.getElementById('pagina').innerHTML = cercaHTML('') +
   `<a class="torna" href="#/tema/${p.theme}">← ${esc(t?t.nom:'Temes')}</a>
    <article class="preg-full">
      <div class="preg-meta">${esc(t?t.nom:'')}${p.sub?' · '+esc(p.sub):''}</div>
      ${p.num?`<div class="preg-num">${esc(String(p.num))}</div>`:''}
      <h2 class="preg-titol">${esc(p.title)}</h2>
      <div class="preg-eines">
        <button class="eina surt-lectura" id="btnLectura">📖 Mode pregària</button>
        <button class="eina ${fav?'fav-actiu':''}" id="btnFav">${fav?'❧ Marcada':'❧ Marca-la'}</button>
        <button class="eina" id="btnCopia">Copia el text</button>
        <button class="eina" onclick="window.print()">Imprimeix</button>
        <span class="mida-grup"><button class="eina mida" id="btnMenys" aria-label="Text més petit">A−</button><button class="eina mida" id="btnMes" aria-label="Text més gran">A+</button></span>
      </div>
      <div class="preg-cos" id="cosPreg">${cos}</div>
    </article>
    <nav class="nav-pn">
      ${ant?`<a href="#/p/${ant.id}"><span class="pn-l">← Anterior</span><span class="pn-t">${ant.num?ant.num+'. ':''}${esc(ant.title)}</span></a>`:'<span></span>'}
      ${seg?`<a class="seg" href="#/p/${seg.id}"><span class="pn-l">Següent →</span><span class="pn-t">${seg.num?seg.num+'. ':''}${esc(seg.title)}</span></a>`:''}
    </nav>`;
  lligaCerca();
  document.getElementById('btnFav').onclick = ()=>toggleFav(String(p.id));
  document.getElementById('btnMes').onclick = ()=>canviaMida(.12);
  document.getElementById('btnMenys').onclick = ()=>canviaMida(-.12);
  document.getElementById('btnCopia').onclick = e=>{
    const txt = (p.num?p.num+'. ':'')+p.title+'\n\n'+p.lines.map(l=>{
      if(l.t==='v')return 'V/. '+l.x; if(l.t==='r')return 'R/. '+l.x; return l.x;}).join('\n');
    navigator.clipboard.writeText(txt).then(()=>{e.target.textContent='Copiat ✓'; setTimeout(()=>e.target.textContent='Copia el text',1600);}).catch(()=>{});
  };
  const bl = document.getElementById('btnLectura');
  bl.onclick = ()=>{
    document.body.classList.toggle('lectura');
    const on = document.body.classList.contains('lectura');
    bl.textContent = on ? '✕ Surt del mode pregària' : '📖 Mode pregària';
    if(on && mida<1.6){ mida=1.6; document.documentElement.style.setProperty('--fs-preg',mida+'rem'); }
    window.scrollTo(0,0);
  };
  window.scrollTo(0,0);
}

/* ---------- router ---------- */
function render(){
  document.body.classList.remove('lectura');
  const h = location.hash || '#/';
  const m1 = h.match(/^#\/tema\/(.+)$/);
  const m2 = h.match(/^#\/p\/(.+)$/);
  const m3 = h.match(/^#\/cerca\/(.+)$/);
  if(m1) vistaTema(decodeURIComponent(m1[1]));
  else if(m2) vistaPreg(decodeURIComponent(m2[1]));
  else if(m3) vistaPortada(decodeURIComponent(m3[1]));
  else if(h==='#/favorits') vistaFavorits();
  else vistaPortada('');
}
window.addEventListener('hashchange', render);
document.getElementById('toggleIdx').addEventListener('click', function(){
  const sp = document.querySelector('.spine'); sp.classList.toggle('open');
  this.setAttribute('aria-expanded', sp.classList.contains('open'));
  this.textContent = sp.classList.contains('open') ? 'Amaga l\u2019índex' : 'Índex de temes';
});
document.querySelector('.idx').addEventListener('click', ()=>{ if(innerWidth<=900){ document.querySelector('.spine').classList.remove('open'); }});

carregaFavs().then(render);
render();
</script>
</body>
</html>
