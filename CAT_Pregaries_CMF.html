<!DOCTYPE html>
<html lang="ca">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pregàries Claretianes · CMF</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,500;0,600;0,700;1,500&family=EB+Garamond:ital,wght@0,400;0,500;0,600;1,400;1,500&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<style>
:root{
  --granat:#6E1423; --granat-fosc:#520E1A; --granat-clar:#8C2333;
  --or:#A87B2D; --or-clar:#C9A45C;
  --paper:#FAF6ED; --paper-2:#F3EDDF; --paper-3:#ECE4D2;
  --tinta:#26211A; --tinta-2:#5A5246; --tinta-3:#8A8070;
  --linia:#DDD3BE;
  --fs-preg:1.28rem;
  --serif:'EB Garamond',Georgia,serif;
  --display:'Cormorant Garamond',Georgia,serif;
  --ui:'Inter',system-ui,sans-serif;
}
*{margin:0;padding:0;box-sizing:border-box}
html{scroll-behavior:smooth}
body{background:var(--paper);color:var(--tinta);font-family:var(--serif);min-height:100vh}
button{font-family:inherit;cursor:pointer;background:none;border:none;color:inherit}
a{color:inherit}

/* ============ LAYOUT ============ */
.shell{display:grid;grid-template-columns:300px 1fr;min-height:100vh}
@media(max-width:900px){.shell{grid-template-columns:1fr}}

/* ============ SIDEBAR (llom del llibre) ============ */
.spine{background:linear-gradient(175deg,var(--granat) 0%,var(--granat-fosc) 100%);color:#F5E9D7;padding:2rem 1.5rem 2.5rem;position:sticky;top:0;height:100vh;overflow-y:auto;scrollbar-width:thin;scrollbar-color:var(--granat-clar) transparent}
.spine::after{content:'';position:fixed;left:296px;top:0;bottom:0;width:4px;background:linear-gradient(90deg,rgba(0,0,0,.28),transparent);pointer-events:none}
@media(max-width:900px){
  .spine{position:relative;height:auto;padding:1.4rem 1.2rem 1.2rem}
  .spine::after{display:none}
  .spine .idx{display:none}
  .spine.open .idx{display:block}
}
.marca{display:flex;align-items:baseline;gap:.6rem;margin-bottom:.35rem}
.marca .creu{font-family:var(--display);font-size:1.5rem;color:var(--or-clar)}
.marca h1{font-family:var(--display);font-weight:600;font-size:1.62rem;line-height:1.1;letter-spacing:.01em}
.marca h1 a{text-decoration:none}
.sub-marca{font-family:var(--ui);font-size:.68rem;letter-spacing:.22em;text-transform:uppercase;color:var(--or-clar);margin-bottom:1.6rem}
.idx-titol{font-family:var(--ui);font-size:.64rem;letter-spacing:.2em;text-transform:uppercase;color:rgba(245,233,215,.55);margin:1.5rem 0 .55rem;padding-bottom:.4rem;border-bottom:1px solid rgba(245,233,215,.18)}
.idx a{display:flex;justify-content:space-between;align-items:baseline;gap:.5rem;text-decoration:none;padding:.34rem .5rem;margin:0 -.5rem;border-radius:4px;font-size:1.02rem;line-height:1.25;transition:background .15s}
.idx a:hover,.idx a:focus-visible{background:rgba(255,255,255,.09);outline:none}
.idx a.actiu{background:rgba(255,255,255,.13)}
.idx a .n{font-family:var(--ui);font-size:.66rem;color:var(--or-clar);letter-spacing:.05em;flex-shrink:0}
.toggle-idx{display:none;font-family:var(--ui);font-size:.72rem;letter-spacing:.14em;text-transform:uppercase;color:var(--or-clar);border:1px solid rgba(201,164,92,.5);border-radius:20px;padding:.42rem 1rem;margin-top:.8rem}
@media(max-width:900px){.toggle-idx{display:inline-block}}

/* ============ PÀGINA ============ */
.pagina{padding:2.6rem clamp(1.2rem,5vw,4.5rem) 5rem;max-width:880px;width:100%;margin:0 auto}
@media(max-width:900px){.pagina{padding-top:1.6rem}}

/* cerca */
.cerca-wrap{position:relative;margin-bottom:1.8rem}
.cerca{width:100%;font-family:var(--serif);font-size:1.12rem;padding:.85rem 1.1rem .85rem 2.9rem;border:1px solid var(--linia);border-radius:8px;background:#fff;color:var(--tinta);box-shadow:0 1px 3px rgba(60,45,20,.06)}
.cerca:focus{outline:2px solid var(--granat);outline-offset:-1px}
.cerca::placeholder{color:var(--tinta-3);font-style:italic}
.cerca-ico{position:absolute;left:1rem;top:50%;transform:translateY(-50%);color:var(--tinta-3);pointer-events:none}

/* portada */
.eyebrow{font-family:var(--ui);font-size:.68rem;letter-spacing:.24em;text-transform:uppercase;color:var(--granat);margin-bottom:.5rem}
.portada h2{font-family:var(--display);font-weight:600;font-size:clamp(1.7rem,3.4vw,2.3rem);line-height:1.12;margin-bottom:.7rem}
.portada p.intro{font-size:1.12rem;color:var(--tinta-2);max-width:56ch;line-height:1.55;margin-bottom:2rem}

.chips{display:flex;flex-wrap:wrap;gap:.5rem;margin-bottom:2.4rem}
.chip{font-family:var(--ui);font-size:.78rem;font-weight:500;padding:.42rem .95rem;border:1px solid var(--linia);border-radius:100px;background:#fff;color:var(--tinta-2);transition:all .15s;text-decoration:none;display:inline-block}
.chip:hover,.chip:focus-visible{border-color:var(--granat);color:var(--granat);outline:none}

.temes-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(235px,1fr));gap:.9rem}
.tema-card{position:relative;background:#fff;border:1px solid var(--linia);border-radius:8px;padding:1.2rem 1.15rem 1.05rem;text-align:left;text-decoration:none;transition:border-color .15s, box-shadow .15s;overflow:hidden;display:block}
.tema-card:hover,.tema-card:focus-visible{border-color:var(--granat);box-shadow:0 3px 12px rgba(110,20,35,.09);outline:none}
.tema-card::before{content:'';position:absolute;left:0;top:0;bottom:0;width:4px;background:var(--granat)}
.tema-card h3{font-family:var(--display);font-weight:600;font-size:1.28rem;line-height:1.15;margin-bottom:.3rem}
.tema-card .desc{font-size:.95rem;font-style:italic;color:var(--tinta-2);line-height:1.35;margin-bottom:.55rem}
.tema-card .compta{font-family:var(--ui);font-size:.66rem;letter-spacing:.12em;text-transform:uppercase;color:var(--or)}

/* llista de pregàries */
.torna{font-family:var(--ui);font-size:.74rem;letter-spacing:.12em;text-transform:uppercase;color:var(--granat);text-decoration:none;display:inline-flex;align-items:center;gap:.4rem;margin-bottom:1.4rem}
.torna:hover{text-decoration:underline}
.tema-cap h2{font-family:var(--display);font-weight:600;font-size:clamp(1.6rem,3vw,2.1rem);margin-bottom:.35rem}
.tema-cap .desc{font-size:1.08rem;font-style:italic;color:var(--tinta-2);margin-bottom:1.7rem;max-width:60ch;line-height:1.5}
.sub-grup{font-family:var(--ui);font-size:.68rem;letter-spacing:.2em;text-transform:uppercase;color:var(--granat);margin:1.8rem 0 .6rem;display:flex;align-items:center;gap:.8rem}
.sub-grup::after{content:'';flex:1;height:1px;background:var(--linia)}
.llista{list-style:none}
.preg-item{border-bottom:1px solid var(--linia)}
.preg-item a{display:flex;gap:1rem;align-items:baseline;padding:.85rem .4rem;text-decoration:none;transition:background .12s}
.preg-item a:hover,.preg-item a:focus-visible{background:rgba(110,20,35,.045);outline:none}
.foli{font-family:var(--display);font-weight:700;font-size:1.05rem;color:var(--granat);min-width:2.6rem;text-align:right;flex-shrink:0;font-variant-numeric:oldstyle-nums}
.preg-item .tt{font-size:1.16rem;line-height:1.3}
.preg-item .inc{display:block;font-size:.92rem;font-style:italic;color:var(--tinta-3);margin-top:.1rem;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:58ch}
.preg-item .etq{font-family:var(--ui);font-size:.62rem;letter-spacing:.1em;text-transform:uppercase;color:var(--or);margin-left:auto;flex-shrink:0}
.buit{padding:2.5rem 0;text-align:center;color:var(--tinta-3);font-style:italic;font-size:1.08rem}

/* resultat de cerca */
.res-cap{font-family:var(--ui);font-size:.72rem;letter-spacing:.16em;text-transform:uppercase;color:var(--tinta-3);margin-bottom:.8rem}
.res-tema{font-family:var(--ui);font-size:.62rem;letter-spacing:.1em;text-transform:uppercase;color:var(--or);margin-left:auto;flex-shrink:0}

/* ============ PREGÀRIA ============ */
.preg-full{background:#fff;border:1px solid var(--linia);border-radius:10px;padding:clamp(1.6rem,4vw,3.2rem) clamp(1.3rem,4.5vw,3.6rem) clamp(2rem,4vw,3rem);box-shadow:0 2px 14px rgba(60,45,20,.07);position:relative}
.preg-full::before{content:'';position:absolute;top:-1px;left:clamp(1.3rem,4.5vw,3.6rem);width:26px;height:44px;background:var(--granat);clip-path:polygon(0 0,100% 0,100% 100%,50% 82%,0 100%)}
.preg-meta{font-family:var(--ui);font-size:.66rem;letter-spacing:.2em;text-transform:uppercase;color:var(--or);margin-bottom:.9rem;padding-left:3.2rem}
.preg-num{font-family:var(--display);font-weight:700;font-size:2.6rem;line-height:1;color:var(--granat);float:left;margin:-.3rem 1rem .2rem 0;font-variant-numeric:oldstyle-nums}
.preg-titol{font-family:var(--display);font-weight:600;font-size:clamp(1.55rem,3vw,2.05rem);line-height:1.15;margin-bottom:1.4rem}
.preg-cos{clear:both;font-size:var(--fs-preg);line-height:1.62;border-top:1px solid var(--linia);padding-top:1.5rem}
.preg-cos p{margin-bottom:.16em}
.preg-cos p.espai{margin-top:.9em}
.preg-cos .rub{font-family:var(--ui);font-size:.72em;letter-spacing:.16em;text-transform:uppercase;color:var(--or);margin:1.1em 0 .5em;font-style:normal}
.preg-cos .vers{position:relative;padding-left:1.9em}
.preg-cos .vers::before{content:'V/.';position:absolute;left:0;font-style:italic;color:var(--tinta-3);font-size:.85em;top:.15em}
.preg-cos .resp{position:relative;padding-left:1.9em;color:var(--granat);font-style:italic;font-weight:500;margin-bottom:.45em}
.preg-cos .resp::before{content:'R/.';position:absolute;left:0;color:var(--granat);font-size:.85em;font-style:italic;top:.15em}
.preg-eines{display:flex;gap:.5rem;flex-wrap:wrap;margin:1.3rem 0 1.6rem;align-items:center}
.eina{font-family:var(--ui);font-size:.76rem;font-weight:500;padding:.48rem .95rem;border:1px solid var(--linia);border-radius:6px;background:#fff;color:var(--tinta-2);display:inline-flex;align-items:center;gap:.45rem;transition:all .15s}
.eina:hover,.eina:focus-visible{border-color:var(--granat);color:var(--granat);outline:none}
.eina.fav-actiu{background:var(--granat);border-color:var(--granat);color:#F5E9D7}
.mida-grup{display:inline-flex;border:1px solid var(--linia);border-radius:6px;overflow:hidden;margin-left:auto}
.mida-grup .eina{border:none;border-radius:0;padding:.48rem .8rem}
.mida-grup .eina+.eina{border-left:1px solid var(--linia)}
.nav-pn{display:flex;justify-content:space-between;gap:1rem;margin-top:1.6rem}
.nav-pn a{font-family:var(--ui);font-size:.78rem;color:var(--tinta-2);text-decoration:none;display:flex;flex-direction:column;gap:.15rem;max-width:46%}
.nav-pn a:hover .pn-t{color:var(--granat)}
.nav-pn .pn-l{font-size:.62rem;letter-spacing:.16em;text-transform:uppercase;color:var(--tinta-3)}
.nav-pn .pn-t{font-family:var(--serif);font-size:1.02rem;line-height:1.25;transition:color .15s}
.nav-pn a.seg{text-align:right;margin-left:auto}

/* mode lectura */
body.lectura .spine,body.lectura .cerca-wrap,body.lectura .torna,body.lectura .preg-eines .eina:not(.surt-lectura):not(.mida),body.lectura .nav-pn,body.lectura .preg-meta{display:none}
body.lectura .shell{grid-template-columns:1fr}
body.lectura .pagina{max-width:820px;padding-top:2.2rem}
body.lectura .preg-full{border:none;box-shadow:none;background:var(--paper)}
body.lectura .preg-full::before{display:none}
body.lectura{--fs-preg:1.6rem}
body.lectura .preg-eines{position:sticky;top:0;background:var(--paper);padding:.6rem 0;z-index:5;margin-top:0}

/* favorits ribbon on list */
.fav-cinta{color:var(--granat);flex-shrink:0;font-size:.85rem}

@media(prefers-reduced-motion:reduce){*{transition:none!important;scroll-behavior:auto!important}}

@media print{
  .spine,.cerca-wrap,.torna,.preg-eines,.nav-pn,.toggle-idx{display:none!important}
  .shell{display:block}
  body{background:#fff}
  .preg-full{border:none;box-shadow:none;padding:0}
  .preg-full::before{display:none}
  .pagina{padding:0;max-width:none}
}
</style>
</head>
<body>
<div class="shell">
  <aside class="spine">
    <div class="marca"><span class="creu">✠</span><h1><a href="#/">Pregàries Claretianes</a></h1></div>
    <div class="sub-marca">Missioners Fills del Cor de Maria</div>
    <button class="toggle-idx" id="toggleIdx" aria-expanded="false">Índex de temes</button>
    <nav class="idx" id="idxNav" aria-label="Índex de temes"></nav>
  </aside>
  <main class="pagina" id="pagina"></main>
</div>
<script>
const DADES = [{"id":"1","num":"1","title":"Pregària apostòlica","theme":"deu-pare","sub":"de Sant Antoni Maria Claret","tags":[],"lines":[{"t":"p","x":"Senyor i Pare meu,"},{"t":"p","x":"que us conegui i us faci conèixer,"},{"t":"p","x":"que us estimi i us faci estimar,"},{"t":"p","x":"que us serveixi i us faci servir,"},{"t":"p","x":"que us lloï i us faci lloar de totes les criatures."},{"t":"p","x":"Amén."}]},{"id":"2","num":"2","title":"Providència de Déu","theme":"deu-pare","sub":null,"tags":[],"lines":[{"t":"p","x":"Beneït sigueu, Senyor, per la vostra providència"},{"t":"p","x":"i per la cura que sempre i a tot arreu heu tingut de mi. Amén."}]},{"id":"3","num":"3","title":"Estimar i servir Déu","theme":"deu-pare","sub":null,"tags":[],"lines":[{"t":"p","x":"Beneït sigueu, Senyor, pel vostre amor i misericòrdia amb mi."},{"t":"p","x":"Feu que us estimi i us serveixi"},{"t":"p","x":"i que us faci estimar i servir de totes les criatures. Amén."}]},{"id":"4","num":"4","title":"Petició del do de l'amor","theme":"deu-pare","sub":null,"tags":[],"lines":[{"t":"p","x":"Foc, que sempre cremeu i mai no us apagueu,"},{"t":"p","x":"amor, que sempre bulliu i mai no us esmorteïu,"},{"t":"p","x":"abruseu-me perquè us estimi."},{"t":"p","x":"Us estimo, Jesús, amb tot el meu cor,"},{"t":"p","x":"amb tota la meva ànima, amb totes les meves forces."},{"t":"p","x":"Voldria estimar-vos més i que tots us estimessin."},{"t":"p","x":"Voldria estimar-vos per mi i per totes les vostres criatures."},{"t":"p","x":"Verge Santíssima, concediu-me la gràcia"},{"t":"p","x":"que tots se salvin i ningú no es condemni. Amén."}]},{"id":"5","num":"5","title":"Unió amb Déu","theme":"deu-pare","sub":null,"tags":[],"lines":[{"t":"p","x":"Senyor, així com l'aigua s'ajunta al vi en l'eucaristia,"},{"t":"p","x":"així desitjo unir-me a Vós i oferir-me amb Vós a la Santíssima Trinitat. Amén."}]},{"id":"6","num":"6","title":"Déu Pare, vida, amor i esperança","theme":"deu-pare","sub":null,"tags":[],"lines":[{"t":"p","x":"Senyor meu, Vós sou el meu amor, la meva honra, la meva esperança, el meu refugi."},{"t":"p","x":"Vós la meva vida, la meva glòria, la meva fi, el meu Mestre, el meu Pare, el meu amor. Amén."}]},{"id":"7","num":"7","title":"Déu provident i salvador","theme":"deu-pare","sub":null,"tags":[],"lines":[{"t":"p","x":"Gràcies, Senyor per la vostra bondat,"},{"t":"p","x":"perquè us valeu de tots els mitjans per a la conversió dels pecadors."},{"t":"p","x":"Beneïda sigui la vostra providència, que sempre vetlla per mi."},{"t":"p","x":"Ara i sempre cantaré la vostra eterna misericòrdia. Amén."}]},{"id":"8","num":"8","title":"Només Déu","theme":"deu-pare","sub":null,"tags":[],"lines":[{"t":"p","x":"Senyor, Vós sou el meu amor, la meva honra, la meva esperança i el meu refugi."},{"t":"p","x":"Vós sou la meva glòria i la meva fi. El meu mestre, el meu Pare."},{"t":"p","x":"Ajudeu-me a no buscar-vos, només a Vós, ni saber res que no sigui la vostra voluntat per complir-la."},{"t":"p","x":"Només us vull a Vós, i en Vós i per Vós i per a Vós, les altres coses."},{"t":"p","x":"Vós sou per a mi suficientíssim."},{"t":"p","x":"Feu que us estimi com Vós m'estimeu, i com voleu que jo us estimi. Amén."}]},{"id":"9","num":"9","title":"Tot per a la glòria de Déu","theme":"deu-pare","sub":null,"tags":[],"lines":[{"t":"p","x":"Vull estimar-vos, Déu meu,"},{"t":"p","x":"amb tot el meu cor, amb tot el meu ésser, amb totes les meves forces:"},{"t":"p","x":"us consagro els meus pensaments, desigs, paraules i accions,"},{"t":"p","x":"tot el que tinc i el que pugui tenir."},{"t":"p","x":"Feu que esmerci tot el que tinc per a major honra i glòria vostra segons la vostra voluntat. Amén."}]},{"id":"10","num":"10","title":"Per demanar l'Esperit","theme":"deu-pare","sub":null,"tags":["Esperit Sant"],"lines":[{"t":"p","x":"Us demano, Senyor, que, a causa de la meva fragilitat,"},{"t":"p","x":"m'envieu el vostre Esperit perquè m'il·lumini i encengui en el vostre amor,"},{"t":"p","x":"em dirigeixi i encamini pel camí recte de Jesucrist"},{"t":"p","x":"i de la Verge Maria, Mare de Déu i mare meva. Amén."}]},{"id":"11","num":"11","title":"Per demanar les virtuts","theme":"deu-pare","sub":null,"tags":[],"lines":[{"t":"p","x":"Crec, Senyor, però que la meva fe sigui més ferma."},{"t":"p","x":"Espero, Senyor, però que esperi amb més seguretat."},{"t":"p","x":"Estimo, Senyor, però que estimi amb més ardor."},{"t":"p","x":"Tinc dolor, Senyor, però que el tingui més vehement."},{"t":"p","x":"Us demano, Senyor, què voleu que faci?"},{"t":"p","x":"Ensenyeu-me a complir la vostra voluntat, perquè Vós sou el meu Déu."},{"t":"p","x":"Concediu-me un cor despert per jutjar el vostre poble,"},{"t":"p","x":"i discernir entre el bé i el mal."},{"t":"p","x":"Pare, doneu-me humilitat, mansuetud,"},{"t":"p","x":"castedat, paciència i caritat."},{"t":"p","x":"Pare, ensenyeu-me la bondat, la ciència i la disciplina."},{"t":"p","x":"Pare, doneu-me el vostre amor amb la vostra gràcia i seré ric amb escreix."},{"t":"p","x":"Déu meu, Jesús meu i totes les meves coses."},{"t":"p","x":"Visc en la creu i en la creu vull morir,"},{"t":"p","x":"i espero davallar de la creu, no per les mans meves, sinó per les d’altri,"},{"t":"p","x":"un cop s’haurà consumat el meu sacrifici."},{"t":"p","x":"Ara el que és jo, Déu me’n guard de posar la meva glòria en res més"},{"t":"p","x":"que en la creu del Senyor meu Jesucrist,"},{"t":"p","x":"pel qual el món és per a mi un crucificat i jo sóc un crucificat per al món."},{"t":"p","x":"Amén."}]},{"id":"12","num":"12","title":"Exercici d'amor de Déu","theme":"deu-pare","sub":null,"tags":[],"lines":[{"t":"p","x":"Déu meu, sigueu Déu com sou i per sempre:"},{"t":"p","x":"m'alegro que ho sigueu."},{"t":"p","x":"Vós teniu poder infinit:"},{"t":"p","x":"sigueu Déu Totpoderós com ho sou."},{"t":"p","x":"Vós teniu saviesa infinita:"},{"t":"p","x":"lloat sigueu;"},{"t":"p","x":"tingueu infinita saviesa com la teniu."},{"t":"p","x":"Vós teniu bondat infinita,"},{"t":"p","x":"caritat infinita i clemència infinita."},{"t":"p","x":"Tingueu, Senyor, bondat,"},{"t":"p","x":"caritat i clemència infinita com la teniu."},{"t":"p","x":"Vós, Senyor, tingueu misericòrdia,"},{"t":"p","x":"providència i liberalitat com la teniu."},{"t":"p","x":"Vós, Senyor, sou gloriós i benaurat per sempre més;"},{"t":"p","x":"sigueu gloriós i benaurat com ho sou."},{"t":"p","x":"Vós, Senyor, sou Tri i U,"},{"t":"p","x":"Pare, Fill i Esperit Sant,"},{"t":"p","x":"tres persones distintes i un sol Déu veritable;"},{"t":"p","x":"sigueu Tri i U com ho sou."},{"t":"p","x":"Sou Salvador i glorificador nostre"},{"t":"p","x":"i de totes les criatures; lloat sigueu."},{"t":"p","x":"Vós, Senyor, sou Senyor universal"},{"t":"p","x":"a qui estimen, lloen i serveixen els àngels"},{"t":"p","x":"i els benaurats al cel i els homes a la terra;"},{"t":"p","x":"sigueu Vós Senyor de tots,"},{"t":"p","x":"i tots al cel i a la terra us estimem,"},{"t":"p","x":"lloem i servim per sempre."},{"t":"p","x":"Cor de Jesús, estimeu Déu per mi."},{"t":"p","x":"Cor de Maria, estimeu Déu per mi."},{"t":"p","x":"Cor de tots els sants, estimeu Déu per mi."},{"t":"p","x":"Cors de tots els àngels, estimeu Déu per mi."},{"t":"p","x":"Criatures totes, estimeu Déu per mi."},{"t":"p","x":"Foc diví que sempre cremeu i mai no us extingiu."},{"t":"p","x":"Cor de Jesús, que sempre cremeu i mai no us esmorteïu,"},{"t":"p","x":"feu que el meu cor cremi sempre en el foc de l’amor diví. Amén."}]},{"id":"13","num":"13","title":"Lletania claretiana d'invocacions a Maria","theme":"cor-maria","sub":"del P. Fundador","tags":["lletania"],"lines":[{"t":"p","x":"Santa Maria, Filla del Pare."},{"t":"r","x":"Pregueu per nosaltres."},{"t":"p","x":"Santa Maria, Mare del Fill."},{"t":"p","x":"Santa Maria, Temple de l'Esperit Sant."},{"t":"p","x":"Terme i coronació de la Trinitat."},{"t":"p","x":"Delícia de Déu."},{"t":"p","x":"L'obra més perfecta de Déu."},{"t":"p","x":"Concebuda en gràcia."},{"t":"p","x":"En qui brillen l’omnipotència, saviesa i bondat de Déu."},{"t":"p","x":"Concebuda en gràcia, confirmada en gràcia i plena de gràcia."},{"t":"p","x":"Exempta de tot contagi de pecat."},{"t":"p","x":"Criatura singularíssima i predilecta."},{"t":"p","x":"Purificada i santificada en la seva mateixa concepció."},{"t":"p","x":"Preservada de tota culpa."},{"t":"p","x":"Hereva del cel."},{"t":"p","x":"Confirmada en gràcia."},{"t":"p","x":"Enlairada a dignitat gairebé infinita."},{"t":"p","x":"Plena de gràcia."},{"t":"p","x":"La més pura i de més encesa caritat."},{"t":"p","x":"Mare de Déu i dels homes."},{"t":"p","x":"Mare de Déu humanat."},{"t":"p","x":"Mare veritable."},{"t":"p","x":"Mare espiritual."},{"t":"p","x":"Mare del bell amor."},{"t":"p","x":"Mare de caritat."},{"t":"p","x":"Mare de pietat i de misericòrdia."},{"t":"p","x":"Mare dels vivents."},{"t":"p","x":"Mare entranyable."},{"t":"p","x":"Mare, mestra i directora."},{"t":"p","x":"Mare que ens va rebre de Déu com a fills."},{"t":"p","x":"Formadora i guia d'apòstols i missioners."},{"t":"p","x":"Mare i advocada dels pecadors."},{"t":"p","x":"Mare, alleujament, fortalesa i consol."},{"t":"p","x":"Dispensadora de misericòrdies."},{"t":"p","x":"Canal de gràcia."},{"t":"p","x":"Refugi de desvalguts."},{"t":"p","x":"Nord de navegants."},{"t":"p","x":"Salut de malalts."},{"t":"p","x":"Alè de moribunds."},{"t":"p","x":"Redemptora de captius."},{"t":"p","x":"Insigne advocada."},{"t":"p","x":"Consol d'afligits."},{"t":"p","x":"Escala del cel."},{"t":"p","x":"Finestra del paradís."},{"t":"p","x":"Reina de cel i terra."},{"t":"p","x":"Reina i senyora de la gràcia."},{"t":"p","x":"Cor de l'Església."},{"t":"p","x":"Cor del món cristià."}]},{"id":"14","num":"14","title":"Súplica a Maria","theme":"cor-maria","sub":"del P. Fundador","tags":[],"lines":[{"t":"p","x":"Verge i Mare de Déu,"},{"t":"p","x":"gireu els vostres ulls misericordiosos vers nosaltres"},{"t":"p","x":"que ens trobem en aquesta vall de llàgrimes,"},{"t":"p","x":"i que confiem en vós perquè som els vostres fills."},{"t":"p","x":"Ajudeu-nos a anunciar la Bona Nova del Regne"},{"t":"p","x":"en fidelitat i fortalesa,"},{"t":"p","x":"perquè són molts els qui s'hi oposen"},{"t":"p","x":"per ambició de poder, per afany de riqueses o per ànsia de plaers."},{"t":"p","x":"Disposeu de mi per a cooperar amb el vostre ofici maternal"},{"t":"p","x":"a la missió apostòlica."},{"t":"p","x":"Amén."}]},{"id":"15","num":"15","title":"Invocacions a Maria","theme":"cor-maria","sub":"del P. Fundador","tags":[],"lines":[{"t":"p","x":"Déu vos salve, Immaculada Maria, Filla de Déu Pare."},{"t":"p","x":"Déu vos salve, Immaculada Maria, Mare de Déu Fill."},{"t":"p","x":"Déu vos salve, Immaculada Maria, Temple de Déu Esperit Sant."},{"t":"p","x":"Déu vos salve Maria, mare i advocada dels pecadors."},{"t":"p","x":"Beneïda sou entre totes les dones."},{"t":"p","x":"Vós sou la glòria de Jerusalem,"},{"t":"p","x":"l'alegria d'Israel i l'honor del nostre poble."},{"t":"p","x":"Vós sou l'empara dels desvalguts,"},{"t":"p","x":"el consol dels afligits, el nord dels navegants."},{"t":"p","x":"Vós sou la salut dels malalts, l'alè dels moribunds,"},{"t":"p","x":"i la porta del cel."},{"t":"p","x":"Vós sou, després de Jesucrist, fruit beneït del vostre ventre,"},{"t":"p","x":"tota la nostra esperança."},{"t":"p","x":"Oh clement, oh pia, oh dolça i Immaculada Maria."}]},{"id":"16","num":"16","title":"Mare de l'Amor diví","theme":"cor-maria","sub":"del P. Fundador","tags":[],"lines":[{"t":"p","x":"Maria, Mare meva, Mare de l’Amor diví! No puc demanar res que us sigui més agradable ni més fàcil de concedir"},{"t":"p","x":"que l’amor diví."},{"t":"p","x":"Concediu-me'l, Mare meva."},{"t":"p","x":"Mare meva, tinc fam i set d'amor."},{"t":"p","x":"Socorreu-me, sacieu-me."},{"t":"p","x":"Oh, Cor de Maria, farga i instrument de l'amor,"},{"t":"p","x":"enceneu-me en l'amor de Déu i del proïsme!"}]},{"id":"17","num":"17","title":"Fill i Ministre de Maria","theme":"cor-maria","sub":"del P. Fundador","tags":[],"lines":[{"t":"p","x":"Oh Verge i Mare de Déu!,"},{"t":"p","x":"sabeu prou bé que som fills i ministres vostres,"},{"t":"p","x":"formats per Vós mateixa"},{"t":"p","x":"en la farga de la vostra misericòrdia i amor."},{"t":"p","x":"Som com una fletxa posada en la vostra mà poderosa."},{"t":"p","x":"Llanceu-nos, Mare nostra,"},{"t":"p","x":"contra tot el que s'oposa al Regne de Déu."},{"t":"p","x":"Confiats en la vostra protecció,"},{"t":"p","x":"anunciarem l'Evangeli"},{"t":"p","x":"sense més armes que l’espasa de dos talls"},{"t":"p","x":"de la Paraula divina,"},{"t":"p","x":"sense més títols que el de fills del vostre Cor Immaculat."},{"t":"p","x":"Vostra serà, Mare, la victòria."},{"t":"p","x":"Amén."}]},{"id":"18","num":"18","title":"Configuració amb Crist","theme":"cor-maria","sub":"de la Congregació","tags":[],"lines":[{"t":"p","x":"Senyor i Déu nostre,"},{"t":"p","x":"que vau escollir Maria, la sempre Verge"},{"t":"p","x":"com a Mare del vostre Fill i Mare nostra;"},{"t":"p","x":"feu que, pel lliurament fidel al seu Cor maternal,"},{"t":"p","x":"ens configurem més plenament a Crist"},{"t":"p","x":"i cooperem amb el seu ofici maternal"},{"t":"p","x":"a la missió apostòlica."},{"t":"p","x":"Per Crist Senyor nostre."},{"t":"p","x":"Amén."}]},{"id":"19","num":"19","title":"Lletanies de la Mare de Déu inspirades en les Constitucions","theme":"cor-maria","sub":"de la Congregació","tags":["lletania"],"lines":[{"t":"p","x":"Oh Maria, els Fills del vostre Cor Immaculat,"},{"t":"p","x":"per la vostra fe obedient i per la vostra caritat ardent"},{"t":"p","x":"us proclamem “Benaurada” i us invoquem:"},{"t":"r","x":"Mare de Déu i mare nostra."},{"t":"r","x":"Beneïda sou vós entre totes les dones."},{"t":"r","x":"Mare de Jesucrist, nostre Senyor, enviat pel Pare."},{"t":"r","x":"Mare del Verb, fet home per obra de l'Esperit."},{"t":"r","x":"Mare del Fill ungit per a evangelitzar els pobres."},{"t":"r","x":"Fundadora, Patrona i Titular de la nostra Congregació."},{"t":"r","x":"Primera deixebla de Crist."},{"t":"r","x":"Model nostre en el seguiment de Jesús."},{"t":"r","x":"Primera entre els pobres del Senyor."},{"t":"r","x":"Esclava consagrada totalment a la persona i a l'obra del vostre Fill."},{"t":"r","x":"Mare i Mestra de Missioners."},{"t":"r","x":"Formadora d'Apòstols."},{"t":"rub","x":"Preguem:"},{"t":"p","x":"Déu Pare nostre, us donem gràcies"},{"t":"p","x":"perquè ens diem i som Fills del Cor Immaculat de Maria,"},{"t":"p","x":"feu que venerem amb amor i confiança la nostra Mare"},{"t":"p","x":"i ens lliurem a Ella perquè ens configuri a Crist"},{"t":"p","x":"i cooperem amb el seu ofici maternal"},{"t":"p","x":"a la missió apostòlica que ens heu confiat."},{"t":"p","x":"Amén."}]},{"id":"20","num":"20","title":"Oració filial i apostòlica al Cor de Maria","theme":"cor-maria","sub":"de la Congregació","tags":[],"lines":[{"t":"p","x":"Oh Verge i Mare de Déu!,"},{"t":"p","x":"jo m’ofereixo per fill i servent vostre."},{"t":"p","x":"Em consagro al vostre amor maternal"},{"t":"p","x":"perquè formeu en mi Jesús,"},{"t":"p","x":"el Fill i l'Enviat del Pare,"},{"t":"p","x":"l’Ungit per l'Esperit Sant"},{"t":"p","x":"per anunciar la Bona Nova als pobres."},{"t":"p","x":"Em poso a les vostres mans"},{"t":"p","x":"per tal que Ell m’enviï a tots els homes,"},{"t":"p","x":"fills vostres i germans meus."},{"t":"p","x":"Feu que els reveli el Pare."},{"t":"p","x":"Ensenyeu-me a guardar, com vós, la Paraula en el cor,"},{"t":"p","x":"fins a transformar-me en Evangeli viu"},{"t":"p","x":"del vostre amor matern,"},{"t":"p","x":"perquè es formin nous fills per a l’Evangeli."},{"t":"p","x":"Demaneu la força de l'Esperit"},{"t":"p","x":"perquè sigui testimoni de Crist entre els homes."},{"t":"p","x":"Infoneu-me el vostre amor matern"},{"t":"p","x":"perquè els reveli el Pare"},{"t":"p","x":"i sentin l'alegria de ser fills de Déu"},{"t":"p","x":"en la comunió fraterna de l'Església."},{"t":"p","x":"Mare, aquí teniu el vostre fill. Formeu-me."},{"t":"p","x":"Mare, aquí teniu el vostre fill. Envieu-me."},{"t":"p","x":"Mare, aquí teniu el vostre fill. Parleu per mi. Estimeu per mi."},{"t":"p","x":"Guardeu-me, no sigui que anunciant a d’altres l'Evangeli,"},{"t":"p","x":"quedi jo exclòs del Regne."},{"t":"p","x":"En Vós, Mare meva,"},{"t":"p","x":"he posada tota la meva confiança."},{"t":"p","x":"Mai no quedaré confós. Amén."}]},{"id":"21","num":"21","title":"Lletanies al Cor de Maria","theme":"cor-maria","sub":"de la Congregació","tags":["lletania"],"lines":[{"t":"p","x":"Senyor, tingueu pietat."},{"t":"p","x":"Crist, tingueu pietat."},{"t":"p","x":"Senyor, tingueu pietat."},{"t":"p","x":"Crist, oïu-nos."},{"t":"p","x":"Crist, escolteu-nos."},{"t":"p","x":"Déu, Pare celestial. Tingueu pietat de nosaltres."},{"t":"p","x":"Déu, Fill redemptor del món."},{"t":"p","x":"Déu, Esperit Sant."},{"t":"p","x":"Trinitat Santa, un sol Déu."},{"t":"p","x":"Cor de Maria, modelat pel Pare. Pregueu per nosaltres."},{"t":"p","x":"Cor de Maria, el més semblant al Cor de Jesús."},{"t":"p","x":"Cor de Maria, ornat amb tots els dons de l'Esperit Sant."},{"t":"p","x":"Cor de Maria, que estimeu el Pare amb amor de filla."},{"t":"p","x":"Cor de Maria, que estimeu el Fill amb amor de mare."},{"t":"p","x":"Cor de Maria, que estimeu l'Esperit Sant amb amor d'esposa."},{"t":"p","x":"Cor de Maria, que conserveu fidelment les paraules i accions de Jesús."},{"t":"p","x":"Cor de Maria, traspassat amb l'espasa de dolor."},{"t":"p","x":"Cor de Maria, clavat en la creu amb Crist crucificat."},{"t":"p","x":"Cor de Maria, vivificat per l'alegria de la resurrecció de Jesús."},{"t":"p","x":"Cor de Maria, curull de nova plenitud de gràcia en la vinguda de l'Esperit Sant."},{"t":"p","x":"Cor de Maria, morada de Déu, plena de la seva glòria."},{"t":"p","x":"Cor de Maria, arca de l'aliança de Déu amb els homes."},{"t":"p","x":"Cor de Maria, habitacle de Déu i dels homes."},{"t":"p","x":"Cor de Maria, que heu portat la salvació del món."},{"t":"p","x":"Cor de Maria, sempre Immaculat."},{"t":"p","x":"Cor de Maria, ple de gràcia."},{"t":"p","x":"Cor de Maria, beneït entre tots els cors."},{"t":"p","x":"Cor de Maria, abisme d'humilitat."},{"t":"p","x":"Cor de Maria, tron de misericòrdia."},{"t":"p","x":"Cor de Maria, forja d'amor diví."},{"t":"p","x":"Cor de Maria, que obteniu la gràcia als pecadors."},{"t":"p","x":"Cor de Maria, roca invencible de fe."},{"t":"p","x":"Cor de Maria, font d'amistat perfecta."},{"t":"p","x":"Cor de Maria, suport de l'Església en el seu caminar vers el Pare."},{"t":"p","x":"Cor de Maria, forja d'amor que ens configura amb Jesús."},{"t":"p","x":"Cor de Maria, Mare i formadora nostra."},{"t":"p","x":"Cor de Maria, consol d'afligits."},{"t":"p","x":"Cor de Maria, refugi de pecadors."},{"t":"p","x":"Cor de Maria, auxili dels agonitzants."},{"t":"p","x":"Cor de Maria, esperança del món."},{"t":"p","x":"Cor de Maria, senyora dels nostres cors."},{"t":"p","x":"Cor de Maria, reina de la pau."},{"t":"p","x":"Anyell de Déu que lleveu el pecat del món."},{"t":"r","x":"Perdoneu-nos, Senyor."},{"t":"p","x":"Anyell de Déu que lleveu el pecat del món."},{"t":"r","x":"Escolteu-nos, Senyor."},{"t":"p","x":"Anyell de Déu que lleveu el pecat del món."},{"t":"r","x":"Tingueu pietat de nosaltres."},{"t":"p","x":"Pregueu per nosaltres, Santa Mare de Déu."},{"t":"r","x":"perquè siguem dignes d'obtenir les promeses de Jesucrist"},{"t":"rub","x":"Preguem:"},{"t":"p","x":"Senyor, Déu nostre,"},{"t":"p","x":"que vau fer del Cor Immaculat de Maria"},{"t":"p","x":"una mansió per al vostre Fill i un santuari de l'Esperit Sant,"},{"t":"p","x":"doneu-nos un cor net i dòcil,"},{"t":"p","x":"perquè, complint sempre la vostra voluntat,"},{"t":"p","x":"us estimem sobre totes les coses"},{"t":"p","x":"i ajudem els germans en les seves necessitats."},{"t":"p","x":"Per Crist Senyor nostre."},{"t":"p","x":"Amén."}]},{"id":"22","num":"22","title":"Acció de gràcies pel Cor de Maria","theme":"cor-maria","sub":"de la Congregació","tags":[],"lines":[{"t":"p","x":"Us donem gràcies, Pare sant,"},{"t":"p","x":"perquè donàreu a la Mare de Déu un cor savi i dòcil,"},{"t":"p","x":"disposat sempre a agradar-vos,"},{"t":"p","x":"un cor nou i humil,"},{"t":"p","x":"per a gravar-hi la llei de la nova Aliança;"},{"t":"p","x":"un cor senzill i net,"},{"t":"p","x":"que la va fer digna de concebre virginalment el vostre Fill"},{"t":"p","x":"i capaç de contemplar-vos eternament;"},{"t":"p","x":"un cor ferm i amatent"},{"t":"p","x":"per a suportar amb fortalesa l'espasa de dolor,"},{"t":"p","x":"i esperar, plena de fe, la resurrecció del seu Fill."},{"t":"p","x":"Doneu-nos un cor savi i dòcil, nou i humil,"},{"t":"p","x":"senzill i net, ferm i amatent,"},{"t":"p","x":"perquè l’imitem i cooperem amb més fidelitat a la vostra obra de salvació."},{"t":"p","x":"Amén."}]},{"id":"23","num":"23","title":"Lliurament al Cor de Maria","theme":"cor-maria","sub":"de la Congregació","tags":[],"lines":[{"t":"p","x":"Mare del Senyor, Cor de Maria!"},{"t":"p","x":"Vós que presidíreu com a Fundadora"},{"t":"p","x":"l'origen de la nostra Congregació,"},{"t":"p","x":"sigueu sempre la nostra inspiradora i"},{"t":"p","x":"el cor de la nostra Congregació,"},{"t":"p","x":"necessitada de contemplació i de noves il·lusions,"},{"t":"p","x":"en aquest món, tan estimat pel Pare"},{"t":"p","x":"i tan afectat per la increença i la injustícia;"},{"t":"p","x":"parleu per nosaltres"},{"t":"p","x":"i testifiqueu a través de la nostra vida"},{"t":"p","x":"el missatge del Regne."},{"t":"p","x":"Mare del Senyor,"},{"t":"p","x":"pregueu perquè vingui a nosaltres"},{"t":"p","x":"l'Esperit, que és impuls vers el món nou."},{"t":"p","x":"Mare, amb el vostre Cor"},{"t":"p","x":"pregueu per nosaltres!"},{"t":"p","x":"intercediu per nosaltres!"}]},{"id":"24","num":"24","title":"Oferiment al Cor de Maria","theme":"cor-maria","sub":"de la Congregació","tags":[],"lines":[{"t":"p","x":"Verge Maria, Mare de Déu i Mare nostra:"},{"t":"p","x":"em confio al vostre amor maternal"},{"t":"p","x":"perquè feu de mi un missioner"},{"t":"p","x":"a imatge i semblança del vostre Fill, l'Enviat del Pare,"},{"t":"p","x":"per a anunciar la Bona Nova als pobres."},{"t":"p","x":"Ensenyeu-me a creure, estimar i servir com Vós."},{"t":"p","x":"Feu-me generós i agraït"},{"t":"p","x":"per a viure amb alegria"},{"t":"p","x":"el do de la meva vocació missionera."},{"t":"p","x":"Amén."}]},{"id":"25","num":"25","title":"Cor de Maria","theme":"cor-maria","sub":"de la Congregació","tags":[],"lines":[{"t":"p","x":"Senyor, Déu nostre,"},{"t":"p","x":"que elegíreu Maria, sempre Verge"},{"t":"p","x":"com a Mare del vostre Fill i Mare nostra:"},{"t":"p","x":"feu que, per la consagració fidel al seu Cor maternal,"},{"t":"p","x":"ens configurem més plenament a Crist"},{"t":"p","x":"i, urgits per la seva caritat,"},{"t":"p","x":"ens dediquem amb més generositat"},{"t":"p","x":"a proclamar l'Evangeli a tots els homes."},{"t":"p","x":"Per Crist Senyor nostre."},{"t":"p","x":"Amén."}]},{"id":"26","num":"26","title":"Mare i Mestra","theme":"cor-maria","sub":"de la Congregació","tags":[],"lines":[{"t":"p","x":"Maria, Mare i Mestra de Missioners, intercediu davant el Pare"},{"t":"p","x":"perquè els fills del vostre Cor"},{"t":"p","x":"reproduïm els trets de Jesús"},{"t":"p","x":"i siguem homes universals,"},{"t":"p","x":"d'ulls penetrants i oïdes atentes"},{"t":"p","x":"a les urgències del món."},{"t":"p","x":"Que com Vós,"},{"t":"p","x":"siguem homes de misericòrdia,"},{"t":"p","x":"tendresa i compassió."},{"t":"p","x":"Que ens obrim sempre a nous horitzons missioners,"},{"t":"p","x":"disposats a acceptar la diversitat."},{"t":"p","x":"I la caritat apostòlica que brolla"},{"t":"p","x":"de la forja del vostre Cor"},{"t":"p","x":"ens impulsi en tota circumstància"},{"t":"p","x":"on l'Esperit ens posi."},{"t":"p","x":"Amén."}]},{"id":"27","num":"27","title":"Invocació a Maria Mare de l'Església","theme":"cor-maria","sub":"de la Congregació","tags":[],"lines":[{"t":"p","x":"Mare de Déu, Mare de l'Església,"},{"t":"p","x":"us confiem tota l'Església."},{"t":"p","x":"Recordeu-vos de tots els vostres fills;"},{"t":"p","x":"doneu ardor a les seves oracions davant Déu;"},{"t":"p","x":"conserveu sòlida llur fe;"},{"t":"p","x":"fortifiqueu llur esperança"},{"t":"p","x":"i augmenteu llur caritat."},{"t":"p","x":"Encomanem al vostre Cor Immaculat"},{"t":"p","x":"tot el gènere humà:"},{"t":"p","x":"conduïu-lo al coneixement"},{"t":"p","x":"de l'únic i veritable salvador, Crist Jesús;"},{"t":"p","x":"allunyeu d'ell el càstig del pecat;"},{"t":"p","x":"concediu a tot el món la pau en la veritat,"},{"t":"p","x":"en la justícia, en la llibertat i en l'amor."},{"t":"p","x":"I feu que tota l'Església"},{"t":"p","x":"pugui enlairar al Déu de les misericòrdies"},{"t":"p","x":"un himne de lloança, d'agraïment i d'alegria,"},{"t":"p","x":"ja que el Senyor ha obrat coses grans per mitjà vostre,"},{"t":"p","x":"oh clement, piadosa i dolça Verge Maria."},{"t":"p","x":"Amén."}]},{"id":"29","num":"29","title":"Fundador i model","theme":"claret","sub":null,"tags":[],"lines":[{"t":"p","x":"Senyor, Déu nostre,"},{"t":"p","x":"que vau escollir Sant Antoni Maria Claret"},{"t":"p","x":"perquè fundés la nostra Família,"},{"t":"p","x":"i el vau inflamar d’un amor tan ardent,"},{"t":"p","x":"que el feia viure content i joiós enmig de les privacions, calúmnies i turments;"},{"t":"p","x":"concediu-nos, benigne, que,"},{"t":"p","x":"adherint-nos fidelment als seus ensenyaments,"},{"t":"p","x":"proclamem la vostra glòria en tot el món"},{"t":"p","x":"i busquem sempre amb sol·licitud"},{"t":"p","x":"la salvació de tots els homes."},{"t":"p","x":"Per Crist Senyor nostre."},{"t":"p","x":"Amén."}]},{"id":"30","num":"30","title":"Fidels al seu esperit","theme":"claret","sub":null,"tags":[],"lines":[{"t":"p","x":"Déu Pare nostre,"},{"t":"p","x":"que concedíreu a Sant Antoni Maria Claret"},{"t":"p","x":"un ardent i filial amor al Santíssim Sagrament"},{"t":"p","x":"i al Cor Immaculat de Maria,"},{"t":"p","x":"perquè realitzés en l'Església de Déu"},{"t":"p","x":"grans meravelles per a la glòria divina"},{"t":"p","x":"i la salvació de les ànimes:"},{"t":"p","x":"concediu-nos que,"},{"t":"p","x":"encesos a imitació seva"},{"t":"p","x":"en els mateixos sants amors,"},{"t":"p","x":"i continuant amb la més gran eficàcia"},{"t":"p","x":"la seva obra evangelitzadora,"},{"t":"p","x":"mereixem de viure i morir a la Congregació"},{"t":"p","x":"com a dignes Fills del Cor Immaculat de Maria."},{"t":"p","x":"Amén."}]},{"id":"31","num":"31","title":"Per continuar la seva obra","theme":"claret","sub":null,"tags":[],"lines":[{"t":"p","x":"Senyor,"},{"t":"p","x":"que vau fer de Sant Antoni Maria Claret, el nostre Pare,"},{"t":"p","x":"un fervent apòstol de la glòria de Déu i de la salvació dels homes,"},{"t":"p","x":"concediu-nos la caritat ardent que abrusava el seu cor,"},{"t":"p","x":"perquè continuem amb intensitat i eficàcia"},{"t":"p","x":"la seva obra apostòlica."},{"t":"p","x":"Feu que es multipliquin els seus fills"},{"t":"p","x":"per estendre el Regne de Jesucrist,"},{"t":"p","x":"i que a l’hora de la nostra mort"},{"t":"p","x":"mereixem ser reconeguts com a \"servents fidels\" de Crist i de l'Evangeli."},{"t":"p","x":"Amén."}]},{"id":"32","num":"32","title":"Magníficat de la vocació","theme":"congregacio","sub":null,"tags":[],"lines":[{"t":"p","x":"Senyor Déu nostre, beneït sigueu"},{"t":"p","x":"per haver-vos dignat escollir"},{"t":"p","x":"els vostres humils servents"},{"t":"p","x":"per a fills del Cor Immaculat de la vostra Mare!"},{"t":"p","x":"Oh, Mare beneïda,"},{"t":"p","x":"sigueu lloada mil vegades"},{"t":"p","x":"per la finesa del vostre Cor Immaculat"},{"t":"p","x":"d’haver-nos acceptat com a fills vostres!"},{"t":"p","x":"Feu, Mare nostra, que corresponguem a tanta bondat;"},{"t":"p","x":"que cada dia siguem més humils, més fervorosos"},{"t":"p","x":"i més zelosos de la salvació de les ànimes."},{"t":"p","x":"Amén."}]},{"id":"33","num":"33","title":"Oració del claretià","theme":"congregacio","sub":null,"tags":[],"lines":[{"t":"p","x":"Renovelleu, Senyor, en la nostra Congregació"},{"t":"p","x":"i en cadascun de nosaltres"},{"t":"p","x":"l’esperit que animà"},{"t":"p","x":"Sant Antoni Maria Claret, el nostre Pare."},{"t":"p","x":"Feu, que els Missioners"},{"t":"p","x":"Fills del Cor Immaculat de Maria"},{"t":"p","x":"siguem homes arborats de caritat"},{"t":"p","x":"i que abrusem la terra per on passem."},{"t":"p","x":"Que desitgem eficaçment i procurem per tots els mitjans possibles"},{"t":"p","x":"d’encendre tothom en el foc de l’amor diví."},{"t":"p","x":"Que res ni ningú no ens faci enrere."},{"t":"p","x":"Que sapiguem gaudir en les privacions,"},{"t":"p","x":"abordar els treballs, abraçar els sacrificis,"},{"t":"p","x":"complaure'ns en les calúmnies que ens aixequin,"},{"t":"p","x":"alegrar-nos en els turments i dolors que hàgim de patir"},{"t":"p","x":"i gloriar-nos en la creu de Jesucrist."},{"t":"p","x":"Que no pensem sinó com seguirem"},{"t":"p","x":"i imitarem més de prop Jesucrist"},{"t":"p","x":"a pregar, treballar i sofrir"},{"t":"p","x":"i procurar sempre i únicament la major glòria de Déu"},{"t":"p","x":"i la salvació de les ànimes."},{"t":"p","x":"Amén."}]},{"id":"34","num":"34","title":"Oració per a l'aniversari de la Fundació","theme":"congregacio","sub":null,"tags":["16 de juliol","aniversari"],"lines":[{"t":"p","x":"Senyor,"},{"t":"p","x":"que atorgàreu a Sant Antoni Maria Claret, el nostre Pare,"},{"t":"p","x":"d’abrusar-se en caritat"},{"t":"p","x":"i una sol·licitud apostòlica"},{"t":"p","x":"per la salvació dels homes de tot el món."},{"t":"p","x":"Des de petit el vau anar conduint"},{"t":"p","x":"al coneixement més ple del misteri de Crist."},{"t":"p","x":"Empès per la caritat, es va lliurar a l'anunci de l'Evangeli,"},{"t":"p","x":"va ser pacient en els treballs i calúmnies,"},{"t":"p","x":"i va ratificar la seva vida amb la seva sang i l’exili."},{"t":"p","x":"Per continuar la seva obra,"},{"t":"p","x":"i per mitjà de la Verge Maria,"},{"t":"p","x":"va fundar la nostra Congregació i ens va deixar el seu esperit."},{"t":"p","x":"Avui, en recordar el nostre origen en l'Església,"},{"t":"p","x":"us demanem, per intercessió de la nostra Mare,"},{"t":"p","x":"que ens feu fills seus fidels"},{"t":"p","x":"en el ministeri de la Paraula;"},{"t":"p","x":"que el seu cor continuï sent per a nosaltres"},{"t":"p","x":"el bàcul de la confiança;"},{"t":"p","x":"que beneïu amb noves vocacions"},{"t":"p","x":"aquesta família claretiana"},{"t":"p","x":"i que ens doneu un amor perseverant a Jesús"},{"t":"p","x":"a tots els qui ens diem i som"},{"t":"p","x":"fills del Cor Immaculat de Maria"},{"t":"p","x":"i treballem per la glòria de Déu"},{"t":"p","x":"a l'Església."},{"t":"p","x":"Amén."}]},{"id":"35","num":"35","title":"Per la nostra Congregació","theme":"congregacio","sub":null,"tags":[],"lines":[{"t":"rub","x":"Preguem:"},{"t":"p","x":"Us demanem, Senyor, que,"},{"t":"p","x":"per intercessió del Cor Immaculat de Maria,"},{"t":"p","x":"allibereu de tot mal la nostra Congregació"},{"t":"p","x":"perquè, amb esperit humil i generós, com Sant Antoni Maria Claret,"},{"t":"p","x":"es dediqui al vostre pla de salvació sobre tots els homes"},{"t":"p","x":"Per Crist Senyor nostre."},{"t":"p","x":"Amén."}]},{"id":"36","num":"36","title":"Per la nostra Congregació (lletania)","theme":"congregacio","sub":null,"tags":["lletania"],"lines":[{"t":"v","x":"Santa Maria."},{"t":"r","x":"Pregueu per nosaltres."},{"t":"v","x":"Sant Miquel i tots els sants Àngels."},{"t":"r","x":"Pregueu per nosaltres."},{"t":"v","x":"Sant Josep."},{"t":"r","x":"Pregueu per nosaltres."},{"t":"v","x":"Sants Apòstols."},{"t":"r","x":"Pregueu per nosaltres."},{"t":"v","x":"Sant Alfons-Maria de Liguori."},{"t":"r","x":"Pregueu per nosaltres."},{"t":"v","x":"Sant Ignasi de Loiola."},{"t":"r","x":"Pregueu per nosaltres."},{"t":"v","x":"Sant Francesc Xavier."},{"t":"r","x":"Pregueu per nosaltres."},{"t":"v","x":"Sant Vicenç de Paül."},{"t":"r","x":"Pregueu per nosaltres."},{"t":"v","x":"Sant Antoni Maria Claret."},{"t":"r","x":"Pregueu per nosaltres."},{"t":"v","x":"Santa Teresa de Jesús."},{"t":"r","x":"Pregueu per nosaltres."},{"t":"v","x":"Santa Caterina de Siena."},{"t":"r","x":"Pregueu per nosaltres."},{"t":"v","x":"Beats Màrtirs de la Família Claretiana."},{"t":"r","x":"Pregueu per nosaltres."},{"t":"v","x":"Tots els Sants i Santes de Déu."},{"t":"r","x":"Pregueu per nosaltres."},{"t":"v","x":"Recordeu-vos, Senyor de la vostra Congregació."},{"t":"r","x":"Que posseíreu des del principi."},{"t":"v","x":"Que compleixi la seva missió d'anunciar l'Evangeli."},{"t":"r","x":"Perquè tots els homes se salvin."},{"t":"v","x":"Us preguem que vingueu en auxili dels vostres servents."},{"t":"r","x":"Que redimíreu amb la vostra sang preciosa."},{"t":"v","x":"Salveu, Senyor, la vostra Congregació."},{"t":"r","x":"Sigueu el seu pastor i guieu-la sempre."},{"t":"v","x":"Tingueu pietat de nosaltres, Senyor."},{"t":"r","x":"Tingueu pietat de nosaltres."},{"t":"v","x":"Que la vostra misericòrdia, Senyor, davalli sobre nosaltres."},{"t":"r","x":"Com ho esperem de Vós."},{"t":"v","x":"Senyor, escolteu la nostra súplica."},{"t":"r","x":"I arribi a Vós el nostre clam."},{"t":"v","x":"El Senyor sigui amb vosaltres."},{"t":"r","x":"I amb el vostre esperit."},{"t":"rub","x":"Preguem:"},{"t":"p","x":"Us preguem, Senyor, que,"},{"t":"p","x":"per la intercessió de la Verge Maria,"},{"t":"p","x":"allibereu de tot mal aquesta Congregació,"},{"t":"p","x":"vesseu abundosament la vostra gràcia sobre els seus fills,"},{"t":"p","x":"i ompliu-los del vostre esperit"},{"t":"p","x":"perquè us complaguin sempre en la veritat."},{"t":"p","x":"Per Crist Senyor nostre."},{"t":"p","x":"Amén."}]},{"id":"37","num":"37","title":"Oració per la Congregació","theme":"congregacio","sub":null,"tags":[],"lines":[{"t":"p","x":"Pare de bondat i de misericòrdia,"},{"t":"p","x":"us lloem i us beneïm"},{"t":"p","x":"per haver enriquit la vostra Església"},{"t":"p","x":"amb l'estil de santificació i apostolat"},{"t":"p","x":"de Sant Antoni Maria Claret,"},{"t":"p","x":"el nostre Fundador i Pare."},{"t":"p","x":"Us supliquem humilment:"},{"t":"p","x":"envieu nous operaris a la nostra Congregació"},{"t":"p","x":"i infoneu el vostre Esperit en els qui heu elegit."},{"t":"p","x":"Confirmeu-nos a tots en la vocació missionera,"},{"t":"p","x":"i feu que, esperonats per la caritat de Crist,"},{"t":"p","x":"com a veritables Fills"},{"t":"p","x":"del Cor Immaculat de Maria,"},{"t":"p","x":"anunciem a tots els pobles"},{"t":"p","x":"la Bona Nova del Regne."},{"t":"p","x":"Per Crist Senyor nostre. Amén."}]},{"id":"38","num":"38","title":"Per a la renovació de l'esperit claretià","theme":"congregacio","sub":null,"tags":[],"lines":[{"t":"p","x":"Renovelleu, Senyor, en la nostra Congregació"},{"t":"p","x":"l'esperit que va animar Sant Antoni Maria Claret, el nostre Pare,"},{"t":"p","x":"per tal que, plens d’ell i envigorits per ell,"},{"t":"p","x":"maldem per estimar el que ell va estimar"},{"t":"p","x":"i dur a la pràctica allò que ens va ensenyar."},{"t":"p","x":"Per Crist Senyor nostre."},{"t":"p","x":"Amén."}]},{"id":"39","num":"39","title":"Evangelitzadors fidels","theme":"congregacio","sub":null,"tags":[],"lines":[{"t":"p","x":"Vós, Senyor,"},{"t":"p","x":"decretàreu misericordiosament"},{"t":"p","x":"que la vostra Paraula s'encarnés en el si de la Verge Maria;"},{"t":"p","x":"concediu-nos de guardar-la en els nostres cors"},{"t":"p","x":"de manera que siguem sempre fidels servidors"},{"t":"p","x":"en la proclamació de la Bona Nova de salvació a tots els homes."},{"t":"p","x":"Per Crist Senyor nostre."},{"t":"p","x":"Amén."}]},{"id":"40","num":"40","title":"Constitucions","theme":"congregacio","sub":null,"tags":[],"lines":[{"t":"p","x":"Pare, que ens heu concedit el do"},{"t":"p","x":"de seguir Jesús"},{"t":"p","x":"i anunciar el vostre Regne entre els homes"},{"t":"p","x":"a l'estil de Claret i els seus deixebles."},{"t":"p","x":"Ajudeu-nos a observar amb tota la cura possible les nostres Constitucions,"},{"t":"p","x":"camí d'Evangeli per a nosaltres."},{"t":"p","x":"Concediu-nos d’escoltar la vostra Paraula amb tota docilitat, com la vostra Mare,"},{"t":"p","x":"per tal de ser Fills fidels del seu Cor,"},{"t":"p","x":"i cooperar amb el seu ofici maternal en la missió apostòlica."},{"t":"p","x":"Pel mateix Crist Senyor nostre."},{"t":"p","x":"Amén."}]},{"id":"41","num":"41","title":"Acció de gràcies per la vocació","theme":"congregacio","sub":null,"tags":[],"lines":[{"t":"p","x":"Gràcies us dono, oh Mare, per la vocació rebuda."},{"t":"p","x":"Feu-me la gràcia de ser-hi fidel tota la meva vida."}]},{"id":"42","num":"42","title":"Definició del Missioner Claretià","theme":"congregacio","sub":null,"tags":["responsorial"],"lines":[{"t":"v","x":"Senyor, per intercessió del Cor Immaculat de Maria, infoneu en nosaltres l'esperit d'amor perquè siguem homes abrandats de caritat i que abrusem per on passem."},{"t":"r","x":"Amén."},{"t":"v","x":"I perquè desitgem eficaçment i procurem, per tots els mitjans, d’encendre tot el món en el foc de l’amor diví."},{"t":"r","x":"Amén."},{"t":"v","x":"Senyor, per intercessió del Cor Immaculat de Maria, infoneu en nosaltres l'esperit de fortalesa per tal que res no ens espanti, ens gaudim en les privacions i abordem coratjosament els treballs apostòlics."},{"t":"r","x":"Amén."},{"t":"v","x":"I perquè abracem amb joia els sacrificis, ens complaguem en les calúmnies i ens alegrem en els turments."},{"t":"r","x":"Amén."},{"t":"v","x":"Senyor, per intercessió del Cor Immaculat de Maria, infoneu en nosaltres l'esperit missioner que animà Jesús, el vostre Fill, perquè no pensem sinó com seguir-lo i imitar-lo a pregar, treballar i sofrir."},{"t":"r","x":"Amén."},{"t":"v","x":"I perquè, com Jesús, procurem sempre i únicament la vostra major glòria i la salvació dels homes."},{"t":"r","x":"Amén."}]},{"id":"43","num":"43","title":"Professió de la identitat claretiana","theme":"congregacio","sub":null,"tags":[],"lines":[{"t":"p","x":"Creiem que l'Esperit Sant"},{"t":"p","x":"ens ha convocat en l'Església per Sant Antoni Maria Claret"},{"t":"p","x":"perquè, com a Congregació,"},{"t":"p","x":"ens anomenem i siguem Missioners Fills del Cor Immaculat de Maria."},{"t":"p","x":"Creiem que el Pare ens convoca"},{"t":"p","x":"a viure autènticament i significativament"},{"t":"p","x":"el misteri i la missió apostòlica del seu Fill"},{"t":"p","x":"en fraternitat evangelitzada i evangelitzadora."},{"t":"p","x":"És ell, i no els nostres projectes,"},{"t":"p","x":"qui ens fa veritables deixebles de Crist."},{"t":"p","x":"Aquest amor que configura la nostra vida fraterna"},{"t":"p","x":"volem significar-lo, cada vegada més, en l'Eucaristia."},{"t":"p","x":"Creiem que Maria és a l'origen de la nostra vocació"},{"t":"p","x":"i exerceix la seva maternitat configurant les nostres vides amb la de Crist, el seu Fill."},{"t":"p","x":"En el seu Cor de Mare es formen els apòstols de la Congregació."},{"t":"p","x":"I la seva presència en nosaltres és impuls evangelitzador i amor misericordiós"},{"t":"p","x":"que transforma i anima els creients."},{"t":"p","x":"Creiem que el Pare Claret va ser elegit i proposat per Déu com el nostre prototipus"},{"t":"p","x":"i model de missioners al servei de l'Evangeli en l'Església universal."},{"t":"p","x":"Creiem que la nostra comuna vocació-missió comporta un seguiment,"},{"t":"p","x":"en fidelitat perfecta i en disponibilitat absoluta, a Crist en l'Església,"},{"t":"p","x":"segons les exigències evangèliques viscudes pel nostre Fundador i Pare,"},{"t":"p","x":"i transmeses pels nostres avantpassats."},{"t":"p","x":"Creiem que l'Esperit de Jesús ressuscitat"},{"t":"p","x":"ens ungeix profèticament perquè anunciem la Bona Nova als pobres,"},{"t":"p","x":"i, urgits per la seva mateixa caritat sacrificada i redemptora,"},{"t":"p","x":"abrusem per on passem."},{"t":"p","x":"Creiem que hem estat cridats"},{"t":"p","x":"com a esforçats col·laboradors del Sant Pare i dels Bisbes"},{"t":"p","x":"en el ministeri de la Paraula per a l’extensió del Regne de Déu per tot el món."},{"t":"p","x":"Per això, emprant tots els mitjans possibles,"},{"t":"p","x":"volem atendre allò que és més urgent, oportú i eficaç."},{"t":"p","x":"Creiem que la Congregació és obra de Déu"},{"t":"p","x":"i que Jesús i Maria no l'abandonaran, suscitant vocacions"},{"t":"p","x":"i donant l'Esperit als cridats,"},{"t":"p","x":"perquè, vivint en fraternitat la mateixa consagració i missió,"},{"t":"p","x":"glorifiquem el Pare, perllonguem el testimoniatge de comunió eclesial"},{"t":"p","x":"i fem més eficaç l'acció evangelitzadora."},{"t":"p","x":"Creiem, Senyor. Augmenteu-nos la fe."}]},{"id":"45","num":"45","title":"Caritat apostòlica","theme":"consagracio","sub":"Virtuts","tags":[],"lines":[{"t":"p","x":"Oh Déu meu!"},{"t":"p","x":"Doneu-me caritat apostòlica,"},{"t":"p","x":"de manera que actuï en tot amb fortalesa i suaument,"},{"t":"p","x":"amb mansuetud i caritat."},{"t":"p","x":"Amén."}]},{"id":"46","num":"46","title":"Pràctica de les virtuts","theme":"consagracio","sub":"Virtuts","tags":[],"lines":[{"t":"p","x":"Jesús, doneu-me la vostra gràcia per a imitar-vos fidelment"},{"t":"p","x":"en la pràctica de totes les virtuts."},{"t":"p","x":"Amb Vós tot ho puc, sense Vós absolutament res."},{"t":"p","x":"Amén."}]},{"id":"47","num":"47","title":"Pobresa","theme":"consagracio","sub":"Pobresa","tags":[],"lines":[{"t":"p","x":"Salvador nostre,"},{"t":"p","x":"que us vàreu fer pobre,"},{"t":"p","x":"que vàreu voler néixer pobre,"},{"t":"p","x":"viure pobrament i morir en la major pobresa."},{"t":"p","x":"Feu que els vostres missioners coneguem el valor de la pobresa,"},{"t":"p","x":"que l'estimem i la practiquem com Vós ens ensenyeu,"},{"t":"p","x":"amb obres i paraules;"},{"t":"p","x":"que, a exemple dels Apòstols,"},{"t":"p","x":"ho deixem tot per a seguir-vos en l'anunci de l'Evangeli."},{"t":"p","x":"Amén."}]},{"id":"48","num":"48","title":"Mansuetud","theme":"consagracio","sub":"Virtuts","tags":[],"lines":[{"t":"p","x":"Oh Déu meu,"},{"t":"p","x":"Doneu-me un zel discret i prudent"},{"t":"p","x":"a fi que actuï en totes les coses"},{"t":"p","x":"amb fortalesa i suaument,"},{"t":"p","x":"amb mansuetud i bones formes."},{"t":"p","x":"Ajudeu-me a comportar-me en tot amb una santa prudència,"},{"t":"p","x":"conreada per l'estudi,"},{"t":"p","x":"fortificada amb l'edat,"},{"t":"p","x":"discernida amb el diàleg,"},{"t":"p","x":"i consumada amb l'experiència dels esdeveniments."},{"t":"p","x":"Amén."}]},{"id":"49","num":"49","title":"Mortificació","theme":"consagracio","sub":"Virtuts","tags":[],"lines":[{"t":"p","x":"Oh Senyor!,"},{"t":"p","x":"sé que les penes, dolors i treballs"},{"t":"p","x":"són la divisa de l'apòstol."},{"t":"p","x":"Amb la vostra gràcia els abraço"},{"t":"p","x":"Ajudeu-me Vós, Senyor,"},{"t":"p","x":"a beure el calze de penes interiors"},{"t":"p","x":"i a rebre aquest baptisme de penes exteriors."},{"t":"p","x":"Feu que no em gloriï en altra cosa"},{"t":"p","x":"que en la Creu on Vós esteu clavat per mi."},{"t":"p","x":"Amén."}]},{"id":"50","num":"50","title":"La nostra consagració","theme":"consagracio","sub":"Consagració","tags":["renovació de vots","professió"],"lines":[{"t":"p","x":"Déu i Pare meu,"},{"t":"p","x":"responent a la vostra crida"},{"t":"p","x":"vull procurar amb la major dedicació"},{"t":"p","x":"que sempre es compleixi la vostra voluntat."},{"t":"p","x":"Desitjo amb tot el cor dedicar-me plenament a Vós,"},{"t":"p","x":"seguint Jesús, com els Apòstols,"},{"t":"p","x":"perquè tots els homes tinguin vida en abundància."},{"t":"p","x":"Impulsat per l'Esperit Sant"},{"t":"p","x":"renovo el meu lliurament a Vós, Pare,"},{"t":"p","x":"perquè em configureu a imatge i semblança del vostre Fill Jesús."},{"t":"p","x":"Confiat en l’ajut maternal del Cor Immaculat de Maria,"},{"t":"p","x":"us prometo viure en aquesta comunitat de vida apostòlica"},{"t":"p","x":"cast, pobre, obedient,"},{"t":"p","x":"observant les Constitucions de la nostra Congregació"},{"t":"p","x":"amb tota la cura possible."},{"t":"p","x":"Ungiu-me, Pare Sant, amb el vostre Esperit de santedat,"},{"t":"p","x":"perquè en el servei de la Paraula"},{"t":"p","x":"sigui fidel al carisma de Sant Antoni Maria Claret"},{"t":"p","x":"i assoleixi la perfecció en el manament de l'amor."},{"t":"p","x":"Amén."}]},{"id":"51","num":"51","title":"Configuració amb Crist","theme":"consagracio","sub":"Consagració","tags":[],"lines":[{"t":"p","x":"Gràcies, Pare, perquè ens heu ungit pel vostre Esperit"},{"t":"p","x":"i ens heu fet participar de la plenitud de Crist, el vostre Fill."},{"t":"p","x":"Beneït sigueu per haver-nos cridat a seguir-lo"},{"t":"p","x":"i a col·laborar amb Ell en l'obra que Vós li vau encomanar."},{"t":"p","x":"Us demanem que, moguts pel seu Esperit,"},{"t":"p","x":"no siguem nosaltres els qui visquem,"},{"t":"p","x":"sinó que sigui Crist el qui realment visqui en nosaltres,"},{"t":"p","x":"a fi de ser instruments aptes per anunciar el Regne del cel."},{"t":"p","x":"Que maldem per aconseguir la nostra configuració amb Ell"},{"t":"p","x":"a la nostra comunitat missionera,"},{"t":"p","x":"segons el nostre carisma propi en l'Església."},{"t":"p","x":"Ell, que viu i regna pels segles dels segles."},{"t":"p","x":"Amén."}]},{"id":"53","num":"53","title":"El do de la castedat","theme":"consagracio","sub":"Castedat","tags":[],"lines":[{"t":"p","x":"Us beneïm, Déu nostre, per haver-nos concedit"},{"t":"p","x":"el do de la castedat pel Regne del cel,"},{"t":"p","x":"pel qual podem consagrar-nos de tot cor a les coses del Pare,"},{"t":"p","x":"a imitació del vostre Fill Jesucrist"},{"t":"p","x":"i segons l'exemple de la Verge Maria."},{"t":"p","x":"Demanem, Senyor, la vostra ajuda amb humilitat"},{"t":"p","x":"per a dominar les inclinacions de la nostra naturalesa,"},{"t":"p","x":"rebre amb goig el do de la castedat"},{"t":"p","x":"i conrear-lo amb tota diligència."},{"t":"p","x":"Per Crist Senyor nostre."},{"t":"p","x":"Amén."}]},{"id":"54","num":"54","title":"Castedat","theme":"consagracio","sub":"Castedat","tags":[],"lines":[{"t":"p","x":"Beneït sigueu, Senyor,"},{"t":"p","x":"perquè pel do de la castedat pel Regne del cel,"},{"t":"p","x":"es manifesta el poder de la vostra glòria"},{"t":"p","x":"en la fragilitat de la nostra naturalesa,"},{"t":"p","x":"a fi de desvetllar en els homes l'esperança de la vida futura."},{"t":"p","x":"Feu que la castedat que professem"},{"t":"p","x":"afavoreixi una nova comunió fraterna en Crist"},{"t":"p","x":"i construeixi una comunitat que no es fonamenta ni en la carn ni en la sang,"},{"t":"p","x":"sinó en la vostra voluntat."},{"t":"p","x":"I que, com a signe d'amor perfecte,"},{"t":"p","x":"es converteixi en una font especial de fecunditat espiritual per al món"},{"t":"p","x":"i ens inflami en amor a Vós i a tots els homes."},{"t":"p","x":"Per Crist Senyor nostre."},{"t":"p","x":"Amén."}]},{"id":"55","num":"55","title":"Vós, essent ric","theme":"consagracio","sub":"Pobresa","tags":[],"lines":[{"t":"p","x":"Vós, essent ric,"},{"t":"p","x":"us heu fet pobre per nosaltres"},{"t":"p","x":"a fi que nosaltres ens enriquíssim."},{"t":"p","x":"Dedicat a anunciar la Bona Nova del Regne,"},{"t":"p","x":"no teníeu on reposar el cap."},{"t":"p","x":"Concediu-nos de compartir la vostra pobresa,"},{"t":"p","x":"per a recordar als homes els béns del món futur,"},{"t":"p","x":"viure com Maria, la primera entre els pobres del Senyor,"},{"t":"p","x":"i a semblança dels Apòstols que, abandonant-ho tot, us van seguir."},{"t":"p","x":"Vós que viviu i regneu pels segles dels segles."},{"t":"p","x":"Amén."}]},{"id":"56","num":"56","title":"Buscar primer de tot el Regne de Déu","theme":"consagracio","sub":"Pobresa","tags":[],"lines":[{"t":"p","x":"Us demanem, Senyor,"},{"t":"p","x":"que posant tota la nostra confiança en Vós,"},{"t":"p","x":"i mai en el poder i les riqueses,"},{"t":"p","x":"busquem primer de tot el Regne que pertany als pobres."},{"t":"p","x":"Amén."}]},{"id":"57","num":"57","title":"Comunió de béns","theme":"consagracio","sub":"Pobresa","tags":[],"lines":[{"t":"p","x":"Concediu-nos, Senyor,"},{"t":"p","x":"que amb la nostra pobresa voluntària"},{"t":"p","x":"construïm la comunitat fraterna"},{"t":"p","x":"en la unitat de cor i d’esperit"},{"t":"p","x":"i l'expressem en la comunió de béns,"},{"t":"p","x":"espirituals i materials,"},{"t":"p","x":"amb els pobres i en el seu servei."},{"t":"p","x":"Amén."}]},{"id":"58","num":"58","title":"Pobresa","theme":"consagracio","sub":"Pobresa","tags":[],"lines":[{"t":"p","x":"Us donem gràcies, Pare sant,"},{"t":"p","x":"perquè heu volgut manifestar-nos el valor de la pobresa"},{"t":"p","x":"i la benaurança dels qui no posen el seu guany en les riqueses."},{"t":"p","x":"Concediu-nos que tota la nostra vida i activitat."},{"t":"p","x":"estiguin informades per l'esperit de pobresa."},{"t":"p","x":"Que siguem pobres de fet i d'esperit"},{"t":"p","x":"i ens sentim obligats a la llei universal del treball,"},{"t":"p","x":"compartint la condició dels pobres."},{"t":"p","x":"Que tinguem els nostres béns a disposició dels altres,"},{"t":"p","x":"i ens alegrem quan experimentem alguns efectes de la pobresa,"},{"t":"p","x":"no dubtant de la vostra providència."},{"t":"p","x":"Per Crist Senyor nostre."},{"t":"p","x":"Amén."}]},{"id":"59","num":"59","title":"Per fer la vostra voluntat","theme":"consagracio","sub":"Obediència","tags":[],"lines":[{"t":"p","x":"Per a fer la vostra voluntat, Pare, ens enviàreu el vostre Fill Jesús."},{"t":"p","x":"A exemple de la Verge Santíssima,"},{"t":"p","x":"que es va consagrar totalment com a esclava del Senyor"},{"t":"p","x":"a l'obra del Fill,"},{"t":"p","x":"us oferim, Senyor,"},{"t":"p","x":"la lliure facultat de disposar de la nostra vida"},{"t":"p","x":"per a configurar-nos amb Jesucrist,"},{"t":"p","x":"que es va fer obedient fins a la mort de creu,"},{"t":"p","x":"i unir-nos en tot a la vostra voluntat salvífica."},{"t":"p","x":"Per Crist Senyor nostre."},{"t":"p","x":"Amén."}]},{"id":"60","num":"60","title":"Obedients en la missió","theme":"consagracio","sub":"Obediència","tags":[],"lines":[{"t":"p","x":"Compartint la mateixa vocació,"},{"t":"p","x":"volem buscar junts, Senyor, la vostra voluntat"},{"t":"p","x":"per dur a terme la nostra missió en l'Església."},{"t":"p","x":"Il·lumineu els qui expressen la unitat d'amor"},{"t":"p","x":"i de missió en la comunitat"},{"t":"p","x":"perquè promoguin la cooperació de tots"},{"t":"p","x":"en bé de l'Església i de la Congregació,"},{"t":"p","x":"i feu que tots, impulsats per l'amor,"},{"t":"p","x":"sapiguem obeir promptament i perfecta."},{"t":"p","x":"Per Crist Senyor nostre."},{"t":"p","x":"Amén."}]},{"id":"61","num":"61","title":"Obediència","theme":"consagracio","sub":"Obediència","tags":[],"lines":[{"t":"p","x":"Us donem gràcies, Pare,"},{"t":"p","x":"perquè ens concediu la lliure facultat"},{"t":"p","x":"de disposar de la nostra vida,"},{"t":"p","x":"i ens moveu a oferir-vos-la per la força del vostre Esperit."},{"t":"p","x":"Gràcies per haver-nos cridat a configurar-nos"},{"t":"p","x":"amb vostre Fill Jesucrist"},{"t":"p","x":"en la seva obediència fins a la mort en creu."},{"t":"p","x":"Beneït sigueu per haver volgut que"},{"t":"p","x":"en Ell participem de la vostra voluntat salvadora."},{"t":"p","x":"Per Crist Senyor nostre."},{"t":"p","x":"Amén."}]},{"id":"62","num":"62","title":"Obediència en comunió","theme":"consagracio","sub":"Obediència","tags":[],"lines":[{"t":"p","x":"Concediu-nos, Senyor,"},{"t":"p","x":"de buscar, conèixer i fer junts la vostra voluntat"},{"t":"p","x":"a fi de poder realitzar la missió comuna"},{"t":"p","x":"que tenim en l'Església."},{"t":"p","x":"Concediu-nos que en la recerca i el compliment de la vostra voluntat,"},{"t":"p","x":"ens comprometem a oferir la nostra ajuda als germans"},{"t":"p","x":"amb l'oració, el consell i el diàleg fratern."},{"t":"p","x":"Per Crist Senyor nostre."},{"t":"p","x":"Amén."}]},{"id":"63","num":"63","title":"Pels superiors","theme":"consagracio","sub":"Obediència","tags":[],"lines":[{"t":"p","x":"Enfortiu, Senyor, els nostres Superiors"},{"t":"p","x":"perquè busquin abans de tot la vostra voluntat,"},{"t":"p","x":"exerceixin l'autoritat segons les Constitucions"},{"t":"p","x":"i en esperit de servei,"},{"t":"p","x":"donant la seva vida pels germans."},{"t":"p","x":"I concediu-nos a tots d’obeir-vos"},{"t":"p","x":"impulsats per l'amor,"},{"t":"p","x":"promptament i perfecta,"},{"t":"p","x":"sotmetent-nos als homes per Vós."},{"t":"p","x":"Per Crist Senyor nostre."},{"t":"p","x":"Amén."}]},{"id":"64","num":"64","title":"Disponibilitat","theme":"consagracio","sub":"Obediència","tags":[],"lines":[{"t":"p","x":"Doneu-nos, Senyor, el do de la disponibilitat"},{"t":"p","x":"per a ser enviats a qualsevol part del món,"},{"t":"p","x":"a fi de posar totes les nostres energies al servei del ministeri"},{"t":"p","x":"que ens sigui encomanat per la Congregació."},{"t":"p","x":"Per Crist Senyor nostre."},{"t":"p","x":"Amén."}]},{"id":"65","num":"65","title":"Imitar l'oració de Jesús","theme":"consagracio","sub":"Oració","tags":[],"lines":[{"t":"p","x":"Déu omnipotent i etern"},{"t":"p","x":"que us heu dignat associar-nos"},{"t":"p","x":"a l'obra missionera de Crist:"},{"t":"p","x":"obriu el nostre cor"},{"t":"p","x":"perquè ens convertim a l'Evangeli,"},{"t":"p","x":"i doneu-nos constància perquè l’imitem"},{"t":"p","x":"en la seva oració assídua."},{"t":"p","x":"Pel mateix Crist Senyor nostre."},{"t":"p","x":"Amén."}]},{"id":"66","num":"66","title":"Progrés en la caritat","theme":"consagracio","sub":"Virtuts","tags":[],"lines":[{"t":"p","x":"Pare misericordiós,"},{"t":"p","x":"concediu-nos que la caritat de Crist ens urgeixi"},{"t":"p","x":"amb el mateix amor amb què Vós ens estimeu,"},{"t":"p","x":"i que, amb d'esperit ferm,"},{"t":"p","x":"estiguem disposats a morir cada dia pels germans."},{"t":"p","x":"Feu, que, com a estrangers i pelegrins,"},{"t":"p","x":"ens abstinguem dels desigs de la carn,"},{"t":"p","x":"que guardem amb molta cura"},{"t":"p","x":"els nostres sentits,"},{"t":"p","x":"i que ens alegrem en tota adversitat."},{"t":"p","x":"Per Crist Senyor nostre."},{"t":"p","x":"Amén."}]},{"id":"67","num":"67","title":"L'amor de Crist ens esperona","theme":"consagracio","sub":"Virtuts","tags":[],"lines":[{"t":"p","x":"Pare sant,"},{"t":"p","x":"Jesucrist, urgit per un ardent a Vós i als homes,"},{"t":"p","x":"es va lliurar als treballs, a la passió, i fins i tot a la mort."},{"t":"p","x":"Concediu-nos la caritat apostòlica i el goig de l'Esperit"},{"t":"p","x":"perquè aconseguim"},{"t":"p","x":"que tots els homes us coneguin, us estimin i us serveixin,"},{"t":"p","x":"i arribin a la benaurança del vostre Regne."},{"t":"p","x":"Per Crist Senyor nostre."},{"t":"p","x":"Amén."}]},{"id":"68","num":"68","title":"Vós, Pare","theme":"comunitat","sub":null,"tags":[],"lines":[{"t":"p","x":"Vós, Pare,"},{"t":"p","x":"heu infós en els nostres cors"},{"t":"p","x":"l'amor a Vós i als germans per l'Esperit Sant,"},{"t":"p","x":"que ens configura amb Crist i edifica la nostra comunió."},{"t":"p","x":"Us demanem que acollim aquest do vostre"},{"t":"p","x":"per tal que tota la nostra vida missionera"},{"t":"p","x":"estigui regida i informada per aquest amor"},{"t":"p","x":"i assolim en la comunitat missionera"},{"t":"p","x":"la plenitud personal a la qual Vós ens crideu."},{"t":"p","x":"Per Crist Senyor nostre."},{"t":"p","x":"Amén."}]},{"id":"69","num":"69","title":"Oració de la comunitat","theme":"comunitat","sub":null,"tags":[],"lines":[{"t":"p","x":"Us donem gràcies, Pare Sant,"},{"t":"p","x":"per haver-nos reunit en aquesta comunitat"},{"t":"p","x":"des de la qual voleu que anunciem el vostre Regne"},{"t":"p","x":"amb una vida perfectament consagrada"},{"t":"p","x":"i amb un dedicació total al servei de l'Evangeli."},{"t":"p","x":"Volem proclamar amb tot el nostre ser i actuar,"},{"t":"p","x":"com a veritables Fills del Cor de Maria,"},{"t":"p","x":"les meravelles del vostre amor entre els homes."},{"t":"p","x":"Renovem el nostre propòsit de ser millors cada dia,"},{"t":"p","x":"d'ajudar-nos mútuament en el seguiment del vostre Fill,"},{"t":"p","x":"de secundar les inspiracions del vostre Esperit Sant,"},{"t":"p","x":"i de col·laborar en el acompliment de la Missió"},{"t":"p","x":"que ens heu confiat en l'Església."},{"t":"p","x":"No permeteu, Senyor, que aquesta bona voluntat"},{"t":"p","x":"es vagi esmorteint inadvertidament"},{"t":"p","x":"per l'egoisme, la rutina o la inconstància."},{"t":"p","x":"Revifeu la fe i l'esperança d'aquesta comunitat apostòlica"},{"t":"p","x":"a l'hora de discernir les inevitables diferències,"},{"t":"p","x":"i eixampleu els nostres cors per al necessari perdó."},{"t":"p","x":"Des de la consciència de la nostra debilitat"},{"t":"p","x":"us demanem que ens mantingueu atents a la vostra gràcia:"},{"t":"p","x":"que l'assídua meditació de la vostra Paraula ens recreï,"},{"t":"p","x":"i que la convivència fraterna ens estimuli"},{"t":"p","x":"a donar aquell testimoniatge d'amor que el món necessita per a creure,"},{"t":"p","x":"i que les necessitats i urgències dels més pobres"},{"t":"p","x":"ens estimulin a sortir de nosaltres mateixos"},{"t":"p","x":"i ens obliguin a treballar per ells sens parar."},{"t":"p","x":"Ens encomanem a Maria, la Mare de Jesús,"},{"t":"p","x":"exemple de vida consagrada,"},{"t":"p","x":"per tal que ens formi en el seu mateix Cor"},{"t":"p","x":"i ens faci seguir el camí de perfecció i de servei apostòlic"},{"t":"p","x":"que Sant Antoni Maria Claret, amb la seva vida i doctrina,"},{"t":"p","x":"ens va traçar en l'Església i en el món."},{"t":"p","x":"Segelleu, Pare, amb la vostra fidelitat eterna"},{"t":"p","x":"això que ara és la nostra aspiració més sincera."},{"t":"p","x":"Per Crist Senyor nostre."}]},{"id":"70","num":"70","title":"Caritat fraterna","theme":"comunitat","sub":null,"tags":[],"lines":[{"t":"p","x":"Us supliquem humilment, Senyor Déu nostre,"},{"t":"p","x":"que uniu en uns mateixos sentiments els qui compartim l'esperit"},{"t":"p","x":"del vostre servent Antoni Maria;"},{"t":"p","x":"perquè d’acord amb l’amor mutu,"},{"t":"p","x":"puguem ser testimonis de la vostra caritat"},{"t":"p","x":"entre els homes."},{"t":"p","x":"Per Crist Senyor nostre."},{"t":"p","x":"Amén."}]},{"id":"71","num":"71","title":"Oració per la pròpia comunitat","theme":"comunitat","sub":null,"tags":[],"lines":[{"t":"p","x":"Pare, avui vull demanar-vos pels meus germans de comunitat."},{"t":"p","x":"Vós els coneixeu personalment:"},{"t":"p","x":"coneixeu els seus noms i els seus cognoms,"},{"t":"p","x":"les seves virtuts i els seus defectes,"},{"t":"p","x":"les seves alegries i les seves penes,"},{"t":"p","x":"la seva fortalesa i la seva feblesa, sabeu tota la seva història;"},{"t":"p","x":"els accepteu com són,"},{"t":"p","x":"i els vivifiqueu amb el vostre Esperit."},{"t":"p","x":"Vós, Senyor, els estimeu"},{"t":"p","x":"no perquè siguin bons"},{"t":"p","x":"sinó perquè són fills vostres."},{"t":"p","x":"Ensenyeu-me a estimar-los de debò, a imitació de Jesucrist,"},{"t":"p","x":"no per llurs paraules o per llurs obres, sinó per ells mateixos,"},{"t":"p","x":"descobrint en cadascun,"},{"t":"p","x":"especialment en els més febles,"},{"t":"p","x":"el misteri del vostre amor infinit."},{"t":"p","x":"Us agraeixo, Pare,"},{"t":"p","x":"que m’hàgiu donat germans."},{"t":"p","x":"Tots són un regal per a mi, un veritable sagrament,"},{"t":"p","x":"signe sensible i eficaç de la presència del vostre Fill."},{"t":"p","x":"Doneu-me la mirada de Jesús per contemplar-los,"},{"t":"p","x":"i doneu-me el seu cor per estimar-los fins a l'extrem,"},{"t":"p","x":"perquè també jo vull ser per a cadascun d'ells"},{"t":"p","x":"sagrament viu de la presència de Jesús."},{"t":"p","x":"Pel mateix Crist Senyor nostre."},{"t":"p","x":"Amén."}]},{"id":"72","num":"72","title":"Oració apostòlica","theme":"missio","sub":null,"tags":[],"lines":[{"t":"p","x":"Déu meu i Pare meu!"},{"t":"p","x":"Que us conegui i us faci conèixer;"},{"t":"p","x":"que us estimi i us faci estimar;"},{"t":"p","x":"que us serveixi i us faci servir;"},{"t":"p","x":"que us lloï i us faci lloar de totes les criatures."},{"t":"p","x":"Concediu-me, Pare meu, que tots els pecadors es converteixin,"},{"t":"p","x":"que tots els justos perseverin en la gràcia"},{"t":"p","x":"i tots aconseguim l'eterna glòria."},{"t":"p","x":"Amén."}]},{"id":"73","num":"73","title":"Conèixer Déu per servir-lo","theme":"missio","sub":null,"tags":[],"lines":[{"t":"p","x":"Concediu-me, Senyor,"},{"t":"p","x":"que tots coneguin la vostra bondat i proximitat"},{"t":"p","x":"per tal que us estimin i serveixin amb tota fidelitat,"},{"t":"p","x":"perquè sou bo i la vostra misericòrdia és infinita."},{"t":"p","x":"Amén."}]},{"id":"74","num":"74","title":"Instrument del Regne","theme":"missio","sub":null,"tags":[],"lines":[{"t":"p","x":"Aquí em teniu, Senyor,"},{"t":"p","x":"si ho voleu, feu de mi un instrument per a l'anunci del vostre Regne."},{"t":"p","x":"Feu, Senyor, que el menjar sigui per tenir força i servir-vos millor;"},{"t":"p","x":"que usi de les coses d'aquest món en quant les necessiti,"},{"t":"p","x":"que estudiï per a conèixer-vos i estimar-vos i per ajudar els meus germans;"},{"t":"p","x":"que el meu descans sigui per a refer les forces gastades i servir-vos millor."},{"t":"p","x":"Amén."}]},{"id":"75","num":"75","title":"Pel fruit apostòlic dels Missioners","theme":"missio","sub":null,"tags":[],"lines":[{"t":"p","x":"Pare de bondat,"},{"t":"p","x":"que sense cap mèrit nostre ens heu elegit i ens envieu com enviàreu el vostre Fill Jesús."},{"t":"p","x":"Comuniqueu-nos el vostre Esperit,"},{"t":"p","x":"feu-nos ministres idonis de l'Evangeli,"},{"t":"p","x":"i concediu-nos la força necessària"},{"t":"p","x":"perquè exercim eficaçment el ministeri de la salvació dels homes."},{"t":"p","x":"Doneu, Senyor, increment als nostres treballs,"},{"t":"p","x":"i feu que la vostra Paraula, Crist, parli per nosaltres."},{"t":"p","x":"Beneïu-nos i ajudeu-nos,"},{"t":"p","x":"perquè tots els homes acceptin l'Evangeli"},{"t":"p","x":"i us estimin cada dia més."},{"t":"p","x":"No permeteu, Senyor, que us ofenguem;"},{"t":"p","x":"preserveu-nos de tots els perills i enfortiu-nos amb la vostra gràcia."},{"t":"p","x":"Amén."}]},{"id":"76","num":"76","title":"Missioners","theme":"missio","sub":null,"tags":[],"lines":[{"t":"p","x":"Senyor,"},{"t":"p","x":"que ens crideu com als Apòstols,"},{"t":"p","x":"feu que ens esforcem amb tots els nostres mitjans i recursos"},{"t":"p","x":"per aconseguir que sigueu estimat, conegut i servit per tots."},{"t":"p","x":"Doneu-nos un cor obert"},{"t":"p","x":"per estimar tots els homes sense excepció,"},{"t":"p","x":"procurant-los la benaurança del Regne,"},{"t":"p","x":"que ja s'ha iniciat a la terra."},{"t":"p","x":"Que, de tots els dons que creiem posseir,"},{"t":"p","x":"us en donem únicament a Vós la glòria,"},{"t":"p","x":"procurant fer-los fructificar copiosament,"},{"t":"p","x":"i recordem les nostres pròpies limitacions i defectes,"},{"t":"p","x":"reconeixent així la nostra total dependència de Vós."},{"t":"p","x":"Que expressem aquest convenciment"},{"t":"p","x":"en la nostra manera d'obrar i en les nostres relacions amb els altres,"},{"t":"p","x":"estant disposats a demanar perdó per les nostres faltes i equivocacions."},{"t":"p","x":"Que busquem brindar als nostres germans"},{"t":"p","x":"els serveis del nostre amor,"},{"t":"p","x":"de manera que cadascun de nosaltres s’estigui enmig d'ells com qui serveix."},{"t":"p","x":"Per Crist Senyor nostre. Amén."}]},{"id":"77","num":"77","title":"Missió Claretiana","theme":"missio","sub":null,"tags":[],"lines":[{"t":"p","x":"Pare sant,"},{"t":"p","x":"Vós vau cridar Sant Antoni Maria Claret a seguir al vostre Fill,"},{"t":"p","x":"i ell, urgit pel seu amor,"},{"t":"p","x":"va esmerçar totalment la seva vida a lluitar per la seva Causa: el Regne."},{"t":"p","x":"Desvetlleu en nosaltres el seu esperit evangelitzador"},{"t":"p","x":"per tal que copsem allò que és més urgent, oportú i eficaç"},{"t":"p","x":"i realitzem la missió de propagar la fe, dòcils a l'Esperit,"},{"t":"p","x":"i obedients a la vostra voluntat."},{"t":"p","x":"Animats, com Claret, per la força del vostre Esperit,"},{"t":"p","x":"també nosaltres volem optar per la Causa del Regne"},{"t":"p","x":"i acceptar els riscos de la denúncia i el compromís profètic"},{"t":"p","x":"que comporta la nostra missió evangelitzadora."},{"t":"p","x":"Volem solidaritzar-nos i compartir les angoixes,"},{"t":"p","x":"les privacions i les esperances dels homes"},{"t":"p","x":"als quals som enviats."},{"t":"p","x":"I, tot confessant que el vostre Fill està viu entre els homes,"},{"t":"p","x":"volem treballar per acabar amb la incredulitat, l'odi, la injustícia,"},{"t":"p","x":"la mentida, l'opressió, el dolor, la solitud, la fam, la ignorància"},{"t":"p","x":"i tantes altres urgències d'amor que són urgències del Regne."},{"t":"p","x":"Us ho demanem pel vostre Fill Jesucrist, que viu i regna pels segles dels segles."},{"t":"p","x":"Amén."}]},{"id":"78","num":"78","title":"Oració missionera","theme":"missio","sub":null,"tags":[],"lines":[{"t":"p","x":"Oh Pare,"},{"t":"p","x":"que heu vessat els dons del vostre Esperit"},{"t":"p","x":"sobre la benaurada Verge Maria,"},{"t":"p","x":"quan pregava amb els Apòstols al Cenacle,"},{"t":"p","x":"feu que perseverem unànimes en l'oració"},{"t":"p","x":"amb Maria, la nostra Mare, per a dur al món,"},{"t":"p","x":"amb la força de l'Esperit,"},{"t":"p","x":"la Bona Nova de la salvació."},{"t":"p","x":"Per Crist Senyor nostre."},{"t":"p","x":"Amén."}]},{"id":"78b","num":"78b","title":"Per les missions populars","theme":"missio","sub":null,"tags":["
