<style>
:root{
  --garnet:#7b1e2b;
  --garnet-dark:#6d1a2e;
  --gold:#c9a13b;
  --gold-light:#d4af37;
  --bg:#faf6f1;
  --surface:#ffffff;
  --text:#2a2220;
  --text-soft:#6b5d56;
  --border:#e6dccf;
  --shadow:rgba(123,30,43,0.12);
}
:root.dark{
  --bg:#1b1512;
  --surface:#241c19;
  --text:#ede4da;
  --text-soft:#a89a90;
  --border:#3a2f2a;
  --shadow:rgba(0,0,0,0.4);
}
*{box-sizing:border-box; -webkit-tap-highlight-color:transparent;}
html{-webkit-text-size-adjust:100%;}
body{
  margin:0; background:var(--bg); color:var(--text);
  font-family:'Literata',serif;
  transition:background .3s, color .3s;
  min-height:100vh;
  font-size:calc(15px * var(--fscale, 1));
}
.serif{font-family:'Cormorant Garamond',serif;}

header.top{
  background:linear-gradient(135deg,var(--garnet),var(--garnet-dark));
  color:#f5ece0; padding:22px 18px 26px; position:relative; overflow:hidden;
}
header.top::after{
  content:''; position:absolute; inset:0;
  background:radial-gradient(circle at 85% 20%, rgba(212,175,55,0.18), transparent 55%);
  pointer-events:none;
}
header.top h1{
  font-family:'Cormorant Garamond',serif; font-weight:700; font-size:2.1rem;
  margin:0 0 2px; letter-spacing:.02em; position:relative;
}
header.top p{margin:0; opacity:.82; font-size:.92rem; position:relative;}
.top-controls{
  position:absolute; top:16px; right:14px; display:flex; gap:6px; z-index:2;
}
.icon-btn{
  background:rgba(255,255,255,0.12); border:1px solid rgba(255,255,255,0.25);
  color:#f5ece0; width:34px; height:34px; border-radius:50%;
  display:flex; align-items:center; justify-content:center; cursor:pointer;
  font-size:.95rem; transition:background .2s;
}
.icon-btn:hover{background:rgba(255,255,255,0.24);}

.tabs{
  display:flex; gap:8px; padding:14px 16px 0; max-width:760px; margin:0 auto;
}
.tab-btn{
  flex:1; border:1px solid var(--border); background:var(--surface); color:var(--text-soft);
  border-radius:12px 12px 0 0; padding:11px 8px; font-family:'Literata',serif; font-size:.85rem;
  font-weight:600; cursor:pointer; display:flex; align-items:center; justify-content:center; gap:6px;
  transition:all .2s; border-bottom:none;
}
.tab-btn.active{color:var(--garnet); background:var(--surface); box-shadow:0 -2px 6px var(--shadow);}
:root.dark .tab-btn.active{color:var(--gold-light);}

main{max-width:760px; margin:0 auto; padding:0 16px 60px;}
.panel{
  background:var(--surface); border:1px solid var(--border); border-radius:0 0 14px 14px;
  padding:16px; box-shadow:0 2px 10px var(--shadow);
}

.search-row{display:flex; gap:8px; flex-wrap:wrap; margin-bottom:12px;}
input[type=text], select{
  font-family:'Literata',serif; font-size:.92rem; padding:10px 12px;
  border:1px solid var(--border); border-radius:10px; background:var(--bg); color:var(--text);
  flex:1; min-width:140px;
}
input[type=text]:focus, select:focus{outline:2px solid var(--gold); outline-offset:1px;}

.meta-row{
  display:flex; justify-content:space-between; align-items:baseline; margin:2px 2px 12px;
  font-size:.82rem; color:var(--text-soft);
}
.meta-row .count strong{color:var(--garnet);}
:root.dark .meta-row .count strong{color:var(--gold-light);}

.card{
  border:1px solid var(--border); border-left:3px solid var(--gold);
  border-radius:8px; padding:11px 13px; margin-bottom:8px; background:var(--bg);
  transition:transform .15s, box-shadow .15s;
}
.card:hover{transform:translateX(2px);}
.card.no-exact{border-left-color:var(--text-soft);}
.card .name{
  font-family:'Cormorant Garamond',serif; font-weight:600; font-size:1.18rem; color:var(--text);
  margin:0 0 3px;
}
.card .name-latin{
  font-family:'Literata',serif; font-style:italic; font-size:.76rem; color:var(--text-soft);
  margin:0 0 4px;
}
.card .row2{
  display:flex; flex-wrap:wrap; gap:6px 14px; font-size:.83rem; color:var(--text-soft);
  align-items:center;
}
.card .row2 .fecha{color:var(--garnet); font-weight:600;}
:root.dark .card .row2 .fecha{color:var(--gold-light);}
.badge{
  display:inline-block; background:var(--garnet); color:#fff; font-size:.72rem;
  padding:2px 8px; border-radius:20px; font-weight:600;
}
:root.dark .badge{background:var(--gold); color:#241c19;}
.badge-pais{background:var(--gold-light); color:#3a2a08;}
:root.dark .badge-pais{background:#7b1e2b; color:#f5ece0;}

.empty-msg{text-align:center; padding:40px 10px; color:var(--text-soft); font-style:italic;}

.icon-reset{
  font-family:'Literata',serif; font-size:.85rem; font-weight:600; white-space:nowrap;
  border:1px solid var(--border); background:var(--bg); color:var(--text-soft);
  border-radius:10px; padding:0 14px; cursor:pointer; transition:all .2s;
}
.icon-reset:hover{border-color:var(--garnet); color:var(--garnet);}
:root.dark .icon-reset:hover{border-color:var(--gold-light); color:var(--gold-light);}

.load-more{
  display:block; margin:14px auto 4px; background:none; border:1px solid var(--garnet); color:var(--garnet);
  padding:9px 22px; border-radius:20px; font-family:'Literata',serif; font-weight:600; cursor:pointer;
  font-size:.85rem;
}
:root.dark .load-more{border-color:var(--gold-light); color:var(--gold-light);}

.hoy-header{
  text-align:center; padding:6px 0 16px;
}
.hoy-header .big-date{
  font-family:'Cormorant Garamond',serif; font-size:1.6rem; font-weight:700; color:var(--garnet);
}
:root.dark .hoy-header .big-date{color:var(--gold-light);}
.hoy-header .sub{color:var(--text-soft); font-size:.85rem; margin-top:2px;}

.fscale-controls{display:flex; gap:4px; align-items:center;}
.fscale-controls button{
  background:rgba(255,255,255,0.12); border:1px solid rgba(255,255,255,0.25); color:#f5ece0;
  width:28px; height:28px; border-radius:50%; cursor:pointer; font-size:.8rem;
}

footer.stats{
  max-width:760px; margin:16px auto 0; padding:14px 16px; text-align:center;
  color:var(--text-soft); font-size:.78rem;
}

@media (max-width:480px){
  header.top h1{font-size:1.7rem;}
  .tab-btn{font-size:.78rem; padding:10px 4px;}
}
</style>
</head>
<body>

<header class="top">
  <div class="top-controls">
    <div class="fscale-controls">
      <button id="fdown" title="Reducir texto">A−</button>
      <button id="fup" title="Aumentar texto">A+</button>
    </div>
    <button class="icon-btn" id="darkToggle" title="Modo oscuro">◐</button>
  </div>
  <h1>Necrologio CMF</h1>
  <p>Difuntos de la Congregación de Misioneros Claretianos · desde 1852</p>
</header>

<nav class="tabs">
  <button class="tab-btn active" data-view="buscar">🔍 Buscar</button>
  <button class="tab-btn" data-view="hoy">🕯️ Hoy</button>
</nav>

<main>
  <section class="panel" id="view-buscar">
    <div class="search-row">
      <input type="text" id="q" placeholder="Nombre, apellidos, lugar o año de fallecimiento…">
      <button class="icon-reset" id="resetBtn" title="Quitar todos los filtros">🏠 Inicio</button>
    </div>
    <div class="search-row">
      <select id="catFilter"><option value="">Toda categoría</option></select>
      <select id="paisFilter"><option value="">Todo país</option></select>
      <select id="provFilter"><option value="">Toda provincia / delegación</option></select>
    </div>
    <div class="search-row">
      <select id="sortSel">
        <option value="year-asc">Año ↑ (más antiguo primero)</option>
        <option value="year-desc">Año ↓ (más reciente primero)</option>
        <option value="name-asc">Nombre A–Z</option>
      </select>
    </div>
    <div class="meta-row">
      <span class="count"><strong id="countN">0</strong> registros</span>
    </div>
    <div id="results"></div>
    <button class="load-more" id="loadMoreBtn" style="display:none;">Mostrar más</button>
    <div class="empty-msg" id="emptyMsg" style="display:none;">No se ha encontrado ningún difunto con ese criterio.</div>
  </section>

  <section class="panel" id="view-hoy" style="display:none;">
    <div class="hoy-header">
      <div class="big-date" id="hoyFecha"></div>
      <div class="sub" id="hoySub"></div>
    </div>
    <div id="hoyResults"></div>
    <div class="empty-msg" id="hoyEmpty" style="display:none;">
      No consta en el Necrologio ningún difunto fallecido un día como hoy.
    </div>
  </section>
</main>

<footer class="stats" id="statsFooter"></footer>

<script>
(function(){
  // ---------- Preferencias ----------
  const root = document.documentElement;
  const savedDark = localStorage.getItem('necro_dark');
  if(savedDark === '1') root.classList.add('dark');
  document.getElementById('darkToggle').addEventListener('click', ()=>{
    root.classList.toggle('dark');
    localStorage.setItem('necro_dark', root.classList.contains('dark') ? '1':'0');
  });
  let fscale = parseFloat(localStorage.getItem('necro_fscale') || '1');
  function applyFscale(){ document.body.style.setProperty('--fscale', fscale); }
  applyFscale();
  document.getElementById('fup').addEventListener('click', ()=>{ fscale = Math.min(1.4, fscale+0.1); localStorage.setItem('necro_fscale', fscale); applyFscale(); });
  document.getElementById('fdown').addEventListener('click', ()=>{ fscale = Math.max(0.8, fscale-0.1); localStorage.setItem('necro_fscale', fscale); applyFscale(); });

  // ---------- Utilidades ----------
  function norm(s){
    return (s||'').toString().normalize('NFD').replace(/[\u0300-\u036f]/g,'').toLowerCase();
  }
  const MESES = ['enero','febrero','marzo','abril','mayo','junio','julio','agosto','septiembre','octubre','noviembre','diciembre'];

  function fechaLabel(r){
    if(r.d && r.m && r.y){
      const dd = String(r.d).padStart(2,'0'), mm = String(r.m).padStart(2,'0');
      return dd + '/' + mm + '/' + r.y;
    }
    return r.fr;
  }

  // ---------- Provincias y paises para los desplegables ----------
  const provs = Array.from(new Set(DATA.filter(r=>r.p).map(r=>r.p))).sort((a,b)=>a.localeCompare(b,'es'));
  const provSel = document.getElementById('provFilter');
  provs.forEach(p=>{
    const o = document.createElement('option'); o.value = p; o.textContent = p; provSel.appendChild(o);
  });
  const paises = Array.from(new Set(DATA.filter(r=>r.pa).map(r=>r.pa))).sort((a,b)=>a.localeCompare(b,'es'));
  const paisSel = document.getElementById('paisFilter');
  paises.forEach(p=>{
    const o = document.createElement('option'); o.value = p; o.textContent = p; paisSel.appendChild(o);
  });
  const ORDEN_CAT = ['P.','Fr.','Sch.','Nov.','Sch. nov.','Fr. nov.','Diac.','Ep.','Archiep.','Card.'];
  const cats = Array.from(new Set(DATA.filter(r=>r.cg).map(r=>r.cg)))
    .sort((a,b)=> ORDEN_CAT.indexOf(a) - ORDEN_CAT.indexOf(b));
  const catSel = document.getElementById('catFilter');
  cats.forEach(c=>{
    const o = document.createElement('option'); o.value = c; o.textContent = c; catSel.appendChild(o);
  });

  // ---------- Vista Buscar ----------
  const qInput = document.getElementById('q');
  const sortSel = document.getElementById('sortSel');
  const resultsEl = document.getElementById('results');
  const countN = document.getElementById('countN');
  const loadMoreBtn = document.getElementById('loadMoreBtn');
  const emptyMsg = document.getElementById('emptyMsg');

  let filtered = [];
  let shown = 0;
  const PAGE = 60;

  function cardHTML(r){
    const badgeProv = r.p ? '<span class="badge">'+r.p+'</span>' : '';
    const badgePais = r.pa ? '<span class="badge badge-pais">'+r.pa+'</span>' : '';
    const lugar = r.l ? r.l : '<em>lugar no consta</em>';
    const cat = r.cg ? r.cg+' ' : '';
    const nombrePrincipal = cat + (r.ne ? r.ne : r.n);
    const nombreLatin = r.ne ? '<p class="name-latin">'+cat+r.n+'</p>' : '';
    return '<div class="card'+(r.ex?'':' no-exact')+'">'+
      '<p class="name">'+nombrePrincipal+'</p>'+nombreLatin+
      '<div class="row2"><span class="fecha">'+fechaLabel(r)+'</span><span>'+lugar+'</span>'+badgePais+badgeProv+'</div>'+
    '</div>';
  }

  function renderPage(){
    const slice = filtered.slice(shown, shown+PAGE);
    resultsEl.insertAdjacentHTML('beforeend', slice.map(cardHTML).join(''));
    shown += slice.length;
    loadMoreBtn.style.display = shown < filtered.length ? 'block' : 'none';
  }

  function runSearch(){
    const qRaw = qInput.value.trim();
    const q = norm(qRaw);
    const yearQuery = /^\d{4}$/.test(qRaw) ? parseInt(qRaw,10) : null;
    const prov = provSel.value;
    const pais = paisSel.value;
    const cat = catSel.value;
    filtered = DATA.filter(r=>{
      if(prov && r.p !== prov) return false;
      if(pais && r.pa !== pais) return false;
      if(cat && r.cg !== cat) return false;
      if(!q) return true;
      if(yearQuery !== null && r.y === yearQuery) return true;
      return norm(r.n).includes(q) || norm(r.ne).includes(q) || norm(r.l).includes(q) || norm(r.pa).includes(q);
    });
    const sort = sortSel.value;
    if(sort === 'year-asc') filtered.sort((a,b)=>(a.y||9999)-(b.y||9999));
    else if(sort === 'year-desc') filtered.sort((a,b)=>(b.y||-1)-(a.y||-1));
    else if(sort === 'name-asc') filtered.sort((a,b)=>(a.ne||a.n).localeCompare(b.ne||b.n,'es'));

    resultsEl.innerHTML = '';
    shown = 0;
    countN.textContent = filtered.length;
    emptyMsg.style.display = filtered.length ? 'none' : 'block';
    renderPage();
  }

  let debounceT;
  qInput.addEventListener('input', ()=>{ clearTimeout(debounceT); debounceT = setTimeout(runSearch, 180); });
  provSel.addEventListener('change', runSearch);
  paisSel.addEventListener('change', runSearch);
  catSel.addEventListener('change', runSearch);
  sortSel.addEventListener('change', runSearch);
  loadMoreBtn.addEventListener('click', renderPage);

  document.getElementById('resetBtn').addEventListener('click', ()=>{
    qInput.value = '';
    provSel.value = '';
    paisSel.value = '';
    catSel.value = '';
    sortSel.value = 'year-asc';
    runSearch();
    qInput.focus();
  });

  // ---------- Vista Hoy ----------
  function renderHoy(){
    const now = new Date();
    const day = now.getDate(), month = now.getMonth()+1;
    document.getElementById('hoyFecha').textContent = day + ' de ' + MESES[month-1];
    const matches = DATA.filter(r=>r.ex && r.d===day && r.m===month).sort((a,b)=>a.y-b.y);
    document.getElementById('hoySub').textContent = matches.length
      ? matches.length + (matches.length===1 ? ' difunto falleció' : ' difuntos fallecieron') + ' un día como hoy'
      : 'a lo largo de la historia de la Congregación';
    const hoyResults = document.getElementById('hoyResults');
    const hoyEmpty = document.getElementById('hoyEmpty');
    hoyResults.innerHTML = matches.map(cardHTML).join('');
    hoyEmpty.style.display = matches.length ? 'none' : 'block';
  }

  // ---------- Tabs ----------
  document.querySelectorAll('.tab-btn').forEach(btn=>{
    btn.addEventListener('click', ()=>{
      document.querySelectorAll('.tab-btn').forEach(b=>b.classList.remove('active'));
      btn.classList.add('active');
      const view = btn.dataset.view;
      document.getElementById('view-buscar').style.display = view==='buscar' ? 'block':'none';
      document.getElementById('view-hoy').style.display = view==='hoy' ? 'block':'none';
      location.hash = '#' + view;
      if(view==='hoy') renderHoy();
    });
  });

  // ---------- Enrutado inicial ----------
  function initFromHash(){
    const h = location.hash.replace('#','');
    if(h==='hoy'){
      document.querySelector('[data-view="hoy"]').click();
    } else {
      runSearch();
    }
  }

  // ---------- Estadísticas ----------
  const years = DATA.map(r=>r.y).filter(Boolean);
  const minY = Math.min(...years), maxY = Math.max(...years);
  document.getElementById('statsFooter').textContent =
    DATA.length + ' misioneros claretianos registrados, fallecidos entre ' + minY + ' y ' + maxY + '.';

  initFromHash();
})();
</script>
</body>
</html>
