{"t":"p","x":"trayendo a tu presencia el dolor y las humillaciones de nuestros pueblos,"},
{"t":"p","x":"el clamor de los pobres que nos enviaste a evangelizar,"},
{"t":"p","x":"las esperanzas de los humildes que abrieron su corazón a tu mensaje"},
{"t":"p","x":"y que por doquier lo hacen florecer en fraternidad, en la Iglesia."},
{"t":"p","x":"Concédenos que, celebrando y contemplando tu Palabra,"},
{"t":"p","x":"aprendamos a discernir en la fe los signos de este tiempo,"},
{"t":"p","x":"y a proclamarte a Ti, que eres verdad completa siempre nueva,"},
{"t":"p","x":"en medio de las ambigüedades y contradicciones de este mundo."},
{"t":"p","x":"Que tu presencia resucitada entre nosotros"},
{"t":"p","x":"disipe temores y desalientos,"},
{"t":"p","x":"y nos haga optar con libertad y fortaleza,"},
{"t":"p","x":"por tu propuesta de vida, de justicia y de fraternidad,"},
{"t":"p","x":"allí donde se cultivan proyectos de destrucción, de opresión y de violencia."},
{"t":"p","x":"Envíanos tu Espíritu"},
{"t":"p","x":"para que, como en María, la Virgen Madre,"},
{"t":"p","x":"cree en nosotros un corazón nuevo,"},
{"t":"p","x":"encendido en caridad apostólica,"},
{"t":"p","x":"disponible ante los desafíos de la nueva evangelización,"},
{"t":"p","x":"fecundo en obras de amor y de servicio a los más necesitados."},
{"t":"p","x":"Haz que seamos instrumentos de comunión y de reconciliación"},
{"t":"p","x":"para que en los pueblos a los que nos enviaste,"},
{"t":"p","x":"la comunidad de los que creen en Ti"},
{"t":"p","x":"sea transparencia de tu designio de salvación y glorifique tu nombre."},
{"t":"p","x":"Amén."}]},
{"id":"83","num":"83","title":"Queremos hacer tu voluntad","theme":"mision","sub":null,"tags":[],"lines":[
{"t":"p","x":"Padre nuestro,"},
{"t":"p","x":"Padre de bondad y misericordia:"},
{"t":"p","x":"estamos aquí reunidos en nombre del amor que tú nos tienes."},
{"t":"p","x":"Te alabamos, te bendecimos y te damos gracias."},
{"t":"p","x":"Con gozo respondemos a la llamada que en tu Hijo nos diriges"},
{"t":"p","x":"y, alentados por la fuerza del Espíritu,"},
{"t":"p","x":"te decimos confiados: «queremos hacer tu voluntad»."},
{"t":"p","x":"Danos una mirada limpia, una inteligencia abierta y un corazón ardiente"},
{"t":"p","x":"para comprender y abrazar el designio que tienes sobre nosotros."},
{"t":"p","x":"Al pensar en la misión que nos confías,"},
{"t":"p","x":"advertimos las profundas y constantes exigencias que tenemos que cumplir."},
{"t":"p","x":"Aumenta en nosotros la generosidad y la esperanza"},
{"t":"p","x":"y ábrenos a las necesidades más urgentes de los hombres."},
{"t":"p","x":"Que acertemos a expresar en nuestra vida"},
{"t":"p","x":"el amor universal de Jesucristo, su incondicional entrega"},
{"t":"p","x":"y el completo olvido que tuvo de sí mismo"},
{"t":"p","x":"en la realización de su misión salvadora en este mundo."},
{"t":"p","x":"Confírmanos en la verdad; danos sed de tu justicia"},
{"t":"p","x":"y haznos útiles instrumentos para la paz."},
{"t":"p","x":"Que seamos fuerzas vivas de comunión en esta Iglesia peregrina"},
{"t":"p","x":"y consigamos ser testigos del soberano poder de Cristo resucitado"},
{"t":"p","x":"en medio de este pueblo que sufre su pasión de libertad."},
{"t":"p","x":"Que seamos responsables en toda acción y compromiso,"},
{"t":"p","x":"y no permitas que, proclamando el Evangelio, busquemos nuestros propios intereses."},
{"t":"p","x":"Concédenos, Señor, la caridad apostólica de San Antonio María Claret, nuestro Padre."},
{"t":"p","x":"Enséñanos, como a él, a discernir en todo tiempo lo que te agrada,"},
{"t":"p","x":"lo que es justo y lo que construye tu Reino entre los hombres."},
{"t":"p","x":"Te lo pedimos por Jesucristo, nuestro Señor."},
{"t":"p","x":"Amén."}]},
{"id":"84","num":"84","title":"Por las vocaciones","theme":"vocaciones","sub":null,"tags":[],"lines":[
{"t":"p","x":"Señor Jesucristo, que dijiste:"},
{"t":"p","x":"«Rogad al Señor de la mies para que envíe obreros a su mies»:"},
{"t":"p","x":"Te pedimos humildemente"},
{"t":"p","x":"que te dignes enviarlos a nuestra Congregación."},
{"t":"p","x":"Infunde tu Espíritu en los que has elegido"},
{"t":"p","x":"y confírmalos en la vocación,"},
{"t":"p","x":"para que anunciando digna y fructuosamente tu santo Evangelio"},
{"t":"p","x":"nos llamemos y seamos de verdad"},
{"t":"p","x":"Hijos del Inmaculado Corazón de la Santísima Virgen María,"},
{"t":"p","x":"te amemos de todo corazón, de palabra y de obra,"},
{"t":"p","x":"y no cesemos nunca en tu alabanza."},
{"t":"p","x":"Amén."}]},
{"id":"85","num":"85","title":"Vocación","theme":"vocaciones","sub":null,"tags":[],"lines":[
{"t":"p","x":"Señor, Tú, que llamaste a los Apóstoles"},
{"t":"p","x":"para que fueran pescadores de hombres,"},
{"t":"p","x":"llama a la Familia Claretiana"},
{"t":"p","x":"nuevos miembros"},
{"t":"p","x":"que sean sal de la tierra y luz del mundo"},
{"t":"p","x":"y difundan en todas partes la caridad"},
{"t":"p","x":"que apremiaba a tu siervo Antonio María."},
{"t":"p","x":"Por Jesucristo nuestro Señor."},
{"t":"p","x":"Amén."}]},
{"id":"86","num":"86","title":"Por intercesión del Corazón Inmaculado de María","theme":"vocaciones","sub":null,"tags":[],"lines":[
{"t":"p","x":"Señor Dios nuestro, que por el Corazón Inmaculado de María,"},
{"t":"p","x":"diste a San Antonio María Claret"},
{"t":"p","x":"un gran amor a tu Hijo Jesús"},
{"t":"p","x":"y le inspiraste la fundación de la Congregación de Misioneros,"},
{"t":"p","x":"para salvar a todos los hombres,"},
{"t":"p","x":"bendice con nuevas vocaciones a la Congregación Claretiana,"},
{"t":"p","x":"e intercede ante el Señor"},
{"t":"p","x":"para que todos los misioneros Hijos del Corazón de María"},
{"t":"p","x":"perseveremos hasta el fin"},
{"t":"p","x":"en el anuncio del Evangelio."},
{"t":"p","x":"Amén."}]},
{"id":"87","num":"87","title":"Plegaria para pedir al Señor vocaciones claretianas","theme":"vocaciones","sub":null,"tags":["responsorial"],"lines":[
{"t":"p","x":"Señor, para continuar la gran obra de San Antonio María Claret en todo el mundo,"},
{"t":"r","x":"Envíanos muchos y santos Misioneros."},
{"t":"p","x":"Señor, para santificar a los pueblos cristianos con la predicación y demás trabajos apostólicos,"},
{"t":"r","x":"Envíanos muchos y santos Misioneros."},
{"t":"p","x":"Señor, para llevar la luz del Evangelio a los que no te conocen,"},
{"t":"r","x":"Envíanos muchos y santos Misioneros."},
{"t":"p","x":"Señor, para procurar el Reinado del Inmaculado Corazón de María,"},
{"t":"r","x":"Envíanos muchos y santos Misioneros."},
{"t":"p","x":"Señor, para que por medio del Inmaculado Corazón de María se cumpla siempre tu voluntad,"},
{"t":"r","x":"Envíanos muchos y santos Misioneros."},
{"t":"p","x":"Señor, para que todas las personas sean educadas cristianamente y tengamos una sociedad más justa y más humana, siguiendo tu voluntad,"},
{"t":"r","x":"Envíanos muchos y santos Misioneros."},
{"t":"p","x":"Jesús, primer Hijo del Inmaculado Corazón de María,"},
{"t":"r","x":"Envíanos muchos y santos Misioneros."},
{"t":"p","x":"Corazón Inmaculado de María, madre de todos los hombres,"},
{"t":"r","x":"Envíanos muchos y santos Misioneros."},
{"t":"rub","x":"Oración:"},
{"t":"p","x":"Padre nuestro,"},
{"t":"p","x":"que quieres que todos los hombres se salven"},
{"t":"p","x":"y lleguen al conocimiento de la verdad,"},
{"t":"p","x":"te rogamos que envíes obreros a tu mies"},
{"t":"p","x":"y les concedas predicar con confianza tu Palabra,"},
{"t":"p","x":"para que la verdad se difunda y se esclarezca"},
{"t":"p","x":"y todas las gentes te conozcan a ti, único Dios verdadero."},
{"t":"p","x":"Por Jesucristo, nuestro Señor."},
{"t":"p","x":"Amén."}]},
{"id":"88","num":"88","title":"Por las vocaciones misioneras","theme":"vocaciones","sub":null,"tags":[],"lines":[
{"t":"p","x":"Oh Dios,"},
{"t":"p","x":"que quieres que todos los hombres se salven"},
{"t":"p","x":"y lleguen al conocimiento de la verdad,"},
{"t":"p","x":"atrae hacia Ti seguidores de tu Hijo,"},
{"t":"p","x":"al estilo de San Antonio María Claret,"},
{"t":"p","x":"y envíalos al campo del mundo"},
{"t":"p","x":"para que prediquen el Evangelio a toda criatura,"},
{"t":"p","x":"y tu pueblo, congregado por la Palabra de vida"},
{"t":"p","x":"y sostenido por la fuerza de los sacramentos,"},
{"t":"p","x":"camine por las sendas de la salvación y del amor."},
{"t":"p","x":"Por Jesucristo nuestro Señor."},
{"t":"p","x":"Amén."}]},
{"id":"89","num":"89","title":"Oración por las vocaciones y la perseverancia","theme":"vocaciones","sub":null,"tags":[],"lines":[
{"t":"p","x":"Tú, Señor, que has dicho que la mies es abundante, y los trabajadores pocos,"},
{"t":"p","x":"y quieres que se multiplique el número de apóstoles y evangelizadores"},
{"t":"p","x":"que dilaten tu Reino y transformen la faz de la tierra;"},
{"t":"p","x":"te rogamos que aumentes el número"},
{"t":"p","x":"y la calidad evangélica de quienes trabajan por el bien de los hombres."},
{"t":"p","x":"Te damos gracias por las vocaciones que nos has concedido"},
{"t":"p","x":"por el Corazón Inmaculado de María, nuestra Madre."},
{"t":"p","x":"Concédenos tu presencia y tu asistencia"},
{"t":"p","x":"para que vengan muchas vocaciones a nuestro Instituto,"},
{"t":"p","x":"y ayúdanos a todos a perseverar en nuestra vocación."},
{"t":"p","x":"Por Jesucristo, nuestro Señor."},
{"t":"p","x":"Amén."}]},
{"id":"90","num":"90","title":"Por las vocaciones a todos los estados de vida y ministerios","theme":"vocaciones","sub":null,"tags":["responsorial"],"lines":[
{"t":"p","x":"Iluminados y animados por tu Palabra,"},
{"t":"p","x":"te pedimos, Señor, por todos aquellos"},
{"t":"p","x":"que ya han oído tu llamada y la han seguido."},
{"t":"r","x":"Te rogamos, óyenos."},
{"t":"p","x":"Por el Papa, los obispos, presbíteros, diáconos"},
{"t":"p","x":"y por los misioneros y todos los consagrados"},
{"t":"p","x":"para que vivan con gozo su vocación"},
{"t":"p","x":"y con su vida y su palabra te hagan presente en medio de los hombres."},
{"t":"r","x":"Te rogamos, óyenos."},
{"t":"p","x":"Por los laicos y los seglares que"},
{"t":"p","x":"trabajan generosamente en los ministerios"},
{"t":"p","x":"instituidos por la Iglesia"},
{"t":"p","x":"y en los servicios necesarios para la comunidad."},
{"t":"r","x":"Te rogamos, óyenos."},
{"t":"p","x":"Sosténlos en las dificultades,"},
{"t":"p","x":"confórtalos en los sufrimientos,"},
{"t":"p","x":"asístelos en la soledad,"},
{"t":"p","x":"protégelos en la persecución"},
{"t":"p","x":"y confírmalos en la fidelidad."},
{"t":"r","x":"Te rogamos, óyenos."},
{"t":"p","x":"Te pedimos, Señor, por aquellos"},
{"t":"p","x":"que abren su corazón a tu llamada"},
{"t":"p","x":"y se preparan para seguirla."},
{"t":"r","x":"Te rogamos, óyenos."},
{"t":"p","x":"Que tu Palabra los ilumine,"},
{"t":"p","x":"tu personalidad los conquiste,"},
{"t":"p","x":"y tu Espíritu los guíe a la meta"},
{"t":"p","x":"de la profesión religiosa o de las órdenes sagradas."},
{"t":"r","x":"Te rogamos, óyenos."},
{"t":"p","x":"Sé para ellos, Señor, apoyo firme"},
{"t":"p","x":"y haz que encuentren quien les pueda"},
{"t":"p","x":"aconsejar, acompañar y sostener"},
{"t":"p","x":"con la fuerza de convicción y amor"},
{"t":"p","x":"que sólo Tú puedes comunicar."},
{"t":"r","x":"Te rogamos, óyenos."},
{"t":"p","x":"Te lo pedimos por Jesucristo, nuestro Señor."},
{"t":"p","x":"Amén."}]},
{"id":"92","num":"92","title":"Por nuestros hermanos enfermos","theme":"enfermos","sub":null,"tags":["responsorial"],"lines":[
{"t":"v","x":"Salva, Señor, a tus siervos,"},
{"t":"r","x":"que esperan en Ti."},
{"t":"v","x":"Envíales tu auxilio desde el Santuario"},
{"t":"r","x":"y protégelos desde Sión."},
{"t":"v","x":"Sé su baluarte, Señor,"},
{"t":"r","x":"frente al enemigo."},
{"t":"v","x":"Concédeles tu fortaleza"},
{"t":"r","x":"en el lecho del dolor."},
{"t":"v","x":"Señor, escucha nuestra oración"},
{"t":"r","x":"y llegue a Ti nuestro clamor."},
{"t":"v","x":"El Señor esté con vosotros"},
{"t":"r","x":"y con tu espíritu."},
{"t":"rub","x":"Oremos:"},
{"t":"p","x":"Oh Dios,"},
{"t":"p","x":"que siempre te compadeces y perdonas,"},
{"t":"p","x":"acoge nuestra plegaria"},
{"t":"p","x":"para que tu piedad misericordiosa nos absuelva benignamente"},
{"t":"p","x":"a nosotros y a tus siervos enfermos."},
{"t":"p","x":"Por Jesucristo, nuestro Señor."},
{"t":"p","x":"Amén."},
{"t":"rub","x":"O bien:"},
{"t":"p","x":"Oh Dios, amparo singular de la debilidad humana,"},
{"t":"p","x":"muestra la fuerza de tu auxilio sobre tus siervos enfermos,"},
{"t":"p","x":"para que, ayudados por tu misericordia,"},
{"t":"p","x":"merezcan de nuevo presentarse sanos ante tu Iglesia."},
{"t":"p","x":"Por Jesucristo, nuestro Señor."},
{"t":"p","x":"Amén."},
{"t":"rub","x":"O bien:"},
{"t":"p","x":"Te pedimos, Señor,"},
{"t":"p","x":"que nosotros, tus siervos, gocemos siempre de salud de alma y cuerpo"},
{"t":"p","x":"y, por la intercesión de Santa María, la Virgen,"},
{"t":"p","x":"líbranos de las tristezas de este mundo y concédenos las alegrías del cielo."},
{"t":"p","x":"Por Jesucristo, nuestro Señor."},
{"t":"p","x":"Amén."}]},
{"id":"93","num":"93","title":"Por nuestros hermanos difuntos","theme":"difuntos","sub":null,"tags":[],"lines":[
{"t":"p","x":"Oh Dios, que mantienes la esperanza de nuestra felicidad futura,"},
{"t":"p","x":"en el misterio pascual de tu Hijo,"},
{"t":"p","x":"humildemente te pedimos que"},
{"t":"p","x":"cuantos en la tierra participaron de nuestra fraternidad claretiana"},
{"t":"p","x":"y gastaron su vida en la propagación de tu Reino,"},
{"t":"p","x":"alcancen el gozo de la felicidad eterna con los moradores de la patria celestial."},
{"t":"p","x":"Por Jesucristo nuestro Señor."},
{"t":"p","x":"Amén."}]},
{"id":"95","num":"95","title":"Oración por los padres difuntos","theme":"difuntos","sub":null,"tags":[],"lines":[
{"t":"p","x":"Oh Dios, que nos has mandado honrar padre y madre,"},
{"t":"p","x":"ten misericordia de nuestros padres:"},
{"t":"p","x":"perdona sus pecados y haz que nos reunamos"},
{"t":"p","x":"un día con ellos en la claridad de tu gloria."},
{"t":"p","x":"Por Jesucristo, nuestro Señor."},
{"t":"p","x":"Amén."}]},
{"id":"96","num":"96","title":"Oración por los familiares y bienhechores","theme":"difuntos","sub":null,"tags":[],"lines":[
{"t":"p","x":"Oh Dios, que por el misterio pascual de tu Hijo"},
{"t":"p","x":"mantienes la esperanza de nuestra resurrección,"},
{"t":"p","x":"te pedimos humildemente"},
{"t":"p","x":"que todos los que participaron en la tierra"},
{"t":"p","x":"de nuestra fraternidad claretiana"},
{"t":"p","x":"y colaboraron en nuestra misión de anunciar el Evangelio"},
{"t":"p","x":"alcancen el gozo de la felicidad eterna."},
{"t":"p","x":"Por Jesucristo, nuestro Señor."},
{"t":"p","x":"Amén."}]},
{"id":"97","num":"97","title":"Oración por los hermanos, parientes y bienhechores","theme":"difuntos","sub":null,"tags":[],"lines":[
{"t":"p","x":"Oh Dios que concedes el perdón de los pecados"},
{"t":"p","x":"y quieres la salvación de los hombres:"},
{"t":"p","x":"por intercesión de Santa María la Virgen y de todos los santos,"},
{"t":"p","x":"concede a nuestros hermanos, parientes y bienhechores"},
{"t":"p","x":"que han salido ya de este mundo"},
{"t":"p","x":"alcanzar la eterna bienaventuranza."},
{"t":"p","x":"Por Jesucristo, nuestro Señor."},
{"t":"p","x":"Amén."}]},
{"id":"101","num":"101","title":"Ángelus","theme":"angelus","sub":null,"tags":["Ángelus"],"lines":[
{"t":"rub","x":"Se recita después del rezo de las laudes, fuera de Pascua."},
{"t":"v","x":"El ángel del Señor anunció a María."},
{"t":"r","x":"Y concibió por el Espíritu Santo."},
{"t":"rub","x":"Avemaría."},
{"t":"v","x":"He aquí la esclava del Señor."},
{"t":"r","x":"Hágase en mí según tu palabra."},
{"t":"rub","x":"Avemaría."},
{"t":"v","x":"Y el Verbo se hizo carne."},
{"t":"r","x":"Y habitó entre nosotros."},
{"t":"rub","x":"Avemaría."},
{"t":"v","x":"Ruega por nosotros, Santa Madre de Dios."},
{"t":"r","x":"Para que seamos dignos de las promesas de Jesucristo."},
{"t":"rub","x":"Oremos:"},
{"t":"p","x":"Oh Dios, que por el anuncio del Ángel,"},
{"t":"p","x":"has revelado la encarnación de tu Hijo,"},
{"t":"p","x":"te pedimos que, por su pasión y muerte,"},
{"t":"p","x":"lleguemos a la gloria de la resurrección."},
{"t":"p","x":"Por el mismo Jesucristo, nuestro Señor."},
{"t":"p","x":"Amén."},
{"t":"rub","x":"En el tiempo pascual (Regina caeli):"},
{"t":"p","x":"Reina del cielo, alégrate, aleluya,"},
{"t":"p","x":"porque el Señor,"},
{"t":"p","x":"a quien has merecido llevar, aleluya,"},
{"t":"p","x":"ha resucitado, según su palabra, aleluya."},
{"t":"p","x":"Ruega al Señor por nosotros, aleluya."},
{"t":"v","x":"Goza y alégrate, Virgen María, aleluya."},
{"t":"r","x":"Porque ha resucitado el Señor, aleluya."},
{"t":"rub","x":"Oremos:"},
{"t":"p","x":"Oh Dios, que por la resurrección de tu Hijo"},
{"t":"p","x":"te has dignado alegrar el mundo,"},
{"t":"p","x":"concédenos, por intercesión de tu Madre, la Virgen María,"},
{"t":"p","x":"que alcancemos los gozos de la vida eterna."},
{"t":"p","x":"Por el mismo Jesucristo, nuestro Señor."},
{"t":"p","x":"Amén."},
{"t":"rub","x":"Después de las Vísperas, se reza el ángelus u otra oración mariana."}]},
{"id":"102","num":"102","title":"Antífonas marianas","theme":"angelus","sub":null,"tags":["antífonas"],"lines":[
{"t":"rub","x":"Se reza o canta una después de Completas."},
{"t":"rub","x":"1. Salve"},
{"t":"p","x":"Dios te salve, Reina y Madre de misericordia,"},
{"t":"p","x":"vida, dulzura y esperanza nuestra;"},
{"t":"p","x":"Dios te salve."},
{"t":"p","x":"A Ti llamamos los desterrados hijos de Eva;"},
{"t":"p","x":"a ti suspiramos, gimiendo y llorando"},
{"t":"p","x":"en este valle de lágrimas."},
{"t":"p","x":"Ea, pues, Señora, abogada nuestra,"},
{"t":"p","x":"vuelve a nosotros esos tus ojos misericordiosos,"},
{"t":"p","x":"y, después de este destierro,"},
{"t":"p","x":"muéstranos a Jesús, fruto bendito de tu vientre."},
{"t":"p","x":"¡Oh clementísima, oh piadosa, oh dulce Virgen María!"},
{"t":"rub","x":"2. Madre del Redentor"},
{"t":"p","x":"Madre del Redentor, virgen fecunda,"},
{"t":"p","x":"puerta del cielo siempre abierta,"},
{"t":"p","x":"estrella del mar,"},
{"t":"p","x":"ven a librar al pueblo que tropieza y quiere levantarse."},
{"t":"p","x":"Ante la admiración de cielo y tierra,"},
{"t":"p","x":"engendraste a tu santo Creador"},
{"t":"p","x":"y permaneces siempre virgen."},
{"t":"p","x":"Recibe el saludo del ángel Gabriel,"},
{"t":"p","x":"y ten piedad de nosotros, pecadores."},
{"t":"rub","x":"3. Salve, Reina de los cielos"},
{"t":"p","x":"Salve, Reina de los cielos"},
{"t":"p","x":"y Señora de los ángeles;"},
{"t":"p","x":"salve raíz; salve, puerta,"},
{"t":"p","x":"que dio paso a nuestra luz."},
{"t":"p","x":"Alégrate, Virgen gloriosa,"},
{"t":"p","x":"entre todas la más bella;"},
{"t":"p","x":"salve, oh hermosa doncella,"},
{"t":"p","x":"ruega a Cristo por nosotros."},
{"t":"rub","x":"4. Bajo tu protección"},
{"t":"p","x":"Bajo tu protección nos acogemos,"},
{"t":"p","x":"santa Madre de Dios;"},
{"t":"p","x":"no deseches las súplicas"},
{"t":"p","x":"que te dirigimos en nuestras necesidades;"},
{"t":"p","x":"antes bien, líbranos siempre de todo peligro,"},
{"t":"p","x":"oh Virgen, gloriosa y bendita."},
{"t":"rub","x":"5. Regina caeli (para los domingos y el tiempo pascual)"},
{"t":"p","x":"Reina del cielo, alégrate, aleluya,"},
{"t":"p","x":"porque el Señor,"},
{"t":"p","x":"a quien has merecido llevar, aleluya,"},
{"t":"p","x":"ha resucitado, según su palabra, aleluya."},
{"t":"p","x":"Ruega al Señor por nosotros, aleluya."}]},
{"id":"113","num":"113","title":"Ilumina, Señor, nuestros corazones","theme":"eucaristia","sub":null,"tags":[],"lines":[
{"t":"p","x":"Ilumina, Señor, con la luz de la fe nuestros corazones"},
{"t":"p","x":"y abrásalos con el fuego de la caridad"},
{"t":"p","x":"para que adoremos, en espíritu y en verdad,"},
{"t":"p","x":"a quien reconocemos en este Sacramento"},
{"t":"p","x":"como nuestro Dios y Señor."},
{"t":"p","x":"Él que vive y reina por los siglos de los siglos."}]},
{"id":"114","num":"114","title":"Memorial de nuestra redención","theme":"eucaristia","sub":null,"tags":[],"lines":[
{"t":"p","x":"Oh Dios que redimiste a todos los hombres"},
{"t":"p","x":"con el misterio pascual de Cristo,"},
{"t":"p","x":"que en este Sacramento se ofrece a Sí mismo por los hermanos,"},
{"t":"p","x":"concédenos que, venerando constantemente el misterio de nuestra redención,"},
{"t":"p","x":"merezcamos conseguir su fruto"},
{"t":"p","x":"y suscitar en los hombres el recuerdo de la presencia del Señor."},
{"t":"p","x":"Por Jesucristo nuestro Señor."}]},
{"id":"115","num":"115","title":"La Eucaristía y el celo apostólico","theme":"eucaristia","sub":null,"tags":[],"lines":[
{"t":"p","x":"Que el Sacramento de la Eucaristía, Señor,"},
{"t":"p","x":"llene de tu amor y de celo apostólico nuestros corazones"},
{"t":"p","x":"para que nos impulsen a desear"},
{"t":"p","x":"que todos los hombres te conozcan, te amen y te sirvan,"},
{"t":"p","x":"y a procurarles la bienaventuranza de ese Reino"},
{"t":"p","x":"iniciada ya en la tierra."},
{"t":"p","x":"Por Jesucristo nuestro Señor."}]},
{"id":"116","num":"116","title":"Partícipes de un mismo pan","theme":"eucaristia","sub":null,"tags":[],"lines":[
{"t":"p","x":"Señor, tú que nos has hecho partícipes de un mismo pan y un mismo Espíritu,"},
{"t":"p","x":"concédenos que, unidos a Ti como los sarmientos a la vid,"},
{"t":"p","x":"seamos uno contigo para edificar nuestra comunión"},
{"t":"p","x":"y para que el mundo crea."},
{"t":"p","x":"Por Jesucristo nuestro Señor."}]},
{"id":"117","num":"117","title":"Solidarios con los que sufren","theme":"eucaristia","sub":null,"tags":[],"lines":[
{"t":"p","x":"Señor Jesús, que te identificaste plenamente con los que sufren"},
{"t":"p","x":"y nos has dicho «venid a mí los cansados y agobiados, que yo os aliviaré»,"},
{"t":"p","x":"solidarios de los hombres que padecen enfermedad, dolor, injusticia y opresión,"},
{"t":"p","x":"venimos a tu presencia"},
{"t":"p","x":"para que nos inflames en tu caridad"},
{"t":"p","x":"hasta que nos alegremos en los padecimientos"},
{"t":"p","x":"y nos gloriemos en tu cruz."},
{"t":"p","x":"Tú que vives y reinas por los siglos de los siglos."}]},
{"id":"118","num":"118","title":"Adorar el misterio pascual","theme":"eucaristia","sub":null,"tags":[],"lines":[
{"t":"p","x":"Señor, que por el misterio pascual"},
{"t":"p","x":"has realizado la salvación de los hombres,"},
{"t":"p","x":"concédenos adorarte presente en este Sacramento"},
{"t":"p","x":"y proclamar con fe lo que ahora veneramos."},
{"t":"p","x":"Por Jesucristo nuestro Señor."}]},
{"id":"119","num":"119","title":"Inflámanos en la fe","theme":"eucaristia","sub":null,"tags":[],"lines":[
{"t":"p","x":"Señor Jesús,"},
{"t":"p","x":"inflámanos en la fe"},
{"t":"p","x":"que movió a tantos predicadores de la divina palabra"},
{"t":"p","x":"a abrazar con ánimo alegre"},
{"t":"p","x":"la pobreza, la abnegación y el sacrificio"},
{"t":"p","x":"para dilatar tu Reino."},
{"t":"p","x":"Te lo pedimos unidos de corazón a Ti,"},
{"t":"p","x":"cuya vida y ministerio compartimos,"},
{"t":"p","x":"y presente ahora en el misterio eucarístico que veneramos."},
{"t":"p","x":"Tú vives y reinas con el Padre y el Espíritu Santo"},
{"t":"p","x":"por los siglos de los siglos."}]},
{id:"131",num:131,title:"Veni Sancte Spiritus",theme:"reuniones",sub:"Para comenzar",tags:["Espíritu Santo"],lines:[
{"t":"p","x":"Ven, Espíritu Santo, llena los corazones de tus fieles"},
{"t":"p","x":"y enciende en ellos el fuego de tu amor."},
{"t":"v","x":"V/. Envía tu Espíritu y serán creados"},
{"t":"r","x":"R/. Y renovarás la faz de la tierra."},
{"t":"rub","x":"Oremos."},
{"t":"p","x":"Oh Dios,"},
{"t":"p","x":"que has iluminado los corazones de tus fieles"},
{"t":"p","x":"con la luz del Espíritu Santo;"},
{"t":"p","x":"haznos siempre dóciles a este mismo Espíritu,"},
{"t":"p","x":"para que podamos hacer siempre el bien"},
{"t":"p","x":"y gozar de su consuelo."},
{"t":"p","x":"Por Jesucristo, nuestro Señor."},
{"t":"p","x":"Amén."}]},
{id:"132",num:132,title:"Reunidos en tu nombre",theme:"reuniones",sub:"Para comenzar",tags:[],lines:[
{"t":"p","x":"Señor, al reunirnos en tu nombre,"},
{"t":"p","x":"queremos estar en tu presencia,"},
{"t":"p","x":"concédenos un espíritu dialogante,"},
{"t":"p","x":"ilumina nuestras mentes con la luz de tu verdad"},
{"t":"p","x":"y fortalece nuestro espíritu fraternal"},
{"t":"p","x":"para que siempre busquemos juntos conocer y hacer tu voluntad."},
{"t":"p","x":"Por Jesucristo nuestro Señor. Amén."}]},
{id:"133",num:133,title:"Danos la sabiduría (Sab 9,1-6.9-11)",theme:"reuniones",sub:"Para comenzar",tags:["sabiduría"],lines:[
{"t":"p","x":"Dios de los padres y Señor de la misericordia,"},
{"t":"p","x":"que con tu palabra hiciste todas las cosas,"},
{"t":"p","x":"y en tu sabiduría formaste al hombre,"},
{"t":"p","x":"para que dominase sobre tus criaturas,"},
{"t":"p","x":"y para regir el mundo con santidad y justicia,"},
{"t":"p","x":"y para administrar justicia con rectitud de corazón."},
{"t":"p","x":"Dame la sabiduría asistente de tu trono"},
{"t":"p","x":"y no me excluyas del número de tus siervos,"},
{"t":"p","x":"porque siervo tuyo soy, hijo de tu sierva,"},
{"t":"p","x":"hombre débil y de pocos años,"},
{"t":"p","x":"demasiado pequeño para conocer el juicio y las leyes."},
{"t":"p","x":"Pues, aunque uno sea perfecto"},
{"t":"p","x":"entre los hijos de los hombres,"},
{"t":"p","x":"sin la sabiduría, que procede de ti,"},
{"t":"p","x":"será estimado en nada."},
{"t":"p","x":"Contigo está la sabiduría, conocedora de tus obras,"},
{"t":"p","x":"que te asistió cuando hacías el mundo,"},
{"t":"p","x":"y que sabe lo que es grato a tus ojos"},
{"t":"p","x":"y lo que es recto según tus preceptos."},
{"t":"p","x":"Mándala de tus santos cielos,"},
{"t":"p","x":"y de tu trono de gloria envíala,"},
{"t":"p","x":"para que me asista en mis trabajos"},
{"t":"p","x":"y venga yo a saber lo que te es grato."},
{"t":"p","x":"Porque ella conoce y entiende todas las cosas,"},
{"t":"p","x":"y me guiará prudentemente en mis obras,"},
{"t":"p","x":"y me guardará en su esplendor."},
{"t":"rub","x":"Gloria al Padre."}]},
{id:"134",num:134,title:"Buscar y cumplir juntos la voluntad de Dios",theme:"reuniones",sub:"Para comenzar",tags:[],lines:[
{"t":"rub","x":"Antífona:"},
{"t":"p","x":"Dice el Señor: donde dos o tres están reunidos en mi nombre, estoy yo en medio de ellos."},
{"t":"rub","x":"Oremos:"},
{"t":"p","x":"Dios y Padre nuestro, tu Hijo prometió su presencia"},
{"t":"p","x":"a cuantos se reunieran en su nombre:"},
{"t":"p","x":"haz que lo sintamos presente ahora entre nosotros,"},
{"t":"p","x":"que expresamos la comunión de vida y misión"},
{"t":"p","x":"de todo el Instituto,"},
{"t":"p","x":"para que caminemos en una vida nueva"},
{"t":"p","x":"en obediencia al Espíritu"},
{"t":"p","x":"y con plena fidelidad a nuestro carisma misionero,"},
{"t":"p","x":"y, una vez conocida tu voluntad,"},
{"t":"p","x":"la cumplamos con un mismo sentir y querer"},
{"t":"p","x":"para realizar nuestra común misión en la Iglesia."},
{"t":"p","x":"Por Jesucristo, nuestro Señor."},
{"t":"p","x":"Amén."}]},
{id:"135",num:135,title:"Gracia y disposiciones para el diálogo",theme:"reuniones",sub:"Para comenzar",tags:["discernimiento","diálogo"],lines:[
{"t":"p","x":"Aquí estamos, Señor,"},
{"t":"p","x":"reunidos en tu nombre y deseosos de dilatar tu Reino."},
{"t":"p","x":"Que el Espíritu Santo que has enviado a nuestros corazones"},
{"t":"p","x":"y mantiene viva tu presencia en nosotros,"},
{"t":"p","x":"nos enseñe qué hemos de tratar"},
{"t":"p","x":"y hacia dónde hemos de caminar"},
{"t":"p","x":"para que, fortalecidos con tu gracia,"},
{"t":"p","x":"podamos realizar tus designios."},
{"t":"p","x":"Sé Tú, Espíritu Santo,"},
{"t":"p","x":"el inspirador y animador de nuestro discernimiento."},
{"t":"p","x":"Enséñanos a escuchar a los demás,"},
{"t":"p","x":"a dejarnos iluminar por sus luces;"},
{"t":"p","x":"enséñanos a proponer y a no imponer;"},
{"t":"p","x":"danos equidad."},
{"t":"p","x":"Líbranos de la ceguera de quien siempre cree tener razón,"},
{"t":"p","x":"de los favoritismos y de toda acepción de personas."},
{"t":"p","x":"Únenos a ti para que nunca nos apartemos de la verdad."},
{"t":"p","x":"Amén."}]},
{id:"136",num:136,title:"Luz para descubrir la exigencia del Evangelio",theme:"reuniones",sub:"Para comenzar",tags:[],lines:[
{"t":"p","x":"Mira, Padre de bondad,"},
{"t":"p","x":"a esta comunidad reunida en tu nombre"},
{"t":"p","x":"para compartir la fraternidad y dialogar en la verdad,"},
{"t":"p","x":"concédele descubrir con mayor claridad las exigencias del Evangelio"},
{"t":"p","x":"para ser luz del mundo y sal de la tierra."},
{"t":"p","x":"Por Jesucristo nuestro Señor."},
{"t":"p","x":"Amén."}]},
{id:"137",num:137,title:"Oración para iniciar una reunión",theme:"reuniones",sub:"Para comenzar",tags:[],lines:[
{"t":"p","x":"Señor, que tu gracia inspire, sostenga y acompañe nuestras obras"},
{"t":"p","x":"para que nuestro trabajo comience en ti, como de su fuente,"},
{"t":"p","x":"y tienda siempre a ti, como a su fin."},
{"t":"p","x":"Por Jesucristo, nuestro Señor."},
{"t":"p","x":"Amén."}]},
{id:"138",num:138,title:"Acción de gracias por el encuentro",theme:"reuniones",sub:"Para concluir",tags:[],lines:[
{"t":"p","x":"Padre de bondad,"},
{"t":"p","x":"te damos gracias por este encuentro"},
{"t":"p","x":"en el que hemos compartido nuestras ilusiones y desilusiones,"},
{"t":"p","x":"nuestros proyectos y dificultades,"},
{"t":"p","x":"haz que respondamos siempre eficazmente"},
{"t":"p","x":"a nuestra vocación y misión en la Iglesia,"},
{"t":"p","x":"a ejemplo de Claret, nuestro Padre."},
{"t":"p","x":"Por Jesucristo nuestro Señor."},
{"t":"p","x":"Amén."}]},
{id:"139",num:139,title:"Un solo corazón y una sola alma",theme:"reuniones",sub:"Para concluir",tags:[],lines:[
{"t":"p","x":"Señor, te damos gracias"},
{"t":"p","x":"por este encuentro comunitario,"},
{"t":"p","x":"por tu bondad y tu presencia entre nosotros,"},
{"t":"p","x":"haz que con espíritu fraternal"},
{"t":"p","x":"tengamos un solo corazón y una sola alma para ser una comunidad"},
{"t":"p","x":"evangelizada y evangelizadora."},
{"t":"p","x":"Por Jesucristo, nuestro Señor."},
{"t":"p","x":"Amén."}]},
{id:"144",num:144,title:"Oración del P. Fundador al comienzo de los ejercicios",theme:"ejercicios",sub:"",tags:["retiro"],lines:[
{"t":"p","x":"Virgen María, Madre mía,"},
{"t":"p","x":"tú que tuviste el consuelo de ver reunidos"},
{"t":"p","x":"a los Apóstoles y discípulos en el Cenáculo"},
{"t":"p","x":"y finalmente el gozo de verlos a todos"},
{"t":"p","x":"llenos del Espíritu Santo;"},
{"t":"p","x":"con toda confianza te pido"},
{"t":"p","x":"que me alcances todas las gracias que necesito"},
{"t":"p","x":"para hacer bien estos Ejercicios"},
{"t":"p","x":"bajo tu dirección."},
{"t":"p","x":"Sosténme en mi propósito de hacer todo lo que conozca"},
{"t":"p","x":"sea para mayor gloria de Dios y bien de mi alma."},
{"t":"p","x":"Madre mía, socórreme y ampárame ahora y siempre."},
{"t":"p","x":"Amén."}]},
{id:"157",num:157,title:"Letanías de San José",theme:"san-jose",sub:"",tags:["letanía"],lines:[
{"t":"p","x":"Señor, ten piedad"},
{"t":"p","x":"Cristo, ten piedad"},
{"t":"p","x":"Señor, ten piedad"},
{"t":"p","x":"Cristo, óyenos"},
{"t":"p","x":"Cristo, escúchanos"},
{"t":"p","x":"Dios, Padre del cielo"},
{"t":"p","x":"Dios, Hijo, Redentor del mundo"},
{"t":"p","x":"Dios, Espíritu Santo"},
{"t":"p","x":"Trinidad Santa, un solo Dios"},
{"t":"p","x":"Santa María"},
{"t":"p","x":"San José"},
{"t":"p","x":"Ilustre descendiente de David"},
{"t":"p","x":"Luz de los Patriarcas"},
{"t":"p","x":"Esposo de la Madre de Dios"},
{"t":"p","x":"Casto custodio de la Virgen"},
{"t":"p","x":"Educador del Hijo de Dios"},
{"t":"p","x":"Diligente defensor de Cristo"},
{"t":"p","x":"Cabeza de la Santa Familia"},
{"t":"p","x":"José justísimo"},
{"t":"p","x":"José castísimo"},
{"t":"p","x":"José prudentísimo"},
{"t":"p","x":"José fortísimo"},
{"t":"p","x":"José obedientísimo"},
{"t":"p","x":"José fidelísimo"},
{"t":"p","x":"Espejo de paciencia"},
{"t":"p","x":"Amante de la pobreza"},
{"t":"p","x":"Trabajador ejemplar"},
{"t":"p","x":"Honor de la vida familiar"},
{"t":"p","x":"Custodio de las vírgenes"},
{"t":"p","x":"Sostén de las familias"},
{"t":"p","x":"Consuelo de los afligidos"},
{"t":"p","x":"Esperanza de los enfermos"},
{"t":"p","x":"Patrono de los moribundos"},
{"t":"p","x":"Protector de la Santa Iglesia"},
{"t":"p","x":"Cordero de Dios que quitas el pecado del mundo – perdónanos, Señor"},
{"t":"p","x":"Cordero de Dios que quitas el pecado del mundo – escúchanos, Señor"},
{"t":"p","x":"Cordero de Dios que quitas el pecado del mundo – ten piedad de nosotros"},
{"t":"v","x":"V/. Le constituyó señor de su casa"},
{"t":"r","x":"R/. Y cabeza de todas sus posesiones"},
{"t":"rub","x":"Oremos."},
{"t":"p","x":"Oh Dios, que en tu inefable providencia, te dignaste elegir a San José como esposo de la Madre de tu Hijo, concédenos, te rogamos, que a quien veneramos en la tierra como protector, lo merezcamos tener como intercesor en el cielo. Tú, que vives y reinas por los siglos de los siglos."},
{"t":"p","x":"Amén."}]},
{id:"158",num:158,title:"Bienaventurado José",theme:"san-jose",sub:"",tags:[],lines:[
{"t":"p","x":"Bienaventurado José,"},
{"t":"p","x":"por el amor que te mantuvo unido a la Virgen Madre de Dios"},
{"t":"p","x":"y por el paterno amor con que cuidaste al Niño Jesús,"},
{"t":"p","x":"humildemente te pedimos que mires benignamente a la familia de tu Hijo,"},
{"t":"p","x":"adquirida por su sangre, y con tu auxilio socorras nuestras necesidades."},
{"t":"p","x":"Aparta de nosotros todo error y todo pecado;"},
{"t":"p","x":"asístenos en nuestra lucha contra el poder del mal,"},
{"t":"p","x":"y defiende a la Iglesia santa de Dios de toda adversidad;"},
{"t":"p","x":"protégenos a cada uno de nosotros,"},
{"t":"p","x":"para que, a ejemplo tuyo y sostenidos por tu auxilio,"},
{"t":"p","x":"podamos vivir santamente,"},
{"t":"p","x":"morir piadosamente y alcanzar la eterna bienaventuranza."},
{"t":"p","x":"Amén."}]},
{id:"159",num:159,title:"Oración a San José de León XIII",theme:"san-jose",sub:"",tags:[],lines:[
{"t":"p","x":"A ti, bienaventurado José"},
{"t":"p","x":"recurrimos en nuestra necesidad"},
{"t":"p","x":"e invocamos tu patrocinio con el de la Virgen María, tu esposa."},
{"t":"p","x":"Por el santo amor que te unió a María, Madre de Dios,"},
{"t":"p","x":"y por la custodia paterna del Niño Jesús,"},
{"t":"p","x":"mira benignamente el pueblo que Cristo adquirió con su sangre;"},
{"t":"p","x":"con tu ayuda socórrenos en nuestras necesidades."},
{"t":"p","x":"Custodio de la Sagrada Familia,"},
{"t":"p","x":"protege a la Iglesia de los males que azotan el mundo,"},
{"t":"p","x":"y asístenos propicio en la lucha contra el poder del mal."},
{"t":"p","x":"Ayúdanos a vivir santamente,"},
{"t":"p","x":"a morir en paz con Dios"},
{"t":"p","x":"y a alcanzar la eterna bienaventuranza en el cielo."},
{"t":"p","x":"Amén."}]},
{id:"160",num:160,title:"Oración a San José de Juan XXIII",theme:"san-jose",sub:"",tags:[],lines:[
{"t":"p","x":"Oh San José, custodio de Jesús,"},
{"t":"p","x":"esposo purísimo de María,"},
{"t":"p","x":"que has vivido en el cumplimiento perfecto de tu deber,"},
{"t":"p","x":"sustentando con el trabajo de tus manos"},
{"t":"p","x":"la sagrada Familia de Nazaret,"},
{"t":"p","x":"protégenos propicio a quienes nos dirigimos a ti."},
{"t":"p","x":"Tú conoces nuestras aspiraciones, nuestras angustias y esperanzas:"},
{"t":"p","x":"a ti recurrimos,"},
{"t":"p","x":"porque sabemos que encontraremos en ti un protector."},
{"t":"p","x":"También tú has experimentado la prueba y el cansancio:"},
{"t":"p","x":"pero tu ánimo, lleno de la más profunda paz,"},
{"t":"p","x":"exultó de gozo por la intimidad con el Hijo de Dios que se te confió"},
{"t":"p","x":"y con María, su Madre."},
{"t":"p","x":"Ayúdanos a comprender"},
{"t":"p","x":"que no estamos solos en nuestro trabajo,"},
{"t":"p","x":"a saber descubrir a Jesús junto a nosotros,"},
{"t":"p","x":"a acogerlo con la gracia y a guardarlo fielmente como tú has hecho."},
{"t":"p","x":"Y alcánzanos que en nuestra Congregación"},
{"t":"p","x":"todo sea santificado en la caridad,"},
{"t":"p","x":"en la paciencia, en la justicia y en la búsqueda del bien."},
{"t":"p","x":"Amén."}]},
{id:"161",num:161,title:"Oración a San José",theme:"san-jose",sub:"",tags:[],lines:[
{"t":"p","x":"Ave, José, esposo virginal de María"},
{"t":"p","x":"y padre davídico del Mesías."},
{"t":"p","x":"Bendito entre todos los hombres"},
{"t":"p","x":"y bendito es Jesús, el Hijo de Dios que se te confió."},
{"t":"p","x":"San José,"},
{"t":"p","x":"patrono de la Iglesia universal y de nuestra Congregación,"},
{"t":"p","x":"guarda a nuestras comunidades y nuestras familias"},
{"t":"p","x":"en la paz y en la gracia divina"},
{"t":"p","x":"y socórrenos en la hora de nuestra muerte."},
{"t":"p","x":"Amén."}]},
{id:"162",num:162,title:"Oración a San José (por el ministerio)",theme:"san-jose",sub:"",tags:[],lines:[
{"t":"p","x":"Padre santo, que elegiste a San José"},
{"t":"p","x":"para un oficio singular"},
{"t":"p","x":"y le concediste las gracias necesarias"},
{"t":"p","x":"para desempeñarlo en la casa de Nazaret,"},
{"t":"p","x":"concédenos también a nosotros"},
{"t":"p","x":"las gracias necesarias"},
{"t":"p","x":"para ser fieles en el desempeño"},
{"t":"p","x":"de nuestro ministerio"},
{"t":"p","x":"según el carisma y el espíritu de la Congregación."},
{"t":"p","x":"Por Jesucristo, nuestro Señor."},
{"t":"p","x":"Amén."}]},
{id:"165",num:165,title:"Oración a los Mártires de Barbastro",theme:"martires",sub:"",tags:["13 agosto"],lines:[
{"t":"p","x":"Señor Padre santo"},
{"t":"p","x":"tú que concediste a Felipe de Jesús Munárriz y a sus compañeros"},
{"t":"p","x":"fidelidad total a su vocación misionera"},
{"t":"p","x":"siguiendo a Cristo hasta el martirio,"},
{"t":"p","x":"y les hiciste testigos de caridad perfecta"},
{"t":"p","x":"en el perdón de sus perseguidores:"},
{"t":"p","x":"concédenos, por su intercesión,"},
{"t":"p","x":"la firmeza perseverante en la fe,"},
{"t":"p","x":"y una caridad sincera"},
{"t":"p","x":"para amar en Cristo a todos los hermanos."},
{"t":"p","x":"Por Jesucristo, nuestro Señor."},
{"t":"p","x":"Amén."}]},
{id:"166",num:166,title:"Mártires de Barbastro",theme:"martires",sub:"",tags:["13 agosto"],lines:[
{"t":"p","x":"Dios, Padre nuestro,"},
{"t":"p","x":"que nos has dado en los Mártires Claretianos de Barbastro"},
{"t":"p","x":"un modelo de fidelidad a la Causa de Jesús,"},
{"t":"p","x":"de amor al Corazón de María y a la Iglesia,"},
{"t":"p","x":"de lealtad a los hermanos y de perdón a los enemigos,"},
{"t":"p","x":"concédenos imitar su ejemplo"},
{"t":"p","x":"en la vivencia fiel y gozosa de nuestra consagración"},
{"t":"p","x":"y en el anuncio del Evangelio"},
{"t":"p","x":"para gloria de Dios y salvación de todos los hombres."},
{"t":"p","x":"Por Jesucristo nuestro Señor."},
{"t":"p","x":"Amén."}]},
{id:"168",num:168,title:"Oración a la Beata Mártir María Patrocinio Giner RMI",theme:"martires",sub:"",tags:[],lines:[
{"t":"p","x":"Dios grande y misericordioso,"},
{"t":"p","x":"que otorgaste a la virgen Beata María Patrocinio"},
{"t":"p","x":"la gracia de ser generosa en el servicio a los hermanos"},
{"t":"p","x":"y fuerte en el martirio hasta el perdón,"},
{"t":"p","x":"concédenos, por su intercesión,"},
{"t":"p","x":"seguir con prontitud las huellas de Cristo en el camino de la cruz"},
{"t":"p","x":"para poder participar un día en la gloria de la resurrección."},
{"t":"p","x":"Por Jesucristo, nuestro Señor."},
{"t":"p","x":"Amén."}]},
{id:"169",num:169,title:"Oración (I)",theme:"beatificacion",sub:"",tags:[],lines:[
{"t":"p","x":"Señor, Padre nuestro,"},
{"t":"p","x":"que has escogido con predilección"},
{"t":"p","x":"a todos los Hijos del Corazón de la Virgen María"},
{"t":"p","x":"y has hecho que algunos de ellos fueran ejemplos eximios en la virtud,"},
{"t":"p","x":"fecunda la Iglesia con su glorificación"},
{"t":"p","x":"y haz que sean para nosotros modelos a imitar."},
{"t":"p","x":"Por Jesucristo, nuestro Señor."},
{"t":"p","x":"Amén."}]},
{id:"170",num:170,title:"Oración (II)",theme:"beatificacion",sub:"",tags:[],lines:[
{"t":"p","x":"Señor, que quieres santos"},
{"t":"p","x":"a cuantos has llamado a nuestra Congregación,"},
{"t":"p","x":"concede a nuestros hermanos misioneros"},
{"t":"p","x":"que han seguido más de cerca las huellas del Santo Fundador"},
{"t":"p","x":"y han entregado su vida al servicio del Evangelio,"},
{"t":"p","x":"que sean glorificados en la tierra y contados entre los santos del cielo."},
{"t":"p","x":"Por Jesucristo, nuestro Señor."}]},
{id:"171",num:171,title:"Oración (III)",theme:"beatificacion",sub:"",tags:[],lines:[
{"t":"p","x":"Oh Dios, que exaltas a los humildes y rechazas a los soberbios,"},
{"t":"p","x":"dígnate glorificar a tu siervo N."},
{"t":"p","x":"y haz resplandecer su nombre entre el de tus santos."},
{"t":"p","x":"Multiplica tus gracias en favor de quienes te suplican"},

{"t":"p","x":"Y concede que la Iglesia honre un día su memoria,"},

{id:"172",num:172,title:"Oración para pedir la beatificación",theme:"beatificacion",sub:"",tags:[],lines:[
{"t":"p","x":"Señor, Dios nuestro,"},
{"t":"p","x":"que has elegido algunos hermanos nuestros,"},
{"t":"p","x":"Hijos del Corazón Inmaculado de María,"},
{"t":"p","x":"y los has hecho resplandecer"},
{"t":"p","x":"con el ejemplo de una especial santidad en la vida misionera,"},
{"t":"p","x":"dígnate enriquecer y fecundar la santa Iglesia con su glorificación,"},
{"t":"p","x":"y haz que cada uno de nosotros, siguiendo su testimonio evangélico,"},
{"t":"p","x":"nos empeñemos con ardor en buscar en todas las cosas"},
{"t":"p","x":"tu gloria y la salvación de nuestros hermanos."},
{"t":"p","x":"Por Jesucristo, nuestro Señor."},
{"t":"p","x":"Amén."}]},
{id:"183",num:183,title:"Oración por el Capítulo (o durante su celebración)",theme:"capitulo",sub:"",tags:["Espíritu Santo"],lines:[
{"t":"p","x":"Ven Espíritu Santo, llena el corazón de tus fieles"},
{"t":"p","x":"y enciende en ellos el fuego de tu amor."},
{"t":"r","x":"R/. Manda tu Espíritu y serán creadas"},
{"t":"v","x":"V/. Y renovarás la faz de la tierra."},
{"t":"rub","x":"Oremos."},
{"t":"p","x":"Oh Dios, que has iluminado el corazón de tus fieles"},
{"t":"p","x":"con la luz del Espíritu Santo,"},
{"t":"p","x":"concédenos gozar siempre de la luz de su verdad"},
{"t":"p","x":"y ser consolados con los frutos de su presencia."},
{"t":"p","x":"Por Cristo, nuestro Señor."},
{"t":"p","x":"Amén."}]},
{id:"186",num:186,title:"Oración por el Capítulo",theme:"capitulo",sub:"",tags:[],lines:[
{"t":"p","x":"Oh Divino Espíritu,"},
{"t":"p","x":"que enviado por el Padre en el nombre de Jesús,"},
{"t":"p","x":"asistes y guías infaliblemente a la Iglesia,"},
{"t":"p","x":"infunde sobre el Capítulo la plenitud de tus dones."},
{"t":"p","x":"Oh suave Maestro y Consolador,"},
{"t":"p","x":"ilumina las mentes de los Capitulares,"},
{"t":"p","x":"haz que de este Capítulo broten frutos abundantes,"},
{"t":"p","x":"nuevo vigor en el empeño de santificación y de apostolado,"},
{"t":"p","x":"especialmente la difusión de la luz"},
{"t":"p","x":"y de la fuerza del Evangelio entre los hombres."},
{"t":"p","x":"Oh dulce huésped de las almas,"},
{"t":"p","x":"confirma las mentes en la verdad,"},
{"t":"p","x":"dispón a la obediencia el corazón de todos"},
{"t":"p","x":"a fin de que las conclusiones del Capítulo"},
{"t":"p","x":"encuentren generosa acogida y pleno cumplimiento;"},
{"t":"p","x":"renueva en nuestra Congregación,"},
{"t":"p","x":"y, en cada uno de nosotros,"},
{"t":"p","x":"el espíritu que animó a San Antonio María Claret, nuestro Padre."},
{"t":"p","x":"Concédenos, que,"},
{"t":"p","x":"reunidos en unánime e intensa plegaria,"},
{"t":"p","x":"en torno al Corazón de María, nuestra Madre,"},
{"t":"p","x":"procuremos siempre y únicamente"},
{"t":"p","x":"la mayor gloria de Dios y la salvación de las almas."},
{"t":"p","x":"Amén."}]},
{id:"187",num:187,title:"Preces por el Capítulo",theme:"capitulo",sub:"",tags:[],lines:[
{"t":"p","x":"Señor y Padre nuestro,"},
{"t":"p","x":"por la intercesión de María,"},
{"t":"p","x":"Madre y Fundadora de nuestra Congregación,"},

{"t":"p","x":"por el amor a Ti y a los hombres,"},

{"t":"p","x":"a través de San Antonio María Claret, nuestro Padre."},
{"t":"p","x":"Tú que vives y reinas por los siglos de los siglos."},
{"t":"p","x":"Amén."}]},
{id:"xxvii",num:null,title:"Por el XXVII Capítulo General",theme:"capitulo",sub:"",tags:["XXVII","Capítulo General","2026"],lines:[

{id:"201",num:201,title:"Fiestas de la Virgen María",theme:"mesa",sub:"",tags:["bendición"],lines:[
{"t":"v","x":"Alégrate, María, llena de gracia. El Señor está contigo."},
{"t":"r","x":"Bendito seas por siempre, Señor."},
{"t":"p","x":"Señor Jesús, que por intercesión de tu Madre en Caná de Galilea"},
{"t":"p","x":"convertiste el agua en vino,"},
{"t":"p","x":"bendice estos alimentos que vamos a tomar,"},

{"t":"p","x":"ponernos, como ella, al servicio de tu plan de salvación"},

{id:"202",num:202,title:"San José (19 marzo / 1 mayo)",theme:"mesa",sub:"",tags:["bendición"],lines:[
{"t":"v","x":"El Señor lo amó porque fue varón justo y dio el ciento por uno a su labor."},
{"t":"r","x":"Bendito seas por siempre, Señor."},
{"t":"p","x":"Dios providente, que confiaste a la fiel custodia"},

{"t":"p","x":"bendice el pan de nuestro sudor y concédenos"},

{"t":"p","x":"Por Jesucristo, nuestro Señor."},
{"t":"r","x":"Amén."}]},
{id:"203",num:203,title:"Fiesta del Corazón de María",theme:"mesa",sub:"",tags:["bendición"],lines:[
{"t":"v","x":"Te damos gracias, Señor, y te bendecimos por el don inestimable de ser y llamarnos «Hijos del Inmaculado Corazón de María»."},
{"t":"r","x":"Bendito seas por siempre, Señor."},
{"t":"p","x":"Señor, Dios nuestro,"},
{"t":"p","x":"que te has dignado convocarnos en la Congregación"},
{"t":"p","x":"haciéndonos hijos del Corazón Inmaculado de tu Madre,"},

{"t":"p","x":"Por Jesucristo, nuestro Señor."},
{"t":"r","x":"Amén."}]},
{id:"204",num:204,title:"Santa Catalina de Siena (29 abril)",theme:"mesa",sub:"",tags:["bendición"],lines:[
{"t":"v","x":"Te alabamos, Señor, porque en Santa Catalina de Siena nos das una muestra de tu poder y de tu sabiduría."},
{"t":"r","x":"Bendito seas por siempre, Señor."},
{"t":"p","x":"Señor Dios nuestro,"},
{"t":"p","x":"que hiciste arder de amor a Ti y a la Iglesia"},
{"t":"p","x":"a santa Catalina de Siena,"},

{"t":"p","x":"concédenos mantenernos siempre en tu presencia"},

{"t":"p","x":"Por Jesucristo, nuestro Señor."},
{"t":"r","x":"Amén."}]},
{id:"205",num:205,title:"Fiestas de los apóstoles (I)",theme:"mesa",sub:"",tags:["bendición"],lines:[
{"t":"v","x":"Bendito seas, Jesús, enviado y testigo del Padre."},
{"t":"r","x":"Bendito seas por siempre, Señor."},
{"t":"p","x":"Bendito seas, Señor, por los frutos de la tierra y del trabajo del hombre:"},
{"t":"p","x":"que ayuden a mantener fiel en tu santo servicio"},
{"t":"p","x":"a esta comunidad de vida apostólica."},
{"t":"p","x":"Por Jesucristo nuestro Señor."},
{"t":"r","x":"Amén."}]},
{id:"206",num:206,title:"Fiestas de los apóstoles (II)",theme:"mesa",sub:"",tags:["bendición"],lines:[
{"t":"v","x":"Te alabamos y bendecimos, Cristo, que prolongas tu presencia y tu Palabra en el mundo por medio de los apóstoles."},
{"t":"r","x":"Bendito seas por siempre, Señor."},
{"t":"p","x":"Señor Jesús, que nos envías como enviaste a los Apóstoles"},

{"t":"p","x":"bendice estos alimentos que vamos a tomar"},

{"t":"p","x":"Tú que vives y reinas por los siglos de los siglos."},
{"t":"r","x":"Amén."}]},
{id:"207",num:207,title:"Fiestas de los apóstoles (III)",theme:"mesa",sub:"",tags:["bendición"],lines:[
{"t":"v","x":"Señor Jesús, esperado por los profetas y anunciado por los Apóstoles y evangelistas:"},
{"t":"r","x":"Bendito seas por siempre, Señor."},
{"t":"p","x":"Señor Jesús, que por amor al Padre y a los hermanos,"},
{"t":"p","x":"te entregaste a los trabajos e incluso a la muerte"},

{"t":"p","x":"bendice esta nuestra mesa y danos el gozo de tu presencia viva entre nosotros."},
{"t":"p","x":"Tú que vives y reinas por los siglos de los siglos."},
{"t":"r","x":"Amén."}]},
{id:"208",num:208,title:"Fiestas de los apóstoles (IV)",theme:"mesa",sub:"",tags:["bendición"],lines:[
{"t":"v","x":"Señor Jesús que llamaste a los Apóstoles para que estuvieran contigo y para enviarlos a predicar:"},

{"t":"p","x":"Tú, Señor, que has confiado a los Apóstoles"},

{id:"209",num:209,title:"Aniversario de la fundación (16 julio)",theme:"mesa",sub:"",tags:["bendición","aniversario"],lines:[

{"t":"r","x":"Bendito seas por siempre, Señor."},

{id:"210",num:210,title:"San Ignacio de Loyola (31 julio)",theme:"mesa",sub:"",tags:["bendición"],lines:[

{"t":"p","x":"que has hecho de San Alfonso María de Ligorio"},

{id:"212",num:212,title:"Beatos Mártires de Barbastro (13 agosto)",theme:"mesa",sub:"",tags:["bendición","13 agosto"],lines:[

{"t":"p","x":"Por Jesucristo, nuestro Señor."},
{"t":"r","x":"Amén."}]},
{id:"213",num:213,title:"Santos Arcángeles y Ángeles Custodios (29 sept / 2 oct)",theme:"mesa",sub:"",tags:["bendición"],lines:[
{"t":"v","x":"Con el coro de los Ángeles te alabamos y bendecimos, Señor:"},

{id:"214",num:214,title:"Santa Teresa de Jesús (15 octubre)",theme:"mesa",sub:"",tags:["bendición"],lines:[
{"t":"v","x":"Nuestro espíritu, Señor, tiene sed de Ti, como tierra agostada y sin agua."},

{id:"215",num:215,title:"San Antonio María Claret (24 octubre)",theme:"mesa",sub:"",tags:["bendición"],lines:[
{"t":"v","x":"Bendito seas Señor Jesús, Hijo y Enviado del Padre."},

/* ---------- utilidades ---------- */
const norm = s => (s||'').toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g,'');
const perTema = id => DADES.filter(p=>p.theme===id);
const idxDe = p => DADES.indexOf(p);
const troba = id => DADES.find(p=>String(p.id)===String(id));
const esc = s => s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
const incipit = p => { const l=p.lines.find(l=>l.t==='p'||l.t==='v'); return l?l.x:''; };

/* ---------- favoritos ---------- */
let favs = new Set(); let favsMem = true;
async function carregaFavs(){
  try{ const r = await window.storage.get('cmf-favoritos'); if(r&&r.value){favs=new Set(JSON.parse(r.value)); favsMem=false;} else {favsMem=false;} }
  catch(e){ favsMem=false; /* clave inexistente: ok */ }
}
async function desaFavs(){
  try{ await window.storage.set('cmf-favoritos', JSON.stringify([...favs])); }catch(e){}
}
function toggleFav(id){ if(favs.has(id)) favs.delete(id); else favs.add(id); desaFavs(); render(); }

/* ---------- tamaño del texto ---------- */
let mida = 1.28;
function canviaMida(d){ mida = Math.min(2.4, Math.max(.95, mida + d)); document.documentElement.style.setProperty('--fs-preg', mida+'rem'); }

/* ---------- índice lateral ---------- */
function pintaIdx(temaActiu){
  const nav = document.getElementById('idxNav');
  let h = '<div class="idx-titol">Temas</div>';
  for(const t of TEMES){
    const n = perTema(t.id).length;
    h += `<a href="#/tema/${t.id}" class="${temaActiu===t.id?'actiu':''}">${esc(t.nom)}<span class="n">${n}</span></a>`;
  }
  if(favs.size) h += `<div class="idx-titol">Preparación</div><a href="#/favorits" class="${temaActiu==='__fav'?'actiu':''}">Mis oraciones<span class="n">${favs.size}</span></a>`;
  nav.innerHTML = h;
}

/* ---------- búsqueda ---------- */
function cercaHTML(valor){
  return `<div class="cerca-wrap"><span class="cerca-ico">⌕</span>
  <input id="cerca" class="cerca" type="search" value="${esc(valor||'')}" placeholder="Busca por número, título o palabras… (p. ej. «33», «enfermos», «Corazón de María»)" aria-label="Búsqueda de oraciones" autocomplete="off"></div>`;
}
function lligaCerca(){
  const el = document.getElementById('cerca'); if(!el) return;
  el.addEventListener('input', ()=>{ const q=el.value.trim();
    history.replaceState(null,'', q? '#/cerca/'+encodeURIComponent(q) : '#/');
    pintaResultats(q);
  });
  el.addEventListener('keydown', e=>{ if(e.key==='Enter'){ const q=el.value.trim(); const ex=DADES.find(p=>String(p.num)===q); if(ex) location.hash='#/p/'+ex.id; } });
}
function cercaPreg(q){
  const nq = norm(q); if(!nq) return [];
  const res = DADES.map(p=>{
    let s=0;
    if(String(p.num||'')===q.trim()) s+=100;
    else if(String(p.num||'').startsWith(q.trim()) && /^\d/.test(q)) s+=40;
    if(norm(p.title).includes(nq)) s+=30;
    if(norm(p.sub||'').includes(nq)) s+=14;
    if((p.tags||[]).some(t=>norm(t).includes(nq))) s+=14;
    const cos = norm(p.lines.map(l=>l.x).join(' '));
    if(cos.includes(nq)) s+=8;
    return {p,s};
  }).filter(r=>r.s>0).sort((a,b)=>b.s-a.s).map(r=>r.p);
  return res;
}
function itemHTML(p, mostraTema){
  const t = TEMES.find(t=>t.id===p.theme);
  return `<li class="preg-item"><a href="#/p/${p.id}">
    <span class="foli">${p.num?esc(String(p.num)):'·'}</span>
    <span><span class="tt">${esc(p.title)}${favs.has(String(p.id))?' <span class="fav-cinta">❧</span>':''}</span>
    <span class="inc">${esc(incipit(p))}</span></span>
    ${mostraTema&&t?`<span class="res-tema">${esc(t.nom)}</span>`:(p.sub?`<span class="etq">${esc(p.sub)}</span>`:'')}
  </a></li>`;
}
function pintaResultats(q){
  const cont = document.getElementById('resultats'); if(!cont) return;
  if(!q){ cont.innerHTML = portadaCos(); return; }
  const res = cercaPreg(q);
  cont.innerHTML = res.length
    ? `<div class="res-cap">${res.length} oraci${res.length===1?'ón encontrada':'ones encontradas'}</div><ul class="llista">${res.map(p=>itemHTML(p,true)).join('')}</ul>`
    : `<div class="buit">No se ha encontrado ninguna oración con «${esc(q)}».<br>Prueba con el número, una palabra del título o del texto.</div>`;
}

/* ---------- vistas ---------- */
function portadaCos(){
  let h = `<div class="portada">
    <div class="eyebrow">Recopilación para la oración comunitaria</div>
    <h2>Encuentra la oración para cada momento</h2>
    <p class="intro">Cada oración conserva el número y el título de la recopilación: quien dirige la oración puede invitar diciendo, por ejemplo, «oremos con la oración 33, la Oración del claretiano».</p>
    <div class="chips">${CIRCUMS.map(c=>`<a class="chip" href="${c.h}">${esc(c.t)}</a>`).join('')}</div>
    <div class="temes-grid">${TEMES.map(t=>`<a class="tema-card" href="#/tema/${t.id}">
      <h3>${esc(t.nom)}</h3><div class="desc">${esc(t.desc)}</div>
      <div class="compta">${perTema(t.id).length} oraciones</div></a>`).join('')}
    </div></div>`;
  return h;
}
function vistaPortada(q){
  pintaIdx(null);
  document.getElementById('pagina').innerHTML = cercaHTML(q) + `<div id="resultats"></div>`;
  lligaCerca();
  pintaResultats(q||'');
  if(q){ const el=document.getElementById('cerca'); el.focus(); el.setSelectionRange(el.value.length,el.value.length); }
}
function vistaTema(id){
  const t = TEMES.find(t=>t.id===id); if(!t){ location.hash='#/'; return; }
  pintaIdx(id);
  const pl = perTema(id);
  const subs = [...new Set(pl.map(p=>p.sub).filter(Boolean))];
  let llista='';
  if(subs.length>1){
    for(const s of subs){ llista += `<div class="sub-grup">${esc(s)}</div><ul class="llista">${pl.filter(p=>p.sub===s).map(p=>itemHTML(p)).join('')}</ul>`; }
    const sense = pl.filter(p=>!p.sub);
    if(sense.length) llista = `<ul class="llista">${sense.map(p=>itemHTML(p)).join('')}</ul>` + llista;
  } else {
    llista = `<ul class="llista">${pl.map(p=>itemHTML(p)).join('')}</ul>`;
  }
  document.getElementById('pagina').innerHTML = cercaHTML('') +
   `<a class="torna" href="#/">← Todos los temas</a>
    <div class="tema-cap"><h2>${esc(t.nom)}</h2><div class="desc">${esc(t.desc)}</div></div>${llista}`;
  lligaCerca();
  window.scrollTo(0,0);
}
function vistaFavorits(){
  pintaIdx('__fav');
  const pl = DADES.filter(p=>favs.has(String(p.id)));
  document.getElementById('pagina').innerHTML = cercaHTML('') +
   `<a class="torna" href="#/">← Todos los temas</a>
    <div class="tema-cap"><h2>Mis oraciones</h2><div class="desc">Oraciones marcadas para preparar la oración comunitaria.</div></div>` +
   (pl.length?`<ul class="llista">${pl.map(p=>itemHTML(p,true)).join('')}</ul>`
    :`<div class="buit">Todavía no has marcado ninguna oración.<br>Abre una y toca «Márcala» para guardarla aquí.</div>`);
  lligaCerca(); window.scrollTo(0,0);
}
function liniaHTML(l, prev){
  if(l.t==='rub') return `<p class="rub">${esc(l.x)}</p>`;
  if(l.t==='v') return `<p class="vers${prev&&prev.t==='r'?' espai':''}">${esc(l.x)}</p>`;
  if(l.t==='r') return `<p class="resp">${esc(l.x)}</p>`;
  const espai = prev && (prev.t==='r') ? ' espai':'';
  return `<p class="${espai.trim()}">${esc(l.x)}</p>`;
}
function vistaPreg(id){
  const p = troba(id); if(!p){ location.hash='#/'; return; }
  pintaIdx(p.theme);
  const t = TEMES.find(t=>t.id===p.theme);
  const i = idxDe(p), ant = DADES[i-1], seg = DADES[i+1];
  let cos=''; let prev=null;
  for(const l of p.lines){ cos += liniaHTML(l, prev); prev=l; }
  const fav = favs.has(String(p.id));
  document.getElementById('pagina').innerHTML = cercaHTML('') +
   `<a class="torna" href="#/tema/${p.theme}">← ${esc(t?t.nom:'Temas')}</a>
    <article class="preg-full">
      <div class="preg-meta">${esc(t?t.nom:'')}${p.sub?' · '+esc(p.sub):''}</div>
      ${p.num?`<div class="preg-num">${esc(String(p.num))}</div>`:''}
      <h2 class="preg-titol">${esc(p.title)}</h2>
      <div class="preg-eines">
        <button class="eina surt-lectura" id="btnLectura">📖 Modo oración</button>
        <button class="eina ${fav?'fav-actiu':''}" id="btnFav">${fav?'❧ Marcada':'❧ Márcala'}</button>
        <button class="eina" id="btnCopia">Copiar texto</button>
        <button class="eina" onclick="window.print()">Imprimir</button>
        <span class="mida-grup"><button class="eina mida" id="btnMenys" aria-label="Texto más pequeño">A−</button><button class="eina mida" id="btnMes" aria-label="Texto más grande">A+</button></span>
      </div>
      <div class="preg-cos" id="cosPreg">${cos}</div>
    </article>
    <nav class="nav-pn">
      ${ant?`<a href="#/p/${ant.id}"><span class="pn-l">← Anterior</span><span class="pn-t">${ant.num?ant.num+'. ':''}${esc(ant.title)}</span></a>`:'<span></span>'}
      ${seg?`<a class="seg" href="#/p/${seg.id}"><span class="pn-l">Siguiente →</span><span class="pn-t">${seg.num?seg.num+'. ':''}${esc(seg.title)}</span></a>`:''}
    </nav>`;
  lligaCerca();
  document.getElementById('btnFav').onclick = ()=>toggleFav(String(p.id));
  document.getElementById('btnMes').onclick = ()=>canviaMida(.12);
  document.getElementById('btnMenys').onclick = ()=>canviaMida(-.12);
  document.getElementById('btnCopia').onclick = e=>{
    const txt = (p.num?p.num+'. ':'')+p.title+'\n\n'+p.lines.map(l=>{
      if(l.t==='v')return 'V/. '+l.x; if(l.t==='r')return 'R/. '+l.x; return l.x;}).join('\n');
    navigator.clipboard.writeText(txt).then(()=>{e.target.textContent='Copiado ✓'; setTimeout(()=>e.target.textContent='Copiar texto',1600);}).catch(()=>{});
  };
  const bl = document.getElementById('btnLectura');
  bl.onclick = ()=>{
    document.body.classList.toggle('lectura');
    const on = document.body.classList.contains('lectura');
    bl.textContent = on ? '✕ Salir del modo oración' : '📖 Modo oración';
    if(on && mida<1.6){ mida=1.6; document.documentElement.style.setProperty('--fs-preg',mida+'rem'); }
    window.scrollTo(0,0);
  };
  window.scrollTo(0,0);
}

/* ---------- router ---------- */
function render(){
  document.body.classList.remove('lectura');
  const h = location.hash || '#/';
  const m1 = h.match(/^#\/tema\/(.+)$/);
  const m2 = h.match(/^#\/p\/(.+)$/);
  const m3 = h.match(/^#\/cerca\/(.+)$/);
  if(m1) vistaTema(decodeURIComponent(m1[1]));
  else if(m2) vistaPreg(decodeURIComponent(m2[1]));
  else if(m3) vistaPortada(decodeURIComponent(m3[1]));
  else if(h==='#/favorits') vistaFavorits();
  else vistaPortada('');
}
window.addEventListener('hashchange', render);
document.getElementById('toggleIdx').addEventListener('click', function(){
  const sp = document.querySelector('.spine'); sp.classList.toggle('open');
  this.setAttribute('aria-expanded', sp.classList.contains('open'));
  this.textContent = sp.classList.contains('open') ? 'Oculta el índice' : 'Índice de temas';
});
document.querySelector('.idx').addEventListener('click', ()=>{ if(innerWidth<=900){ document.querySelector('.spine').classList.remove('open'); }});

carregaFavs().then(render);
render();
</script>
</body>
</html>
