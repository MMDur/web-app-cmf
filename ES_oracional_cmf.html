<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Oracional Claretiano · CMF</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,500;0,600;0,700;1,500&family=EB+Garamond:ital,wght@0,400;0,500;0,600;1,400;1,500&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<style>
:root{
  --granat:#6E1423; --granat-fosc:#520E1A; --granat-clar:#8C2333;
  --or:#A87B2D; --or-clar:#C9A45C;
  --paper:#FAF6ED; --paper-2:#F3EDDF; --paper-3:#ECE4D2;
  --tinta:#26211A; --tinta-2:#5A5246; --tinta-3:#8A8070;
  --linia:#DDD3BE;
  --fs-preg:1.28rem;
  --serif:'EB Garamond',Georgia,serif;
  --display:'Cormorant Garamond',Georgia,serif;
  --ui:'Inter',system-ui,sans-serif;
}
*{margin:0;padding:0;box-sizing:border-box}
html{scroll-behavior:smooth}
body{background:var(--paper);color:var(--tinta);font-family:var(--serif);min-height:100vh}
button{font-family:inherit;cursor:pointer;background:none;border:none;color:inherit}
a{color:inherit}

/* ============ LAYOUT ============ */
.shell{display:grid;grid-template-columns:300px 1fr;min-height:100vh}
@media(max-width:900px){.shell{grid-template-columns:1fr}}

/* ============ SIDEBAR (llom del llibre) ============ */
.spine{background:linear-gradient(175deg,var(--granat) 0%,var(--granat-fosc) 100%);color:#F5E9D7;padding:2rem 1.5rem 2.5rem;position:sticky;top:0;height:100vh;overflow-y:auto;scrollbar-width:thin;scrollbar-color:var(--granat-clar) transparent}
.spine::after{content:'';position:fixed;left:296px;top:0;bottom:0;width:4px;background:linear-gradient(90deg,rgba(0,0,0,.28),transparent);pointer-events:none}
@media(max-width:900px){
  .spine{position:relative;height:auto;padding:1.4rem 1.2rem 1.2rem}
  .spine::after{display:none}
  .spine .idx{display:none}
  .spine.open .idx{display:block}
}
.marca{display:flex;align-items:baseline;gap:.6rem;margin-bottom:.35rem}
.marca .creu{font-family:var(--display);font-size:1.5rem;color:var(--or-clar)}
.marca h1{font-family:var(--display);font-weight:600;font-size:1.62rem;line-height:1.1;letter-spacing:.01em}
.marca h1 a{text-decoration:none}
.sub-marca{font-family:var(--ui);font-size:.68rem;letter-spacing:.22em;text-transform:uppercase;color:var(--or-clar);margin-bottom:1.6rem}
.idx-titol{font-family:var(--ui);font-size:.64rem;letter-spacing:.2em;text-transform:uppercase;color:rgba(245,233,215,.55);margin:1.5rem 0 .55rem;padding-bottom:.4rem;border-bottom:1px solid rgba(245,233,215,.18)}
.idx a{display:flex;justify-content:space-between;align-items:baseline;gap:.5rem;text-decoration:none;padding:.34rem .5rem;margin:0 -.5rem;border-radius:4px;font-size:1.02rem;line-height:1.25;transition:background .15s}
.idx a:hover,.idx a:focus-visible{background:rgba(255,255,255,.09);outline:none}
.idx a.actiu{background:rgba(255,255,255,.13)}
.idx a .n{font-family:var(--ui);font-size:.66rem;color:var(--or-clar);letter-spacing:.05em;flex-shrink:0}
.toggle-idx{display:none;font-family:var(--ui);font-size:.72rem;letter-spacing:.14em;text-transform:uppercase;color:var(--or-clar);border:1px solid rgba(201,164,92,.5);border-radius:20px;padding:.42rem 1rem;margin-top:.8rem}
@media(max-width:900px){.toggle-idx{display:inline-block}}

/* ============ PÀGINA ============ */
.pagina{padding:2.6rem clamp(1.2rem,5vw,4.5rem) 5rem;max-width:880px;width:100%;margin:0 auto}
@media(max-width:900px){.pagina{padding-top:1.6rem}}

/* cerca */
.cerca-wrap{position:relative;margin-bottom:1.8rem}
.cerca{width:100%;font-family:var(--serif);font-size:1.12rem;padding:.85rem 1.1rem .85rem 2.9rem;border:1px solid var(--linia);border-radius:8px;background:#fff;color:var(--tinta);box-shadow:0 1px 3px rgba(60,45,20,.06)}
.cerca:focus{outline:2px solid var(--granat);outline-offset:-1px}
.cerca::placeholder{color:var(--tinta-3);font-style:italic}
.cerca-ico{position:absolute;left:1rem;top:50%;transform:translateY(-50%);color:var(--tinta-3);pointer-events:none}

/* portada */
.eyebrow{font-family:var(--ui);font-size:.68rem;letter-spacing:.24em;text-transform:uppercase;color:var(--granat);margin-bottom:.5rem}
.portada h2{font-family:var(--display);font-weight:600;font-size:clamp(1.7rem,3.4vw,2.3rem);line-height:1.12;margin-bottom:.7rem}
.portada p.intro{font-size:1.12rem;color:var(--tinta-2);max-width:56ch;line-height:1.55;margin-bottom:2rem}

.chips{display:flex;flex-wrap:wrap;gap:.5rem;margin-bottom:2.4rem}
.chip{font-family:var(--ui);font-size:.78rem;font-weight:500;padding:.42rem .95rem;border:1px solid var(--linia);border-radius:100px;background:#fff;color:var(--tinta-2);transition:all .15s;text-decoration:none;display:inline-block}
.chip:hover,.chip:focus-visible{border-color:var(--granat);color:var(--granat);outline:none}

.temes-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(235px,1fr));gap:.9rem}
.tema-card{position:relative;background:#fff;border:1px solid var(--linia);border-radius:8px;padding:1.2rem 1.15rem 1.05rem;text-align:left;text-decoration:none;transition:border-color .15s, box-shadow .15s;overflow:hidden;display:block}
.tema-card:hover,.tema-card:focus-visible{border-color:var(--granat);box-shadow:0 3px 12px rgba(110,20,35,.09);outline:none}
.tema-card::before{content:'';position:absolute;left:0;top:0;bottom:0;width:4px;background:var(--granat)}
.tema-card h3{font-family:var(--display);font-weight:600;font-size:1.28rem;line-height:1.15;margin-bottom:.3rem}
.tema-card .desc{font-size:.95rem;font-style:italic;color:var(--tinta-2);line-height:1.35;margin-bottom:.55rem}
.tema-card .compta{font-family:var(--ui);font-size:.66rem;letter-spacing:.12em;text-transform:uppercase;color:var(--or)}

/* llista de pregàries */
.torna{font-family:var(--ui);font-size:.74rem;letter-spacing:.12em;text-transform:uppercase;color:var(--granat);text-decoration:none;display:inline-flex;align-items:center;gap:.4rem;margin-bottom:1.4rem}
.torna:hover{text-decoration:underline}
.tema-cap h2{font-family:var(--display);font-weight:600;font-size:clamp(1.6rem,3vw,2.1rem);margin-bottom:.35rem}
.tema-cap .desc{font-size:1.08rem;font-style:italic;color:var(--tinta-2);margin-bottom:1.7rem;max-width:60ch;line-height:1.5}
.sub-grup{font-family:var(--ui);font-size:.68rem;letter-spacing:.2em;text-transform:uppercase;color:var(--granat);margin:1.8rem 0 .6rem;display:flex;align-items:center;gap:.8rem}
.sub-grup::after{content:'';flex:1;height:1px;background:var(--linia)}
.llista{list-style:none}
.preg-item{border-bottom:1px solid var(--linia)}
.preg-item a{display:flex;gap:1rem;align-items:baseline;padding:.85rem .4rem;text-decoration:none;transition:background .12s}
.preg-item a:hover,.preg-item a:focus-visible{background:rgba(110,20,35,.045);outline:none}
.foli{font-family:var(--display);font-weight:700;font-size:1.05rem;color:var(--granat);min-width:2.6rem;text-align:right;flex-shrink:0;font-variant-numeric:oldstyle-nums}
.preg-item .tt{font-size:1.16rem;line-height:1.3}
.preg-item .inc{display:block;font-size:.92rem;font-style:italic;color:var(--tinta-3);margin-top:.1rem;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:58ch}
.preg-item .etq{font-family:var(--ui);font-size:.62rem;letter-spacing:.1em;text-transform:uppercase;color:var(--or);margin-left:auto;flex-shrink:0}
.buit{padding:2.5rem 0;text-align:center;color:var(--tinta-3);font-style:italic;font-size:1.08rem}

/* resultat de cerca */
.res-cap{font-family:var(--ui);font-size:.72rem;letter-spacing:.16em;text-transform:uppercase;color:var(--tinta-3);margin-bottom:.8rem}
.res-tema{font-family:var(--ui);font-size:.62rem;letter-spacing:.1em;text-transform:uppercase;color:var(--or);margin-left:auto;flex-shrink:0}

/* ============ PREGÀRIA ============ */
.preg-full{background:#fff;border:1px solid var(--linia);border-radius:10px;padding:clamp(1.6rem,4vw,3.2rem) clamp(1.3rem,4.5vw,3.6rem) clamp(2rem,4vw,3rem);box-shadow:0 2px 14px rgba(60,45,20,.07);position:relative}
.preg-full::before{content:'';position:absolute;top:-1px;left:clamp(1.3rem,4.5vw,3.6rem);width:26px;height:44px;background:var(--granat);clip-path:polygon(0 0,100% 0,100% 100%,50% 82%,0 100%)}
.preg-meta{font-family:var(--ui);font-size:.66rem;letter-spacing:.2em;text-transform:uppercase;color:var(--or);margin-bottom:.9rem;padding-left:3.2rem}
.preg-num{font-family:var(--display);font-weight:700;font-size:2.6rem;line-height:1;color:var(--granat);float:left;margin:-.3rem 1rem .2rem 0;font-variant-numeric:oldstyle-nums}
.preg-titol{font-family:var(--display);font-weight:600;font-size:clamp(1.55rem,3vw,2.05rem);line-height:1.15;margin-bottom:1.4rem}
.preg-cos{clear:both;font-size:var(--fs-preg);line-height:1.62;border-top:1px solid var(--linia);padding-top:1.5rem}
.preg-cos p{margin-bottom:.16em}
.preg-cos p.espai{margin-top:.9em}
.preg-cos .rub{font-family:var(--ui);font-size:.72em;letter-spacing:.16em;text-transform:uppercase;color:var(--or);margin:1.1em 0 .5em;font-style:normal}
.preg-cos .vers{position:relative;padding-left:1.9em}
.preg-cos .vers::before{content:'V/.';position:absolute;left:0;font-style:italic;color:var(--tinta-3);font-size:.85em;top:.15em}
.preg-cos .resp{position:relative;padding-left:1.9em;color:var(--granat);font-style:italic;font-weight:500;margin-bottom:.45em}
.preg-cos .resp::before{content:'R/.';position:absolute;left:0;color:var(--granat);font-size:.85em;font-style:italic;top:.15em}
.preg-eines{display:flex;gap:.5rem;flex-wrap:wrap;margin:1.3rem 0 1.6rem;align-items:center}
.eina{font-family:var(--ui);font-size:.76rem;font-weight:500;padding:.48rem .95rem;border:1px solid var(--linia);border-radius:6px;background:#fff;color:var(--tinta-2);display:inline-flex;align-items:center;gap:.45rem;transition:all .15s}
.eina:hover,.eina:focus-visible{border-color:var(--granat);color:var(--granat);outline:none}
.eina.fav-actiu{background:var(--granat);border-color:var(--granat);color:#F5E9D7}
.mida-grup{display:inline-flex;border:1px solid var(--linia);border-radius:6px;overflow:hidden;margin-left:auto}
.mida-grup .eina{border:none;border-radius:0;padding:.48rem .8rem}
.mida-grup .eina+.eina{border-left:1px solid var(--linia)}
.nav-pn{display:flex;justify-content:space-between;gap:1rem;margin-top:1.6rem}
.nav-pn a{font-family:var(--ui);font-size:.78rem;color:var(--tinta-2);text-decoration:none;display:flex;flex-direction:column;gap:.15rem;max-width:46%}
.nav-pn a:hover .pn-t{color:var(--granat)}
.nav-pn .pn-l{font-size:.62rem;letter-spacing:.16em;text-transform:uppercase;color:var(--tinta-3)}
.nav-pn .pn-t{font-family:var(--serif);font-size:1.02rem;line-height:1.25;transition:color .15s}
.nav-pn a.seg{text-align:right;margin-left:auto}

/* mode lectura */
body.lectura .spine,body.lectura .cerca-wrap,body.lectura .torna,body.lectura .preg-eines .eina:not(.surt-lectura):not(.mida),body.lectura .nav-pn,body.lectura .preg-meta{display:none}
body.lectura .shell{grid-template-columns:1fr}
body.lectura .pagina{max-width:820px;padding-top:2.2rem}
body.lectura .preg-full{border:none;box-shadow:none;background:var(--paper)}
body.lectura .preg-full::before{display:none}
body.lectura{--fs-preg:1.6rem}
body.lectura .preg-eines{position:sticky;top:0;background:var(--paper);padding:.6rem 0;z-index:5;margin-top:0}

/* favorits ribbon on list */
.fav-cinta{color:var(--granat);flex-shrink:0;font-size:.85rem}

@media(prefers-reduced-motion:reduce){*{transition:none!important;scroll-behavior:auto!important}}

@media print{
  .spine,.cerca-wrap,.torna,.preg-eines,.nav-pn,.toggle-idx{display:none!important}
  .shell{display:block}
  body{background:#fff}
  .preg-full{border:none;box-shadow:none;padding:0}
  .preg-full::before{display:none}
  .pagina{padding:0;max-width:none}
}
</style>
</head>
<body>
<div class="shell">
  <aside class="spine">
    <div class="marca"><span class="creu">✠</span><h1><a href="#/">Oracional Claretiano</a></h1></div>
    <div class="sub-marca">Misioneros Hijos del Corazón de María</div>
    <button class="toggle-idx" id="toggleIdx" aria-expanded="false">Índice de temas</button>
    <nav class="idx" id="idxNav" aria-label="Índice de temas"></nav>
  </aside>
  <main class="pagina" id="pagina"></main>
</div>
<script>
const DADES = [
{"id":"2","num":"2","title":"Providencia de Dios","theme":"dios-padre","sub":null,"tags":[],"lines":[
{"t":"p","x":"Bendito seas, Señor, por tu providencia"},
{"t":"p","x":"y el cuidado que siempre y en todas partes has tenido de mí. Amén."}]},
{"id":"3","num":"3","title":"Amar y servir a Dios","theme":"dios-padre","sub":null,"tags":[],"lines":[
{"t":"p","x":"Bendito seas, Señor, por tu amor y misericordia conmigo."},
{"t":"p","x":"Haz que te ame y te sirva"},
{"t":"p","x":"y que te haga amar y servir de todas las criaturas. Amén."}]},
{"id":"4","num":"4","title":"Petición del don del amor","theme":"dios-padre","sub":null,"tags":[],"lines":[
{"t":"p","x":"Fuego que siempre ardes y nunca te apagas,"},
{"t":"p","x":"amor que siempre hierves y nunca te entibias,"},
{"t":"p","x":"abrásame para que te ame."},
{"t":"p","x":"Te amo, Jesús, con todo mi corazón,"},
{"t":"p","x":"con toda mi alma, con todas mis fuerzas."},
{"t":"p","x":"Quisiera amarte más y que todos te amen."},
{"t":"p","x":"Quisiera amarte por mí y por todas tus criaturas."},
{"t":"p","x":"Virgen Santísima, concédeme la gracia"},
{"t":"p","x":"de que todos se salven y nadie se condene. Amén."}]},
{"id":"5","num":"5","title":"Unión con Dios","theme":"dios-padre","sub":null,"tags":[],"lines":[
{"t":"p","x":"Señor, así como el agua se junta al vino en la eucaristía,"},
{"t":"p","x":"así deseo unirme a Ti y ofrecerme contigo a la Santísima Trinidad. Amén."}]},
{"id":"6","num":"6","title":"Dios Padre, vida, amor y esperanza","theme":"dios-padre","sub":null,"tags":[],"lines":[
{"t":"p","x":"Señor mío, Tú eres mi amor, mi honra, mi esperanza, mi refugio."},
{"t":"p","x":"Tú mi vida, mi gloria, mi fin, mi Maestro, mi Padre, mi amor. Amén."}]},
{"id":"7","num":"7","title":"Dios providente y salvador","theme":"dios-padre","sub":null,"tags":[],"lines":[
{"t":"p","x":"Gracias, Señor, por tu bondad,"},
{"t":"p","x":"porque te vales de todos los medios para la conversión de los pecadores."},
{"t":"p","x":"Bendita sea tu providencia, que siempre vela por mí."},
{"t":"p","x":"Ahora y siempre cantaré tu eterna misericordia. Amén."}]},
{"id":"8","num":"8","title":"Sólo Dios","theme":"dios-padre","sub":null,"tags":[],"lines":[
{"t":"p","x":"Señor, Tú eres mi amor, mi honra, mi esperanza y mi refugio."},
{"t":"p","x":"Tú eres mi gloria y mi fin. Mi maestro, mi Padre."},
{"t":"p","x":"Ayúdame a no buscarte más que a Ti"},
{"t":"p","x":"ni saber nada que no sea tu voluntad para cumplirla."},
{"t":"p","x":"Sólo te quiero a Ti, y en Ti y por Ti y para Ti, las demás cosas."},
{"t":"p","x":"Tú eres para mí suficientísimo."},
{"t":"p","x":"Haz que te ame como Tú me amas, y como quieres que yo te ame. Amén."}]},
{"id":"9","num":"9","title":"Todo para la gloria de Dios","theme":"dios-padre","sub":null,"tags":[],"lines":[
{"t":"p","x":"Quiero amarte, Dios mío,"},
{"t":"p","x":"con todo mi corazón, con todo mi ser, con todas mis fuerzas:"},
{"t":"p","x":"te consagro mis pensamientos, deseos, palabras y acciones,"},
{"t":"p","x":"cuanto tengo y pueda tener."},
{"t":"p","x":"Haz que use lo que tengo para mayor honra y gloria tuya según tu voluntad. Amén."}]},
{"id":"10","num":"10","title":"Para pedir el Espíritu","theme":"dios-padre","sub":null,"tags":["Espíritu Santo"],"lines":[
{"t":"p","x":"Te suplico, Señor, que, a causa de mi fragilidad,"},
{"t":"p","x":"me envíes tu Espíritu para que me ilumine y encienda en tu amor,"},
{"t":"p","x":"me dirija y encamine por el camino recto de Jesucristo"},
{"t":"p","x":"y de la Virgen María, Madre de Dios y madre mía. Amén."}]},
{"id":"11","num":"11","title":"Para pedir las virtudes","theme":"dios-padre","sub":null,"tags":[],"lines":[
{"t":"p","x":"Creo, Señor, pero que crea con más firmeza."},
{"t":"p","x":"Espero, Señor, pero que espere con más seguridad."},
{"t":"p","x":"Amo, Señor, pero que ame con más ardor."},
{"t":"p","x":"Tengo dolor, Señor, pero que lo tenga más vehemente."},
{"t":"p","x":"Te suplico, Señor, ¿qué quieres que haga?"},
{"t":"p","x":"Enséñame a cumplir tu voluntad, pues Tú eres mi Dios."},
{"t":"p","x":"Concédeme un corazón despierto para juzgar a tu pueblo,"},
{"t":"p","x":"para discernir entre el bien y el mal."},
{"t":"p","x":"Padre, dame humildad, mansedumbre,"},
{"t":"p","x":"castidad, paciencia y caridad."},
{"t":"p","x":"Padre, enséñame la bondad, la ciencia y la disciplina."},
{"t":"p","x":"Padre, dame tu amor con tu gracia y seré rico en demasía."},
{"t":"p","x":"Dios mío, Jesús mío y todas mis cosas."},
{"t":"p","x":"Vivo en la cruz y en la cruz quiero morir,"},
{"t":"p","x":"y espero bajar de la cruz, no por mis manos, sino por las ajenas,"},
{"t":"p","x":"después de haber consumado mi sacrificio."},
{"t":"p","x":"Pero a mí jamás me acaezca gloriarme en otra cosa"},
{"t":"p","x":"sino en la cruz de Nuestro Señor Jesucristo,"},
{"t":"p","x":"por la cual el mundo está crucificado para mí y yo para el mundo."},
{"t":"p","x":"Amén."}]},
{"id":"12","num":"12","title":"Ejercicio de amor de Dios","theme":"dios-padre","sub":null,"tags":[],"lines":[
{"t":"p","x":"Dios mío, sé Dios como eres y para siempre jamás:"},
{"t":"p","x":"me alegro de que lo seas."},
{"t":"p","x":"Tú tienes poder infinito:"},
{"t":"p","x":"sé Dios Todopoderoso como lo eres."},
{"t":"p","x":"Tú tienes sabiduría infinita:"},
{"t":"p","x":"alabado seas;"},
{"t":"p","x":"ten infinita sabiduría como la tienes."},
{"t":"p","x":"Tú tienes bondad infinita,"},
{"t":"p","x":"caridad infinita y clemencia infinita."},
{"t":"p","x":"Ten, Señor, bondad,"},
{"t":"p","x":"caridad y clemencia infinita como la tienes."},
{"t":"p","x":"Tú, Señor, tienes misericordia,"},
{"t":"p","x":"providencia y liberalidad como la tienes."},
{"t":"p","x":"Tú, Señor, eres glorioso y bienaventurado sin fin;"},
{"t":"p","x":"sé glorioso y bienaventurado como lo eres."},
{"t":"p","x":"Tú, Señor, eres Trino y Uno,"},
{"t":"p","x":"Padre, Hijo y Espíritu Santo,"},
{"t":"p","x":"tres personas distintas y un solo Dios verdadero;"},
{"t":"p","x":"sé Trino y Uno como lo eres."},
{"t":"p","x":"Eres Salvador y glorificador nuestro"},
{"t":"p","x":"y de todas las criaturas; alabado seas."},
{"t":"p","x":"Tú, Señor, eres Señor universal"},
{"t":"p","x":"a quien aman, alaban y sirven los ángeles"},
{"t":"p","x":"y los bienaventurados en el cielo y los hombres en la tierra;"},
{"t":"p","x":"sé Tú Señor de todos,"},
{"t":"p","x":"y todos en el cielo y en la tierra te amemos,"},
{"t":"p","x":"alabemos y sirvamos sin fin."},
{"t":"p","x":"Corazón de Jesús, ama por mí a Dios."},
{"t":"p","x":"Corazón de María, ama por mí a Dios."},
{"t":"p","x":"Corazón de los santos todos, amad por mí a Dios."},
{"t":"p","x":"Coros de los ángeles todos, amad por mí a Dios."},
{"t":"p","x":"Criaturas todas, amad por mí a Dios."},
{"t":"p","x":"Fuego divino que siempre ardes y nunca te extingues."},
{"t":"p","x":"Corazón de Jesús, que siempre ardes y nunca te entibias,"},
{"t":"p","x":"haz que mi corazón arda siempre en el fuego del divino amor. Amén."}]},
{"id":"13","num":"13","title":"Letanía claretiana de invocaciones a María","theme":"corazon-maria","sub":"del P. Fundador","tags":["letanía"],"lines":[
{"t":"p","x":"Santa María, Hija del Padre."},
{"t":"r","x":"Ruega por nosotros."},
{"t":"p","x":"Santa María, Madre del Hijo."},
{"t":"p","x":"Santa María, Templo del Espíritu Santo."},
{"t":"p","x":"Término y coronación de la Trinidad."},
{"t":"p","x":"Delicia de Dios."},
{"t":"p","x":"La obra más perfecta de Dios."},
{"t":"p","x":"Concebida en gracia."},
{"t":"p","x":"En quien brillan omnipotencia, sabiduría y bondad de Dios."},
{"t":"p","x":"Concebida en gracia, confirmada en gracia y llena de gracia."},
{"t":"p","x":"Exenta de todo contagio de pecado."},
{"t":"p","x":"Criatura singularísima y predilecta."},
{"t":"p","x":"Purificada y santificada en su misma concepción."},
{"t":"p","x":"Preservada de toda culpa."},
{"t":"p","x":"Heredera del cielo."},
{"t":"p","x":"Confirmada en gracia."},
{"t":"p","x":"Sublimada a dignidad casi infinita."},
{"t":"p","x":"Llena de gracia."},
{"t":"p","x":"La más pura y de mayor caridad."},
{"t":"p","x":"Madre de Dios y de los hombres."},
{"t":"p","x":"Madre de Dios humanado."},
{"t":"p","x":"Madre verdadera."},
{"t":"p","x":"Madre espiritual."},
{"t":"p","x":"Madre del amor hermoso."},
{"t":"p","x":"Madre de caridad."},
{"t":"p","x":"Madre de piedad y de misericordia."},
{"t":"p","x":"Madre de los vivientes."},
{"t":"p","x":"Madre cariñosa."},
{"t":"p","x":"Madre, maestra y directora."},
{"t":"p","x":"Madre que nos recibió de Dios como hijos."},
{"t":"p","x":"Formadora y guía de apóstoles y misioneros."},
{"t":"p","x":"Madre y abogada de los pecadores."},
{"t":"p","x":"Madre, alivio, fortaleza y consuelo."},
{"t":"p","x":"Dispensadora de misericordias."},
{"t":"p","x":"Canal de gracia."},
{"t":"p","x":"Amparo de desvalidos."},
{"t":"p","x":"Norte de navegantes."},
{"t":"p","x":"Salud de enfermos."},
{"t":"p","x":"Aliento de moribundos."},
{"t":"p","x":"Rescatadora de cautivos."},
{"t":"p","x":"Especial abogada."},
{"t":"p","x":"Consuelo de afligidos."},
{"t":"p","x":"Escala del cielo."},
{"t":"p","x":"Ventana del paraíso."},
{"t":"p","x":"Reina de cielos y tierra."},
{"t":"p","x":"Reina y señora de la gracia."},
{"t":"p","x":"Corazón de la Iglesia."},
{"t":"p","x":"Corazón del mundo cristiano."}]},
{"id":"14","num":"14","title":"Súplica a María","theme":"corazon-maria","sub":"del P. Fundador","tags":[],"lines":[
{"t":"p","x":"Virgen y Madre de Dios,"},
{"t":"p","x":"vuelve tus ojos misericordiosos hacia nosotros"},
{"t":"p","x":"que estamos en este valle de lágrimas,"},
{"t":"p","x":"y que confiamos en ti por ser hijos tuyos."},
{"t":"p","x":"Ayúdanos a anunciar la Buena Nueva del Reino"},
{"t":"p","x":"en fidelidad y fortaleza,"},
{"t":"p","x":"porque son muchos los que se oponen a él"},
{"t":"p","x":"por ambición de poder, por afán de riquezas o por ansia de placeres."},
{"t":"p","x":"Dispón de mí para cooperar con tu oficio maternal"},
{"t":"p","x":"en la misión apostólica."},
{"t":"p","x":"Amén."}]},
{"id":"15","num":"15","title":"Invocaciones a María","theme":"corazon-maria","sub":"del P. Fundador","tags":[],"lines":[
{"t":"p","x":"Dios te salve, Inmaculada María, Hija de Dios Padre."},
{"t":"p","x":"Dios te salve, Inmaculada María, Madre de Dios Hijo."},
{"t":"p","x":"Dios te salve, Inmaculada María, Templo de Dios Espíritu Santo."},
{"t":"p","x":"Dios te salve María, madre y abogada de los pecadores."},
{"t":"p","x":"Bendita eres entre todas las mujeres."},
{"t":"p","x":"Tú eres la gloria de Jerusalén,"},
{"t":"p","x":"la alegría de Israel y el honor de nuestro pueblo."},
{"t":"p","x":"Tú eres el amparo de los desvalidos,"},
{"t":"p","x":"el consuelo de los afligidos, el norte de los navegantes."},
{"t":"p","x":"Tú eres la salud de los enfermos, el aliento de los moribundos,"},
{"t":"p","x":"y la puerta del cielo."},
{"t":"p","x":"Tú eres, después de Jesucristo, fruto bendito de tu vientre,"},
{"t":"p","x":"toda nuestra esperanza."},
{"t":"p","x":"Oh clemente, oh pía, oh dulce e Inmaculada María."}]},
{"id":"16","num":"16","title":"Madre del Divino Amor","theme":"corazon-maria","sub":"del P. Fundador","tags":[],"lines":[
{"t":"p","x":"¡María, Madre mía, Madre del divino amor!"},
{"t":"p","x":"No puedo pedir cosa que te sea más grata ni más fácil de conceder"},
{"t":"p","x":"que el divino amor."},
{"t":"p","x":"Concédemelo, Madre mía."},
{"t":"p","x":"Madre mía, tengo hambre y sed de amor."},
{"t":"p","x":"Socórreme, sáciame."},
{"t":"p","x":"¡Oh, Corazón de María, fragua e instrumento del amor,"},
{"t":"p","x":"enciéndeme en el amor de Dios y del prójimo!"}]},
{"id":"17","num":"17","title":"Hijo Misionero de María","theme":"corazon-maria","sub":"del P. Fundador","tags":[],"lines":[
{"t":"p","x":"¡Oh Virgen y Madre de Dios!,"},
{"t":"p","x":"bien sabes que somos hijos y ministros tuyos,"},
{"t":"p","x":"formados por ti misma"},
{"t":"p","x":"en la fragua de tu misericordia y amor."},
{"t":"p","x":"Somos como una saeta puesta en tu mano poderosa."},
{"t":"p","x":"Lánzanos, Madre nuestra,"},
{"t":"p","x":"contra lo que se opone al Reino de Dios."},
{"t":"p","x":"Confiados en tu protección,"},
{"t":"p","x":"anunciamos el Evangelio"},
{"t":"p","x":"sin más armas que la divina Palabra,"},
{"t":"p","x":"sin más títulos que el de hijos de tu Inmaculado Corazón."},
{"t":"p","x":"Tuya, Madre, será la victoria."},
{"t":"p","x":"Amén."}]},
{"id":"18","num":"18","title":"Configuración con Cristo","theme":"corazon-maria","sub":"de la Congregación","tags":[],"lines":[
{"t":"p","x":"Señor y Dios nuestro,"},
{"t":"p","x":"que elegiste a la siempre Virgen María"},
{"t":"p","x":"como Madre de tu Hijo y Madre nuestra;"},
{"t":"p","x":"haz que, por la fiel entrega a su Corazón materno,"},
{"t":"p","x":"nos configuremos más plenamente con Cristo"},
{"t":"p","x":"y cooperemos con su oficio maternal"},
{"t":"p","x":"en la misión apostólica."},
{"t":"p","x":"Por Jesucristo nuestro Señor."},
{"t":"p","x":"Amén."}]},
{"id":"19","num":"19","title":"Letanías de la Virgen María basadas en las Constituciones","theme":"corazon-maria","sub":"de la Congregación","tags":["letanía"],"lines":[
{"t":"p","x":"Oh María, los Hijos de tu Corazón Inmaculado,"},
{"t":"p","x":"por tu fe obediente y por tu ardiente caridad"},
{"t":"p","x":"te proclamamos «Bienaventurada» y te invocamos:"},
{"t":"r","x":"Madre de Dios y madre nuestra."},
{"t":"r","x":"Bendita eres entre todas las mujeres."},
{"t":"r","x":"Madre de Jesucristo, nuestro Señor, enviado por el Padre."},
{"t":"r","x":"Madre del Verbo, hecho hombre por obra del Espíritu."},
{"t":"r","x":"Madre del Hijo ungido para evangelizar a los pobres."},
{"t":"r","x":"Fundadora, Patrona y Titular de nuestra Congregación."},
{"t":"r","x":"Primera discípula de Cristo."},
{"t":"r","x":"Modelo nuestro en el seguimiento de Jesús."},
{"t":"r","x":"Primera entre los pobres del Señor."},
{"t":"r","x":"Esclava consagrada totalmente a la persona y a la obra de tu Hijo."},
{"t":"r","x":"Madre y Maestra de Misioneros."},
{"t":"r","x":"Formadora de Apóstoles."},
{"t":"rub","x":"Oremos:"},
{"t":"p","x":"Dios Padre nuestro, te damos gracias"},
{"t":"p","x":"porque nos llamamos y somos Hijos del Corazón Inmaculado de María,"},
{"t":"p","x":"haz que veneremos con amor y confianza a nuestra Madre"},
{"t":"p","x":"y nos entreguemos a Ella para que nos configure a Cristo"},
{"t":"p","x":"y cooperemos con su oficio materno"},
{"t":"p","x":"en la misión apostólica que nos has confiado."},
{"t":"p","x":"Amén."}]},
{"id":"20","num":"20","title":"Oración filial y apostólica al Corazón de María","theme":"corazon-maria","sub":"de la Congregación","tags":[],"lines":[
{"t":"p","x":"¡Oh Virgen y Madre de Dios!,"},
{"t":"p","x":"yo me entrego por hijo tuyo."},
{"t":"p","x":"Me confío a tu amor materno"},
{"t":"p","x":"para que formes en mí a Jesús,"},
{"t":"p","x":"el Hijo y el Enviado del Padre,"},
{"t":"p","x":"el Ungido por el Espíritu Santo"},
{"t":"p","x":"para anunciar la Buena Nueva a los pobres."},
{"t":"p","x":"Enséñame a guardar, como tú, la Palabra en el corazón,"},
{"t":"p","x":"hasta convertirme en Evangelio vivo."},
{"t":"p","x":"Pide la fuerza del Espíritu"},
{"t":"p","x":"para que sea testigo de Cristo entre los hombres."},
{"t":"p","x":"Infúndeme tu amor materno"},
{"t":"p","x":"para que les revele al Padre"},
{"t":"p","x":"y sientan la alegría de ser hijos de Dios"},
{"t":"p","x":"en la comunión fraterna de la Iglesia."},
{"t":"p","x":"Madre, aquí tienes a tu hijo. Fórmame."},
{"t":"p","x":"Madre, aquí tienes a tu hijo. Envíame."},
{"t":"p","x":"Madre, aquí tienes a tu hijo. Habla por mí. Ama por mí."},
{"t":"p","x":"Guárdame, no sea que anunciando a otros el Evangelio,"},
{"t":"p","x":"quede yo excluido del Reino."},
{"t":"p","x":"En ti, Madre mía,"},
{"t":"p","x":"he puesto toda mi confianza."},
{"t":"p","x":"Jamás quedaré confundido. Amén."}]},
{"id":"21","num":"21","title":"Letanías al Corazón de María","theme":"corazon-maria","sub":"de la Congregación","tags":["letanía"],"lines":[
{"t":"p","x":"Señor, ten misericordia de nosotros."},
{"t":"p","x":"Cristo, ten misericordia de nosotros."},
{"t":"p","x":"Señor, ten misericordia de nosotros."},
{"t":"p","x":"Cristo, óyenos."},
{"t":"p","x":"Cristo, escúchanos."},
{"t":"p","x":"Dios, Padre celestial. Ten misericordia de nosotros."},
{"t":"p","x":"Dios, Hijo redentor del mundo."},
{"t":"p","x":"Dios, Espíritu Santo."},
{"t":"p","x":"Trinidad Santa, que eres un solo Dios."},
{"t":"p","x":"Corazón de María, modelado por el Padre. Ruega por nosotros."},
{"t":"p","x":"Corazón de María, el más semejante al Corazón de Jesús."},
{"t":"p","x":"Corazón de María, adornado con todos los dones del Espíritu Santo."},
{"t":"p","x":"Corazón de María, que amas al Padre con amor de hija."},
{"t":"p","x":"Corazón de María, que amas al Hijo con amor de madre."},
{"t":"p","x":"Corazón de María, que amas al Espíritu Santo con amor de esposa."},
{"t":"p","x":"Corazón de María, que conservas fielmente las palabras y acciones de Jesús."},
{"t":"p","x":"Corazón de María, traspasado con la espada de dolor."},
{"t":"p","x":"Corazón de María, clavado en la cruz con Cristo crucificado."},
{"t":"p","x":"Corazón de María, vivificado por la alegría de la resurrección de Jesús."},
{"t":"p","x":"Corazón de María, colmado de nueva plenitud de gracia en la venida del Espíritu Santo."},
{"t":"p","x":"Corazón de María, morada de Dios, llena de su gloria."},
{"t":"p","x":"Corazón de María, arca de la alianza de Dios con los hombres."},
{"t":"p","x":"Corazón de María, regazo de Dios y de los hombres."},
{"t":"p","x":"Corazón de María, que has traído la salvación del mundo."},
{"t":"p","x":"Corazón de María, siempre Inmaculado."},
{"t":"p","x":"Corazón de María, lleno de gracia."},
{"t":"p","x":"Corazón de María, bendito entre todos los corazones."},
{"t":"p","x":"Corazón de María, abismo de humildad."},
{"t":"p","x":"Corazón de María, trono de misericordia."},
{"t":"p","x":"Corazón de María, fragua de amor divino."},
{"t":"p","x":"Corazón de María, que alcanzas gracia a los pecadores."},
{"t":"p","x":"Corazón de María, roca invencible de fe."},
{"t":"p","x":"Corazón de María, fuente de amistad perfecta."},
{"t":"p","x":"Corazón de María, apoyo de la Iglesia en su caminar hacia el Padre."},
{"t":"p","x":"Corazón de María, fragua de amor que nos configura con Jesús."},
{"t":"p","x":"Corazón de María, Madre y formadora nuestra."},
{"t":"p","x":"Corazón de María, consuelo de afligidos."},
{"t":"p","x":"Corazón de María, refugio de pecadores."},
{"t":"p","x":"Corazón de María, auxilio de los agonizantes."},
{"t":"p","x":"Corazón de María, esperanza del mundo."},
{"t":"p","x":"Corazón de María, señora de nuestros corazones."},
{"t":"p","x":"Corazón de María, reina de la paz."},
{"t":"p","x":"Cordero de Dios que quitas el pecado del mundo."},
{"t":"r","x":"Perdónanos, Señor."},
{"t":"p","x":"Cordero de Dios que quitas el pecado del mundo."},
{"t":"r","x":"Escúchanos, Señor."},
{"t":"p","x":"Cordero de Dios que quitas el pecado del mundo."},
{"t":"r","x":"Ten misericordia de nosotros."},
{"t":"p","x":"Ruega por nosotros, Santa Madre de Dios."},
{"t":"r","x":"Para que seamos dignos de alcanzar las promesas de Jesucristo."},
{"t":"rub","x":"Oremos:"},
{"t":"p","x":"Señor, Dios nuestro,"},
{"t":"p","x":"que hiciste del Corazón Inmaculado de María"},
{"t":"p","x":"una mansión para tu Hijo y un santuario del Espíritu Santo,"},
{"t":"p","x":"danos un corazón limpio y dócil,"},
{"t":"p","x":"para que, sumisos siempre a tu voluntad,"},
{"t":"p","x":"te amemos sobre todas las cosas"},
{"t":"p","x":"y ayudemos a los hermanos en sus necesidades."},
{"t":"p","x":"Por Jesucristo, nuestro Señor."},
{"t":"p","x":"Amén."}]},
{"id":"22","num":"22","title":"Acción de gracias por el Corazón de María","theme":"corazon-maria","sub":"de la Congregación","tags":[],"lines":[
{"t":"p","x":"Te damos gracias, Padre santo,"},
{"t":"p","x":"porque diste a la Virgen María un corazón sabio y dócil,"},
{"t":"p","x":"dispuesto siempre a agradarte,"},
{"t":"p","x":"un corazón nuevo y humilde,"},
{"t":"p","x":"para grabar en él la ley de la nueva Alianza;"},
{"t":"p","x":"un corazón sencillo y limpio,"},
{"t":"p","x":"que la hizo digna de concebir virginalmente a tu Hijo"},
{"t":"p","x":"y la capacitó para contemplarte eternamente;"},
{"t":"p","x":"un corazón firme y dispuesto"},
{"t":"p","x":"para soportar con fortaleza la espada de dolor,"},
{"t":"p","x":"y esperar, llena de fe, la resurrección de tu Hijo."},
{"t":"p","x":"Danos un corazón sabio y dócil, nuevo y humilde,"},
{"t":"p","x":"sencillo y limpio, firme y dispuesto,"},
{"t":"p","x":"para que la imitemos y cooperemos con mayor fidelidad a tu obra de salvación."},
{"t":"p","x":"Amén."}]},
{"id":"23","num":"23","title":"Entrega al Corazón de María","theme":"corazon-maria","sub":"de la Congregación","tags":[],"lines":[
{"t":"p","x":"¡Madre del Señor, Corazón de María!"},
{"t":"p","x":"Tú que presidiste como Fundadora"},
{"t":"p","x":"el origen de nuestra Congregación,"},
{"t":"p","x":"sé siempre nuestra inspiradora y"},
{"t":"p","x":"el corazón de nuestra Congregación,"},
{"t":"p","x":"necesitada de contemplación y de nuevas ilusiones,"},
{"t":"p","x":"en este mundo, tan amado por el Padre"},
{"t":"p","x":"y tan afectado por la increencia y la injusticia;"},
{"t":"p","x":"habla por nosotros"},
{"t":"p","x":"y testifica a través de nuestra vida"},
{"t":"p","x":"el mensaje del Reino."},
{"t":"p","x":"Madre del Señor,"},
{"t":"p","x":"ruega para que venga a nosotros"},
{"t":"p","x":"el Espíritu, que es impulso hacia el mundo nuevo."},
{"t":"p","x":"Madre, con tu Corazón"},
{"t":"p","x":"¡ora por nosotros!"},
{"t":"p","x":"¡intercede por nosotros!"}]},
{"id":"24","num":"24","title":"Ofrecimiento al Corazón de María","theme":"corazon-maria","sub":"de la Congregación","tags":[],"lines":[
{"t":"p","x":"Virgen María, Madre de Dios y Madre nuestra:"},
{"t":"p","x":"me confío a tu amor materno"},
{"t":"p","x":"para que hagas de mí un misionero"},
{"t":"p","x":"a imagen y semejanza de tu Hijo, el Enviado del Padre,"},
{"t":"p","x":"para anunciar la Buena Nueva a los pobres."},
{"t":"p","x":"Enséñame a creer, amar y servir como tú."},
{"t":"p","x":"Hazme generoso y agradecido"},
{"t":"p","x":"para vivir con alegría"},
{"t":"p","x":"el don de mi vocación misionera."},
{"t":"p","x":"Amén."}]},
{"id":"25","num":"25","title":"Corazón de María","theme":"corazon-maria","sub":"de la Congregación","tags":[],"lines":[
{"t":"p","x":"Señor, Dios nuestro,"},
{"t":"p","x":"que elegiste a la siempre Virgen María"},
{"t":"p","x":"como Madre de tu Hijo y Madre nuestra:"},
{"t":"p","x":"haz que, por la fiel entrega a su Corazón materno,"},
{"t":"p","x":"nos configuremos más plenamente con Cristo"},
{"t":"p","x":"y, urgidos por su caridad,"},
{"t":"p","x":"nos dediquemos con mayor generosidad"},
{"t":"p","x":"a proclamar el Evangelio a todos los hombres."},
{"t":"p","x":"Por Jesucristo nuestro Señor."},
{"t":"p","x":"Amén."}]},
{"id":"26","num":"26","title":"Madre y Maestra","theme":"corazon-maria","sub":"de la Congregación","tags":[],"lines":[
{"t":"p","x":"María, Madre y Maestra de Misioneros, intercede ante el Padre"},
{"t":"p","x":"para que los hijos de tu Corazón"},
{"t":"p","x":"reproduzcamos los rasgos de Jesús"},
{"t":"p","x":"y seamos hombres universales,"},
{"t":"p","x":"de ojos penetrantes y oídos atentos"},
{"t":"p","x":"a las urgencias del mundo."},
{"t":"p","x":"Que como Tú,"},
{"t":"p","x":"seamos hombres de misericordia,"},
{"t":"p","x":"ternura y compasión."},
{"t":"p","x":"Que nos abramos siempre a nuevos horizontes misioneros,"},
{"t":"p","x":"dispuestos a aceptar lo diverso."},
{"t":"p","x":"Y la caridad apostólica que brota"},
{"t":"p","x":"de la fragua de tu Corazón"},
{"t":"p","x":"nos impulse en toda circunstancia"},
{"t":"p","x":"en que el Espíritu nos ponga."},
{"t":"p","x":"Amén."}]},
{"id":"27","num":"27","title":"Invocación a María Madre de la Iglesia","theme":"corazon-maria","sub":"de la Congregación","tags":[],"lines":[
{"t":"p","x":"Virgen María, Madre de la Iglesia,"},
{"t":"p","x":"te encomendamos toda la Iglesia."},
{"t":"p","x":"Acuérdate de todos tus hijos;"},
{"t":"p","x":"da valor a sus oraciones ante Dios;"},
{"t":"p","x":"conserva sólida su fe;"},
{"t":"p","x":"fortifica su esperanza"},
{"t":"p","x":"y aumenta su caridad."},
{"t":"p","x":"Encomendamos a tu Corazón Inmaculado"},
{"t":"p","x":"todo el género humano:"},
{"t":"p","x":"condúcelo al conocimiento"},
{"t":"p","x":"del único y verdadero salvador, Cristo Jesús;"},
{"t":"p","x":"aleja de él el castigo del pecado;"},
{"t":"p","x":"concede a todo el mundo la paz en la verdad,"},
{"t":"p","x":"en la justicia, en la libertad y en el amor."},
{"t":"p","x":"Y haz que toda la Iglesia"},
{"t":"p","x":"pueda elevar al Dios de las misericordias"},
{"t":"p","x":"un himno de alabanza, de agradecimiento y de alegría,"},
{"t":"p","x":"pues grandes cosas ha obrado el Señor por medio de ti,"},
{"t":"p","x":"clemente, piadosa y dulce Virgen María."},
{"t":"p","x":"Amén."}]},
{"id":"29","num":"29","title":"Fundador y modelo","theme":"claret","sub":null,"tags":[],"lines":[
{"t":"p","x":"Señor, Dios nuestro,"},
{"t":"p","x":"que escogiste a San Antonio María Claret"},
{"t":"p","x":"para fundador de nuestra Familia,"},
{"t":"p","x":"e hiciste que, ardiendo en caridad,"},
{"t":"p","x":"se gozase en las calumnias y tormentos;"},
{"t":"p","x":"concédenos, benigno, que,"},
{"t":"p","x":"adhiriéndonos fielmente a sus enseñanzas,"},
{"t":"p","x":"proclamemos tu gloria en todo el mundo"},
{"t":"p","x":"y busquemos siempre con solicitud"},
{"t":"p","x":"la salvación de todos los hombres."},
{"t":"p","x":"Por Jesucristo, nuestro Señor."},
{"t":"p","x":"Amén."}]},
{"id":"30","num":"30","title":"Fieles a su espíritu","theme":"claret","sub":null,"tags":[],"lines":[
{"t":"p","x":"Dios Padre nuestro,"},
{"t":"p","x":"que concediste a San Antonio María Claret"},
{"t":"p","x":"un ardiente y filial amor al Santísimo Sacramento"},
{"t":"p","x":"y al Inmaculado Corazón de María"},
{"t":"p","x":"para que realizase en la Iglesia de Dios"},
{"t":"p","x":"grandes maravillas para tu gloria"},
{"t":"p","x":"y la salvación de las almas:"},
{"t":"p","x":"alcánzanos que,"},
{"t":"p","x":"ardiendo a imitación suya"},
{"t":"p","x":"en los mismos santos amores,"},
{"t":"p","x":"y continuando con la mayor eficacia"},
{"t":"p","x":"su obra evangelizadora,"},
{"t":"p","x":"merezcamos vivir y morir en la Congregación"},
{"t":"p","x":"como dignos Hijos del Inmaculado Corazón de María."},
{"t":"p","x":"Amén."}]},
{"id":"31","num":"31","title":"Para continuar su obra","theme":"claret","sub":null,"tags":[],"lines":[
{"t":"p","x":"Señor,"},
{"t":"p","x":"que hiciste de San Antonio María Claret, nuestro Padre,"},
{"t":"p","x":"un celoso apóstol de la gloria de Dios y de la salvación de los hombres,"},
{"t":"p","x":"concédenos la caridad ardiente que abrasaba su corazón"},
{"t":"p","x":"para que continuemos con intensidad y eficacia"},
{"t":"p","x":"su obra apostólica."},
{"t":"p","x":"Haz que se multipliquen sus hijos"},
{"t":"p","x":"para dilatar el Reino de Jesucristo,"},
{"t":"p","x":"y que en el momento de nuestra muerte"},
{"t":"p","x":"merezcamos ser reconocidos como \"siervos fieles\" de Cristo y del Evangelio."},
{"t":"p","x":"Amén."}]},
{"id":"32","num":"32","title":"Magníficat de la vocación","theme":"congregacion","sub":null,"tags":[],"lines":[
{"t":"p","x":"¡Señor Dios nuestro, te bendecimos"},
{"t":"p","x":"porque nos has escogido"},
{"t":"p","x":"para hijos del Inmaculado Corazón de tu Madre!"},
{"t":"p","x":"¡Madre benditísima,"},
{"t":"p","x":"te alabamos por la fineza de tu Inmaculado Corazón"},
{"t":"p","x":"y habernos tomado por hijos tuyos!"},
{"t":"p","x":"Haz, Madre nuestra, que correspondamos a tanta bondad;"},
{"t":"p","x":"que cada día seamos más humildes, más fervorosos"},
{"t":"p","x":"y más celosos de la salvación de las almas."},
{"t":"p","x":"Amén."}]},
{"id":"33","num":"33","title":"Oración del claretiano","theme":"congregacion","sub":null,"tags":[],"lines":[
{"t":"p","x":"Haz, Señor, que los Misioneros"},
{"t":"p","x":"Hijos del Inmaculado Corazón de María"},
{"t":"p","x":"seamos hombres que ardamos en caridad"},
{"t":"p","x":"y que abrasemos por donde pasemos."},
{"t":"p","x":"Que deseemos eficazmente y procuremos por todos los medios posibles"},
{"t":"p","x":"encender a todo el mundo en el fuego del divino amor."},
{"t":"p","x":"Que nada ni nadie nos arredre."},
{"t":"p","x":"Que sepamos gozarnos en las privaciones,"},
{"t":"p","x":"abordar los trabajos, abrazar los sacrificios,"},
{"t":"p","x":"complacernos en las calumnias que nos levanten,"},
{"t":"p","x":"alegrarnos en los tormentos y dolores que suframos"},
{"t":"p","x":"y gloriarnos en la cruz de Jesucristo."},
{"t":"p","x":"Que no pensemos sino en cómo seguir"},
{"t":"p","x":"e imitar más de cerca a Jesucristo"},
{"t":"p","x":"en orar, trabajar y sufrir"},
{"t":"p","x":"y procurar siempre y únicamente la mayor gloria de Dios"},
{"t":"p","x":"y la salvación de las almas."},
{"t":"p","x":"Amén."}]},
{"id":"34","num":"34","title":"Oración para el aniversario de la Fundación","theme":"congregacion","sub":null,"tags":["16 de julio","aniversario"],"lines":[
{"t":"p","x":"Señor,"},
{"t":"p","x":"que otorgaste a San Antonio María Claret, nuestro Padre,"},
{"t":"p","x":"arder en caridad"},
{"t":"p","x":"y una solicitud apostólica"},
{"t":"p","x":"por la salvación de los hombres de todo el mundo."},
{"t":"p","x":"Desde niño lo fuiste llevando"},
{"t":"p","x":"al conocimiento más pleno del misterio de Cristo."},
{"t":"p","x":"Urgido por la caridad, se entregó al anuncio del Evangelio,"},
{"t":"p","x":"fue paciente en los trabajos y calumnias,"},
{"t":"p","x":"y ratificó su vida con su sangre y destierro."},
{"t":"p","x":"Para continuar su obra,"},
{"t":"p","x":"y por intervención de la Virgen María,"},
{"t":"p","x":"fundó nuestra Congregación y nos dejó su espíritu."},
{"t":"p","x":"Hoy, al recordar nuestro origen en la Iglesia,"},
{"t":"p","x":"te pedimos, por intercesión de nuestra Madre,"},
{"t":"p","x":"que nos hagas fieles hijos suyos"},
{"t":"p","x":"en el ministerio de la Palabra;"},
{"t":"p","x":"que su corazón siga siendo para nosotros"},
{"t":"p","x":"el cayado de la confianza;"},
{"t":"p","x":"que bendigas con nuevas vocaciones"},
{"t":"p","x":"a esta familia claretiana"},
{"t":"p","x":"y que nos des un amor perseverante a Jesús"},
{"t":"p","x":"a todos los que nos llamamos y somos"},
{"t":"p","x":"hijos del Corazón Inmaculado de María"},
{"t":"p","x":"y trabajamos por la gloria de Dios"},
{"t":"p","x":"en la Iglesia."},
{"t":"p","x":"Amén."}]},
{"id":"35","num":"35","title":"Por nuestra Congregación","theme":"congregacion","sub":null,"tags":[],"lines":[
{"t":"r","x":"Mira desde el cielo a nuestra Congregación, fíjate y ven a visitarla."},
{"t":"v","x":"Cuídala, riégala y enriquécela sin medida."},
{"t":"r","x":"Acuérdate, Señor, de cada uno de nosotros."},
{"t":"v","x":"Envíanos tu luz y tu verdad."},
{"t":"r","x":"Danos vida para que invoquemos tu nombre."},
{"t":"v","x":"Y cumplamos la misión de anunciar el Evangelio a todos los pueblos."},
{"t":"rub","x":"Oremos:"},
{"t":"p","x":"Te rogamos, Señor, que,"},
{"t":"p","x":"por intercesión del Corazón Inmaculado de María,"},
{"t":"p","x":"libres de todo mal a nuestra Congregación"},
{"t":"p","x":"para que, con espíritu humilde y generoso, como San Antonio María Claret,"},
{"t":"p","x":"se dedique a tu plan de salvación sobre los hombres."},
{"t":"p","x":"Por Jesucristo nuestro Señor."},
{"t":"p","x":"Amén."}]},
{"id":"36","num":"36","title":"Por nuestra Congregación (letanía)","theme":"congregacion","sub":null,"tags":["letanía"],"lines":[
{"t":"v","x":"Santa María."},
{"t":"r","x":"Ruega por nosotros."},
{"t":"v","x":"San Miguel y todos los santos Ángeles."},
{"t":"r","x":"Rogad por nosotros."},
{"t":"v","x":"San José."},
{"t":"r","x":"Ruega por nosotros."},
{"t":"v","x":"Santos Apóstoles."},
{"t":"r","x":"Rogad por nosotros."},
{"t":"v","x":"San Alfonso María de Ligorio."},
{"t":"r","x":"Ruega por nosotros."},
{"t":"v","x":"San Ignacio de Loyola."},
{"t":"r","x":"Ruega por nosotros."},
{"t":"v","x":"San Francisco Javier."},
{"t":"r","x":"Ruega por nosotros."},
{"t":"v","x":"San Vicente de Paúl."},
{"t":"r","x":"Ruega por nosotros."},
{"t":"v","x":"San Antonio María Claret."},
{"t":"r","x":"Ruega por nosotros."},
{"t":"v","x":"Santa Teresa de Jesús."},
{"t":"r","x":"Ruega por nosotros."},
{"t":"v","x":"Santa Catalina de Siena."},
{"t":"r","x":"Ruega por nosotros."},
{"t":"v","x":"Beatos Mártires de la Familia Claretiana."},
{"t":"r","x":"Rogad por nosotros."},
{"t":"v","x":"Todos los Santos y Santas de Dios."},
{"t":"r","x":"Rogad por nosotros."},
{"t":"v","x":"Acuérdate, Señor, de tu Congregación."},
{"t":"r","x":"Que poseíste desde el principio."},
{"t":"v","x":"Que cumpla su misión de anunciar el Evangelio."},
{"t":"r","x":"Para que todos los hombres se salven."},
{"t":"v","x":"Te rogamos que vengas en auxilio de tus siervos."},
{"t":"r","x":"A quienes redimiste con tu preciosa sangre."},
{"t":"v","x":"Salva, Señor, a tu Congregación."},
{"t":"r","x":"Sé su pastor y guíala siempre."},
{"t":"v","x":"Ten piedad de nosotros, Señor."},
{"t":"r","x":"Ten piedad de nosotros."},
{"t":"v","x":"Que tu misericordia, Señor, venga sobre nosotros."},
{"t":"r","x":"Como lo esperamos de ti."},
{"t":"v","x":"Señor, escucha nuestra oración."},
{"t":"r","x":"Y llegue a ti nuestro clamor."},
{"t":"v","x":"El Señor esté con vosotros."},
{"t":"r","x":"Y con tu espíritu."},
{"t":"rub","x":"Oremos:"},
{"t":"p","x":"Te rogamos, Señor, que,"},
{"t":"p","x":"por la intercesión de la Virgen María,"},
{"t":"p","x":"libres de todo mal a esta Congregación,"},
{"t":"p","x":"derrames abundantemente tu gracia sobre sus hijos,"},
{"t":"p","x":"y los llenes de tu espíritu"},
{"t":"p","x":"para que te complazcan siempre en la verdad."},
{"t":"p","x":"Por Jesucristo nuestro Señor."},
{"t":"p","x":"Amén."}]},
{"id":"37","num":"37","title":"Oración por la Congregación","theme":"congregacion","sub":null,"tags":[],"lines":[
{"t":"p","x":"Padre de bondad y de misericordia,"},
{"t":"p","x":"te alabamos y te bendecimos"},
{"t":"p","x":"por haber enriquecido a tu Iglesia"},
{"t":"p","x":"con el estilo de santificación y apostolado"},
{"t":"p","x":"de San Antonio María Claret,"},
{"t":"p","x":"nuestro Fundador y Padre."},
{"t":"p","x":"Te suplicamos humildemente:"},
{"t":"p","x":"manda nuevos operarios a nuestra Congregación"},
{"t":"p","x":"e infunde tu Espíritu en los que has escogido."},
{"t":"p","x":"Confírmanos a todos en la vocación misionera,"},
{"t":"p","x":"y haz que, urgidos por la caridad de Cristo,"},
{"t":"p","x":"como verdaderos Hijos"},
{"t":"p","x":"del Inmaculado Corazón de María,"},
{"t":"p","x":"anunciemos a todos los pueblos"},
{"t":"p","x":"la Buena Nueva del Reino."},
{"t":"p","x":"Por Jesucristo, nuestro Señor. Amén."}]},
{"id":"38","num":"38","title":"Para la renovación del espíritu claretiano","theme":"congregacion","sub":null,"tags":[],"lines":[
{"t":"p","x":"Renueva, Señor, en nuestra Congregación"},
{"t":"p","x":"el espíritu que animó a San Antonio María Claret, nuestro Padre,"},
{"t":"p","x":"para que, llenos y vigorizados por él,"},
{"t":"p","x":"nos esforcemos en amar lo que él amó"},
{"t":"p","x":"y en llevar a la práctica lo que nos enseñó."},
{"t":"p","x":"Por Jesucristo nuestro Señor."},
{"t":"p","x":"Amén."}]},
{"id":"39","num":"39","title":"Evangelizadores fieles","theme":"congregacion","sub":null,"tags":[],"lines":[
{"t":"p","x":"Tú, Señor,"},
{"t":"p","x":"decretaste misericordiosamente"},
{"t":"p","x":"que tu Palabra se encarnara en el seno de la Virgen María;"},
{"t":"p","x":"concédenos guardarla en nuestros corazones"},
{"t":"p","x":"de suerte que seamos siempre fieles servidores"},
{"t":"p","x":"en la proclamación de su Buena Nueva de salvación."},
{"t":"p","x":"Por Jesucristo nuestro Señor."},
{"t":"p","x":"Amén."}]},
{"id":"40","num":"40","title":"Constituciones","theme":"congregacion","sub":null,"tags":[],"lines":[
{"t":"p","x":"Padre, que nos has concedido el don"},
{"t":"p","x":"de seguir a Jesús"},
{"t":"p","x":"y anunciar tu Reino entre los hombres"},
{"t":"p","x":"al estilo de Claret y sus discípulos."},
{"t":"p","x":"Ayúdanos a observar con todo el cuidado posible nuestras Constituciones,"},
{"t":"p","x":"camino de evangelio para nosotros."},
{"t":"p","x":"Concédenos escuchar tu Palabra con toda docilidad, como tu Madre,"},
{"t":"p","x":"para ser fieles Hijos de su Corazón,"},
{"t":"p","x":"y cooperar con su oficio maternal en la misión apostólica."},
{"t":"p","x":"Por el mismo Jesucristo nuestro Señor."},
{"t":"p","x":"Amén."}]},
{"id":"41","num":"41","title":"Acción de gracias por la vocación","theme":"congregacion","sub":null,"tags":[],"lines":[
{"t":"p","x":"Gracias os doy, oh Madre, por la vocación recibida."},
{"t":"p","x":"Dadme la gracia de ser a ella fiel toda mi vida."}]},
{"id":"42","num":"42","title":"Definición del Misionero Claretiano","theme":"congregacion","sub":null,"tags":["responsorial"],"lines":[
{"t":"v","x":"Señor, por intercesión del Corazón Inmaculado de María, infunde en nosotros el espíritu de amor para que seamos hombres que ardamos en caridad y que abrasemos por donde pasemos."},
{"t":"r","x":"Amén."},
{"t":"v","x":"Y para que deseemos eficazmente y procuremos por todos los medios encender a todo el mundo en el fuego del divino amor."},
{"t":"r","x":"Amén."},
{"t":"v","x":"Señor, por intercesión del Corazón Inmaculado de María, infunde en nosotros el espíritu de fortaleza para que nada nos arredre, nos gocemos en las privaciones y abordemos valientemente los trabajos."},
{"t":"r","x":"Amén."},
{"t":"v","x":"Y para que abracemos con alegría los sacrificios, nos complazcamos en las calumnias y nos alegremos en los tormentos."},
{"t":"r","x":"Amén."},
{"t":"v","x":"Señor, por intercesión del Corazón Inmaculado de María, infunde en nosotros el espíritu misionero que animó a Jesús, tu Hijo, para que no pensemos sino en cómo seguirlo e imitarlo en orar, trabajar y sufrir."},
{"t":"r","x":"Amén."},
{"t":"v","x":"Y para que, como Jesús, procuremos siempre y únicamente tu mayor gloria y la salvación de los hombres."},
{"t":"r","x":"Amén."}]},
{"id":"43","num":"43","title":"Profesión de la identidad claretiana","theme":"congregacion","sub":null,"tags":[],"lines":[
{"t":"p","x":"Creemos que el Espíritu Santo"},
{"t":"p","x":"nos ha convocado en la Iglesia por San Antonio María Claret"},
{"t":"p","x":"para que, como Congregación,"},
{"t":"p","x":"nos llamemos y seamos Misioneros Hijos del Inmaculado Corazón de María."},
{"t":"p","x":"Creemos que el Padre nos convoca"},
{"t":"p","x":"a vivir auténtica y significativamente"},
{"t":"p","x":"el misterio y la misión apostólica de su Hijo"},
{"t":"p","x":"en fraternidad evangelizada y evangelizadora."},
{"t":"p","x":"Es él, y no nuestros proyectos,"},
{"t":"p","x":"el que nos hace verdaderos discípulos de Cristo."},
{"t":"p","x":"Este amor que configura nuestra vida fraterna"},
{"t":"p","x":"queremos significarlo, cada vez más, en la Eucaristía."},
{"t":"p","x":"Creemos que María está en el origen de nuestra vocación"},
{"t":"p","x":"y ejerce su maternidad configurando nuestras vidas con la de Cristo, su Hijo."},
{"t":"p","x":"En su Corazón de Madre se forman los apóstoles de la Congregación."},
{"t":"p","x":"Y su presencia en nosotros es impulso evangelizador y amor misericordioso"},
{"t":"p","x":"que transforma y anima a los creyentes."},
{"t":"p","x":"Creemos que el Padre Claret fue elegido y propuesto por Dios como nuestro prototipo"},
{"t":"p","x":"y modelo de misioneros al servicio del Evangelio en la Iglesia universal."},
{"t":"p","x":"Creemos que nuestra común vocación-misión comporta un seguimiento,"},
{"t":"p","x":"en fidelidad perfecta y en disponibilidad absoluta, a Cristo en la Iglesia,"},
{"t":"p","x":"según las exigencias evangélicas vividas por nuestro Fundador y Padre,"},
{"t":"p","x":"y transmitidas por nuestros mayores."},
{"t":"p","x":"Creemos que el Espíritu de Jesús resucitado"},
{"t":"p","x":"nos unge proféticamente para que anunciemos la Buena Nueva a los pobres,"},
{"t":"p","x":"y, urgidos por su misma caridad sacrificada y redentora,"},
{"t":"p","x":"abrasemos por donde pasemos."},
{"t":"p","x":"Creemos que hemos sido llamados"},
{"t":"p","x":"como esforzados colaboradores del Sumo Pontífice y de los Obispos"},
{"t":"p","x":"en el ministerio de la Palabra para la prolongación del Reino de Dios por todo el mundo."},
{"t":"p","x":"Por eso, empleando todos los medios posibles,"},
{"t":"p","x":"queremos atender a lo más urgente, oportuno y eficaz."},
{"t":"p","x":"Creemos que la Congregación es obra de Dios"},
{"t":"p","x":"y que Jesús y María no la abandonarán, suscitando vocaciones"},
{"t":"p","x":"y dando el Espíritu a los llamados,"},
{"t":"p","x":"para que, viviendo en fraternidad la misma consagración y misión,"},
{"t":"p","x":"glorifiquemos al Padre, prolonguemos el testimonio de comunión eclesial"},
{"t":"p","x":"y hagamos más eficaz la acción evangelizadora."},
{"t":"p","x":"Creemos, Señor. Auméntanos la fe."}]},
{"id":"45","num":"45","title":"Caridad apostólica","theme":"consagracion","sub":"Virtudes","tags":[],"lines":[
{"t":"p","x":"¡Oh Dios mío!"},
{"t":"p","x":"Dame caridad apostólica,"},
{"t":"p","x":"de modo que obre en todo con fortaleza y suavemente,"},
{"t":"p","x":"con mansedumbre y caridad."},
{"t":"p","x":"Amén."}]},
{"id":"46","num":"46","title":"Práctica de las virtudes","theme":"consagracion","sub":"Virtudes","tags":[],"lines":[
{"t":"p","x":"Jesús, dame tu gracia para imitarte fielmente"},
{"t":"p","x":"en la práctica de todas las virtudes."},
{"t":"p","x":"Contigo todo lo puedo, sin Ti nada absolutamente."},
{"t":"p","x":"Amén."}]},
{"id":"47","num":"47","title":"Pobreza","theme":"consagracion","sub":"Pobreza","tags":[],"lines":[
{"t":"p","x":"Salvador nuestro,"},
{"t":"p","x":"que te hiciste pobre,"},
{"t":"p","x":"que quisiste nacer pobre,"},
{"t":"p","x":"vivir pobremente y morir en la mayor pobreza."},
{"t":"p","x":"Haz que tus misioneros conozcamos el valor de la pobreza,"},
{"t":"p","x":"que la amemos y la practiquemos como Tú nos enseñas,"},
{"t":"p","x":"con obras y palabras;"},
{"t":"p","x":"que, a ejemplo de los Apóstoles,"},
{"t":"p","x":"lo dejemos todo para seguirte en el anuncio del Evangelio."},
{"t":"p","x":"Amén."}]},
{"id":"48","num":"48","title":"Mansedumbre","theme":"consagracion","sub":"Virtudes","tags":[],"lines":[
{"t":"p","x":"Oh Dios mío,"},
{"t":"p","x":"dame un celo discreto y prudente"},
{"t":"p","x":"a fin de que obre en todas las cosas"},
{"t":"p","x":"con fortaleza y suavemente,"},
{"t":"p","x":"con mansedumbre y buen modo."},
{"t":"p","x":"Ayúdame a comportarme en todo con una santa prudencia,"},
{"t":"p","x":"cultivada por el estudio,"},
{"t":"p","x":"fortificada con la edad,"},
{"t":"p","x":"aclarada por el diálogo,"},
{"t":"p","x":"y consumada con la experiencia de los acontecimientos."},
{"t":"p","x":"Amén."}]},
{"id":"49","num":"49","title":"Mortificación","theme":"consagracion","sub":"Virtudes","tags":[],"lines":[
{"t":"p","x":"¡Oh Señor!,"},
{"t":"p","x":"conozco que las penas, dolores y trabajos"},
{"t":"p","x":"son la divisa del apóstol."},
{"t":"p","x":"Con tu gracia los abrazo."},
{"t":"p","x":"Ayúdame Tú, Señor,"},
{"t":"p","x":"a beber el cáliz de penas interiores"},
{"t":"p","x":"y a recibir ese bautismo de penas exteriores."},
{"t":"p","x":"Haz que no me gloríe en otra cosa"},
{"t":"p","x":"que en la Cruz en la que Tú estás clavado por mí."},
{"t":"p","x":"Amén."}]},
{"id":"50","num":"50","title":"Nuestra consagración","theme":"consagracion","sub":"Consagración","tags":["renovación de votos","profesión"],"lines":[
{"t":"p","x":"Dios y Padre mío,"},
{"t":"p","x":"respondiendo a tu llamada"},
{"t":"p","x":"quiero procurar con el mayor empeño"},
{"t":"p","x":"que siempre se cumpla tu voluntad."},
{"t":"p","x":"Deseo con todo el corazón dedicarme plenamente a Ti,"},
{"t":"p","x":"siguiendo a Jesús, como los Apóstoles,"},
{"t":"p","x":"para que todos los hombres tengan vida en abundancia."},
{"t":"p","x":"Impulsado por el Espíritu Santo"},
{"t":"p","x":"renuevo mi entrega a Ti, Padre,"},
{"t":"p","x":"para que me configures a imagen y semejanza de tu Hijo Jesús."},
{"t":"p","x":"Confiado en la maternal asistencia del Inmaculado Corazón de María,"},
{"t":"p","x":"te prometo vivir en esta comunidad de vida apostólica"},
{"t":"p","x":"casto, pobre, obediente,"},
{"t":"p","x":"observando las Constituciones de nuestra Congregación"},
{"t":"p","x":"con todo el cuidado posible."},
{"t":"p","x":"Úngeme, Padre Santo, con tu Espíritu de santidad"},
{"t":"p","x":"para que en el servicio de la Palabra"},
{"t":"p","x":"sea fiel al carisma de San Antonio María Claret"},
{"t":"p","x":"y alcance la perfección en el mandamiento del amor."},
{"t":"p","x":"Amén."}]},
{"id":"51","num":"51","title":"Configuración con Cristo","theme":"consagracion","sub":"Consagración","tags":[],"lines":[
{"t":"p","x":"Gracias, Padre, porque nos has ungido por tu Espíritu"},
{"t":"p","x":"y nos has hecho partícipes de la plenitud de Cristo, tu Hijo."},
{"t":"p","x":"Bendito seas por habernos llamado a seguirlo"},
{"t":"p","x":"y a colaborar con Él en la obra que Tú le encomendaste."},
{"t":"p","x":"Te pedimos que, penetrados de su Espíritu,"},
{"t":"p","x":"no seamos nosotros los que vivamos,"},
{"t":"p","x":"sino que sea Cristo quien realmente viva en nosotros,"},
{"t":"p","x":"a fin de ser válidos instrumentos para anunciar el Reino de los cielos."},
{"t":"p","x":"Que intentemos conseguir nuestra configuración con Él"},
{"t":"p","x":"en nuestra comunidad misionera,"},
{"t":"p","x":"según nuestro carisma propio en la Iglesia."},
{"t":"p","x":"Él, que vive y reina por los siglos de los siglos."},
{"t":"p","x":"Amén."}]},
{"id":"53","num":"53","title":"El don de la castidad","theme":"consagracion","sub":"Castidad","tags":[],"lines":[
{"t":"p","x":"Te bendecimos, Dios nuestro, por habernos concedido"},
{"t":"p","x":"el don de la castidad por el Reino de los cielos,"},
{"t":"p","x":"por el que podemos consagrarnos de todo corazón a las cosas del Padre,"},
{"t":"p","x":"a imitación de tu Hijo Jesucristo"},
{"t":"p","x":"y según el ejemplo de la Virgen María."},
{"t":"p","x":"Pedimos, Señor, tu ayuda con humildad"},
{"t":"p","x":"para dominar las inclinaciones de nuestra naturaleza,"},
{"t":"p","x":"recibir con gozo el don de la castidad"},
{"t":"p","x":"y cultivarlo con toda diligencia."},
{"t":"p","x":"Por Jesucristo, nuestro Señor."},
{"t":"p","x":"Amén."}]},
{"id":"54","num":"54","title":"Castidad","theme":"consagracion","sub":"Castidad","tags":[],"lines":[
{"t":"p","x":"Bendito seas, Señor,"},
{"t":"p","x":"porque por el don de la castidad por el Reino de los cielos,"},
{"t":"p","x":"se manifiesta el poder de tu gloria"},
{"t":"p","x":"en la fragilidad de nuestra naturaleza,"},
{"t":"p","x":"a fin de alentar en los hombres la esperanza de la vida futura."},
{"t":"p","x":"Haz que la castidad que profesamos"},
{"t":"p","x":"favorezca una nueva comunión fraterna en Cristo"},
{"t":"p","x":"y construya una comunidad que no se funda ni en la carne ni en la sangre,"},
{"t":"p","x":"sino en tu voluntad."},
{"t":"p","x":"Y que, como signo de amor perfecto,"},
{"t":"p","x":"se convierta en una especial fuente de fecundidad espiritual para el mundo"},
{"t":"p","x":"y nos inflame en amor a Ti y a todos los hombres."},
{"t":"p","x":"Por Jesucristo, nuestro Señor."},
{"t":"p","x":"Amén."}]},
{"id":"55","num":"55","title":"Tú, siendo rico","theme":"consagracion","sub":"Pobreza","tags":[],"lines":[
{"t":"p","x":"Tú, siendo rico,"},
{"t":"p","x":"te has hecho pobre por nosotros"},
{"t":"p","x":"a fin de que nosotros nos enriqueciéramos."},
{"t":"p","x":"Dedicado a anunciar la Buena Nueva del Reino,"},
{"t":"p","x":"no tenías dónde reclinar la cabeza."},
{"t":"p","x":"Danos compartir tu pobreza,"},
{"t":"p","x":"para recordar a los hombres los bienes del mundo futuro,"},
{"t":"p","x":"vivir como María, la primera entre los pobres del Señor,"},
{"t":"p","x":"y a semejanza de los Apóstoles que, abandonándolo todo, te siguieron."},
{"t":"p","x":"Tú que vives y reinas por los siglos de los siglos."},
{"t":"p","x":"Amén."}]},
{"id":"56","num":"56","title":"Buscar ante todo el Reino de Dios","theme":"consagracion","sub":"Pobreza","tags":[],"lines":[
{"t":"p","x":"Te pedimos, Señor,"},
{"t":"p","x":"que poniendo toda nuestra confianza en Ti,"},
{"t":"p","x":"y nunca en el poder y las riquezas,"},
{"t":"p","x":"busquemos ante todo el Reino que pertenece a los pobres."},
{"t":"p","x":"Amén."}]},
{"id":"57","num":"57","title":"Comunión de bienes","theme":"consagracion","sub":"Pobreza","tags":[],"lines":[
{"t":"p","x":"Concédenos, Señor,"},
{"t":"p","x":"que con nuestra pobreza voluntaria"},
{"t":"p","x":"construyamos la comunidad fraterna"},
{"t":"p","x":"en la unidad de corazón y espíritu"},
{"t":"p","x":"y la expresemos en la comunión de bienes,"},
{"t":"p","x":"espirituales y materiales,"},
{"t":"p","x":"con los pobres y en su servicio."},
{"t":"p","x":"Amén."}]},
{"id":"58","num":"58","title":"Pobreza","theme":"consagracion","sub":"Pobreza","tags":[],"lines":[
{"t":"p","x":"Te damos gracias, Padre santo,"},
{"t":"p","x":"porque has querido manifestarnos el valor de la pobreza"},
{"t":"p","x":"y la bienaventuranza de los que no ponen su interés en las riquezas."},
{"t":"p","x":"Concédenos que toda nuestra vida y actividad"},
{"t":"p","x":"estén informadas por el espíritu de pobreza."},
{"t":"p","x":"Que seamos pobres de hecho y de espíritu"},
{"t":"p","x":"y nos sintamos obligados a la ley común del trabajo,"},
{"t":"p","x":"compartiendo la condición de los pobres."},
{"t":"p","x":"Que tengamos nuestros bienes a disposición de los demás,"},
{"t":"p","x":"y nos alegremos cuando experimentemos algunos efectos de la pobreza,"},
{"t":"p","x":"no dudando de tu providencia."},
{"t":"p","x":"Por Jesucristo, nuestro Señor."},
{"t":"p","x":"Amén."}]},
{"id":"59","num":"59","title":"Para hacer tu voluntad","theme":"consagracion","sub":"Obediencia","tags":[],"lines":[
{"t":"p","x":"Para hacer tu voluntad, Padre, nos enviaste a tu Hijo Jesús."},
{"t":"p","x":"A ejemplo de la Santísima Virgen,"},
{"t":"p","x":"que se consagró totalmente como esclava del Señor"},
{"t":"p","x":"a la obra del Hijo,"},
{"t":"p","x":"te ofrecemos, Señor,"},
{"t":"p","x":"la libre facultad de ordenar nuestra vida"},
{"t":"p","x":"para configurarnos con Jesucristo,"},
{"t":"p","x":"que se hizo obediente hasta la muerte de cruz,"},
{"t":"p","x":"y unirnos en todo a tu voluntad salvífica."},
{"t":"p","x":"Por Jesucristo, nuestro Señor."},
{"t":"p","x":"Amén."}]},
{"id":"60","num":"60","title":"Obedientes en la misión","theme":"consagracion","sub":"Obediencia","tags":[],"lines":[
{"t":"p","x":"Compartiendo la misma vocación,"},
{"t":"p","x":"queremos buscar juntos, Señor, tu voluntad"},
{"t":"p","x":"para llevar a cabo nuestra misión en la Iglesia."},
{"t":"p","x":"Ilumina a quienes expresan la unidad de amor"},
{"t":"p","x":"y de misión en la comunidad"},
{"t":"p","x":"para que promuevan la cooperación de todos"},
{"t":"p","x":"en bien de la Iglesia y de la Congregación,"},
{"t":"p","x":"y haz que todos, impulsados por el amor,"},
{"t":"p","x":"sepamos obedecer pronta y perfectamente."},
{"t":"p","x":"Por Jesucristo, nuestro Señor."},
{"t":"p","x":"Amén."}]},
{"id":"61","num":"61","title":"Obediencia","theme":"consagracion","sub":"Obediencia","tags":[],"lines":[
{"t":"p","x":"Te damos gracias, Padre,"},
{"t":"p","x":"porque nos concedes la libre facultad"},
{"t":"p","x":"de disponer de nuestra vida,"},
{"t":"p","x":"y nos mueves a ofrecértela por la fuerza de tu Espíritu."},
{"t":"p","x":"Gracias por habernos llamado a configurarnos"},
{"t":"p","x":"con tu Hijo Jesucristo"},
{"t":"p","x":"en su obediencia hasta la muerte en cruz."},
{"t":"p","x":"Bendito seas por haber querido que"},
{"t":"p","x":"en Él participemos de tu voluntad salvadora."},
{"t":"p","x":"Amén."}]},
{"id":"62","num":"62","title":"Obediencia en comunión","theme":"consagracion","sub":"Obediencia","tags":[],"lines":[
{"t":"p","x":"Concédenos, Señor,"},
{"t":"p","x":"buscar, conocer y hacer juntos tu voluntad"},
{"t":"p","x":"a fin de poder realizar la misión común"},
{"t":"p","x":"que tenemos en la Iglesia."},
{"t":"p","x":"Concédenos que en la búsqueda y el cumplimiento de tu voluntad,"},
{"t":"p","x":"nos obliguemos a ofrecer nuestra ayuda a los hermanos"},
{"t":"p","x":"con la oración, el consejo y el diálogo fraterno."},
{"t":"p","x":"Amén."}]},
{"id":"63","num":"63","title":"Por los superiores","theme":"consagracion","sub":"Obediencia","tags":[],"lines":[
{"t":"p","x":"Fortalece, Señor, a nuestros Superiores"},
{"t":"p","x":"para que busquen ante todo tu voluntad,"},
{"t":"p","x":"ejerzan la autoridad según las Constituciones"},
{"t":"p","x":"y en espíritu de servicio,"},
{"t":"p","x":"dando su vida por los hermanos."},
{"t":"p","x":"Y concédenos a todos obedecerte"},
{"t":"p","x":"impulsados por el amor,"},
{"t":"p","x":"pronta y perfectamente,"},
{"t":"p","x":"sometiéndonos a los hombres por Ti."},
{"t":"p","x":"Por Jesucristo, nuestro Señor."},
{"t":"p","x":"Amén."}]},
{"id":"64","num":"64","title":"Disponibilidad","theme":"consagracion","sub":"Obediencia","tags":[],"lines":[
{"t":"p","x":"Danos, Señor, el don de la disponibilidad"},
{"t":"p","x":"para ser enviados a cualquier parte del mundo,"},
{"t":"p","x":"para poner todas nuestras energías al servicio del ministerio"},
{"t":"p","x":"que nos sea encomendado por la Congregación."},
{"t":"p","x":"Por Jesucristo, nuestro Señor."},
{"t":"p","x":"Amén."}]},
{"id":"65","num":"65","title":"Imitar la oración de Jesús","theme":"consagracion","sub":"Oración","tags":[],"lines":[
{"t":"p","x":"Dios omnipotente y eterno"},
{"t":"p","x":"que has tenido a bien asociarnos"},
{"t":"p","x":"a la obra misionera de Cristo:"},
{"t":"p","x":"abre nuestro corazón"},
{"t":"p","x":"para que nos convirtamos al Evangelio,"},
{"t":"p","x":"y danos constancia para que le imitemos"},
{"t":"p","x":"en su oración asidua."},
{"t":"p","x":"Por el mismo Jesucristo nuestro Señor."},
{"t":"p","x":"Amén."}]},
{"id":"66","num":"66","title":"Progreso en la caridad","theme":"consagracion","sub":"Virtudes","tags":[],"lines":[
{"t":"p","x":"Padre misericordioso,"},
{"t":"p","x":"concédenos que la caridad de Cristo nos apremie"},
{"t":"p","x":"con el mismo amor con que Tú nos amas,"},
{"t":"p","x":"y con fortaleza de espíritu"},
{"t":"p","x":"estemos dispuestos a morir cada día por los hermanos."},
{"t":"p","x":"Haz que, como extranjeros y peregrinos,"},
{"t":"p","x":"nos abstengamos de los deseos de la carne,"},
{"t":"p","x":"guardemos con diligente cuidado"},
{"t":"p","x":"nuestros sentidos,"},
{"t":"p","x":"y que nos alegremos en toda adversidad."},
{"t":"p","x":"Por Jesucristo, nuestro Señor."},
{"t":"p","x":"Amén."}]},
{"id":"67","num":"67","title":"La caridad de Cristo nos urge","theme":"consagracion","sub":"Virtudes","tags":[],"lines":[
{"t":"p","x":"Padre santo,"},
{"t":"p","x":"Jesucristo, urgido por un ardiente amor a Ti y a los hombres,"},
{"t":"p","x":"se entregó a los trabajos, a la pasión, e incluso a la muerte."},
{"t":"p","x":"Concédenos la caridad apostólica y el gozo del Espíritu"},
{"t":"p","x":"para que consigamos"},
{"t":"p","x":"que todos los hombres te conozcan, te amen y te sirvan,"},
{"t":"p","x":"y alcancen la bienaventuranza de tu Reino."},
{"t":"p","x":"Amén."}]},
{"id":"68","num":"68","title":"Tú, Padre","theme":"comunidad","sub":null,"tags":[],"lines":[
{"t":"p","x":"Tú, Padre,"},
{"t":"p","x":"has derramado en nuestros corazones"},
{"t":"p","x":"el amor a ti y a los hermanos por el Espíritu Santo,"},
{"t":"p","x":"que nos configura con Cristo y edifica nuestra comunión."},
{"t":"p","x":"Te pedimos que acojamos este don tuyo"},
{"t":"p","x":"para que toda nuestra vida misionera"},
{"t":"p","x":"esté regida e informada por este amor"},
{"t":"p","x":"y alcancemos en la comunidad misionera"},
{"t":"p","x":"la plenitud personal a la que Tú nos llamas."},
{"t":"p","x":"Por Jesucristo, nuestro Señor."},
{"t":"p","x":"Amén."}]},
{"id":"69","num":"69","title":"Oración de la comunidad","theme":"comunidad","sub":null,"tags":[],"lines":[
{"t":"p","x":"Te damos gracias, Padre Santo,"},
{"t":"p","x":"por habernos reunido en esta comunidad"},
{"t":"p","x":"desde la que quieres que anunciemos tu Reino"},
{"t":"p","x":"con una vida perfectamente consagrada"},
{"t":"p","x":"y con una decidida entrega al servicio del Evangelio."},
{"t":"p","x":"Queremos proclamar con todo nuestro ser y nuestro obrar,"},
{"t":"p","x":"como verdaderos Hijos del Corazón de María,"},
{"t":"p","x":"las maravillas de tu amor entre los hombres."},
{"t":"p","x":"Renovamos nuestro propósito de ser mejores cada día,"},
{"t":"p","x":"de ayudarnos mutuamente en el seguimiento de tu Hijo,"},
{"t":"p","x":"de secundar las inspiraciones de tu Santo Espíritu,"},
{"t":"p","x":"y de colaborar en el cumplimiento de la Misión"},
{"t":"p","x":"que nos has confiado en la Iglesia."},
{"t":"p","x":"No permitas, Señor, que esta buena voluntad"},
{"t":"p","x":"se vaya amortiguando inadvertidamente"},
{"t":"p","x":"por el egoísmo, la rutina o la inconstancia."},
{"t":"p","x":"Reaviva la fe y la esperanza de esta comunidad apostólica"},
{"t":"p","x":"a la hora de discernir las inevitables diferencias,"},
{"t":"p","x":"y ensancha nuestros corazones para el necesario perdón."},
{"t":"p","x":"Desde la conciencia de nuestra debilidad"},
{"t":"p","x":"te pedimos que nos mantengas atentos a tu gracia:"},
{"t":"p","x":"que la asidua meditación de tu Palabra nos recree,"},
{"t":"p","x":"y que la convivencia fraterna nos estimule"},
{"t":"p","x":"a dar aquel testimonio de amor que el mundo necesita para creer,"},
{"t":"p","x":"y que las necesidades y urgencias de los más pobres"},
{"t":"p","x":"nos estimulen a salir de nosotros mismos"},
{"t":"p","x":"y nos obliguen a trabajar por ellos sin descanso."},
{"t":"p","x":"Nos encomendamos a María, la Madre de Jesús,"},
{"t":"p","x":"ejemplo de vida consagrada,"},
{"t":"p","x":"para que nos forme en su Corazón"},
{"t":"p","x":"y nos haga seguir el camino de perfección y de servicio apostólico"},
{"t":"p","x":"que San Antonio María Claret, con su vida y doctrina,"},
{"t":"p","x":"nos trazó en la Iglesia y en el mundo."},
{"t":"p","x":"Sella, Padre, con tu fidelidad eterna"},
{"t":"p","x":"lo que ahora es nuestra más sincera aspiración."},
{"t":"p","x":"Por Jesucristo nuestro Señor."}]},
{"id":"70","num":"70","title":"Caridad fraterna","theme":"comunidad","sub":null,"tags":[],"lines":[
{"t":"p","x":"Te suplicamos humildemente, Señor Dios nuestro,"},
{"t":"p","x":"que unas en un mismo corazón a los que compartimos el espíritu"},
{"t":"p","x":"de tu siervo Antonio María,"},
{"t":"p","x":"para que, concordes en el mutuo amor,"},
{"t":"p","x":"podamos ser testigos de tu caridad"},
{"t":"p","x":"entre los hombres."},
{"t":"p","x":"Por Jesucristo nuestro Señor."},
{"t":"p","x":"Amén."}]},
{"id":"71","num":"71","title":"Oración por mi comunidad","theme":"comunidad","sub":null,"tags":[],"lines":[
{"t":"p","x":"Padre, hoy quiero pedirte por mis hermanos de comunidad."},
{"t":"p","x":"Tú los conoces personalmente:"},
{"t":"p","x":"conoces sus nombres y sus apellidos,"},
{"t":"p","x":"sus virtudes y sus defectos,"},
{"t":"p","x":"sus alegrías y sus penas,"},
{"t":"p","x":"su fortaleza y su debilidad, sabes toda su historia;"},
{"t":"p","x":"los aceptas como son,"},
{"t":"p","x":"y los vivificas con tu Espíritu."},
{"t":"p","x":"Tú, Señor, los amas"},
{"t":"p","x":"no porque sean buenos"},
{"t":"p","x":"sino porque son hijos tuyos."},
{"t":"p","x":"Enséñame a quererlos de verdad, a imitación de Jesucristo,"},
{"t":"p","x":"no por sus palabras o por sus obras, sino por ellos mismos,"},
{"t":"p","x":"descubriendo en cada uno,"},
{"t":"p","x":"especialmente en los más débiles,"},
{"t":"p","x":"el misterio de tu amor infinito."},
{"t":"p","x":"Te doy gracias, Padre,"},
{"t":"p","x":"porque me has dado hermanos."},
{"t":"p","x":"Todos son un regalo para mí, un verdadero sacramento,"},
{"t":"p","x":"signo sensible y eficaz de la presencia de tu Hijo."},
{"t":"p","x":"Dame la mirada de Jesús para contemplarlos,"},
{"t":"p","x":"y dame su corazón para amarlos hasta el extremo,"},
{"t":"p","x":"porque también yo quiero ser para cada uno de ellos"},
{"t":"p","x":"sacramento vivo de la presencia de Jesús."},
{"t":"p","x":"Amén."}]},
{"id":"72","num":"72","title":"Oración apostólica","theme":"mision","sub":null,"tags":[],"lines":[
{"t":"p","x":"¡Dios mío y Padre mío!"},
{"t":"p","x":"Que te conozca y te haga conocer;"},
{"t":"p","x":"que te ame y te haga amar;"},
{"t":"p","x":"que te sirva y te haga servir;"},
{"t":"p","x":"que te alabe y te haga alabar de todas las criaturas."},
{"t":"p","x":"Dame, Padre mío, que todos los pecadores se conviertan,"},
{"t":"p","x":"que todos los justos perseveren en gracia"},
{"t":"p","x":"y todos consigamos la eterna gloria."},
{"t":"p","x":"Amén."}]},
{"id":"73","num":"73","title":"Conocer a Dios para servirle","theme":"mision","sub":null,"tags":[],"lines":[
{"t":"p","x":"Concédeme, Señor,"},
{"t":"p","x":"que todos conozcan tu bondad y cercanía"},
{"t":"p","x":"para que te amen y sirvan con toda fidelidad,"},
{"t":"p","x":"porque eres bueno y tu misericordia es infinita."},
{"t":"p","x":"Amén."}]},
{"id":"74","num":"74","title":"Instrumento del Reino","theme":"mision","sub":null,"tags":[],"lines":[
{"t":"p","x":"Aquí estoy, Señor,"},
{"t":"p","x":"si quieres hacer de mí un instrumento para el anuncio de tu Reino."},
{"t":"p","x":"Haz, Señor, que la comida sea para tener fuerza y servirte mejor;"},
{"t":"p","x":"que use de las cosas de este mundo según las necesite,"},
{"t":"p","x":"que estudie para conocerte y amarte y para ayudar a mis hermanos;"},
{"t":"p","x":"que mi descanso sea para reparar las fuerzas gastadas y servirte mejor."},
{"t":"p","x":"Amén."}]},
{"id":"75","num":"75","title":"Por el fruto apostólico de los Misioneros","theme":"mision","sub":null,"tags":[],"lines":[
{"t":"p","x":"Padre de bondad,"},
{"t":"p","x":"que sin mérito nuestro nos has elegido y nos envías como enviaste a tu Hijo Jesús."},
{"t":"p","x":"Comunícanos tu Espíritu,"},
{"t":"p","x":"haznos ministros idóneos del Evangelio,"},
{"t":"p","x":"y concédenos la fuerza necesaria"},
{"t":"p","x":"para que ejerzamos eficazmente el ministerio de la salvación de los hombres."},
{"t":"p","x":"Da, Señor, incremento a nuestros trabajos,"},
{"t":"p","x":"y haz que tu Palabra, Cristo, hable por nosotros."},
{"t":"p","x":"Bendícenos y ayúdanos"},
{"t":"p","x":"para que todos los hombres acepten el Evangelio"},
{"t":"p","x":"y te amen cada día más."},
{"t":"p","x":"No permitas, Señor, que te ofendamos;"},
{"t":"p","x":"presérvanos de todos los peligros y fortalécenos con tu gracia."},
{"t":"p","x":"Amén."}]},
{"id":"76","num":"76","title":"Misioneros","theme":"mision","sub":null,"tags":[],"lines":[
{"t":"p","x":"Señor,"},
{"t":"p","x":"que nos llamas como a los Apóstoles,"},
{"t":"p","x":"haz que nos esforcemos con todos nuestros medios y recursos"},
{"t":"p","x":"por conseguir que seas amado, conocido y servido por todos."},
{"t":"p","x":"Danos un corazón abierto"},
{"t":"p","x":"para amar a todos los hombres sin excepción,"},
{"t":"p","x":"procurándoles la bienaventuranza del Reino,"},
{"t":"p","x":"que ya se ha iniciado en la tierra."},
{"t":"p","x":"Que de todos los dones que creemos poseer,"},
{"t":"p","x":"te demos únicamente a Ti la gloria,"},
{"t":"p","x":"procurando hacerlos fructificar copiosamente,"},
{"t":"p","x":"y recordemos nuestras propias limitaciones y defectos,"},
{"t":"p","x":"reconociendo así nuestra total dependencia de Ti."},
{"t":"p","x":"Que expresemos este convencimiento"},
{"t":"p","x":"en nuestra forma de obrar y en nuestras relaciones con los demás,"},
{"t":"p","x":"estando dispuestos a pedir perdón por nuestras faltas y equivocaciones."},
{"t":"p","x":"Que busquemos prestar a nuestros hermanos"},
{"t":"p","x":"los servicios de nuestro amor,"},
{"t":"p","x":"de modo que cada uno de nosotros esté en medio de ellos como quien sirve."},
{"t":"p","x":"Amén."}]},
{"id":"77","num":"77","title":"Misión Claretiana","theme":"mision","sub":null,"tags":[],"lines":[
{"t":"p","x":"Padre santo,"},
{"t":"p","x":"Tú llamaste a Antonio María Claret a seguir a tu Hijo,"},
{"t":"p","x":"y él, urgido por su amor,"},
{"t":"p","x":"entregó totalmente su vida a la lucha por su Causa: el Reino."},
{"t":"p","x":"Despierta en nosotros su espíritu evangelizador"},
{"t":"p","x":"para captar lo más urgente, oportuno y eficaz"},
{"t":"p","x":"y realizar la misión de propagar la fe, dóciles al Espíritu,"},
{"t":"p","x":"y obedientes a tu voluntad."},
{"t":"p","x":"Animados, como Claret, por la fuerza de tu Espíritu,"},
{"t":"p","x":"también nosotros queremos optar por la Causa del Reino"},
{"t":"p","x":"y aceptar los riesgos de la denuncia y el compromiso profético"},
{"t":"p","x":"que comporta nuestra misión evangelizadora."},
{"t":"p","x":"Queremos solidarizarnos y compartir las angustias,"},
{"t":"p","x":"las privaciones y las esperanzas de los hombres"},
{"t":"p","x":"a los que somos enviados."},
{"t":"p","x":"Y, a la vez que confesamos que tu Hijo está vivo entre los hombres,"},
{"t":"p","x":"queremos trabajar por acabar con la incredulidad, el odio, la injusticia,"},
{"t":"p","x":"la mentira, la opresión, el dolor, la soledad, el hambre, la ignorancia"},
{"t":"p","x":"y tantas otras urgencias de amor que son urgencias del Reino."},
{"t":"p","x":"Te lo pedimos por tu Hijo Jesucristo, que vive y reina por los siglos de los siglos."},
{"t":"p","x":"Amén."}]},
{"id":"78","num":"78","title":"Oración misionera","theme":"mision","sub":null,"tags":[],"lines":[
{"t":"p","x":"Oh Padre,"},
{"t":"p","x":"que has derramado los dones de tu Espíritu"},
{"t":"p","x":"sobre la bienaventurada Virgen María,"},
{"t":"p","x":"orante con los Apóstoles en el Cenáculo,"},
{"t":"p","x":"haz que perseveremos unánimes en la oración"},
{"t":"p","x":"con María, nuestra Madre, para llevar al mundo,"},
{"t":"p","x":"con la fuerza del Espíritu,"},
{"t":"p","x":"la Buena Nueva de la salvación."},
{"t":"p","x":"Por Jesucristo nuestro Señor."},
{"t":"p","x":"Amén."}]},
{"id":"79","num":"79","title":"Por la Iglesia","theme":"mision","sub":null,"tags":[],"lines":[
{"t":"p","x":"Señor Jesús,"},
{"t":"p","x":"que por amor a los hombres"},
{"t":"p","x":"oraste por la fe de tus discípulos,"},
{"t":"p","x":"intercediste por los pecadores,"},
{"t":"p","x":"y te compadeciste de toda miseria humana:"},
{"t":"p","x":"acoge las súplicas que elevamos a ti en favor de la Iglesia,"},
{"t":"p","x":"atiende nuestras oraciones por la vida del mundo,"},
{"t":"p","x":"y admítenos a todos en el gozo del Reino eterno,"},
{"t":"p","x":"donde vives y reinas por los siglos de los siglos."},
{"t":"p","x":"Amén."}]},
{"id":"80","num":"80","title":"El Señor presente en la Misión","theme":"mision","sub":null,"tags":[],"lines":[
{"t":"p","x":"Señor Jesús,"},
{"t":"p","x":"tu mandato de misión nos dispersó un día por el mundo entero."},
{"t":"p","x":"Tu Palabra de comunión nos reúne hoy en este cruce de todos los caminos,"},
{"t":"p","x":"donde encontrarnos es encontrarte,"},
{"t":"p","x":"donde amarnos es dar testimonio de Ti,"},
{"t":"p","x":"donde encender esperanzas es anunciar tu venida."},
{"t":"p","x":"Como los Doce,"},
{"t":"p","x":"volvemos a ti desde los senderos de nuestra misión,"},
