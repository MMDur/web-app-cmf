${V} Si Dios nos amó de esta manera,
también nosotros debemos amarnos
unos a otros. ${R}

${V} A Dios nadie lo ha visto nunca.
Si nos amamos unos a otros,
Dios permanece en nosotros
y su amor ha llegado en nosotros a su plenitud. ${R}</div>
<h3 class="rub">Segunda lectura <span class="ref">Rom 12, 3-13</span></h3>
<p class="lema">Cada miembro está al servicio de los otros miembros</p>
<p class="pr">Lectura de la carta del apóstol san Pablo a los Romanos.</p>
<p class="pr">Hermanos:<br>Por la gracia de Dios que me ha sido dada os digo a todos y a cada uno de vosotros: no os estiméis en más de lo que conviene, sino estimaos moderadamente, según la medida de la fe que Dios otorgó a cada cual. Pues, así como en un solo cuerpo tenemos muchos miembros, y no todos los miembros cumplen la misma función, así nosotros, siendo muchos, somos un solo cuerpo en Cristo, pero cada cual existe en relación con los otros miembros.</p>
<p class="pr">Teniendo dones diferentes, según la gracia que se nos ha dado, deben ejercerse así: la profecía, de acuerdo con la regla de la fe; el servicio, dedicándose a servir; el que enseña, aplicándose a la enseñanza; el que exhorta, ocupándose de la exhortación; el que se dedica a distribuir los bienes, hágalo con generosidad; el que preside, con solicitud; el que hace obras de misericordia, con gusto.</p>
<p class="pr">Que vuestro amor no sea fingido; aborreciendo lo malo, apegaos a lo bueno. Amaos cordialmente unos a otros; que cada cual estime a los otros más que a sí mismo; en la actividad, no seáis negligentes; en el espíritu, manteneos fervorosos, sirviendo constantemente al Señor.</p>
<p class="pr">Que la esperanza os tenga alegres; manteneos firmes en la tribulación, sed asiduos en la oración; compartid las necesidades de los santos; practicad la hospitalidad.</p>
<p class="fin">Palabra de Dios.</p>
<div class="obien"><span>O bien:</span><span class="ref">1Jn 4, 7-16</span></div>
<p class="lema">Si nos amamos unos a otros, Dios permanece en nosotros</p>
<p class="pr">Lectura de la primera carta del apóstol san Juan.</p>
<p class="pr">Queridos hermanos:<br>Amémonos unos a otros, ya que el amor es de Dios, y todo el que ama ha nacido de Dios y conoce a Dios. Quien no ama no ha conocido a Dios, porque Dios es amor.</p>
<p class="pr">En esto se manifestó el amor que Dios nos tiene: en que Dios envió al mundo a su Unigénito, para que vivamos por medio de él. En esto consiste el amor: no en que nosotros hayamos amado a Dios, sino en que él nos amó y nos envió a su Hijo, como víctima de propiciación por nuestros pecados.</p>
<p class="pr">Queridos hermanos, si Dios nos amó de esta manera, también nosotros debemos amarnos unos a otros. A Dios nadie lo ha visto nunca. Si nos amamos unos a otros, Dios permanece en nosotros y su amor ha llegado en nosotros a su plenitud.</p>
<p class="pr">En esto conocemos que permanecemos en él, y él en nosotros: en que nos ha dado de su Espíritu. Y nosotros hemos visto y damos testimonio de que el Padre envió a su Hijo para ser Salvador del mundo.</p>
<p class="pr">Quien confiese que Jesús es el Hijo de Dios, Dios permanece en él, y él en Dios. Y nosotros hemos conocido el amor que Dios nos tiene y hemos creído en él. Dios es amor, y quien permanece en el amor permanece en Dios y Dios en él.</p>
<p class="fin">Palabra de Dios.</p>
<h3 class="rub">Aleluya <span class="ref">Sal 132, 1</span></h3>
<div class="pl">${R} Aleluya, aleluya, aleluya.

${V} Ved, qué dulzura, qué delicia,
convivir los hermanos unidos. ${R}</div>
<h3 class="rub">Evangelio <span class="ref">Mt 18, 15-22</span></h3>
<p class="lema">Donde dos o tres están reunidos en mi nombre, allí estoy en medio de ellos</p>
<p class="pr">Lectura del santo Evangelio según san Mateo.</p>
<p class="pr">En aquel tiempo, dijo Jesús a sus discípulos:</p>
<p class="pr">«Si tu hermano peca contra ti, repréndelo estando los dos a solas. Si te hace caso, has salvado a tu hermano. Si no te hace caso, llama a otro o a otros dos, para que todo el asunto quede confirmado por boca de dos o tres testigos. Si no les hace caso, díselo a la comunidad, y si no hace caso ni siquiera a la comunidad, considéralo como un pagano o un publicano.</p>
<p class="pr">En verdad os digo que todo lo que atéis en la tierra quedará atado en los cielos, y todo lo que desatéis en la tierra quedará desatado en los cielos. Os digo, además, que si dos de vosotros se ponen de acuerdo en la tierra para pedir algo, se lo dará mi Padre que está en los cielos. Porque donde dos o tres están reunidos en mi nombre, allí estoy en medio de ellos».</p>
<p class="pr">Acercándose Pedro a Jesús le preguntó:</p>
<p class="pr">«Señor, si mi hermano me ofende, ¿cuántas veces tengo que perdonarlo? ¿Hasta siete veces?».</p>
<p class="pr">Jesús le contesta:</p>
<p class="pr">«No te digo hasta siete veces, sino hasta setenta veces siete».</p>
<p class="fin">Palabra del Señor.</p>
<div class="obien"><span>O bien:</span><span class="ref">Jn 13, 34</span></div>
<div class="pl">${R} Aleluya, aleluya, aleluya.

${V} Os doy un mandamiento nuevo, dice el Señor,
que os améis unos a otros como yo os he amado. ${R}</div>
<h3 class="rub">&nbsp;<span class="ref">Jn 15, 9-17</span></h3>
<p class="lema">Este es mi mandamiento: que os améis unos a otros como yo os he amado</p>
<p class="pr">Lectura del santo Evangelio según san Juan.</p>
<p class="pr">En aquel tiempo, dijo Jesús a sus discípulos:</p>
<p class="pr">«Como el Padre me ha amado, así os he amado yo; permaneced en mi amor. Si guardáis mis mandamientos, permaneceréis en mi amor; lo mismo que yo he guardado los mandamientos de mi Padre y permanezco en su amor. Os he hablado de esto para que mi alegría esté en vosotros, y vuestra alegría llegue a plenitud.</p>
<p class="pr">Este es mi mandamiento: que os améis unos a otros como yo os he amado. Nadie tiene amor más grande que el que da la vida por sus amigos. Vosotros sois mis amigos si hacéis lo que yo os mando. Ya no os llamo siervos, porque el siervo no sabe lo que hace su señor: a vosotros os llamo amigos, porque todo lo que he oído a mi Padre os lo he dado a conocer. No sois vosotros los que me habéis elegido, soy yo quien os he elegido y os he destinado para que vayáis y deis fruto, y vuestro fruto permanezca. De modo que lo que pidáis al Padre en mi nombre os lo dé. Esto os mando: que os améis unos a otros».</p>
<p class="fin">Palabra del Señor.</p>
<div class="obien"><span>O bien:</span><span class="ref">Col 3, 15</span></div>
<div class="pl">${R} Aleluya, aleluya, aleluya.

${V} La paz de Cristo reine en vuestro corazón:
a ella habéis sido convocados en un solo cuerpo. ${R}</div>
<h3 class="rub">&nbsp;<span class="ref">Jn 17, 1a. 20-26</span></h3>
<p class="lema">Que todos sean uno</p>
<p class="pr">Lectura del santo Evangelio según san Juan.</p>
<p class="pr">En aquel tiempo, Jesús, levantando los ojos al cielo, dijo:</p>
<p class="pr">«Padre, no sólo por ellos ruego, sino también por los que crean en mí por la palabra de ellos, para que todos sean uno, como tú, Padre, en mí, y yo en ti, que ellos también sean uno en nosotros, para que el mundo crea que tú me has enviado.</p>
<p class="pr">Yo les he dado la gloria que tú me diste, para que sean uno, como nosotros somos uno; yo en ellos, y tú en mí, para que sean completamente uno, de modo que el mundo sepa que tú me has enviado y que los has amado a ellos como me has amado a mí.</p>
<p class="pr">Padre, este es mi deseo: que los que me has dado estén conmigo donde yo estoy y contemplen mi gloria, la que me diste, porque me amabas, antes de la fundación del mundo.</p>
<p class="pr">Padre justo, si el mundo no te ha conocido, yo te he conocido, y estos han conocido que tú me enviaste. Les he dado a conocer y les daré a conocer tu nombre, para que el amor que me tenías esté en ellos, y yo en ellos».</p>
<p class="fin">Palabra del Señor.</p>
<h3 class="rub">Oración sobre las ofrendas</h3>
<div class="pl">Recibe, Señor, las ofrendas que te presentamos
y haz que por este sacrificio
crezca sin cesar el amor que esperas de nosotros
y se edifique nuestra comunidad.
Por Jesucristo, nuestro Señor.</div>
<h3 class="rub">Antífona de comunión <span class="ref">Jn 15, 12</span></h3>
<p class="pr">Este es mi mandamiento: que os améis unos a otros como yo os he amado.</p>
<h3 class="rub">Oración después de la comunión</h3>
<div class="pl">Estos sacramentos de unidad y de amor
con los que nos has saciado, Señor, Dios nuestro,
nos unan más íntimamente contigo
y con los hermanos,
para que el mundo crea en tu Hijo
y por Él obtenga la salvación.
Él, que vive y reina, por los siglos de los siglos.</div>
`},
{id:'vocaciones',grupo:'necesidades',color:'verde',fecha:'Por diversas necesidades',
titulo:'Por las vocaciones claretianas',rango:'',
html:`
<p class="nota">Todo como en el <em>Misal Romano</em> y el Leccionario por las vocaciones sacerdotales o religiosas. También pueden utilizarse las oraciones y antífonas siguientes:</p>
<h3 class="rub">Antífona de entrada <span class="ref">Mt 9, 37-38</span></h3>
<p class="pr">La mies es abundante, pero los trabajadores son pocos; rogad, pues, al Señor de la mies que mande trabajadores a su mies.</p>
<div class="obien"><span>O bien:</span><span class="ref">Mt 4, 19</span></div>
<p class="pr">Venid en pos de mí —dice el Señor— y os haré pescadores de hombres.</p>
<h3 class="rub">Oración colecta</h3>
<div class="pl">Señor, tú que llamaste a los apóstoles
para que fueran pescadores de hombres,
dígnate llamar a nuestra Congregación
a nuevos miembros
que sean sal de la tierra y luz del mundo,
y trabajen en todas partes
con la caridad que apremiaba
a tu siervo Antonio María Claret.
Por nuestro Señor Jesucristo, tu Hijo,
que vive y reina contigo
en la unidad del Espíritu Santo y es Dios
por los siglos de los siglos.</div>
<p class="nota">Se pueden escoger las lecturas de las misas por diversas circunstancias: por las vocaciones; o las siguientes.</p>
<h3 class="rub">Primera lectura <span class="ref">1Sam 3, 1-10</span></h3>
<p class="lema">Habla, Señor, que tu siervo te escucha</p>
<p class="pr">Lectura del primer libro de Samuel.</p>
<p class="pr">En aquel tiempo, el joven Samuel servía al Señor al lado de Elí.</p>
<p class="pr">En aquellos días era rara la palabra del Señor y no eran frecuentes las visiones.</p>
<p class="pr">Un día Elí estaba acostado en su habitación. Sus ojos habían comenzado a debilitarse y no podía ver.</p>
<p class="pr">La lámpara de Dios aún no se había apagado y Samuel estaba acostado en el templo del Señor, donde se encontraba el Arca de Dios.</p>
<p class="pr">Entonces el Señor llamó a Samuel. Este respondió:</p>
<p class="pr">«Aquí estoy».</p>
<p class="pr">Corrió adonde estaba Elí y dijo:</p>
<p class="pr">«Aquí estoy, porque me has llamado».</p>
<p class="pr">Respondió:</p>
<p class="pr">«No te he llamado. Vuelve a acostarte». Fue y se acostó. El Señor volvió a llamar a Samuel. Se levantó Samuel, fue adonde estaba Elí y dijo:</p>
<p class="pr">«Aquí estoy, porque me has llamado».</p>
<p class="pr">Respondió:</p>
<p class="pr">«No te he llamado, hijo mío. Vuelve a acostarte».</p>
<p class="pr">Samuel no conocía aún al Señor, ni se le había manifestado todavía la palabra del Señor.</p>
<p class="pr">El Señor llamó a Samuel, por tercera vez. Se levantó, fue adonde estaba Elí y dijo:</p>
<p class="pr">«Aquí estoy, porque me has llamado».</p>
<p class="pr">Comprendió entonces Elí que era el Señor el que llamaba al joven. Y dijo a Samuel:</p>
<p class="pr">«Ve a acostarte. Y si te llama de nuevo, di: “Habla, Señor, que tu siervo escucha”».</p>
<p class="pr">Samuel fue a acostarse en su sitio.</p>
<p class="pr">El Señor se presentó y llamó como las veces anteriores:</p>
<p class="pr">«Samuel, Samuel».</p>
<p class="pr">Respondió Samuel:</p>
<p class="pr">«Habla, que tu siervo escucha».</p>
<p class="fin">Palabra de Dios.</p>
<div class="obien"><span>O bien:</span><span class="ref">Jer 1, 4-9</span></div>
<p class="lema">Irás a donde yo te envíe</p>
<p class="pr">Lectura del libro de Jeremías.</p>
<p class="pr">En aquel tiempo, el Señor me dirigió la palabra:</p>
<p class="pr">«Antes de formarte en el vientre, te elegí; antes de que salieras del seno materno, te consagré: te constituí profeta de las naciones».</p>
<p class="pr">Yo repuse:</p>
<p class="pr">«¡Ay, Señor, Dios mío! Mira que no sé hablar, que sólo soy un niño».</p>
<p class="pr">El Señor me contestó:</p>
<p class="pr">«No digas que eres un niño, pues irás adonde yo te envíe y dirás lo que yo te ordene. No les tengas miedo, que yo estoy contigo para librarte —oráculo del Señor—».</p>
<p class="pr">El Señor extendió la mano, tocó mi boca y me dijo:</p>
<p class="pr">«Voy a poner mis palabras en tu boca».</p>
<p class="fin">Palabra de Dios.</p>
<h3 class="rub">Salmo responsorial <span class="ref">Sal 39, 2 y 4ab. 7-8. 10. 12</span></h3>
<div class="pl">${R} Aquí estoy, Señor, para hacer tu voluntad.

${V} Yo esperaba con ansia al Señor;
él se inclinó y escuchó mi grito;
me puso en la boca un cántico nuevo,
un himno a nuestro Dios. ${R}

${V} Tú no quieres sacrificios ni ofrendas
y, en cambio, me abriste el oído;
no pides holocaustos ni sacrificios expiatorios,
entonces yo digo: «aquí estoy». ${R}

${V} Como está escrito en mi libro:
«Para hacer tu voluntad».
Dios mío, lo quiero,
y llevo tu ley en las entrañas. ${R}

${V} He proclamado tu justicia
ante la gran asamblea;
no he cerrado los labios,
Señor, tú lo sabes. ${R}

${V} Tú, Señor, no me cierres tus entrañas
que tu misericordia y tu lealtad
me guarden siempre. ${R}</div>
<div class="obien"><span>O bien:</span><span class="ref">Sal 26, 1. 4. 5. 8b-9ab. 9cd y 11 (R.: 8b)</span></div>
<div class="pl">${R} Tu rostro buscaré, Señor.

${V} El Señor es mi luz y mi salvación,
¿a quién temeré?
El Señor es la defensa de mi vida,
¿quién me hará temblar? ${R}

${V} Una cosa pido al Señor, eso buscaré:
habitar en la casa del Señor
por los días de mi vida;
gozar de la dulzura del Señor,
contemplando su templo. ${R}

${V} Él me protegerá en su tienda
el día del peligro;
me esconderá en lo escondido de su morada,
me alzará sobre la roca. ${R}

${V} Tu rostro buscaré, Señor.
No me escondas tu rostro.
No rechaces con ira a tu siervo,
que tú eres mi auxilio. ${R}

${V} No me deseches, no me abandones,
Dios de mi salvación.
Señor, enséñame tu camino,
guíame por la senda llana,
porque tengo enemigos. ${R}</div>
<h3 class="rub">Segunda lectura <span class="ref">Flp 3, 8-14</span></h3>
<p class="lema">Lo perdí todo con tal de ganar a Cristo</p>
<p class="pr">Lectura de la carta del apóstol san Pablo a los Filipenses.</p>
<p class="pr">Hermanos:<br>Todo lo considero pérdida comparado con la excelencia del conocimiento de Cristo Jesús, mi Señor.</p>
<p class="pr">Por él lo perdí todo, y todo lo considero basura con tal de ganar a Cristo y ser hallado en él, no con una justicia mía, la de la ley, sino con la que viene de la fe de Cristo, la justicia que viene de Dios y se apoya en la fe. Todo para conocerlo a él, y la fuerza de su resurrección, y la comunión con sus padecimientos, muriendo su misma muerte, con la esperanza de llegar a la resurrección de entre los muertos.</p>
<p class="pr">No es que ya lo haya conseguido o que ya sea perfecto: yo lo persigo, a ver si lo alcanzo como yo he sido alcanzado por Cristo.</p>
<p class="pr">Hermanos, yo no pienso haber conseguido el premio. Sólo busco una cosa: olvidándome de lo que queda atrás y lanzándome hacia lo que está por delante, corro hacia la meta, hacia el premio, al cual me llama Dios desde arriba en Cristo Jesús.</p>
<p class="fin">Palabra de Dios.</p>
<h3 class="rub">Aleluya <span class="ref">cf. Jn 15, 5</span></h3>
<div class="pl">${R} Aleluya, aleluya, aleluya.

${V} Os he elegido, para que vayáis y deis fruto,
y vuestro fruto permanezca. ${R}</div>
<h3 class="rub">Evangelio <span class="ref">Mt 9, 35-38</span></h3>
<p class="lema">La mies es abundante, pero los trabajadores son pocos</p>
<p class="pr">Lectura del santo Evangelio según san Mateo.</p>
<p class="pr">En aquel tiempo, Jesús recorría todas las ciudades y aldeas, enseñando en sus sinagogas, proclamando el evangelio del reino y curando toda enfermedad y toda dolencia.</p>
<p class="pr">Al ver a las muchedumbres, se compadecía de ellas, porque estaban extenuadas y abandonadas, «como ovejas que no tienen pastor».</p>
<p class="pr">Entonces dice a sus discípulos:</p>
<p class="pr">«La mies es abundante, pero los trabajadores son pocos; rogad, pues, al Señor de la mies que mande trabajadores a su mies».</p>
<p class="fin">Palabra del Señor.</p>
<div class="obien"><span>O bien:</span><span class="ref">Mc 1, 17</span></div>
<div class="pl">${R} Aleluya, aleluya, aleluya.

${V} Venid en pos de mí, dice el Señor,
y os haré pescadores de hombres. ${R}</div>
<h3 class="rub">&nbsp;<span class="ref">Lc 5, 1-11</span></h3>
<p class="lema">Desde ahora serás pescador de hombres</p>
<p class="pr">Lectura del santo Evangelio según san Lucas.</p>
<p class="pr">En aquel tiempo, la gente se agolpaba en torno a Jesús para oír la palabra de Dios, estando él de pie junto al lago de Genesaret, vio dos barcas que estaban en la orilla; los pescadores, que habían desembarcado, estaban lavando las redes. Subiendo a una de las barcas, que era la de Simón, le pidió que la apartara un poco de tierra. Desde la barca, sentado, enseñaba a la gente.</p>
<p class="pr">Cuando acabó de hablar, dijo a Simón:</p>
<p class="pr">«Rema mar adentro, y echad vuestras redes para la pesca».</p>
<p class="pr">Respondió Simón y dijo:</p>
<p class="pr">«Maestro, hemos estado bregando toda la noche y no hemos recogido nada; pero, por tu palabra, echaré las redes».</p>
<p class="pr">Y, puestos a la obra, hicieron una redada tan grande de peces que las redes comenzaban a reventarse. Entonces hicieron señas a los compañeros, que estaban en la otra barca, para que vinieran a echarles una mano. Vinieron y llenaron las dos barcas, hasta el punto de que casi se hundían.</p>
<p class="pr">Al ver esto, Simón Pedro se echó a los pies de Jesús diciendo:</p>
<p class="pr">«Señor, apártate de mí, que soy un pecador».</p>
<p class="pr">Y es que el estupor se había apoderado de él y de los que estaban con él, por la redada de peces que habían recogido; y lo mismo les pasaba a Santiago y Juan, hijos de Zebedeo, que eran compañeros de Simón.</p>
<p class="pr">Y Jesús dijo a Simón:</p>
<p class="pr">«No temas; desde ahora serás pescador de hombres».</p>
<p class="pr">Entonces sacaron las barcas a tierra y, dejándolo todo, lo siguieron.</p>
<p class="fin">Palabra del Señor.</p>
<h3 class="rub">Oración sobre las ofrendas</h3>
<div class="pl">Recibe complacido, Señor,
las súplicas y ofrendas que te presentamos,
y a quienes nos alegramos en la fraternidad claretiana
concédenos permanecer siempre fieles
a la vocación misionera.
Por Jesucristo, nuestro Señor.</div>
<h3 class="rub">Antífona de comunión <span class="ref">Mt 5, 14-16</span></h3>
<p class="pr">Vosotros sois la luz del mundo, dice el Señor; brille así vuestra luz ante los hombres, para que vean vuestras buenas obras y den gloria a vuestro Padre que está en los cielos.</p>
<div class="obien"><span>O bien:</span><span class="ref">Jn 15, 16</span></div>
<p class="pr">No sois vosotros los que me habéis elegido, soy yo quien os he elegido y os he destinado para que vayáis y deis fruto, y vuestro fruto permanezca.</p>
<h3 class="rub">Oración después de la comunión</h3>
<div class="pl">Habiendo participado en el sacramento de tu amor,
te pedimos, Señor,
que suscites abundantes vocaciones
para nuestra Congregación,
infundas en los llamados
el deseo de la perfección evangélica,
enriquezcas a tu Iglesia
con su constante servicio apostólico
y les concedas permanecer fieles a tu llamada.
Por Jesucristo, nuestro Señor.</div>
`},
{id:'fruto',grupo:'necesidades',color:'verde',fecha:'Por diversas necesidades',
titulo:'Por el fruto apostólico de los misioneros',rango:'',
html:`
<h3 class="rub">Antífona de entrada <span class="ref">cf. Sal 66, 2-3</span></h3>
<p class="pr">Que Dios tenga piedad y nos bendiga, ilumine su rostro sobre nosotros, para que conozcamos en la tierra tus caminos, todos los pueblos tu salvación.</p>
<h3 class="rub">Oración colecta</h3>
<div class="pl">Señor, Dios nuestro,
que quieres que la humanidad entera se salve
y llegue al conocimiento de la verdad,
bendice los empeños de nuestra fraternidad misionera
por llevar tu Palabra a todos los confines de la tierra.
Por nuestro Señor Jesucristo, tu Hijo,
que vive y reina contigo
en la unidad del Espíritu Santo y es Dios
por los siglos de los siglos.</div>
<p class="nota">Se pueden escoger algunas de las siguientes lecturas:</p>
<h3 class="rub">Primera lectura <span class="ref">Is 49, 1-6</span></h3>
<p class="lema">Te hago luz de las naciones</p>
<p class="pr">Lectura del profeta Isaías.</p>
<div class="pl">Escuchadme, islas; atended, pueblos lejanos:
El Señor me llamó desde el vientre materno,
de las entrañas de mi madre, y pronunció mi nombre.

Hizo de mi boca una espada afilada,
me escondió en la sombra de su mano;
me hizo flecha bruñida, me guardó en su aljaba
y me dijo: «Tú eres mi siervo, Israel,
por medio de ti me glorificaré».

Y yo pensaba: «En vano me he cansado,
en viento y en nada he gastado mis fuerzas».
En realidad el Señor defendía mi causa,
mi recompensa la custodiaba Dios.

Y ahora dice el Señor,
el que me formó desde el vientre como siervo suyo,
para que le devolviese a Jacob,
para que le reuniera a Israel;
he sido glorificado a los ojos de Dios.
Y mi Dios era mi fuerza:
«Es poco que seas mi siervo
para restablecer las tribus de Jacob
y traer de vuelta a los supervivientes de Israel.
Te hago luz de las naciones,
para que mi salvación alcance
hasta el confín de la tierra».</div>
<p class="fin">Palabra de Dios.</p>
<div class="obien"><span>O bien:</span><span class="ref">Is 52, 7-10</span></div>
<p class="lema">La bendición del envío: mensajeros de esperanza y liberación</p>
<p class="pr">Lectura del profeta Isaías.</p>
<div class="pl">Qué hermosos son sobre los montes
los pies del mensajero que proclama la paz,
que anuncia la buena noticia,
que pregona la justicia,
que dice a Sion: «¡Tu Dios reina!».

Escucha: tus vigías gritan, cantan a coro,
porque ven cara a cara al Señor,
que vuelve a Sion.

Romped a cantar a coro,
ruinas de Jerusalén,
porque el Señor ha consolado a su pueblo,
ha rescatado a Jerusalén.

Ha descubierto el Señor su santo brazo
a los ojos de todas las naciones,
y verán los confines de la tierra
la salvación de nuestro Dios.</div>
<p class="fin">Palabra de Dios.</p>
<div class="obien"><span>O bien:</span><span class="ref">1Cor 9, 16-23</span></div>
<p class="lema">¡Ay de mí si no anuncio el Evangelio!</p>
<p class="pr">Lectura de la primera carta del apóstol san Pablo a los Corintios.</p>
<p class="pr">Hermanos:<br>El hecho de predicar no es para mí motivo de orgullo. No tengo más remedio y, ¡ay de mí si no anuncio el Evangelio!</p>
<p class="pr">Si yo lo hiciera por mi propio gusto, eso mismo sería mi paga. Pero, si lo hago a pesar mío, es que me han encargado este oficio.</p>
<p class="pr">Entonces, ¿cuál es la paga? Precisamente dar a conocer el Evangelio, anunciándolo de balde, sin usar el derecho que me da la predicación del Evangelio.</p>
<p class="pr">Porque, siendo libre como soy, me he hecho esclavo de todos para ganar a los más posibles. Me he hecho judío con los judíos, para ganar a los judíos; con los que están bajo ley me he hecho como bajo ley, no estando yo bajo ley, para ganar a los que están bajo ley; con los que no tienen ley me he hecho como quien no tiene ley, no siendo yo alguien que no tiene ley de Dios, sino alguien que vive en la ley de Cristo, para ganar a los que no tienen ley. Me he hecho débil con los débiles, para ganar a los débiles; me he hecho todo para todos, para ganar, sea como sea, a algunos. Y todo lo hago por causa del Evangelio, para participar yo también de sus bienes.</p>
<p class="pr">¿No sabéis que en el estadio todos los corredores cubren la carrera, aunque uno solo se lleva el premio? Pues corred así: para ganar. Pero un atleta se impone toda clase de privaciones; ellos, para ganar una corona que se marchita; nosotros, en cambio, una que no se marchita.</p>
<p class="pr">Por eso corro yo, pero no al azar; lucho, pero no contra el aire; sino que golpeo mi cuerpo y lo someto, no sea que, habiendo predicado a otros, quede yo descalificado.</p>
<p class="fin">Palabra de Dios.</p>

<h3 class="rub">Evangelio <span class="ref">Mt 28, 18-20</span></h3>

<h3 class="rub">&nbsp;<span class="ref">Mt 9, 35-38</span></h3>

<p class="pr">Lectura del santo Evangelio según san Mateo.</p>
<p class="pr">En aquel tiempo, Jesús recorría todas las ciudades y aldeas, enseñando en sus sinagogas, proclamando el evangelio del reino y curando toda enfermedad y toda dolencia. Al ver a las muchedumbres, se compadecía de ellas, porque estaban extenuadas y abandonadas, «como ovejas que no tienen pastor».</p>
<p class="pr">Entonces dice a sus discípulos:</p>

/* ---------- fechas ---------- */
function pascua(y){
  const a=y%19,b=Math.floor(y/100),c=y%100,d=Math.floor(b/4),e=b%4,
  f=Math.floor((b+8)/25),g=Math.floor((b-f+1)/3),h=(19*a+b-d-g+15)%30,
  i=Math.floor(c/4),k=c%4,l=(32+2*e+2*i-h-k)%7,m=Math.floor((a+11*h+22*l)/451),
  mes=Math.floor((h+l-7*m+114)/31),dia=((h+l-7*m+114)%31)+1;
  return new Date(y,mes-1,dia);
}
function fechaCorazon(y){
  const d=pascua(y); d.setDate(d.getDate()+69); return d; // Pentecostés+20
}
function fechaDe(c,y){
  if(c.movil==='corazon') return fechaCorazon(y);
  if(c.mes) return new Date(y,c.mes-1,c.dia);
  return null;
}
function mismaFecha(a,b){return a&&b&&a.getFullYear()===b.getFullYear()&&a.getMonth()===b.getMonth()&&a.getDate()===b.getDate();}
const MESES=['enero','febrero','marzo','abril','mayo','junio','julio','agosto','septiembre','octubre','noviembre','diciembre'];
function fmt(d){return d.getDate()+' de '+MESES[d.getMonth()];}

/* ---------- render ---------- */
const app=document.getElementById('app');
const GRUPOS=[['propio','Propio de los santos'],['rituales','Misas rituales'],['votivas','Misa votiva'],['necesidades','Por diversas necesidades']];

function portada(){
  const hoy=new Date(); const y=hoy.getFullYear();
  let html='';
  const deHoy=DATA.find(c=>mismaFecha(fechaDe(c,y),hoy));
  if(deHoy){
    html+='<div class="hoy" onclick="location.hash=\'#/'+deHoy.id+'\'">'+
      '<div class="etq">Hoy · '+fmt(hoy)+'</div>'+
      '<div class="nom">'+deHoy.titulo+'</div>'+
      (deHoy.rango?'<div class="sub">'+deHoy.rango+'</div>':'')+'</div>';
  }else{
    // próxima celebración
    let prox=null,proxF=null;
    DATA.forEach(c=>{
      let f=fechaDe(c,y); if(!f)return;
      if(f<hoy){f=fechaDe(c,y+1);}
      if(!proxF||f<proxF){proxF=f;prox=c;}
    });
    if(prox){
      html+='<div class="hoy" onclick="location.hash=\'#/'+prox.id+'\'">'+
        '<div class="etq">Próxima celebración · '+fmt(proxF)+'</div>'+
        '<div class="nom">'+prox.titulo+'</div>'+
        (prox.rango?'<div class="sub">'+prox.rango+'</div>':'')+'</div>';
    }
  }
  GRUPOS.forEach(([g,nombre])=>{
    const items=DATA.filter(c=>c.grupo===g);
    if(!items.length)return;
    html+='<section class="grupo"><h2>'+nombre+'</h2>';
    items.forEach(c=>{
      html+='<div class="tarjeta" onclick="location.hash=\'#/'+c.id+'\'">'+
        '<span class="punto p-'+c.color+'"></span>'+
        '<span class="fecha">'+(c.mes?c.dia+' '+MESES[c.mes-1].slice(0,3)+'.':(c.movil?'móvil':'—'))+'</span>'+
        '<span><span class="nom">'+c.titulo+'</span>'+
        (c.rango?'<br><span class="rango">'+c.rango+'</span>':'')+'</span></div>';
    });
    html+='</section>';
  });
  app.innerHTML=html;
  window.scrollTo(0,0);
}

function celebracion(id){
  const c=DATA.find(x=>x.id===id);
  if(!c){portada();return;}
  let fechaTxt=c.fecha;
  if(c.movil==='corazon'){
    fechaTxt+=' · Este año: '+fmt(fechaCorazon(new Date().getFullYear()));
  }
  app.innerHTML='<button class="volver" onclick="location.hash=\'\'">&larr; Índice</button>'+
    '<article class="celeb">'+
    '<div class="fecha-lit">'+fechaTxt+'</div>'+
    '<h2 class="tit">'+c.titulo+'</h2>'+
    (c.rango?'<div class="rango">'+c.rango+'</div>':'')+
    '<div class="adorno">&#10011;</div>'+
    c.html+
    '<footer>&#10011;</footer></article>';
  window.scrollTo(0,0);
}

function ruta(){
  const h=location.hash;
  if(h.startsWith('#/')) celebracion(h.slice(2)); else portada();
}
window.addEventListener('hashchange',ruta);

/* ---------- controles ---------- */
let fs=parseInt(localStorage.getItem('misal_fs')||'100',10);
function aplicaFs(){document.documentElement.style.setProperty('--fs',fs+'%');localStorage.setItem('misal_fs',fs);}
document.getElementById('btnMenos').onclick=()=>{if(fs>75){fs-=5;aplicaFs();}};
document.getElementById('btnMas').onclick=()=>{if(fs<160){fs+=5;aplicaFs();}};
aplicaFs();

const btnTema=document.getElementById('btnTema');
function aplicaTema(osc){
  document.documentElement.classList.toggle('oscuro',osc);
  btnTema.innerHTML=osc?'&#9788;':'&#9789;';
  localStorage.setItem('misal_tema',osc?'oscuro':'claro');
}
btnTema.onclick=()=>aplicaTema(!document.documentElement.classList.contains('oscuro'));
aplicaTema(localStorage.getItem('misal_tema')==='oscuro');

ruta();
</script>
