 darles el valor que tienen.", "Este salmo 135, nos pone delante las intervenciones de Dios en nuestra vida. Nos deben alegrar. Pero también nos tienen que llenar de sentimientos de gratitud hacia quien así se comporta con nosotros. De una manera reiterativa nos invitará a repetir varias veces \"porque es eterna su misericordia\". Es decir, gratuitamente, sin que nosotros se lo hayamos pedido, Dios ha ido sembrando en nuestra vida maravillas, con las que nos quiere demostrar su providencia, su bondad, su amor.", "maravillas de Dios son, la grandeza de los cielos, la inmensidad de los mares, la multitud de astros, el calor del sol, la luz de la luna, la variedad de seres que pueblan la tierra... Y todas ellas nos hablan, con un lenguaje silencioso, de aquel que las ha creado.", "Como comunidad contemplativa -todo cristiano debe serlo- no podemos desoír su lenguaje. Escuchemos y respondamos: \"es eterna su misericordia\"."], "oracion": ["Señor, nos has regalado multitud de criaturas que nos hablan de ti. Por medio de ellas nos manifiestas tu sabiduría, tu poder...pero sobre todo, nos manifiestan tu amor. Todas las has creado para nosotros. Nuestra oración de cada día debiera estar impregnada de este estribillo:\"porque es eterna tu misericordia\" y nos sintamos profundamente alegres porque así nos mimas. Tú que vives y reinas por los siglos de los siglos."]}, {"ref": "Salmo 135, II", "sub": "sigue proclamando la miseri- cordia infinita del Señor.", "amb": ["Continuamos proclamando las intervenciones de Dios en la historia de nuestra salvación: \"porque es eterna su misericordia\".", "Toda la historia del pueblo de Israel es una historia sagrada: Dios interviene portentosamente en su favor para hacerles sensible su presencia, su cercanía: lo saca de la esclavitud, lo guía por el desierto, lo hace llegar a la tierra prometida...", "Pero la historia sigue. Y Dios seguirá actuando en esta historia, en nuestra historia. Tiene que realizar el plan de salvación que ha proyectado desde siempre.", "Nuestro Instituto, nuestra comunidad, cada uno de nosotros... somos el nuevo pueblo en el que Dios se va haciendo presente, día tras día, momento a momento. Necesitamos desarrollar al máximo nuestro instinto de Dios, para ir captando su presencia en nuestras vidas.", "Si nos pusiéramos a actualizar todo el contenido de este salmo, en lo que a nosotros se refiere, tendríamos que hacer largas listas de las actuaciones de Dios en nuestra vida, para seguir repitiendo, indefinidamente \"porque es eterna su misericordia\"."], "oracion": ["Señor, son muchas las páginas que teníamos que escribir, si quisiéramos redactar tus intervenciones en nuestra vida. Y siempre tendríamos que repetir:\"porque es eterna tu misericordia\".Tú nunca has tenido en cuenta nuestras negativas. Siempre tu misericordia se ha desbordado sobre nuestra infidelidad y....nos has perdonado. Gracias por tu fidelidad, por tu misericordia, por tu perdón. A ti que vives y reinas por los siglos de los siglos."]}, {"ref": "Cántico Ef. 1", "sub": "Es un cántico cargado de gratitud, ante la elección de que hemos sido objeto.", "amb": ["En nuestra oración hemos proclamado la misericordia del Señor y le hemos bendecido por sus intervenciones en nuestra vida.", "Este cántico, es el novamás de lo que Dios ha hecho en favor nuestro. muchas y grandes son sus maravillas realizadas en la creación por nosotros y para nosotros.", "Pero la gran maravilla, la gran obra de Dios, es el proyecto que tiene pensado realizar: hacernos hijos suyos. Tal maravilla hubiera sido impensada para cualquiera de nosotros. Nunca se nos hubiera ocurrido pensar que la misma vida de Dios, pudiera ser vida nuestra. Pero los proyectos de Dios sobrepasan infinitamente los proyectos de los hombres.", "Y así, gratuitamente, sin hacer ni merecer nada por nuestra parte, desde siempre, \"antes de crear el mundo\"... \"nos ha elegido en la persona de Cristo para ser sus hijos\". Este es el plan maravilloso, que quiere realizar, si nosotros le dejamos y colaboramos con él.", "Terminar el día con esta \"noticia\", seguro que tiene que llenarnos de alegría y abrirnos amplios horizontes para nuestra vida. Digámoslo de verdad: \"bendito sea Dios... que nos ha bendecido en la persona de Cristo, con toda clase de bendiciones\"."], "oracion": ["Señor, ¡cómo nos gusta escuchar la noticia que hemos proclamado y repetido varias veces!. Siempre nos sabe a nueva, como siempre nos sabe a nuevo el beso de una madre.", "Decirte gracias con nuestros labios, es poco. Nuestro \"gracias\", tiene que ser el gracias de nuestra vida: dejarnos hacer hijos en el Hijo, Jesucristo. Así responderemos a tu plan de salvación, que es tu plan de amor sobre nosotros. Tú que vives por los siglos de los siglos."]}], "summary": {"breve": ["Salmo 135,I: Son muchas las intervenciones de Dios en nuestra vida. Debemos reconocerlas y agradecerlas. Y en nuestro reconocimiento siempre tendremos que confesar \"porque es eterna su misericordia\".", "Salmo 135,II: La historia de la salvación es un actuar permanente del poder de Dios en favor de su pueblo. Día tras día esa historia se sigue perpetuando. Antes, en favor del pueblo de Israel. Hoy, en favor nuestro, el nuevo pueblo de Dios.", "Cántico EF.1,3-10: En este cántico vamos a proclamar la mayor intervención de Dios en favor nuestro. Nada menos que nos ha destinado a ser sus hijos en la persona de Jesús, nuestro hermano: hijos en el Hijo."], "oracion": ["Salmo 135,I: Cantar al principio y al final la primera estrofa. Las otras estrofas, un grupo proclama la primera parte y el otro la segunda.", "Salmo 135,II: Cantar al principio y al final la primera estrofa. Las otras estrofas, un grupo proclama la primera parte y el otro la segunda.", "Cántico EF.1: Es proclamado por dos solistas, alternando cada una de las estrofas, con un fondo musical."], "reflexion": ["Dad gracias al Señor porque es eterna su misericordia…", "En nuestra humillación se acordó de nosotros…", "Nos ha destinado a ser sus hijos…"]}}]}, {"name": "martes", "hours": [{"key": "oración de la mañana", "label": "Laudes", "psalms": [{"ref": "Salmo 100", "sub": "es un cántico a la justicia y bon- dad de Dios.", "amb": ["Comenzamos una nueva jornada, y lo hacemos aquí, juntos, en diálogo con el Padre. El nos ha regalado un nuevo día y espera que nuestra vida discurra conforme a su deseo.", "Con este salmo vamos a trazar el programa que dirija todas nuestras acciones, para que las realicemos conforme a lo que Dios quiere de nosotros. Así, todo este día, que estamos comenzando será \"un canto, una música melodiosa, que cante la bondad y justicia de Dios\".", "Para ello \"andaré con rectitud de corazón\" en la convivencia con mis hermanos, que mis intenciones sean claras y transparentes. No escucharé murmuraciones ni difamaciones. La sinceridad, la verdad serán el distintivo de mis actuaciones. Seré fermento de lealtad, de sencillez, de comprensión, dentro del grupo.", "Todos somos distintos, nuestro vivir en comunidad es todo un reto que se nos ofrece para aceptar esa distinción, pero con el compromiso serio de esforzarnos para lograr una unidad dentro de la diversidad.", "El grito de Jesús \"Padre que todos sean uno, como nosotros somos uno\", tiene que ser una realidad entre nosotros, en la lucha de cada día. El Espíritu que mora en cada uno, es el que constantemente nos impulsa para que vivamos en la unidad.. Que nuestra vida sea una respuesta positiva a esos impulsos."], "oracion": ["Señor, nuestro vivir en comunidad, tiene que ser como un pentagrama con muchas y variadas notas que encarnan una preciosa melodía. Para eso nos has llamado y convocado. Melodía que alegre a nuestros hermanos, y melodía que puedan escuchar todos aquellos que nos vean", "Quisiéramos, Padre, que nuestra comunidad viviera y manifestara esa unidad que tú quieres, y que nuestro mundo necesita ver. Que nuestra diversidad no impida nuestra unidad. Tú que vives por los siglos de los siglos."]}, {"ref": "Cántico Dn. 3", "sub": "es una invitación a bendecir al Señor y a abrirse a su perdón.", "amb": ["Vamos a comenzar este día con realismo. Todos tenemos experiencia de que lo que hacemos, no siempre coincide con lo que pensamos. Si somos sinceros con nosotros mismos, tenemos que confesar que más de una vez pensamos de una manera y actuamos de otra. Esa es nuestra condición humana.", "Este cántico que vamos a proclamar nos invita a reconocer, a afrontar y a buscar una solución, desde la realidad del comportamiento de Dios con nosotros: \"bendito eres... en cuanto has hecho con nosotros... tus obras son verdad... tus caminos son rectos... tus juicios justos...\" Así nos trata Dios nuestro Padre.", "Y nuestra respuesta no siempre ha sido en la misma línea. Sinceramente hemos fallado, en más de una ocasión,\"apartándonos de ti\", y como consecuencia, lo hemos pasado mal: \"... hoy estamos humillados a causa de nuestro comportamiento...\" ... todo se nos ha derrumbado.", "Reconocer la verdad de nuestra vida, puede ser un comienzo para rectificar. Por eso diremos: \"acepta nuestro corazón contrito... ahora te seguimos de todo corazón, te respetamos y buscamos tu rostro\". Desde esta perspectiva debemos comenzar este día: abiertos a la acción de Dios y reconociendo nuestra debilidad."], "oracion": ["Señor, tú mereces nuestra alabanza y nuestra gratitud por todo lo que haces por nosotros. Pero tenemos que confesarte sinceramente que en muchas ocasiones te hemos fallado: buenos deseos... pero no siempre buenas obras.", "Te hacemos presente nuestro arrepentimiento. Sabemos que lo aceptas porque nos comprendes. Sigue confiando en nosotros, aunque a veces te fallemos. Y nosotros seguiremos confiando en ti, que vives por los siglos de los siglos."]}, {"ref": "Salmo 143", "sub": "es una oración de bendición y gratitud, al Señor.", "amb": ["Cierto que debemos confiar en nosotros mismos, en nuestras posibilidades. Pero no podemos prescindir de la raíz que da fuerza y consistencia a todo nuestro ser: \"En el vivimos, nos movemos y existimos\".", "Comenzamos un nuevo día y pedimos fuerza para nuestra debilidad: \"Señor, adiestra mis manos para el combate, mis dedos para la pelea\". Tenemos que reconocer que Dios \"es nuestro alcázar, nuestro baluarte, nuestro refugio... nuestro \"bienhechor\".", "No importa que como humanos seamos poca cosa. El es el que nos engrandece, el que nos ha hecho capaces para participar de su grandeza.", "Nuestra comunidad ha sido convocada para acoger la fuerza del Señor, y hacerla presente en nuestro mundo. Somos la fuerza visible de Dios. No importa que humanamente seamos débiles. Así se hace más patente que alguien nos respalda y que es la fuerza de nuestra fuerza. Por eso \"cantemos un cántico nuevo... toquemos el arpa... a él, que es nuestra victoria, nuestro salvador...\""], "oracion": ["Señor, a veces nos sentimos cobardes. Pasamos miedo. La vida no es fácil, y la sociedad en que vivimos se nos hace hostil. Pero tú nos invitas a levantar el ánimo ofreciéndonos tu misma fuerza: \"yo estaré con vosotros\". Gracias, Señor, por tu presencia. Gracias por tu cercanía. Pero seguiremos confiando y seguiremos luchando. Tu grandeza se manifestará en nuestra debilidad y nuestro mundo podrá descubrir tu presencia en cada uno de nosotros.", "En nuestras cobardías y en nuestros miedos seguiremos confiando en ti, nuestro apoyo y nuestra fuerza. Tú que vives y reinas por los siglos de los siglos."]}], "summary": {"breve": ["Salmo 100: Dios tiene su proyecto amoroso sobre cada uno de nosotros y su deseo es que cooperemos con El, a fin de que se realice. En el comienzo de este día, vamos a comprometernos, sinceramente, con Dios para que ese proyecto sea una realidad.", "Cántico DN.3: Apartarnos de los deseos de Dios sobre nosotros, es entrar en un camino que no nos lleva a ninguna parte. Reconozcamos, nuestro posible error, y reconozcamos también todo lo que Dios ha hecho y está haciendo en favor nuestro.", "Salmo 143: No tengamos miedo a las dificultades. El Señor siempre \"está de nuestra parte...adiestrando nuestras manos para el combate...\" \"El es nuestro alcázar y nuestro escudo\". Démosle gracias y bendigámosle."], "oracion": ["Salmo 100: Todo él, proclamado por un solista. Concluyen todos con el Gloria.", "Cántico DN.: Comienza un solista con la primera estrofa y continúan todos a dos coros.", "Salmo 143: Un solista proclama las dos primeras estrofas y la última. Las restantes todo al unísono."], "reflexion": ["Voy a cantar la bondad y la justicia del Señor…", "Ahora te seguimos de todo corazón…", "Dios mío, te cantaré un cántico nuevo…"]}}, {"key": "oración de la tarde", "label": "Vísperas", "psalms": [{"ref": "Salmo 136", "sub": "es una lamentación por un pasa- do añorado y un presente en destierro.", "amb": ["Aunque en nuestra vida podemos encontrarnos con momentos trágicos, la vida humana en sí no es una tragedia. Siempre tendremos momentos fáciles y difíciles, alegres y tristes, días de luz y días de oscuridad. Esa es nuestra condición, mientras seamos peregrinos en este mundo.", "Este salmo 136 no es ninguna invitación al pesimismo, todo lo contrario: es una invitación a la esperanza, a añorar un futuro que nos espera, y al mismo tiempo, a no instalar nuestras tiendas como si estuviéramos ya en el reino definitivo: \"¿Cómo cantar un cántico al Señor en tierra extranjera?\"...", "Nuestra comunidad, nuestro modo de vivir, tiene que anunciar con fuerza, el sentido peregrino de la vida humana y a la vez el Reino futuro al que estamos destinados. Y lo hacemos, dejando ya todo lo que es provisional, desde la vivencia de los consejos evangélicos y adelantando ya, lo que es definitivo.", "Nuestra vida de comunidad, nuestra vida de familia, debe ser una enérgica protesta contra el racismo, la discriminación, el desprecio de otros pueblos... contra todo lo que sea romper la fraternidad de unos con otros. Todo el mundo es nuestro mundo y todos los hombres son nuestros hermanos."], "oracion": ["Señor, vivimos en este mundo, pero somos conscientes de que somos peregrinos. Tú has querido poner ante nosotros, horizontes más esperanzadores, que vienen a llenar nuestras ansias de infinitud.", "Que vivamos con responsabilidad la vida presente. Pero siempre abiertos a la vida eterna y definitiva. Que como comunidad, vivamos como la gran familia de los hijos de Dios, y así se lo hagamos ver a nuestro mundo, para que desaparezcan las discriminaciones, las marginaciones, entre los hermanos. Tú que vives y reinas por los siglos de los siglos."]}, {"ref": "Salmo 137", "sub": "es un himno de gratitud al Señor por su misericordia.", "amb": ["El final del día es un momento apropiado para revisar y preguntarnos qué ha sido para nosotros este día que estamos finalizando. Estamos en oración. Es un encuentro especial con ese Dios que ha estado con nosotros durante todo el día. Reconocer su presencia, y darle gracias por todo lo que nos ha dado, es lo mínimo que podemos hacer, en estos momentos.", "A esto nos invita el salmo 137: \"te doy gracias, Señor, de todo corazón\". Y lo hago, \"por tu misericordia... porque me escuchaste... porque me conservas la vida...\" Es más, queremos que se asocien a nosotros todos los humanos: \"que te den gracias, Señor, todos los reyes de la tierra\".", "Una comunidad en oración, debe ser una comunidad que vive la gratitud, porque es consciente de todo lo que está recibiendo en cada momento: de Dios directamente, o de sus hermanos, puestos por Dios para hacer visible su acción.", "Un \"gracias\" vivido y manifestado crea comunidad, suaviza la convivencia de cada día, y nos estimula para seguir desviviéndonos por los hermanos. La falta de gratitud, distancia, cierra puertas, enfría las relaciones. Por el contrario, la gratitud vivida y expresada, es el abrazo permanente que damos al hermano."], "oracion": ["Señor, al terminar este día, tenemos que decirte con sinceridad: \"gracias de todo corazón\". Todo lo que hemos vivido en este día, ha sido un regalo tuyo: la vida... el aire que respiramos... nuestros hermanos... tu entrega en la Eucaristía que hemos celebrado... todo, todo... te lo debemos a ti.", "Queremos que toda la humanidad sea consciente de lo que haces por ellos, y se relacionen contigo desde la gratitud y desde el amor. Con este nuestro deseo, nuestro compromiso personal de vivir en gratitud constante hacia ti. que vives y reinas por los siglos de los siglos."]}, {"ref": "Cántico Ap. 4", "sub": "es un canto a Cristo redentor y salvador, por su entrega generosa.", "amb": ["No podemos pasar por la vida al margen de todo lo que estamos recibiendo de Dios. Somos un monumento que está proclamando, sin palabras, lo que es Dios en sí mismo, y lo que ha hecho y está haciendo en favor nuestro.", "Por eso, este cántico nos invita a proclamar, a gritar, el poder, la gloria, la bondad de un Dios creador de todos y de todo. Pero de una manera especial nos invita a proclamar y a gritar la entrega total de Cristo, el Cordero degollado, que \"nos ha amado hasta el extremo\". Que nos lo ha dado todo. Que somos el precio de su sangre cruelmente derramada, hasta morir. Es pues, justo, que reconozcamos lo que hemos supuesto para Dios... su entrega, sin reservarse nada.", "Que nuestra comunidad, que cada uno de nosotros seamos una sinfonía que cante nuestra gratitud y nuestro amor hacia Aquel que así nos ha manifestado todo su amor y su entrega total.", "Al terminar este día, que siga resonando en nosotros este estribillo: \"digno es el Cordero de recibir gloria, honor, alabanza, gratitud y amor\"."], "oracion": ["Señor Jesús, nuestro canto para ti. Te lo has merecido. Tu entrega total, sin reservarte nada, nos deja sin palabras. La única palabra que queremos decirte es nuestro silencio asombrado y agradecido.", "En esta tarde, una vez más, nos sentimos sobrecogidos por tu muerte...por tu amor. Lo has pagado con el precio de tu sangre. Te costó. Pero no te volviste atrás. Gracias por tu valentía. Perdón por nuestra cobardía. A ti que vives y reinas por los siglos de los siglos."]}], "summary": {"breve": ["Salmo 136: No es una invitación al desaliento ó al pesimismo. Todo lo contrario. Es una invitación a la esperanza, al optimismo. A añorar un futuro glorioso que nos espera, desde la provisionalidad de esta vida.", "Salmo 137: Una vez más, se nos invita a ser agradecidos: \"por tu misericordia... porque me escuchaste\". Al mismo tiempo, esta invitación se extiende a desear que todos \" den gracias al Señor...porque su gloria es grande\".", "Cántico AP.4: Proclamamos la grandeza del cordero, Cristo Jesús, que se entregó totalmente por sus hermanos, de toda raza y condición, y ha hecho de ellos un pueblo de reyes, sacerdotes y profetas."], "oracion": ["Salmo 136: Cantado. o el grupo proclama las dos primeras estrofas y un solista las dos siguientes.", "Salmo 137: Un solista canta \"te doy gracias, Señor, de todo corazón...\" y son proclamadas espontáneamente las estrofas. Todos juntos el Gloria.", "Cántico AP.4: Todos al unísono con un fondo musical suave."], "reflexion": ["Si me olvido de ti, que se me pegue la lengua al paladar…", "Señor, tu misericordia es eterna…", "Eres digno, Señor, de recibir toda la gloria…"]}}]}, {"name": "miércoles", "hours": [{"key": "oración de la mañana", "label": "Laudes", "psalms": [{"ref": "Salmo 107", "sub": "es un poema que rebosa alaban- zas y gratitud al Señor.", "amb": ["Comenzamos un nuevo día fuertes con la misma fortaleza de Dios, e invitados a despertar, para proclamar, con alegría, su gloria y su grandeza: \"Dios mío, mi corazón está firme... cantaré... despertaré a la aurora...\"", "Y queremos hacer público nuestro canto y nuestra acción de gracias: \"ante todos los pueblos... ante todas las naciones\". Tenemos motivos para ello: \"por tu bondad... por tu fidelidad... que es más grande que los cielos\".", "Nuestra comunidad es una teofanía que hace visible la bondad y la fidelidad de Dios. No hace falta pensar mucho. Nos basta con abrir los ojos y mirar. Cada una de nuestras personas, somos una clara manifestación de esa bondad y de esa fidelidad. Es lógico, pues, que rebosemos de alegría, y comencemos nuestra jornada dando nuevo color y nueva vida, a cada una de nuestras acciones. Dios nos respalda siempre. En el trasfondo de nuestra debilidad está su fortaleza. Con verdad podemos decir en todo momento: \"con Dios haremos proezas\".", "Todos pasamos por situaciones conflictivas, difíciles de superar. Es fácil que nos venga el desaliento. Es entonces cuando tenemos que recordar, que solos, la lucha es difícil, pero \"con Dios... haremos proezas\". Alentados con esta confianza, comencemos este nuevo día."], "oracion": ["Señor, alegres por tu presencia en nuestras vidas, comenzamos una nueva jornada.", "Queremos que cada una de nuestras acciones esté marcada con un sentido de gratitud hacia ti, por tu gran bondad, por tu fidelidad, que no tienen límites.", "Somos conscientes de nuestra debilidad. Pero confiamos en ti. Estamos ciertos de que \"contigo haremos proezas\". Nos has llamado para hacer visible tu fortaleza en nuestra debilidad, y nos esforzaremos por corresponder a tu llamada. A ti que vives y reinas por los siglos de los siglos."]}, {"ref": "Cántico Is. 61", "sub": "es un canto alegre por los beneficios recibidos del Señor.", "amb": ["Las manifestaciones de amor, que Dios tiene, para con nosotros, son innumerables. Podemos decir que estamos sumergidos en su amor. Todas las expresiones de este cántico, rebosan alegría desbordante, como consecuencia de esa sensación: \"desbordo de gozo... me alegro con mi Dios...\"", "Desde nuestra perspectiva, casi vemos todo un derroche de los cariños de Dios hacia cada uno de nosotros: ...\"el traje de gala... el manto de triunfo... la corona con sus joyas...\" todas ellas, expresiones, que de alguna manera, nos manifiestan los sentimientos más profundos de todo un Dios hacia los humanos: \"...la alegría del marido con su esposa... la encontrará tu Dios contigo\".", "Nuestra vocación, es una llamada a experimentar y a responder, a este enamoramiento de Dios. A cada uno, se nos puede llamar \"enamorado\". Y nuestra vida tendrá sentido, si de verdad responde a la vida de un \"enamorado\".", "Proclamemos este cántico exteriorizando lo que en este momento vivimos en nuestro interior. Ante este nuestro mundo, frío y desentendido de Dios, \"hoy, más que nunca, necesita de personas vivas\" que le hablen de ese Dios enamorado de los hombres. Ese es nuestro compromiso y esa es también nuestra responsabilidad."], "oracion": ["Señor, no podemos disimular la alegría que sentimos en los primeros momentos de este día. Tu amor hacia nosotros es una realidad tan misteriosa y tan profunda, que llena de sentido nuestra vida.", "Quisiéramos manifestarla a todos los que de alguna manera se encuentren con nosotros y ser tu palabra viva, para que por medio nuestro, todos se encuentren contigo y lleguen a sentir tu amor y tu cercanía. A ti que vives y reinas por los siglos de los siglos."]}, {"ref": "Salmo 145", "sub": "es un himno de alabanza a Dios defensor de los oprimidos.", "amb": ["Somos seres abiertos a la esperanza. Lo necesitamos todo. Pero nuestra gran necesidad es Dios. Necesidad que no podemos ahogar sin que repercuta en lo más profundo de nuestro ser.", "Dios es el único que nos puede \"salvar\", ...\"que mantiene su fidelidad perpetuamente... que hace justicia\"... \"nos guarda... nos libera... nos sustenta... nos ama\"... Aquí esta la raíz de nuestra felicidad, que nos mantiene seguros en medio de tantas dificultades y problemas, que encontramos en nuestro caminar. Por eso podemos decir con verdad \"dichoso a quien auxilia el Dios de Jacob... el que espera en el Señor\".", "En un mundo víctima de la desesperanza, es urgente la presencia de hombres y mujeres que sean sembradores de esperanza.", "Nuestra comunidad es un grupo que ha surgido por fuerza del Espíritu para responder a los grandes retos que nos plantea nuestro mundo. La respuesta a nuestra vocación es respuesta a esos retos. No podemos callar, sin traicionar la llamada del Espíritu.", "Es cierto que el \"Señor reina eternamente\", pero somos nosotros quienes tenemos que anunciar ese reino y hacerlo presente con nuestra vida."], "oracion": ["Señor, tú eres el único capaz de responder a nuestras esperanzas, porque tú mismo eres nuestra \"esperanza\".Eres el Dios \"que mantiene siempre su fidelidad,\" aunque nosotros, a veces, rompamos nuestra fidelidad a ti.", "Por eso, es justo que te alabemos, que te demos gracias y celebremos la alegría de tu fidelidad, que es respuesta a nuestra esperanza. Tú que vives y reinas por los siglos de los siglos."]}], "summary": {"breve": ["Salmo 107: El sentido de la gratitud debe estar presente en el horizonte de nuestra vida.. Todo lo hemos recibido y todo lo estamos recibiendo, gratis, constantemente. Y es que \"la bondad y la fidelidad del Señor es más grande que los cielos\". Es justo que lo reconozcamos y lo agradezcamos.", "Cántico IS.61: Nuestra alegría y nuestro gozo tienen que ser desbordantes, al reconocer el amor sin medida, y los cariños permanentes de Dios hacia nosotros. Comencemos el día reconociéndolo y alegrándonos.", "Salmo 145: Pongamos nuestra confianza en quien se la merece. Sólo el Señor es fiel, es justo... sacia el hambre de los hambrientos, libera a los cautivos y... a todos ama, desinteresadamente. Fundamentemos en él nuestra vida."], "oracion": ["Salmo 107: Proclamar espontáneamente las tres primeras estrofas. Prosigue un solista. La última estrofa y Gloria, todos juntos.", "Cántico IS.61: Cantar al principio y al final \"proclama mi alma la grandeza del Señor, se alegra...\" Y todas las estrofas a dos coros.", "Salmo 145: Un solista la primera estrofa y las restantes a dos coros."], "reflexion": ["Tu bondad es más grande que los cielos…", "Desbordo de gozo, me alegro con mi Dios…", "Alabaré al Señor mientras viva…"]}}, {"key": "oración de la tarde", "label": "Vísperas", "psalms": [{"ref": "Salmo 138, I", "sub": "es un himno de alabanza indi- vidual por la presencia omnímoda del Señor.", "amb": ["La oración de la tarde es una invitación a la paz, a la serenidad, a deshacer tensiones producidas por las diversas ocupaciones que hemos tenido. Y la paz verdadera, el origen de toda paz, es Dios. Por eso cuando le dejamos estar cercano, y le sentimos en lo profundo de nuestro ser, toda nuestra persona se siente sumergida en un mar de paz: DIoS.", "Este salmo 138, no es, pues, el salmo del Dios controlador, sino el salmo del Dios cercano, omnipresente, raíz de nuestro ser: \"en él vivimos, nos movemos y existimos\". Es el salmo del amor, de un amor que no admite distancias. Y siempre, la cercanía del amado, trasmite paz, serenidad, descanso.", "Saboreemos, pues, todas y cada una de las palabras de este salmo 138: \"tú me conoces... sabes lo que pienso... te sabes de memoria todos mis caminos... me cubres con tu palma... vaya donde vaya, siempre me encuentro contigo...\" Todo un programa de las relaciones de Dios, con cada uno de nosotros.", "La oración verdadera, siempre es transformante, nos hace otros. Una comunidad que vive esta cercanía de Dios, desde la verdadera oración, es una comunidad que transparenta alegría, paz... Es una comunidad \"epifanía\" de Dios."], "oracion": ["Señor, no tenemos que recorrer largos caminos para encontrarnos contigo. Vayamos donde vayamos, estemos donde estemos... allí estás tú... amándonos infinitamente", "Lo profundo de nuestra oración, no es decirte palabras, sino sentir el calor de tu abrazo, sin más. Y esta oración sí que nos cambia, nos transforma, nos hace sentirnos otros.", "Reconocemos, Señor, que nuestras ocupaciones nos descentran de ti, porque las realizamos al margen de ti. Queremos vivir nuestra vida, desde tu cercanía, desde el sentirnos sumergidos en ti, que vives y reinas por los siglos de los siglos."]}, {"ref": "Salmo 138, II", "sub": "es un himno de reconoci- miento por la acción misteriosa de Dios.", "amb": ["Tal vez desconocemos las vivencias de nuestras madres cuando nos gestaban en sus entrañas. Pero tuvieron que ser maravillosas. Y es que toda gestación vivida, es un amor que crece, que se intensifica, hasta que llega el gran momento del parto.", "Con nuestras madres, Dios ha vivido, paso a paso, nuestra gestación. Ha soñado con nuestra existencia y ha trazado planes y proyectos sobre cada uno de nosotros, que quiere realizar. Cada día que comenzamos, espera pacientemente nuestra colaboración para que esos sus planes no se frustren.", "Al terminar este día, vivamos el sentido de la gratitud hacia Dios, que así se nos manifiesta. Cada uno, somos fruto de su amor: \"nos ha escogido portentosamente\", como seres humanos, como cristianos y y como Religiosos. Ninguno de nosotros somos fruto del acaso. Todos somos fruto de un amor personal, concreto... a mí... a ti.", "Por eso podemos exclamar con verdad \"¡qué incomparables encuentro tus designios!\". La rutina, de cada día, el despiste...son nuestros enemigos a la hora de vivir todas estas realidades. Espabilemos y no perdamos lo mejor de nuestra vida. Somos inmensamente ricos, y no disfrutamos de nuestra riqueza."], "oracion": ["Señor, ¡con qué ilusión realizaste, en el tiempo, tu plan de amor sobre mí!. Soy fruto de tu amor ilusionado. Como humano...como cristiano...como religioso... \"me has escogido portentosamente\". Gracias por tu elección. Quisiera que mi vida fuera una respuesta permanente a esta tu elección...a tus ilusiones sobre mí", "Una vez más, esta misma noche, golpeas a mi puerta y me invitas a responderte. Quiero hacerlo. Sé que me disculpas cuando te fallo. Una vez más, ¡gracias!. A ti que vives y reinas por los siglos de los siglos."]}, {"ref": "Cántico Col. 1, 12-20", "sub": "es un canto de gra- titud a Cristo, primer resucitado.", "amb": ["Tenemos que reconocer, que Dios es admirable en sus relaciones con nosotros: desde siempre nos ha ideado. En un momento concreto, hemos comenzado a existir, fruto de su acción misteriosa y amorosa. Y ya existiendo, su amor nos envuelve constantemente.", "Pero lo que viene a ser el colmo de todo, es su designio de hacernos capaces de \"compartir en Cristo y con Cristo su misma vida\".", "En este cántico, vamos a dar gracias al Padre por este regalo y vamos a proclamar la gloria y la grandeza de Cristo, nuestra cabeza, conscientes de que en él y desde él, estamos proclamando también, nuestra gloria y nuestra grandeza, como miembros vivos de su cuerpo.", "Estamos en él. Su vida está siendo nuestra vida. Comunión total. Por eso, con verdad podemos gritar: \"demos gracias a Dios Padre\" que nos ha dado ésta capacidad de ser sus hijos en el Hijo.", "Nuestra comunidad debe ser el canto visible, gozoso, a ese Cristo Resucitado que vive en nosotros, y que habla a los hermanos de los designios amorosos de Dios Padre."], "oracion": ["Señor, en esta tarde, te damos gracias, por tus grandes designios sobre nosotros: \"nos has hecho capaces de compartir...\" tu misma vida. En Cristo, nuestra cabeza, te has volcado totalmente, para que en él y desde él, seamos uno en ti. Nos has enaltecido de tal manera, que sobrepasa todo lo que nosotros hubiéramos soñado.", "Queremos reconocer nuestra dignidad y corresponderte. Nuestra vida, vivida con responsabilidad, es la mejor acción de gracias con que podemos agradecerte todo lo que haces por nosotros. Gracias, Señor. A ti que vives y reinas por los siglos de los siglos."]}], "summary": {"breve": ["Salmo 138,I: En Dios \"vivimos, nos movemos y estamos\". La fuerza de su poder es la que posibilita nuestra existencia... Para él somos una persona concreta, única e irrepetible a la que ama como es. Nada de lo que somos y tenemos es ajeno a él.", "Salmo 138,II: Dios ha estado presente en todos los estadios de nuestra existencia. En el seno materno fue tejiendo amorosamente, cada uno de nuestros miembros. Y nos ha escogido portentosamente para ser lo que somos y lo que estamos llamados a ser: sus hijos.", "Cántico CoL.1: Demos gracias a Dios porque nos ha capacitado para entrar en el Reino de Cristo, haciéndonos miembros de su Cuerpo que es la Iglesia. En Cristo fuimos abrazados, desde siempre, por el Padre."], "oracion": ["Salmo 138,I: Un solista proclama \"Señor, tú me sondeas y me conoces\" después de cada una de las estrofas que son proclamadas espontáneamente. Todos juntos el Gloria.", "Salmo 138,II: Son proclamadas, espontáneamente, cada una de las estrofas, repitiendo el grupo, después de cada una de ellas, \"gracias Señor, porque nos has escogido portentosamente\". Todos juntos el Gloria.", "Cántico CoL.1: Lo proclama todo el grupo, despacio, con un fondo musical suave."], "reflexion": ["Señor, tú me sondeas y me conoces…", "me has elegido en el seno materno…", "Nos ha trasladado al reino de su Hijo querido…"]}}]}, {"name": "jueves", "hours": [{"key": "oración de la mañana", "label": "Laudes", "psalms": [{"ref": "Salmo 142", "sub": "es una lamentación angustiosa, reclamando ayuda al Señor.", "amb": ["Estamos comenzando un nuevo día. Y lo hacemos aquí, juntos, en oración. Despertemos y descubramos el sentido de nuestra oración en estas primeras horas del día.", "No es una norma, ni una obligación. Es una verdadera necesidad. Sin Dios, nada tiene sentido. Y nuestra oración, es eso: dar respuesta a nuestra gran necesidad: Dios.", "Lo vamos a expresar reiterativamente en este salmo 142: \"Señor, escucha mi oración... atiende a mi suplica... escúchame... escúchame enseguida...\" Es el grito de todo nuestro ser, que clama por Alguien, como una necesidad vital que tiene que satisfacer: \"escúchame enseguida que me falta el aliento\".", "Por eso, cuando esa necesidad no tiene la respuesta adecuada, o se intenta suplirla con sucedáneos, es todo nuestro ser el que sufre y exterioriza su sufrimiento en sus relaciones con los demás. No podemos relacionarlos bien con los demás cuando por dentro nos sentimos mal.", "En teoría, nosotros nos hemos reunido aquí, porque estamos convencidos de todo esto, y queremos manifestarlo con nuestro estar juntos para orar. Que nuestra oración de esta mañana, sea de verdad oración. No nos engañemos ni engañemos."], "oracion": ["Señor, tú eres el insustituible en nuestra vida. Es todo nuestro ser el que clama por ti con un grito que no se puede ahogar sin que repercuta en lo más profundo de nuestra persona. Tú mismo eres el que ha puesto en nosotros este grito en lo más profundo de nuestra entraña.", "Sinceramente tenemos que confesarte, que no siempre hemos respondido a las exigencias de ese grito. O no lo hemos escuchado ó lo hemos ahogado con sucedáneos engañosos.", "Queremos ser sinceros y comunicarte nuestro deseo de cambio. Tú lo quieres y nosotros lo necesitamos. Tú que vives y reinas por los siglos de los siglos."]}, {"ref": "Cántico Is. 66", "sub": "es una invitación a la alegría por los consuelos que el Señor nos da.", "amb": ["Una invitación a la alegría, en estas primeras horas, es un buen tónico para comenzar a caminar. Los motivos para nuestra alegría, son muchos. El Profeta Isaías nos invita a descubrirlos.", "La nueva Jerusalen es hoy la Iglesia, y más concretamente, nuestra comunidad. Desde ella se nos invita a descubrir el rostro maternal de Dios: \"como un niño a quien su madre acaricia...\"", "Es la presencia maternal de Dios, la que tiene que trasformar nuestras vidas y la vida de nuestra comunidad.. Las caricias de Dios se hacen visibles y sensibles a través del rostro, de la sonrisa, de las manos de nuestros hermanos. Cada uno de nosotros somos el signo visible para que se pueda realizar el sacramento del encuentro con Dios.", "Por eso, de una verdadera comunidad, se puede decir: \"festejad... gozad con ella... alegraos de su grandeza... saciaos de sus consuelos...\"", "Que cada uno de nosotros, pertenecientes a una comunidad, sintamos la responsabilidad de que se cumpla esta profecía del Profeta Isaías. Para eso vivimos juntos y para eso nos ha convocado el Señor."], "oracion": ["Tú, Señor, no nos quieres tristes ni angustiados. Ya desde las primeras horas del día, nos invitas a la alegría. Y tenemos motivos para ello: tus relaciones con nosotros, no pueden ser ni más cercanas, ni más entrañables. Tú eres como una madre que nos lleva en sus brazos y derrocha ternura y amor.. Más cercanía y más calor maternal, no se te puede pedir.", "Que nos dejemos querer y vivamos la alegría de sentirnos queridos, por ti que vives y reinas por los siglos de los siglos."]}, {"ref": "Salmo 146", "sub": "es un cántico que nos invita a proclamar el poder y la bondad del Señor.", "amb": ["Cuando cantamos, parece que todo nuestro ser es una melodía armoniosa que vibra al son de nuestro canto. En nuestra oración de esta mañana, se nos invita: \"alabad, cantad al Señor, que la música es buena... merece una alabanza armoniosa\".", "Cada una de nuestras acciones. de este día, tenía que ser una nota escrita en el pentagrama de las horas, que cantara las bondades y maravillas que Dios realiza en favor nuestro. El se nos presenta como el médico que \"sana nuestros corazones destrozados y venda nuestras heridas\".", "Con razón podemos exclamar: \"nuestro Dios es grande y poderoso\". Es pues justo que \"entonemos la acción de gracias\" y le manifestemos que caemos en la cuenta de lo mucho que suponemos para él.", "Una comunidad, reunida en oración, cada uno de sus componentes, debe sentirse responsable de la oración de sus hermanos: su postura, su palabra, su canto... toda su actitud debe reflejar que se siente como una nota de esa composición musical que es la comunidad... Y en una composición, todas las notas son necesarias, y a todas hay que darle una entonación adecuada para que suene armoniosamente.", "No lo olvidemos, en nuestra oración, nuestros hermanos nos necesitan."], "oracion": ["Señor, al comenzar este día, debiéramos exclamar: \"para ti es mi música\". Tú nos has creado a todos distintos. Pero quieres que seamos como las notas que componen una canción, y que nuestra vida, sea la interpretación de esa canción.", "Queremos corresponder a tus deseos.. Afinaremos nuestra vida para que toda ella interprete y cante esa melodía que tú esperas. Tú que vives y reinas por los siglos de los siglos."]}], "summary": {"breve": ["Salmo 142: Al comenzar este día, nos dirigimos al Señor, con una súplica, casi angustiosa: \"escúchame enseguida que me falta el aliento\". Es la expresión viva de nuestra necesidad de Dios. Hagámoslo de verdad.", "Cántico IS.66: Es una invitación a descubrir los motivos profundos de nuestra alegría, y a celebrarlos. El sentido maternal de Dios es una realidad permanente: \"os consolaré como una madre a su niño\".", "Salmo 146: Hagamos de nuestra vida un canto que proclame la bondad de Dios: \"alabad, cantad al Señor, que la música es buena\". Que las horas de este día sean un pentagrama con las notas de nuestras acciones, que canten lo bueno que es Dios con nosotros."], "oracion": ["Salmo 142: Cantar la primera estrofa al principio y al final: \"Señor, escucha mi oración...\" y proclamar espontáneamente cada una de las estrofas.", "Cántico IS.66: Un solista proclama las dos primeras estrofas y otro, las restantes.", "Salmo 146: Un solista proclama la primera estrofa y el resto todo el grupo alternando a dos coros."], "reflexion": ["Tengo sed de ti como tierra reseca…", "os consolaré como un niño a quien su madre consuela…", "Tocad la cítara para el Señor…"]}}, {"key": "oración de la tarde", "label": "Vísperas", "psalms": [{"ref": "Salmo 143, I", "sub": "es una súplica comunitaria de bendición y de admiración.", "amb": ["Desde nuestros planteamientos humanos tiene sentido que nos preguntemos: \"¿qué es el hombre para que te fijes en el?\" Pero los planteamientos de Dios no son, ni mucho menos, como los nuestros. Dios actúa desde horizontes muy distintos. Es su amor desbordante el que le mueve en sus relaciones con nosotros. El es nuestro gran \"bienhechor... nuestro refugio... nuestro baluarte donde nos resguardamos.\"", "Al terminar el día, es muy relajante, sentirse valorado, comprendido, amado... por aquel que lo es todo, que es el origen y el principio de cuanto existe, que con su omnipotencia sostiene el universo y cuanto contiene. El ha cuidado, amorosamente ,durante este día, de todos y cada uno de nosotros, buscando nuestro bien, nuestra felicidad. Así es nuestro Dios. Por eso la oración de esta tarde: \"bendito el Señor, mi roca\".", "Al proclamar este salmo, debemos sentirnos importantes para Dios, pues lo somos. Y no por nuestros méritos. Sino únicamente por su bondad y por su misericordia, que son infinitas.", "El optimismo debe ser una de las notas características de nuestra de nuestra vida, frente a pesimismos inhibidores que nos impiden crecer como hijos de Dios."], "oracion": ["Señor, tenemos que reconocer que en verdad eres nuestro \"bienhechor\"... nuestro todo. Aunque somos unas pobres criaturas, tú no te avergüenzas de bajarte hasta nosotros, y demostrarnos que somos muy importantes para ti. De verdad que nos has tomado en serio y continuamente nos lo están manifestando. Al terminar este día , queremos reconocerlo y agradecértelo. Por eso, te queremos decir, con todo nuestro ser: :\"bendito el Señor, mi Roca...\" Tú que vives y reinas por los siglos de los siglos."]}, {"ref": "Salmo 143, II", "sub": "es una súplica pidiendo auxi- lio frente a los enemigos.", "amb": ["Dios siempre está de nuestra parte. Su fidelidad es inmutable, aunque tope con nuestras infidelidades. Por eso sus bendiciones sobre nosotros nunca cesarán: \"silos repletos... rebaños a millares... frutos abundantes...\". Es más: él nos defiende de \"la espada cruel\"... y de todos los que la tienen tramada contra nosotros.", "Concluir este día, teniendo delante lo que Dios ha hecho, y está haciendo en favor nuestro, es para decirle con todo nuestro corazón \"Dios mío, te cantaré un cántico nuevo\"... \"tocaré para ti el arpa\"...", "Necesitamos cultivar nuestro sentido de la gratitud hacia Dios, como una nota dominante en nuestra vida. Basta considerar todo lo que Dios es para nosotros y todo lo que nosotros somos para Dios: todo un abismo de bondad, de misericordia y de amor. Por eso podemos decir con verdad: \"Dichoso el pueblo cuyo Dios es el Señor\". Y nosotros somos su pueblo, con un destino y unas responsabilidades que no podemos eludir. Por medio nuestro quiere hacerse visible y hablar a otros pueblos que le ignoran ó no le reconocen como el único Dios. Nuestra comunidad debe asumir su destino y sus responsabilidades, como respuesta a una elección y a unos compromisos."], "oracion": ["Dios mío, cantaré y tocaré para ti. Tú, te lo mereces todo. Nos defiendes y nos cuidas... nos colmas de favores en todo momento. Por eso nos sentimos dichosos y no podemos menos de cantarte un cántico nuevo que proclame tus bondades permanentes con nosotros. Tú eres nuestro Dios y nosotros tu pueblo. Nos has elegido y te hemos dado la respuesta a tu elección.", "Que nuestra vida discurra impregnada por estas realidades. Tú que vives y reinas por los siglos de los siglos."]}, {"ref": "Cántico Ap. 11", "sub": "es un canto de gratitud a la justicia y a la bondad de Dios.", "amb": ["Estamos sumergidos en una lucha permanente. Son muchos los que atentan contra nosotros. Nuestra vida, tiene que molestar, si intentamos ser \"luz\" y ser \"sal\". Pero no temamos. Hay alguien que ha vencido todas las fuerzas del mal, y lucha con nosotros. Tenemos la herencia de muchos hermanos nuestros que han luchado en los mismos campos que nosotros, y todos han vencido.", "Por eso, nuestra alegría tiene que ser la nota que predomine y manifieste de quién nos fiamos y en quién hemos puesto toda nuestra confianza. \"El reinado de nuestro Dios ya ha comenzado\". Nos hemos comprometido con vivirlo y extenderlo. No debemos fallar. Nos esperan grandes multitudes, porque nos necesitan. El testimonio de nuestra vida, les orientará y les animará a seguir nuestro ejemplo. Por eso \"estamos alegres\" y damos gracias al Señor Dios omnipotente\" que ha puesto en nosotros su confianza.", "Nuestra comunidad debe ser un punto de referencia para todos aquellos que necesitan una luz que ilumine su vida, en los momentos de duda, de desaliento, de oscuridad. Es exigencia de una vocación a la que hemos respondido."], "oracion": ["Señor, tú eres el de \"siempre\"...\"el inmutable\"...\"el Dios fiel\".. el que ha firmado con sangre, un pacto, que no puede fallarnos. Pacto de fidelidad... de ayuda desinteresada... de estar siempre de nuestra parte en todas nuestras luchas. Por eso te damos gracias y te manifestamos la alegría que sentimos por tu fidelidad. Que nuestra fidelidad, no rompa con tu fidelidad. A ti que vives y reinas por los siglos de los siglos."]}], "summary": {"breve": ["Salmo 143,I: Aunque somos sus criaturas, somos importantes para Dios. Desechemos pensamientos pesimistas que nos impiden ver esta realidad. El, siempre es \"nuestra roca...nuestro escudo...nuestro bienhechor\"... Podemos confiar plenamente en él.", "Salmo 143,II: A pesar de nuestras posibles infidelidades para con él, Dios, siempre permanece fiel. Nunca se cansa de realizar grandes obras en favor nuestro. La gratitud, debe ser la nota que nos caracterice siempre.", "Cántico AP.11: Hay Alguien que nos ha incorporado a él y que ha vencido todas las fuerzas del mal. Su victoria es nuestra victoria. Su fuerza es nuestra fuerza. Démosle gracias y vivamos alegres, pues no luchamos solos."], "oracion": ["Salmo 143,I: Un solista proclama las dos primeras estrofas. Continúa el grupo al unísono con las tres siguientes.", "Salmo 143,II: Un solista proclama las dos primeras estrofas. Continúa el grupo al unísono con las tres siguientes.", "Cántico AP.11: Es proclamado por todo el grupo, con un fondo musical suave."], "reflexion": ["Bendito el Señor mi escudo y mi refugio…", "Dichoso el hombre cuyo Dios es el Señor…", "Estad alegres los que moráis en sus tiendas…"]}}]}, {"name": "viernes", "hours": [{"key": "oración de la mañana", "label": "Laudes", "psalms": [{"ref": "Salmo 50", "sub": "es una invitación a aceptar el abrazo paternal de Dios.", "amb": ["Es gratificante comenzar un nuevo día reconociendo que Dios es compasivo, misericordioso... todo un Padre. Por eso, no tienen sentido nuestros pesimismos en nuestras relaciones con él. Es el Padre, que a pesar de nuestros fallos, siempre está dispuesto a perdonarnos, a \"cubrirnos de besos\", a celebrar la fiesta del perdón, haciendo suya la alegría de nuestro arrepentimiento. Solo nos pide un \"corazón sincero\"... deseos verdaderos de conversión, para llegar a sentir su abrazo caliente de Padre. Así es como sentiremos \"el gozo y la alegría\" verdaderos, que lleguen a empaparnos de un bienestar que sobrepasa toda experiencia humana.", "A Dios no le agradan las caras largas, ni los sacrificios vacíos. Le gustan los corazones abiertos, los espíritus agradecidos, los que están dispuestos a agradecer desde su apertura para recibir.", "Cada viernes, es una llamada de Dios Padre, a sentirle como Padre y a planificar nuestra vida desde la correspondencia a su amor. En el Crucificado nos lo dió todo y nos lo dijo todo. Y recordarlo en un día como hoy, es volver a decirnos la gran palabra de su amor.", "Que nuestra comunidad profundice en este misterio, y lleve a la vida, la única respuesta que da sentido a nuestra existencia."], "oracion": ["Señor, descubrir tu rostro de Padre y vivir en consecuencia, debe ser nuestra tarea de todos los días. Así, estaremos viviendo la vida desde su verdadera perspectiva.", "Tú nos conoces. Sabes que somos de barro. Nos comprendes. Nos disculpas. Tu abrazo de perdón y de amor, es la respuesta que siempre tienes a mano, en tus relaciones con nosotros.", "Queremos corresponderte en todo momento. Vivir la alegría de tu abrazo, y comunicar a nuestro mundo tu verdadero rostro. A ti que vives y reinas por los siglos de los siglos"]}, {"ref": "Cántico Tb. 13", "sub": "es un cántico de gratitud por la acción liberadora de Dios.", "amb": ["El comportamiento de Dios con nosotros, siempre es desde la gratuidad y el amor. Aunque no encuentre una respuesta positiva, él, siempre se mantiene fiel... paciente... esperándonos.", "Somos la nueva Jerusalén, que él ha reconstruido, y en la que habita como lugar de sus complacencias. miles de generaciones nos bendecirán porque a través de nuestra vida, el Resucitado se está haciendo visible al mundo. Nuestro compromiso con los pobres, los desterrados, los inmigrantes, con todos los rechazados por nuestra sociedad consumista, será un reclamo, para los que nos vean \"alaben al Señor... y le den gracias\". Somos la \"luz esplendente que ilumina... que atrae a todos al encuentro del Señor\".", "Nuestra gratitud debe ser la respuesta a la elección que Dios ha hecho sobre nosotros, \"bendice alma mía al Señor\"... \"Da gracias al Señor como es debido\"... Hemos sido elegidos \"su templo para siempre\"...\"donde todos se reunirán para bendecir al Señor del mundo\".", "Nuestra comunidad debe tomar conciencia de su elección y responder, en todo momento, a los designios de Dios sobre ella, viviendo el sentido de la gratitud."], "oracion": ["Señor, tú quieres morar en templos vivos, de carne y hueso, que te acepten y quieran hacer de su vida una respuesta de amor y gratitud.", "Nosotros, un día descubrimos tu deseo y nos comprometimos públicamente a responderte. Queremos serte fieles siendo luz y punto de atracción para cuantos nos contemplen. Que todos, al vernos, puedan decir de nosotros: \"Dios tiene aquí su morada\". Tú que vives y reinas por los siglos de los siglos."]}, {"ref": "Salmo 147", "sub": "es una acción de gracias por la acción permanente de Dios.", "amb": ["Las acciones del Dios son una continua manifestación de su sabiduría y de su poder. El es el Señor de la nieve y de la escarcha, del hielo y del frío... de toda la creación. Toda ella, es la palabra que nos habla desde su silencio y nos transmite mensajes de amor.", "Nuestra actitud de alabanza a Dios, es la actitud que define al hombre creyente: \"alaba a tu Dios... te ha bendecido... ha puesto paz... te sacia con flor de harina\"... Así se comporta Dios en todo momento con nosotros.", "Si nos detenemos a pensar en nuestra vida personal, tenemos que exclamar con verdad: \"con ninguna nación obró así\". Cada uno, somos únicos e irrepetibles ante Dios. Podemos decir, que después de crearnos, rompió el molde.", "Las maravillas, realizadas en favor nuestro, son innumerables. Cada día, cada hora, cada instante... toda nuestra vida, es un regalo amoroso de su bondad.", "Por eso, no hacemos nada de más, si en esta mañana lo reconocemos y exclamamos rebosantes de alegría: \"glorifica al Señor... alaba a tu Dios... que te ha bendecido... ha puesto paz en tus fronteras...\"", "Que la proclamación de este salmo 147 nos despierte y nos haga vivir en gratitud permanente hacia Dios, por sus desvelos hacia nosotros."], "oracion": ["Señor, tu poder es universal. Nada se escapa a tu influencia. en todo lo que existe. Todo nos habla de ti: la lluvia, la nieve, el hielo, la escarcha... Todos son mensajeros de tu belleza, de tu sabiduría, de tu poder, de tu grandeza.... de ti..", "Que sepamos escucharte. Que te vayamos descubriendo y conociendo, con mayor profundidad, para que nuestras vidas sean más coherentes, más comprometidas, y más testimoniantes. Tú que vives y reinas por los siglos de los siglos."]}], "summary": {"breve": ["Salmo 50: Descubrir a Dios como Padre y sentir el calor de su abrazo. A eso nos invita este salmo 50. Dios busca en nosotros un corazón sincero y agradecido para que podamos saborear \"la alegría de la salvación\". Sus brazos abiertos en Cristo están siempre dispuestos al perdón.", "Cántico TB.13: El comportamiento de Dios con nosotros es muy distinto del que nosotros tenemos con él. Por eso, \"démosle gracias al Señor como es debido\" y vivamos la alegría de nuestra liberación.", "Salmo 147: Como creyentes que somos, nuestra actitud ante Dios, tiene que ser siempre de admiración y de alabanza. Sus acciones a favor nuestro, son permanentes. Todos podemos decir \"soy único para Dios\"."], "oracion": ["Salmo 50: Forma responsorial: espontáneamente las estrofas y después de cada una de ellas \"devuélvenos la alegría de la salvación\". Todos, el Gloria .", "Cántico TB.13: Cantar como antífona, al principio y al final \"a Dios den gracias los pueblos...\" y las estrofas proclamadas a dos coros.", "Salmo 147: Cantado o proclamado por un solista."], "reflexion": ["mi boca proclamará tu alabanza…", "Que todos alaben al Señor…", "Con ninguna nación obró así…"]}}, {"key": "oración de la tarde", "label": "Vísperas", "psalms": [{"ref": "Salmo 144, I", "sub": "es un himno de alabanza a la grandeza de Dios.", "amb": ["Nuestra oración de la tarde, debe ser una oración de gratitud. Estamos concluyendo un día más. Y seguro que hemos recibido mucho: de Dios y de los hermanos", "En este salmo 144 ponderaremos, reiterativamente, las hazañas del Señor en favor nuestro, para que brote espontánea nuestra gratitud hacia él: \"...Yo repito tus maravillas... narro tus grandes acciones... que hablen de tus hazañas... una generación pondera tus obras, cuenta tus hazañas...\"", "Es lógico, pues, que tengamos expresiones de gratitud: \"día tras día te bendeciré y alabaré por siempre jamás... que todas las criaturas te den gracias... te bendigan... proclamen tu gloria... \"", "Nuestra vida debe desarrollarse entre el recibir y el agradecer, para seguir recibiendo. Radicalmente, somos pobres, necesitados. Son otros los que tienen que venir en nuestra ayuda. Dios es el primero, y se vale de nuestros hermanos para prolongar su tarea.", "La comunidad es un campo propicio para cultivar estas realidades. La verdadera vida fraterna debe ser un continuo dar-recibir y... agradecer. Nos debemos totalmente los unos a los otros. Para eso vivimos en comunidad. El egoísmo, la ingratitud... no tienen sentido en la vida comunitaria."], "oracion": ["Señor, si repasamos todos nuestros días, concretamente éste que estamos finalizando, tenemos que reconocer tus maravillas, tus grandes hazañas realizadas en favor nuestro.", "Ojalá toda nuestra vida fuera un \"gracias\" permanente. Tenemos que reconocer que con cierta frecuencia, las ocupaciones, la rutina, etc. nos dificultan vivir el sentido de la gratitud. En esta tarde, queremos renovarlo, y hacernos más sensibles a tantas cosas que haces por nosotros. A ti que vives y reinas por los siglos de los siglos."]}, {"ref": "Salmo 144, II", "sub": "es una oración confiada de gratitud por los favores del Señor.", "amb": ["Nuestra vocación implica un compromiso de hacer de nuestra vida una búsqueda permanente de Dios: Conocerle, experimentarle, vivirle, amarle... debe ser nuestra gran ocupación.", "En este salmo 144, vamos a proclamar algunas de las manifestaciones de Dios, que nos ayudarán a profundizar y a vivir:\"El Señor es fiel... es bondadoso... es justo... escucha los gritos de sus fieles... satisface sus deseos... \"", "Seguro que si nos hacemos sensibles a todas estas manifestaciones, podremos decir con verdad: \"sentimos que el Señor está cerca de los que le invocan\"... y disfrutaremos de la paz y serenidad que necesitamos, después de una jornada de trabajo. Siempre el encuentro con Dios, es revitalizante, es una fuerza nueva, que nos transforma y nos rejuvenece.", "Que nuestra comunidad, sea una voz que proclama con la vida, todo lo que dice con palabras. Así seremos invitación para que \"todo viviente bendiga al Señor, por siempre jamás\".", "La experiencia de Dios, es lo que mueve nuestra vida. Nuestra vocación es respuesta a esa experiencia. Experimentamos, y vimos que merecía la pena, poner en juego toda nuestra vida. Y estamos convencidos de que se está cumpliendo en nosotros, que el Señor \"sacia de favores a todo viviente\" y \"satisface los deseos de todo viviente\". Nosotros somos testigos de ello."], "oracion": ["Señor, no tenemos palabras para proclamar tu bondad, tu fidelidad, tu justicia... tu amor. Siempre que intentamos alabarte, agradecerte, somos conscientes de que nos quedamos a una distancia infinita de lo que tú mereces.", "Pero tú, Señor, aceptas nuestros balbuceos y comprendes nuestras limitaciones. Eres nuestro Padre, y sabemos, que cuando ves nuestra buena voluntad y nuestros deseos sinceros, no nos pides más. Sencillamente, te alegras y sonríes. Gracias, Padre. A ti que vives y reinas por los siglos de los siglos."]}, {"ref": "Cántico Ap. 15", "sub": "es un canto lleno de admi- ración por las obras de Dios.", "amb": ["La capacidad de sorpresa, de admiración, nos enriquece, y es fuente de alegría para aquellos que saben cultivarla. Y es que son muchas las realidades que, nos llegan , como regalos de los demás. De Dios el principal y el primero. De nuestros hermanos, después. Descubrir, valorar y aceptar, nos va a exigir que estemos abiertos, para que no se nos pasen desapercibidos.", "Este cántico, que vamos a proclamar, nos invita a despertar, a abrir los ojos, y ver la multitud de obras que Dios ha hecho y está haciendo en favor de todos y de cada uno. No debemos proclamarlo rutinariamente, sino conscientes de lo que decimos y como expresión de nuestra capacidad admirativa.", "\"Grandes y maravillosas son tus obras, Señor\"... obras en el conjunto de toda la creación, y obras, sobre todo, en sus relaciones personales e íntimas, con cada uno de nosotros.", "Podemos afirmar, que nuestra historia personal, es una verdadera \"historia sagrada\": Dios y nosotros, nosotros y Dios. ¿Quién no glorificará tu nombre? Todas las naciones, todos los pueblos, todos los humanos, debemos cantar y proclamar que el Señor es grande en todo lo que hace: \"sus caminos son justos y verdaderos\"", "Estamos en las últimas horas del día. Continuemos abiertos a las sorpresas de Dios."], "oracion": ["Señor, de verdad tenemos que decirte que \"son grandes y maravillosas todas tus obras\". Nuestro vivir rápido, sin apenas tiempo para la reflexión, nos impide caer en la cuenta de ello.", "En el silencio de esta tarde, te manifestamos nuestro deseo de aumentar nuestra capacidad de sorpresa, para descubrirte en el trasfondo de todo lo que haces. Gracias, Señor, por tus obras. A ti que vives y reinas por los siglos de los siglos."]}], "summary": {"breve": ["Salmo 144,I: Si examinamos detenidamente, las acciones de Dios en favor nuestro, no podemos menos de exclamar con alegría: \"te ensalzaré y bendeciré por siempre jamás.\" Y además, nos sentiremos impulsados a invitar a todos para que se unan a nosotros.", "Salmo 144,II: La fidelidad, la justicia, la bondad de Dios, son realidades patentes, que cualquiera las puede ver. Con verdad, podemos y debemos decir que \"todos los vivientes bendigan al Señor.\"", "Cántico AP.15: Vivamos nuestra capacidad de sorpresa ante las obras de Dios. Con sentido de admiración, proclamemos, conscientemente, qué \"grandes y maravillosas son tus obras, Señor\""], "oracion": ["Salmo 144,I: proclama las dos primeras estrofas, un solista. Las restantes a dos coros.", "Salmo 144,II: proclamado a dos coros.", "Cántico AP.15: Cantar la primera estrofa y proclamar al unísono la segunda y Gloria."], "reflexion": ["El Señor es bueno con todos…", "Cerca está el Señor de los que le invocan…", "Grandes y maravillosas son tus obras, Señor…"]}}]}, {"name": "sábado", "hours": [{"key": "oración de la mañana", "label": "Laudes", "psalms": [{"ref": "Salmo 91", "sub": "es una oración personal de grati- tud por la bondad de Dios.", "amb": ["Comenzamos un nuevo día. Y no podemos hacerlo distraídos, sin caer en la cuenta de lo que pasa en nuestro entorno, de lo que sucede en la realidad de nuestra vida. Hay \"alguien\" que es la raíz de nuestra existencia, de nuestro vivir. Es la mano misteriosa que dirige todas nuestras acciones: Dios nuestro Padre. Descubrirlo, reconocerlo y agradecerlo es la postura que debemos adoptar.", "Por eso, en este salmo 91, diremos: \"es bueno dar gracias al Señor... tocar arpas... laúdes... arpegios de cítaras... proclamando por la mañana tu misericordia y de noche tu fidelidad...\"", "Si a lo largo de este día tenemos los ojos abiertos y sabemos descubrir las acciones y obras del Señor, seguro que necesitaremos gritar, llenos de alegría: \"¡Qué magníficas son tus obras, Señor! ¡Qué profundos tus designios...!\" Solamente \"los necios y los ignorantes, no los entienden\"... ni caen en la cuenta de ello.", "Tal vez nosotros mismos, hemos engrosado las filas de los necios y de los ignorantes y en ocasiones no hemos descubierto el rostro de Dios que se nos manifiesta en todas sus obras.", "Que la proclamación de este salmo 91, sea una llamada a rectificar y a ser conscientes de todo lo que nos rodea."], "oracion": ["Señor, tenemos que seguir descubriendo lo que tú eres en nuestra vida, y actuar en consecuencia. Nuestro vivir, no tiene sentido desde la rutina y desde la inconsciencia. Hemos sido llamados y nos hemos comprometido con esa llamada: descubrirte en tus obras y en tus acciones. No debemos fallarte. Tú te lo mereces y nosotros lo necesitamos. Así llenaremos de sentido y de alegría nuestra vida. Tú que vives y reinas por los siglos de los siglos."]}, {"ref": "Cántico Ez. 38", "sub": "es una manifestación de los deseos de renovación en todo ser humano.", "amb": ["Nosotros no creemos en un Dios lejano, desentendido de todo lo nuestro. Creemos en un Dios cercano, interesado por todo lo que nos interesa. Cariñosamente podíamos decir, que creemos en un Dios que no puede vivir sin nosotros.", "Por medio del profeta Ezequiel, nos manifiesta todo lo que nos desea: \"nos reunirá... nos renovará... nos dará un corazón nuevo... nos infundirá un espíritu nuevo... seremos su pueblo y él será nuestro Dios....\" Todo un programa que Dios se ha trazado, fruto de su amor, y que lo realizará si colaboramos con él.", "Este cántico, proclamado en los comienzos de un nuevo día, debe llenarnos de alegría, y abrirnos a un compromiso serio, en nuestras relaciones con Dios. Sería una contradicción que Dios, así se interese por nosotros, y que no encuentre una respuesta positiva por nuestra parte.", "Que la proclamación de este cántico, no se nos quede en meras palabras que pronunciemos, sin más. Sino que sea una llamada a concienciar una gran realidad: Dios enamorado de cada uno de nosotros."], "oracion": ["Señor, sorprendidos y admirados, queremos decirte en esta mañana:¡Gracias por tu amor! Gratuitamente nos creaste y gratuitamente estás pendiente de nosotros. Desde tu amor que no conoce límites, te comprometes en nuestra transformación con la fuerza de tu Espíritu que mora en nuestra misma entraña.", "Que siempre encuentres una respuesta y una acogida por nuestra parte. Que no te defraudemos en la vida de cada día. Que sea verdad: \"Vosotros seréis mi pueblo y yo seré vuestro Dios\" Tú que vives y reinas por los siglos de los siglos."]}, {"ref": "Salmo 8", "sub": "es una invitación a vivir admirados por la grandeza del ser humano.", "amb": ["Necesitamos seguir desarrollando, nuestra capacidad de sorpresa, al contemplar las maravillas que Dios ha puesto en nuestro mundo: el sol, la luna, las estrellas... los mares con la variedad de sus peces... la tierra con todas sus plantas, sus flores, sus frutos... Pero sobre todo, al contemplar la gran maravilla del ser humano, con sus potencias y sentidos, su alma y su cuerpo, su vida de hijo de Dios", "Es más: casi podíamos decir que Dios se ha desbordado cuando nos ha dado la capacidad de ser sus hijos... participando de su misma vida.", "Con este salmo podemos exclamar: \"¿qué es el hombre para que te acuerdes de él? ... lo hiciste poco inferior a los ángeles... le diste el mando sobre todo lo creado\".", "En el orden personal, cada uno de nosotros, si reflexionamos atentamente sobre nuestra vida, podemos exclamar: ¿qué he hecho yo para que Dios se haya portado conmigo tan maravillosamente? ... ¿cuáles son mis méritos para que Dios se haya volcado en mí? ... Y tenemos que reconocer: todo ha sido y es gracia, regalo, fruto de un amor que no tiene límites."], "oracion": ["Señor, ¡qué admirables eres en todas y cada una de tus obras!", "Pero sobre todo, qué admirable en tu obra, la criatura \"hombre\"... en cada uno de nosotros. Nos has creado y nos has levantado a la dignidad de ser tus hijos ... tu misma vida corre por nuestras venas.", "Que nuestra admiración y nuestra sorpresa, nos lleve a corresponder a tu generosidad, a tu amor. Que no nos rebajemos y renunciemos a tan gran honor. Que nos sintamos orgullosos de nuestra categoría de ser tus hijos. Tú que vives y reinas por los siglos de los siglos."]}], "summary": {"breve": ["Salmo 91: Siempre debemos dar gracias al Señor proclamando por la mañana su misericordia y de noche su fidelidad. Solamente los necios y los ignorantes, no son capaces de reconocerlo. Que no caigamos nosotros en esa necedad e ignorancia.", "Cántico Ez.36: Las delicadezas de Dios con nosotros, son permanentes: \"os reuniré... os purificaré... derramaré un espíritu nuevo... os daré un corazón nuevo...\" Facilitemos la acción de Dios. Dejémosle libre para que su amor se nos manifieste.", "Salmo 8: Dios es admirable por todo y en todo. Pero sobre todo lo es, en el ser humano. Ahí sí, su generosidad y su amor se desbordaron. No podía hacer más de lo que ha hecho. Sintámonos sanamente orgullosos y correspondamos"], "oracion": ["Salmo 91: Cantar como antífona, al principio y al final \"es bueno dar gracias al Señor...\"y proclamar las estrofas espontáneamente.", "Cántico Ez.36: Proclamado por un solista. Al final cantar todos \"oh Señor, envía tu Espíritu....\"", "Salmo 8: Cantarlo todo. o cantar la primera estrofa al principio y al final, y proclamar todos las estrofas."], "reflexion": ["Tus acciones, Señor, son mi alegría…", "os daré un corazón nuevo…", "Señor, qué admirable es tu nombre en toda la tierra…"]}}]}]}], "feasts": [{"key": "virgen", "label": "Fiestas de la Virgen", "hours": [{"key": "oración de la tarde I", "label": "Vísperas I", "psalms": [{"ref": "Salmo 112", "sub": "himno de alabanza al Señor que se acerca a nuestro mundo en María.", "amb": ["Siempre hay motivos para alabar y bendecir al Señor. Desde \"la salida del sol hasta su ocaso\", es constante su acción providencial sobre toda la obra de la creación. Podemos decir admirados y agradecidos: \"¿quién como el Señor Dios nuestro?\". Siendo Dios, no se siente rebajado al acercarse a todos y cada uno de nosotros.", "Hoy, en esta tarde, celebramos festivamente su acercarse a María, humana como nosotros y la \"levanta para sentarla\" en lo más alto: tomará carne de su carne y será su Madre. Por ella y en ella Dios será \"emmanuel\" para siempre. En Jesús será nuestro Dios y nuestro hermano.", "Ella, Virgen, será también la \"madre feliz\" de hijos engendrados por la fuerza del Espíritu. Comenzó una maternidad que duraría para siempre.", "Con este salmo 112, alabamos y bendecimos al Señor, rebosantes de alegría por hacérsenos tan cercano en la persona de María."], "oracion": ["Señor, te bendecimos y te alabamos porque te acercas a nosotros y de alguna manera te haces visible. En María nos has manifestado \"tu rostro maternal\", el amor que nos tienes.", "No te desdeñas de rebajarte y mirarnos muy de cerca, tomando nuestra misma carne de las entrañas de María. La has engrandecido a ella, y por ella nos has engrandecido a nosotros.", "Te damos gracias a ti que vives por los siglos de los siglos."]}, {"ref": "Salmo 147", "sub": "canto de acción de gracias al Señor, por María.", "amb": ["Vamos a terminar un día más. Pero es un terminar cargado de alegría. En nuestra oración de mañana nos acercaremos, de una manera especial, a alguien que significa mucho para Dios y para nosotros. Nos acercaremos a María en su fiesta.", "Su existencia es el gran regalo que Dios a la humanidad. Por eso, ya de víspera, nos alegramos y celebramos este regalo haciendo nuestra la invitación de este salmo 147: \"glorifica al Señor, …alaba a tu Dios…\" que en María, \"nos ha bendecido... y ha puesto paz en nuestras fronteras… nos sacia con flor de harina\"… dándonos lo que más necesitábamos: a Dios hecho hombre.", "Desde nuestro ser sorprendido y agradecido, podemos exclamar: \"con ninguna nación obró así…\" Y es que los comportamientos de Dios son personalizados. Cada uno de nosotros somos únicos e irrepetibles para él. Lo fue María y lo somos nosotros.", "Glorifiquémosle y alabémosle con este salmo 147."], "oracion": ["Señor, te admiramos y te alabamos por la obra de la creación. Pero en esta tarde queremos hacerlo de una manera especial por una de tus obras más maravillosa: María.", "La hiciste grande para ti, para que fuera también grande para nosotros.", "En ella y por ella, nos dijiste y nos diste tu Palabra de amor: Jesús. Gracias a ti que vives y reinas por los siglos de los siglos."]}, {"ref": "Cántico Ef. 1, 10", "sub": "es el canto de la elección desde el amor.", "amb": ["Nos cuesta convencernos y asimilar la relación profunda y única que Dios mantiene con cada uno de nosotros. Casi la vemos como una utopía, algo que se sale de nuestras categorías.", "Pero la realidad está ahí: Dios nos ha elegido y amado desde siempre, y nos ha destinado a ser sus hijos. Humanos con un destino divino y eterno. Ese es su proyecto de amor sobre nosotros.", "María, es la palabra visible que nos confirma en la verdad de ese proyecto. Mujer humana como nosotros, pero totalmente llena de Dios.", "En esta tarde, llenos de alegría, proclamamos este cántico que fue realidad en María y que lo será también en nosotros, si como ella, nos abrimos a la acción del Espíritu: \"bendito sea Dios que nos ha bendecido con toda clase de bienes\".", "Que la celebración de esta fiesta mariana, nos acerque a los misterios del amor de Dios, manifestados en María."], "oracion": ["Señor, gracias por María. Gracias por la \"palabra\" que nos has dicho por medio de ella: lo que hiciste en María es lo que quieres hacer en nosotros. Nos llenarás de ti, seremos tus hijos por la fuerza del Espíritu y por la colaboración misteriosa de María.", "Que colaboremos con ella dejándola ser Madre nuestra.", "Gracias a ti que vives por los siglos de los siglos."]}], "summary": {"breve": ["SaLMo 112: alabamos y bendecimos al Señor porque no se ha desdeñado en acercarse a nosotros. Se acercó a María y la levantó a la mayor dignidad: Madre de Cristo y \"madre feliz de hijos\": Madre nuestra. SaLMo 147: Somos la nueva Jerusalén sobre la que Dios se ha prodigado. María es la señal de los prodigios de Dios sobre nosotros. En ella todos \"hemos sido bendecidos\" copiosamente. CáNtICo Ef.1: Proclamamos nuestra alegría al sentirnos elegidos, amados por Dios desde siempre. Somos proyecto de Dios. En María se realizó plenamente este proyecto, para ella y para nosotros."], "oracion": ["SaLMo 112: un solista invita a la alabanza con las dos primeras líneas y continúa todo el grupo con el resto del salmo. SaLMo 147: forma responsorial, todo el grupo repite las dos primeras líneas, y cada estrofa es proclamada por solistas espontáneos, que proclama el resto de las estrofas. CáNtICo Ef.1: es proclamado al unísono por todo el grupo con un fondo musical suave."], "reflexion": ["como madre feliz de hijos", "ha bendecido a tus hijos dentro de ti", "nos eligió antes de crear el mundo\""]}}, {"key": "oración de la mañana", "label": "Laudes", "psalms": [{"ref": "Salmo 62", "sub": "expresa la necesidad más profun- da de todo ser humano.", "amb": ["La estructura más profunda de todo ser humano, es un clamor por Dios. Estamos hechos para necesitarle. Y lógicamente buscamos el modo de llenar esa necesidad.", "Este salmo 62 es el salmo que nos define: \"los necesitados de Dios\". Por eso le buscamos como el que busca calmar su sed : \"mi alma está sedienta de ti… como tierra reseca, agostada, sin agua…\" Esa tiene que ser nuestra actitud permanente: \"toda mi vida alzaré las manos invocándote\".", "María ha sido la mujer que ha vivido con todo su ser, esta actitud frente a Dios: necesitada de Dios, sedienta de Dios, toda su persona fue un grito por él. Y Dios le respondió: toda ella es la empapada de Dios, la \"llena de Gracia\".", "Celebrar a María, es celebrar a todo ser humano en sus necesidades básicas, es celebrar a Dios que se acerca para llenar esa necesidad.", "Como María, que seamos los \"sedientos\" de Dios… los \"buscadores\" de Dios."], "oracion": ["Señor, has sido sorprendente al crearnos necesitados de ti, y lo sigues siendo al calmar tú mismo esa nuestra necesidad. Nos creaste con sed, y nos das el agua para saciarla. Tú mismo eres nuestra agua.", "María fue la mujer, toda ella sedienta de ti, que no bebió nunca en otras fuentes. Por eso pudiste llenarla totalmente.", "Que como María, nosotros te descubramos como nuestra única y verdadera fuente, y bebamos en ti esa agua que necesitamos. Tú que vives y reinas por los siglos de los siglos."]}, {"ref": "Cántico Dn", "sub": "es una reiterada invitación a bendecir a Dios por sus obras.", "amb": ["Dios, el invisible, ha querido hacerse visible en toda la creación. Cada una de sus obras, es una palabra que nos habla de su sabiduría, de su poder, de su grandeza… de su amor. Saber escuchar esa palabra y responderle es la tarea que nos espera, si de verdad queremos vivir la realidad de nuestra vida.", "Pero si debemos bendecir, alabar, agradecer a Dios toda la obra de la creación, hoy, de una manera especial, debemos fijarnos en la más maravillosa de sus obras: María. Ella sí que es el novamás de todas sus obras.", "Y le bendecimos por ella misma, y por lo que es para nosotros: Madre. Dios la llenó totalmente de él, para que por la acción del Espíritu y por medio de ella, nos vayamos llenando de ese Dios que estamos necesitando.", "Llenos de alegría bendigamos a Dios por la variedad de sus criaturas, pero sobre todo por María."], "oracion": ["Señor, te admiramos, te bendecimos, por todas y cada una de las obras que has creado. Pero hoy, de una manera especial te admiramos y te bendecimos por María, tu obra maestra. En ella y por ella te acercaste a nosotros y te sigues acercando, desde su realidad de Madre nuestra.", "Que descubramos esa tu cercanía, la valoremos y dejemos a María ejercer su vocación de ser Madre nuestra.", "Tú que vives y reinas por los siglos de los siglos."]}, {"ref": "Salmo 149", "sub": "es una invitación a la alegría siempre renovada.", "amb": ["No debemos acostumbrarnos a vivir la vida.. Le quitaríamos la novedad que tiene cada día y la alegría de vivirla. La rutina es el peor enemigo ante las alegrías que siempre tiene nuestra vida. Nos impide descubrirlas y disfrutarlas.", "María fue la mujer que vivió intensamente todos y cada unos de los instantes de su vida, desde la novedad sorprendente de un Dios siempre nuevo. Ella no supo de rutinas frente al Dios que se le acercaba en cada momento. toda su vida fue \"un canto al Señor, un cántico nuevo\" con la letra de la gratitud y con la música del amor. Cántico que resonó en aquel entonces y que sigue resonando para alegría de todos los pueblos.", "Por eso, \"que todos festejen y canten jubilosos y den vítores a Dios…y canten con tambores y cítaras… porque el Señor ama a su pueblo\". Y nos lo ha manifestado, de una manera especial en María."], "oracion": ["Señor, tú eres el Dios siempre nuevo que te acercas a nosotros con la novedad de tu amor.", "En María y por María nos has manifestado tu \"rostro maternal\", que nos habla de cercanía y de calor de Madre.", "Gracias, Señor, por este tu regalo. Que no nos acostumbremos a verlo, sin que en él descubramos tu rostro siempre nuevo. Tú que vives y reinas por los siglos de los siglos."]}], "summary": {"breve": ["SaLMo 62: la necesidad de Dios es una fuerza incontenible en todo ser humano, que clama por su realización. María es la primera criatura humana que dejó desarrollarse esa fuerza, totalmente, con todo su ser. Por eso es la \"llena de Dios\". CáNtICo DN.: son innumerables las voces que nos invitan a alabar y bendecir a Dios por su manifestación y por su cercanía. Hoy tenemos un motivo especialísimo, para bendecirle y alabarle: María. Ella sí que es la obra de Dios y su cercanía a los humanos. SaLMo 149: cuanto más profunda es la presencia de Dios en todo ser humano, mayor es la alegría que experimenta. María, la llena de Gracia, la empapada de Dios totalmente, fue un cántico nuevo, desbordante de alegría. Con ella cantemos al Señor."], "oracion": ["SaLMo 62: todo el grupo canta o proclama la primera estrofa, alternando con solistas espontáneos que proclama el resto de las estrofas. CáNtICo DN.: un solista proclama los motivos de bendición uniendo los dos versos de cada estrofa y todo el grupo contesta \"bendecid al Señor\", ó lo que corresponda. Se puede intercalar el cántico \"alabaré….\" oportunamente. SaLMo 149: un solista invita \"cantad al Señor un cántico nuevo\" y de forma responsorial, el grupo va proclamando las estrofas."], "reflexion": ["mi alma está sedienta de ti", "criaturas todas…María, bendecid al Señor", "el Señor ama a su pueblo"]}}, {"key": "oración de la tarde II", "label": "Vísperas II", "psalms": [{"ref": "Salmo 121", "sub": "proclama la alegría del encuentro con el Señor.", "amb": ["todos los humanos buscamos los caminos de la felicidad, de la alegría, como algo irrenunciable en nuestra vida. Creados para ser felices, es lógico que lo intentemos por todos los medios a nuestro alcance.", "El salmo 121, que vamos a proclamar, es una invitación a descubrir la raíz única de nuestra verdadera felicidad: el encuentro con Dios.", "Estamos concluyendo la celebración de esta fiesta de María. Y hemos celebrado el encuentro de Dios con ella y el encuentro de ella con Dios. El fruto de ese encuentro, la grandeza de María.", "Ella vivió, constantemente, la alegría de \"voy al encuentro del Señor\". Ese fue el camino que recorrió en todos los momentos de su existencia, que culminó en el \"llena de Gracia\", la totalmente \"empapada\" de Dios.", "Proclamar este salmo en la fiesta de María es todo un reto que cuestiona nuestra vida de comprometidos en la búsqueda de Dios, y como sembradores de alegría en un mundo enfermo de tristeza.", "Que como María, podamos decir, estoy alegre porque \"voy al encuentro del Señor\""], "oracion": ["Señor, vivimos nuestra vida, de verdad, cuando la vivimos buscándote a ti. Eso fue la vida de María: todos sus momentos, todo su ser, fue un buscarte permanente.", "Que la celebración de esta su fiesta, que estamos concluyendo, despierte en todos nosotros esta ansia de ti, y te busquemos, a ti que vives y reinas por los siglos de los siglos."]}, {"ref": "Salmo 126", "sub": "es una llamada a poner a Dios como el centro de nuestra vida.", "amb": ["Dios es quien plenifica todos nuestros esfuerzos. El es la raíz de nuestro existir. En nuestra búsqueda de libertad y de autoafirmación, frecuentemente nos pasamos. Prescindir o infravalorar a quien es el centro de nuestro ser y de nuestro quehacer, es caer en un desajuste de nuestra existencia.", "La proclamación de este salmo 126 es una denuncia contra quienes intentan marginar a Dios en su vida: \"si el Señor no construye la casa o guarda la ciudad… en vano trabajan o vigilan\".", "María fue la mujer que supo poner a Dios como el único centro de su vida, y en torno a él, desarrollar toda su existencia... Y su recompensa, \"el fruto de su vientre\": Dios hecho Hombre, Dios entre nosotros. Ella descubrió que todo esfuerzo sin Dios, es vano e inútil. Por eso su actitud ante él: \"hágase en mí según tu palabra\". Y Dios se acercó a ella y en unión con ella, pudo realizar su sueño desde toda la eternidad: hacerse \"Emmanuel\". Hombre entre los hombres y para los hombres.", "Dejemos que Dios una sus esfuerzos a los nuestros para que quedemos plenificados."], "oracion": ["Señor, nuestros esfuerzos, nuestros trabajos, sin conta
