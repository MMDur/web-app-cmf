<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Orar hoy con los salmos de siempre · Tiempo ordinario</title>
<meta name="description" content="Miguel Romero Taboada, cmf — Orar hoy con los salmos de siempre. Tiempo ordinario.">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;0,700;1,400;1,500&family=Literata:ital,opsz,wght@0,7..72,400;0,7..72,500;0,7..72,600;1,7..72,400;1,7..72,500&display=swap" rel="stylesheet">
<style>
:root{
  --granate:#6d1a2e;
  --granate-fosc:#4d1220;
  --or:#b08d3e;
  --or-clar:#d4b978;
  --pergami:#f7f2e8;
  --pergami-fosc:#efe7d6;
  --tinta:#2c2118;
  --tinta-suau:#6b5d4f;
  --blanc:#fffdf8;
  --ombra:0 2px 14px rgba(77,18,32,.09);
  --radius:14px;
}
[data-theme="dark"]{
  --granate:#c9788a;
  --granate-fosc:#e0a5b3;
  --or:#d4b978;
  --or-clar:#b08d3e;
  --pergami:#181215;
  --pergami-fosc:#231a1e;
  --tinta:#e8ddd2;
  --tinta-suau:#a89a8c;
  --blanc:#241b1f;
  --ombra:0 2px 14px rgba(0,0,0,.4);
}
*{margin:0;padding:0;box-sizing:border-box}
html{scroll-behavior:smooth}
@media (prefers-reduced-motion: reduce){html{scroll-behavior:auto}}
body{
  font-family:'Literata',Georgia,serif;
  background:var(--pergami);
  color:var(--tinta);
  line-height:1.65;
  font-size:calc(16px * var(--fscale,1));
  transition:background .3s,color .3s;
  min-height:100vh;
}
header.top{
  background:linear-gradient(160deg,var(--granate) 0%,var(--granate-fosc) 100%);
  color:#f7f2e8;
  padding:1.1rem 1rem .95rem;
  position:sticky;top:0;z-index:50;
  box-shadow:0 2px 10px rgba(0,0,0,.18);
}
[data-theme="dark"] header.top{background:linear-gradient(160deg,#3a0f1c 0%,#2a0a14 100%)}
.top-inner{max-width:760px;margin:0 auto;display:flex;align-items:center;gap:.7rem}
.top-title{flex:1;min-width:0;cursor:pointer}
.top-title h1{
  font-family:'Cormorant Garamond',serif;
  font-size:1.28rem;font-weight:600;letter-spacing:.02em;line-height:1.15;
  white-space:nowrap;overflow:hidden;text-overflow:ellipsis;
}
.top-title .sub{font-size:.68rem;letter-spacing:.14em;text-transform:uppercase;color:var(--or-clar);font-family:'Literata',serif}
[data-theme="dark"] .top-title .sub{color:#d4b978}
.iconbtn{
  background:rgba(255,255,255,.12);border:1px solid rgba(255,255,255,.22);
  color:#f7f2e8;border-radius:9px;width:2.15rem;height:2.15rem;
  font-size:1rem;cursor:pointer;flex-shrink:0;line-height:1;
  display:flex;align-items:center;justify-content:center;
  transition:background .2s;font-family:'Literata',serif;
}
.iconbtn:hover{background:rgba(255,255,255,.22)}
.iconbtn:focus-visible{outline:2px solid var(--or-clar);outline-offset:2px}
main{max-width:760px;margin:0 auto;padding:1.2rem 1rem 4rem}

/* ── barra de navegació de secció ── */
.crumb{
  display:flex;align-items:center;gap:.55rem;margin:.2rem 0 1.1rem;
  font-size:.82rem;color:var(--tinta-suau);flex-wrap:wrap;
}
.crumb a{color:var(--granate);text-decoration:none;font-weight:500}
.crumb a:hover{text-decoration:underline}
.crumb .sep{color:var(--or)}

/* ── portada ── */
.hero{
  background:var(--blanc);border:1px solid var(--or-clar);
  border-radius:var(--radius);box-shadow:var(--ombra);
  padding:1.4rem 1.3rem 1.3rem;margin-bottom:1.5rem;
  position:relative;overflow:hidden;
}
.hero::before{
  content:"";position:absolute;inset:6px;border:1px solid var(--or);
  border-radius:calc(var(--radius) - 5px);pointer-events:none;opacity:.45;
}
.hero .eyebrow{
  font-size:.68rem;letter-spacing:.18em;text-transform:uppercase;
  color:var(--or);font-weight:600;margin-bottom:.35rem;
}
.hero h2{
  font-family:'Cormorant Garamond',serif;font-weight:600;
  font-size:1.75rem;color:var(--granate);line-height:1.15;margin-bottom:.2rem;
}
.hero .fecha{font-size:.9rem;color:var(--tinta-suau);font-style:italic;margin-bottom:.9rem}
.hero .nota-temps{font-size:.82rem;color:var(--tinta-suau);margin-top:.7rem;line-height:1.45}
.hoy-hores{display:flex;gap:.6rem;flex-wrap:wrap}
.hoy-hores a{
  flex:1;min-width:130px;text-align:center;text-decoration:none;
  padding:.65rem .8rem;border-radius:10px;font-weight:500;font-size:.95rem;
  border:1.5px solid var(--granate);color:var(--granate);
  transition:all .2s;position:relative;z-index:1;
}
.hoy-hores a.principal{background:var(--granate);color:var(--pergami)}
[data-theme="dark"] .hoy-hores a.principal{background:#6d1a2e;border-color:#6d1a2e;color:#f0e2d4}
.hoy-hores a:hover{transform:translateY(-1px);box-shadow:var(--ombra)}

/* ── graella de setmanes ── */
.sec-label{
  font-family:'Cormorant Garamond',serif;font-size:1.35rem;font-weight:600;
  color:var(--granate);margin:1.6rem 0 .7rem;display:flex;align-items:center;gap:.7rem;
}
.sec-label::after{content:"";flex:1;height:1px;background:linear-gradient(90deg,var(--or),transparent)}
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(150px,1fr));gap:.7rem}
.card{
  background:var(--blanc);border:1px solid var(--pergami-fosc);
  border-radius:var(--radius);padding:.95rem 1rem;text-decoration:none;
  color:var(--tinta);box-shadow:var(--ombra);transition:all .2s;
  display:block;position:relative;
}
[data-theme="dark"] .card{border-color:#3a2d33}
.card:hover{transform:translateY(-2px);border-color:var(--or)}
.card .num{
  font-family:'Cormorant Garamond',serif;font-size:1.9rem;font-weight:500;
  color:var(--granate);line-height:1;
}
.card .lbl{font-size:.8rem;color:var(--tinta-suau);margin-top:.15rem}
.card.wide{grid-column:1/-1;display:flex;align-items:baseline;gap:.8rem}
.card.wide .num{font-size:1.35rem}

/* ── llista de dies / hores ── */
.llista{display:flex;flex-direction:column;gap:.55rem}
.fila{
  background:var(--blanc);border:1px solid var(--pergami-fosc);border-radius:12px;
  padding:.85rem 1.05rem;text-decoration:none;color:var(--tinta);
  display:flex;align-items:center;justify-content:space-between;gap:.8rem;
  box-shadow:var(--ombra);transition:all .18s;
}
[data-theme="dark"] .fila{border-color:#3a2d33}
.fila:hover{border-color:var(--or);transform:translateX(3px)}
.fila .nom{font-family:'Cormorant Garamond',serif;font-size:1.2rem;font-weight:600;color:var(--granate);text-transform:capitalize}
.fila .detall{font-size:.78rem;color:var(--tinta-suau);text-align:right}
.fila .fletxa{color:var(--or);font-size:1.1rem;flex-shrink:0}

/* ── vista d'hora ── */
.hora-cap{text-align:center;margin:.4rem 0 1.4rem}
.hora-cap .setm{font-size:.7rem;letter-spacing:.2em;text-transform:uppercase;color:var(--or);font-weight:600}
.hora-cap h2{
  font-family:'Cormorant Garamond',serif;font-size:2rem;font-weight:600;
  color:var(--granate);line-height:1.1;text-transform:capitalize;
}
.hora-cap .hora-nom{font-style:italic;color:var(--tinta-suau);font-size:1.02rem}
.salm{
  background:var(--blanc);border:1px solid var(--pergami-fosc);border-radius:var(--radius);
  box-shadow:var(--ombra);margin-bottom:1.15rem;overflow:hidden;
}
[data-theme="dark"] .salm{border-color:#3a2d33}
.salm-cap{
  padding:.95rem 1.2rem .85rem;border-bottom:1px solid var(--pergami-fosc);
  background:linear-gradient(180deg,var(--pergami-fosc)33,transparent);
}
[data-theme="dark"] .salm-cap{border-color:#3a2d33}
.salm-cap .ref{
  font-family:'Cormorant Garamond',serif;font-size:1.45rem;font-weight:700;
  color:var(--granate);line-height:1.1;
}
.salm-cap .subt{font-style:italic;color:var(--tinta-suau);font-size:.93rem;margin-top:.1rem;line-height:1.4}
.salm-cos{padding:1.05rem 1.2rem 1.1rem}
.salm-cos p{margin-bottom:.75rem;text-align:justify;hyphens:auto}
.salm-cos p:last-child{margin-bottom:0}
.oracio{
  margin:1rem 1.2rem 1.2rem;padding:.95rem 1.1rem;
  background:var(--pergami);border-left:3px solid var(--or);border-radius:0 10px 10px 0;
  font-style:italic;color:var(--tinta);
}
[data-theme="dark"] .oracio{background:#1f171b}
.oracio p{margin-bottom:.6rem}
.oracio p:last-child{margin-bottom:0}
.oracio .oracio-lbl{
  font-style:normal;font-size:.66rem;letter-spacing:.18em;text-transform:uppercase;
  color:var(--or);font-weight:600;margin-bottom:.4rem;
}

/* ── resum ── */
.resum{
  background:var(--blanc);border:1.5px solid var(--or-clar);border-radius:var(--radius);
  box-shadow:var(--ombra);margin:1.6rem 0 .5rem;padding:1.2rem 1.25rem 1.25rem;
}
.resum h3{
  font-family:'Cormorant Garamond',serif;font-size:1.35rem;font-weight:600;
  color:var(--granate);margin-bottom:.55rem;display:flex;align-items:center;gap:.6rem;
}
.resum h3::after{content:"";flex:1;height:1px;background:var(--or-clar);opacity:.6}
.resum h3:not(:first-child){margin-top:1.25rem}
.resum p{margin-bottom:.6rem;text-align:justify;hyphens:auto}
.resum ul{list-style:none;padding:0}
.resum li{
  padding:.3rem 0 .3rem 1.3rem;position:relative;font-style:italic;color:var(--tinta);
}
.resum li::before{content:"❧";position:absolute;left:0;color:var(--or);font-style:normal}
.resum .item-ref{font-weight:600;color:var(--granate);font-style:normal}

/* ── índex de salms ── */
.idx-grup{margin-bottom:1.3rem}
.idx-grup h3{
  font-family:'Cormorant Garamond',serif;font-size:1.3rem;font-weight:600;
  color:var(--granate);margin-bottom:.5rem;border-bottom:1px solid var(--or-clar);padding-bottom:.25rem;
}
.idx-item{
  display:flex;justify-content:space-between;align-items:baseline;gap:1rem;
  padding:.42rem .2rem;text-decoration:none;color:var(--tinta);
  border-bottom:1px dotted var(--pergami-fosc);font-size:.93rem;
}
[data-theme="dark"] .idx-item{border-color:#3a2d33}
.idx-item:hover{color:var(--granate)}
.idx-item .on{font-size:.78rem;color:var(--tinta-suau);text-align:right;white-space:nowrap}

/* ── cerca ── */
.cerca-box{display:flex;gap:.5rem;margin-bottom:1.1rem}
.cerca-box input{
  flex:1;padding:.7rem .95rem;border:1.5px solid var(--or-clar);border-radius:11px;
  font-family:'Literata',serif;font-size:1rem;background:var(--blanc);color:var(--tinta);
}
.cerca-box input:focus{outline:2px solid var(--granate);outline-offset:1px}
.cerca-res{font-size:.85rem;color:var(--tinta-suau);margin-bottom:.8rem;font-style:italic}
.res-frag{font-size:.88rem;color:var(--tinta-suau);margin-top:.25rem;line-height:1.45}
.res-frag mark{background:var(--or-clar);color:var(--granate-fosc);border-radius:3px;padding:0 .12em}
[data-theme="dark"] .res-frag mark{background:#5a4a28;color:#f0e2d4}

/* ── intro ── */
.intro-page{background:var(--blanc);border:1px solid var(--pergami-fosc);border-radius:var(--radius);box-shadow:var(--ombra);padding:1.4rem 1.35rem}
[data-theme="dark"] .intro-page{border-color:#3a2d33}
.intro-page h2{font-family:'Cormorant Garamond',serif;font-size:1.7rem;font-weight:600;color:var(--granate);margin-bottom:.9rem}
.intro-page p{margin-bottom:.8rem;text-align:justify;hyphens:auto}
.credit{margin-top:1.3rem;padding-top:.9rem;border-top:1px solid var(--or-clar);font-size:.82rem;color:var(--tinta-suau);font-style:italic;text-align:center}

/* ── peu i navegació entre hores ── */
.nav-hores{display:flex;gap:.6rem;margin-top:1.6rem}
.nav-hores a{
  flex:1;text-align:center;text-decoration:none;padding:.6rem;border-radius:10px;
  border:1.5px solid var(--or-clar);color:var(--granate);font-size:.88rem;transition:all .2s;
}
.nav-hores a:hover{border-color:var(--granate);background:var(--blanc)}
footer{
  text-align:center;padding:1.6rem 1rem 2.2rem;font-size:.78rem;color:var(--tinta-suau);
  font-style:italic;
}
footer .flor{color:var(--or);font-size:1.05rem;font-style:normal;display:block;margin-bottom:.3rem}
.tornar-dalt{
  position:fixed;bottom:1.2rem;right:1.2rem;width:2.6rem;height:2.6rem;border-radius:50%;
  background:var(--granate);color:var(--pergami);border:none;font-size:1.15rem;cursor:pointer;
  box-shadow:0 3px 12px rgba(0,0,0,.25);display:none;align-items:center;justify-content:center;z-index:40;
}
.tornar-dalt.vis{display:flex}
a:focus-visible,button:focus-visible{outline:2px solid var(--granate);outline-offset:2px}
@media (max-width:480px){
  .top-title h1{font-size:1.08rem}
  .hero h2{font-size:1.5rem}
  main{padding:1rem .8rem 4rem}
}
</style>
</head>

</header>

<script id="dades" type="application/json">{"intro": {"title": "Dios es el \"Eterno orante\"", "paras": ["Nuestra oración es respuesta a ese \"Eterno orante\"", "Y le respondemos desde nuestra vida, entretejida de momentos y situaciones las más variadas: de alegría y de tristeza, de esperanza y de desesperación, de ilusión y de fracaso, de días de luz y de días de tinieblas.", "Es el ser humano, todo el ser humano, el que responde a la oración de Dios. La oración eres tú, soy yo, con manos abiertas, con todo el ser abierto y necesitado, para que Dios lo llene. La oración es la vida, vivida desde su misma raíz: Dios. Es vivir esa gran necesidad de Dios que todos llevamos en nuestra misma entraña.", "En todos los tiempos el ser humano ha sentido y ha vivido esa necesidad de buscar a Dios y relacionarse con él. Necesidad vivida y expresada de formas muy diversas.", "En concreto, el pueblo de Israel vivió y expresó esta necesidad desde las distintas y difíciles situaciones por las que tuvo que pasar a lo largo de su historia.", "Los salmos fueron su oración, el modo de relacionarse con Dios, como algo que les salía desde dentro, desde su misma vida. Cuando Israel reza, es todo un pueblo buscador de Dios el que reza, desde las diversas circunstancias por las que atraviesa.", "La Iglesia, ha querido conectar con este pueblo, y desde sus comienzos ha utilizado para la oración litúrgica, los salmos, que bajo la inspiración del Espíritu Santo compusieron los autores sagrados del antiguo testamento.", "Con el fin de facilitar y de ayudar nuestra oración de hoy, con los salmos, presentamos este trabajo. Es fruto de la oración y reflexión personal, y ha sido utilizado en retiros, ejercicios, convivencias con distintos grupos. Su publicación obedece a repetidas sugerencias de aquellos que lo han escuchado.", "Su contenido es el siguiente: una ambientación más o menos extensa a cada salmo y otra más breve, oración sálmica, posibles modos de oración, y una breve frase que compendia el contenido de cada salmo, para la reflexión personal. La última parte, está preparada para utilizarla en las distintas fiestas.", "Que nuestra oración, sea de verdad una apertura al Espíritu, para que nuestro compromiso de \"buscadores\" de Dios, marque el ritmo de nuestra vida."]}, "weeks": [{"num": 1, "days": [{"name": "domingo", "hours": [{"key": "oración de la tarde I", "label": "Vísperas I", "psalms": [{"ref": "Salmo 140", "sub": "es una súplica personal al Señor, frente a los enemigos.", "amb": ["Con este salmo 140, comenzamos celebrando la liturgia del domingo. Es todo un compendio de nuestra realidad humana: nos sentimos \"necesitados\".", "Y es que hay \"alguien\" imprescindible en nuestra vida: Dios. Por eso claramente nos definimos ante él: \"Señor, te estoy llamando… ven de prisa…\" Es la manifestación de algo muy profundo que todos llevamos dentro y que no podemos ahogar, sin que repercuta en todo nuestro ser.", "No podemos actuar en contra de una necesidad básica, sin que cometamos un verdadero atentado contra nuestra persona. Y la gran necesidad básica, en todo ser humano, es, sencillamente DIOS. Y eso, aunque intentemos escamotearlo… olvidarlo… suplantarlo…", "En esta tarde, proclamamos esta necesidad, e intentamos hacerla realidad en nuestra vida: \"suba mi oración como ofrenda de la tarde… mis ojos están vueltos a ti… en ti me refugio…\" Es la verdadera actitud que necesitamos adoptar, si es que queremos vivir la vida desde su entraña más auténtica y más profunda.", "En nuestro entorno, no siempre nos encontraremos con personas que nos faciliten ó estimulen a vivir así. No nos dejemos influenciar: \"guárdame del lazo que me han tendido…\" Le diremos al Señor. Digámoselo de verdad."], "oracion": ["Señor, al caer de la tarde, nuestros ojos se vuelven hacia ti.", "Alzamos nuestras manos en actitud oferente de toda nuestra persona. Llénala, porque tú eres el único capaz de llenar sus vacíos más íntimos.", "Por eso, no te extrañes que te digamos \"que escuches mi voz… que vengas de prisa…\" Es que te necesitamos. No queremos ahogar esta nuestra necesidad, o acallarla con sucedáneos engañosos.", "Porque sabemos que no nos vas a fallar, viviremos la alegría de tu presencia, de tu cercanía. Tú que vives por los siglos de los siglos."]}, {"ref": "Salmo 141", "sub": "es una oración confiada al Señor, ante la debilidad.", "amb": ["Ni podemos, ni debemos presumir de nuestras fuerzas, como si fuéramos autosuficientes. Tenemos que tomar conciencia de nuestra debilidad, y de que siempre hay \"alguien\" que nos respalda y ayuda, porque \"es fuerza en nuestra debilidad\"", "Este salmo 141, es una invitación a descubrir la realidad de nosotros mismos: seres indigentes, radicalmente necesitados. Por eso diremos: \"a voz en grito clamo al Señor… Señor, tú eres mi refugio… sácame de la prisión… atiende a mis clamores…\" Porque… \"tú conoces todos mis senderos… tú eres mi lote en el país de la vida…\"", "Tendremos momentos difíciles… días oscuros sin perspectivas de luz… situaciones en las que necesitaremos gritar: …\"nadie me hace caso… líbrame de mis perseguidores… estoy agotado…\"", "Son momentos de debilidad, en los que sentimos la necesidad de una \"fuerza\" que venga en nuestra ayuda. Momentos purificadores y esclarecedores, que nos ponen de manifiesto la realidad de nuestra existencia, y el sentido que Dios tiene en nuestra vida.", "Desahoguémonos y manifestemos a Dios nuestra situación: \"Señor, a tí grito porque tú eres mi refugio\"… tú eres \"alguien\" a quién yo necesito. Cada vez que he intentado prescindir de tí, lo he pasado fatal."], "oracion": ["Señor, eres tan cercano a nosotros, que no necesitamos movernos. Estás en al misma raíz de nuestra existencia. Nos amas tan profundamente, que no podemos imaginarnos un rechazo por tu parte. Nos escuchas… nos acoges… nos abrazas… porque nos amas. Siempre nos serás fiel… aunque nosotros no lo seamos contigo.", "Gracias. Yo seguiré gritando por tí, porque eres mi gran necesidad.", "A tí que vives por los siglos de los siglos."]}, {"ref": "Cántico Flp. 2. 6-11", "sub": "es un canto al Cristo cercano, muerto y resucitado.", "amb": ["Es toda una sorpresa la que Dios nos preparó al hacerse uno como nosotros, menos en el pecado: asumir todo lo humano para llenarlo de lo divino.", "Y es más: permitir que le tratasen como a un criminal y le ejecutasen, con la tortura más ignominiosa: la cruz. Todo un misterio que nunca lograremos comprender desde nuestras categorías humanas. Si de nosotros hubiera dependido, no habríamos hecho las cosas así. Fueron caminos demasiado difíciles los que Dios escogió para manifestar su interés por nosotros.", "Pero ahí están. Y serán siempre unos interrogantes que nos cuestionan y nos interrogan: ¿Por qué Dios ha actuado así?… ¿Somos tan importantes los humanos para que todo un Dios haga esos \"excesos\"?... ¿Qué mensajes querrá transmitirnos?", "Y desde estos interrogantes, nos comprometeremos a vivir, no desde nuestros caprichos y veleidades, sino desde la verdad de nuestra existencia. Así lograremos terminar participando de la misma gloria de aquel que ha recorrido nuestros caminos.", "El Padre, con Cristo y en Cristo, por la fuerza del Espíritu, nos levantará sobre todo, para su gloria, manifestada en nosotros: siendo hijos en el Hijo."], "oracion": ["Señor, gracias por las sorpresas que nos das cada día.", "Sobre todo, gracias por la sorpresa de meterte en nuestra carne para no separarte nunca de ella. Siempre serás nuestro Dios y nuestro hermano. Siempre estarás tan unido a nosotros, que en tí y desde tí, tú divinidad irá transformando nuestra humanidad: seremos humanos, pero hijos de Dios.", "Gracias por este regalo… gracias por esta sorpresa. A tí que vives para siempre."]}], "summary": {"breve": ["Salmo 140: Es el grito del ser humano que clama angustiosamente por Dios: \"ven de prisa… escucha mi voz…\" Es la manifestación de una necesidad que brota de la misma entraña del hombre.", "Salmo 141: Dios es el único que siempre nos escucha. Nos pueden fallar todos. Pero él es el Dios fiel, nuestro refugio permanente, con sus brazos siempre abiertos.", "Cántico FLP.2, 6-11: Somos importantes para Dios. No se ha avergonzado de acercarse a nuestro barro, para dignificarlo y llenarlo de él. En Jesús se nos ha hecho \"el cercano, el Dios para nosotros\"."], "oracion": ["Salmo 140: Puede hacerse a modo responsorial, repitiendo \"Señor, en tí me refugio\" ó cantando \"protégeme Dios mío, me refugio en tí\".", "Salmo 141: La primera parte, exposición de problemas, puede proclamarla un solista. La segunda parte, oración angustiosa, todo el grupo, después de un silencio oportuno.", "Cántico FLP.2: Puede proclamarlo todo el grupo, con un fondo musical suave."], "reflexion": ["Señor, te estoy llamando", "A tí grito, Señor", "Se despojó de su rango... pasando por uno de tantos"]}}, {"key": "oración de la mañana", "label": "Laudes", "psalms": [{"ref": "Salmo 62", "sub": "es la oración del que siente la necesidad de Dios.", "amb": ["Comenzamos este día proclamando la realidad más profunda de todo ser humano: la \"necesidad de Dios\". Hemos sido creados para necesitar a Dios. Por eso, todo nuestro ser es un grito permanente, clamoroso, por él. Somos como esas tierras arcillosas resecas, que se agrietan, como bocas que piden agua para calmar su sed.", "Podemos afirmar que este salmo 62, es nuestro salmo. El salmo de los que sienten, viven y manifiestan, públicamente, la sed insaciable que tienen de Dios: …\"tú eres mi Dios… estoy sediento de ti… tengo ansia de tí… como tierra reseca… sin agua…\" Este es el único modo de vivir nuestra vida, como humanos, como cristianos y como consagrados.", "Precisamente nuestra vocación es una llamada a vivir así: \"como los grandes necesitados de Dios\". Y vamos respondiendo a esta llamada, en la medida en que vamos llenando esa necesidad… \"por tí madrugo\"… como si quisiéramos adelantar el día para saciar nuestra sed de Dios.", "… \"ya en el lecho me acuerdo de tí y velando medito en tí…\" es toda nuestra existencia la que clama por Dios insistentemente.", "Que la oración de esta mañana, sea eso: un clamor, un grito… por este Dios que necesitamos."], "oracion": ["Señor, tú nos has creado así… Tú has metido en nuestra entraña, esta necesidad que tenemos de tí. Somos esa tierra reseca, agostada, sin agua… que grita para calmar su sed. Tú eres nuestra agua… te necesitamos. Nuestra vida sin tí no tiene sentido, sería todo un fracaso.", "La experiencia nos lo dice: cuando hemos intentado prescindir de tí, nos hemos sentido frustrados, angustiados. Por eso, queremos hacer de nuestra vida una búsqueda, un encuentro permanente contigo. Que vives por los siglos de los siglos."]}, {"ref": "Cántico Dn. 3", "sub": "es la oración silenciosa de todas las criaturas.", "amb": ["Cuántas veces nos hemos preguntado: ¿dónde está Dios?… ¿dónde se esconde?… ¿por qué no se nos manifiesta más claramente?..., y estamos o hemos estado esperando la respuesta que venga a coincidir con nuestros planteamientos.", "Este cántico de Daniel, es la respuesta a nuestros interrogantes: \"Dios es cercano… es epifanía… es manifestación… es presencia\".", "Cada una de las criaturas que ha creado, es una palabra que nos habla de Dios: de su poder, de su grandeza, de su belleza, de su amor, de su \"presencia\".", "Somos los humanos, quienes tenemos que saber escuchar esa palabra, saber leer ese libro que nos habla claramente de quién es Dios, dónde está Dios, cómo es Dios. Y desde ahí, hacer nuestra la invitación que se nos hace para ser bendición y alabanza, hoy, desde nuestra vida… a ese Dios tan cercano.", "Abramos nuestros ojos y no nos contentemos con mirar. Tenemos que ver, y desde el ver, admirar… y encontrarnos con Dios.", "Está oculto. Pero está. Nuestra tarea de cada día, consistirá en saber encontrarle, y relacionarnos con él, para que nuestra vida tenga ese fondo de creyente, que debe caracterizarnos.", "En todas sus criaturas, alabemos a Dios."], "oracion": ["Señor, de verdad que eres admirable. Intentas acercarte a nosotros y hablarnos en el lenguaje que podamos entenderte. Cada una de tus criaturas es una palabra que nos habla de tí, con el lenguaje de su belleza, de su grandeza, de su color.", "Somos nosotros quienes tenemos que aprender a escucharte y a encontrarte ahí, en la grandeza y sencillez de tus obras.", "Nuestra vocación de contemplativos es todo un reto a desarrollar y a vivir.", "Tú que vives y reinas por los siglos de los siglos."]}, {"ref": "Salmo 149", "sub": "es un himno de alabanza a Dios creador y rey.", "amb": ["La rutina es uno de los peligros que amenaza de continuo la profundidad de nuestra vida. Y desde ella podemos caer en la monotonía, en el aburrimiento… en una vida que tiene poco de vida.", "La vida religiosa, es ante todo \"vida\". Sin el sustantivo \"vida\", el adjetivo religiosa no tiene sentido alguno.", "Por eso, saber descubrir, ya desde los primeros momentos del día, que hemos sido llamados a renovar, hacer nueva nuestra vida, es nuestro gran descubrimiento.", "Este salmo 149, nos invita a \"cantar al Señor un cántico nuevo\" hoy, en este día que estamos estrenando. A alabarle, danzando, tocando toda clase de instrumentos… sencillamente porque \"el Señor nos ama\". Y en consecuencia, sentirnos alegres, jubilosos: \"demos vítores a nuestro Dios\".", "Toda vida, vivida en renovación permanente, es un verdadero encuentro con Dios y por lo tanto, una vida marcada por la alegría de ese encuentro.", "Recojamos la invitación de este salmo y hagamos de nuestra vida una canción que se estrena en cada momento con acordes nuevos, con letra nueva, con voz nueva… fruto de un amor nuevo."], "oracion": ["Señor, eres el siempre eterno y siempre nuevo, porque eres la vida que no envejece. Y eso es lo que quieres y buscas de cada uno de nosotros.", "Te molesta la rutina, la monotonía, porque dificulta tu encuentro de vida con lo más profundo de nuestro ser. Cada día esperas de nosotros la sorpresa de un amor renovado, como respuesta a tu amor siempre nuevo y permanente.", "De verdad, es lo que queremos que sea nuestra vida, desde la vivencia de nuestros compromisos contigo. Que vives y reinas por los siglos de los siglos."]}], "summary": {"breve": ["Salmo 62: Estamos hechos para necesitar a Dios. Llenar esa necesidad es nuestra gran tarea, el quehacer que debe dar sentido a toda nuestra vida. Todo intento de arrinconar a Dios es nuestra autodestrucción.", "Cántico DN.: Todas las criaturas son una manifestación de Dios. Cada una de ellas es una palabra silenciosa que nos habla de él. Escuchar esa palabra es escuchar a Dios.", "Salmo 149: Dios es sorpresa cada día. Se nos acerca a nosotros desde un amor siempre nuevo. Que vivamos nuestra vida desde la novedad de una canción que se estrena siempre con letra y melodía nueva."], "oracion": ["Salmo 62: Puede hacerse espontáneamente. Y una vez concluido, repetir palabras o frases cortas del mismo salmo, o en la misma línea del salmo.", "Cántico DN.: Lo puede proclamar un solista uniendo las dos partes de cada estrofa y el grupo contesta \"bendecid al Señor\" o lo que corresponda. Puede actualizarse añadiendo alabanzas espontáneas.", "Salmo 149: Un solista hace una invitación a la alabanza y todo el grupo prosigue desde \"porque el Señor ama a su pueblo....\""], "reflexion": ["Tú eres mi Dios... mi carne tiene ansia de ti…", "Criaturas todas, bendecid al Señor\"…", "Cantadle un cántico nuevo\"…"]}}, {"key": "oración de la tarde II", "label": "Vísperas II", "psalms": [{"ref": "Salmo 109", "sub": "es un canto al Resucitado, Señor, Sacerdote y Rey.", "amb": ["Cristo es \"alguien\" para los demás. El Dios que se ha volcado en la humanidad. Y se ha volcado para darse a los humanos. Cristo está viviendo sus misterios unido a cada uno de nosotros. Su muerte y su resurrección están siendo nuestra muerte y nuestra resurrección. En él, estamos muriendo y resucitando todos.", "Este salmo 109 es un cántico a Cristo, pero al mismo tiempo es un cántico a todos nosotros. Proclamamos a Cristo ensalzado y glorificado y nos proclamamos a nosotros, exaltados y glorificados en él. Con él hemos sido sentados YA a la derecha de Dios y somos reyes… sacerdotes… profetas. El Señor lo ha jurado y no se arrepiente. La firma de nuestro cheque es la misma persona de Cristo. Podemos estar seguros de que las promesas de Dios Padre se cumplirán.", "Con estos sentimientos de un Cristo que todo él es para nosotros, le cantamos en la tarde de este domingo, siempre cargados de gratitud y de esperanza. El Resucitado nos ha abierto caminos nuevos.", "Que sembremos nuestro mundo de optimismo y seamos capaces de comunicar, con nuestra vida, mensajes de alegría y de compromiso.", "Nuestra oración, en estas últimas horas del día, robustezca nuestra fe y nuestra esperanza. Cristo Resucitado, alienta nuestras vidas."], "oracion": ["Señor, en la persona de Jesús, has trazado nuestro esquema, tu plan sobre todos y cada uno de nosotros. De verdad que nos has engrandecido sobre manera. Nosotros, por nuestra cuenta, nunca hubiéramos soñado en nada de eso. Pero tu amor y tu bondad, que no tienen límites, se han desbordado.", "Un gracias muy grande y un compromiso serio contigo, es lo que tú esperas. Señor, desde nuestra debilidad, cuenta con nosotros. Tú que vives y reinas por los siglos de los siglos."]}, {"ref": "Salmo 113 A", "sub": "canta la acción liberadora del Señor.", "amb": ["Dios no está al margen de los humanos, sino que está metido en la historia de cada uno. Su intervención liberadora, es permanente. Cada uno de nosotros es hoy \"su santuario\", el lugar donde Dios actúa.", "En este salmo 113, proclamamos el poder, la gloria y la majestad del Señor, en su acción salvadora y en su señorío sobre toda la naturaleza: \"el mar huyó... los montes y colinas saltaron como corderos... las peñas se transforman en estanques\".", "Ante las manifestaciones de Dios, todo cambia y todo se transforma. Sus teofanías son luz y son fuerza capaz de realizar obras maravillosas en favor de aquellos que se dejan iluminar y fortalecer por su acción.", "Nuestra comunidad es hoy el pueblo de Dios, sobre el que actúa por la fuerza de su Espíritu, para hacer visible su presencia y manifestar su poder y su gloria. Nuestra historia es \"sagrada\", porque es la historia de Dios en favor nuestro.", "Que vivamos la alegría de esta cercanía liberadora de Dios y seamos su presencia visible para nuestros hermanos.", "Al celebrar en este domingo a Cristo Resucitado, hemos celebrado su acción liberadora. El es el Libertador. Al terminar este día, en nuestra oración de la tarde, agradezcamos esta liberación, y dejémosle que la acción de su Espíritu, continúe liberándonos. Libres con la libertad de Cristo."], "oracion": ["Señor, tu presencia invisible se hace notar en todos los momentos de nuestra vida. Tu acción misteriosa nos envuelve permanentemente. Todo nos habla de tu poder, de tu gloria, de tu majestad.", "De una manera especial nos hablas y te manifiestas en nuestra comunidad, lugar de tu \"santuario\", desde donde quieres hablar y manifestarte a nuestro mundo: que seamos fieles a tu \"Palabra\" y a tu manifestación. Tú que vives por los siglos de los siglos."]}, {"ref": "Cántico 1P.2", "sub": "es un canto a Cristo entrega- do a la muerte por nosotros.", "amb": ["Dios se encarnó con todas las consecuencias. Gráficamente podríamos decir que \"se embarró con nuestro barro\", menos con nuestro pecado. Sufrió…, aguantó insultos, desprecios, dolores, injusticias…, hasta morir ajusticiado como un criminal. Y todo, para manifestarnos, con sangre, su amor y su entrega… hasta el extremo, sin medida.", "En todo esto, humanamente no encontramos explicación. Desde nuestra lógica, nosotros hubiéramos hecho las cosas de otra manera, sin tantas complicaciones, y sin tanto realismo. Complicarnos tanto por los demás, no entra en nuestros esquemas.", "Pero los esquemas de Dios, no son los esquemas nuestros. Sencillamente porque nuestro amor a los demás adolece de un egoísmo limitador. Y el amor de Dios es desbordante… es sin medida… es infinito.", "Proclamemos este cántico y demostremos a Cristo nuestra admiración, y nuestro compromiso, como respuesta.", "Dejémonos sorprender, una vez más, por este Cristo que se lo jugó todo por nosotros. Que la rutina, de ver al Crucificado, no tenga sentido en la vivencia de nuestra vida. Y que un crucifijo, siempre nos trasmita mensajes de amor sin medida, mensajes de entrega sin reservarse nada."], "oracion": ["Gracias, Señor, por tu amor. No nos amas de cualquier manera. Lo haces como solo tú sabes hacerlo: infinitamente... sin medida. Y nos lo manifiestas con unos hechos que nos hablan de amor total, de entrega sin reservas, de fidelidad eterna.", "Con razón podemos exclamar: \"sus heridas nos han curado\". Que nuestro vivir esté empapado por esta realidad y así lo demostremos a todos. Por tí que vives y reinas por los siglos de los siglos."]}, {"ref": "Cántico Ap.19", "sub": "es un canto, invitación a la alegría ante un Cristo todo amor.", "amb": ["Si hemos vivido con intensidad lo que hemos celebrado en este domingo, es una realidad que terminemos el día rebosantes de alegría y exclamemos: ¡¡aleluya... aleluya!!... Llegó la boda del Cordero.", "No somos los abandonados de Dios. El mismo se ha hecho presente en nuestro mundo, se ha unido a nuestra carne para siempre... Es uno de los nuestros. Y todos, \"pequeños y grandes... alabad al Señor\"... \"Alegrémonos y démosle gracias\"...", "Invisiblemente, pero realmente, él sigue unido a nuestras vidas, viviendo nuestra historia, caminando con nuestro caminar... No importa que, a veces, no le correspondamos. El siempre nos será fiel, y... pacientemente esperará nuestra respuesta.", "Nuestra comunidad debe ser el ámbito normal en el que celebremos cada día los esponsales de Dios con nosotros. Toda ella debe vibrar, contagiar, entusiasmar,... para que todos sus componentes no decaigan en la vivencia de una misma vocación, de un mismo carisma. Vivimos en comunidad para que todos nos comuniquemos vida. Así haremos realidad lo que implica nuestro vivir juntos.", "No es precisamente la alegría lo que caracteriza a nuestro mundo. Tal vez sí, una alegría falsificada. Somos nosotros, los cristianos comprometidos, los que tenemos que contagiarles desde el testimonio de nuestra vida empapada de un Dios presencia y amor."], "oracion": ["Señor, al terminar este día, reconocemos que eres un Dios enamorado de todos y cada uno de nosotros. Eres amor, y no puedes vivir sin amar. En la tarde de este domingo, queremos decirte que nos tienes sorprendidos por tu modo de comportarte con nosotros. Por eso, es normal que nos digamos llenos de alegría: \"alegrémonos y gocemos y démosle gracias... ¡¡aleluya... aleluya!!\"... porque Dios nos ama con un amor sin medida. El que vive y reina por los siglos de los siglos."]}], "summary": {"breve": ["Salmo 109: Misteriosamente estamos unidos a Cristo. Toda su persona es para nosotros. En él, somos reyes, sacerdotes y profetas. Proclamarle a él, es proclamarnos a nosotros mismos.", "Salmo 113 A: La acción liberadora de Dios, es permanente. Hoy, somos nosotros su pueblo liberado. Nuestra historia personal lo puede confirmar.", "Cántico 1P. 2: Se hizo como uno de tantos y no escatimó nada para manifestarnos su amor. Nos amó hasta el extremo.", "Cántico AP. 19: La alegría debe ser la tónica de nuestra vida, ante Dios que vive frente a nosotros como un \"enamorado\". Que el \"aleluya\" sea nuestro canto."], "oracion": ["Salmo 109: Un solista proclama \"Oráculo del Señor a mi Señor...\" y continúa todo el grupo. Otro solista \"El Señor lo ha jurado y no se arrepiente...\" y continúa todo el grupo, incluído el Gloria.", "Salmo 113 A.: Se puede cantar como antífona \"Nadie hay tan grande como tú...\" al principio y al final, y proclamar al unísono todo el salmo.", "Cántico 1P. 2: proclamación pausada por un solista, con fondo musical suave.", "Cántico AP. L9: Un solista proclama o canta las estrofas y todo el grupo contesta con \"aleluya....\""], "reflexion": ["Siéntate a mi derecha\"…", "Dónde está tu Dios?\"…", "Aleluya... alegrémonos, démosle gracias…", "\"Cristo padeció por nosotros…"]}}]}, {"name": "lunes", "hours": [{"key": "oración de la mañana", "label": "Laudes", "psalms": [{"ref": "Salmo 5", "sub": "es una súplica al Señor, angustiosa y confiada.", "amb": ["Una vez más, comenzamos el día con un grito espontáneo que manifiesta nuestra realidad: \"necesitados\". Y la realidad de Dios: \"alguien\" que sale al paso de nuestra necesidad. Por eso, nuestra insistencia ante él: \"Señor, escúchame… atiéndeme… hazme caso…\"", "Es el clamor, casi angustioso, de quién siente una necesidad apremiante, ineludible… y que se la expone a aquél que se la puede remediar: \"te expongo mi causa y me quedo aguardando… como un escudo me rodea tu favor…\" Esta debe ser nuestra actitud ante Dios, al comenzar nuestra oración de la mañana. Actitud que tiene que marcar el ritmo de nuestro vivir.", "En nuestras relaciones con los demás, no siempre somos comprendidos… aceptados… amados. Y a veces, hasta somos rechazados y perseguidos.", "En medio de esta problemática relacional, nunca nos va a faltar la comprensión y aceptación por parte de Dios. Precisamente nuestra oración es sentir esa comprensión y aceptación y salir dispuestos a vivir con ánimo tranquilo y sereno: \"que se alegren los que se acogen a tí con júbilo eterno\".", "Ya desde \"la mañana escucharás mi voz y me quedo aguardando\". Hablémosle confiadamente, que ciertamente nos escucha."], "oracion": ["Señor, un día más ante tí. Sabemos que siempre nos escuchas. Ya desde la mañana ponemos en tí toda nuestra confianza, porque sabemos que nos amas.", "Nuestra vida trascurre mezclada con momentos fáciles y otros no tanto. No siempre encontramos comprensión a nuestro alrededor. Es más: a veces nos encontramos hasta con rechazos.", "Nuestro encuentro contigo, nos consuela, nos reanima… nos hace sentir la fuerza de tu auxilio y nos sentimos fuertes con tu fortaleza.", "Que este día que comenzamos nos haga crecer en medio de nuestras luchas, porque sabemos que tú mismo estás con nosotros. Tú que vives y reinas por los siglos de los siglos."]}, {"ref": "Cántico 1Cro. 29", "sub": "es un canto de alabanza y gratitud a la grandeza y al poder de Dios.", "amb": ["No podemos quedarnos indiferentes ante todo lo que nos rodea. Saber escuchar, saber ver, saber admirar… es fuente de sabiduría para quienes lo practican.", "Dios ha puesto en nuestro mundo todo un conjunto de maravillas que nos hablan de su grandeza, de su poder, de su ciencia, de su belleza, de su majestad… y nos invitan a descubrirle. El es creador, el autor de todo lo que existe. Y desde el silencio de su existencia, nos hablan de él, de su amor. Somos nosotros quienes tenemos que reconocerlo, disfrutarlo y agradecerlo: \"por eso Dios nuestro, te damos gracias… te bendecimos por los siglos de los siglos\"…", "Ante el día que estamos estrenando, impregnados de los sentimientos de este cántico, nos entregaremos a nuestras ocupaciones con un talante gozoso, que nos suavizará las dificultades que encontremos… \"tú confortas a todos…\"", "Proclamaremos que del Señor \"viene la riqueza y la gloria\", que \"en su mano está el poder y la fuerza\", para reconocer que todo lo ha puesto a nuestra disposición: \"tú engrandeces a todos\".", "Un día nuevo y una alegría renovada: Dios está de nuestra parte."], "oracion": ["Señor, reconocemos lo grande que eres, al caer en la cuenta de las muchas y variadas maravillas que has realizado y estás realizando en favor nuestro. Es justo que te bendigamos, que te demos gracias, que proclamemos tu grandeza y tu sabiduría.", "Todo cuanto hay en el cielo y en la tierra, lo has creado tú para nosotros. Todo nos habla de tí, de tu amor. No has escatimado nada para manifestárnoslo.", "Que nuestra vida sea un \"gracias\" permanente a tí que vives por los siglos de los siglos."]}, {"ref": "Salmo 28", "sub": "canta la manifestación de Dios en la tempestad.", "amb": ["Saber descubrir las manifestaciones de Dios, es toda una tarea a realizar. Lo mismo se nos manifiesta en la suave brisa de una tarde de primavera, que en las fuertes tormentas de un día de verano. Lo mismo nos habla desde la tranquilidad de una inmensa llanura, que desde la firmeza y majestad de unos montes.", "Todas las obras de Dios, son una clara manifestación de su sabiduría, de su poder, de su belleza… Todo nos habla de él.", "Este salmo 28, es una invitación reiterada a \"aclamar la gloria y el poder del Señor…\" porque \"la voz del Señor es potente… es magnífica… se hace presente en las aguas torrenciales… descuaja los cedros… hace saltar a los montes… descorteza las selvas…\"", "Todas las fuerzas de la naturaleza, son manifestación de su grandeza y de su potencia. Todas son huellas de las pisadas de Dios que nos invitan a descubrirle… a buscarle… a admirarle…. a conocerle… y a amarle.", "Dios, pues, no es el lejano, aunque no le veamos con nuestros ojos. Está oculto, pero nos manifiesta su rostro. Por medio de nuestra reflexión, debemos descubrirle en el trasfondo de sus obras: ahí está él, hablándonos… amándonos… haciéndose el cercano.", "Sembremos nuestra vida de optimismo y de alegría, porque... \"Dios está muy cerca\"."], "oracion": ["Señor, nos dejas asombrados cuando te contemplamos en cada una de tus obras. Lo mismo en las grandes como en las pequeñas… en las más majestuosas como en las más sencillas. Todas, absolutamente todas, nos hablan de ti.", "Quisiéramos tener unos ojos limpios, sin prejuicios, que nos ayuden a descubrirte… a verte, en el trasfondo de cada una de tus obras, porque ahí estas tú. Y después de descubrirte, poder exclamar llenos de gozo, con \"un grito unánime: ¡gloria!\"… a tí que vives por los siglos de los siglos."]}], "summary": {"breve": ["Salmo 5: En nuestra vida pasamos por situaciones nada fáciles. Necesitamos la fuerza de Dios. Por eso clamamos: \"Señor, escucha… atiéndeme… hazme caso\".", "Cántico 1CRO.: Reconocer… y bendecir. No podemos pasar indiferentes ante las obras de Dios. Por todo \"nosotros te damos gracias\" y te bendecimos.", "Salmo 28: Dios no es el oculto. Es manifestación permanente. Saber descubrirle por medio de sus obras es todo un reto que tenemos que afrontar, en nuestra vida concreta."], "oracion": ["Salmo 5: Puede ser proclamado por dos solistas, dejando un breve silencio entre las estrofas. Todo el grupo proclama las dos últimas estrofas y el Gloria.", "Cántico 1CRO. 29: Proclama un solista la primera estrofa y continúa todo el grupo hasta el final.", "Salmo 28: Un solista invita a la alabanza a todo el grupo con la primera estrofa, y se proclama a dos coros."], "reflexion": ["Señor, atiende a mis gemidos…", "Nosotros te damos gracias…", "Aclamad la gloria y el poder del Señor…"]}}, {"key": "oración de la tarde", "label": "Vísperas", "psalms": [{"ref": "Salmo 10", "sub": "súplica confiada al Señor, ante la persecución.", "amb": ["Ante un día que estamos terminando, las ocupaciones que hemos tenido, tal vez nos han ocasionado tensiones, nerviosismos, cansancios. Estamos necesitados de unos momentos de paz, de tranquilidad… que nos serenen y tranquilicen.", "En nuestra oración de esta tarde, se nos ofrece la oportunidad de conseguirlo. Las primeras palabras de este salmo 10, son una invitación a la distensión, a la serenidad: \"al Señor me acojo\"…", "El es paz, serenidad, calma…", "No importa que a lo largo de este día hayamos encontrado motivos u ocasiones de tensión. Han sido fruto de nuestras relaciones con nosotros mismos y con los demás.", "Pero nos tiene que alegrar que \"el Señor no quiere la violencia… ni a los que tensan el arco para disparar\"… El es Dios de la paz, no de la guerra. \"El es justo y ama la justicia… y los buenos verán su rostro…\".", "Que al terminar este día nos echemos en brazos de Dios nuestro Padre y sintamos el calor de su cariño. Después del descanso de la noche, nos sentiremos renovados y dispuestos a comenzar una nueva jornada con un talante nuevo y un ánimo tranquilo y sereno."], "oracion": ["Señor, te estamos necesitando. Nos arrojamos en tus brazos como un niño en brazos de su madre.", "Paz… tranquilidad… serenidad… es lo que queremos conseguir al terminar este día. Y es lo que tú nos ofreces, si confiados, nos acogemos a tí.", "Sabemos que nos conoces, que nos amas… que sabes de nuestros momentos fáciles y no tan fáciles, que tal vez nos han hecho perder la paz. En tu regazo de Padre, todo cambiará. Nos sentiremos distintos, renovados. En tí que vives por los siglos de los siglos."]}, {"ref": "Salmo 14", "sub": "es una exposición de condiciones para encontrarse con el Señor.", "amb": ["La línea de cercanía o distancia entre Dios y nosotros, no la marca Dios. La marcamos nosotros mismos. Dios siempre es el cercano… \"el gran presente\". Somos nosotros quienes tenemos la posibilidad de romper y establecer distancias o cercanías. Dejamos abiertos los caminos a Dios, y rompemos distancias, cuando \"somos honrados… justos… de intenciones leales… fieles a nuestros compromisos… respetuosos con el inocente…\"", "Y cerramos los caminos a Dios cuando en nuestra vida práctica procedemos marginando a Dios o despreciando al hermano.", "Terminamos un día más. No debemos hacerlo a la ligera. Detenernos ante Dios y ante nosotros mismos, nos llevará a examinar la calidad y profundidad de nuestra vida.", "En la proclamación de este salmo nos vamos a preguntar: \"¿quién puede hospedarse en tu tienda, Señor?\"… O lo que es lo mismo: el día que termino, las acciones que he realizado… ¿están en la línea que Dios quiere de mí, y que esperan mis hermanos?..."], "oracion": ["Señor, tú eres el cercano, el amigo que no sabe de distancias.", "Siempre estás dispuesto a invitarnos a morar contigo en la gran tienda de tu amor de Padre. Y esperas de nosotros que no establezcamos distancias desde nuestra vida, vivida de espaldas a tí y a los hermanos.", "Eres justo y esperas de nosotros que vivamos la justicia. Eres bueno con todos y esperas que nosotros hagamos lo mismo.", "Reconocemos que no siempre hemos sido así. Con tu ayuda, queremos rectificar. Tú que vives por los siglos de los siglos."]}, {"ref": "Cántico Ef. 1,3-10", "sub": "es un canto al Dios que nos ha elegido desde siempre para ser sus hijos", "amb": ["No podíamos esperar más de Dios nuestro Padre. Se ha volcado totalmente en la persona de Cristo para volcarse en nosotros desde él y en él, y así, hacernos hijos en el Hijo.", "En Jesucristo nos ha manifestado su plan maravilloso sobre cada uno de nosotros: el mismo Jesucristo es su plan, el proyecto que tienen pensado realizar. Proyecto pensado desde siempre, antes de crear el mundo. Proyecto gratuito, fruto de su amor sin límites. Antes de que existiéramos, sin que hubiéramos hecho nada por nuestra parte, él, desde su generosidad, por pura iniciativa suya… lo ha trazado y está dispuesto a realizarlo, si no se lo impedimos.", "Proyecto con todas las garantías. Dios no se volverá a atrás. La misma persona de Cristo es la firma que lo acredita.", "Es justo que al proclamar este cántico rebosemos de alegría y de agradecimiento. De alegría, porque no podía hacer mayor prodigio en favor nuestro: hacernos hijos suyos. Y de agradecimiento, porque un gesto de amor tan grande no debe chocar en frío.", "En verdad podemos exclamar entusiasmados: \"somos importantes para Dios\"."], "oracion": ["Señor, queremos llamarte con una palabra que te define totalmente: PADRE. No se nos hubiera ocurrido a nosotros. Hubiera sido un atrevimiento. Pero, desde tu amor que no conoce límites, se te ha ocurrido a tí.", "Has querido hacernos hijos tuyos. Con toda verdad podemos llamarte PADRE.", "Asombrados, te decimos que no podías haber hecho más por nosotros: pobres criaturas con un destino insospechado: HIJOS DE DIOS. Gracias Padre y que tus hijos no te defraudemos, a tí que vives por los siglos de los siglos."]}], "summary": {"breve": ["Salmo 10: Necesitamos recuperar nuestra paz, tal vez rota por las ocupaciones de día. Los brazos acogedores de Dios Padre nos la devolverán de nuevo.", "Salmo 14: Descubrimos la cercanía de Dios desde nuestra vida. Solo quienes viven la justicia, la lealtad, el amor al prójimo… gozarán de un Dios cercano.", "Cántico EF: Los comportamientos de Dios con nosotros siempre son sorprendentes: nos ha elegido desde siempre, en Cristo, para ser sus hijos. Toda una sorpresa de su amor sin medida."], "oracion": ["Salmo 10: Proclama la primera estrofa un solista, un breve silencio y sigue todo el grupo.", "Salmo 14: Proclamarlo en forma responsorial con la primera estrofa que puede ser cantada.", "Cántico EF. 1,3-10: Proclama un solista la primera estrofa y continúa todo el grupo. Concluido, tener un silencio meditativo sobre el plan de Dios."], "reflexion": ["Al Señor me acojo…", "Señor, ¿quién puede hospedarse en tu tienda…", "El nos eligió en la persona de Cristo…"]}}]}, {"name": "martes", "hours": [{"key": "oración de la mañana", "label": "Laudes", "psalms": [{"ref": "Salmo 23", "sub": "es el canto de los \"buscadores de Dios\".", "amb": ["Todo ser humano, necesita ser un \"buscador\" de Dios. Todo cristiano, debe ser un comprometido con ese maravilloso quehacer.", "Nosotros, los religiosos, \"oficialmente\", somos los que públicamente nos hemos comprometido a vivir como se ha comprometido todo cristiano. Nuestro distintivo es ser BUSCADORES DE DIOS.", "Por eso cuando una comunidad se reúne para orar, habría que decir de ella: \"este es el grupo que busca al Señor\". Lo viven… lo proclaman… y se comprometen a manifestarlo.", "Y esa búsqueda la van realizando a lo largo del día… en todas sus acciones… Todo debe facilitar la \"entrada al Rey de la gloria\" el encuentro con ese Dios que buscan porque lo necesitan.", "\"Portones, alzad los dinteles\"... Que toda la persona, que todas sus puertas, se abran y den paso fácil, \"al Señor… al Rey de la gloria\". Y damos ese paso fácil… cuando vivimos nuestro \"ser buscadores de Dios\", cuando rompemos nuestros ídolos… cuando amamos al hermano… cuando presentamos unas manos cargadas de inocencia. \"Ese recibirá la bendición del Señor\" Ese es el verdadero \"buscador de Dios\"."], "oracion": ["Tú, Señor, has sembrado en nosotros esa necesidad que sentimos de ti, y que nos ha convertido en ser tus \"buscadores\". Gracias por esa semilla. Ojalá la hagamos fructificar, y no la ahoguemos con nuestros ídolos, con nuestras rutinas.", "Que toda nuestra vida, que cada una de nuestras acciones… sean un grito por ti. Que nos abramos de par en par y que no tengas que llamar a nuestra puerta. Entra cuando quieras, Señor. Nuestra casa es tu casa. Para ti, que vives por los siglos de los siglos."]}, {"ref": "Cántico Tb.13,1-10", "sub": "Dios siempre nos espe- ra.", "amb": ["Dios siempre espera. Aguarda pacientemente nuestra decisión en nuestras relaciones con él. El es la puerta siempre abierta para quien quiera entrar: \"si volveis a él de todo corazón, él volverá a vosotros\"… siempre \"se compadecerá de nuevo\".", "Por eso, nuestra respuesta debe ser desde la gratitud… desde el reconocimiento: \"ensalzadlo… dadle gracias… proclamad su grandeza… Bendito sea Dios que vive eternamente…\" Estos deben ser nuestros sentimientos al proclamar este cántico: Ir descubriendo al Dios amor… al Dios perdón… al Dios que nos comprende… al Dios que nos disculpa… y desde ahí, vivir una relación de amor con él.", "Frecuentemente nos hundimos ante nuestros fallos. Y es que nos fijamos más en ellos, que en el Padre que nos espera con los brazos abiertos. Reconocer los fallos, sí. Pero para abrirnos al amor.: \"Si volveis a él… siendo sinceros con él… él volverá a vosotros\".", "Así de maravilloso es nuestro Dios, y así quiere manifestársenos. Por eso \"anunciad su grandeza y su poder…\" \"Que todos le alaben y le den gracias…\""], "oracion": ["Señor, nuestros pesimismos, frecuentemente nos llevan a imaginarte cómo no eres: el Dios de la mano dura, el Dios exigente. Pero tú no eres así. Eres justo, pero eres amor. Eres recto, pero eres comprensivo. Nos conoces a todos, por eso nos amas a todos.", "Quisiéramos que nuestro comportamiento contigo fuera como tú quieres que sea: el de unos hijos con su Padre: de cercanía… de amor… de cariño… de gratitud. Tú te lo mereces TODO. Vives por los siglos de los siglos."]}, {"ref": "Salmo 32", "sub": "es un himno a la providencia y cercanía de Dios.", "amb": ["La grandeza de Dios, no debe ser un obstáculo, para que le sintamos cercano. Somos sus criaturas, pero no se desdeña de acercarse a nosotros…: \"El se fija en todos los hombres… modeló cada corazón… comprende todas sus acciones\"… \"los ojos del Señor están puestos en sus fieles\". Así es de cercano nuestro Dios.", "Con verdad podemos decir \"dichosa la nación cuyo Dios es el Señor\". \"El es nuestro auxilio y escudo\".", "Su cercanía hace que resalte más su grandeza: \"su palabra hizo el cielo… los océanos… los planes y proyectos de los hombres, nada pueden hacer contra los de Dios, que subsisten para siempre\"…", "Nuestra admiración… nuestra alabanza… nuestra gratitud… debieran ser la reacción más espontánea, ante él: \"aclamad justos al Señor… dadle gracias… tocad en su honor…\" \"Merece la alabanza de los buenos…\"", "Siempre, nuestra oración de la mañana, debe ponernos a tono, para que en el día que comenzamos, tomemos una postura clara ante Dios y ante nosotros mismos. Es el único modo de vivir la vida con toda la hondura que merece."], "oracion": ["Eres grande, Señor. Pero no por eso dejas de acercarte a los pequeños. Y es que tu grandeza es también cercanía. Por eso te alabamos… te damos gracias… y seguimos \"esperando que tu misericordia venga sobre nosotros\".", "Nos sentimos dichosos de ser \"la nación cuyo Dios eres tú\". Por ello hemos optado libre y responsablemente. Que nuestra respuesta y nuestra correspondencia no te falte nunca… a ti que vives por los siglos de los siglos."]}], "summary": {"breve": ["Salmo 23: El Señor, creador de todo, quiere hacerse encontradizo con cada uno de nosotros. Desde nuestra libertad podemos facilitárselo ó dificultárselo. Abrámosle nuestra puerta.", "Cántico TB.13: Dios llama, espera… respeta nuestra decisión. Siempre es compasivo y misericordioso, es nuestro Dios y Señor, desde sus entrañas de Padre.", "Salmo 32: Dios es grande, pero desde su grandeza se acerca a nuestra pequeñez. Vivir la alegría de la gratitud, debe ser el único modo de vivir nuestra vida."], "oracion": ["Salmo 23: Lo proclama un solista y contesta todo el grupo forma responsorial con \"este es el grupo que busca al Señor\".", "Cántico TB.13: Dos solistas alternan cada una de las estrofas. Y termina todo el grupo con la última estrofa y el Gloria.", "Salmo 32: Un solista canta o recita las dos primeras estrofas, y continúa todo el grupo a dos coros, para terminar juntos con las dos últimas estrofas y el Gloria."], "reflexion": ["Este es el grupo que busca al Señor…", "Si volvéis a él...él volverá a vosotros…", "Dichoso el pueblo que él se escogió como heredad…"]}}, {"key": "oración de la tarde", "label": "Vísperas", "psalms": [{"ref": "Salmo 19", "sub": "es un canto al Señor, fortaleza en nuestras luchas.", "amb": ["La vida humana es como un campo sembrado de luchas. Y la vivimos, en la medida, en que cada día, tenemos el valor de enfrentarnos con esas luchas.", "Pero no debemos desalentarnos: en nuestras luchas, nunca estamos solos. La fuerza del Señor está siempre de nuestra parte: \"el Señor da la victoria a su ungido\"… \"con los prodigios de su mano\".", "Pobres de aquellos que confían solamente en sus propias fuerzas: \"en sus carros… en su caballería…\" un fracaso seguro será el término de sus esfuerzos: \"ellos cayeron derribados\".", "Seguro que todos tenemos experiencias dolorosas de luchar en solitario, y hemos pagado las consecuencias. Que nos haya servido de escarmiento e intentemos cambiar de táctica.", "Convenzámonos: Dios siempre nos auxilia… nos escucha… nos apoya… tiene en cuenta nuestros buenos deseos y da éxitos a todos nuestros \"planes\" cuando los fundamentamos en él.", "Y entonces sí que podemos \"cantar victoria y alzar estandartes porque el Señor siempre nos concede lo que le pedimos\". \"Reconozco, que el Señor da la victoria a su ungido… que lo ha escuchado\"."], "oracion": ["Señor, tú nunca nos dejas solos en nuestras luchas. Tu fuerza, tu amor, nos respalda siempre. Pero es necesario que nos abramos y confiemos en ti. Que no nos lancemos a la vida, solamente confiados en nuestras fuerzas, como si tú no existieras. Fracasaríamos. La experiencia nos lo confirma.", "Señor, queremos luchar, pero siempre confiados en tu fuerza. Tú que vives y reinas por los siglos de los siglos."]}, {"ref": "Salmo 20", "sub": "es un himno de acción de gracias a la generosidad del Señor.", "amb": ["Vivir el sentido de la gratitud, es una puerta abierta para recibir más y mayores favores. Pero por desgracia, es frecuente no reconocer lo que nos \"regalan\", y no ser agradecidos. Una palabra tan sencilla como GRACIAS, no la pronunciamos muy frecuentemente, ni a Dios ni a los hermanos.", "Este salmo 20, es una invitación a caer en la cuenta de la generosidad de Dios, aun sin pedírselo: \"te adelantaste a bendecidlo con el éxito\"… \"Le has concedido el deseo de su corazón\". Y también cuando le exponemos nuestras necesidades…\" no le has negado lo que pedían sus labios… \"vida… años… bendiciones incesantes… gozo…\" Así es la generosidad de Dios para con nosotros.", "Por eso podemos decirle con verdad: …\"Señor, nos alegramos por tu fuerza… y cuánto gozamos con tu victoria\". En consecuencia, no podemos menos de \"cantar tu poder al son de instrumentos\"… de darte gracias una y otra vez por todo lo que has hecho y estás haciendo por nosotros.", "Que la proclamación de este salmo 20, nos despierte, nos saque de nuestro egoísmo y nos haga ver todo lo que tenemos que agradecer a los demás."], "oracion": ["¡Dios, Padre nuestro! Tu generosidad para con nosotros no conoce límites. Aun antes de que te lo pidamos, ya estás tú saliendo a nuestro encuentro… entregándote… amándonos. Nos has dado y nos estás dando muchas cosas… pero el gran regalo que nos haces eres tú mismo, pues, aun detrás de cada cosa que nos das, ahí estas tú.", "Un GRACIAS muy grande, prolongado, sin término, es lo que queremos decirte al terminar este día. ¡Gracias Padre!, a ti que vives por los siglos de los siglos."]}, {"ref": "Cántico Ap. 4", "sub": "Es un canto a Cristo vencedor de la muerte.", "amb": ["Sigue la invitación a la gratitud. Lo entregó todo por nosotros. En su generosidad, no se reservó nada: \"Habiendo amado a los suyos, los amó hasta el extremo\". Dios no anda con medianías: es entrega y actúa siempre en consecuencia, se entrega totalmente. Y es que la \"medida del amor, es amar sin medida\".", "Ante un comportamiento así, es lógico que digamos: \"eres digno, Señor, de recibir gloria, honor, poder, alabanza,… Nada menos que con tu sangre \"compraste hombres de toda raza, lengua, pueblo y nación…\" Y es más: \"has hecho de nosotros un reino de sacerdotes…\"", "No tiene explicación permanecer indiferentes, fríos… ante las grandes acciones de Dios en favor nuestro. Mejor dicho sí que la tiene, si nos movemos desde la irreflexión, desde la rutina, desde la indiferencia. Pero esa postura sí que no tiene explicación.", "Si los humanos debemos regirnos desde la razón, la misma razón nos exige que seamos consecuentes, con realidades que están ahí, y que no debemos ni podemos eludir, irresponsablemente.", "Y la gran realidad es: Dios que no se ha reservado nada, por mí... por tí. Nuestra respuesta es la postura más normal que podemos adoptar."], "oracion": ["Padre, en Jesús nos has hablado, hasta con palabras de sangre, y nos ha dicho quiénes somos para ti. Palabras más inteligibles y más claras, ya no podías utilizar. Desde nuestra sinceridad, tenemos que reconocer, que no siempre las hemos escuchado, y no te hemos correspondido con la respuesta de nuestra vida.", "Nuestro gesto hoy es, \"nos arrepentimos… queremos cambiar\". Al mismo tiempo te decimos, GRACIAS. Un gracias, que va a ser la respuesta de nuestra vida. A ti que vives por los siglos de los siglos."]}], "summary": {"breve": ["Salmo 19: La lucha, el esfuerzo debe ser la característica de nuestra vida. Pero no luchamos solos. La fuerza del Señor siempre está de nuestra parte, si ponemos en él nuestra confianza. Con él cantaremos victoria.", "Salmo 20: Vivir el sentido de la gratuidad frente a Dios y frente a los demás, debiera ser nuestro ideal de vida. Recibimos mucho y tal vez agradecemos poco. Un GRACIAS a tiempo alegra y nos alegra.", "Cántico AP: Más no podía hacer por nosotros. Lo dió todo, mejor dicho, se dió todo. Se lo merece todo. Nuestra gratitud debe ser la respuesta más lógica."], "oracion": ["Salmo 19: Un solista proclama las dos primeras estrofas y continúa al unísono todo el grupo.", "Salmo 20: Proclamar a dos coros las dos primeras estrofas, y concluye todo el grupo con la última y el Gloria.", "Cántico AP.4: Todo el grupo, pausadamente, con un fondo musical suave."], "reflexion": ["Nosotros invocamos el nombre del Señor…", "Le concedes bendiciones incesantes…", "Has hecho de ellos... un reino de sacerdotes…"]}}]}, {"name": "miércoles", "hours": [{"key": "oración de la mañana", "label": "Laudes", "psalms": [{"ref": "Salmo 35", "sub": "canto a la bondad de Dios contra la degradación del malvado.", "amb": ["Dos realidades que están ahí: Dios y el hombre. Dios, amor, entrega… y el hombre, en ocasiones, prescindiendo de Dios.", "Cuando el hombre \"renuncia a ser sensato… y se obstina en el mal camino…\" es capaz de cualquier cosa: \"En sus palabras, traición… en su pensamiento trama el mal, el crimen… haciéndose ilusiones ante su pecado\".", "Pero Dios… sus pensamientos, su actuar es completamente distinto al del hombre: \"su misericordia llega al cielo, su fidelidad hasta las nubes… su justicia no tiene límites…\"", "Su comportamiento con los humanos, siempre es desbordante. A todos ayuda y socorre: \"a hombres y animales\"… Todos \"se nutren de lo sabrosos de su casa… del torrente de sus delicias… De tal manera que podemos exclamar con verdad: \"qué inapreciable es tu misericordia, ¡oh Dios!\".", "Estamos comenzando un nuevo día. Y tenemos que definirnos claramente en nuestra vida: Dios y nosotros. La postura de Dios es clara: amarnos. La nuestra, queda pendiente. Es nuestra libertad la que tiene que decidir."], "oracion": ["Padre, nos has creado, no para estar enfrentados contigo. Sino para todo lo contrario: para que vivamos en diálogo permanente… en amistad verdadera y profunda, contigo. Desde siempre, nos has pensado, como hijos tuyos. Y tú el Padre lleno de ternura, de fidelidad, de amor.", "Esto nos llena de alegría y nos urge a tomar una postura coherente y comprometida, contigo. Que no te defraudemos en todo lo que esperas de nosotros. Tú que vives y reinas por los siglos de los siglos."]}, {"ref": "Cántico Jdt. 16", "sub": "es un canto al Dios protec- tor, digno de toda alabanza.", "amb": ["Estamos en el comienzo de un nuevo día. No debemos entregarnos a nuestras ocupaciones, desconectados de realidades, que deben influir en nuestra vida: Dios y nosotros.", "Para los que nos hemos comprometido públicamente con esas realidades, sería traicionarnos a nosotros mismos, y a los que esperan mucho de nuestra forma de vivir.", "Dios es la realidad que da sentido a nuestra realidad. Por eso, ya desde estos primeros momentos del día, concienciémonos de su persona, de lo que supone para nosotros, de sus obras en favor nuestro… y digámosle con palabras de este cántico: \"Señor, tú eres grande… tú eres admirable… cantaré para tí un cántico nuevo…\"Invitaré a toda la creación a que te sirva, desde la palabra de mi vida.", "Diré que \"te alaben con tambores… con cantos al son de la cítara… acordes de salmos…\" pero es mi vida la que tiene que estar bien afinada, para que toda ella sea una sinfonía de alabanza al Dios de mi vida.", "El siempre me será fiel. \"Fallarán los cimientos de los montes… las peñas se derretirán como cera…\" Pero Dios siempre me \"será propicio\"."], "oracion": ["Señor, gracias por este día que comenzamos. Queremos que todo él sea un \"cántico nuevo\" para ti. Que rompamos con rutinarismos, con mediocridades, y vivamos la novedad de un nuevo día.", "Reconocemos que eres admirable, que te lo mereces todo, que nuestra vida debiera ser una melodía que cante lo que tú eres, y tus desvelos para con nosotros. Pero nuestros fallos, nuestras limitaciones, nos lo están impidiendo. Nos esforzaremos por corresponderte, a ti que vives por los siglos de los siglos."]}, {"ref": "Salmo 46", "sub": "Es un himno a Dios Creador de todo lo que existe.", "amb": ["Es importante tomar en serio nuestra vida. Pero a esto no se opone, descubrir y vivir su sentido \"festivo\" alegre… gozoso. Tal vez nos fijamos más en lo negativo que en lo positivo, en los momentos \"duros\", que en los momentos agradables.", "Este salmo 46 nos invita a vivir y exteriorizar con \"gritos de júbilo\"… nuestra experiencia de Dios, nuestra alegría: \"Batid palmas… tocad para Dios, tocad… tocad con maestría…\"", "Hay muchos motivos para ello: y es que Dios, el creador de todos y de todo… ha puesto el mundo a nuestra disposición… y lo que es más importante \"nos escogió por heredad suya\"… somos los mimados de Dios.", "En nuestra oración de la mañana, todos los días, con modalidades distintas, se nos invita a saber mirar las obras de Dios, a reconocerle en ellas, a admirarle, a agradecerle… y a sentir la alegría de que ha pensado en nosotros cuando las ha creado. Y desde ahí, dar un color nuevo a nuestra vida, cada día que estrenamos.", "Dejémonos empapar del contenido de este salmo, y proclamémoslo con alegría y entusiasmo, invitando a todos los pueblos a batir palmas aclamando a Dios."], "oracion": ["Señor, nos alegramos de cómo eres, de las obras que realizas, y de cómo nos tratas. Podemos decir que te desbordas en tu comportamiento con nosotros. Nada menos que nos \"has escogido como heredad tuya\".", "Queremos que nuestra vida sea una clara manifestación de estas realidades. Y que todos, al vernos, se sientan impulsados a \"aclamarte con gritos de júbilo\", proclamando tu grandeza y tu cercanía. Esa es nuestra vocación y esa debe ser nuestra misión. Tú que vives por los siglos de los siglos."]}], "summary": {"breve": ["Salmo 35: Cuando renunciamos a ser sensatos, somos capaces de cualquier cosa. Aun de arrinconar a Dios. Menos mal que Dios, desde su misericordia y su fidelidad, permanece junto a nosotros y nos es fiel.", "Cántico JDT 16: Reconocer las acciones de Dios y agradecérselas, debe ser nuestra actitud permanente. No podemos pasar por la vida, con los ojos cerrados ante las obras del Señor. Son maravillosas. Reconozcámoslo.", "Salmo 46: Nuestra experiencia de Dios nos tiene que llenar de alegría y provocar en nosotros el deseo de que todos reconozcan y alaben sus maravillas, realizadas en favor de los hombres."], "oracion": ["Salmo 35: Dos solistas proclaman las dos primeras estrofas y continúa el grupo a dos coros.", "Cántico JDT 16: Un solista proclama la estrofa primera y continúa el grupo al unísono con las restantes.", "Salmo 46: Todo él proclamado por solistas espontáneos, forma responsorial, con el estribillo \"Aclamad a Dios con gritos de júbilo\"."], "reflexion": ["Señor, tu misericordia y fidelidad llegan hasta las nubes…", "Cantaré a mi Dios un cántico nuevo…", "Aclamad a Dios con gritos de júbilo…"]}}, {"key": "oración de la tarde", "label": "Vísperas", "psalms": [{"ref": "Salmo 26, I", "sub": "canto de confianza y súplica al Señor defensor.", "amb": ["Es cierto que son muchos los peligros y dificultades que nos acechan cada día. Y también es cierto que a veces sentimos miedo, nos asustamos, pensamos que no vamos a encontrar salida.", "Pero ¡ánimo! … no estamos solos. Hay alguien que está de nuestra parte… que es fortaleza en nuestra debilidad y ayuda en el peligro: \"el Señor es mi luz y salvación, ¿a quién temeré? … El Señor es la defensa de mi vida, ¿quién me hará temblar?\"… Es la reacción espontánea que debemos tener en esos momentos. Esa es la reacción del niño hacia su madre, ante cualquier peligro, porque confía en ella plenamente.", "Por eso, \"aunque nos asalten enemigos y adversarios… o todo un ejército…\" se oponga contra nosotros,… \"él me protegerá el día del peligro\"… \"me esconderá en lo escondido de su morada\"…", "Esta es la confianza del verdadero creyente y ahí radica nuestra fuerza en la lucha de cada día.", "Nuestra oración debe llevarnos a descubrir esta realidad y vivirla en las situaciones concretas de la vida.", "No vamos solos por la vida. Una santa \"audacia\" debe caracterizar nuestro vivir. \"El Señor es la defensa de mi vida\". Su fuerza es nuestra fuerza. Que nada nos haga tambalear. El, \"nos alzará sobre la roca\". ¿Por qué temer?."], "oracion": ["Señor, son muchos los momentos en los que siento miedo y me angustio. Pienso que las dificultades y los peligros van a poder más que yo. Pero debo convencerme de que no lucho sólo: tú estás en medio de mis luchas y mis dificultades, comunicándome tu fuerza y tu energía, para que nada ni nadie pueda contra mí. ¿Por qué temblar si tú \"eres la defensa de mi vida... si tú eres mi roca?\"... Dios, Padre mío, confío en ti, que vives por los siglos de los siglos."]}, {"ref": "Salmo 26, II", "sub": "Canto de confianza absoluta en Dios Padre.", "amb": ["Es normal que nos desahoguemos, que manifestemos en nuestra oración lo que nos preocupa, lo que sentimos, lo que vivimos. Es todo nuestro yo, el que se abre a la confianza con el amigo:Dios Padre", "No es que Dios nos rechace, nos abandone, nos deje de su mano. Pero somos nosotros, quienes desde nuestro ser humano, tenemos que manifestarnos como humanos necesitados", "Por eso, nuestra oración con este salmo: \"Señor, escúchame… no me rechaces… no me abandones…\".Y Dios tiene que sonreír al escuchar nuestras quejas y con voz cargada de cariño nos dice: \"aunque tú padre y tú madre te abandonen… yo nunca te abandonaré… yo te recogeré\"… Así es de verdad Dios nuestro Padre.", "En el mismo salmo se nos va a repetir: \"espera en el Señor, sé valiente, ten ánimo, espera en el Señor\". Aunque lo veamos todo negro… aunque creamos que la noche no termina… estemos seguros de que llegará el día, llegará la nueva luz, que nos llenará de esperanza, e iluminará nuestro camino.", "Las palabras del Señor, \"no temas, yo estoy contigo\"… tantas veces dichas por él, a sus enviados, tiene que resonar con fuerza en nosotros, cuando nos parezca que todo se hunde a nuestros pies. \"Espera… sé valiente… ten ánimo\"…"], "oracion": ["Padre, aunque a veces nos asalta la duda, pero sabemos que siempre nos escuchas, que nunca nos rechazas, que no nos dejas solos.", "Queremos que esta verdad nos empape totalmente, para hacerla vida de nuestra vida. Porque es cierto que \"aunque todos nos abandonaran… tú nunca nos vas a abandonar\".", "Que renovemos nuestra confianza en ti, para que sea como un aire nuevo que nos rejuvenezca, y nos haga vivir con más paz y más seguridad. Tu que vives por los siglos de los siglos"]}, {"ref": "Cántico Col. 1", "sub": "canto de gratitud a Cristo nuestro Hermano", "amb": ["Terminar el día con un GRACIAS, es señal de que hemos descubierto a alguien que nos quiere y se interesa por nosotros. Pues esa es la palabra con que vamos a comenzar este cántico: \"Damos gracias a Dios Padre\".", "Y se las damos merecidamente. Tenemos muchos motivos. Pero sobre todo \"porque nos ha trasladado al reino de su Hijo querido…\" es decir, porque ha querido hacernos hijos en el Hijo: nuestro gran destino, nuestra vocación, \"ser hijos de Dios\", con y en la persona de Cristo. El es la cabeza de este cuerpo maravilloso que es la IGLESIA.", "En el bautismo fuimos sumergidos en él, para que desde su humanidad empapada de Dios, nos vayamos empapando nosotros… cristificándonos… deificándonos.", "Nuestra acción de gracias, nuestra alegría, pues, no se fundamenta en imaginaciones o sentimentalismos vacíos. Sino en una gran realidad, que llena de sentido nuestra vida. Somos humanos, pero humanos con un destino impensado por nuestra parte: con la posibilidad de humanos - deificados - cristificados: hijos de Dios. Por ello, \"damos gracias al Padre\"."], "oracion": ["Gracias, Padre, porque nos amas, porque nos has manifestado tu amor en la persona de Cristo. En él te has volcado, para acercarte a nosotros. Y tanto te has acercado, que nos has comunicado tu misma vida, haciéndonos hijos en el Hijo.", "Nuestra gratitud es al mismo tiempo alegría. ¿Qué más podíamos esperar de ti?... Tú mismo eres nuestra gran esperanza. Contigo lo tenemos todo. Que apreciemos este gran tesoro y luchemos por conservarlo. Tú que vives por los siglos de los siglos."]}], "summary": {"breve": ["Salmo 26,I: No estamos solos en la vida. Dios siempre está de nuestra parte. Por fuertes que sean nuestros enemigos, más fuerte es el Señor. Abrámonos a su fortaleza.", "Salmo 26,II: En nuestra vida hemos tenido muchos desengaños. A veces nos han fallado hasta nuestros mejores amigos. No así Dios nuestro Padre. Aunque todos nos fallen, él nunca nos fallará.", "Cántico COL.1: Tenemos muchos motivos para dar gracias a Dios. Esta tarde le damos gracias porque nos ha capacitado para entrar en el reinado de CRISTO JESUS, el primer resucitado."], "oracion": ["Salmo 26,I: lo proclama un solista y en forma responsorial contestan todos \"El Señor es la defensa de mi vida\", con un brevísimo silencio después de cada respuesta.", "Salmo 26,II: Lo mismo que el anterior pero con el estribillo \"Señor, enséñame tu camino\"", "Cántico COL.1: A dos coros, con un fondo musical suave."], "reflexion": ["El Señor es la defensa de mi vida…", "Si mi padre y mi madre me abandonan, el Señor me recogerá…", "Nos ha hecho capaces de compartir la herencia…"]}}]}, {"name": "jueves", "hours": [{"key": "oración de la mañana", "label": "Laudes", "psalms": [{"ref": "Salmo 56", "sub": "es un canto de confianza y grati- tud a Dios, seguridad nuestra.", "amb": ["Es muy humano, que a veces nos encontremos con la moral baja, y nuestro estado de ánimo sea flojo. Son muchos los factores que pueden influirnos: noso-tros mismos, nuestra situación ante la vida, nuestro entorno, las realidades de la sociedad, etc.", "Pero no lo miremos desde el lado negativo. Mirémoslo desde el lado positivo: es una oportunidad para encontrarnos con nosotros mismos, y caer en la cuenta de que somos seres necesitados y tenemos que acudir a alguien que nos ayude.", "Lo vamos a hacer al proclamar este salmo 56, de una manera reiterativa: \"mi alma se refugia en ti… me refugio a la sombra de tus alas, mientras pasa la calamidad\".", "Y es que nuestro entorno no es nada fácil: \"estoy echado entre leones devoradores… me han tendido una red… me han cavado una fosa…\"", "Ciertamente, no podemos cerrar los ojos ante realidades que están ahí. Pero \"invoco al Dios que hace tanto por mí… y me enviará la salvación…\".", "Por eso, me reanimo, me siento fuerte y puedo exclamar con verdad: \"mi corazón está firme… voy a cantar y a tocar… Dios mío\". Y… \"te daré gracias… por tu bondad y tu fidelidad…\"", "Comenzar así este nuevo día, es comenzarlo con perspectivas llenas de luz y de alegría."], "oracion": ["Señor, nos es difícil mantenernos al margen de las situaciones de la vida. Poco ó mucho, siempre nos influyen. Por eso nos abrimos a ti y te decimos que te necesitamos.", "No importa que a veces nos hagamos los autosuficientes. Es uno de nuestros fallos, que sinceramente reconocemos.", "Pero de verdad, te repetimos; que te necesitamos. Es la oración que te dirigimos en esta mañana con insistencia y que va a marcar el ritmo de nuestro quehacer de hoy. Tú que vives por los siglos de los siglos."]}, {"ref": "Cántico Jr. 31", "sub": "es una llamada a la espe- ranza y al optimismo.", "amb": ["Cierto que en la vida tenemos momentos difíciles. Y también es cierto, que a veces no vemos horizontes en la lejanía, y nos sentimos hundidos. Pero abrámonos a la esperanza.", "No lo vemos, pero ahí está… \"el nos guarda como un pastor a su rebaño… \"nos redimió… nos rescató… \"anunciadlo en las islas remotas\"… a todos y en todas las partes. Y que todos se llenen de alegría y de esperanza.", "Todo encuentro con el Señor es transformador, es fortificante, cambia la vida de aquellos que se dejan encontrar.", "Este cántico de Jeremías es un anuncio claro y consolador, que nos debe que cargar de optimismo, a pesar de las circunstancias por las que tengamos que pasar: \"Entonces se alegrará la doncella… los jóvenes y los viejos… convertiré su tristeza en gozo… aliviaré sus penas\"…", "Y el Señor, no solamente nos alegrará, sino que también nos regalará multitud de bienes: \"trigo, vino, aceite… rebaños de ovejas y vacas…\"Así es la generosidad del Señor, que nadie la puede igualar. Abrámonos, pues, a la esperanza y al optimismo.", "\"Escuchad, pues, la palabra del Señor y anunciadla a todos\"."], "oracion": ["Padre, cuando pensamos detenidamente en tu comportamiento con nosotros, no podemos menos de admirarte, agradecerte y amarte, cada vez más.", "Necesitamos gritar con todas nuestras fuerzas \"nadie hay tan grande como tú\", ya que toda nuestra vida está tejida de tus bondades. Si nos pusiéramos a contarlas, no terminaríamos nunca. Que encuentres en nosotros la respuesta de gratitud que esperas. Tú que vives por los siglos de los siglos."]}, {"ref": "Salmo 47", "sub": "cántico a la grandeza de Dios ale- gría para todos.", "amb": ["Dios manifiesta su grandeza en todas sus obras. Cada una de ellas, es una página que nos habla de él.", "Comenzar un nuevo día, es prepararse a contemplar la presencia misteriosa de ese Dios, tan
