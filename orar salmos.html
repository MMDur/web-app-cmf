ue hasta los últimos rincones de la tierra, todas las naciones, descubran en él, el imprescindible, aquel sin el cual nada ni nadie tiene sentido, y nada puede subsistir", "Para vivir estas realidades, para anunciarlas hemos sido llamados. Nuestra vocación es misión: llamados para ser enviados, y ser \"Evangelio vivo\"… la gran noticia que nuestro mundo está esperando, porque la está necesitando. No podemos defraudarle.", "La proclamación de este salmo 66, tiene que despertarnos y lanzarnos con fuerza a vivir y a proclamar, con todas nuestras energías que Dios es, en la vida de todos y de cada uno de los humanos, alguien a quien, no sólo no podemos arrinconar, sino alguien de quien no podemos prescindir, si es que de verdad queremos VIVIR.", "Que nuestra oración, sea un deseo sincero de que todos, todos los pueblos, alaben al Señor. Ahora, lo vamos a expresar de palabra. Palabra que será compromiso para nuestra vida."], "oracion": ["Señor, queremos expresarte nuestro deseo sincero: …que todos los pueblos te reconozcan como eres y proclamen a gritos, tu rectitud, tu bondad, tu justicia, tu amor.", "\"Ilumina tu rostro sobre nosotros\" para que descubramos tus caminos que deben ser los nuestros. Que nuestras vidas sean una continua alabanza por tus bendiciones sobre todas las criaturas. Señor, de verdad: \"que todos los pueblos te alaben\". A ti que vives y reinas por los siglos de los siglos."]}], "summary": {"breve": ["Salmo 84: Cada uno de nosotros podemos afirmar \"el Señor ha sido bueno conmigo\". Sus bondades no tienen número. Se impone una respuesta por nuestra parte: nuestra fidelidad a su fidelidad.", "Cántico IS. 26: Nuestra seguridad está fundamentada en el Señor. \"El es la roca perpetua\"… \"realiza nuestras empresas\". Por eso podemos decir con verdad \"confiad siempre en el Señor\".", "Salmo 66: Pregoneros de Dios, nuestro deseo de que todos los pueblos y todas las razas le conozcan y le amen, tiene que marcar todos los ritmos de nuestra vida: \"que todos los pueblos te alaben\"."], "oracion": ["Salmo 84: Un solista proclama la 1ª estrofa y la 3ª, y las otras son proclamadas por todo el grupo.", "Cántico IS: Un coro proclama las tres primeras estrofas, y el otro las otras tres junto al Gloria.", "Salmo 66: Cantarlo todo, ó proclamarlo, ó cantar el estribillo \"Oh Dios…\" y las estrofas al unísono."], "reflexion": ["Voy a escuchar lo que dice el Señor…", "Confiad siempre en el Señor…", "Oh Dios que te alaben los pueblos…"]}}, {"key": "oración de la tarde", "label": "Vísperas", "psalms": [{"ref": "Salmo 124", "sub": "es un grito de reconocimiento de las acciones del Señor.", "amb": ["Reconocer nuestra condición de criaturas y las limitaciones que eso conlleva, es la clave para lograr nuestra realización. No podemos levantar bandera de independencia absoluta. Sería el comienzo de nuestro fracaso. Hasta nuestra misma existencia, está dependiendo de \"alguien\". Nuestra seguridad, no está en nosotros mismos. Por eso a todos los humanos podíamos definirlos, como \"buscadores\" de seguridades.", "Y consciente o inconscientemente, es como vamos viviendo nuestra vida. Buscamos seguridad en todo: en nuestras ideas, en nuestro trabajo, en nuestras amistades, en nuestra vida. Podemos decir que hoy lo \"aseguramos\" todo: la casa, el coche… hasta aseguramos la misma vida.", "Este salmo 124, al mismo tiempo que nos hace caer en la cuenta de nuestra condición, nos cuestiona sobre en qué y en quién ponemos nuestra seguridad.", "Y es que solamente hay uno que puede dar seguridad a nuestras seguridades: DIOS. \"Los que confían en él, son como el Monte Sión… que no tiembla, y está asentado para siempre\". \"El rodea a su pueblo ahora y por siempre\".", "Ante tantos cambios de nuestra sociedad actual, tal vez en ocasiones, nos sentimos inseguros, con miedo. Es el momento de afianzarnos en el que es todo seguridad. Nuestra comunidad se ha comprometido públicamente a vivir así. Y eso es lo que explica nuestro estar aquí. Reafirmemos nuestro compromiso al proclamar este salmo."], "oracion": ["Señor, todos los humanos buscamos seguridad. La inseguridad nos molesta, nos pone nerviosos. Nosotros, cuando nos comprometimos contigo, lo hicimos, convencidos, de que tú eres el único que da sentido y seguridad a nuestra vida.", "Si te somos sinceros, tal vez tenemos que reconocer, que a veces te hemos fallado. Hemos buscado nuestras seguridades, al margen de ti. Es el momento de rectificar. Tú lo esperas y nosotros lo necesitamos. Lo haremos. Tú que vives y reinas por los siglos de los siglos."]}, {"ref": "Salmo 130", "sub": "es una manifestación de con- fianza omnímoda en Dios.", "amb": ["Estamos en las últimas horas del día. Nuestras ocupaciones, los variados acontecimientos que hemos vivido, de alguna manera, nos han dejado cansados, nerviosos. Necesitamos descansar, serenarnos…", "Este salmo 130, es una clara invitación a la tranquilidad, a la paz, al descanso confiado: \"como un niño en brazos de su madre\". Así tenemos que sentirnos, ante Dios, en estos momentos del día. No son las frías ideas las que tienen que dominarnos en nuestra oración de la tarde. Es la vivencia profunda de una realidad misteriosa, la que tiene que empaparnos profundamente, y hacernos sentir la cercanía de Dios, cercanía amorosa, maternal…", "Tendemos a marcar distancias con aquellos que nos rodean. Y las marcamos también con Dios. Por eso, frecuentemente vivimos nuestra vida en solitario, privados del calor de la cercanía.", "Recojamos la invitación de este salmo y \"esperemos\" en el Señor ahora y por siempre, que no nos puede fallar. Y que nuestra esperanza esté cargada de confianza de hijos en un Padre que es todo amor, y presencia.", "Descubramos esta presencia, y vivamos la esperanza: \"espere Israel en el Señor\". Esperanza que no defrauda, y que da sentido al horizonte de nuestra vida. Nos fundamentamos en quien es seguridad que no puede fallar: Dios Padre."], "oracion": ["Señor, es lo que necesitamos: abandonarnos confiadamente en tus brazos como un niño en brazos de su madre. Y así disfrutar de tu presencia, de tu cercanía, de tu calor, de tu amor. En nuestra vida ordinaria, ¡cuántas veces vivimos el drama de la soledad, del abandono! Todo, por no profundizar en el misterio de tu compañía.", "Gracias, Padre, por tu presencia, por el calor de tus brazos. Sencillamente, gracias porque eres nuestro Padre. A ti que vives por los siglos de los siglos."]}, {"ref": "Cántico Ap. 4", "sub": "es nuestro canto agradecido a Cristo, que lo ha pagado todo por nosotros.", "amb": ["No es la gratitud un valor que cultivemos demasiado en nuestras relaciones con los demás. El egoísmo nos juega malas partidas en este punto.", "El cántico que vamos a proclamar, es una llamada reiterativa a caer en la cuenta de lo que otros han hecho, y están haciendo por nosotros. En concreto Dios en la persona de Cristo: El es el \"cordero degollado\" el que con su sangre firmó la alianza inquebrantable con nosotros.", "Por eso es justo que gritemos con todas nuestras fuerzas que merece la gloria, el honor, la alabanza de todos los que hemos sido beneficiados con su muerte.", "El grito de nuestras voces, ciertamente. Pero sobre todo el grito de nuestras vidas, sobrecogidos por el gesto de todo un Dios, que no duda en hacerse como uno de tantos, morir ajusticiado en una cruz, para manifestarnos que se interesa por nosotros, al máximo: \"habiendo amado a los suyos, los amó hasta el extremo\".", "Nuestra vocación es una respuesta a un compromiso con nuestro mundo. Necesita que le hablemos de \"gratitud\". Que nuestra palabra sea nuestra vida.", "Comencemos por vivir el sentido de la gratitud hacia aquellos con quienes convivimos. Será un ensayo permanente para extenderlo hacia tantos otros, que no vemos, pero que están influyendo en nuestra vida. Nuestro vivir es un constante recibir.", "Que sea constante el agradecer."], "oracion": ["Cristo, te lo mereces todo. Tú lo has dado todo por nosotros. Nuestro GRACIAS de esta tarde, quisiéramos que fuera un GRACIAS permanente, desde el grito de nuestra vida. Que tu gran obra realizada en favor nuestro, no se quede en la historia. Que sea una realidad que nos cuestione cada día y nos transforme en palabra viva para nuestros hermanos. Tú que vives y reinas por los siglos de los siglos."]}], "summary": {"breve": ["Salmo 124: Tenemos motivos para sentirnos seguros: nuestra seguridad se fundamenta en el Señor, el verdadero monte de Sión. No temamos ni dudemos a la hora de arriesgarnos por el Reino.", "Salmo 130: Terminamos un día más y necesitamos paz, descanso. Arrojémonos en los brazos del Padre como \"un niño en brazos de su madre\". Esperemos en el Señor \"ahora y por siempre\". No nos puede fallar.", "Cántico AP. 4: LA gratitud es una realidad que debemos cultivar. Es mucho lo que recibimos de los demás. En concreto de Cristo, nuestro hermano. Proclamamos que él se lo merece todo."], "oracion": ["Salmo 124: Un solista proclama la primera estrofa, y las restantes a dos coros.", "Salmo 130: Todos proclaman la segunda estrofa \"espere Israel…\", al principio y al final. Y un solista proclama la primera.", "Cántico AP. 4: .Cantar \"Gloria y honor a ti…\" al principio y al final, y proclamar todos juntos el cántico."], "reflexion": ["El Señor rodea su pueblo…", "Espera en el Señor, ahora y por siempre…", "Eres digno de recibir la gloria y el honor…", "Alegrémonos y gocemos…"]}}]}, {"name": "miércoles", "hours": [{"key": "oración de la mañana", "label": "Laudes", "psalms": [{"ref": "Salmo 85", "sub": "es una oración confiada a la bon- dad de Dios.", "amb": ["Reconocer lo que somos y lo que necesitamos, es fundamental, para saber caminar por la vida. A esto nos invita este salmo 85 con el que vamos a comenzar nuestra oración de esta mañana.", "Somos radicalmente pobres y necesitados. Y así tenemos que situarnos ante Dios. No para que nos invada la tristeza de ser criaturas, sino para que descubramos a Dios como alguien que viene a nuestro encuentro para socorrer nuestra pobreza y saciar nuestra necesidad.", "\"Soy pobre, pequeño,…\" Pero tú, \"eres grande y haces maravillas\"… porque sé que eres bueno y clemente, rico en misericordia…\" \"Porque tú me ayudas y consuelas…\"", "Así tenemos que ir descubriendo a Dios. El, siempre se nos hace el encontradizo, nos sale al paso en cada momento. El guía nuestros pasos… \"nos enseña el camino… para que vivamos en la verdad\".", "Nuestra oración de cada mañana, no se puede quedar sólo, en palabras que pronunciemos, sino en realidades que descubramos y que saboreemos.", "Descubramos y gustemos a Dios, y dejémosle \"que siga haciendo maravillas\"."], "oracion": ["Señor, reconocemos que somos pobres y que tú eres la gran necesidad de nuestra vida vida. Por eso te estamos llamando todo el día: toda nuestra vida es un grito por ti. Porque sabemos que eres bueno y misericordioso… que siempre nos escuchas y atiendes nuestras llamadas. Justo es que te alabemos de todo corazón, que anunciemos tu bondad y tu misericordia a todos los que no te reconocen como el único Dios: De verdad \"grande eres tú y haces cosas maravillosas\". Gracias Señor. A ti que vives por los siglos de los siglos."]}, {"ref": "Cántico Is. 33", "sub": "es una llamada a rectificar ante la justicia de Dios.", "amb": ["Es una postura ridícula intentar enfrentarse con Dios. Todo el que lo intente está buscando su propia ruina y su propia destrucción.", "A Dios no se le puede arrinconar ni desterrar. El es el NECESARIO en la vida de todo ser humano. Sin él, estamos abocados a la frustración más profunda que podemos padecer.", "Solamente quienes proceden con justicia y no oprimen al hermano, quienes no se dejan sobornar por nadie, quienes hablan con rectitud, son los que están seguros, de caminar en la vida por los caminos de Dios. Es lógico que quienes no actúen así, sientan temor y temblor.", "Dios no se deja sobornar por nadie. Su actuar es siempre desde el amor y la justicia. Ama… perdona… disculpa… pero siempre desde un proceder sincero y coherente por nuestra parte. Todo intento de engaño, es un autoengaño, que termina en contra nuestra.", "Este cántico de Isaías es, pues, una llamada a la sinceridad y a la coherencia. No podemos pretender encontrarnos con Dios sin encontrarnos con el hermano. Nuestro comportamiento con el hermano es el camino para encontrarnos con Dios."], "oracion": ["Tú eres, Señor, el gran `presente y tu calor nos envuelve por todas las partes. Eres un \"fuego devorador\" que busca nuestra purificación, para que caminemos por caminos de justicia, por caminos de coherencia, por caminos de verdad, por caminos de libertad. Sólo así llenaremos nuestra vida y responderemos al proyecto que tienes sobre nosotros. Y los que nos vean, se acercarán más a ti, que vives y reinas por los siglos de los siglos."]}, {"ref": "Salmo 97", "sub": "es un himno a Dios, Señor univer- sal de todo.", "amb": ["Contemplar cada día, con ojos nuevos, las maravillas que Dios ha sembrado en nuestro mundo, nos llevará a descubrir más y más, su sabiduría, su grandeza, y su amor.", "Dios no ha escatimado variedad de criaturas en todos los sectores de la creación: el firmamento con sus astros… el mar con sus peces… la tierra con sus flores y plantas. En todos ha ido dejando rastros de sus huellas. Saber encontrarlas, saber leerlas, es el camino abierto para ir descubriendo la grandeza y sabiduría de su autor.", "Este salmo 97 nos invita a \"cantar al Señor… a aclamar al Señor… a gritar… a vitorear… a tocar toda clase de instrumentos\"… y su invitación se extiende \"al mar y lo que contiene… a los ríos… a los montes… a todos los habitantes de la tierra…\" Que todo y todos, desde las \"maravillas que ha hecho\", se levanten y reconozcan al Creador.", "Una vez más, se nos insiste en cultivar y vivir nuestra vocación de contemplativos. Así iremos descubriendo la realidad de un Dios que tiene que llenar de sentido nuestra vida."], "oracion": ["Tus maravillas, Señor, sobrepasan toda imaginación. Y todas las realizas en favor de los humanos, aunque muchos no te las reconozcan.", "Que toda la tierra te aclame, te vitoree, grite,… \"Qué grande es Dios!\" Que suenen todos los instrumentos, que te aplaudan los ríos y te aclamen los montes. Regirás toda la tierra, y lo harás siempre con justicia y rectitud.", "Que toda nuestra vida sea un \"cántico nuevo\" para ti, que vives y reinas por los siglos de los siglos."]}], "summary": {"breve": ["Salmo 85: Situarnos ante Dios como lo que somos, seres radicalmente necesitados, es el verdadero modo de atraer sus bondades. Y es que El \"es bueno y clemente\" y no puede menos de acercarse a quien le abre.", "Cántico IS. 33: No tiene sentido enfrentarse contra Dios y contra los hermanos. Seamos sensatos y abrámonos, practiquemos la justicia, la sinceridad… y reconozcamos la necesidad que tenemos de Dios y de los hermanos.", "Salmo 97: Reconocer las maravillas de Dios en favor nuestro, es un quehacer que debemos cultivar, a fin de que nuestra vida sea una invitación clara y manifiesta para todos los demás."], "oracion": ["Salmo 85: Proclamado espontáneamente y, pausadamente.", "Cántico IS: Un solista proclama la 1ª estrofa, el resto todo el grupo al unísono.", "Salmo 97: Cantarlo todo ó solamente el estribillo y proclamarlo a dos coros."], "reflexion": ["Tú Señor, eres y clemente…", "Los lejanos escuchar lo que he hecho…", "Aclama al Señor tierra entera…"]}}, {"key": "oración de la tarde", "label": "Vísperas", "psalms": [{"ref": "Salmo 125", "sub": "es un cántico de liberación ante las distintas situaciones.", "amb": ["Una de las enfermedades de nuestro mundo, es la enfermedad de la tristeza. Muchas de sus alegrías son pura evasión. Carecen de fundamento.", "Nosotros somos los que hemos descubierto las fuentes de la verdadera alegría. Y nos hemos comprometido a beber de sus aguas y compartirlas con los demás.", "Todo ha sido regalo, gracia. No lo hemos comprado con nuestros dineros. Podemos decir con verdad \"el Señor ha estado grande con nosotros\" ha cambiado nuestra suerte, como a Sión, como a los torrentes del Negueb\".", "Es lógico que estemos alegres… que riamos… que cantemos…\" y que todos, al vernos, puedan decir, como lo decimos nosotros: \"el Señor, ha estado grande con ellos\".", "Un salmo, como este, proclamado al declinar el día, nos renueva, nos facilita el descanso, nos ayuda a profundizar más y más las intervenciones de Dios en nuestra vida. Y como consecuencia, nos tiene que \"llenar de alegría, la boca de risas y la lengua de cantares\".", "Tendremos momentos de lágrimas, pero la fuerza del Espíritu, las cambiará en cantos de liberación y esperanza."], "oracion": ["De verdad, Señor, que has estado grande con nosotros. ¿Qué más podíamos pedirte?... si repasamos todos los momentos de nuestra vida, todos ellos están marcados por tu presencia y tu bondad. Por eso, la alegría tiene que ser la nota que nos defina ante los demás. Así les manifestaremos el mensaje de tu salvación.", "No somos ilusos. Contamos con días grises, pero también contamos con tu presencia, que nos alegrará esos días. Tú que vives y reinas por los siglos de los siglos."]}, {"ref": "Salmo 126", "sub": "es un canto de confianza en el Señor.", "amb": ["Podemos mucho, pero no lo podemos todo. Ante un mundo, enriquecido con tantas técnicas y descubrimientos, podemos caer en la trampa de sentirnos autosuficientes, y prescindir de Aquel de quien dependemos radicalmente. Lo que hay en el ambiente, nos puede contagiar.", "Durante este día que estamos terminando, hemos hecho muchas cosas. Y de verdad, ha sido necesaria nuestra intervención. Pero de ahí no se deduce que todo ha sido obra nuestra.", "El salmo que vamos a proclamar, nos pone las cosas en su punto. \"si el señor no construye la casa ó guarda la ciudad la ciudad… en vano se cansan los albañiles, ó vigilan los centinelas.\".", "Detrás de cada una de nuestras acciones, está siempre la acción - cooperación de Dios. \"En él vivimos, nos movemos y existimos\". Las apariencias son solo apariencias. Hay que llegar al trasfondo para encontrarnos con la verdad. Somos grandes y podemos hacer obras grandes… pero nuestra grandeza siempre depende de alguien que nos respalda: DIOS.", "."], "oracion": ["Señor, a veces nos sentimos los imprescindibles, los que no necesitamos de nadie. Es la tentación de un mundo que nos rodea. Pero tenemos que reconocer que no es así. Tú sí que eres el imprescindible, alguien a quien no podemos arrinconar. Tú eres el que da sentido a nuestra vida y consistencia a todo nuestro quehacer. Si no te ponemos de nuestra parte, en vano nos cansamos y afanamos. Nuestro esfuerzo es inútil sin ti, que vives y reinas por los siglos de los siglos."]}, {"ref": "Cántico Col. 12", "sub": "es un cántico de gratitud a Dios, por nuestra vocación.", "amb": ["Así es el proyecto de Dios Padre sobre nosotros: \"nos ha trasladado al reino de su Hijo querido\" y \"nos ha hecho capaces de compartir su misma vida\": hijos en el Hijo.", "Nuestra gratitud tiene que ser desbordante. Lo que nosotros no hubiéramos ni soñado, es el gran \"sueño\" de Dios.", "En Cristo formamos la nueva comunidad llamada a hacer presente en el reino de Dios. El mismo Cristo es nuestra cabeza. Cada uno de nosotros miembros vivos de ese cuerpo misterioso: la Iglesia.", "Los que hemos sido llamados a vivir en comunidad, estamos haciendo visible la presencia del Resucitado, en nuestro mundo. Nuestro compromiso de evangelizadores, lo estamos realizando, desde la palabra silenciosa, del amor a los hermanos.", "Nuestra comunidad siempre tendrá sentido, si nos esforzamos por vivir la verdadera fraternidad, que no se fundamente en lo humano, sino en la fuerza del Espíritu.", "Nuestra vida será el canto armonioso al primogénito de toda criatura, al primer resucitado: a Cristo Jesús."], "oracion": ["Gracias, Padre. Son las dos palabras que queremos decirte al terminar este día. Las dos condensan lo que tú eres y lo que nosotros tenemos que ser para contigo: tú nuestro Padre y nosotros tus hijos agradecidos. En Cristo nuestro hermano, has querido realizar todo lo que quieres para nosotros, tu \"sueño\" cargado de ilusión.", "Que no te defraudemos. Que nuestra vida sea la respuesta que esperas. Tú que vives y reinas por los siglos de los siglos."]}], "summary": {"breve": ["Salmo 125: Un cristiano tiene derecho y necesidad de vivir alegre y de manifestarlo así a nuestro mundo enfermo de tristeza. Y es que el Señor ha cambiado nuestra suerte. Seamos conscientes de ello.", "Salmo 126: Ante un mundo endiosado, tenemos que reconocer que no lo podemos todo. Es Él quien \"construye la casa\", aunque quiere nuestra colaboración. Sin El, vano es nuestro esfuerzo.", "Cántico COL.1: Seamos agradecidos a un Dios que ha desarrollado al máximo nuestra capacidad de ser: con Cristo y en Cristo, lo humano puede ser divinizado. Toda una grandeza, pero también una responsabilidad."], "oracion": ["Salmo 125: Proclamado a dos coros.", "Salmo 126: .Cantarlo todo.O cantar la primera estrofa al principio y al final, proclama un solista las estrofas.", "Cántico COL.1: Proclamado por todos al unísono, despacio y con fondo musical suave."], "reflexion": ["El Señor ha estado grande con nosotros…", "Si el Señor no construye la casa...en vano se cansan…", "Nos ha trasladado al reino de su Hijo…"]}}]}, {"name": "jueves", "hours": [{"key": "oración de la mañana", "label": "Laudes", "psalms": [{"ref": "Salmo 86", "sub": "es una invitación a vivir en frater- nidad entre todos los pueblos.", "amb": ["No ha sido Dios quien ha puesto límites ó fronteras a la fraternidad y a la apertura de todos los pueblos y de todas las razas. Hemos sido nosotros los humanos, desde nuestro egoísmo y desde nuestros intereses. Ante Dios nadie es extranjero. Todos moramos en la gran ciudad del mundo y constituimos la única \"ciudad de Dios\". Atentar contra esta unidad dentro de la diversidad de razas y lugares, es atentar contra el plan de Dios.", "Al comenzar el nuevo día, debemos sentir la llamada a la fraternidad… a ver en todos los humanos \"al hermano\" que me necesita y que necesito, si es que quiero vivir mi vida desde la verdad.", "Así vivió Jesús y a esto nos impulsa la fuerza del ESPIRITU que llevamos dentro. A esto nos comprometimos cuando respondimos a vivir la vida cristiana desde \"la radicalidad del evangelio\". Que nuestra vida no sea una contradicción con nuestros compromisos.", "El mundo es la \"gran ciudad\" en la que habitamos todos los humanos, sin que debamos excluir a nadie. No importa el color, ni la lengua, ni la raza… Todos nos unificamos con el título de \"hijos de Dios\". Todos con los mismos derechos, y todos con el mismo destino. Nadie somos más que nadie. Hermanos entre los hermanos."], "oracion": ["Para ti, Señor, somos tu ciudad escogida. En ella quieres habitar permanentemente, porque… \"tus delicias son estar con los hijos de los hombres\". Es nuestro orgullo poder decir, \"somos morada de Dios\".En el comienzo de este día, esta es la noticia que debe dar color a nuestro pensar y a nuestro actuar. Que quienes se relacionen con nosotros, se sientan contagiados por la calidad y la hondura de nuestra vida, y todos nos sintamos como hermanos, congregados en la misma ciudad del mundo. Tú que vives y reinas por los siglos de los siglos."]}, {"ref": "Cántico Is. 40", "sub": "es la proclamación de Dios como el buen pastor.", "amb": ["Estad siempre atentos a la llegada del señor. Nunca se desentiende de nosotros. Somos su pueblo… su rebaño. Cuida de todos, con el cariño del pastor que se desvive por sus ovejas: \"las apacienta… toma en brazos a los corderillos… hace descansar a las madres\".", "Dios es cercanía… intimidad, a pesar de su grandeza y sabiduría. Conoce a perfección la profundidad del mar, el peso de los montes y de las colinas. Nada se escapa a su sabiduría. Y a pesar de todo, no se desdeña de acercarse, con cariño y con amor, a todos y a cada uno de nosotros. Y se acerca para engrandecer nuestra pequeñez, con su grandeza: \"viene con su salario, y su recompensa le precede\".", "Que al proclamar este cántico, nos sintamos los mimados por Dios y llenemos nuestra vida de alegría y de optimismo.", "La sabiduría y el poder de Dios, no son obstáculo, para que se distancie de nosotros. Es cierto que \"llega con poder\". Pues él ha medido el mar, el cielo, el polvo de la tierra. Conoce el peso de las montañas, su sabiduría no tiene medida. Pero a pesar de su grandeza, se acerca hasta nosotros, sin sentirse rebajado. El amor no sabe de distancias."], "oracion": ["Señor, tenemos que caminar por la vida con los ojos bien abiertos: \"mirad que el Señor Dios llega… mirad que viene\". Y vienes con la ternura y delicadeza del pastor bueno, nos tomas en tus brazos con un cariño entrañable. A pesar de tu grandeza, te acercas a nuestra pequeñez para engrandecernos de manera sorprendente. Que te descubramos cada día más y mejor, y que vivamos sorprendidos por tu sabiduría y por tu amor. Tú que vives y reinas por los siglos de los siglos."]}, {"ref": "Salmo 98", "sub": "es un canto a la santidad de Dios que renueva el universo.", "amb": ["No es fácil situarnos ante Dios con una postura correcta. Frecuentemente le vemos lejos… distante… demasiado santo para que se digne acercarse a nosotros pobres criaturas. Ciertamente Dios es santo, ó mejor dicho \"El es el santo\". Pero no por eso es ajeno a nosotros: \"Invocaban al Señor y él les respondía… Dios les hablaba… era un Dios de perdón\". Así es nuestro Dios: grande, pero se abaja desde su grandeza para acercarse a los humanos, por pequeños que seamos. Santo, pero no se avergüenza de nuestros fallos y limitaciones.", "Desde su amor, todo lo nuestro le interesa y para nada se siente extraño a nuestra historia.", "Con verdad podemos exclamar: \"el Señor es grande… encumbrado… reina con poder y ama la justicia…\" Pero no por eso, se distancia de nosotros. Siempre será el amor que no conoce distancias.", "Por eso, no pongamos distancias entre Dios y nosotros. El mismo las ha roto todas. Es y será siempre el gran cercano. En Cristo, su cercanía ha llegado al máximo. Ya no nos \"habla desde la columna de nube\". Cristo es su Palabra.", "Por eso, en nuestra oración de esta mañana, proclamaremos, \"el Señor es grande en nosotros\"… \"Ensalzad al Señor\"… \"El es santo\"…"], "oracion": ["Tú, Señor, eres el único grande. Todos debemos reconocerlo. Siempre tienes la respuesta adecuada para quienes te llaman y quieren dialogar contigo. Ciertamente eres un Dios de perdón porque sabes de amor infinito. ¡Qué bien nos iría en la vida si supiéramos reconocerte y corresponderte!.Que en los comienzos de este día nos sintamos impactados por ese sentimiento y vivamos la alegría de tu amor. Tú que vives y reinas por los siglos de los siglos."]}], "summary": {"breve": ["Salmo 86: Todos somos ciudadanos del \"gran pueblo de Dios\".Nuestra fraternidad no tiene límites ni fronteras. La Iglesia, simbolizada en la nueva Jerusalén, abre las puertas a todos.", "Cántico IS. 40: El Señor es el pastor que se desvive por sus ovejas. Su grandeza y su sabiduría, no son obstáculo, para acercarse a los humanos. Todo lo contrario: desde su amor infinito, todo se explica.", "Salmo 98: La cercanía del Señor es un hecho que está ahí. Es el SANTO. Pero no por eso, se desdeña de acercarse a nosotros que no lo somos. Todos los que le invocan tienen respuesta."], "oracion": ["Salmo 86: Proclamado a dos coros.", "Cántico IS. 40: Un solista proclama la 1ª y la 2ª estrofa y las dos últimas. El grupo proclama al unísono las tres con interrogante.", "Salmo 98: Un solista proclama las dos primeras estrofas y las restantes a dos coros."], "reflexion": ["El Altísimo en persona lo ha fundado…", "Como un pastor...toma en brazos a los corderos…", "Tú eras para ellos un Dios de perdón…"]}}, {"key": "oración de la tarde", "label": "Vísperas", "psalms": [{"ref": "Salmo 131", "sub": "es una proclamación de Dios cumplidor de sus promesas.", "amb": ["Desde que Dios ha creado al ser humano, se ha empeñado en no separarse de él. Bajo formas diversas, ha querido visibilizar su presencia entre nosotros. A lo largo de los tiempos, le hemos preparado moradas, templos, catedrales… en los que nos congregamos para celebrar su presencia.", "Pero llegada la plenitud de los tiempos, él mismo se prepara su morada, su templo: la persona de Cristo: él es el templo vivo visible, de la divinidad. \"Llegará la hora en que los verdaderos adoradores, adorarán al Padre en espíritu y verdad\".", "Y Cristo, sigue visibilizando y actualizando su presencia en el templo de nuestra comunidad: \"… la comunidad, congregada como verdadera familia en el nombre del Señor, goza de su \"presencia\".", "Cada comunidad debe ser una verdadera constructora del templo vivo de Dios en nuestro mundo. Es la tarea con la que estamos comprometidos.", "Que nuestra vida concreta, sea un grito que manifieste lo que estamos necesitando: \"levántate, Señor, ven a tu mansión, ven con el arca de tu poder\".", "Somos nosotros hoy, \"el lugar para el Señor, una morada para él\". Que personal y comunitariamente, aceptemos ser \"el lugar y la morada\" de Dios."], "oracion": ["Señor, ven a tu mansión, ven a nuestra comunidad. Sabemos que no son los templos materiales, en lo que tú quieres habitar. Somos todos y cada uno de nosotros, es nuestra comunidad, es la Iglesia.", "Sentimos la responsabilidad de ir construyendo cada día estos templos vivos que tú mismo has elegido, para hacerte visible. En ellos y desde ellos, queremos sentir tu presencia y vivir tu cercanía. Tú que vives y reinas por los siglos de los siglos."]}, {"ref": "Salmo 131, II", "sub": "es una proclamación de la fidelidad y cercanía del Señor.", "amb": ["Los compromisos de Dios, son compromisos que cumplirá. \"El Señor lo ha jurado y no se retractará\". Desde siempre se comprometió con la humanidad, y desde siempre sigue cumpliendo sus promesas. \"Esta es mi mansión para siempre, aquí viviré, porque la deseo\".", "La carne de nuestro hermano Jesús, carne como nuestra carne, esa fue la mansión escogida. Y desde ella, se ha hecho presente entre nosotros, y para nosotros. \"¿No sabéis que sois templos de Dios?\" nos dirá San Pablo.", "En el silencio de esta tarde, que resuenen en cada uno estas palabras: \"Somos templos vivos de Dios\". El nos ha elegido y ha deseado vivir en lo profundo de nuestro ser. Ya no tenemos que hacer grandes viajes, ni recorrer grandes distancias para orar… para dialogar con nuestro Padre. Entremos en nuestro interior. Y sin palabras, disfrutemos de su presencia, de su cercanía.", "Dejémosle que vaya vivificando nuestra carne, para que transparentemos su presencia. A eso nos comprometimos, como respuesta al compromiso de Dios con nosotros."], "oracion": ["Señor, el cercano, el gran presente. Gracias por tu cercanía, gracias por tu presencia. Gracias porque nos ha tocado vivir los tiempos de la promesa: \"esta es mi mansión… aquí viviré\".", "Lamentamos, nuestro distanciamiento de ti: tú el presente y nosotros los \"ausentes\". Vivir esta realidad misteriosa de tu presencia, es el compromiso que tenemos que renovar y vivir, responsable y alegremente. Tú que vives y reinas por los siglos de los siglos."]}, {"ref": "Cántico Ap. 11", "sub": "es un canto a la fortaleza del Señor, fuerza de los elegidos.", "amb": ["La lucha entre las fuerzas de Dios y las fuerzas del mal, es la lucha permanente en nuestro mundo. Los planes de Dios no siempre son secundados por los humanos. Es más: frecuentemente son rechazados.", "Pero no por eso, la misericordia y la bondad de Dios, cesan en su empeño. La fuerza del Espíritu esta actuando siempre en el mundo, para que el mal no venza al bien.", "Con la proclamación de este cántico, vamos a exteriorizar nuestra gratitud a Dios por su acción misteriosa, en favor nuestro: \"Gracias te damos, Señor Dios omnipotente, porque has asumido el gran poder…\" \"… porque ahora se estableció… el reinado de nuestro Dios…\"", "A lo largo de la historia, han existido muchos hombres y mujeres que han posibilitado el reinado de Dios en el mundo, desde su vida, desde sus palabras y hasta desde su sangre. Se lo han jugado todo, por la causa de Jesús.", "Nosotros, comunidad de creyentes cualificados, somos los continuadores de tantos hermanos nuestros desde la respuesta a nuestra vocación. Ellos nos entregaron la antorcha. No debemos apagarla. Las tinieblas de nuestro mundo, nos necesitan para dejar de ser tinieblas."], "oracion": ["Señor, no siempre tus proyectos sobre nosotros, son respetados. Las fuerzas del mal, viven un enfrentamiento contigo. Pero la fuerza de tu Espíritu lucha insistentemente, para que el bien no sea ahogado por el mal.", "Te agradecemos que nos hayas escogido, como personas concretas y como comunidad, para colaborar con esa fuerza del Espíritu, en la realización de tus proyectos.", "Que nuestra respuesta, no te defraude. A ti que vives y reinas por los siglos de los siglos."]}], "summary": {"breve": ["Salmo 131, I: Dios ha querido visibilizar su presencia entre nosotros de muchas maneras. Los humanos le hemos construido templos. Y en los últimos tiempos se nos ha acercado en el templo vivo de Cristo.", "Salmo 131, II: Los compromisos de Dios se cumplen siempre. Sus promesas a lo largo de la historia se han realizado. \"Estaré con vosotros hasta el final de los tiempos\". Somos morada de Dios por el Espíritu.", "Cántico AP.11: Aunque las fuerzas del mal se empeñen, el poder de Dios está sobre ellas. Y son muchos los que a lo largo de la historia, han vencido. Nosotros también venceremos"], "oracion": ["Salmo 131, I: Un solista proclama la 1ª estrofa y otro proclama la 2ª. Todo el grupo proclama la 3ª y 4ª.", "Salmo 131, II: Es proclamado por un solista.", "Cántico AP.11: Todos al unísono, pausadamente."], "reflexion": ["No niegues audiencia a tu ungido…", "Aquí viviré porque lo deseo…", "Estad alegres los que moráis en sus tiendas…"]}}]}, {"name": "viernes", "hours": [{"key": "oración de la mañana", "label": "Laudes", "psalms": [{"ref": "Salmo 50", "sub": "es una invitación a recibir el abra- zo acogedor de Dios.", "amb": ["Cuántas veces vivimos la angustia de que nuestra vida no es como nosotros querríamos que fuera.. Con cierta frecuencia, nuestros deseos no coinciden con nuestros actos. Y esto nos lleva al desaliento y al desánimo.", "Este salmo 50, no es el salmo de la derrota, sino el salmo de la confianza, en quien es \"perdón y amor\" para todos y en todo momento. Por lo tanto, es el salmo de la alegría.", "Ciertamente, muchas veces no somos como teníamos que ser y nos sentimos avergonzados. Pero Dios siempre está en el recodo de nuestro camino y, con insistencia, nos invita a la lucha, a la confianza, a dejarnos rehacer después del fracaso.", "Se lo vamos a repetir varias veces al proclamar este salmo 50: \"renuévame por dentro… crea en mí un corazón puro… lávame y quedaré limpio… hazme oír el gozo y la alegría… devuélveme la alegría de la salvación…\"", "Y desde esta nuestra oración, sentiremos más la alegría, sentiremos el abrazo del Padre que nos ama, aun en la tristeza de nuestros fallos. Vivamos, pues, la alegría del perdón y no tanto la tristeza de nuestro pecado.", "Que en este viernes, los brazos abiertos de Cristo en la cruz, nos hagan descubrir y vivir la alegría de ese abrazo del Padre, en la persona de Jesús."], "oracion": ["Señor, no es la tristeza de nuestro pecado lo que más nos tiene que preocupar. Eres tú, tu bondad, tu misericordia, tu amor de Padre… lo que de verdad debe mover nuestra vida: que \"viva el gozo y la alegría\" de que tú siempre y sobre todo, eres perdón… eres abrazo,… eres amor. Que lo importante es, que yo me deje amar… abrazar… perdonar por ti. Desde ese momento, mi vida cambiará, y tú serás otro para mí: mi Dios, mi todo. Tú que vives y reinas por los siglos de los siglos."]}, {"ref": "Cántico Jr. 14", "sub": "es una recriminación contra actitudes destructivas.", "amb": ["Es dura la realidad de nuestro mundo. Los hombres no vivimos como hermanos. El egoísmo nos juega malas partidas. Deseamos la paz pero hacemos la guerra: luchas entre hermanos, atracos, terrorismos, violencias… Parece que estamos viviendo en un mundo deshumanizado y sin entrañas.", "Solamente cuando salgamos de nuestro egoísmo y nos convenzamos de que estamos hechos para el amor y no para la guerra, tendrá solución este caos en que vivimos sumergidos: \"Señor, reconocemos nuestra impiedad, nuestra culpa…\" Por ahí tenemos que comenzar. Y cuando reconozcamos la parte del mal, causado por nosotros, habremos descubierto el camino que nos lleva a construir un mundo nuevo, distinto, más en consonancia con lo que todos estamos necesitando.", "Proclamemos este cántico desde la realidad que lamentamos y desde el deseo que llevamos dentro.", "Un viernes, Cristo nos abrió sus brazos, clavados en la cruz, para abrazarnos a todos. En él estamos recibiendo el abrazo del Padre, para que vivamos como hermanos y sembremos en nuestro mundo la paz y la fraternidad. Comencemos por reconocer nuestra influencia positiva ó negativa en el mundo que nos rodea."], "oracion": ["Señor, cuando nos empeñamos en vivir a nuestro aire, entonces vemos que todo nos va mal. Cada vez nos convencemos más, de que nuestra vida al margen de ti, no tiene sentido. Por más que nos empeñemos.", "Desde tu amor infinito, has ideado para nosotros lo mejor, lo único que nos puede llenar. Empeñarnos en ir contra tus planes, es echarnos polvo a los ojos y sentir la frustración de nuestro fracaso. Señor, arrepentidos de un pasado que no nos gusta, queremos comenzar un futuro nuevo: de paz y de fraternidad. Tú que vives y reinas por los siglos de los siglos."]}, {"ref": "Salmo 99", "sub": "es una invitación a la alegría ante la bondad de Dios.", "amb": ["La alegría debiera ser la nota que predominara en nuestra vida. Somos quienes hemos descubierto el sentido de la vida y nos hemos comprometido en vivirla.", "Comenzar un nuevo día, es comenzar una nueva página de nuestra vida. De una manera reiterativa nos invita este salmo 99, a que ésta página esté escrita con un fondo de optimismo y de alegría. Y la razón es \"Dios nos hizo y somos suyos, su pueblo y ovejas de su rebaño\".", "Por eso es justo \"que le aclamemos… que le bendigamos… que toda la tierra proclame que el \"Señor es bueno\"…", "Nuestro mundo necesita mensajes como éstos. Nosotros, tenemos que dárselos. Nuestra vocación es compromiso, es envío, es misión, es anuncio… para un mundo profundamente necesitado de noticias esperanzadoras y llenas de verdad. Que descubran que \"Dios es bueno\" no solo porque nosotros se lo decimos, sino sobre todo, porque lo vivimos.", "Invitemos a toda la tierra a vivir la alegría del encuentro con Dios."], "oracion": ["Señor, comenzar el día, con la alegría de que somos tuyos, tu pueblo, desde una posesión de amor, nos llena de satisfacción.", "Tú eres el \"bueno\", el de una misericordia sin límites, y una fidelidad reconocida por todos. Deseamos que todos te aclamen, que todos griten y anuncien tu bondad. Es lo que queremos hacer a lo largo de este día que estamos estrenando. Tú te lo mereces. Y nosotros sentimos la alegría de poder hacerlo. Tú que vives y reinas por los siglos de los siglos."]}], "summary": {"breve": ["Salmo 50: Ante nuestros posibles fallos no debemos hundirnos. Siempre nos esperan unos brazos abiertos que nos devuelven la alegría perdida. El Cristo de la cruz tiene los brazos clavados para no cerrarlos.", "Cántico JR. 14: Son muchas las situaciones de sufrimiento en nuestro mundo. El egoísmo de muchos repercute en mayorías. Solamente cuando reconozcamos nuestro pecado, volverá la paz y la alegría.", "Salmo 99: Optimismo y alegría, son las notas que deben caracterizar nuestra vida, porque el \"Señor es bueno… somos suyos… su misericordia y su fidelidad son eternas\". Aclamadle con alegría."], "oracion": ["Salmo 50: Proclamarlo espontáneamente, y cada tres estrofas cantar \"perdón, perdón, Señor…\" Dejar un silencio brevísimo después de cada canto.", "Cántico JR.14: Un solista proclama las tres primeras estrofas, y continua todo el grupo con las dos restantes.", "Salmo 99: Cantado, ó un solista proclama al principio y al final la última estrofa y todos al unísono las restantes."], "reflexion": ["Te gusta un corazón sincero…", "Señor, reconocemos nuestra impiedad…", "Sabed que somos su pueblo…"]}}, {"key": "oración de la tarde", "label": "Vísperas", "psalms": [{"ref": "Salmo 134, I", "sub": "es un himno que proclama las maravillas de Dios.", "amb": ["Es un reconocimiento a las grandes maravillas que Dios ha realizado y realiza, a lo largo de la historia. Maravillas en la naturaleza y maravillas entre los hombres y los pueblos.", "Pero el trasfondo de este salmo, es una invitación, a admirar, a agradecer, la gran maravilla de Dios en sus relaciones con los humanos: su entrega a la muerte por nosotros.", "Tendemos a ser olvidadizos o mejor dicho, tendemos a dejar en la historia hechos que siguen teniendo su resonancia en el presente. Lo demasiado sabido deja de impresionarnos y de influir en nuestra vida. El que Dios se lo juegue todo, por amor al hombre, no es cualquier cosa. Por eso, este salmo, nos invita insistentemente: \"Alabad al Señor… porque es bueno… porque él nos escogió… porque es grande…\", porque se ha valido de todos los medios para decirnos que se interesa por nosotros.", "Todo viernes, debe ser una llamada a reflexionar… a admirar… a corresponder… y a recuperar esa capacidad de \"sorpresa\" que todos llevamos dentro.", "Terminemos este día, sobrecogidos por lo que todo viernes supone para nosotros: un Dios, que nos dice su palabra de amor, escrita con su propia sangre."], "oracion": ["Señor, son muchas las maravillas que has realizado en favor nuestro: en la naturaleza, en nuestra historia personal. Pero hay una, que sobrepasa todo: tu entrega a la muerte por nosotros.", "Reconocemos que no siempre le hemos dado la importancia que eso tiene. Nos hemos acostumbrado a saberlo de memoria, y no nos sorprende.", "Hoy, Señor, queremos reconocerlo, y decirte:\"gracias\" de palabra y sobre todo, \"gracias\" con nuestra vida. A ti que vives y reinas por los siglos de los siglos."]}, {"ref": "Salmo 134, II", "sub": "es una acusación ante los posibles ídolos de los humanos.", "amb": ["Es fácil buscar una escapatoria, o una excusa, cuando tenemos delante un compromiso serio que nos compromete. Eso es lo que hacemos, cuando fabricamos nuestros ídolos, frente a la realidad viva, de un Dios que camina a nuestro lado y que busca nuestra máxima realización.", "Esta segunda parte del salmo 134, nos hace ver, la vaciedad y el sin sentido, de los posibles ídolos que nos fabricamos y a los que damos culto, en nuestra vida diaria. Y nos invita a reconocer que: \"el Señor, es eterno… su recuerdo de edad en edad… gobierna a su pueblo… se compadece…\"", "En este viernes, nos pone delante, su amor, manifestado en una cruz y nuestra correspondencia manifestada en la vida diaria. No para reprocharnos fríamente, sino para que desde su amor, nos sintamos impulsados a darle una respuesta positiva con nuestro amor. De tal manera que podamos invitar a todos a \"bendecir al Señor\", desde el reconocimiento de todo lo que hace por nosotros.", "No es fácil ser sinceros, cuando afecta a nuestra vida concreta. Fácilmente buscamos nuestras excusas compensatorias. Una pregunta: ¿qué significa Dios en nuestra vida?..."], "oracion": ["Señor, tú eres el único eterno, el que camina siempre a nuestro lado. Pero no siempre hemos correspondido a tus desvelos. Reconocemos que sin renegar claramente de ti, nos hemos fabricado nuestros \"idolillos\", que nos han dificultado una respuesta positiva a tu amor.", "Nos consuela que tu misericordia y tu comprensión no tienen límites y sabes comprender y disculpar nuestros fallos, porque nos amas siempre. Tú que vives y reinas por los siglos de los siglos."]}, {"ref": "Cántico Ap. 15", "sub": "es un himno que proclama las obras maravillosas de Dios.", "amb": ["Este cántico, es un grito cargado de entusiasmo y alegría ante las maravillas de Dios: \"grandes y maravillosas son tus obras, Señor\"… \"justos tus caminos.\"", "Sigue insistiendo en la gran maravilla, en la gran obra de Dios, que fue realizada en el primer Viernes Santo: la muerte en una cruz, de Cristo. Por eso la pregunta: \"¿Quién no te glorificará?\"… \"porque tú sólo eres santo\". Es justo que \"todas las naciones…\" te reconozcan y se postren ante ti…", "Todo este cántico es una invitación a vivir bajo el impacto y la sorpresa, de lo importantes que somos para Dios. Y por consiguiente, a organizar nuestra vida desde ese impacto y desde esa sorpresa. Siendo siempre conscientes de nuestra vocación-misión: Nuestros hermanos esperan de nosotros que les hablemos de las maravillas de Dios. Nos hemos comprometido. No les defraudemos.", "La gran maravilla de un Dios colgado de la cruz, no la podemos dejar en la historia. Debe seguir impactándonos hoy con la fuerza misteriosa de tal acontecimiento.", "Y que ese impacto, incida en nuestras vidas de tal manera, que seamos anuncio permanente para nuestros hermanos. Así lograremos ser \"evangelio\" desde la vida."], "oracion": ["Señor, llenos de alegría, tenemos que decirte: \"todas tus obras son grandes y maravillosas\". Mantenernos en una actitud, de continua admiración y agradecimiento, es la mejor respuesta que podemos darte. Y al mismo tiempo que proclamemos ante todos, lo que tú eres y cómo te comportas con nosotros.", "No podemos permanecer indiferentes, ante el testimonio que nuestro mundo espera de nosotros.. A ello nos hemos comprometido y debemos cumplirlo. Tú que vives y reinas por los siglos de los siglos."]}], "summary": {"breve": ["Salmo 134, I: Debemos reconocer las grandes maravillas que Dios ha realizado a lo largo de la historia en favor de su pueblo. Pero en este viernes la gran maravilla de Cristo clavado en una cruz. Amor al máximo.", "Salmo 134, II: Rompamos nuestros ídolos ante la realidad de un Dios que se desvive por su pueblo. El es todo amor y cercanía. Bendigámosle y pasemos la invitación a todos aquellos con quienes nos encontremos.", "Cántico AP. 15: No perdamos nuestra capacidad de sorpresa y proclamemos llenos de alegría: \"grandes y maravillosas son tus obras Señor\". Sobre todo lo es su muerte en la cruz."], "oracion": ["Salmo 134, I: Cantar al principio y al final \"Alabad siervos de Dios el nombre del Señor\"Prosiguen todos con las dos primeras estrofas. Un solista proclama desde \"yo sé que el Señor…\" hasta el final.", "Salmo 134, II: Un solista proclama la 1ª estrofa, y las siguientes a dos coros.", "Cántico AP. 15: Cantar la 1ª estrofa al principio y al final, y un solista la otra estrofa."], "reflexion": ["Alabad al Señor porque es bueno…", "El Señor s compadece de sus siervos…", "Señor, grandes y maravillosas son tus obras…"]}}]}, {"name": "sábado", "hours": [{"key": "oración de la mañana", "label": "Laudes", "psalms": [{"ref": "Salmo 118", "sub": "es una oración de súplica, casi angustiosa, al Señor.", "amb": ["Toda nuestra existencia es un grito por Dios. Nuestro ser es un clamor permanente por aquél que es nuestra raíz y nuestra fuerza.", "Todo este salmo 118 es la expresión viva de la actitud existencial que necesitamos tener todos los humanos, ante Dios: \"Te invoco de todo corazón… a ti grito… sálvame… antes de la aurora pido tu auxilio…\"", "Pero Dios no se hace sordo a nuestros gritos. No se mantiene a distancia… \"está cerca\"… \"escucha nuestra voz\"… \"nos responde siempre\"… y es que es él mismo quien ha puesto en lo más profundo de nuestro ser, esta necesidad que tenemos de él. Necesariamente, tiene que salirnos al paso, y llenar nuestro vacío.", "Seríamos unos fracasados, si en vez de gritar a Dios y abrirnos a su encuentro, ahogáramos estos gritos o buscáramos sucedáneos de Dios.", "Que la proclamación de este salmo, nos despierte a la realidad de la vida, renueve en nosotros esta ansia incontenible que tenemos de Dios, y adoptemos un compromiso serio y coherente. Y al mismo tiempo, que cada una de nuestras acciones sea la exteriorización de esa necesidad que todos llevamos dentro: \" a ti grito, sálvame\". Te necesito."], "oracion": ["Tú Señor, eres el grito de nuestra vida. Por eso al comenzar este día, \"te invoco de todo corazón\"… con todas mis fuerzas. Sabemos que no te haces sordo a nuestros gritos… y siempre nos escuchas. Tú mismo, eres quien suscita nuestros gritos y nuestro deseo de ti.", "Ojalá que no los ahoguemos o busquemos compensaciones absurdas, a esta necesidad que tenemos de ti. Este es nuestro deseo y al mismo tiempo nuestro compromiso: \"a ti gritaré siempre\". que vives y reinas por los siglos de los siglos."]}, {"ref": "Cántico Sb. 9", "sub": "es una oración pidiendo el don de la sabiduría, al Señor.", "amb": ["Todo ser humano busca el saber… el conocer. Nuestra inteligencia necesita llenar sus vacíos. Somos seres abiertos a la verdad, de las personas y de las cosas. De una manera, casi instintiva, nos acercamos a ellas para conocerlas.", "Es Dios quien ha puesto en nosotros este deseo de saber…de conocer. Creados a su imagen y semejanza, ha querido que participemos de la sabiduría que él es, con la que creó todas las cosas, y todos los seres.", "En este cántico, de una manera reiterativa, pediremos la sabiduría: \"la conocedora de tus obras… la que sabe lo que es grato y recto a tus ojos…\" Porque sin la sabiduría verdadera., la que procede de ti… seremos estimados en nada…\"", "Nosotros, en principio, somos los verdaderos sabios. Hemos optado por un modo de vivir nuestra vida cristiana que nos compromete de raíz, con nuestros hermanos: esperan de nosotros que les enseñemos. No podemos defraudarles.", "Nuestra sabiduría, es la que procede de Dios, \"la que nos asiste en nuestros trabajos\", y nos enseña lo que realmente \"es grato a Dios\". Y desde ahí, estamos adoctrinando a nuestro mundo para que aprenda a distinguir la verdadera sabiduría, de las falsas sabidurías."], "oracion": ["Señor, necesito ser sabio pero con la verdadera sabiduría: que te conozca, que te descubra en cada una de tus obras. Que en mi vida no haya nada que a ti te moleste. Que busque siempre, hacer lo que tú quieras que haga: es lo mejor para mí. Que me convenza de una vez, de que ser sabio no es tener muchos títulos o muchas orlas, sino conocerte a ti y amarte a ti, ante todo y sobre todo. A ti que vives y reinas por los siglos de los siglos."]}, {"ref": "Salmo 116", "sub": "es una invitación a toda la crea- ción, a alabar a Dios.", "amb": ["El Señor es el invisible. A través de sus obras podemos vislumbrar su grandeza y su poder. Pero en sus designios as querido que nosotros, seamos su voz, su palabra que invite a todos los pueblos y a todas las gentes a reconocerle y a amarle. Y es que su misericordia y su fidelidad para con nosotros no tienen límites.", "Nuestro deseo al comenzar este día es que todos lo sepan, y que de todas las gargantas salga un grito unánime diciendo: ¡Qué grande es Dios y qué maravillosas son todas sus obras!.", "Y ese grito va a ser nuestra vida, vivida con profundidad y coherencia. El día que nos comprometimos con él, lo hicimos dispuestos a todo.", "El correr del tiempo nos ha desgastado, y tal vez no siempre hemos respondido como él esperaba y nosotros hubiéramos querido.", "El comienzo de una nueva jornada, es el momento de renovarnos y responder a sus deseos y a los nuestros: \"que te alaben y te aclamen todas las naciones y todos los pueblos\".", "Y lo hacemos, siendo nosotros mismos \"alabanza\" viviente, desde las situaciones concretas en que nos movemos. Es nuestra vida, desde su silencio, la que habla y alaba, porque es \"firme su misericordia y su fidelidad con nosotros\"."], "oracion": ["Señor, nuestra vida debiera ser la voz que invite constantemente a todos, a reconocerte… a amarte… a proclamar tu grandeza, tu misericordia, tu fidelidad… que no conocen límites.", "Nos has puesto en la vida, para visualizar entre los hermanos tu rostro de Padre. Es cierto que debiéramos ser un canto que puedan oír todos que les hable de ti: de tu amor, de tu bondad, de tu sabiduría… de todo lo que haces por nosotros. Este es nuestro deseo. Tú que vives y reinas por los siglos de los siglos."]}], "summary": {"breve": ["Salmo 118: Es la manifestación profunda de una necesidad: \"te invoco de todo corazón… a ti grito… respóndeme… sé que \"estás cerca…\" Así tenemos que situarnos ante Dios al comenzar este nuevo día.", "Cántico SB.9: Somos seres abiertos a la verdad, por eso pedimos la sabiduría que nos haga distinguir entre la verdad y el error, y lleguemos a descubrir qué es lo que Dios quiere de nosotros en todo momento.", "Salmo 116: Ante la experiencia que tenemos de Dios en nuestra vida y las maravillas que ha puesto a nuestra disposición, es lógico nuestro deseo de que todos los pueblos y sus habitantes lo reconozcan y le alaben."], "oracion": ["Salmo 118: Espontáneo y pausadamente.", "Cántico SB.9: Lo proclama un solista despacio…", "Salmo 116: Es proclamado por todo el grupo al unísono. Puede ser prolongado con alabanzas espontáneas para concluir todos juntos con el gloria."], "reflexion": ["Tú, Señor, estás cerca…", "Porque siervo tuyo soy... hijo de tu esclava…", "Firme es su misericordia y su fidelidad…"]}}]}]}, {"num": 4, "days": [{"name": "domingo", "hours": [{"key": "oración de la tarde I", "label": "Vísperas I", "psalms": [{"ref": "Salmo 121", "sub": "es un canto de alegría por el encuentro con el Señor.", "amb": ["Con la oración de esta tarde, estamos iniciando la celebración del gran día: el día del Señor Resucitado, nuestro día. Y uno de los sentimientos que tiene que invadirnos profundamente, es el sentimiento de la \"alegría\": ¡¡Él está vivo!!... ¡¡Él es nuestra vida!!", "Lo celebramos todos los días, pero de una manera especial, cada domingo. Los cristianos de todo el mundo, nos encontraremos mañana en la Eucaristía, y juntos gritaremos: \"Proclamamos tu Resurrección, ven Señor Jesús\".", "La proclamación de este salmo 121, es una llamada a reavivar nuestra fe, a alentar nuestra esperanza y a exteriorizar nuestra alegría. Por eso nuestro grito: ¡¡\"Qué alegría cuando me dijeron, vamos a la casa del Señor\"!!. Y es que esa es nuestra \"casa\", en la que estamos siendo acogidos, con amor infinito por el Padre. A ella están convocados hombres y mujeres de todas las tribus, de todas las ciudades, de todos los colores. Y todos, a \"celebrar el nombre del Señor\". Desde esta universalidad de convocación, sin distinción de ninguna clase, nos podamos decir... desear: \"la paz contigo\"... \"haya paz y seguridad\" en todo el mundo... que todos nos sintamos como hermanos e hijos del mismo Padre, Dios: ¡paz hermano!."], "oracion": ["Tú, Señor, nos has creado para la alegría, aunque a veces nos invada la tristeza. En la oración de esta tarde, parece que resuena en nosotros, con más fuerza, tu invitación a descubrir y a vivir en la alegría, como necesidad profunda de todo ser humano.", "Nuestro encuentro con el Resucitado, es la fuente y el origen de nuestra verdadera alegría. Que nuestra celebración del domingo, sea la celebración de ese encuentro, que nos transforme desde dentro. Por Jesucristo nuestro Señor."]}, {"ref": "Salmo 129", "sub": "es una súplica personal y confia- da, cargada de esperanza.", "amb": ["Con este salmo, expresamos lo que somos: un grito existencial profundo, de todo nuestro ser por Dios. Somos grito, porque somos necesitados. Dios es nuestra gran necesidad. Necesitamos gritar, clamar, para que esa nuestra necesidad se vaya llenando.", "\"Desde lo hondo a ti grito, Señor...\" \"Señor escucha mi voz... \" \"La voz de mi súplica\"...", "Eso tiene que ser nuestra vida... \"que espera..... que aguarda al Señor más que un centinela a la aurora\". Un día nos comprometimos a vivir en permanente \"grito\" por Dios... a esperarle con todo nuestro ser. Fue un gran día y un gran compromiso. Pero es fácil que ese grito vaya perdiendo intensidad y que esa esperanza haya encontrado sus compensaciones ...esperanzas recortadas.", "Este Salmo 129, nos invita a una renovación: \"espere Israel en el Señor\". No nos cansemos, sigamos esperando, como centinelas siempre despiertos, siempre alerta... porque el Señor viene, y necesitamos encontrarnos con El. Nos manifestará su misericordia... su amor de Padre.", "Que sea nuestra oración: \"desde lo hondo a ti grito, Señor\"."], "oracion": ["Señor te necesito, por eso te grito. Todo mi ser está hecho para clamar por ti. Y es que tú eres mi \"necesidad\". No puedo organizar mi vida al margen de ti. Un día descubrí esta realidad y me comprometí con ella.", "Yo quisiera refrescar esas experiencias, esas vivencias íntimas que iniciaron mi camino, y seguir caminando por ellas con la gran satisfacción de ir llenando mi vida. Señor, sé que tú me ayudas. Quiero responder. A ti que vives y reinas por los siglos de los siglos."]}, {"ref": "Cántico Flp. 2, 6-11", "sub": "es una proclamación de la cercanía de Dios.", "amb": ["Es toda una sorpresa lo que Dios nos preparó al decidir hacerse uno como nosotros, menos en el pecado: asumir todo lo humano para llenarlo de lo divino. Y es más: tolerar que le tratasen como a un criminal y que le ejecutasen con la tortura más ignominiosa: la muerte en una cruz.", "Todo un misterio que nunca lograremos comprender desde nuestras categorías humanas. Si de nosotros hubiese dependido, no habríamos hecho las cosas así. Fueron caminos demasiado difíciles, los que Dios escogió, para manifestarnos su interés por nosotros.", "Pero ahí están. Y serán siempre unos interrogantes que nos cuestionan y nos interrogan: ¿por qué Dios ha actuado así?... ¿Somos tan importantes los humanos, para que todo un Dios haga esos \"excesos\"?... ¿Qué mensajes querrá trasmitirnos?....", "Y desde estos interrogantes, comprometernos a vivir, no desde nuestros caprichos ó veleidades, sino desde la verdad de nuestra existencia. Así participaremos de la misma gloria de Aquel que ha recorrido nuestros mismos caminos, y el Padre, con Cristo y en Cristo, por la fuerza del Espíritu Santo, nos levantará sobre todo, para su gloria, manifestada en nosotros: ser hijos en el Hijo."], "oracion": ["Señor, gracias por las sorpresas que nos das cada día.", "Sobre todo, gracias por la sorpresa de meterte en nuestra carne, para no separarte nunca de ella. Siempre serás nuestros Dios y nuestro hermano. Siempre estarás tan unido a nosotros, que en ti y desde ti, tu divinidad irá trasformando nuestra humanidad: seremos humanos...pero divinizados..", "Gracias por este regalo...gracias por esta sorpresa... A ti que vives y nos amas por los siglos de los siglos."]}], "summary": {"breve": ["Salmo 121: Ya en vísperas del Domingo, celebramos la alegría del Señor resucitado. otros muchos hermanos se unirán a nosotros para celebrar la misma alegría. Todos nos desearemos la paz, y todos anunciaremos al mundo el mismo mensaje: ¡Cristo está vivo... ha resucitado!", "Salmo 129: Somos todo un grito que clama por Dios como una necesidad existencial: \"desde lo hondo a ti grito, Señor\". Grito que no podemos ahogar sin que repercuta en todo nuestro ser. Proclamemos juntos esta realidad.", "Cántico FP.2: Así es nuestro Dios. Somos tan importantes para él, que nos da esta asombrosa muestra de amor: acercarse a nosotros vestido de nuestra carne, con todas las consecuencias."], "oracion": ["Salmo 121: Cantarlo todo a dos coros, ó cantar la primera estrofa al principio y al final, y el resto proclamarlo al unísono.", "Salmo 129: Canta un solista las estrofas 1ª y 3ª, y las otras dos todo el grupo.", "Cántico FLP.2: Lo proclama un solista ó todo el grupo, con un fondo musical suave."], "reflexion": ["Vivan seguros los que te aman…", "mi alma aguarda al Señor…", "Pasando por uno de tantos…"]}}, {"key": "oración de la mañana", "label": "Laudes", "psalms": [{"ref": "Salmo 117", "sub": "es un canto de acción de gracias a la misericordia de Dios.", "amb": ["Domingo: \"este es el día en que actuó el Señor\". Es lo que celebramos y de lo que nos alegramos cada domingo: todas sus actuaciones, pero de una manera especial, su gran actuación: su Resurrección. Y en la mañana de este domingo, invitamos a todos a \"dar gracias al Señor, porque es eterna su misericordia\", porque desde siempre se ha manifestado cercano, dialogante: \"El está conmigo y me auxilia... me escuchó poniéndome a salvo\".", "Si repasáramos nuestra historia personal, todos podríamos exclamar hoy: me he encontrado con muchos problemas, muchas dificultades, y muchos peligros. Pero... \"el Señor me ayudó él fue mi salvación\" .porque él mismo es \"mi fuerza y mi energía\"... \"Sea nuestra alegría y nuestro gozo.\"", "Cada domingo, en este domingo, se nos invita a redescubrir la fuerza del Resucitado, y a dejarle que vaya transformando nuestras vidas. Que de verdad le podamos decir \"tú eres mi Dios... yo te ensalzo\". Y al mismo tiempo, nuestra vida sea una invitación silenciosa para todos los que nos vean a \"dar gracias a Dios porque es bueno... porque es eterna su misericordia\"."], "oracion": ["Señor, eres infinitamente bueno y tu misericordia no tiene límites. Debemos de proclamarlo con una alegría contagiosa, que se oiga en todos los rincones de nuestra tierra. Y es que tu bondad la hemos palpado sensiblemente, en tantos peligros de los que nos has librado.", "Todos los días de nuestra vida, deberían ser un canto que dijera:\"este es el día en que actuó el Señor\"... porque tú, continuamente estás de nuestra parte, y siempre es \"tu día\" para con nosotros. Gracias a ti que vives y reinas por los siglos de los siglos."]}, {"ref": "Cántico Dn", "sub": "es una invitación a alabar a Dios por la creación.", "amb": ["En las primeras horas de este Domingo, nos unimos a toda la creación, para cantar alborozados, la ininterrumpida canción de nuestra alabanza: \"a ti gloria y alabanza por los siglos\".", "Cada uno de nosotros, es una nota de esa sinfonía, compuesta por el mismo Dios. Y la vamos interpretando, desde la coherencia y autenticidad de nuestra vida. Tú y yo somos responsables de que esa interpretación suene armoniosa... ó desafinada.", "Nuestra oración de esta mañana, nos invita a continuar este cántico en el desarrollo concreto de nuestra existencia. A eso nos hemos comprometido, desde la respuesta a nuestra vocación: llamados a ser alabanza de Dios y manifestación de su gloria.", "De una manera reiterativa, lo vamos a decir, con la proclamación de este cántico de Daniel. ¡ojalá que el eco de nuestras palabras no se pierda en el olvido ó en la rutina!. Que se prolongue, sin interrupción, repitiendo: \"a ti gloria... a ti alabanza, por los siglos.\"", "Y nuestra vida, así vivida, será una invitación, para todos los que nos contemplen, a que se unan a nuestro canto, y todos formemos el gran coro, que interprete el mismo canto: \"bendito eres, Señor… a ti gloria y alabanza\"."], "oracion": ["Señor, Dios de nuestros padres, Dios nuestro. Reconocemos tu grandeza, tu gloria, tus maravillas... tu amor. Cada una de nuestras existencias es una manifestación visible de ti mismo. Te has prodigado, sin reservas, y has hecho de nosotros un monumento a tu amor.", "Quisiéramos que nuestras vidas fueran un cántico permanente, que proclamara tu bondad y tu gloria. Cántico que todos escucharan y que todos se sintieran invitados a unirse a nosotros para cantar la misma canción. A ti que vives y reinas por los siglos de los siglos."]}, {"ref": "Salmo 150", "sub": "es un himno invitando a la ala- banza con toda clase de instrumentos.", "amb": ["Es el último salmo del salterio. Y todo él, es una clamorosa invitación a formar una gran orquesta para cantar y alabar a Dios por \"sus obras magníficas, por su inmensa grandeza\". Y en esa gran orquesta que suenen \"trompetas, cítaras y arpas, tambores y danzas, trompas y flautas, platillos sonoros vibrantes\"...y que todos interpreten la gran sinfonía que Dios se merece. Es más: \"que todo ser que alienta, alabe al Señor.\"", "Este debiera de ser el salmo de una comunidad de creyentes. Toda ella, llamada a participar en la gran orquesta de alabanza a nuestro Dios, desde las personas concretas que la componen hasta cada una de las acciones que realizan a lo largo del día y de la noche.", "Así, seríamos una invitación silenciosa, para nuestros hermanos, a fin de que se unan a nuestro canto, y todos podamos entonar el \"aleluya\" ininterrumpido, al Dios que todo lo ha dispuesto y creado, para el bien de la humanidad. Que a lo largo de este día que estamos comenzando, nos resuene con insistencia, este estribillo: \"todo ser que alienta, alabe al Señor\". Amén, amén."], "oracion": ["Señor Dios Padre nuestro, Dios del universo. Te admiramos, te alabamos... reconocemos tu grandeza, tu poder, tu amor. Todas tus obras son admirables. Cada una de ellas nos habla de ti. Quisiéramos recoger la invitación silenciosa que nos dirigen, para que nuestras vidas, estén en consonancia con tu amor.", "Que seamos alabanza y manifestación de tu gloria, para que quienes nos vean, se sientan invitados a admirarte, a alabarte y a amarte. A ti que vives y reinas por los siglos de los siglos."]}], "summary": {"breve": ["Salmo 117: Tenemos que reconocer que el Señor es bueno y que todos debemos proclamarlo. Nos lo confirma nuestra experiencia personal. Por eso todos los días, hoy sobre todo, podemos cantar con verdad: \"este el día en que actuó el Señor\".... \"Sea nuestra alegría y nuestro gozo\"", "Cántico DN.3: Todo el silencio de la creación nos está invitando. Nosotros recogemos esa invitación y rompemos ese silencio para gritar: \"a ti gloria y alabanza por los siglos\". Dios es maravilloso y todas sus obras nos invitan a admirarle y a alabarle, con alegría desbordante.", "Salmo 150: Llenos de admiración ante las grandes obras de Dios, exteriorizamos esa admiración, utilizando toda clase de instrumentos musicales que con sus sonidos canten la grandeza, la sabiduría, y el poder de Dios, reflejado en todas sus obras."], "oracion": ["Salmo 117: Cantar la primera estrofa al principio y al final. Un solista dice la primera parte de las tres primeras estrofas y todo el grupo contesta con la segunda. El resto de las estrofas hasta \"este es el día del Señor\" que se canta. El resto lo proclama todo el grupo.", "Cántico DN: Un solista proclama la primera parte de cada estrofa y todo el grupo responde con la segunda.", "Salmo 150: A dos coros: uno proclama la primera parte de cada estrofa y el otro la segunda."], "reflexion": ["El Señor está conmigo, no temo…", "Bendito tu nombre santo y glorioso…", "Todo ser que alienta alabe al Señor…"]}}, {"key": "oración de la tarde II", "label": "Vísperas II", "psalms": [{"ref": "Salmo 109", "sub": "es un himno a Cristo, Mesías, Profeta y Rey.", "amb": ["Cristo es alguien para los demás. El Dios que se ha volcado en su humanidad, se ha volcado para entregarse a todos los humanos. Todos sus misterios de salvación, los está viviendo unido a cada uno de nosotros. Su muerte y su Resurrección están siendo nuestra muerte y nuestra resurrección. En El,todos estamos muriendo y resucitando, permanentemente.", "Por eso, este salmo 109, es un cántico a Cristo muerto y resucitado. Pero al mismo tiempo es también nuestro cántico. Proclamamos a Cristo ensalzado y glorificado y también nos proclamamos a nosotros, exaltados y glorificados en El. Con Cristo, hemos sido sentados \"ya\", a la derecha del Padre. Con Cristo, somos reyes... sacerdotes... profetas. El Señor lo ha jurado y no se arrepiente. La firma de nuestro cheque es la misma persona de Jesús. Podemos estar totalmente seguros de que las promesas del Padre, se cumplirán en nosotros.", "Con esta seguridad, cantamos a Cristo y al mismo tiempo nos cantamos a nosotros mismos en la tarde de este domingo, siempre cargados de gratitud y de esperanza. El Resucitado nos ha abierto caminos nuevos.", "Sembremos nuestro mundo de optimismo y mensajes de alegría y compromiso.", "Nuestra oración, en estas últimas horas del día, robustezca nuestra fe y nuestra esperanza. Cristo Resucitado, alienta nuestras vidas."], "oracion": ["Señor, en Cristo, has diseñado tu plan amoroso, sobre todos y cada uno de nosotros", "De verdad que nos has engrandecido sobremanera . Por nuestra cuenta, nunca hubiéramos soñado en nada de eso. Pero tu amor y tu bondad, que no tienen límites, se han desbordado. Un gracias, muy grande, y un serio compromiso contigo, es lo que esperas de nosotros. Desde nuestra debilidad, te decimos sinceramente, cuenta con nosotros. Tú que vives y reinas por los siglos de los siglos."]}, {"ref": "Salmo 111", "sub": "es una proclamación de la felici- dad de quien practica la justicia.", "amb": ["Todos somos buscadores de la dicha, de la felicidad. Y es que hemos sido creados para ser felices. Es algo a lo que no podemos renunciar.", "El cristianismo no es un conjunto de normas frías y deshumanizantes. Sino que es un invitación a la \"vida\"... a \"ser,\" a la realización máxima de todo ser humano.", "Podemos definir a nuestra comunidad, como un grupo de cristianos que buscan ser felices y hacer felices a sus hermanos.", "Este salmo 111, que proclamamos al terminar el Domingo, es el salmo que canta la felicidad de aquellos que se han comprometido con esa tarea. Su modo de vivir arrastrará a otros: \"su linaje será poderoso... su descendencia será bendita\"... \"brilla como luz en las tinieblas\"... \"en su casa habrá abundancia\"...\"su corazón está seguro\"....", "Buscadores de felicidad. Pero solamente la encontraremos, si de verdad somos buscadores de Dios. Y Dios no está en los libros. Está en la vida: \"caridad constante... repartir y \"repartirnos\" a los demás\".", "Buscadores de la felicidad siendo buscadores de Dios. Lo necesitamos para nosotros y para darlo a los demás. A las dos cosas nos hemos comprometido. Las dos son la razón de nuestra vida."], "oracion": ["Señor, tú nos has creado para ser felices. Es lo que pretendes con tus mandatos y tus leyes. Nos buscas. No te buscas. Ahí manifiestas tu amor desinteresado", "Tú sabes que un día descubrimos todo esto y nos comprometimos a vivirlo. Y dijimos que para conseguirlo teníamos que se \"buscadores\" de ti. Y...con cierta vergüenza- tenemos que reconocer que no siempre lo hemos hecho. ¡Perdón!...rectificaremos. Tú que vives por los siglos de los siglos."]}, {"ref": "Cántico Ap.19", "sub": "es una invitación a la alegría ante un Dios tan cercano.", "amb": ["Todo cristiano tenía que vivir en alegría permanente. Su canción, un aleluya ininterrumpido, que pudieran oír todos, desde cualquier parte del mundo: \"Alegrémonos y gocemos y démosle gracias\" Y la razón es que Dios Padre, en la persona de Cristo, nos ha abrazado con amor infinito y para siempre. Se ha desposado con nosotros con un amor que nada ni nadie lo podrá romper.", "Nuestra vida de cristianos, solamente tendrá sentido, cuando demos una respuesta de amor, a aquel que se ha comprometido a amarnos con un amor de enamorado. No busca en nosotros más, que le dejemos amar. Esa será la mejor respuesta al que nos ama gratuitamente, sin exigencias, sin pasarnos factura por amarnos.", "La proclamación de este cántico es una invitación a todos los que lo proclamamos, ciertamente. Pero también es una invitación extensiva a toda la humanidad, desde nuestra vivencia personal. Cada uno de nosotros no puede callar. Nuestras vidas deben ser el grito clamoroso que invite, que arrastre... a todos, a vivir la alegría de un Dios que es todo amor y entrega, para aquellos que se dejan amar. Proclamemos... cantemos...."], "oracion": ["Señor, tenemos que decírtelo con sinceridad: terminamos este día alegres pero un poco avergonzados. Alegres porque nos abrazas con amor infinito en Jesús tu Hijo y nuestro Hermano. Y avergonzados porque no has encontrado en nosotros la respuesta que esperabas. No nos pedías nada. Sencillamente que te dejáramos amarnos. Nuestra ceguera, nuestra irreflexión, nos han jugado una mala partida.", "En la tarde de este Domingo, te manifestamos nuestro arrepentimiento y nuestro compromiso: a un enamorado, otro enamorado. Eso queremos ser, y a eso nos comprometemos, contigo que vives y reinas por los siglos de los siglos."]}], "summary": {"breve": ["Salmo 109: Terminamos el Domingo, día del Señor Resucitado, proclamando la exaltación que ha merecido por su entrega. En él, proclamamos también, la exaltación que nos ha merecido para todos.", "Salmo 111: Buscadores de felicidad, solamente en nuestra relación amistosa con Dios y con los hermanos. \"El justo brilla como una luz\"... \"su corazón esta seguro, sin temor\"", "Cántico AP.19: Si hemos entrado en la dinámica del Domingo, nuestra alegría tiene que ser desbordante. El se ha comprometido y nos lo ha demostrado de una manera, humanamente inexplicable."], "oracion": ["Salmo 109: Alternando dos solistas. La última estrofa y gloria, todos juntos", "Salmo 111: Lo proclama un solista, con un fondo musical suave.", "Cántico AP.: Un solista canta ó proclama las estrofas, y todos contestan con el aleluya."], "reflexion": ["El Señor lo ha jurado y no se arrepiente…", "Su corazón está seguro, sin temor…", "Aleluya...aleluya...alegrémonos…"]}}]}, {"name": "lunes", "hours": [{"key": "oración de la mañana", "label": "Laudes", "psalms": [{"ref": "Salmo 89", "sub": "es un poema invitando a la sensa- tez y a la cordura.", "amb": ["No es un invitación al pesimismo. Sencillamente es una invitación a la cordura, a la sensatez... a pisar tierra. Se nos invita a descubrir y a vivir el sentido de nuestra existencia: existimos en el tiempo, pero no para el tiempo. Por consiguiente, organizar nuestra vida desde esta perspectiva: temporal, pero para la eternidad.", "Cierto que \"nuestros días pasan... y se acaban como un suspiro\". Pero hemos sido pensados para proyectarnos hacia el infinito. Sembrados en el tiempo, pero con germen de eternidad.", "Para quien no ve más allá de la realidad de la muerte, es desesperante la brevedad de la vida... Pero para nosotros, creyentes, -\"quien cree en mí no morirá para siempre\"- la muerte no es el final. Nos espera la escena definitiva: el encuentro con Aquel que \"desde siempre y por siempre es nuestro Dios\".", "Nuestra comunidad, como comunidad, está anunciando la temporalidad de la vida presente, y adelantado, ya, el Reino futuro. Que no falsifiquemos nuestro anuncio, desde el modo de organizar nuestra vida concreta. Nuestra vida de testimonio, es un compromiso que hemos adoptado, como \"servicio\" a nuestro mundo. No podemos fallarle."], "oracion": ["Señor, es cierto que mirada con criterios humanos, no es muy halagüeña la brevedad de nuestra vida. Pero tú mismo has salido a nuestro paso y has iluminado nuestro caminar: \"quien cree en Mí no morirá para siempre\".", "Gracias por tu luz y gracias también por la semilla de eternidad que has sembrado en nosotros. Que nuestro modo de vivir, sea todo un mensaje de esperanza para este nuestro mundo, muchas veces desesperanzado. Tú que vives y reinas por los siglos de los siglos."]}, {"ref": "Cántico Is. 42", "sub": "es un cántico al Dios vence- dor y salvador.", "amb": ["En el comienzo de este nuevo día, se nos invita a comenzarlo con la novedad de una vida que sea alabanza permanente a aquel que es el creador de todo el universo.", "Que nuestro canto de alabanza \"llegue hasta el confín de la tierra\". Que se alegren todos: \"los que están en el desierto, en los cercados... todos proclamen la gloria de Dios\".", "Una vez más, el Señor actuará, y se realizarán grandes trasformaciones: \"en los montes, en los valles, en los ríos... hasta los ciegos serán conducidos por caminos desconocidos\".", "Nuestra comunidad no puede dormirse en la rutina. La novedad de nuestra vida tiene que ser algo de todos los días. Y es que todos los días el Señor se nos manifiesta, actúa en cada uno de nosotros, de maneras sorprendentes y novedosas.", "Que a lo largo de este día, pues, dejemos actuar a Dios, y seamos capaces de descubrir sus actuaciones. Y desde ahí, vivamos la alegría de su presencia, de su cercanía permanente. De tal forma que brote espontánea nuestra alabanza, como expresión de amor y de gratitud."], "oracion": ["Señor, te lo mereces todo. Y quisiéramos que todos lo reconocieran. Tus actuaciones en nuestra vida, en la creación, son permanentes y trasformadoras. Tu poder se nos manifiesta constantemente. No hacemos nada extraordinario si sabemos reconocerlo y agradecértelo, con la novedad de una vida cargada de agradecimiento", "Queremos comenzar este día, abiertos a tus sorpresas, fruto de tu amor hacia nosotros. Tú que vives y reinas por los siglos de los siglos."]}, {"ref": "Salmo 134", "sub": "es un canto al Dios que hace tan- tas maravillas.", "amb": ["Si la vida concreta de cada hombre, de cada cristiano, tiene que ser una vida de alabanza y gratitud, la nuestra con mayor razón: nos comprometimos a hacerlo, desde la respuesta que dimos a una vocación.", "Tenemos muchas razones para ello. La fundamental es que \"el Señor es bueno\" y nos está manifestando su amor y su bondad, continuamente. Toda nuestra vida está marcada con prodigios constantes por parte de Dios. Con verdad podemos decir \"el Señor es bueno... es amable... es grande... nos ha escogido en posesión suya...\"", "Estar sensibilizados a las acciones de Dios, es la única postura que debiéramos tener los que nos decimos \"consagrados\". Desde ahí brotaría espontánea nuestra gratitud y nuestra alabanza, y seríamos una invitación viva para los demás: \"alabad el nombre del Señor\".", "Pero también ha habido acciones liberadoras de Dios en cada uno de nosotros. ¡En cuántos momentos difíciles, en cuántas circunstancias complicadas, hemos sentido una mano misteriosa que nos ayudaba!. Repasemos nuestra historia personal y lo descubriremos."], "oracion": ["Señor, siempre has sido bueno con nosotros. Siempre hemos notado tu mano misteriosa que nos protege Tenemos que reconocerlo y agradecértelo. Quisiéramos que nuestras vidas fueran una invitación permanente para todos los que nos vean, y sientan la necesidad de alabarte y de darte gracias, por lo que haces por ellos, y así lleguen a descubrir lo que realmente eres: el Dios creador, conservador...en una palabra, el Padre de todos. Tú que vives y reinas por los siglos de los siglos."]}], "summary": {"breve": ["Salmo 89: Ya desde la mañana nos acogemos a la bondad del Señor, desde la cordura y la sensatez de nuestro vivir. Somos temporales en este mundo, aunque con perspectivas de eternidad.", "Cántico : IS.42: Estamos llamados a ser un cántico nuevo desde una vida siempre nueva, renovada. Y que los ecos de nuestro canto lleguen hasta \"el confín de la tierra\" llevando un mensaje de alegría a todos los rincones de la tierra.", "Salmo 134: No hace falta pensar mucho para encontrar motivos para alabar a Dios. Son tantos y tan manifiestos que no tenemos más que abrir los ojos y ver. Desde su infinita bondad nos ha escogido como posesión suya."], "oracion": ["Salmo 89: Todo él cantado. o cantar la primera estrofa al principio y al final. El resto proclamarlo a dos coros.", "Cántico IS.42: Proclama todo el grupo las tres primeras estrofas. Y las dos últimas un solista.", "Salmo 134: Cantar \"alabad siervos de Dios el nombre del Señor\" de Cantalapiedra, después de cada una de las estrofas. Gloria, todos."], "reflexion": ["Toda nuestra vida será alegría y júbilo…", "Cantad al Señor un cántico nuevo…", "Alabad al Señor porque es bueno…"]}}, {"key": "oración de la tarde", "label": "Vísperas", "psalms": [{"ref": "Salmo 135", "sub": "es un canto de alabanza y grati- tud a la misericordia del Señor.", "amb": ["Estamos en las últimas horas de este día. Se imponen unos momentos de reflexión y de examen. Necesitamos vivir nuestra vida con realismo y profundidad. Hay muchas realidades que se nos pueden pasar desapercibidas, sin
