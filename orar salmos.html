amente desde ti, es desde donde tienen sentido todas las cosas. No podemos arrinconarte, ni marginarte porque estaríamos sufriendo un error de perspectiva que nos llevaría a vivir en la mentira, en el engaño… con todas las consecuencias que eso supone: frustración… fracaso.", "Queremos que tú seas el centro de nuestro vivir, que tú tengas la última palabra en nuestras decisiones, que tu presencia aliente todos nuestros momentos. Tú que vives y reinas por los siglos de los siglos."]}], "summary": {"breve": ["Salmo 76: Desde un mundo que está sufriendo profundas transformaciones, nos cuestionamos las relaciones de Dios con nosotros. Confiemos: Dios siempre es el mismo, siempre con nosotros, aunque no lo sintamos.", "Cántico 1ª SAmUEL: Ante tantas desesperanzas, necesitamos sembrar esperanzas. El poder de Dios no tiene límites. Dejémosle que lo ejerza y vivamos la alegría de su presencia. El es la \"esperanza\"", "Salmo 96: La presencia del Señor, es incuestionable. No podemos arrinconarle y menos intentar matarle. Toda la creación es un anuncio permanente de su cercanía. Alegrémonos y celebrémoslo."], "oracion": ["Salmo 76: Un solista proclama la primera parte hasta… tus hazañas.. .Y siguen todos al unísono hasta al final, incluido el Gloria.", "Cántico 1ª SAmUEL: De forma responsorial, cantar: \"Proclama mi alma la grandeza del Señor, se alegra mi espíritu en Dios mi Salvador\". Lo canta un coro y el otro va proclamando las distintas estrofas.", "Salmo 96: Cantar al principio y al final \"Tu reino es vida, tu reino es verdad, venga a nosotros tu reino Señor\". Y se proclama todo a un solo coro."], "reflexion": ["¿Qué Dios es tan grande como nuestro Dios...?", "No hay roca como nuestro Dios…", "Todos los pueblos contemplan su gloria…"]}}, {"key": "oración de la tarde", "label": "Vísperas", "psalms": [{"ref": "Salmo 61", "sub": "es una oración confiada al Señor.", "amb": ["Quizá han sido muchas las experiencias que hemos tenido este día: unas pacificadoras y otras no tanto. Toda oración, en concreto la de esta tarde, nos invita a serenarnos, a recobrar nuestra paz.", "Lo vamos a proclamar: \"Sólo en Dios descansa mi alma… él es mi roca… mi salvación… mi esperanza…\" \"… desahogad ante él vuestro corazón…\"", "No importa que nos hayamos encontrado con personas, acontecimientos, situaciones que han intentado turbarnos, hacernos perder la paz. Dios, nos estaba esperando al declinar de esta tarde… en estos momentos de oración… para decirnos cariñosamente: ánimo… serénate… recupera tu paz… yo soy la paz… déjame adentrarme en tu intimidad…", "Que la proclamación de este salmo 61, nos facilite el encuentro sincero con nosotros mismos, con nuestra situación presente, y con el Dios que nos espera. Digámosle con verdad, desde dentro… \"solo en ti descansa mi alma… tú eres mi esperanza… mi roca… mi alcázar…\". Y nos sentiremos trasformados en lo profundo de nuestro ser. Y tendremos un descanso sereno, para que podamos comenzar un nuevo día, con la alegría y el optimismo, de quien todo lo ve con ojos nuevos."], "oracion": ["Señor, es lo que necesito al terminar este día: paz... tranquilidad… serenidad.", "Después de tantas experiencias acumuladas durante esta jornada que voy a concluir, estos momentos contigo, de tú a tú, me traen lo que estoy necesitando. Tú eres mi descanso, mi seguridad, mi roca firme. Contigo, nada tengo que temer. Tú me llenas de esa paz que yo necesito.", "Gracias, Padre. A ti que vives por los siglos de los siglos."]}, {"ref": "Salmo 66", "sub": "es un canto de gratitud, extensi- vo a todos los pueblos.", "amb": ["Son muchas las cosas que recibimos de los demás, a lo largo del día. Y son muchas las personas que han intervenido, para que tuviéramos todo lo que hemos necesitado, para el adecuado desarrollo de nuestra vida. Por eso terminar el día reconociéndolo y agradeciéndolo, es la mejor postura que podemos adoptar.", "Estamos en oración. Y la oración es diálogo, es comunicación entre dos: Dios y nosotros, nosotros y Dios. El es quien a lo largo del día nos ha demostrado que nos ama. De él lo hemos recibido todo.", "Una palabra de gratitud, a esta hora del día, es lo más correcto que podemos hacer con Dios.", "Es más: invitaremos a todos los pueblos, a todas las gentes que se unan a nosotros: \"que te alaben todos los pueblos, que todos los pueblos te alaben\"… porque eres recto, porque eres justo… por todos los frutos de la tierra que habitamos… porque es bendición sobre todos nosotros\".", "Quienes estamos aquí reunidos, somos cristianos cualificados, que hemos adoptado un compromiso concreto ante Dios: vivir nuestras relaciones con él profunda y responsablemente.", "Que este salmo 66, sea el trasfondo de toda nuestra vida."], "oracion": ["Señor, lo deseamos de verdad: que todos los pueblos, que todas las razas, que todos los humanos te conozcan. Que lleguen a descubrir lo que de verdad eres tú, y tu comportamiento con nosotros.", "Somos conscientes de nuestra responsabilidad ante ese cometido: es nuestra vida la que tiene que hablarles de ti. Renovamos nuestro compromiso de hacerlo. Y \"que todos los pueblos te alaben\". A ti que vives por los siglos de los siglos."]}, {"ref": "Cántico Col. 1, 12", "sub": "es un himno a Cristo pri- mogénito entre todos los hermanos.", "amb": ["Tenemos muchos motivos para estar alegres y agradecer a Dios, lo que él es en nuestra vida.", "Este cántico que vamos a proclamar nos da motivos para ello. \"Damos gracias al Padre, porque ha puesto en nosotros la capacidad de ser sus hijos\". Y esa capacidad la ha desarrollado al volcarse en Cristo, para que en él, y desde él, nos vayamos haciendo hijos en el Hijo.", "Es un misterio que sobrepasa nuestras capacidades y que nunca hubiéramos soñado en ello. Pero la bondad de Dios, su amor, que no conoce límites, ha roto todas las barreras, y se ha acercado a nuestro barro, para levantarlo a una categoría insospechada. Y en Jesús nos ha abrazado y nos sigue abrazando, para que su calor de Padre, caliente nuestro frío.", "Noticias como esta, necesitamos, escuchar al terminar un día, más ó menos ajetreado, que nos den paz, tranquilidad… alegría.", "Y estas noticias vienen a romper rutinarismos, aburrimientos, vidas sin color, que nos impiden vivir la vida como realmente debe ser.", "En Cristo nuestro hermano hemos sido levantados hasta el Padre. En Cristo nuestro hermano, el Padre nos ha abrazado para siempre, con un abrazo de amor que nunca interrumpirá. Siempre estamos siendo abrazados por el Padre en el Hijo.", "Siempre el Padre nos está haciendo hijos suyos, en el Hijo."], "oracion": ["Señor, gracias. Es tonificante terminar un día y poder caer en la cuenta de tus acciones para con nosotros. Nada menos, que has querido acercarte a nuestro barro y llenarlo de tu misma vida: hacernos hijos en el Hijo.", "Es una noticia que creemos, y que nos llena de alegría, porque desde tu amor todo se puede explicar.", "De nuevo te repetimos: ¡¡GRACIAS PADRE!!. A ti que vives y reinas por los siglos de los siglos."]}], "summary": {"breve": ["Salmo 61: Seguro que hemos pasado por situaciones, que tal vez, nos han hecho perder la calma. Dios es calma, es serenidad. Arrojémonos en sus brazos y entreguémonos al descanso de esta noche. Paz.", "Salmo 66: Dios es bendición sobre todo y sobre todos. Proclamemos nuestro deseo de que todos los pueblos lo reconozcan y le alaben por sus relaciones con nosotros.", "Cántico CoL.: Son muchos los motivos que tenemos para vivir la alegría de lo que Dios es para con nosotros. El principal, el habernos capacitado para compartir con Cristo, su misma vida."], "oracion": ["Salmo 61: Proclama un solista hasta \"Dios es mi refugio...\" Y se canta estribillo \"Junto a ti al caer de la tarde\". Y prosigue otro solista con la segunda parte. Todos el Gloria.", "Salmo 66: Se puede cantar todo. o un coro proclama las estrofas, y el otro canta \"oh Dios que te alaben los pueblos...\"", "Cántico CoL.: Proclamado por todos, despacio, y con un fondo musical suave"], "reflexion": ["Lámpara es tu Palabra para mis pasos…", "me saciarás de gozo en tu presencia…", "Se despojó de su rango…"]}}]}, {"name": "jueves", "hours": [{"key": "oración de la mañana", "label": "Laudes", "psalms": [{"ref": "Salmo 79", "sub": "es un cántico de acción de gracias al Señor y un deseo de renovación.", "amb": ["Comenzamos un nuevo día. Y lo hacemos, abiertos a la acción de Dios para que transforme nuestras vidas. Somos conscientes de que somos pobres, profundamente necesitados. Es él, el único que puede salir a nuestro paso y enriquecernos con su riqueza.", "Insistentemente, vamos a repetirle en este salmo: \"oH Dios, restáuranos que brille tu rostro y nos salve\". Con este sentido de apertura, podemos facilitar la acción de Dios. Quiere contar con nuestra colaboración, con nuestro dejarle hacer.", "Somos la viña mimada que él mismo plantó, le preparó el terreno para que echara raíces y diera fruto abundante. Pero esta viña ha tenido sus cambios. Ya no es la viña que era. Se ha quedado sin \"cerca\", ha sido \"saqueada\"… ya no da fruto.", "En el fondo, es una cariñosa recriminación para cada uno de nosotros reunidos aquí, en esta mañana. Y la mejor respuesta que podemos dar, es nuestra súplica, cargada de humildad: \"ven a visitar tu viña… la que tú mismo plantaste e hiciste vigorosa….\" Convencidos de que no podemos marginar a Dios en nuestra vida. Nos ha creado, nos mantiene en la existencia… y su intervención es una necesidad, de la que no podemos prescindir.", "El \"ven a visitar a tu viña…\" es el grito que tiene que resonar constantemente dentro de nosotros, como expresión de una necesidad vital, que no podemos ahogar, sin sentirnos frustrados."], "oracion": ["Señor, te necesitamos. Somos la viña que tú plantaste y que hoy no da los frutos que esperabas. \"Ven a visitar a tu viña… restáuranos\". Quisiéramos que este fuera nuestro grito permanente, que clame por ti. Es el único modo de vivir nuestra vida, con el sentido que realmente tiene. \"No nos alejaremos de ti, danos vida…\".", "Profesionales de la \"vida\", la necesitamos para nosotros y para dar testimonio de ella ante nuestros hermanos. Tú que vives por los siglos de los siglos."]}, {"ref": "Cántico Is. 12", "sub": "es un himno de gratitud al Dios salvador.", "amb": ["No podemos comenzar el día rutinariamente, de cualquier manera. Ser conscientes de lo que supone vivir, existir, es dar un tono alegre a nuestra vida.", "El profeta nos invita a reconocer lo que es Dios para cada uno de nosotros y a vivir bajo el signo de la gratitud. \"El Señor es mi Dios y Salvador… mi fuerza… mi poder… gritadle jubilosos: qué grande es… el Santo de Israel\"… \"Dad gracias al Señor…\".", "Nuestra comunidad es un campo especial, donde Dios se ha manifestado y sigue manifestándose de una manera particular. No podemos cerrar los ojos como si aquí no hubiera pasado nada. Tenemos que reconocerlo, proclamarlo y agradecerlo. Es más: nuestro modo de vivir debe ser una invitación para cuantos nos contemplen, a fin de que descubran el sentido de Dios: \"Contad a los pueblos sus hazañas..proclamad que su nombre es excelso...\"", "No olvidemos de que nuestra vocación es vocación-misión: \"elegidos para ser enviados… para que el mundo crea\". Respondemos cuando anunciamos. No podemos separar las dos realidades: respuesta y anuncio.", "Con sinceridad proclamemos: \"Dad gracias al Señor, contad a los pueblos sus hazañas, proclamad que su nombre es excelso\".", "Que el día que estamos comenzando nos abra a la alegría de la gratitud."], "oracion": ["Señor, reconocemos todo lo que tú eres en nuestra vida: salvación, fuerza, presencia. Podemos gritar \"jubilosos\", qué grande eres. Nuestra gratitud permanente es la respuesta que debemos darte.", "Al mismo tiempo deseamos, que el grito de nuestra vida, invite a todos los pueblos a proclamar que tú eres el único Dios y Salvador.", "Que no te defraudemos, Señor, y que no nos defraudemos. Tú que vives por los siglos de los siglos."]}, {"ref": "Salmo 80", "sub": "Dios renueva su alianza con un pueblo que le escucha", "amb": ["Por dos veces vamos a escuchar el deseo de Dios: \"ojalá me escuchase mi pueblo…\"", "Estamos en las primeras horas del día. Vamos a entregarnos a nuestras ocupaciones. En medio de ellas, no podemos prescindir de Dios, de su cercanía. No podemos realizar nuestras obras como máquinas que trabajan en frío. El sentido de Dios debe envolverlo todo.", "\"No tendrás un dios extraño\". Y es que tenemos el peligro de vivir un ateismo camuflado, aunque aparentemente digamos que creemos en Dios. muchos pueden ser nuestros dioses, ante los cuales nos postremos cada día. Reconocerlos y descubrirlos, debe ser nuestra tarea.", "Nuestro compromiso, hecho público fue: \"Dios el sentido de nuestra vida\". Y dedicarnos a ello con todas nuestras fuerzas, con todo nuestro ser. Y además de dedicarnos nosotros, invitar a todos: \"aclamad a Dios nuestra fuerza… tocad panderos, trompetas, cítaras y arpas…\".", "Caer en la cuenta de todas estas realidades al comenzar el día, es la manera de que podamos realizarlas. De una oración verdadera deben salir compromisos verdaderos. Que no se pueda decir de nosotros: \"pero mi pueblo no escuchó mi voz\"."], "oracion": ["Señor, queremos que se cumplan en nosotros tus deseos \"ojalá me escuchase mi pueblo\". En los comienzos de este día nos abrimos a tu voz, para que cambies nuestras vidas y nos vayas transformando.", "Tú serás nuestro Dios y romperemos esos pequeños ídolos que obscurecen tu presencia. Queremos que nuestras vidas sean una invitación para todos nuestros hermanos a creer en ti y a amarte a ti, que vives por los siglos de los siglos."]}], "summary": {"breve": ["Salmo 79: Somos los mimados de Dios, la viña que él ha plantado. No siempre le hemos correspondido. Insistentemente le vamos a decir que venga visitar y restaurar esta viña, que venga a salvarnos.", "Cántico IS. 12: A pesar de nuestros fallos, Dios siempre está dispuesto al PERDoN. La gratitud y la admiración hacia él, deben caracterizar nuestra vida: \"dad gracias… qué grande es en medio de ti…\"", "Salmo 80: Podemos caer en un ateismo camuflado, casi sin darnos cuenta. La voz del Señor nos llama cariñosamente: \"escucha pueblo mío… ojalá me escuchases Israel…\" Renunciemos a nuestros ídolos. Abrámonos a Dios."], "oracion": ["Salmo 79: Un solista proclama las estrofas y todo el grupo contesta, donde corresponda, \"oH Dios restáuranos, que brille tu rostro y nos salve\".... ó su equivalente, con un corto silencio.", "Cántico IS. 12: Un solista proclama las dos primeras estrofas, inclusive \"Aquel día diréis\" y el grupo contesta con las dos restantes.", "Salmo 80: Todo el grupo proclama las tres primeras estrofas, y un solista,, despacio, desde \"retiré sus hombros…\" hasta el final."], "reflexion": ["Ven a visitar a tu viña…", "mi fuerza y mi poder es el Señor…", "¡ojalá me escuchase mi pueblo…"]}}, {"key": "oración de la tarde", "label": "Vísperas", "psalms": [{"ref": "Salmo 71, I", "sub": "es una invitación a establecer la paz y la justicia.", "amb": ["Las relaciones entre nosotros los humanos, no siempre son como debieran ser: los egoísmos, las envidias, la sed de venganzas… frecuentemente marcan nuestra vida.", "Es Dios mismo, quien por medio de Jesús, se hace presente en nuestro mundo para hablarnos de paz, de amor… de fraternidad.", "El sentido mesiánico de este salmo 71, nos invita a restaurar, a restablecer… en nuestra sociedad actual, tan rota por las guerras y los terrorismos, la paz, la justicia, la libertad… el amor: \"que los montes traigan paz y los collados la justicia\"… \"que él defienda a los humildes socorra a los pobres… y quebrante al explotador\".", "Una gran tarea nos espera. Nuestro esfuerzo tiene que ser permanente por restablecer el equilibrio pacífico en este mundo, comenzando por los que están a nuestro lado: aquellos con los que compartimos nuestra vida diaria.", "Todo cristiano, por el mero hecho de serlo, tiene que sentir la necesidad de vivir la paz y sembrarla a su alrededor.", "Que hagamos realidad \"que en nuestros días florezca la justicia y la paz\". Ante un mundo en guerras permanentes, es necesario que nuestra siembra de paz sea un grito de protesta, que sea oído por todos los que nos contemplen. Ello nos exigirá la vivencia de nuestro compromiso de vivir en paz, para que nuestro anuncio no sea una farsa."], "oracion": ["Señor, tú has puesto dentro de nosotros, esta necesidad de vivir la paz, y no siempre la vivimos. Nuestros egoísmos nos traicionan. Queremos ser sembradores de paz, de justicia, de amor. Nuestro mundo lo necesita. Tenemos que salir al paso de esa necesidad. Ese es el compromiso de un bautismo responsable. No podemos dejarlo caer en el vacío. Por ti, que vives y reinas por los siglos de los siglos."]}, {"ref": "Salmo 71, II", "sub": "es una oración en favor de los pobres y oprimidos.", "amb": ["Los pobres, los indigentes, los afligidos, son quiénes pagan las consecuencias de un mundo injusto.", "Por eso, es necesario que alguien escuche sus clamores, y dé solución a sus problemas. Esa ha sido el deseo de Dios al hacerse \"enmanuel\": llegar al corazón de todos los hombres, para que se restablezca el equilibrio, la justicia, la paz. \"He sido enviado, nos dirá Jesús, a los pobres, a los afligidos, para sanar, curar…\". \"El librará al pobre… al afligido… se apiadará del indigente, lo rescatará de la violencia…\".", "Los continuadores de la misión de Jesús, los que nos hemos comprometido a re-presentarle hoy en nuestro mundo, somos los que tenemos esta responsabilidad con nuestros hermanos necesitados. No responderles es una verdadera traición a Dios, a los hermanos. y a nosotros mismos. Abrámonos a estos clamores y respondamos.", "Pero nuestra respuesta debe ser desde la coherencia de nuestra vida: oyendo \"los clamores de los pobres, protegiendo a los afligidos, apiadándonos de los indigentes, rompiendo toda violencia\" y \"seamos bendición para todos los pueblos\".", "A eso hemos sido llamados por el que nos ha elegido. Continuamos su misión siendo fieles a nuestra vocación."], "oracion": ["Señor Jesús, fuiste \"enviado a los pobres, a los afligidos que no tenían protector\". Tú respondiste a este envío hasta las últimas consecuencias. Por eso te mataron.", "Nosotros somos los continuadores de tu misión en nuestro mundo actual. Nos comprometimos un día, y nuestro compromiso no se puede perder en el tiempo, queremos actualizarlo. A todos nuestros hermanos, les decimos: contad con nosotros. Tú que vives por los siglos de los siglos."]}, {"ref": "Cántico Ap. 11, 17-18", "sub": "himno a la justicia y misericordia de Dios.", "amb": ["Dios no se desentiende de nuestra historia. Está metido en ella con todas las consecuencias. Desde que decidió hacerse uno de tantos asumiendo nuestra humanidad, no cesa de intentar trasformar a todos los humanos para que sigan construyendo un mundo nuevo, destruyendo todas las fuerzas del mal.", "Su intento es \"establecer el reinado de Dios y la potestad de su Cristo\", como la gran necesidad que todos llevamos muy dentro.", "A este intento se han ido sumando multitud de hombres y mujeres, que a lo largo de la historia, no han dudado en derramar su sangre, para que el Reinado de Dios, fuera una realidad en nuestro mundo. Su muerte no ha sido una derrota, sino una victoria, sobre el mal. Su testimonio sigue siendo un grito silencioso contra todas las injusticias de nuestro mundo.", "En realidad, hoy, somos nosotros quienes con nuestra vida, debemos de hacer presente la fuerza del Resucitado, que transforme de raíz el mundo que nos rodea.", "Ante tantas injusticias que sufre nuestro mundo, ante tantos seres humanos tratados como objetos, nuestra vida tiene que gritar y protestar, hasta lograr que \"el reinado de nuestro Dios y la potestad de Cristo se establezca\". Por nuestra vocación, somos \"la voz de los sin voz\", que no puede ni debe callar."], "oracion": ["Señor, gracias por lo que eres, gracias por tú acción misteriosa en nuestro mundo, en tu intento de transformarlo y de hacerlo mas humano, más solidario, mas fraternal. Deseamos que no triunfen las fuerzas del mal: los egoísmos, los odios, las venganzas, las guerras.", "Con nuestro esfuerzo y nuestro testimonio, queremos denunciar valientemente, todo lo que va contra la paz y contra al amor. Tú que vives y reinas por los siglos de los siglos."]}], "summary": {"breve": ["Salmo 71, I: Ante nuestras tensiones y rivalidades, el Señor se nos presenta como el Dios de la paz, de la justicia y del amor. Como cristianos esa es la tarea que nos espera: sembradores de paz, justicia y amor.", "Salmo 71, II: Un mundo injusto actúa sobre los más débiles. Es Dios quien sale en su defensa desde nuestra colaboración: nos necesita y nos necesitan. No podemos y no debemos negarnos.", "Cántico AP. 11: Damos gracias a Dios por su actuar en nuestra historia implantado su reino de paz y de amor. muchos hombres y mujeres se han comprometido en esa tarea. Continuemos con ese compromiso."], "oracion": ["Salmo 71, I: Cantarlo todo. o al principio, al medio y al final, cantar el estribillo \"tu reino es vida, tu reino es…\" y proclamarlo a dos coros", "Salmo 71, II: Cantar al principio y al final el estribillo anterior y proclamarlo a dos coros.", "Cántico AP. 11: Proclamado solemnemente por todo el grupo con un fondo musical."], "reflexion": ["Que los montes traigan la paz…", "El único que hace maravillas…", "No amaron tanto la vida que temieran la muerte…"]}}]}, {"name": "viernes", "hours": [{"key": "oración de la mañana", "label": "Laudes", "psalms": [{"ref": "Salmo 50", "sub": "es una llamada a la renovación desde la alegría del encuentro.", "amb": ["Un viernes más del año, reunidos para la oración de la mañana. Como viernes, seguro que nos vienen al recuerdo los grandes acontecimientos que, un día como hoy, sucedieron. Por eso también, en la liturgia de hoy, directa e indirectamente se nos recordará.", "En este salmo 50, lo primero que Dios pretende, no es precisamente echarnos en cara nuestros fallos, sino decirnos que sus brazos están siempre abiertos para abrazarnos, si nosotros nos dejamos abrazar. La sangre que fue derramada el primer viernes santo, es la tinta con que fue escrita la página del perdón… del abrazo.", "Que la proclamación de este salmo, provoque en nosotros sentimientos de paz, de perdón, de misericordia… de amor. Que la rutina, no nos lleve a dejar pasar desapercibidas realidades que bien pensadas, conmueven a cualquiera.", "Nuestra comunidad es un grupo que debe estar respondiendo a la llamada de Dios, que nos invita a la conversión: \"oH Dios crea en mí un corazón puro...\" \"renuévame por dentro…\"Así recuperaremos \"el gozo y la alegría\"… \"Devuélveme la alegría de tu salvación\"…", "No es la tristeza del pecado la que tiene que mover nuestra vida. Sino la alegría del perdón, del Padre que siempre está dispuesto a derrochar misericordia con nosotros, a abrazarnos con cariño."], "oracion": ["Señor, tú no eres el Dios del miedo, ni de la venganza, sino el Dios del amor, el Dios del perdón. No quieres que vivamos tanto la tristeza de nuestro pecado, cuanto la alegría y el gozo de tu perdón.", "Que en el camino de nuestra conversión, sepamos descubrir tu rostro de Padre, con los brazos abiertos, siempre dispuesto a darnos el abrazo de la misericordia y del amor. Tú que vives y reinas por los siglos de los siglos."]}, {"ref": "Cántico Ha. 3", "sub": "es una invitación a la sor- presa ante las acciones de Dios.", "amb": ["Son muchas las obras de Dios que contemplamos y admiramos. Y seguro que si las observamos detenidamente, nos impresiona su variedad, su belleza… la sabiduría que refleja cada una de ellas.", "Pero la gran obra de Dios, la que de verdad nos tiene que impactar y sorprender es su muerte en la Cruz. Ante ella podemos exclamar con verdad: \"Señor,… me ha impresionado tu obra\". Es la obra cúlmen de Dios en favor nuestro. Imposible realizar otra mayor. \"Habiendo amado a los suyos, los amó hasta el extremo\". Nos lo dio todo. Hasta se quedó sin vida, para dárnosla.", "Generosamente \"salió a salvar a su pueblo\", desde el patíbulo de la Cruz. Cualquiera que escuche esto, con espíritu abierto tiene que estremecerse y llenarse de admiración: \"lo escuché y temblaron mis entrañas…\".", "Nuestra comunidad, si quiere responder a su verdadera vocación, debe desarrollar su capacidad de sorpresa, para que \"la gran obra de Dios\" sea el motor de su vida y no se quede, tan solo, en el recuerdo: Admiradores de Dios para ser los buscadores de Dios.", "Un viernes, es una llamada a la admiración, a la sorpresa, ante las acciones de Dios. Recordarlas, sí. Pero que el recuerdo nos lleve a cuestionar nuestra vida. La Cruz, es todo un interrogante que nos pide respuesta."], "oracion": ["Señor, admiramos todas tus obras, pero sobre todo admiramos tú gran obra: tú muerte en la cruz. Ahí quisiste manifestarte como realmente eres: todo amor.", "Queremos que no se nos quede tan sólo en la historia, sin que tenga su honda repercusión en nuestra vida de hoy. Una obra como esa, es la que tiene que marcar el ritmo de nuestra existencia, si de verdad queremos vivir en cristiano. Tú que vives por los siglos de los siglos."]}, {"ref": "Salmo 147", "sub": "es un canto de acción de gracias y de alabanza al poder y sabiduría de Dios.", "amb": ["Todos y cada uno, si lo pensamos detenidamente, tenemos que admitir que \"el Señor ha estado grande con nosotros\". Las relaciones personales que ha mantenido y está manteniendo, conmigo, contigo, son de verdad relaciones personalizadas. Su trato es un de tú a tú tan profundo, tan cordial, que tenemos que confesar \"con ninguna nación obró así\".", "Y es que para Dios no existen relaciones anónimas, impersonales. Nos conoce perfectamente y nos trata como necesitamos ser tratados.", "Es lógico que brote espontáneamente nuestro grito de alabanza y de gratitud a un Dios que así se comporta con nosotros, y con maría, le digamos: \"glorifica al Señor… alaba a tú Dios…\".", "El orden maravilloso de toda la naturaleza es también una invitación silenciosa, a reconocer la cercanía y sabiduría de Dios: \"la nieve... la escarcha… las aguas congeladas… todo le está sujeto y todos obedecen a su poder.\"", "Que en el comienzo de este día, sintamos ese trato personal de Dios y nos entreguemos a nuestras ocupaciones con la alegría de su cercanía.", "Que nuestra comunidad, sea un anuncio viviente, de un Dios que nos ha puesto en el mundo para que hagamos visible su invisibilidad."], "oracion": ["Tú, Señor, nos conoces perfectamente y nos tratas a cada uno, como necesitamos ser tratados. Para ti, somos una persona concreta, sobre la que te vuelcas, como si no existiera otra. Con verdad podemos decir \"con nadie ha obrado así\". Lo hiciste con María y continúas haciéndolo con nosotros.", "Que con nuestra vida te alabemos, te glorifiquemos, te agradezcamos, todo lo que eres para nosotros. A ti que vives y reinas por los siglos de los siglos."]}], "summary": {"breve": ["Salmo 50: Viernes, día memorable: la gran manifestación de amor: Dios clavado en una cruz. Nuestra respuesta de gratitud y de amor, rompiendo el hielo de nuestra indiferencia y abriéndonos al perdón.", "Cántico HA. 3: Saber abrirnos a las sorpresas de Dios y admirarlas, y agradecerlas, es el quehacer de nuestra vida. Sobre todo a la gran sorpresa de su muerte en la cruz. Viernes, día de reflexión.", "Salmo 147: Si reflexionamos un poco sobre las relaciones de Dios con cada uno de nosotros, tenemos que decir: \"con ninguna nación obró así\". Por lo tanto \"glorifica… alaba a tu Dios…\"."], "oracion": ["Salmo 50: Proclamarlo espontáneamente, y cada tres estrofas cantar \"Perdón, Señor, perdón\" (de Espinosa). Después de cada canto, un breve silencio.", "Cántico HA. 3: proclama un solista la 1ª estrofa, las restantes todo el grupo al unísono.", "Salmo 147: Todo el salmo cantado, ó en forma responsorial, con \"glorifica al Señor, Jerusalén\". Las estrofas las proclama un solista."], "reflexion": ["Hazme oír el gozo y la alegría…", "Sales a salvar a t u pueblo…", "Con ninguna nación obró así…"]}}, {"key": "oración de la tarde", "label": "Vísperas", "psalms": [{"ref": "Salmo 114", "sub": "es un canto de acción de gracias a la bondad de Dios.", "amb": ["Es profundamente confortante terminar un día, y reconocer lo cercano que ha estado Dios en nuestro vivir. Nos hemos encontrado con dificultades, con problemas, tal vez \"con tristezas y angustias\"… hemos gritado al Señor, \"Señor salva mi vida\", y… hemos notado la fuerza de su presencia.", "De verdad podemos gritar llenos de alegría: \"el Señor es benigno y justo… compasivo… estando yo sin fuerzas, me salvó…\".", "No se trata de autosugestionarnos. Sencillamente autoconvencernos de que \"el Señor es bueno con nosotros… secó nuestras lágrimas… detuvo nuestros pies para que no cayéramos…\". Siempre que le dejamos, inclina paternalmente su oído hacia nosotros, para acoger cariñosamente nuestras confidencias.", "Ante estas realidades, ante estos comportamientos de Dios con nosotros, es lógico que tomemos la decisión de \"caminar siempre en la presencia del Señor\", es decir, organizar nuestra vida de cara a Dios, reconociendo su cercanía y dejándole actuar en toda nuestra historia.", "Sean, pues, la gratitud y la coherencia, valores que incidan en nuestra vida y nos lleven a corresponder a \"quien fue y es bueno contigo\", desde secar \"nuestras lágrimas\", hasta \"librar nuestros pies de la caída\"."], "oracion": ["Señor, sencillamente queremos decirte que te amamos. Siempre nos escuchas, siempre te inclinas cariñosamente hacia nosotros para hacer tuyas todas nuestras confidencias.", "Antes de que te llamemos, ya estás tú junto a nosotros. Sabes de nuestras alegrías y de nuestras tristezas, de nuestros momentos fáciles y de nuestros momentos difíciles. Y en todos ellos estás tú, comprensivo, cercano, comunicándonos la fuerza de tu Espíritu para que no decaigamos.", "Gracias Padre. A ti que vives por los siglos de los siglos."]}, {"ref": "Salmo 120", "sub": "es un canto de acción de gracias ante la cercanía de Dios.", "amb": ["Dios, no es el lejano ó alguien que se desentiende de nosotros, como si no le interesáramos. Todo lo contrario: es el gran presente, en él vivimos nos movemos y existimos… nos cuida como a las niñas de sus ojos.", "Lo vamos a proclamar en este salmo 120; \"el auxilio me viene del Señor\"… \"te guarda a su sombra… está a tu derecha… te guarda de todo mal… ahora y por siempre…\".", "Podemos decir que este es el salmo de la confianza, de la seguridad, de la cercanía. No vamos solos por la vida.", "Es fácil que traslademos a Dios, nuestro modo de relacionarnos unos con otros: hay separación, distancia… tal vez abandonos, aún de aquellos en los que más confiábamos.", "Dios no puede ser así, ni son así sus relaciones con nosotros. Desde su amor infinito, se relaciona con nosotros, siempre desde el amor, de ese amor que no conoce distancias, ni lejanías, que comprende, que disculpa, que se entrega sin condiciones, y siempre: …\" no duerme… te guarda ahora y por siempre\". Confía en el Señor.", "De verdad que “el auxilio nos viene del Señor”, constantemente. Como amor que es, necesita ser así, no puede desentenderse de nosotros, “ni de día ni de noche”. Vivamos su cercanía."], "oracion": ["Señor, como un niño en brazos de su madre, así me quiero sentir yo, ante ti: amado… confiado… seguro. Tus brazos de Padre, me dan seguridad y calor.", "Al declinar este día, ¡qué bien me viene caer en la cuenta de todo esto!. Mis ocupaciones me han dispersado, descentrado de mí y de ti. Esta mi oración me hace sentir de nuevo, tu cercanía.", "Gracias, Padre, por tu presencia. A ti que vives por los siglos de los siglos."]}, {"ref": "Cántico Ap. 15", "sub": "canto de admiración ante las obras de Dios.", "amb": ["Pasar por la vida mirando sin ver, es un peligro para todos los humanos. Porque así, no descubrimos realidades que están ahí y que nos hacen vivir la vida como realmente es.", "Este cántico, es toda una sacudida a nuestras superficialidades y a nuestras rutinas, y una invitación a saber ver y descubrir las maravillas de nuestro mundo, las obras maravillosas de Dios.", "Es el cántico de la admiración... de la sorpresa… de la alabanza: \"grandes y maravillosas son tus obras, Señor\"… \"justos y verdaderos tus caminos\". Y desde la admiración, la extrañeza: \"¿Quién… no glorificará tu nombre?\".", "Cierto. Quien de verdad, sepa asomarse a la creación, a tantas y tan variadas maravillas, es imposible, que no se quede admirado, sorprendido… y se levante hacia a aquel, que desde su sabiduría y poder, lo ha creado todo.", "La naturaleza es el gran libro de teología que lo pueden leer y entender, todos los humanos de buena voluntad. Y desde él, encontrarse con Dios.", "Desarrollar nuestra capacidad de sorpresa, es como podremos descubrir realidades que nos pueden pasar desapercibidas. Lo más profundo de nuestra vida no está al alcance de los sentidos. Abrámonos a las sorpresas de Dios."], "oracion": ["Señor, sí, son \"grandes y maravillosas todas tus obras\". En ellas te manifiestas: tu sabiduría, tu poder, tu bondad, tu amor… Quisiera reforzar mi capacidad de sorpresa, para que no pase ante tus obras, sin admirarte, descubrirte y amarte. Ellas, de alguna manera son tu cercanía, tu presencia visible entre nosotros. Grande eres, Señor. Tú que vives por los siglos de los siglos."]}], "summary": {"breve": ["Salmo 114: Tal vez nos hemos encontrado en este día con situaciones nada fáciles. Pero hemos acudido al Señor y hemos notado la fuerza de su presencia. Seamos agradecidos y caminemos ante él.", "Salmo 120: Somos débiles y necesitamos a alguien que venga en nuestra ayuda. Es el auxilio del Señor que nos guarde de día y de noche.\"Es el centinela siempre alerta, ahora y por siempre\".", "Cántico AP. 15: No podemos vivir la vida superficialmente. Abrir los ojos y saber ver y admirar. Dios se nos acerca por medio de sus obras y nos habla. Escuchemos su lenguaje."], "oracion": ["Salmo 114: Cantarlo todo. o cantar al principio y al final \"Caminaré en presencia del Señor...\"y proclamar espontáneamente cada una de las estrofas. Todos el Gloria.", "Salmo 120: Cantarlo todo. o cantar la primera estrofa y un solista proclama las restantes.", "Cántico AP. 15: Cantar la 1ª estrofa y todos al unísono la 2ª, repitiendo cantada la 1ª."], "reflexion": ["Caminaré en presencia del Señor…", "El auxilio me viene del Señor…", "Grandes y maravillosas son tus obras…"]}}]}, {"name": "sábado", "hours": [{"key": "oración de la mañana", "label": "Laudes", "psalms": [{"ref": "Salmo 91", "sub": "es un himno de acción de gracias al Señor por su amor y su bondad", "amb": ["Nuestra oración de cada mañana, debe ser un despertador, que nos despierte y espabile, para que seamos capaces de captar la presencia de Dios, y así mantengamos con él, un trato amigable, cercano.", "Este salmo 91, nos invita a abrir los ojos y \"ver\": \"tus acciones son mi alegría y mi júbilo las obras de tus manos\". Y no todos las ven. Y es que hay muchos \"ignorantes\" que miran y no ven, muchos \"necios\" que no se dan cuenta de nada.", "Que no seamos nosotros del número de los ignorantes ó de los necios. Nos llaman los \"profesionales\" de Dios, y nuestro nombre tiene que coincidir con lo que realmente somos.", "Ya desde estas primeras horas del día, reconozcamos que \"es bueno dar gracias al Señor… proclamar por la mañana su misericordia y por la noche su fidelidad\". Y lo proclamamos ahora con nuestras palabras, y lo haremos después con nuestra vida.", "En un mundo materialista, sin Dios… el Señor ha suscitado una fuerza especial en nosotros, nos ha ungido \"con aceite nuevo\", para que seamos los profetas de hoy, que desde la vida anunciemos y hagamos presente el Reino de la verdad y de la vida, de la justicia y de la paz: el Reino de Dios."], "oracion": ["Señor, cuando contemplamos tus obras, nos llenamos de alegría y de júbilo, porque detrás de cada una de ellas estás tú. Hay muchos miopes en nuestro mundo que no te ven. Nosotros, no queremos ser uno de ellos. Que te veamos, que te descubramos… y vivamos en acción de gracias permanente por tu presencia y tu cercanía.", "Que la vida de nuestra comunidad sea un anuncio visible, y claro, que diga a todos quién eres tú, y cómo eres tú, que vives por los siglos de los siglos."]}, {"ref": "Cántico Dt. 32", "sub": "es una llamada a la cordura, ante los beneficios de Dios.", "amb": ["No podemos perder de vista el sentido profético de nuestra vida. Este cántico nos invita a reconocerlo y a renovarlo, en el comienzo del día: \"escuchad… y hablaré… oye tierra los dichos de mi boca… voy a proclamar el nombre y la gloria del Señor…\"", "Si de verdad somos responsables de nuestra vocación, ese debe ser nuestro grito permanente ante todos los que nos rodean. Somos los profetas de hoy, suscitados por la fuerza del Espíritu. No podemos y no debemos callar. Nos traicionaríamos y traicionaríamos.", "Ante tantos que prescinden de Dios y que lo arrinconan como un trasto inservible, nuestra vida tiene que gritar: \"¿Así le pagas al Señor…?\" ¿\"No es él tu Padre… tu creador…?\" Y que a través de nuestro grito puedan ir descubriendo la verdad sobre Dios.", "Nuestra comunidad es la primera que tiene que vivir, todo lo que tenemos que anunciar. Ser conscientes del comportamiento que Dios ha tenido y tiene con nosotros: \"… nos ha escogido… nos ha cuidado… nos ha guardado como a las niñas de sus ojos\"…", "Todos podemos testificar que la bondad de Dios se ha volcado sobre nosotros. Como el águila se desvive por sus polluelos, los cubre con sus alas y los protege…, así Dios se desvive por todos."], "oracion": ["Señor, queremos gritar con todas nuestra fuerzas, para que todos nos oigan. Y con nuestros gritos anunciar tu bondad, tu misericordia...tu amor.", "Quizá más de una vez nos puedes recriminar: \"¿así le pagas al Señor\"?... sabemos de tus cariños, de tus desvelos.... Pero no siempre te hemos correspondido. Lo reconocemos. Te manifestamos nuestro arrepentimiento y nuestro deseo de cambiar. Tú que vives y reinas por los siglos de los siglos."]}, {"ref": "Salmo 8", "sub": "es un himno a Dios creador del uni- verso y del ser humano.", "amb": ["El matiz contemplativo de nuestra vocación, es un punto clave en el desarrollo de nuestra vida: Contemplar para admirar, y… vivir.", "Dios es invisible. Pero se nos hace visible en sus obras. En el trasfondo ellas se nos manifiesta. Y desde esa manifestación, admirarle, cantarle, y agradecerle.", "Este salmo 8, quiere despertar en nosotros el sentido de la admiración: \"Señor Dios nuestro, ¡qué admirable es tu nombre!\". Y lo es \"en toda la tierra… en el cielo, en la luna, en las estrellas… en las bestias del campo, las aves del cielo y los peces del mar…\"", "Pero sobre todo es admirable en la creación del ser humano. Ahí, sí que Dios derrochó ingenio, poder, sabiduría… pero sobre todo derrochó AmoR: \"lo coronó de gloria y dignidad\". A mayor altura, no podía levantarle. Barro sí, pero barro deificado, con la posibilidad asombrosa de poder ser \"hijo de Dios\"… vivir la misma vida de Dios y participar de su gloria.", "Al cantar este salmo podemos manifestar nuestra sorpresa y nuestra admiración y decir con verdad: \"¿qué es el hombre para que te acuerdes de él?...\". Todo se explica desde un Dios que es amor y quiso desbordarse en la criatura humana."], "oracion": ["Señor, ¡qué admirable es tu nombre en toda la tierra!... y sobre todo en el ser humano. Ahí sí que rompiste moldes, e hiciste la obra más maravillosa: barro empapado de Dios. A más altura, no podías levantarnos. Gracias por este derroche.", "Que nuestra respuesta, sea el mejor modo de agradecértelo. Que la dignidad a que nos has levantado no la arrastremos por la tierra. Tú que vives y reinas por los siglos de los siglos."]}], "summary": {"breve": ["Salmo 91: Siempre la gratitud es un signo de madurez. Y \"es bueno dar gracias al Señor\", por sus obras, por sus designios… aunque los ignorantes y necios no lo reconozcan. Nosotros, siempre agradecidos.", "Cántico DT. 32: El Señor, siempre es justo en todo lo que hace. Su amor es desbordante para con todos, \"nos guarda como a las niñas de sus ojos\". Pero tal vez, no siempre encuentra respuesta por nuestra parte. Corrijámonos.", "Salmo 8: Proclamemos nuestra admiración por las obras de Dios. \"Es admirable en toda la tierra\". Pero sobre todo es admirable por la grandeza de la criatura humana. No podía levantarnos a mayor dignidad."], "oracion": ["Salmo 91: Cantar la primera estrofa al principio y al final. Las estrofas espontáneamente.", "Cántico DT. 32: Es proclamado, despacio, por dos solistas, alternando cada una de las estrofas.", "Salmo 8: Todo él cantado, ó al menos la 1ª y la última estrofa."], "reflexion": ["Proclamar por la mañana tu misericordia…", "Lo guardó como a las niñas de sus ojos…", "Lo hiciste poco inferior a los ángeles…"]}}]}]}, {"num": 3, "days": [{"name": "domingo", "hours": [{"key": "oración de la tarde I", "label": "Vísperas I", "psalms": [{"ref": "Salmo 112", "sub": "himno de alabanza a Dios cerca- no a todos.", "amb": ["La capacidad de sorpresa, siempre nos mantiene abiertos a la realidad de la vida. Dios es epifanía, manifestación permanente. Solo los que saben ver, e intuir en el trasfondo de las cosas, son capaces de encontrarse con las sorpresas de Dios.", "El salmo 112, nos invita a captar la cercanía de Dios: \"se eleva…\" pero también \"se abaja para mirar al cielo y a la tierra\". Se acerca \"al desvalido… al pobre\"… para ayudarlo, auxiliarlo.", "Oración de la tarde. Momentos de tranquilidad, de descanso de nuestras tareas. Momentos también para repasar serenamente los encuentros que Dios ha tenido con nosotros, para poder exclamar llenos de alegría: \"bendito sea el nombre del Señor, ahora y por siempre\". Al mismo tiempo invitemos a todos a alabarle, bendecirle, y darle gracias: \"alabad el nombre del Señor, sus siervos todos…\"", "Con esta oración de la tarde, nos estamos preparando para la fiesta del Resucitado y de los resucitados, mañana domingo. El nos necesita para hacerle visible entre los hermanos. Alegrémonos, y respondámosle.", "Recojamos, pues, la invitación de este salmo que vamos a proclamar: \"Alabad, siervos del Señor, alabad el nombre del Señor\". Y hagamos de nuestra vida un canto de alabanza que todos lo puedan oir."], "oracion": ["Al caer de la tarde, Dios Padre nuestro, te admiramos, te alabamos, te bendecimos, porque a pesar de tu grandeza, no te sientes rebajado por acercarte a nuestra pequeñez. A los pobres, a los desvalidos, a los necesitados,… a todos, te acercas cariñosamente. Lo hiciste en María y hoy desde ella y con ella, la haces con nosotros.", "Queremos que todos, te alaben y te den gracias por todo lo que tú eres y haces en favor nuestro, y que te reconozcan como el único Dios y Padre de todos. A ti que vives y reinas por los siglos de los siglos."]}, {"ref": "Salmo 115", "sub": "canto de acción de gracias por las bondades del Señor.", "amb": ["Hemos nacido, nos hemos desarrollado, estamos viviendo, desde la ayuda e intervención de muchas personas. Sin ellas no hubiera sido posible, nuestra existencia. Por lo tanto, ser conscientes de ello y vivir bajo el signo de la gratitud, debiera ser la tónica de nuestra vida.", "Este salmo 115, nos invita a reconocer lo que Dios supone en nuestra vida y abrirnos a un \"GRACIAS\" permanente: \"cómo le pagaré al Señor todo el bien que me ha hecho?\"…", "Si cada uno de nosotros, repasara todos los días de su vida, en todos, tendría que poner un letrero que dijera; \"regalo de Dios\". Ciertamente que ha habido y hay muchas personas, que han hecho y están haciendo mucho por nosotros, pero ellas también son obra maravillosa de Dios, y en ellas y por ellas, se nos acerca Dios.", "Como comunidad nos debemos los unos a los otros. Todos estamos gastando nuestra vida por los hermanos para que ellos vivan. Seamos conscientes de esta realidad, y vivamos la gratitud, como una de nuestras características.", "Nuestra respuesta debiera ser, con el salmo \"te ofreceré un sacrificio de alabanza\"… \"cumpliré mis votos…\" es decir, reconocerlo… vivir la alegría de la gratitud…y que la vida concreta vaya en consonancia con nuestros compromisos."], "oracion": ["Señor, cuando pensamos todo lo que tú has supuesto en nuestras vidas, con todas tus actuaciones en favor nuestro, tenemos que exclamar: \"¿Cómo pagaré al Señor, todo el bien que me ha hecho?\"…", "Sabemos que tú no nos exiges nada, porque tu amor es gratis. Pero sí que debemos vivir bajo la alegría de la gratitud, como signo de nuestra apertura ante ti. Nuestro agradecimiento es dejarte que sigas actuando en nuestra vida. Gracias, Padre. A ti que vives y reinas por los siglos de los siglos"]}, {"ref": "Cántico Flp. 2, 6-11", "sub": "es un canto de gratitud a Dios tan cercano.", "amb": ["Oración de la tarde. Final de un día. Hora de reconocer el sentido de nuestra vida y las relaciones que otras personas han tenido hoy con nosotros.", "Dios no nos ha puesto en este mundo y se ha desentendido de nosotros. Ha querido acercarse de la manera más insospechada: se ha hecho uno de nosotros. Ha tomado nuestra carne, ha vivido nuestra vida, no ha eludido sus problemas… Podemos decir que se ha metido hasta el fondo: \"A pesar de su condición divina… se despojó de su rango… y tomó la condición de esclavo…\" Y es más:… \"se rebajó hasta someterse incluso a la muerte y una muerte de cruz\", muriendo ajusticiado.", "¿Qué más podemos pedirle a Dios, para sentirle cercano… para que nos manifestará su interés por nosotros?. Con verdad podemos repetir: \"habiendo amado a los suyos, los amó hasta el extremo\". Con ser omnipotente, no podía haber hecho más de lo que ha hecho. Esa ha sido la GRAN OBRA de Dios en favor de los humanos. Obra realizada en quien quiso hacerse nuestro hermano, Cristo el Señor, para gloria de Dios Padre.", "Terminemos, pues, este día con este cántico de gratitud a quien lo ha dado todo por nosotros. Es el mismo quien se ha dado sin reservarse nada. Todo él, ha sido y es, entrega."], "oracion": ["Señor Jesucristo, nuestro Dios, nuestro hermano: nos has sorprendido de manera incomprensible. No lo dudaste: te metiste entre nosotros haciéndote uno de tantos. Es más: te sometiste a la ignominia de ser tenido como un malhechor, y ejecutado como tal. Solamente desde tu amor infinito, se puede explicar tu comportamiento… ¡Gracias Cristo, hermano…! A ti que vives y reinas por los siglos de los siglos."]}], "summary": {"breve": ["Salmo 112: La cercanía de Dios es una realidad que está ahí. Desde la altura de su grandeza se abaja hasta los más pobres y necesitados. Nuestra alabanza es un gesto de gratitud hacia él, en esta tarde.", "Salmo 115: Terminamos un día y nuestra gratitud hacia el Señor, debe ser nuestro gesto más espontáneo, por tantos regalos que nos ha dado a lo largo de nuestra vida, principalmente ¡HOY!.", "Cántico FLP. 2, 6-11: Nos manifestó su entrega total. Nada se ahorró, para manifestarnos su cercanía. Es Dios, pero un Dios mezclado con nosotros hasta el fondo. Tomó nuestro barro y lo divinizó."], "oracion": ["Salmo 112: Cantar todos, al principio y al final: \"Alabad siervos de Dios el nombre del Señor\" de Cantalapiedra. Todos juntos proclaman las estrofas.", "Salmo 115: Proclamar espontáneamente cada una de las estrofas. Al final cantar todos: \"Cómo le cantaré al Señor…\" , de Cantalapiedra.", "Cántico FLP: Cantado ó Proclamado al unísono"], "reflexion": ["Quién como el Señor Dios nuestro...?", "Cómo pagaré al Señor todo el bien que me ha hecho...?", "Se rebajó...pasando por uno de tantos…"]}}, {"key": "oración de la mañana", "label": "Laudes", "psalms": [{"ref": "Salmo 92", "sub": "es un canto a la grandeza y firme- za de Dios.", "amb": ["Es maravilloso contemplar las fuerzas de la naturaleza: el rayo en un día de tormenta, el mar con sus olas espumantes, el viento con su fuerza devastadora… Pero para un contemplativo, todas estas realidades, le llevan a vislumbrar la sabiduría y omnipotencia del Creador.", "Este salmo 92, con que comenzamos nuestra oración del domingo, nos invita a encontrarnos con Dios, al encontrarnos con sus obras. \"Levantan los ríos su voz… su fragor… pero más potente es el Señor\"… \"que reina vestido de majestad… de poder… que da firmeza al orbe…\"", "Comenzar un domingo con este salmo, desde las fuerzas de la naturaleza, descubrimos otra fuerza más potente, que es la fuerza del Resucitado, que hoy vamos a celebrar y actualizar: \"Cristo, alegría del mundo… la mañana celebra tu resurrección\", hemos cantado al comenzar.", "Que la fuerza del resucitado, nos haga vivir \"como hijos de la luz\" y \"vivamos la claridad de su presencia\".Así manifestaremos la gloria de Dios, visibilizada en todas sus obras.", "Que nuestra comunidad, llamada a ser luz y manifestar la luz, celebre con verdad, la alegría del domingo, la presencia de Cristo resucitado"], "oracion": ["Señor, todas tus obras nos hablan de ti: desde las más pequeñas hasta las más grandes. Desde ellas nos diriges tu palabra misteriosa. Cada uno de nosotros nos hemos comprometido a escucharla, para ir conociéndote y amándote, cada día más.", "Gracias, Señor, por tus obras, y gracias, por lo que nos manifiestas por medio de ellas. Que de verdad te descubramos, y vivamos la alegría de ese descubrimiento. A ti que vives y reinas por los siglos de los siglos."]}, {"ref": "Cántico Dn. 3", "sub": "es una invitación reiterativa a bendecir al Señor.", "amb": ["Todos los días son días del Señor. Pero lo aplicamos, de manera especial, al DOMINGO: \"este es el día del Señor\". ¡Cristo vive!", "Los tres salmos de nuestra oración de hoy, son reiterativos, con su invitación a admirar al Señor… a bendecir al Señor… a alabar al Señor.", "Este cántico de Daniel, va poniendo delante de nosotros la multitud de criaturas del universo, y desde su contemplación, nos invita a bendecir al Señor, a alabarle, a amarle.", "Podemos decir, que cada una de las criaturas, es una página que nos habla de Dios desde la perspectiva de un Dios que se desvive por nosotros. Toda la creación nos lo demuestra.", "Obras que nos hablan con su silencio. Nosotros, tenemos que ponernos en sintonía con ellas, y escuchar su lenguaje misterioso. En realidad, es el mismo Dios el que nos dirige la palabra, siempre una palabra de amor: \"por ti y para ti, he creado todo esto\". Es lo que da ese matiz alegre al domingo, en el que admiramos y nos alegramos en la gran obra de Cristo Resucitado.", "Que no nos acostumbremos a celebrar el domingo. Que siempre sea un nuevo encuentro con nuestro Dios."], "oracion": ["Señor, todas tus criaturas nos hablan de ti. En cada una de ellas, has dejado una huella que nos invita a encontrarnos contigo.", "A veces nos sentimos solos, te imaginamos distante… Y es porque no sabemos verte en el trasfondo de tus obras. Toda la creación debiera ser para nosotros, un gran templo en el que te respondiéramos al diálogo permanente que mantienes con los humanos.", "Gracias, Señor, por todas tus obras. A ti que vives y reinas por los siglos de los siglos."]}, {"ref": "Salmo 148", "sub": "es un canto de alabanza dirigido a Dios desde toda la creación.", "amb": ["La alabanza, siempre es signo de admiración y de amor. Alabamos a quien admiramos y amamos. La respuesta que un día dimos a nuestra vocación, fue una respuesta a alguien que nos cautivó y descubrimos que merecía la pena amarle con todo nuestro ser, y para siempre.", "Para que la proclamación de este salmo no se quede solamente en palabras sin contenido, dispongámonos con una actitud de admiración ante Dios y exterioricemos esa actitud, con palabras cargadas de amor, y de gratitud.", "Nuestra oración en la mañana de este domingo, es sintonizar con toda la creación, y juntos entonar un himno de alabanza a aquel a quien admiramos y amamos.", "La comunidad con la que compartimos nuestra vida, se convierte así, en un coro que interpreta un canto polifónico junto con toda la creación. Al mismo tiempo nuestra vida será \"evangelio\", será \"buena noticia\" para todos los hermanos, a quienes debemos evangelizar.", "Desde las páginas escritas por Dios en sus criaturas, enseñamos a los humanos, las lecciones que nos hablan de su creador. Todos los que admiráis y amáis al Señor… ALABAD AL SEÑOR."], "oracion": ["Señor, somos tus admiradores, los cautivados por tu amor. Te hemos dicho muchas cosas por las que te admiramos y te amamos. Por eso nuestra alabanza en la mañana de este domingo.", "No quisiéramos que en nuestro quehacer de cada día se interrumpiera nuestro canto. Que de verdad, todo nuestro vivir, sea un canto de alabanza ininterrumpido a ti. Sencillamente porque nos hemos comprometido con tu amor, y para siempre. A ti que vives y reinas por los siglos de los siglos."]}], "summary": {"breve": ["Salmo 92: Todas las fuerzas de la naturaleza son manifestación del poder de Dios. Todas ellas nos hacen vislumbrar algo de lo que en verdad es el Señor. Misterio, pero misterio que se nos acerca.", "Cántico DN. 3: Todas las criaturas desde su belleza, desde su variedad, son una alabanza silenciosa a su creador. Nosotros, en nuestra oración de esta mañana, recogemos la invitación que nos hacen, y le bendecimos.", "Salmo 148: Seguimos nuestra oración de alabanza invitando a todas las criaturas a hacer lo mismo: ángeles, astros, fuerzas de la naturaleza, animales, jóvenes y viejos… todo y todos, alaben al Señor."], "oracion": ["Salmo 92: Proclamado por todo el grupo al unísono.", "Cántico DN. 3: Cantado- Palazón o música pop. Escandinava.O un solista proclama las dos partes de cada estrofa y contestan todos \"Bendecid al Señor\". Se puede concluir actualizando los motivos de bendición.", "Salmo 148: Al unísono interrumpiendo en… \"ley que no pasará\" y cantar \"Alabaré, alabaré…\" Sigue la proclamación hasta… \"pájaros que vuelan\" y cantar \"Alabaré...\" Prosigue la proclamación y terminar cantando \"alabaré..\""], "reflexion": ["Tus mandatos son fieles y seguros…", "Criaturas todas del Señor, bendecid al Señor…", "Alabad el nombre del Señor…"]}}, {"key": "oración de la tarde II", "label": "Vísperas II", "psalms": [{"ref": "Salmo 109", "sub": "canto al Mesías, Sacerdote y Rey", "amb": ["Durante este domingo, que estamos concluyendo, hemos cantado y celebrado la victoria del Resucitado. Su entrega total a la voluntad del Padre, le ha hecho digno de sentarse a su derecha.", "Al terminar este día, reiteramos nuestra admiración y nuestra alabanza al que es nuestra cabeza, nuestro hermano. El es el primero. En él hemos sido engendrados antes de la aurora, por la fuerza del Espíritu. Sobre nosotros, continúa el Padre pronunciando su palabra trasformadora: \"tú eres mi hijo, yo te he engendrado hoy\"… \"siéntate a mi derecha\".", "Proclamar este salmo 109, es proclamar la gloria y dignidad de Cristo, pero al mismo tiempo, estamos proclamándonos a nosotros mismos, y el gran destino que el Padre nos ha preparado.", "Terminar este día, concienciando esta realidad, es renovar nuestra alegría, como hermanos de Cristo, hijos en el Hijo.", "Que nuestra comunidad, sepa transmitir al mundo, nuestra fraternidad, fundamentada en nuestro Hermano mayor, Cristo, y desde él, intentemos vivir en el amor para el que hemos sido convocados.", "Somos común-unidad en él. Es la fuerza de su Espíritu la que está haciendo nuestra comunidad si vivimos en el amor, desde nuestra diversidad. Distintos, pero unificados por una misma vida: la del Resucitado."], "oracion": ["Padre, gracias por tu acción maravillosa sobre nosotros, en la persona de Jesús. En él, estás pronunciando tu \"palabra creadora\": \"tú eres mi hijo, yo te he engendrado hoy\". Nuestra alegría se renueva en esta tarde al escucharte. Y sentimos que la fuerza del Resucitado, nos transforma y aumenta su presencia en nuestra vida.", "Que no obstaculicemos, la eficacia de tu palabra, con nuestras obras. Tú que vives y reinas por los siglos de los siglos."]}, {"ref": "Salmo 110", "sub": "canto de gratitud y reconoci- miento ante las obras del Señor.", "amb": ["Grandes son las obras del Señor a lo largo de toda la historia de la humanidad. Reconocerlas, admirarlas y agradecerlas, es la actitud más coherente que podemos adoptar. Por eso, este salmo lo comenzamos con esta invitación: \"Dad gracias al Señor de todo corazón\". Tenemos muchos motivos para hacerlo: \"él es piadoso y clemente, ha hecho maravillas, es generoso… da alimento a sus fieles… ratificó su alianza para siempre\".", "En este atardecer, reunidos para la oración de la tarde, es tonificante el releer nuestra propia historia. Y todas sus páginas las vemos escritas por las obras de Dios en favor nuestro. Obras, todas ellas, impregnadas de amor, de verdaderos \"mimos\", que nos manifiestan lo que somos para Dios. Podemos decir, con verdad, \"su generosidad dura por siempre\".", "Y no sólo en nuestra historia personal, también en la historia de nuestra comunidad, podemos descubrir el actuar de Dios, por medio de su Espíritu. El es quien, día a día, a pesar de nuestras diferencias, va realizando la unidad, a la que estamos convocados: \"que sean uno como nosotros somos uno\"…", "\"Grandes son las obras del Señor\", proclamaremos en este salmo. Nuestra comunidad es una de esas obras. Obra que ha comenzado, pero que no está terminada.", "Es la tarea que nos espera a todos y a cada uno. Es obra del Espíritu, pero es necesaria nuestra colaboración."], "oracion": ["Señor, tú \"has hecho maravillas memorables\" en favor nuestro. Las reconocemos y te las agradecemos. Todas ellas son la manifestación de lo que tú eres, y de lo que nosotros somos para ti. En el atardecer, de este domingo, en el que hemos celebrado la Resurrección de Jesús,… te damos gracias por esa gran maravilla que sobrepasa nuestros pensamientos.", "Que su fuerza vaya cambiando nuestras vidas y lo hagamos presente en nuestro mundo. A él, que vive y reina por los siglos de los siglos."]}, {"ref": "Cántico Ap. 19", "sub": "es una invitación a la ale- gría ante un Dios enamorado de los humanos.", "amb": ["Si hemos vivido con intensidad lo que hemos celebrado en este domingo, seguro que terminamos el día rebosantes de gozo y necesitamos gritar: ¡¡Aleluya… Aleluya…. Llegó la boda del cordero!!.", "No somos los abandonados de Dios. El mismo se ha hecho presente en nuestro mundo, se ha unido a nuestra carne, para siempre… es uno de los nuestros. Por eso. todos, \"pequeños y grandes… alabad al Señor\"... \"Alegrémonos y gocemos y démosle gracias\".", "Invisiblemente, pero realmente, él sigue unido a nuestras vidas, viviendo nuestra historia, acompañándonos en nuestro caminar. No importa que , a veces, no le correspondamos. El siempre nos será fiel, y pacientemente esperará nuestra respuesta.", "Nuestra comunidad debe ser el ámbito normal en el que celebremos cada día, los esponsales de Dios con nosotros. Toda ella debe vibrar, contagiar, entusiasmar… para que todos sus componentes no decaigan en la vivencia de una misma vocación, de un mismo carisma. Vivimos en comunidad, para que todos nos comuniquemos vida. Así haremos realidad lo que implica nuestro vivir juntos.", "Que la alegría de este Dios enamorado de nosotros, marque el ritmo de nuestro vivir, y sobre todo, de nuestro ambiente comunitario."], "oracion": ["Gracias, Señor, por tu amor. No nos amas de cualquier manera. Lo haces como sólo tú sabes hacerlo: sin límites...al máximo...¡¡¡INFINITAMENTE!!!.... Y nos lo manifiestas con esos signos que nos hablan de amor total, de entrega sin reservas, de fidelidad para siempre. Con razón podemos exclamar: \"alegrémonos y gocemos y démosle gracias\".", "Que nuestro vivir esté empapado de esta realidad y así se lo manifestemos a nuestro mundo. Tú que vives y reinas por los siglos de los siglos."]}, {"ref": "Cántico 1P. 2", "sub": "Cristo padeció... para que vivamos para la justicia.", "amb": ["Las acciones de Dios son maravillosas, y muchas veces desconcertantes. Desde nuestras limitaciones humanas hasta nos parecen incomprensibles. Que Dios nos ame, que ejerza su providencia amorosa sobre nosotros, lo vemos como la cosa más natural. Pero que llegue a los extremos de acercarse a nosotros vestido de nuestra carne, vivir en nuestro mundo, rebajarse hasta aparecer como uno de tantos, ya no nos parece tan natural. Es algo que nos sobrepasa.", "Pero más no sobrepasa cuando vemos a este Dios hecho hombre, humillado, insultado, calumniado, maltratado...condenado a muerte y ejecutado como si fuera un malhechor. Es un proceder de Dios que nos desconcierta totalmente. Y hasta surgen en nosotros interrogantes como estos: ¿es que somos tan importantes para Dios, para que así se complique la vida por nosotros?....¿No podía haber escogido otros caminos más fáciles y no tan complicados, para manifestárnoslo?... Pero ahí queda el misterio. Sólo desde un amor infinito podemos encontrar una explicación.", "Y fue una realidad: \"Cristo padeció por nosotros....cargó con nuestros pecados..\" y todo eso para que nosotros \"vivamos para la justicia\".", "La costumbre, tal vez nos ha insensibilizado ante estas realidades. Pero son realidades que están ahí, y que permanentemente cuestionan nuestra vida de creyentes. Si las creemos, debemos actuar en consecuencia. Nuestra vida debe ser la respuesta."], "oracion": ["Señor, ante muchas de tus acciones, nos dejas desconcertados. Estamos convencidos de que eres amor y amor infinito. Pero escoges caminos para manifestárnoslo que nos parece que estamos soñando. Ante ti, aceptando la muerte de cruz, como si fueras un malhechor, no tenemos palabras. Las únicas palabras que podemos decirte, son: \"Señor, no entendemos\"...\"Señor, nos amas demasiado\".", "Por ello, sólo nos queda decirte otra palabra : \"Señor, muchas gracias\". A ti que nos amas y que vives por los siglos de los siglos."]}], "summary": {"breve": ["Salmo 109: Todo el domingo ha sido una proclamación de la gloria y dignidad de Cristo, Profeta, Sacerdote y Rey, y la culminación de su obra. Unidos a él, como cabeza, proclamamos también nuestra gloria como miembros suyos.", "Salmo 110: Todas las obras del Señor son grandiosas. Reconocerlas y admirarlas debe ser nuestra tarea de cada día. El ha \"hecho maravillas memorables\", démosle \"gracias de todo corazón\".", "Cántico AP. 19: Un aleluya permanente, expresión de nuestra alegría, debiera de ser toda nuestra vida. Sencillamente porque Dios, es un verdadero enamorado de todos y cada uno de nosotros. Proclamémoslo.", "Cántico 1P. 2: Si hay muchas acciones de Dios que nos sobrepasa, una de ellas es su muerte en la cruz, como si fuera un malhechor. Acojamos el misterio y démosle una respuesta."], "oracion": ["Salmo 109: Salmodiado o un solista inicia la primera y cuarta estrofa y prosigue el grupo.", "Salmo 110: Un solista proclama la primera estrofa y continúa todo el grupo, hasta el final.", "Cántico AP: Cantado todo él o proclama un solista las estrofas y todo el grupo contesta con \"Aleluya, aleluya\".", "Cántico 1P. 2: Lo proclama un solista, con una música de fondo suave."], "reflexion": ["El Señor lo ha jurado y no se arrepiente…", "Grandes son las obras del Señor…", "Alabad al Señor, sus siervos todos…", "Sus heridas nos han curado…"]}}]}, {"name": "lunes", "hours": [{"key": "oración de la mañana", "label": "Laudes", "psalms": [{"ref": "Salmo 83", "sub": "es una manifestación entusias- mada del encuentro con Dios", "amb": ["En el día de nuestra profesión nos comprometimos pública y solemnemente, a vivir nuestra vida cristiana con todas las consecuencias, radicalmente. Renovar cada día este compromiso, es el mejor modo de evitar que caigamos en la rutina, en el aburguesamiento, de una vida incolora y sin garra.", "Este salmo 83 es una verdadera provocación a renovar nuestros deseos, nuestra actitud frente a la vida: \"Qué deseables son tus moradas…\" \"Dichosos los que encuentran en ti su fuerza…\"", "Y todo esto aunque tengamos que pasar por momentos difíciles:…. \"áridos valles, porque el Señor es sol y escudo… él da la gracia y la gloria… no niega sus bienes…\"", "Porque desde lo más profundo de nuestro ser, brota una fuerza incontenible que nos hace exclamar: \"mi alma se consume y anhela… mi corazón y mi carne retozan por el Dios vivo…\"", "Felices nosotros, si de verdad vivimos en tensión constante, en un dinamismo incontenible, por dejar que esta fuerza aflore y nos impulse a vivir la vida con hondura y coherencia.", "Nuestro mundo necesita vidas que hablen y trasmitan valores olvidados ó tal vez arrinconados. Nosotros nos comprometimos con él. Tiene derecho a exigírnoslo.", "El Dios que se nos entrega, es también para él. Démoselo."], "oracion": ["Señor, ojalá que en todo momento, nuestros deseos fueran estos: \"qué deseables son tus moradas… \"mi corazón retoza por el Dios vivo\"…", "Ojalá fuéramos de aquellos que logran saborear tu presencia y encuentran en ti la fuerza para caminar por la vida. Porque aunque atraviesen por momentos difíciles y situaciones conflictivas, tu mismo mitigas sus penas con la lluvia de tus bendiciones: \"Dichosos los que confían en ti, Señor\". En ti que vives y reinas por los siglos de los siglos."]}, {"ref": "Cántico Is. 2", "sub": "es un canto a la paz, a la seguridad, fundamentadas en Dios.", "amb": ["Todos buscamos seguridad… algo ó alguien que nos dé firmeza y constancia . Y ese Alguien únicamente, es Dios. El, siempre es firmeza absoluta… roca inconmovible que no nos puede fallar. Por eso todos los que hemos descubierto esta realidad, no podemos menos de exclamar: \"… subamos al monte del Señor\".", "Comenzar un nuevo día, siempre es un nuevo riesgo, una nueva aventura, que nos plantea interrogantes, incertidumbres. Y necesitamos buscar seguridad, y respuesta a esos posibles interrogantes. Solamente desde nuestra confianza en el Señor, tendremos la respuesta y la seguridad que estamos necesitando. \"El Señor nos instruirá en sus caminos\"… y lograremos que todos los pueblos transformen sus espadas, modifiquen sus lanzas, a fin de conseguir que la paz sea una realidad entre los hombres, y todos vivamos la gran fraternidad de los hijos de Dios.", "Este cántico del Profeta, es todo un reto a construir un mundo de paz, a romper y a modificar todo lo que sea necesario, para que desaparezcan las guerras, las divisiones...entre nosotros, y logremos un mundo de paz, y de hermandad.", "Este es el compromiso de nuestra comunidad.", "No importan nuestras diferencias como personas. Es la fuerza del Espíritu, que mora entre nosotros, el que está haciendo posible nuestra unidad, dentro de nuestra diversidad. Colaboremos con él."], "oracion": ["Señor, tú eres nuestra luz… y nuestras tinieblas cesarán. Tú eres nuestra paz… y nuestras guerras se acabarán. Por eso nos sentimos firmes y seguros en nuestro caminar hacia ti.", "Marcharemos por tus sendas confiados en tu palabra transformadora: desaparecerán las espadas y las lanzas… cesarán las guerras entre los pueblos… nuestro mundo vivirá en paz. Y así será una realidad la fraternidad entre todos los humanos. Tú que vives y reinas por los siglos de los"]}, {"ref": "Salmo 95", "sub": "es una invitación a cantar al Señor, centro de todo lo que existe.", "amb": ["Día tras día… incesantemente, debemos de reconocer la grandeza, la sabiduría… y el amor de Dios. Ir descubriendo todas las maravillas que el Señor ha realizado en nuestra tierra. Y desear que todos los pueblos, todas las razas… lleguen a reconocer y descubrir eso mismo que nosotros hemos reconocido y descubierto.", "Porque de verdad, \" el Señor es grande… él afianzó el orbe y no se moverá…\". \"Su justicia y su fidelidad\" son compañeros inseparables de su persona.", "La novedad de un día que estrenamos, es una invitación a salir de la rutina, y a vivir con ánimo nuevo, todos los momentos que nos esperan. Dios nos saldrá al encuentro con las sorpresas siempre nuevas con que acostumbra salir a nuestro paso. Saber descubrirlas… saborearlas… tiene que ser la actitud permanente de todo nuestro vivir.", "Así seremos una invitación constante, para todos los que nos vean, y nos oigan cantar un \"cántico nuevo\", al Señor.", "Nuestra vida tiene que estar marcada por el dinamismo del Espíritu, que no admite rutinas ni cansancios. La novedad, debe ser la nota distintiva de todo nuestro actuar. El \"cantad al Señor\", la invitación permanente que vivamos y hagamos vivir, porque \"el Señor es muy digno de alabanza\"."], "oracion": ["Señor, la letra es la misma, pero nuestra música queremos que sea distinta, siempre nueva. Deseamos comenzar este día con el estreno de un \"cántico nuevo\", e invitando a toda la tierra, a todos los pueblos, a todas naciones, a todos.... a reconocer y a admirar tus maravillas. A saber mirar con ojos nuevos, todo lo que has creado, como manifestación de tu grandeza, de tu poder, de tu gloria… de tu amor a los humanos.", "Que nuestro grito espontáneo sea hoy y siempre: \"¡Qué grande es el Señor!\". Tú que vives y reinas por los siglos de los siglos."]}], "summary": {"breve": ["Salmo 83: Nuestro añorar a Dios como algo imprescindible en nuestra vida, debe constituir el móvil de nuestro ser y de nuestro hacer. De lo contrario, seríamos unos fracasados como humanos y como cristianos.", "Cántico IS. 2: Todos buscamos seguridad en nuestra vida. El único eterno y seguro es el Señor. Siempre que caminamos en su luz, vamos por un camino seguro y cambiamos nuestro entorno.", "Salmo 95: Todos debemos de cantar y proclamar la gloria del Señor. Y todos podemos contar maravillas de Dios en favor nuestro. Por tanto, la alegría debe ser la tónica de nuestro vivir: Dios con nosotros."], "oracion": ["Salmo 83: Cantar al principio y al final \"quien puede entrar en tu templo\"….O proclama un solista la primera estrofa y continúa todo el grupo, hasta el final.", "Cántico IS: Proclamado al unísono ó por un solista, Gloria, todos.", "Salmo 95: Cantar \"Cantad al Señor un cántico nuevo…\" de Manzano, como antífona, al principio y al final. Proclamar el Salmo a dos coros."], "reflexion": ["Mi alma ...anhela los atrios del Señor…", "Caminemos a la luz del Señor…", "Cantad al Señor un cántico nuevo…"]}}, {"key": "oración de la tarde", "label": "Vísperas", "psalms": [{"ref": "Salmo 122", "sub": "es una oración confiada al Dios del amor y de la misericordia.", "amb": ["Los ojos también hablan. Y sus palabras llegan al corazón: la mirada de una madre a su hijo, la mirada de los enamorados, la mirada de dos amigos entrañables… Recordemos las miradas de Jesús: al joven rico… a Pedro… a su Madre… son toda la persona que se encuentra profundamente con otra persona, en un abrazo de AMOR.", "Nosotros, en esta tarde, levantemos nuestros ojos hacia El, mirémosle, en silencio … y descubriremos que ya El nos estaba mirando: es la mirada del Padre… del enamorado… del amigo. Así es Dios, y así nos mira", "En esta tarde, una vez más, somos conscientes de que Dios, es lo más importante en nuestra vida. De que nuestra esperanza, es él, y solamente él, que puede llenarnos plenamente. Por eso, le miramos fijamente, \"esperando su misericordia\"… esperándolo todo… esperándole a El... que venga a llenar nuestro vacío.", "La actitud de espera, es la actitud que nos define, es la actitud que posibilita nuestra máxima realización…Por eso, debe ser la actitud que adoptamos frente a Dios: \"somos esperanza\", lo esperamos todo."], "oracion": ["Señor, el encuentro de dos miradas profundas, pueden decirnos más que muchas palabras. Es lo que hacemos al terminar este día: \"a ti levanto mis ojos y te miro\". Tú sabes que detrás de nuestra mirada está nuestra persona, esperándolo todo de ti. Sabemos que es tu mirada y que con ella nos abrazas, nos estrechas en tu corazón de Padre, para decirnos, calladamente: ¡¡TE AMO!!.", "Que nunca dejemos de mirarte, para que nuestra vida esté llena de calor y de luz. Tú que vives y reinas por los siglos de los siglos."]}, {"ref": "Salmo 123", "sub": "es un canto comunitario de acción de gracias a un Dios liberador.", "amb": ["Todos tenemos nuestra historia. Muchos acontecimientos se han ido sucediendo. Hemos pasado momentos fáciles y otros no tan fáciles. Días de sol y días de oscuridad. Ratos alegres y ratos tristes.", "Así es la historia de todo ser humano.", "Pero en el trasfondo de todo, ha estado siempre \"alguien\" con nosotros, tejiendo el entramado de nuestra vida: Dios. \"Si el Señor no hubiera estado de nuestra parte…\" ni siquiera habríamos podido existir. \"En él nos movemos, vivimos y existimos\".", "Nuestro sentido de la gratitud debe estar siempre despierto y atento a esta realidad. Las raíces de un árbol no se ven, pero gracias a ellas vive y se sostiene. Dios es nuestra raíz. \"Nuestro auxilio es el nombre del Señor…\" en él y por él hemos salvado la vida\"… Por eso \"bendito sea el señor\".", "Nuestra comunidad es una demostración de la presencia invisible de Dios. Todos podemos afirmar que el Señor ha estado presente en nuestra historia, y gracias a su presencia podemos afirmar que \"hemos salvado nuestra vida\""], "oracion": ["Si tú, Señor, no estuvieras de nuestra parte, lo estaríamos pasando muy mal.. Ante los problemas y necesidades que tenemos, sin tu ayuda constante, nos veríamos atrapados como un pájaro en la trampa del cazador. Pero debemos confesar: \"bendito sea el Señor… que nos ha salvado…\" Porque ha roto la trampa y nos sentimos libres. \"Nuestro auxilio es el nombre del señor\". Gracias, Padre. A ti que vives por los siglos de los siglos."]}, {"ref": "Cántico Ef. 1", "sub": "es un himno de gratitud ante la elección de que hemos sido objeto.", "amb": ["Son muchos los que no nos conocen, ni nos conocerán jamás.. Tan sólo un número muy limitado sabe que existimos y conoce nuestro nombre.", "Pero para Dios, no somos desconocidos. Desde siempre nos ha tenido presentes… Sabe que existimos, conoce nuestro nombre. Es más: ha ideado, con toda ilusión, un proyecto de amor que nosotros mismos no hubiéramos soñado: hacernos hijos suyos... tener la posibilidad de vivir su misma vida… ser amados con todo su amor... Todo un proyecto que desborda nuestra inteligencia y nuestra imaginación.", "Con verdad podemos exclamar: Dios nos ha tomado en serio. Somos importantes para Dios.", "Terminar un día más de nuestra vida, con estas perspectivas, es todo un tónico, un relajante para nuestras tensiones, que aumenta nuestras fuerzas para seguir en la lucha.", "Merece la pena poner todo nuestro empeño en colaborar con Dios para que este proyecto se realice. Solo así lograremos nuestra máxima realización, como humanos, y como cristianos, y correspondemos a la \"ilusión\" de nuestro Dios, sobre nosotros."], "oracion": ["Señor, cada uno de nosotros somos todo un monumento que nos habla de ti: \"Dios desviviéndose por el ser humano\".", "Te has volcado totalmente en Jesús, para hacernos tus hijos en él, con él y desde él. Nos has elegido, nos has bendecido con toda clase de bendiciones ya antes de crear el mundo.", "De verdad que ha sido todo un derroche de amor. Nuestra respuesta, es la mejor palabra para decirte \"gracias\". Así lo haremos. Por ti que vives y reinas por los siglos de los siglos."]}], "summary": {"breve": ["Salmo 122: Todo nuestro ser, es esperanza. Levantar los ojos hacia Dios es hablarle con nuestra mirada y decirle que le necesitamos, por eso le esperamos.", "Salmo 123: Si repasamos la historia de nuestra vida, tenemos que decir que la acción de Dios ha sido una constante en todo momento. Unas veces hemos sido conscientes de ello, muchas otras, no.", "Cántico EF. 1: Bendigamos y demos gracias a Dios porque ha pensado para nosotros, realidades impensables por nuestra parte; se ha volcado en Jesús para en él y desde él volcarse en nosotros: hacernos hijos en el Hijo."], "oracion": ["Salmo 122: Cantarlo ó un solista proclama la primera estrofa, y las dos siguientes todos juntos.", "Salmo 123: Cantar la antífona al principio y al final, y proclamar al unísono las tres estrofas.", "Cántico EF: Proclamarlo al unísono y fondo musical suave."], "reflexion": ["A ti levanto mis ojos…", "Nuestro auxilio es el nombre del Señor…", "Nos ha bendecido en la persona de Cristo…"]}}]}, {"name": "martes", "hours": [{"key": "oración de la mañana", "label": "Laudes", "psalms": [{"ref": "Salmo 84", "sub": "es una súplica comunitaria pidiendo la renovación.", "amb": ["Comenzamos este día, reconociendo que \"el Señor ha sido bueno con nosotros\". Si hiciéramos un recorrido pausado, por todos los días de nuestra vida, y anotáramos todas las \"bondades\" con que Dios nos ha demostrado su cariño… tendríamos que escribir muchas páginas. Y tal vez nos quedaríamos sorprendidos de tantas cosas, en las que no habíamos caído en la cuenta.", "Pero a pesar de todo, Dios no se cansa de seguir haciendo maravillas en favor nuestro, aunque nosotros no se las reconozcamos.", "Y sigue realizando la gran tarea de \"restaurarnos\"… de volcarse sobre nosotros para ir modelando, día a día, la imagen viva de un Cristo Resucitado, que quiere visibilizarse desde nosotros, a nuestro mundo de hoy.", "Diremos con un tono de sano optimismo: \"la salvación está cerca… la gloria habitará en nuestra tierra… la justicia y la paz se besan\"… y nuestra tierra nosotros - daremos el fruto esperado.", "Nuestra comunidad es un anuncio de \"muéstranos Señor, tu misericordia y danos la salvación\". Somos el rostro visible de un Dios misericordioso y salvador."], "oracion": ["Toda la tierra está sembrada de tu bondad, Señor. Cada uno de nosotros puede decirte con verdad: \"el Señor ha estado bueno conmigo\". Están muy cerca de nosotros la salvación, la gloria, la justicia, la paz,… frutos del Espíritu, presente en lo más íntimo de nuestro ser.", "Eres nuestro \"restaurador\", perdonando, devolviéndonos la vida, mostrándonos tu misericordia. Por eso nuestra tierra, nosotros, daremos el fruto abundante, que tú esperas. Tú que vives por los siglos de los siglos."]}, {"ref": "Cántico Is. 26", "sub": "es un himno que manifiesta la confianza en el Señor.", "amb": ["Nuestra vida siempre está respaldada por la presencia del Espíritu. Podemos caminar seguros en nuestro quehacer de cada día: \"porque el señor es la roca perpetua\"… \"y en todas nuestras empresas está él\"… aunque nosotros fallemos, nos desanimemos… el Señor, nunca nos fallará. Siempre será la fuerza viva que alentará nuestros desalientos. Por eso este cántico de Isaías, nos anima a \"confiar siempre en el Señor\"… \"el nos dará la paz…\"", "En el comienzo de una nueva jornada, comencémosla, con perspectivas alegres, esperanzadoras. Así, cada una de nuestras acciones tendrá un trasfondo lleno de optimismo, que contagiará a todos los que entren en contacto con nosotros a lo largo de este día.", "\"Mi espíritu madruga por ti\". Es la expresión más auténtica del que ha descubierto que Dios no puede ser un cualquiera en su vida. Sino el gran necesario, del que no se puede prescindir, si de verdad se quiere vivir la vida con el sentido que tiene.", "Proclamemos este cántico con la alegría de quien está convencido de la presencia de Dios en toda su historia."], "oracion": ["Señor, con razón podemos sentirnos seguros, porque tú eres la roca firme sobre la que estamos cimentados. Tú haces fácil nuestro camino y allanas nuestros senderos. En el trasfondo de nuestro quehacer, allí estás tú, dando eficacia a todas nuestras empresas: \"todos las realizas tú\". Por eso nos sentimos con mucha paz y con mucha seguridad. Siempre confiaremos en ti. que vives y reinas por los siglos de los siglos."]}, {"ref": "Salmo 66", "sub": "es un canto de acción de gracias y de súplica, al Señor.", "amb": ["Siempre debemos desear que Dios sea conocido, buscado y amado por todos los humanos. Que todos le descubran como el Dios del amor, de la justicia, de la rectitud, de la libertad. Q
