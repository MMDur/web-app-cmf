r contigo son esfuerzos y trabajos inútiles.", "Como María, queremos ponernos en tus manos para que con nosotros y en nosotros, puedas \"realizar obras grandes\".", "Reconocemos que nos hemos equivocado cuando hemos buscado eficacia sin contar contigo, que vives y reinas por los siglos de los siglos."]}, {"ref": "Cántico Ef. 1", "sub": "desde siempre hemos sido \"la ilusión\" de Dios.", "amb": ["No somos un número en el conjunto de la humanidad. Desde siempre hemos sido pensados, amados, contemplados con ilusión por Dios nuestro Padre, como personas concretas e irrepetibles.", "En la persona de Jesús hemos sido queridos, abrazados con un amor infinito. En su humanidad Dios se ha volcado para hacernos hijos en el Hijo.", "En María se ha realizado plenamente esta ilusión de Dios Padre. Ella fue toda apertura, disponibilidad, que facilitó la acción del Espíritu, siempre y totalmente. Ella es la \"bendecida con toda clase de bienes espirituales y celestiales\" y en quien se pudo realizar \"el plan de salvación\", proyectado antes de \"la creación del mundo\". Y de esta manera quedaba preparada para facilitar la acción de Dios, desde su vocación de Madre.", "Ilusión de Dios sobre María, pero también ilusión de Dios sobre cada uno de nosotros. Por eso la proclamación de este cántico nos debe causar una profunda alegría: somos la ilusión de Dios. Como María, no le defraudemos."], "oracion": ["Señor, gracias, porque tu amor es tan desbordante que nos tienes desconcertados. Mayor ilusión no podías tener sobre nosotros: desde siempre nos has pensado para hacernos hijos en el Hijo.", "En María pudiste hacerlo plenamente por su disponibilidad total ante ti. Que como ella, te facilitemos siempre tu acción. Tú que vives y reinas por los siglos de los siglos."]}], "summary": {"breve": ["SaLMo 121: todo encuentro con Dios, conmueve todo nuestro ser y provoca un sentimiento de alegría desbordante. Es lo que vivió María. Su vida fue una proclamación constante de este salmo 121. SaLMo 126: no podemos prescindir de Dios sin que repercuta en todo nuestro ser y en todo nuestro quehacer. En la vida de María, Dios siempre fue presencia, desde una aceptación total. CáNtICo Ef.1: no somos seres anónimos. Desde siempre hemos sido elegidos, amados personalmente por Dios. Y lo fue María. Proclamamos juntos la alegría de este amor y de esta elección."], "oracion": ["SaLMo 121: cantar la primera estrofa al principio y al final, y proclamar juntos el resto del salmo. SaLMo 126: es proclamado pausadamente por solistas espontáneos. CáNtICo Ef.1.: proclamado por un solista dejando un breve silencio después de cada una de las estrofas."], "reflexion": ["qué alegría…vamos a la casa del Señor", "si el Señor no construye la casa, en vano se cansan…", "ha sido un derroche para con nosotros"]}}]}, {"key": "apóstoles", "label": "Fiesta de los apóstoles", "hours": [{"key": "oración de la tarde I", "label": "Vísperas I", "psalms": [{"ref": "Salmo 116", "sub": "manifiesta el deseo de que Dios sea reconocido y aclamado.", "amb": ["aunque Dios es invisible en sí mismo, de alguna manera se hace visible en cada una de sus obras. Pero no todos llegan a captar ni su existencia ni su presencia.", "Se hizo presente en la persona de Jesús. Y fue la gran Palabra por medio de la cual Dios nos dijo todo lo que tenía que decirnos sobre él.", "Pero hoy, la ausencia visible de Jesús, después de su resurrección, nos ha privado de su visibilidad, que seguimos necesitando. Por eso el mismo Jesús nos ha salido al paso de esa necesidad, y sigue perpetuando su presencia visible entre nosotros, por medio de unos hombres concretos, en los que él sigue haciéndose presente: los apóstoles. En ellos y en sus sucesores, Jesús sigue manifestándose y visibilizándose.", "En sus personas y por la proclamación de este salmo 116, se nos invita a \"alabad y aclamad al Señor, todos los pueblos\".", "Hagamos nuestra esta invitación y unámonos a toda la humanidad con este cántico de alabanza y admiración."], "oracion": ["Señor, gracias por tu presencia, visibilizada en tus Apóstoles. Por medio de ellos y sus sucesores, has llegado hasta nosotros y los seguirás haciendo hasta el final de los tiempos.", "Que su testimonio y su palabra sigan resonando en nuestras vidas y encuentren la acogida de nuestro compromiso en la vivencia de nuestra vida cristiana.", "Tú que vives por los siglos de los siglos."]}, {"ref": "Salmo 147", "sub": "es una invitación a proclamar la gloria de Dios.", "amb": ["todo encuentro con Dios cambia a las personas, y hace que sientan en lo más profundo de su ser, la urgencia de comunicar a los demás la alegría de ese encuentro.", "Proclamar este salmo 147 en la fiesta de un apóstol es agradecer a Dios que haya habido hombres que han vivido este encuentro y que con su vida y su palabra nos invitan a \"glorificar al Señor\" que se manifiesta en la \"nieve congelada y en la nieve derretida\"… en \"sus decretos y en sus mandatos\", con ese amor personal a cada uno de nosotros. Pues para él somos únicos e irrepetibles. Por eso podemos decir con verdad \"con ninguna nación obró así\". Yo soy para Dios un \"yo\" concreto con el se relaciona de manera única.", "Recojamos la invitación de este salmo 147 y continuemos la presencia de los apóstoles, anunciando con nuestra vida la presencia y la gloria de Dios."], "oracion": ["Señor Jesús, tu encuentro con tus primeros discípulos cambió sus vidas y fueron tu presencia en medio de nuestro mundo.", "Por medio de ellos y de sus sucesores sigues manifestando entre nosotros tu presencia misteriosa y tu acción salvadora.", "Gracias por ellos, y gracias por nosotros llamados también a ser tu presencia en nuestro hoy. Que no te falsifiquemos y seamos anuncio fiel de tu persona. Que vives por los siglos de los siglos."]}, {"ref": "Cántico Ef. 1", "sub": "elegidos desde siempre en Cristo Jesús.", "amb": ["Los proyectos de Dios sobrepasan infinitamente nuestros proyectos, Desde su amor desbordante nos envuelve a todos y nos sorprende con actuaciones impensadas desde nuestro razonar. Desde siempre nos ha elegido, nos ha amado, nos ha bendecido y nos ha abrazado en la persona de Jesús con un amor infinito.", "Nuestro destino es ser hijos en el Hijo, bendecidos con toda clase de bendiciones \"espirituales y celestiales\".", "Hoy recordamos, de una manera especial, a uno de nuestros hermanos, a un apóstol, en el que se cumplió todo el contenido de este cántico. Y lo recordamos para agradecer al Señor y para concienciarnos de que hoy continúa en nosotros la acción del Espíritu realizando la misma tarea que realizó en nuestro apóstol.", "Con la alegría que supone para nosotros esta celebración, proclamamos este cántico."], "oracion": ["Te agradecemos, Señor, que así nos sorprendas con tu amor eterno y gratuito. Que nos sorprendas con esa elección para ser tus hijos, participantes de tu misma vida.", "Gracias por la elección de los Apóstoles, a través de los cuales nos has \"manifestado tu misericordia y tu amor\".", "Y gracias también por la elección de cada uno de nosotros para continuar tu obra en nuestro mundo. A ti que vives por los siglos de los siglos."]}], "summary": {"breve": ["SaLMo 116: El Señor quiere ser el Dios de todos. a todos quiere que llegue su fidelidad y elige a personas concretas, por medio de las cuales se realice su plan. Lo ha sido de los Profetas, de los apóstoles y lo quiere ser de cada uno de nosotros. SaLMo 147: Cada uno de nosotros es hoy la nueva Jerusalén bendecida y apreciada por Dios. Ella fue el signo de su presencia. Hoy la celebramos en los apóstoles que actualizaron su presencia. En ellos, Jesús ha querido perpetuar su visibilidad. CáNtICo Ef.1: Dios siempre es sorprendente. Sus planes y sus proyectos sobre nosotros desbordan todo lo humano. La proclamación de este cántico es todo un compendio de sus planes, de sus proyectos que nos sobrepasan totalmente."], "oracion": ["SaLMo 116: todos juntos proclamar con entusiasmo, la dos estrofas. SaLMo 147: cantar al principio y al final \"el Señor me ha elegido portador de su lámpara\" y proclamar juntos las estrofas. CáNtICo Ef.1.: proclamado pausadamente por un solista con un fondo musical suave."], "reflexion": ["la fidelidad del Señor dura por siempre", "glorifica al Señor…alaba a tu Dios", "elegidos desde siempre para ser sus hijos"]}}, {"key": "oración de la mañana", "label": "Laudes", "psalms": [{"ref": "Salmo 62", "sub": "es una proclamación de la necesi- dad más profunda de todo ser humano.", "amb": ["Como seres humanos dependemos radicalmente de quien nos ha creado. Por eso en nuestra oración de la mañana vamos a manifestar nuestra dependencia, esperando conseguir todo aquello que estamos necesitando.", "Nuestra necesidad de Dios, nuestro grito por él, es el grito más profundo y más espontáneo que necesitamos expresar. Somos \"los sedientos de Dios… la \"tierra reseca, agostada, sin agua…\" tenemos ansia de Dios y alzamos nuestras manos pidiendo ayuda, presencia.", "La vida de los apóstoles transcurrió en esta línea. Desde que descubrieron a Cristo y respondieron a su llamada, fueron los seducidos por el Evangelio.", "Nuestro celebrar esta fiesta, es una interpelación que nos cuestiona sobre la vivencia y profundidad de nuestra vida cristiana. \"oficialmente\" somos los continuadores de esos hombres que lo entregaron todo por el Evangelio.", "Proclamemos, pues, este salmo despertando en nosotros esa necesidad de Dios."], "oracion": ["Señor, gracias por crearnos así: humanos con necesidad de lo divino, de ti. Que vivamos esta necesidad como la más importante de nuestra vida.", "Hoy, te agradecemos de una manera especial la existencia de tu Apóstol, modelo viviente que nos alienta y estimula en la vivencia de nuestra fe, y en la búsqueda incesante de ti como una necesidad imprescindible en nuestro quehacer de cada día.", "Que su testimonio nos arrastre a buscarte a ti que vives por los siglos de los siglos."]}, {"ref": "Cántico Dn", "sub": "es una invitación a alabar a Dios, por todas sus obras.", "amb": ["Dios, aunque invisible en sí mismo, es una epifanía permanente en cada una de sus obras. todas ellas nos hablan de él y nos manifiestan su grandeza, su poder…su amor.", "Son una invitación constante desde el silencio de su existencia, para que reconozcamos a un Dios cercano, presente en medio de nosotros.", "Pero este Dios invisible, se nos hizo visible en la persona de Jesús, que compartió su vida con nosotros y que después de resucitado ha querido continuar entre nosotros en personas visibles, como son los apóstoles. Ellos lo fueron entonces, y hoy lo siguen siendo sus sucesores, \"palabra viva\" que nos habla de un Dios que quiere manifestarnos el cuidado y solicitud que tiene de todos los humanos.", "Bendigamos, pues, al Señor por toda la obra de la creación. Pero hoy, bendigámosle por sus apóstoles, como continuadores y actualizadores de su presencia entre nosotros."], "oracion": ["Señor, eres admirable y maravilloso en todas tus criaturas. Gracias por el regalo que nos has hecho en cada una de ellas.", "Hoy queremos admirarte y agradecerte el regalo de los Apóstoles. En ellos y por medio de ellos nos has seguido manifestando tu cercanía y tu solicitud por nosotros.", "Que nuestra vida sea un canto de gratitud a ti que vives por los siglos de los siglos."]}, {"ref": "Salmo 149", "sub": "es una invitación a descubrir la alegría de la presencia del Señor.", "amb": ["Son muchas y variadas las formas con que Dios nos manifiesta su presencia. Lo que importa es saber descubrirlas y celebrar la alegría de su descubrimiento.", "Cada unos de los apóstoles ha sido una manifestación de la presencia de Dios entre nosotros. Ellos han hecho visible la presencia del Resucitado en medio de la Iglesia.", "Nuestra alegría y nuestra gratitud tienen que tener hoy el sabor de \"un cántico nuevo\" que alabe el nombre del Señor, con danzas, tambores y cítaras porque el \"Señor ama a su pueblo\" y que lo ha manifestado en la persona del apóstol que estamos recordando.", "Recordar y celebrar la acción de Dios en su apóstol debe tener una repercusión en nuestra vida. Nuestra respuesta es una verdadera exigencia.", "Proclamemos, pues, este salmo y sintámonos llamados a una renovación en nuestra vida cristiana."], "oracion": ["Señor, la fiesta de tu Apóstol, renueva nuestra alegría. En él, te hiciste presente y tu presencia sigue prolongándose hoy hasta nosotros.", "Te repetimos nuestra gratitud y nuestro compromiso de responder a tu acción. Somos conscientes de que nos necesitas para hacerte presente en nuestro mundo de hoy, como en otro tiempo necesitaste a tus Apóstoles. Te responderemos. A ti que vives y reinas por los siglos de los siglos"]}], "summary": {"breve": ["SaLMo 67: hemos sido creados con unas necesidades básicas que necesitamos satisfacer. La necesidad de Dios, las fundamenta todas. Ser apóstol es la consecuencia de vivir esa necesidad. CáNtICo DN.: todos los seres creados proclaman sin palabras, la bondad de Dios. Un apóstol hace suyo el lenguaje de las criaturas, y él mismo es palabra viva que exterioriza ese lenguaje, con todo su ser. SaLMo 149: la alegría es la característica de quienes están \"empapados\" de Dios. Celebrar y festejar esa alegría debe ser la tónica de sus vidas. El apóstol es el \"lleno de Dios\" que lo trasparenta y comunica a los demás"], "oracion": ["SaLMo 67: proclamar espontáneamente las estrofas y después de cada una repite todo el grupo \"mi alma está sedienta de ti\", con un breve silencio. CáNtICo DN.: espontáneamente las estrofas y cantar \"alabaré\" después de \"rayos y nubes … fieras y ganados… y al final. SaLMo 149: un solista invita con las primeras líneas de la primera estrofa y continúa todo el grupo."], "reflexion": ["tú eres mi Dios, por ti madrugo", "criaturas del Señor, bendecid al Señor", "cantadle con tambores y cítaras"]}}, {"key": "oración de la tarde II", "label": "Vísperas II", "psalms": [{"ref": "Salmo 115", "sub": "es un canto de gratitud y com- promiso ante la fe recibida.", "amb": ["al concluir la celebración de la fiesta de este apóstol, tenemos que sentirnos más fuertes y más confirmados en nuestra fe. No importa que nuestro ambiente social nos la cuestione. Es el momento de reafirmarnos y de agradecer: \"¿cómo pagaré al Señor todo el bien que me ha hecho?\" y lo hacemos \"cumpliendo nuestros votos en presencia de todo el pueblo\".", "Que quienes nos vean se sientan llamados a descubrir el sentido de Dios en sus vidas y se comprometan con lo que han descubierto.", "Somos prolongación de la acción del Espíritu. actuó en el apóstol, y hoy sigue actuando en nosotros. Esta fiesta nos tiene que haber llevado a tomar conciencia de esta realidad y a renovar nuestra respuesta. Somos cristianos para prolongar y visibilizar al Cristo invisible que nos necesita.", "Con la proclamación de este salmo 115 agradecemos ser lo que somos y renovamos nuestros compromisos."], "oracion": ["Señor, te agradecemos la fe que tienes con cada uno de nosotros. Es tu amistad que nos has regalado y que la mantendrás fielmente aunque nosotros no te correspondamos.", "Desde nuestra sinceridad, queremos decirte en esta tarde \"cómo te pagaremos tanto\"…y la paga que tú quieres, que tú esperas, es nuestra respuesta cargada de fidelidad.", "Tú que nos amas y vives por los siglos de los siglos"]}, {"ref": "Salmo 125", "sub": "es una proclamación de la bon- dad de Dios con nosotros.", "amb": ["Nuestra capacidad de sorpresa ante la acción de Dios para con nosotros, debe ser algo permanente en nuestra vida. De hecho, cualquiera que se acerque a lo profundo de nuestra existencia puede exclamar con verdad: \"el Señor ha estado grande con ellos\". Basta que repasemos nuestra historia personal y lo veremos confirmado. Y en consecuencia, es normal, que \"nuestra boca se llene de risas y nuestra lengua de cantares\" y que por eso, \"estemos alegres\".", "Proclamar este salmo 125, en la celebración de la fiesta de nuestro apóstol es ser conciente de la acción y cercanía de Dios manifestada en él, y prolongada hoy hasta nosotros.", "Nuestra respuesta coherente va a ser una interpelación para todos aquellos que nos observen."], "oracion": ["Señor, no es extraño que digan de nosotros \"el Señor ha estado grande con ellos\", pues así es en verdad.", "Y al reconocerlo es natural que \"nos sintamos alegres\" y que nuestra alegría sea un anuncio de tu presencia y de tu cercanía permanente en medio de nosotros.", "Que nuestra respuesta no decaiga con la rutina de cada día, y crezcamos en fidelidad responsable. A ti que vives y reinas por los siglos de los siglos."]}], "summary": {"breve": ["SaLMo 115: vivir el sentido de la gratitud frente a la gratuidad de todo lo que Dios nos ha dado y nos sigue dando es todo un reto para nuestra vida. agradecemos hoy el regalo de nuestro apóstol, presencia visible de Cristo entre nosotros. SaLMo 125: Dios siempre \"ha estado grande con nosotros\". Repasemos nuestra historia. Por eso \"estamos alegres\". Proclamemos hoy su acción en los apóstoles en quienes se ha hecho visible entre nosotros. CáNtICo Ef.1: hemos sido \"elegidos y bendecidos totalmente, en la persona de Cristo\" antes de la creación del mundo. Elección y bendición actualizadas en los apóstoles y que sigue actualizándose en nosotros."], "oracion": ["SaLMo 115: proclamado a dos coros intercalando el canto \"cómo le cantaré al Señor…\" después de las dos primeras estrofas. SaLMo 125: un coro proclama las estrofas y otro repite después de cada una de ellas \"el Señor ha estado grande con nosotros\". CáNtICo Ef.1: proclamado por todo el grupo pausadamente con un breve silencio después de cada una de las estrofas."], "reflexion": ["cómo le pagaré al Señor todo el bien que me ha hecho", "el Señor ha estado grande con nosotros", "ha sido un derroche para con nosotros"]}}]}, {"key": "mártires", "label": "Fiesta de los mártires", "hours": [{"key": "oración de la tarde I", "label": "Vísperas I", "psalms": [{"ref": "Salmo 117, I", "sub": "es un canto a la bondad de Dios reflejada en la fidelidad de los mártires.", "amb": ["todo y todos, somos un grito silencioso que proclama la bondad de Dios \"porque es eterna su misericordia\".", "En cualquier momento podemos exclamar \"el Señor está conmigo, no temo\". Ciertamente que nuestro modo de vivir choca con el ambiente y tenemos que admitir que \"nos empujan para derribarnos\". Pero \"el Señor nos ayuda\" y \"es nuestra fuerza y nuestra energía\".", "La vida de nuestro mártires, fue una vida que denunció la mentira, la injusticia, la esclavitud… la falta de amor. Y sus verdugos intentaron silenciar su denuncia, matando sus cuerpos. Pero se cumplió \"no he de morir, viviré\". Y \" su constancia y su fidelidad\" siguen \"cantando la fidelidad del Señor\"", "Recordar y celebrar hoy su martirio, es recordar y celebrar la fuerza del Espíritu hecho carne en la carne de los mártires.", "Proclamemos, pues, este salmo 117, cantando la fidelidad de Dios en la fidelidad de nuestros mártires."], "oracion": ["Señor, te damos gracias \"porque es eterna tu misericordia\" y lo has manifestado en la fortaleza de nuestros mártires. En medio de sus tormentos, todo han podido experimentar \"el Señor me ayuda\".", "Que su testimonio nos estimule para que nuestra fidelidad a ti no decaiga ante las contrariedades de la vida.", "Hoy como ayer sigues siendo fuerza en nuestra debilidad. Nunca luchamos solos. Tú estás en nuestras luchas. Tu que vives y reinas por los siglos de los siglos."]}, {"ref": "Salmo 117, II", "sub": "es un canto de triunfo ante la fortaleza de los mártires.", "amb": ["aunque aparentemente un mártir es un derrotado ante sus verdugos, en la realidad no es así. En el trasfondo de su aparente derrota nos encontramos con el triunfo definitivo de quienes supieron sembrarse en el surco de la muerte para conseguir el fruto de la \"vida\".", "En el día de su martirio pudieron decir con verdad: \"este es el día en que actuó el Señor, sea nuestra alegría y nuestro gozo\". Por eso \"abridnos las puertas del triunfo y entraremos para dar gracias al Señor\".", "Un mártir es un testigo, es la fortaleza de Dios encarnada en lo humano. Su testimonio es un grito de afirmación y de protesta. De afirmación ante los valores de la vida y de la realidad de Dios. Y de protesta ante una vida falsificada y ante un Dios arrinconado.", "Nuestros mártires fueron \"piedras desechadas por los hombres\", pero ante Dios \"son la piedra angular \" que fundamenta el sentido de toda existencia humana.", "Que la proclamación de este salmo aliente nuestra fe y confirme nuestro testimonio de cristianos."], "oracion": ["Señor, gracias por la fortaleza que comunicaste a nuestros mártires. No han sido unos derrotados. Ellos han sido los verdaderos triunfadores. Sembrados en la muerte han recogido el fruto de la \"vida\".", "Que su testimonio cristiano cuestione nuestra vida. Que su fidelidad despierte nuestra fe. Que su constancia remueva nuestra apatía. Tú que vives y reinas por los siglos de los siglos."]}, {"ref": "Cántico 1P, 2", "sub": "es un canto al Cristo entrega- do a la muerte.", "amb": ["El ejemplo de Cristo nos desborda por completo: \"padeció por nosotros… no devolvió el insulto… no profería amenazas…\"", "El fue el primer mártir con el que se cometieron las mayores injusticias, y se prodigaron los tormentos más crueles. todo él, fue un misterio de dolor y de amor.", "Pero su ejemplo no se ha perdido en la historia. El fuego que él prendió no se ha apagado todavía. Los miles y miles de cristianos que han derramado su sangre a lo largo de los siglos, nos lo confirma.", "al celebrar a nuestros mártires, estamos celebrando a este Cristo doliente que se prolonga en cada uno de ellos.", "Nuestra celebración debe ser un revulsivo que nos despierte de un cristianismo rutinario ó tal vez incoherente. Un mártir es un grito que despierta vidas dormidas. Que hoy, despierte la nuestra."], "oracion": ["Señor, tu ejemplo ante la muerte de cruz, nos deja sin palabras. Permítenos que te digamos que nos has amado \"demasiado\". Pero desde tu amor sin medida, todo tiene su explicación. Gracias.", "Que el testimonio de tus mártires nos despierte y nos impulse a vivir una vida cristiana en consecuencia con los principios de nuestra fe en ti. Que vives y reinas por los siglos de los siglos."]}], "summary": {"breve": ["SaLMo 117,I: la bondad de Dios no tiene límites y su amor es desde siempre y para siempre. Son realidades que debemos proclamar todos nos beneficiamos de ellas. Nuestros mártires fueron arrancados de la vida pero acogidos con amor por esa bondad de Dios, porque \"es eterna su misericordia\". SaLMo 117,II: los mártires no son unos derrotados de la vida, sino todo lo contrario: les quitan la vida para encontrarse con la \"vida\". El día de su martirio podían cantar con verdad \"este es el día….sea nuestra alegría y nuestro gozo\". CáNtICo 1P.2: él fue el primer mártir, el testigo de la Verdad. Por eso lo mataron. Le han seguido otros muchos. Y en todos y para todos, él ha sido fuerza en el tormento. Por eso fueron invencibles en su martirio."], "oracion": ["SaLMo 117,I: cantar la primer estrofa al principio, al medio y al final, y proclamar espontáneamente las estrofas. SaLMo 117,II: cantar al principio y al final \"este es el día en que actuó el Señor….\" Y proclamar todos juntos las estrofas. CáNtICo 1P.2: proclamarlo pausadamente por un solista, con un fondo musical suave."], "reflexion": ["El Señor está conmigo y me auxilia", "ha sido un milagro patente", "sus heridas nos han curado"]}}, {"key": "oración de la mañana", "label": "Laudes", "psalms": [{"ref": "Salmo 62", "sub": "proclama la necesidad más pro- funda de todo ser humano: Dios.", "amb": ["En nuestra oración de esta mañana estamos recordando y celebrando a hermanos nuestros que con su sangre nos han testimoniado su necesidad de Dios.", "ante sus verdugos no dudaron en proclamar con entereza \"oh Dios tú eres mi Dios\". Y llevarlo hasta las últimas consecuencias: la muerte.", "Su alma \"sedienta de Dios\" sació su sed, con su misma sangre y su \"tierra reseca, agostada, sin agua\"… quedó empapada con el agua roja del martirio.", "todo mártir testifica que es un buscador de Dios. Y su martirio es un encuentro con lo que él buscaba. Buscó, encontró y su sed quedó saciada para siempre.", "Glorificado, toda su persona es una alabanza permanente a Dios y una afirmación constante de \"fuiste mi auxilio\" y por eso tuvo la fortaleza necesaria para entregar su vida.", "Que la celebración de esta fiesta y la proclamación de este salmo sea para todos nosotros un despertar nuestra necesidad de Dios y una renovación de nuestro compromiso de seguir siendo \"los buscadores de Dios\"."], "oracion": ["Señor, fortaleza en nuestra debilidad. Gracias por la fuerza de tu Espíritu en nuestros mártires, que les hizo fuertes ante el martirio. Ellos te descubrieron como su gran necesidad y no dudaron en entregar su vida para conseguirlo.", "Que nosotros, desde su ejemplo, sellado con su sangre, seamos fuertes en la vivencia de nuestra fe, y así lo manifestemos a los demás. Tú que vives y reinas por los siglos de los siglos."]}, {"ref": "Cántico Dn", "sub": "todo cuanto existe, es alaban- za de Dios.", "amb": ["todas las criaturas son un canto de alabanza a su Creador. Unas desde el silencio de su existencia, otras desde su belleza y otras desde el poder de su inteligencia y su destino definitivo. todas… todas nos hablan de Dios y nos acercan a él, si sabemos mirarlas con profundidad y limpieza.", "Hoy estamos recordando a nuestros mártires. Su martirio fue un grito que sigue resonando aquí y ahora, y que proclama la grandeza de Dios hecha carne en seres humanos como nosotros... Ellos bendicen a Dios con la palabra de su muerte y siguen bendiciéndole desde su vivir definitivo.", "Para nosotros, peregrinos hacia la \"vida\", son hoy, invitación y reclamo para que caminemos sensibilizados ante el Dios que se nos acerca y nos habla, en sus criaturas.", "Con vocación de contemplativos, abramos los ojos y veamos. Y desde el ver, nos levantemos hacia aquel que es presencia y cercanía."], "oracion": ["Señor, todo cuanto existe nos habla de ti. Desde el insecto más pequeño ó las más insignificantes de las flores, hasta la grandiosidad del firmamento ó las profundidades de los mares.", "Pero quien más nos habla de ti es el ser humano y todo lo que has preparado para él. Pensado detenidamente, nos desborda.", "Hoy, nos hablas en tus mártires. Ellos nos ha dicho con su sangre, quién eres tú y cómo eres tú…y cómo tenemos que ser nosotros.", "Que escuchemos su palabra y la hagamos carne de nuestra carne. Tú, que vives y reinas por los siglos de los siglos."]}, {"ref": "Salmo 149", "sub": "es una invitación a celebrar el triunfo de nuestros mártires.", "amb": ["La alegría debe ser la nota dominante de la canción de nuestra vida. tenemos motivos para ello \"porque el Señor ama a su pueblo\". Por eso este salmo 149 nos invita a \"alabarle con danzas... a cantarle con tambores y cítaras\".", "La cercanía, la presencia de Dios en nuestras vidas, es una realidad confortante, cargada de amor y de esperanza, que tiene que llenarnos de alegría: \"que se alegre Israel por su Creador\".", "Celebrar la fiesta de nuestros hermanos mártires, es celebrar la alegría de su triunfo, es \"festejar su gloria\", sobre la aparente derrota de su muerte. Murieron para \"vivir\". Esta ha sido su venganza sobre sus verdugos. Pensaban borrar su existencia con la muerte y la han afincado en lo eterno para siempre.", "Que esta nuestra celebración nos renueve de tal manera que nuestra vida tenga siempre la novedad de un \"cántico nuevo\"."], "oracion": ["Señor, eres el Dios de la alegría, de la paz, de la felicidad profunda. Eso vieron en ti los mártires y eso les llenó de entereza ante sus verdugos, de tal manera, que no dudaron en perder su vida para encontrarse con la \"vida\".", "Que su ejemplo no se pierda en la historia. Que nos sintamos interpelados y demos novedad a nuestra vida, a fin de que hable de ti a nuestros hermanos, con la fuerza y testimonio de nuestros mártires. Tú que vives y reinas por los siglos de los siglos."]}], "summary": {"breve": ["SaLMo 62: Nuestros mártires hicieron de su vida \"tú eres mi Dios\", y por eso ante el desafío de sus verdugos no dudaron en hacer suya \"tu gracia vale más que la vida\" y morir para encontrarse con aquel de quien estaban \"sedientos\". CáNtICo DN.: la palabra del martirio es proclamación y bendición de la presencia del Espíritu en nuestros mártires. Su sangre derramada es un grito que nos invita a bendecir al Señor por manifestarse en cada uno de ellos. SaLMo 149: la vida de todo ser humano debe ser un canto de alegría y de alabanza al Señor, por todo lo que recibe de él, porque \"el Señor ama a su pueblo y adorna con la victoria a los humildes. Los mártires son \"victoria\" de Dios en carne humana."], "oracion": ["SaLMo 62: repetir, en forma responsorial,\"tu gracia vale más que la vida\" después de cada una de las estrofas proclamadas espontáneamente. CáNtICo DN.: cantar al principio y al final \"por ti mi Dios cantando voy…\" y proclaman dos solistas las dos partes de cada estrofa, contestando todos \"bendecid al Señor\" o lo que corresponda. SaLMo 149: proclama un solista la primera estrofa y continúa todo el grupo con las restantes."], "reflexion": ["porque tú fuiste mi auxilio", "por todo y por todos bendecid al Señor", "resuene su alabanza en la asamblea de los fieles"]}}, {"key": "oración de la tarde II", "label": "Vísperas II", "psalms": [{"ref": "Salmo 114", "sub": "es la afirmación de un Dios siempre a la escucha.", "amb": ["Con nuestra oración de esta tarde, finalizamos la celebración de la fiesta de nuestros mártires.", "Este salmo 114 es una reiterada proclamación de la cercanía de Dios frente a cada uno de los humanos: \"escucha la voz suplicante… inclina su oído hacia mí\".", "ante el suplicio y la muerte de nuestros mártires a quienes \"envolvían redes de muerte…invocaron al Señor, \"Señor salva mi vida\" y el Señor salvó sus vidas con el encuentro con la \"vida\"… \"arrancó sus vidas de la muerte\".", "todo mártir es un testigo de valores que nos destruye el ambiente ni la moda, y de realidades trascendentes que no destruye la muerte. El es un grito que nadie ahoga y que sigue resonando a lo largo de los siglos.", "Para nosotros \"oficialmente\" comprometidos con la \"vida\" son una aldabonazo a nuestra puerta, a fin de que despertemos y nos lancemos a vivir y manifestar la \"vida\".", "Proclamemos este salmo 114, conscientes de lo que somos y de lo que estamos llamados a ser."], "oracion": ["Señor, tú estás siempre cercano a todos, aunque manifiestes más tu cercanía a los débiles, a los más necesitados.", "Gracias por tu cercanía en nuestros mártires, comunicándoles fortaleza en la debilidad de su carne. Te necesitaban. Y tú no dudaste en estar junto a ellos. Con tu fuerza, fueron capaces de sellar con su sangre su amistad contigo.", "Te damos gracias por su testimonio y por tu ayuda y tu presencia en ellos. A ti que vives por los siglos de los siglos."]}, {"ref": "Salmo 115", "sub": "es un canto de gratitud ante la acción de Dios.", "amb": ["La entrega de la vida es la culminación de la vivencia de la fe. Es la fe llevada hasta las últimas consecuencias. Es firmar con sangre el compromiso cristiano. Es lo que estamos recordando y celebrando en la fiesta de nuestros mártires.", "Consumada su muerte han brindado por la \"vida\" \"con la copa de la salvación\", llena hasta rebosar con su propia sangre. así han agradecido el regalo del martirio: \"cómo agradeceré al Señor todo el bien que me ha hecho\".", "todo mártir es un testigo cualificado, y una confirmación de la fuerza del Espíritu, que así fortalece nuestra carne para que no se rinda ante la entrega de la vida, por el martirio.", "En esta tarde, el testimonio de nuestros mártires, es un grito que cuestiona nuestra vida y nos invita a la reflexión. Ser cristiano es una dignidad que conlleva una responsabilidad."], "oracion": ["Señor, nuestros mártires alientan nuestra fé y confirman nuestra esperanza. Su testimonio es palabra viva que nos invita a vivir con responsabilidad y coherencia nuestro compromiso cristiano.", "La rutina, la mediocridad, el pasotismo, no deben tener sentido en nuestra vida. O lo somos de verdad ó estamos protagonizando una comedia. Señor, cuenta con nosotros. Tú que vives por los siglos de los siglos"]}, {"ref": "Cántico Ap. 4", "sub": "es un canto al primer mártir que nos abrió caminos.", "amb": ["En nuestros mártires estamos celebrando la victoria del primer Mártir: Cristo. Ellos son la prolongación y actualización de su martirio.", "En este cántico de la apocalipsis cantamos a Cristo y cantamos también a nuestros mártires. Ellos se han hecho \"dignos de recibir gloria y honor\" por su fortaleza y su valentía ante los tormentos del martirio. asociados al \"Cordero degollado\" han participado de \"la riqueza y la sabiduría, de la fuerza y el poder, de la gloria y la alabanza\", de ese Cordero.", "Con nuestra oración de esta tarde concluimos la celebración de esta fiesta. Pero la incidencia que debe tener en nuestra vida, no debe concluir. Nuestra vida cristiana tiene que haber recibido nuevos impulsos para que vivamos en re-novación constante. Ser cristiano es vivir bajo la influencia del Espíritu en trasformación permanente. El Espíritu no duerme. Su actuar no es en un tiempo ó en ciertas horas. Siempre es la hora y el tiempo del Espíritu.", "abrámonos a su acción y seamos testigos de Dios, ante un mundo que nos necesita."], "oracion": ["Señor Jesús, primer mártir, víctima de injusticias, de envidias, de recelos. Tú fuiste ajusticiado como un malhechor, en una cruz. Tu amor lo soportó todo, por nosotros.", "Hoy recordamos a hermanos nuestros, que como tú, han sido ajusticiados injustamente. Con su sangre han firmado su compromiso de fidelidad a ti. Tu ejemplo y la fuerza del Espíritu les ha dado alientos para no desfallecer en los tormentos.", "Que nosotros renovemos y vivamos nuestro cristianismo. Tú que vives por los siglos de los siglos."]}], "summary": {"breve": ["SaLMo 114: Dios no se desentiende de nosotros en ningún momento. Podíamos decir que somos \"su preocupación\". Cuando \"nos envuelven redes de muerte\", allí está él siendo nuestra fortaleza. Lo ha hecho con los mártires y lo sigue haciendo con nosotros. SaLMo 115.: aunque todos nos falle, Dios nunca nos fallará. De ahí dimana el sentido de la gratitud hacia él. Los mártires son una consecuencia de \"los hombres son unos mentirosos\". Solo Dios estuvo con ellos. CáNtICo aP.4: Somos el precio de la sangre de nuestro Dios. Nuestros mártires mezclaron su sangre con la sangre del Cordero degollado y por eso participan de su gloria y merecen nuestra alabanza."], "oracion": ["SaLMo 114: cantar la primera estrofa al principio y al fanal y proclamar espontáneamente el resto de las estrofas. SaLMo 115: cantar al principio y al final \"cómo le cantaré al Señor…\" y lo proclama pausadamente un solista. CáNtICo aP.4: cantar al principio \"estos son los que vienen de la gran tribulación…\" y proclamar todos juntos el cántico"], "reflexion": ["Señor, salva mi vida…", "cómo pagaré al Señor… todo", "eres digno de recibir la gloria y el honor"]}}]}, {"key": "santos", "label": "Fiesta de santos/as", "hours": [{"key": "oración de la tarde I", "label": "Vísperas I", "psalms": [{"ref": "Salmo 112", "sub": "es un canto de alabanza al Señor, por su cercanía a los humanos.", "amb": ["Reconocer las acciones de Dios es un quehacer que nos hace vivir la realidad de nuestra existencia. Dios es el Señor. \"Se eleva sobre los cielos y manifiesta su grandeza \"abajándose para mirar al cielo y a la tierra\". Se abaja para levantar al pobre, a quienes se dejan engrandecer, reconociendo su pequeñez.", "Los santos han sido seres humanos, que como humanos han sabido abrirse a la acción del Espíritu que les ha levantado a la máxima grandeza: santos con la santidad de Dios.", "Recordar y celebrar a nuestros santos, es recordar y celebrar a Dios en cada uno de ellos. Es celebrar lo divino en lo humano.", "Con razón podemos proclamar este salmo con alegría, recogiendo la invitación que nos hace a \"alabar… bendecir el nombre del Señor, ahora y por siempre\". No se desdeña de \"levantar nuestro barro\" para dignificarlo con la gran dignidad de hijos suyos.", "Nuestros santos no son sólo para admirarlos y dejarlos en sus vitrinas. Son voces que nos gritan y nos invitan a caminar por los caminos que ellos caminaron. Escuchémosles."], "oracion": ["Señor, te agradecemos el regalo de nuestros santos. En ellos nos hablas de ti y de nosotros, los humanos. De ti, el Dios cercano. Y de nosotros, los engrandecidos con tu cercanía.", "Te alabamos y manifestamos nuestra alegría al celebrarte en nuestros hermanos los santos. Que nuestra celebración sea una llamada que escuchemos, que cambie nuestras vidas. Tú que vives por los siglos de los siglos."]}, {"ref": "Salmo 145", "sub": "es una proclamación de la fideli- dad del Señor, con todos los humanos.", "amb": ["Cualquiera que recapacite en el comportamiento de Dios con nosotros, no puede menos de hacer suyas las primeras palabras de este salmo: \"alabaré al Señor mientras viva\". Por que Dios siempre está cerca de todos y de cada uno: \"cautivos… ciegos… hambrientos… huérfanos… viudas\", a todos socorre porque a todos ama.", "Los santos, son el fruto de la cercanía de Dios aceptada, experimentada y vivida. todos ellos se han sentido \"dichosos… auxiliados por el Señor\" de quien se fiaron y esperaron siempre. Su vida fue una continua opción por Dios, frente a otras posibles ofertas de dioses engañosos que les halagaban con \"ofertas baratas\".", "Estamos celebrando a nuestros santos. Ellos han vivido en una época de la historia. Pero no son solamente historia. Son historia que comenzó y que perdura en el tiempo. Son vidas que nos hablan hoy con el lenguaje de Dios.", "Con la proclamación de este salmo 145, prolongamos hoy nuestra alabanza al Señor por ellos y por nosotros, llamados también a vivir y manifestar las mismas realidades, que ellos vivieron y manifestaron: \"tañeré para mi Dios mientras exista\"."], "oracion": ["Señor, te alabamos por tus santos, nuestros santos. Ellos son la palabra que todos entendemos. Nos hablan de ti y nos hablan de nosotros. Por eso nuestra celebración es celebración que nos sabe a fiesta, a la fiesta de nuestra vida y de tu vida.", "Que no dejemos a nuestros santos en la historia. Que los acerquemos al \"hoy\" de cada día, a fin de que la palabra de su vida siga resonando en la nuestra. Tú que vives y reinas por los siglos de los siglos."]}, {"ref": "Cántico Ef. 1", "sub": "Es un canto de gratitud por la vocación de nuestros santos.", "amb": ["al proclamar este cántico, proclamamos la realización del proyecto de Dios en nuestros santos. Elegidos, amados desde siempre, con su muerte, ese proyecto llegó a su plena realización. En el día de su incorporación definitiva la \"vida\", pudieron decir con verdad: \"bendito sea Dios que nos ha bendecido con toda clase de bendiciones\". Su estar ya con el Padre, es la culminación de haber sido bendecidos en Cristo.", "Un santo es fruto de un Dios \"gracia\" que ha \"derrochado\" amor para con él, y que ha aceptado a lo largo de toda su vida. El santo es, pues, gracia, regalo, pero es también aceptación, colaboración. El Dios que nos regala la vida sin nuestra colaboración, él no se nos regala si nuestra aceptación y colaboración.", "Proclamemos este cántico con la alegría de verlo realizado en nuestros santos. Y con la esperanza, cargada de alegría, de que ese es también nuestro destino. El proyecto de Dios sobre ellos, es también el proyecto sobre nosotros."], "oracion": ["Señor, te bendecimos por tu fidelidad en tus proyectos. Los has realizado en nuestros santos y los quieres realizar en nosotros. Solamente nos pides que te dejemos actuar y vivamos la alegría de tus actuaciones.", "Que el ejemplo de nuestros hermanos que hoy recordamos, nos despierte y nos estimule a vivir nuestra vida con esa perspectiva que tú nos has puesto delante. Tú que vives y reinas por los siglos de los siglos"]}], "summary": {"breve": ["SaLMo 112: los santos son una manifestación del acercamiento de Dios a los humanos para divinizarlos: lo humano lleno de Dios. Bendigamos al Señor por su cercanía, por su compartir con nosotros su grandeza. SaLMo 145: los humanos no pueden ser la razón de nuestra esperanza. Solo Dios \"mantiene su fidelidad perpetuamente\". Los santos han amado a sus hermanos pero desde el verdadero fundamento: Dios. CáNtICo Ef.1: Dios nos ha elegido desde siempre para ser santos. La santidad es obra del Espíritu, pero necesita nuestra colaboración. Los santos han sido los grandes colaboradores con el Espíritu. Por eso lograron la santidad."], "oracion": ["SaLMo 112: un solista invita a la alabanza con las tres primeras líneas y continúa todo el grupo con el resto del salmo. SaLMo 145: cantar al principio y al final \"alaba alma mía al Señor y todo mi ser a su santo nombre\" y proclamar todo el salmo espontáneamente. CáNtICo Ef.: es proclamado pausadamente por un solista, con un fondo musical suave."], "reflexion": ["el Señor se abaja para mirar al cielo y a la tierra", "dichoso el que se apoya en el Señor", "el Señor nos eligió para que fuésemos consagrados"]}}, {"key": "oración de la mañana", "label": "Laudes", "psalms": [{"ref": "Salmo 62", "sub": "es la proclamación del vivir de nuestros santos.", "amb": ["Dios ha puesto en nuestras vidas una fuerza, casi incontenible, que clama insistentemente por su objetivo: Dios. Es todo el ser humano el que grita, el que clama por conseguirlo. Es como esa \"tierra reseca, agostada, sin agua\" que se agrieta, como boca que necesita y pide agua, y que la pide con \"ansia\", como quien se muere de sed.", "Un santo, es un ser humano que ha descubierto esas fuerzas incontenibles y que pone en juego todo su ser para lograr lo que necesita.", "Los santos han hecho de su vida el \"tú eres mi Dios, por ti madrugo\" es decir, \"tú eres la primera necesidad que siento al despertar cada día\".", "Un santo es el que vive las necesidades básicas, más profundas de todo ser humano. Vive la vida, no desde obligaciones que esclavizan, sino desde necesidades que liberan y realizan.", "al proclamar este salmo 62, sintámonos con las mismas necesidades de nuestros santos y pongamos todo nuestro ser en satisfacerlas."], "oracion": ["Señor, necesidad de nuestra vida. Gracias por habernos creado así, con esa necesidad de ti. Gracias porque tú mismo acudes a satisfacernos y llenar nuestra necesidad.", "Hoy, te damos gracias por esos hermanos nuestros, los santos, que supieron vivir así y nos abrieron caminos que nos iluminan y nos alientan.", "Que nuestras vidas sean esas tierras necesitadas del Agua que eres tú que vives por los siglos de los siglos."]}, {"ref": "Cántico Dn", "sub": "el rostro de Dios se nos hace visible en todas sus obras: los santos.", "amb": ["Dios invisible, ha puesto todo su empeño en hacerse visible en cada una de sus criaturas. todas ellas, desde su inmensa variedad, son un compendio de teología, que nos hablan de Dios. Reflejan sabiduría, poder, belleza… pero sobre todo reflejan a un Dios que es todo amor.", "Y es que la razón de su existencia es el Dios que quiere manifestarse, que quiere hablarnos de él y quiere hablarnos de nosotros. En sus criaturas, Dios se nos hace cercano, el gran presente. En toda su grandeza se acerca a nuestra pequeñez para engrandecerla.", "Los santos son esa cercanía de Dios, esa grandeza mezclada con nuestra carne divinizada.", "Celebrar a nuestros santos es, pues, encontrarse muy de cerca con Dios, es ver su rostro en ese hombre o mujer, que han sido trasformados por la acción del Espíritu.", "La proclamación de este cántico nos invita, reiterativamente, a bendecir al Señor, a decirle que es maravilloso en todas sus criaturas. Pero hoy, digámoselo de una manera especial por su criatura humana, la obra más grandiosa que ha creado.", "Concretamente, digámoselo por nuestros santos, cuya fiesta estamos celebrando."], "oracion": ["Te bendecimos, Señor, por todas las obras que has creado. En todas ellas eres \"epifanía\", eres manifestación para cuantos quieran encontrarte.", "Hoy, te bendecimos especialmente por la obra de tus santos, por la acción maravillosa que has realizado en ellos. Seres humanos como nosotros, trasformados por el Espíritu y por l a respuesta que ellos le dieron.", "Que nos sensibilicemos ante su ejemplo y respondamos como ellos a la acción del Espíritu. Tú que vives y reinas por los siglos de los siglos."]}, {"ref": "Salmo 149", "sub": "proclamamos la alegría de los santos por la acción de Dios, en ellos.", "amb": ["Cualquiera que sea sensible y sepa captar la acción misteriosa de Dios, en los seres humanos, no puede menos de saltar de alegría y hacer suyo el contenido de este salmo 149: \"cantad al Señor… alabad su nombre…, porque el Señor ama a su pueblo\". Y hacedlo no de cualquier manera, sino \"con danzas y bailes… con tambores y cítaras… cantos jubilosos… todos festejen su gloria\".", "Estamos celebrando una fiesta. Y el talante festivo es lo que tiene que caracterizarnos. La alegría de nuestros santos es hoy nuestra alegría. Siempre desde la novedad de las sorpresas de Dios y desde la novedad de nuestro saber sintonizar con esas sorpresas.", "El \"cantar al Señor un cántico nuevo\" es la invitación que se nos dirige para que no perdamos nuestra capacidad de sorpresa y no caigamos en la monotonía fría y despersonalizante.", "Los santos han sido personas, que aun dentro de sus limitaciones humanas, han sabido estar abiertos a la novedad de las sorpresas de Dios. Que nos sepa a nuevo el contenido de este salmo 149."], "oracion": ["Señor, ante la novedad del día que comenzamos, te queremos manifestar nuestra alegría en la festividad de nuestros santos. Son tu obra realizada en la pobreza de nuestro barro. En ellos nos hablas a nosotros. Su destino es también nuestro destino. Gracias, Señor.", "Que esta fiesta renueve la vivencia de nuestra vida y la alegría, desde nuestra dignidad y responsabilidad como cristianos. Tu que vives por los siglos de los siglos."]}], "summary": {"breve": ["SaLMo 62: \"Sed de Dios\" es la definición de todo ser humano. Y la definición de un santo es : \"sed de Dios saciada\". Elegidos para ser santos, proclamemos y comprometámonos a saciar nuestra sed de Dios CáNtICo DN.: todas las criaturas son reflejo de Dios, son bendición de Dios. Pero es el ser humano el reflejo más perfecto, el que de verdad es bendición de Dios. Los santos lo han conseguido en plenitud. SaLMo 149: Un santo es una manifestación de un Dios alegre. Sintámonos invitados a la alegría \"festejemos y cantemos jubilosos\" al celebrar hoy la fiesta de un hermano que supo hacer de su vida un \"cántico nuevo\"."], "oracion": ["SaLMo 62: cantar la primera estrofa al principio y al final… un breve silencio y proclamar juntos todas las estrofas. CáNtICo DN.: puede ser cantado a dos coros, o un coro anuncia el motivo de alabanza uniendo las dos partes de cada estrofa y todo el grupo contesta \"bendecid al Señor\" o lo que corresponda. SaLMo 149: forma responsorial repitiendo después de cada estrofa \"cantad al Señor un cántico nuevo\"."], "reflexion": ["mi alma está sedienta de de ti… tiene ansia de ti", "criaturas todas bendecid al Señor", "alabadle… cantadle con tambores y cítaras"]}}, {"key": "oración de la tarde II", "label": "Vísperas II", "psalms": [{"ref": "Salmo 14", "sub": "es la proclamación de las exigen- cias de una vida recta.", "amb": ["La gratuidad es el trasfondo de toda nuestra vida. todo nos ha sido dado. El cristianismo no es conquista, sino gracia. Nuestra postura frente a esta gracia, es dejarse conquistar, es aceptar, con las implicaciones que lleva consigo esa aceptación: cambio del ser de la persona y por consiguiente su comportamiento.", "Los santos han sido personas que han aceptado totalmente a Dios que se les regala, y el fruto de esa aceptación ha sido su vida: \"su honradez… su justicia… su amor al prójimo… su fidelidad…\" Santos por la acción del Espíritu y santos porque ellos han secundado su acción.", "Siempre el recordar y celebrar a nuestros santos es una oportunidad para la revisión y renovación de nuestro pensar y de nuestro actuar. El mismo Dios que fue regalo para ellos, lo está siendo hoy para nosotros. El mismo Dios que trasformó sus vidas es el que se nos ofrece para trasformar las nuestras.", "Que la proclamación de este salmo 14, nos dé la respuesta adecuada para dejarnos encontrar por Dios y aceptar la oferta que nos hace."], "oracion": ["Señor, eres gratuidad pero quieres ser aceptado responsablemente. Eso hicieron los santos. Al celebrar hoy la alegría de su fiesta queremos que nos sirva para revisar tus comportamientos con nosotros y los nuestros contigo..", "Nuestra vida de compromiso no debe ser una vida monótona y sin garra. Lo necesitamos nosotros y lo necesita nuestro mundo. Tú que vives por los siglos de los siglos."]}, {"ref": "Salmo 111", "sub": "celebra la resonancia que tiene la fidelidad del Señor, en todos.", "amb": ["toda vida vivida en profundidad, no pasa sin repercutir en la persona que la vive y en el mundo que le rodea.", "Nuestros santos, todos ellos, han sido personas profundas aun dentro de su sencillez, y han revolucionado el mundo con el testimonio de su vida.", "Este salmo 111, es toda un descripción detallada de la incidencia que ha tenido en la vida de los santos su relación profunda con Dios: \"será bendita su descendencia… brilla como una luz… alzó la frente con dignidad… en la casa habrá abundancia… su corazón está firme en el Señor\"", "La vida de un santo, nunca pasa desapercibida: \"es luz que ilumina y sal que preserva\". Ellos sí que han sido los grandes bienhechores de la humanidad desde la vivencia de los valores que nos engrandecen y desde la palabra profética de sus vidas. Han vivido y desde la vida han hablado.", "Su voz no ha podido ser acallada por nadie, aunque haya chocado: \"el malvado al verlo, rechina, pero ha fracasado en su intento y el santo nos sigue hablando."], "oracion": ["Señor, quien se acoge a ti, nunca queda defraudado. Tu fidelidad inquebrantable da siempre seguridad y fortaleza. Nuestros santos lo han experimentado y hoy son para nosotros, llamada a vivir la misma experiencia.", "Gracias por ellos, por el testimonio que nos han dejado. Y gracias porque esperas de nosotros lo mismo que esperaste de ellos. Padre, queremos responder a tu esperanza. A ti que vives por los siglos de los siglos."]}, {"ref": "Cántico Ap. 15", "sub": "los santos son la obra de Dios, más maravillosa.", "amb": ["al concluir este día, nuestra admiración por las obras de Dios, seguro que ha ido sorprendiéndonos cada vez más para que podamos gritar con verdad: \"grandes y maravillosas son tus obras, Señor\".", "todas ellas, pequeñas y grandes, son un compendio de sabiduría, de poder, de belleza… de amor.", "Pero donde se refleja Dios, en toda su grandeza, es en la obra de los santos: criaturas humanas, de carne y hueso como nosotros, empapados de Dios, deificados. Humanos pero divinizados. Son la encarnación de Dios, la dignificación de lo humano a alturas insospechadas.", "Que la proclamación de este cántico sea un grito de admiración, de gratitud y de alegría, que nos llene de optimismo ante la vivencia y compromiso de nuestra vida cristiana. Nuestras perspectivas no pueden ser mayores: estamos llamados a la aventura más grandiosa. agradezcámosla y respondamos."], "oracion": ["Señor, eres grande y maravilloso y por eso todas tus obras son grandes y maravillosas. Lo manifiestas en todas, pero de una manera especial en tu obra \"la persona humana\". Ahí te has volcado totalmente. Mas no podíamos esperar.", "Hoy te damos gracias por tus santos, manifestación de tu grandeza. Que como ellos, te dejemos manifestarte en nosotros. Tú que vives por los siglos de los siglos."]}], "summary": {"breve": ["SaLMo 114: Dios es encuentro permanente con todo ser humano. Pero siempre desde el respeto a nuestra libertad y la vivencia de valores que facilitan ese encuentro: justicia, respeto, libertad, etc. Es lo que hicieron los santos. SaLMo 111: la felicidad no se compra ni se regala. Es un conquista personal y de cada día. así lo vivieron los santos. Por eso \"brillaron y siguen brillando como una luz que ilumina las tinieblas\" de nuestro mundo. CáNtICo aP.15: quien observa detenidamente las obras de Dios, no puede menos de admirarlas. Las mayores obras son los santos. admiramos y proclamamos con este cántico, la obra de Dios en nuestro santo que celebramos hoy."], "oracion": ["SaLMo 114: un solista proclama la primera estrofa y todo el grupo continúa al unísono. SaLMo 111: un solista proclama las dos primeras lineas de la primera y tercera estrofa \"dichoso...\" y continúa todo el grupo. CáNtICo aP.15: cantar la primera estrofa y proclamar juntos la segunda."], "reflexion": ["quién puede hospedarse en tu tienda", "el justo jamás vacilará", "grandes y maravillosas son tus obras"]}}]}]}</script>
<script>
const DATA = JSON.parse(document.getElementById('dades').textContent);
const $app = document.getElementById('app');
const ROMANS = ['I','II','III','IV'];
const DIES = ['domingo','lunes','martes','miércoles','jueves','viernes','sábado'];
const MESOS = ['enero','febrero','marzo','abril','mayo','junio','julio','agosto','septiembre','octubre','noviembre','diciembre'];

/* ── tema i mida de lletra ── */
const savedTheme = localStorage.getItem('orar-theme');
if(savedTheme==='dark') document.documentElement.dataset.theme='dark';
document.getElementById('btn-theme').onclick=()=>{
  const d=document.documentElement.dataset.theme==='dark';
  document.documentElement.dataset.theme=d?'':'dark';
  localStorage.setItem('orar-theme',d?'light':'dark');
};
const FSCALES=[1,1.12,1.25,0.9];
let fsIdx=parseInt(localStorage.getItem('orar-fs')||'0');
document.documentElement.style.setProperty('--fscale',FSCALES[fsIdx]);
document.getElementById('btn-fs').onclick=()=>{
  fsIdx=(fsIdx+1)%FSCALES.length;
  document.documentElement.style.setProperty('--fscale',FSCALES[fsIdx]);
  localStorage.setItem('orar-fs',fsIdx);
};
document.getElementById('btn-cerca').onclick=()=>{location.hash='#/buscar'};

/* ── càlcul litúrgic: Pasqua (Meeus) i setmana del salteri ── */
function pasqua(y){
  const a=y%19,b=Math.floor(y/100),c=y%100,d=Math.floor(b/4),e=b%4,
  f=Math.floor((b+8)/25),g=Math.floor((b-f+1)/3),h=(19*a+b-d-g+15)%30,
  i=Math.floor(c/4),k=c%4,l=(32+2*e+2*i-h-k)%7,m=Math.floor((a+11*h+22*l)/451),
  mes=Math.floor((h+l-7*m+114)/31),dia=((h+l-7*m+114)%31)+1;
  return new Date(y,mes-1,dia);
}
function addD(d,n){const r=new Date(d);r.setDate(r.getDate()+n);return r;}
function diumengeDe(d){return addD(d,-d.getDay());}
function diffSetm(a,b){return Math.round((diumengeDe(b)-diumengeDe(a))/(7*864e5));}
function advent1(y){
  const nadal=new Date(y,11,25);
  const dow=nadal.getDay()||7; // diumenge=7 per al càlcul
  return addD(nadal,-(dow===7?7:dow)-21);
}
function baptisme(y){ // primer domingo estrictamente después del 6 de enero
  const epi=new Date(y,0,6);
  const off=((7-epi.getDay())%7)||7;
  return addD(epi,off);
}
function infoLiturgica(avui){
  avui=new Date(avui.getFullYear(),avui.getMonth(),avui.getDate());
  const y=avui.getFullYear();
  const P=pasqua(y), cendra=addD(P,-46), pentecosta=addD(P,49),
        bapt=baptisme(y), adv=advent1(y), nadal=new Date(y,11,25);
  if(avui>=nadal) return {temps:'Navidad', setmOT:null, setmSalteri:((diffSetm(nadal,avui))%4)+1};
  if(avui>=adv) return {temps:'Adviento', setmOT:null, setmSalteri:((diffSetm(adv,avui))%4)+1};
  if(avui>pentecosta){
    const setmOT=34-diffSetm(avui,adv)+1;
    return {temps:'Tiempo ordinario', setmOT, setmSalteri:((setmOT-1)%4)+1};
  }
  if(avui>=P){
    const n=diffSetm(P,avui)+1;
    return {temps:'Tiempo pascual', setmOT:null, setmSalteri:((n-1)%4)+1};
  }
  if(avui>=cendra){
    const dQ1=addD(P,-42);
    if(avui<dQ1) return {temps:'Cuaresma', setmOT:null, setmSalteri:4};
    const n=diffSetm(dQ1,avui)+1;
    return {temps:'Cuaresma', setmOT:null, setmSalteri:((n-1)%4)+1};
  }
  if(avui>bapt){
    const setmOT=diffSetm(bapt,avui)+1;
    return {temps:'Tiempo ordinario', setmOT, setmSalteri:((setmOT-1)%4)+1};
  }
  return {temps:'Navidad', setmOT:null, setmSalteri:2};
}

/* ── utilitats ── */
function esc(s){return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}
function trobaSetm(n){return DATA.weeks.find(w=>w.num===n);}
function trobaDia(w,nom){return trobaSetm(w).days.find(d=>d.name===nom);}

/* ── vistes ── */
function vistaInici(){
  const ara=new Date();
  const info=infoLiturgica(ara);
  const diaNom=DIES[ara.getDay()];
  const dataStr=`${diaNom}, ${ara.getDate()} de ${MESOS[ara.getMonth()]} de ${ara.getFullYear()}`;
  const hora=ara.getHours();
  const dia=trobaDia(info.setmSalteri,diaNom);
  let horesHtml='';
  if(dia){
    const suggerida = hora<14 ? 'Laudes' : (diaNom==='domingo'?'Vísperas II':(diaNom==='sábado'?'Vísperas I':'Vísperas'));
    dia.hours.forEach((h,i)=>{
      // dissabte al vespre → Vísperas I del diumenge de la setmana següent
      horesHtml+=`<a href="#/s/${info.setmSalteri}/${diaNom}/${i}" class="${h.label===suggerida?'principal':''}">${h.label}</a>`;
    });
    if(diaNom==='sábado'){
      const seg=(info.setmSalteri%4)+1;
      horesHtml+=`<a href="#/s/${seg}/domingo/0" class="${hora>=14?'principal':''}">Vísperas I <span style="font-size:.78em">(dom. ${ROMANS[seg-1]})</span></a>`;
    }
  }
  const notaTemps = info.temps!=='Tiempo ordinario'
    ? `<div class="nota-temps">Estamos en ${info.temps}. Este libro está pensado para el Tiempo ordinario, pero el salterio sigue su ciclo de cuatro semanas.</div>`
    : '';
  const otStr = info.setmOT ? ` · Semana ${info.setmOT} del T.O.` : '';
  let setmanes='';
  for(const w of DATA.weeks){
    setmanes+=`<a class="card" href="#/s/${w.num}"><div class="num">${ROMANS[w.num-1]}</div><div class="lbl">Semana ${ROMANS[w.num-1]} del salterio</div></a>`;
  }
  let festes='';
  for(const f of DATA.feasts){
    festes+=`<a class="fila" href="#/f/${f.key}"><span class="nom" style="text-transform:none">${f.label}</span><span class="fletxa">›</span></a>`;
  }
  $app.innerHTML=`
    <div class="hero">
      <div class="eyebrow">Hoy</div>
      <h2 style="text-transform:capitalize">${dataStr}</h2>
      <div class="fecha">Semana ${ROMANS[info.setmSalteri-1]} del salterio${otStr}</div>
      <div class="hoy-hores">${horesHtml}</div>
      ${notaTemps}
    </div>
    <div class="sec-label">Semanas del salterio</div>
    <div class="grid">${setmanes}</div>
    <div class="sec-label">Fiestas de la Virgen y de los Santos</div>
    <div class="llista">${festes}</div>
    <div class="sec-label">El libro</div>
    <div class="llista">
      <a class="fila" href="#/intro"><span class="nom" style="text-transform:none">Dios es el «Eterno orante»</span><span class="detall">Introducción del autor</span></a>
      <a class="fila" href="#/indice"><span class="nom" style="text-transform:none">Índice de salmos y cánticos</span><span class="fletxa">›</span></a>
    </div>
    <footer><span class="flor">❧</span>«Orar hoy con los salmos de siempre» · Miguel Romero Taboada, cmf · 5.ª edición, 2006</footer>`;
}

function vistaSetmana(n){
  const w=trobaSetm(n);
  if(!w) return vistaInici();
  let files='';
  for(const d of w.days){
    const hs=d.hours.map(h=>h.label).join(' · ');
    files+=`<a class="fila" href="#/s/${n}/${d.name}"><span class="nom">${d.name}</span><span class="detall">${hs}</span></a>`;
  }
  $app.innerHTML=`
    <div class="crumb"><a href="#/">Inicio</a><span class="sep">›</span><span>Semana ${ROMANS[n-1]}</span></div>
    <div class="hora-cap"><div class="setm">Salterio</div><h2 style="text-transform:none">Semana ${ROMANS[n-1]}</h2></div>
    <div class="llista">${files}</div>`;
}

function vistaDia(n,dia){
  const d=trobaDia(n,dia);
  if(!d) return vistaSetmana(n);
  let files='';
  d.hours.forEach((h,i)=>{
    const salms=h.psalms.map(p=>p.ref).join(' · ');
    files+=`<a class="fila" href="#/s/${n}/${dia}/${i}"><span class="nom" style="text-transform:none">${h.label}</span><span class="detall">${salms}</span></a>`;
  });
  $app.innerHTML=`
    <div class="crumb"><a href="#/">Inicio</a><span class="sep">›</span><a href="#/s/${n}">Semana ${ROMANS[n-1]}</a><span class="sep">›</span><span style="text-transform:capitalize">${dia}</span></div>
    <div class="hora-cap"><div class="setm">Semana ${ROMANS[n-1]}</div><h2>${dia}</h2></div>
    <div class="llista">${files}</div>`;
}

function htmlHora(h){
  let out='';
  for(const p of h.psalms){
    out+=`<article class="salm">
      <div class="salm-cap"><div class="ref">${esc(p.ref)}</div>${p.sub?`<div class="subt">${esc(p.sub)}</div>`:''}</div>
      <div class="salm-cos">${p.amb.map(x=>`<p>${esc(x)}</p>`).join('')}</div>
      ${p.oracion.length?`<div class="oracio"><div class="oracio-lbl">Oración sálmica</div>${p.oracion.map(x=>`<p>${esc(x)}</p>`).join('')}</div>`:''}
    </article>`;
  }
  const s=h.summary;
  function marcaRef(t){return esc(t).replace(/^((?:Salmo|Cántico)[^:]{0,22}:)/,'<span class="item-ref">$1</span>');}
  out+=`<section class="resum">
    <h3>Ambientación breve</h3>${s.breve.map(x=>`<p>${marcaRef(x)}</p>`).join('')}
    <h3>Para la oración</h3>${s.oracion.map(x=>`<p>${marcaRef(x)}</p>`).join('')}
    <h3>Para la reflexión</h3><ul>${s.reflexion.map(x=>`<li>«${esc(x.replace(/^"|"$/g,''))}»</li>`).join('')}</ul>
  </section>`;
  return out;
}

function vistaHora(n,dia,hi){
  const d=trobaDia(n,dia); if(!d) return vistaSetmana(n);
  const h=d.hours[hi]; if(!h) return vistaDia(n,dia);
  let nav='';
  if(hi>0) nav+=`<a href="#/s/${n}/${dia}/${hi-1}">← ${d.hours[hi-1].label}</a>`;
  if(hi<d.hours.length-1) nav+=`<a href="#/s/${n}/${dia}/${hi+1}">${d.hours[hi+1].label} →</a>`;
  $app.innerHTML=`
    <div class="crumb"><a href="#/">Inicio</a><span class="sep">›</span><a href="#/s/${n}">Semana ${ROMANS[n-1]}</a><span class="sep">›</span><a href="#/s/${n}/${dia}" style="text-transform:capitalize">${dia}</a><span class="sep">›</span><span>${h.label}</span></div>
    <div class="hora-cap"><div class="setm">Semana ${ROMANS[n-1]}</div><h2>${dia}</h2><div class="hora-nom">${h.label} — ${h.key}</div></div>
    ${htmlHora(h)}
    <div class="nav-hores">${nav}</div>`;
  window.scrollTo(0,0);
}

function vistaFesta(key,hi){
  const f=DATA.feasts.find(x=>x.key===key);
  if(!f) return vistaInici();
  if(hi===undefined){
    let files='';
    f.hours.forEach((h,i)=>{
      const salms=h.psalms.map(p=>p.ref).join(' · ');
      files+=`<a class="fila" href="#/f/${key}/${i}"><span class="nom" style="text-transform:none">${h.label}</span><span class="detall">${salms}</span></a>`;
    });
    $app.innerHTML=`
      <div class="crumb"><a href="#/">Inicio</a><span class="sep">›</span><span>${f.label}</span></div>
      <div class="hora-cap"><div class="setm">Fiestas</div><h2 style="text-transform:none">${f.label}</h2></div>
      <div class="llista">${files}</div>`;
    return;
  }
  const h=f.hours[hi]; if(!h) return vistaFesta(key);
  let nav='';
  if(hi>0) nav+=`<a href="#/f/${key}/${hi-1}">← ${f.hours[hi-1].label}</a>`;
  if(hi<f.hours.length-1) nav+=`<a href="#/f/${key}/${hi+1}">${f.hours[hi+1].label} →</a>`;
  $app.innerHTML=`
    <div class="crumb"><a href="#/">Inicio</a><span class="sep">›</span><a href="#/f/${key}">${f.label}</a><span class="sep">›</span><span>${h.label}</span></div>
    <div class="hora-cap"><div class="setm">Fiestas</div><h2 style="text-transform:none">${f.label}</h2><div class="hora-nom">${h.label} — ${h.key}</div></div>
    ${htmlHora(h)}
    <div class="nav-hores">${nav}</div>`;
  window.scrollTo(0,0);
}

function vistaIntro(){
  $app.innerHTML=`
    <div class="crumb"><a href="#/">Inicio</a><span class="sep">›</span><span>Introducción</span></div>
    <div class="intro-page">
      <h2>${esc(DATA.intro.title)}</h2>
      ${DATA.intro.paras.map(p=>`<p>${esc(p)}</p>`).join('')}
      <div class="credit">Miguel Romero Taboada, cmf · «Orar hoy con los salmos de siempre» · 5.ª edición, diciembre de 2006</div>
    </div>`;
}

/* índex de salms: recórrer totes les hores */
function totesHores(){
  const out=[];
  for(const w of DATA.weeks) for(const d of w.days) d.hours.forEach((h,i)=>
    out.push({h,on:`Semana ${ROMANS[w.num-1]} · ${d.name} · ${h.label}`,url:`#/s/${w.num}/${d.name}/${i}`}));
  for(const f of DATA.feasts) f.hours.forEach((h,i)=>
    out.push({h,on:`${f.label} · ${h.label}`,url:`#/f/${f.key}/${i}`}));
  return out;
}
function vistaIndex(){
  const salms={},cantics={};
  for(const e of totesHores()) for(const p of e.h.psalms){
    const dest=p.ref.startsWith('Cántico')?cantics:salms;
    (dest[p.ref]=dest[p.ref]||[]).push(e);
  }
  function numOrd(ref){const m=ref.match(/(\d+)/);return m?parseInt(m[1]):999;}
  function grup(obj,titol){
    const claus=Object.keys(obj).sort((a,b)=>numOrd(a)-numOrd(b)||a.localeCompare(b));
    let html=`<div class="idx-grup"><h3>${titol}</h3>`;
    for(const k of claus) for(const e of obj[k])
      html+=`<a class="idx-item" href="${e.url}"><span>${esc(k)}</span><span class="on">${e.on}</span></a>`;
    return html+'</div>';
  }
  $app.innerHTML=`
    <div class="crumb"><a href="#/">Inicio</a><span class="sep">›</span><span>Índice</span></div>
    <div class="hora-cap"><div class="setm">Índice</div><h2 style="text-transform:none">Salmos y cánticos</h2></div>
    ${grup(salms,'Salmos')}${grup(cantics,'Cánticos')}`;
}

function vistaCerca(){
  $app.innerHTML=`
    <div class="crumb"><a href="#/">Inicio</a><span class="sep">›</span><span>Buscar</span></div>
    <div class="cerca-box"><input id="q" type="search" placeholder="Buscar en todo el libro… (p. ej. «misericordia», «salmo 62»)" autocomplete="off"></div>
    <div id="res"></div>`;
  const $q=document.getElementById('q'),$res=document.getElementById('res');
  $q.focus();
  let t;
  $q.oninput=()=>{clearTimeout(t);t=setTimeout(()=>fer($q.value),250);};
  function norm(s){return s.toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g,'');}
  function fer(q){
    q=q.trim();
    if(q.length<3){$res.innerHTML='';return;}
    const nq=norm(q),trobats=[];
    for(const e of totesHores()){
      for(const p of e.h.psalms){
        const camps=[p.ref,p.sub,...p.amb,...p.oracion];
        for(const c of camps){
          const idx=norm(c).indexOf(nq);
          if(idx>=0){
            const ini=Math.max(0,idx-55);
            let frag=(ini>0?'…':'')+c.slice(ini,idx+q.length+75)+(idx+q.length+75<c.length?'…':'');
            frag=esc(frag).replace(new RegExp('('+q.replace(/[.*+?^${}()|[\]\\]/g,'\\$&')+')','gi'),'<mark>$1</mark>');
            trobats.push({e,p,frag});
            break;
          }
        }
        if(trobats.length>60) break;
      }
      if(trobats.length>60) break;
    }
    $res.innerHTML=(trobats.length?`<div class="cerca-res">${trobats.length}${trobats.length>60?'+':''} resultados</div>`:`<div class="cerca-res">Sin resultados para «${esc(q)}»</div>`)+
      trobats.map(({e,p,frag})=>`<a class="fila" href="${e.url}" style="flex-direction:column;align-items:flex-start;gap:.15rem">
        <span class="nom" style="text-transform:none;font-size:1.05rem">${esc(p.ref)}</span>
        <span class="detall" style="text-align:left">${e.on}</span>
        <span class="res-frag">${frag}</span></a>`).join('');
  }
}

/* ── router ── */
function router(){
  const h=location.hash.replace(/^#\/?/,'').split('/').map(decodeURIComponent).filter(x=>x!=='');
  if(h.length===0) return vistaInici();
  if(h[0]==='intro') return vistaIntro();
  if(h[0]==='indice') return vistaIndex();
  if(h[0]==='buscar') return vistaCerca();
  if(h[0]==='s'){
    const n=parseInt(h[1]);
    if(h.length===2) return vistaSetmana(n);
    if(h.length===3) return vistaDia(n,h[2]);
    return vistaHora(n,h[2],parseInt(h[3]));
  }
  if(h[0]==='f') return vistaFesta(h[1],h[2]!==undefined?parseInt(h[2]):undefined);
  vistaInici();
}
window.addEventListener('hashchange',router);
router();

/* botó tornar a dalt */
const $up=document.getElementById('btn-up');
window.addEventListener('scroll',()=>{$up.classList.toggle('vis',window.scrollY>600);},{passive:true});
$up.onclick=()=>window.scrollTo({top:0,behavior:'smooth'});
</script>
