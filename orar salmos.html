cercano y tan asequible, a todos aquellos que con ojos nuevos, quieran descubrirlo.", "Hoy es la Iglesia, somos cada uno de los cristianos, \"su monte santo\" \"su ciudad\", \"alegría de toda la tierra\". No importa que nuestro modo de vivir, nuestro testimonio, en muchas ocasiones choque, y que no sea comprendido y que hasta sea rechazado. No temamos. Somos \"la ciudad de nuestro Dios… él la ha fundado… y para siempre\". \"El nos guiará por siempre jamás\".", "Importa que nuestro testimonio sea claro y coherente. Que con todo nuestro ser anunciemos a quienes nos vean, que \"este es el Señor nuestro Dios\", de quien nos hemos fiado totalmente y por eso nos hemos embarcado en este modo de vivir. \"Lo que habíamos oído, lo hemos visto\" y día a día experimentamos visiblemente, las maravillas que Dios realiza en favor nuestro.", "Que a lo largo de este día, cada una de nuestras acciones sea proclamación de que \"grande es el Señor y muy digno de alabanza\"."], "oracion": ["Señor, tu grandeza sobrepasa todos nuestros cálculos. Y a pesar de todo, no te sientes rebajado al acercarte a cada uno de nosotros. Y es que tu amor de Padre, no tiene barreras de ninguna clase.", "Que agradecidos sepamos corresponderte, y anunciemos a nuestro mundo que \"este es el Señor nuestro Dios\", de quien podemos fiarnos totalmente, porque nunca nos fallará, aunque nosotros le fallemos a él. El que vive por los siglos de los siglos."]}], "summary": {"breve": ["Salmo 56: Ante situaciones difíciles, necesitamos aumentar nuestra confianza en Dios. Nuestra debilidad se hace fuerte con su fortaleza. Comencemos el nuevo día llenos de esperanza.", "Cántico JR.31: La cercanía de Dios, su presencia amorosa en nuestra historia personal, nos tiene que alegrar y abrir perspectivas cargadas de esperanza, de luz, de novedad…", "Salmo 47: La grandeza de Dios es una realidad visible, aunque los miopes se nieguen a reconocerla. Ahí esta desafiando tiempos e ideologías. Al final, todos tendrán que confesar: \"este es el Señor\"."], "oracion": ["Salmo 56: Todas las estrofas espontáneamente, con un silencio breve después de cada una de ellas.", "Cántico JR.31: Proclamado por un solista. Silencio. Gloria todos.", "Salmo 47: Cantar como antífona al principio y al final \"Nadie hay tan grande como tú...\" y el salmo es proclamado a dos coros."], "reflexion": ["Tocaré para ti ante las naciones…", "Convertiré su tristeza en gozo…", "Este es el Señor nuestro Dios…"]}}, {"key": "oración de la tarde", "label": "Vísperas", "psalms": [{"ref": "Salmo 29", "sub": "himno de acción de gracias al Señor, protector en los peligros.", "amb": ["Estamos en las últimas horas del día. Acontecimientos, personas… han influido en nosotros, y han colaborado en nuestro desarrollo personal. Caer en la cuenta de ello, nos exige ser agradecidos.", "Este salmo 29, suscita en nosotros el sentido de la gratitud hacia Dios por tantas cosas que nos ha regalado a lo largo de este día: \"me has librado… me sanaste… me hiciste revivir… cambiaste mi luto en danzas…\" Por eso \"te ensalzaré… te cantará mi alma sin callarse… te daré gracias por siempre…\".", "Concluir un día encerrados en nosotros mismos, prescindiendo de los demás, es un triste concluir. Que la proclamación de este salmo 29, nos haga reflexionar para que nos mantengamos abiertos a los demás, desde la gratitud, la acción de gracias, por la riqueza que nos han comunicado.\"Es de bien nacidos ser agradecidos\". Cultivar el sentido de la gratitud, es la puerta abierta para recibir nuevos favores.", "La generosidad de Dios se desborda ante las personas, que viven intensamente la alegría de la gratitud. Mucho recibimos… mucho debemos agradecer: \"Señor Dios mío, te daré gracias por siempre\"."], "oracion": ["Te damos gracias, Señor, porque tu generosidad para con nosotros, ha sido siempre desbordante. Todos los días de nuestra vida, están marcados por tus favores. Somos un milagro de tu amor, y un exponente de tus bondades.", "Es poco decirte gracias, de vez en cuando. Toda nuestra vida, cada una de nuestras acciones, deben ser un cántico permanente de gratitud hacia ti. \"Mi alma te cantará sin callarse\"… A tí que vives por los siglos de los siglos."]}, {"ref": "Salmo 31", "sub": "acción de gracias al Señor, siem- pre dispuesto al perdón.", "amb": ["Los comportamientos de Dios sobrepasan nuestras medidas, y muchas veces nos sentimos desconcertados, cuando los comparamos con los nuestros.", "Dios no es vengativo, ni rencoroso. No nos pasa factura por cuentas atrasadas, ni nos cobra intereses bancarios. El es el Dios de la misericordia, el Dios del perdón… porque es el Dios del amor. Podemos decir de él, que en su omnipotencia, no sabe más que amarnos y perdonarnos, si nosotros le dejamos que nos ame y nos perdone.", "Este salmo 31 es toda una confirmación de esta realidad: \"no apunta el delito… perdonaste mi culpa…\" Por eso \"alegraos justos y gozad con el Señor…\" \"Tú eres mi refugio… me rodeas con cantos de liberación\".", "Cuando miramos a Dios con nuestras medidas, lo deformamos… no vemos al Dios verdadero: \"Mis caminos, no son vuestros caminos\".", "Desde la recitación de este salmo, abrámonos al misterio de Dios, de su bondad, de su misericordia, de su amor. No nos sumerjamos tanto en nuestros fallos y limitaciones, cuanto en los brazos abiertos de nuestro Padre."], "oracion": ["Señor, al terminar este día, no es la tristeza de nuestros fallos lo que más debe impresionarnos, sino tu bondad, tu comprensión, tu misericordia… tus brazos de Padre bueno, siempre dispuestos a abrazarnos. Esto es lo que nos reanima y nos llena de alegría.", "Eres el Dios del perdón porque eres el Dios del amor. Perdonas siempre, porque amas siempre. Así debemos mirarte en todos los momentos de nuestra vida, porque solo así estaremos viviendo en la verdad. Tú que vives y reinas por los siglos de los siglos."]}, {"ref": "Cántico Apoc. 11, 17", "sub": "himno a la misericor- dia y justicia de Dios", "amb": ["Dios es misericordia, y es justicia. Las dos son fruto de su amor. El es perdón. Siempre nos juzga con rectitud y justicia, y valora nuestras acciones desde la comprensión y desde el amor. Todos, \"pequeños y grandes, santos, profetas…\" recibirán el galardón merecido.", "En nuestras luchas, ante las posibles zancadillas que nos puedan poner nuestros enemigos, él siempre está de nuestra parte, siendo fuerza en nuestra debilidad y aliento en nuestros pesimismos.", "Cristo ha pisado antes nuestro camino, y sabe de nuestro barro. Es él quien lucha con nosotros, y nos comunica la fuerza de su Espíritu, para que no nos veamos derrotados. Por eso \"estamos alegres\" y vivimos confiados en que siempre será nuestra la victoria.", "Con verdad podemos exclamar: \"Gracias te damos, Señor Dios omnipotente, el que eres y el que eras…\"", "Al proclamar este cántico, recuperemos nuestro optimismo y nuestra esperanza. No caminamos solos. Invisible, pero realmente, alguien va con nosotros. Con él, siempre venceremos."], "oracion": ["Señor y Dios nuestro: tú nos conoces sobradamente y siempre nos juzgas con verdad y con justicia. Siempre con amor. Tus juicios se fundamentan en tu infinita bondad y en tu comprensión. Sabes dar a cada uno, su recompensa, siempre con generosidad.", "En Cristo, eres fortaleza en nuestras luchas, y aliento en nuestras derrotas. Por fuertes que sean nuestros enemigos, por grandes que sean nuestros problemas, no debemos tener miedo, porque siempre es más grande tu ayuda y tu fortaleza, que nuestra debilidad. Por todo ello te damos gracias, Señor. A ti que vives por los siglos de los siglos."]}], "summary": {"breve": ["Salmo 29: Dios nunca se desentiende de nosotros. Su amor de Padre es permanente. Reconocerlo y agradecerlo debe ser la reacción lógica que adoptemos en nuestra vida.", "Salmo 31: Dios es perdón porque es amor. Dejémonos perdonar para que disfrutemos de la alegría del perdón. Encerrarnos en nuestro pecado es no dejar a Dios manifestarnos su amor.", "Cántico AP.11: Dios tiene que triunfar sobre todo el mal. Su justicia tiene que implantarse en nuestro mundo. Su bondad tiene que hacerse manifiesta en todos aquellos que luchan por la verdad."], "oracion": ["Salmo 29: Lo proclama un solista y cada dos estrofas cantar el estribillo \"Te ensalzaré, Señor, porque me has librado\"...", "Salmo 31: Cantar como antífona \"Cantaré eternamente las misericordias del Señor....\" y proclamar espontáneamente las estrofas.", "Cántico AP.11: Todos juntos, con un fondo de música, suave."], "reflexion": ["Te ensalzaré, Señor, porque me has librado…", "Tú eres mi refugio, me libras del peligro…", "Gracias te damos, Señor, el que eras y el que eres…"]}}]}, {"name": "viernes", "hours": [{"key": "oración de la mañana", "label": "Laudes", "psalms": [{"ref": "Salmo 50", "sub": "es una manifestación de la mise- ricordia y de la bondad de Dios.", "amb": ["No se trata de echarnos en cara nuestro pecado ó de culpabilizarnos. Sencillamente recordarnos que en un viernes, Dios, quiso manifestarnos de un modo insospechado, su amor: \"habiendo amado a los suyos, los amó hasta el extremo\". Y desde aquel viernes, una cruz, es la palabra silenciosa de un Dios amor.", "Este salmo 50, es una invitación a tomar posturas definidas, y coherentes, ante Dios y ante nosotros mismos. Ante Dios, como amor que no conoce límites en su preocupación por nosotros. Y ante nosotros mismos, como seres radicalmente necesitados de ese amor.", "En nuestra historia personal, tenemos que reconocer que, que tal vez, haya páginas negras en nuestro comportamiento con Dios. No siempre le hemos correspondido. O quizá, hemos prescindido de él, ofuscados por nuestro quehacer, y le hemos arrinconado.", "Este salmo quiere ser todo un grito de renovación, de conversión: \"renuévame… devuélveme la alegría… lávame… hazme oír el gozo y la alegría….\"", "Y es que Dios \"a un corazón arrepentido, humillado, no lo desprecia…\". Todo lo contrario: siempre nos espera con los brazos abiertos para darnos el abrazo de Padre.", "Viernes: una llamada a recuperar nuestra alegría… a sentirnos amados por Dios. La cruz nos lo atestigua. Está con los brazos abiertos. Aceptemos el abrazo."], "oracion": ["Señor, ante tu cruz, descubrimos lo que de verdad somos para ti. Con palabras más claras y convincentes, no nos lo puedes decir. Pero tenemos que reconocerlo: en nuestra vida concreta, no siempre hemos vivido en consonancia con esa verdad. Nuestra respuesta no ha estado en tu línea. Has encontrado frío donde tú habías puesto calor.", "Hoy, paternalmente, nos invitas a reconocer, a cambiar y... a corresponderte. Sinceramente, Padre, queremos darte la respuesta que esperas de nosotros. Tú que vives por los siglos de los siglos."]}, {"ref": "Cántico Is. 45", "sub": "es una llamada a la conver- sión al verdadero Dios.", "amb": ["Desde nuestra comodidad, no pocas veces, adoramos a dioses hechos a nuestro capricho. No queremos complicaciones. Y nos metemos en complicaciones mayores.", "Por medio del profeta Isaías, Dios nos repite insistentemente: \"yo soy el Señor y no hay otro\"… \"no hay otro Dios fuera de mí\"… \"No discurren los que llevan su ídolo de madera…\" \"Se avergüenzan los fabricantes de ídolos…\"", "Es la voz cariñosa de quien busca nuestro bien, y nos echa en cara nuestro proceder, no siempre en consonancia con los principios que profesamos. Por eso, nos repetirá: \"volveos hacia mí para salvaros… porque \"yo soy un Dios justo y salvador y no hay ninguno más\".", "Ante el peligro de falsificar nuestra vida, la voz de Dios, por medio del Profeta, nos invita a la reflexión y a cuestionar nuestro modo de proceder.", "De verdad, ¿Dios es nuestro Dios, o nos hemos fabricado nuestros \"pequeños dioses\" a la medida de nuestros intereses?… Que podamos responderle con sinceridad: \"tú eres mi Dios\". Mi único Dios. Y que estemos dispuestos a romper esos nuestros ídolos, que falsifican nuestra vida, y son un engaño para los demás."], "oracion": ["Señor, a nivel de ideas, estamos convencidos de que tú eres el único Dios, y que debes serlo en toda nuestra vida. Pero, si somos sinceros, tenemos que reconocer, que en la práctica, no siempre tú eres nuestro Dios de verdad. Es la comodidad, es el miedo al compromiso serio... son tantas cosas, que nos lo impiden ó nos lo dificultan, y tú... no eres el Dios de nuestra vida, con todas las consecuencias.", "Que a lo largo de este día que comenzamos, resuene en nosotros tu voz: \"no hay otro Dios fuera de mí\", y actuemos en coherencia con lo que pensamos. Tú que vives por los siglos de los siglos."]}, {"ref": "Salmo 99", "sub": "es una invitación a la alegría ante la bondad de Dios.", "amb": ["Recuperar y cultivar el sentido de la alegría en la vivencia de nuestra vida, debe ser una meta que tenemos que conseguir. La vida cristiana, nuestro modo concreto de vivirla, es vocación a la alegría, a la felicidad, como valores a los que no podemos renunciar.", "Este salmo 99, es una clara invitación a relacionarnos con Dios, no con caras tristes y acongojadas, sino todo lo contrario: \"servid al Señor con alegría… entrad en su presencia con vítores\".", "Y es que no hay otro modo de vivir la vida de cara a Dios. Comprometidos con un mundo que necesita a Dios y de alguien que le hable de él, desde su vida, no podemos fallarles. Tenemos que trasmitir la realidad de Dios, vitalmente, desde nuestra vivencia y desde nuestro testimonio. Que podamos decir a todos con verdad: \"sabed que el Señor es Dios… que somos suyos…\", \"entrad por sus atrios con himnos…\"", "Y todo esto, desde alguien que lo ha experimentado y que lo está viviendo. Que con sinceridad, y con verdad digamos: \"el Señor es bueno…\" misericordioso… fiel\"… porque así lo sentimos y vivimos."], "oracion": ["Señor, tú no eres el Dios de la cara triste, ni quieres que nosotros nos relacionemos contigo con caras alargadas. Todo lo contrario: Tú eres el Dios de la alegría… de la felicidad… de la paz… de la serenidad. Y nuestras relaciones contigo tienen que ser desde ahí. Solo así, trasmitiremos a nuestro mundo el mensaje de tu bondad… de tu amor… de tu cercanía.", "Que con nuestra vida podamos decir a todos: \"servid al Señor con alegría\" porque así lo sentimos y así lo vivimos nosotros. Tú que vives y reinas por los siglos de los siglos."]}], "summary": {"breve": ["Salmo 50: Una llamada a la renovación, a la conversión… a sentir la alegría del perdón, el abrazo del Padre, en un día especial: viernes, día de la manifestación hasta el extremo del AMOR: muerte de Cristo en la cruz.", "Cántico IS.45: Otra llamada a la conversión: \"volveos hacia mí… yo soy Dios y no hay otro…\" Dios espera nuestra respuesta y nosotros necesitamos dársela.", "Salmo 99: Reconocer que el Señor es \"bueno\"… que \"el nos hizo\"... nos lleva a la consecuencia de darle gracias, de bendecirle, desde la alegría de sentirnos queridos por él."], "oracion": ["Salmo 50: Proclamado espontáneamente y cada dos estrofas repetir todos \"Devuélveme la alegría de la salvación\"", "Cántico IS.45: Un coro proclama las estrofas y el otro repite \"Yo soy Dios y no hay otro\", después de cada una de ellas", "Salmo 99: Cantar la primera estrofa al principio y al final, y proclamar todos las estrofas restantes."], "reflexion": ["Devuélveme la alegría de tu salvación…", "Yo soy el Señor y no hay otro…", "El Señor es bueno, su misericordia es eterna…"]}}, {"key": "oración de la tarde", "label": "Vísperas", "psalms": [{"ref": "Salmo 40", "sub": "es una oración de gratitud al Señor, siempre comprensivo.", "amb": ["No podemos vivir en solitario, prescindiendo de los demás.", "Al proclamar este salmo 40, cuando estamos finalizando el día, se nos plantea un interrogante: ¿cómo han sido mis relaciones con los hermanos?... porque todos, de alguna manera, somos \"pobres\", que necesitamos de los otros. Pobres en nuestra necesidad de afecto, de comprensión, de amor… Y sobre todo, pobres, en nuestra necesidad de Dios.", "Y seremos \"dichosos\" en la medida en que hayamos sabido recibir de los otros, lo que nos están dando y les hayamos dado lo que ellos, también, están necesitando.", "Es fácil que algunos no comprendan nuestro modo de proceder. Es más, podemos encontrarnos con faltas de correspondencia, hasta con traiciones por parte de aquellos en los que más confiábamos: \"incluso mi amigo… es el primero en traicionarme\". Pero la venganza de un cristiano, es siempre el amor.", "En cada viernes recordamos a un Cristo, que en el mismo momento de ser ejecutado tiene palabras de perdón para sus verdugos: \"Padre, perdónalos\". Y recordamos, este comportamiento no para dejarlo en la historia, sino para hacerlo vida, en nuestra vida.", "Un cristiano: siempre debe ser un testigo del perdón… de la misericordia… del amor... en todas las partes… y con todos."], "oracion": ["Señor, no siempre nos es fácil, sentirnos \"dichosos\" cuando nos desvivimos y nos entregamos a los demás. Nuestro egoísmo, nuestra falta de generosidad, frecuentemente nos juegan malas partidas. No hemos descubierto en su profundidad, la gran satisfacción del darse, del amar sin medida y siempre.", "Tu entrega y tu amor, sin límites, nos recuerdan en esta tarde, cómo tiene que ser nuestra entrega y nuestro amor. Comprometidos en el amor, desde nuestra vocación, queremos vivir ese compromiso, con todas sus exigencias… Darnos, sin exigir la paga. Amar, por la satisfacción de amar. Así lo haces tú, que vives por los siglos de los siglos."]}, {"ref": "Salmo 45", "sub": "canto de alabanza a Dios podero- so defensor en el peligro.", "amb": ["Han sido muchas horas y muchas las actividades que hemos desarrollado a lo largo de este día. Es fácil que terminemos cansados, nerviosos, ó tal vez estresados. Necesitamos ideas, realidades, experiencias… que nos serenen, nos tranquilicen, nos traigan paz, antes de entregarnos al descanso de la noche.", "El salmo 45, es el salmo de la tranquilidad, del sosiego, de la paz: \"el Señor está con nosotros… es nuestro refugio… nuestra fuerza… poderoso defensor en el peligro…\"", "Por tanto, suceda lo que suceda,... paz… serenidad... Aunque \"tiemble la tierra, y se desplomen los montes…\" \"El Señor es poderoso defensor en el peligro…\" \"está con nosotros\". Y así nuestro vivir, siembra presencia de Dios en nuestro entorno, y podremos decir a cuantos nos contemplan: \"venid a ver las maravillas del Señor\".", "Saboreemos como tónico, como relajante, para nuestro descanso de la noche, esta frase: \"El Señor está con nosotros… conmigo\"… SIEMPRE. \"El es nuestro alcázar\"... \"Teniendo a Dios en medio... no debemos vacilar\".", "Alegrémonos y disfrutemos de esta cercanía de Dios."], "oracion": ["Señor, las ocupaciones y tal vez, la misma convivencia, nos han dejado cansados, nerviosos. Necesitamos encontrarnos contigo que eres paz… serenidad… tranquilidad. Necesitamos escuchar tus palabras de cercanía… de amor: \"estoy contigo\". Y así, nos sentiremos serenos y tranquilos, con tu presencia.", "Queremos, que en las últimas horas de este día, sigan resonando en nuestro interior, esas dos palabras, compendio de tu amor: \"estoy contigo… estoy contigo…\" Tú que vives y reinas por los siglos de los siglos."]}, {"ref": "Cántico Ap. 15, 34", "sub": "es una invitación a reco- nocer las grandes obras del Señor.", "amb": ["Todo sentimiento positivo, es fuente de energía y de vitalidad.", "Este cántico, nos pone delante, todo el actuar de Dios en favor nuestro y nos invita a exclamar: \"grandes y maravillosas son tus obras Señor\".", "Y de verdad, que si repasamos, una por una, todas las obras que Dios ha hecho y está haciendo, por nosotros, nos llenaremos de admiración, de alegría y de agradecimiento: la tierra, el mar, los cielos… nuestra existencia… y tendremos que exclamar: \"¿quién no glorificará tu nombre?...\"", "Pero en un viernes, tenemos que recordar la GRAN OBRA DE DIOS: su entrega a la muerte por nosotros. Esta sí que es su GRAN OBRA. Y admirados, necesitaremos exclamar: \"habiendo amado a los suyos… los amó hasta el EXTREMO\".", "Que este pensamiento nos envuelva en el descanso de esta noche, de tal manera, que nuestro despertar por la mañana, sea un despertar al agradecimiento… a la correspondencia… al compromiso… al amor.", "Somos olvidadizos. Nuestras ocupaciones, frecuentemente, nos absorben. Y no vivimos lo profundo de las realidades que nos rodean.", "Que al concluir este día, recuperemos nuestra capacidad de admiración ante las acciones de Dios a favor nuestro, y le correspondamos."], "oracion": ["Señor, no sabemos por cual de tus obras tenemos que comenzar, para alabarte y decirte agradecidos: ¡Eres maravilloso!.", "Pero hay una que sobre pasa a todas: la obra de tu entrega a la muerte por nosotros. Esa sí que ha sido tu gran obra. No podías hacer otra mejor.", "En la tarde de este viernes, no tenemos palabras para admirarte y agradecerte. Quisiéramos que toda nuestra vida fuera un GRACIAS prolongado, hasta la hora de nuestro definitivo encuentro contigo. Gracias, Padre. Tú que vives por los siglos de los siglos."]}], "summary": {"breve": ["Salmo 40: No podemos desentendernos de los demás, sobre todo de los más necesitados. No siempre encontraremos correspondencia. Pero el verdadero amor ama gratis y sin limitaciones de ninguna clase.", "Salmo 45: La satisfacción de que \"el Señor siempre está con nosotros\", debe traernos paz y seguridad al terminar este día. No importa que a nuestro alrededor hayan sucedido cosas desagradables. Confiemos.", "Cántico AP.15: Un grito espontáneo, que proclame las maravillas de Dios. Y sintamos la necesidad de invitar a todos a reconocerlo y a anunciarlo, llenos de júbilo."], "oracion": ["Salmo 40: Las tres primeras estrofas las proclaman todos, y continúa un solista hasta la penúltima que es proclamada por todo el grupo.", "Salmo 45: Proclama un grupo el salmo de tres en tres estrofas y contesta el otro grupo con el estribillo \"Dios es nuestro refugio y nuestra fuerza\"", "Cántico AP.15: Lo proclama todo el grupo al unísono con fondo musical, suave."], "reflexion": ["En esto conozco que me amas…", "El Señor de los ejércitos está con nosotros…", "Grandes y maravillosas son tus obras…"]}}]}, {"name": "sábado", "hours": [{"key": "oración de la mañana", "label": "Laudes", "psalms": [{"ref": "Salmo 118", "sub": "es un grito por el Dios necesidad en nuestra vida.", "amb": ["Nuestra existencia es un grito por Dios. Todo nuestro ser es un clamor permanente por \"aquel\" que es su raíz y su fuerza.", "Este salmo 118 es la expresión viva de la actitud existencial que necesitamos tener todos los humanos, frente a Dios: \"te invoco de todo corazón… a ti grito… sálvame… antes de la aurora pido tu auxilio….\"", "Pero Dios, no se hace sordo a nuestros gritos. No mantiene distancias…\" está cerca… escucha nuestra voz… nos responde siempre…\"", "Y es que es él mismo, quien ha puesto en lo más profundo de nuestro ser, esta necesidad que tenemos de él. Necesariamente, pues, tiene que salir al paso y llenar nuestro vacío.", "Pero seríamos unos fracasados, si en vez de gritar a Dios y abrirnos a su encuentro, ahogáramos esos gritos y buscáramos sucedáneos de Dios.", "Que la proclamación de este salmo 118, renueve en nosotros esta ansia incontenible que tenemos de él. Que cada una de nuestras acciones sea la exteriorización de esta necesidad profunda que todos llevamos dentro: \"a tí grito, sálvame\"… te necesito."], "oracion": ["Señor, eres el grito de nuestra vida. Por eso, al comenzar este nuevo día, \"te invoco de todo corazón\"… con toda nuestra fuerza.", "Sabemos que tú no te haces sordo a nuestros gritos… y que siempre encontraremos respuesta.", "Es más: tú eres el que suscita nuestros gritos y nuestro necesidad de ti.", "¡Ojalá, que no los ahoguemos ó busquemos compensaciones absurdas y vacías!", "Este es nuestro deseo, Señor, y nuestro compromiso contigo: \"a tí gritaré siempre\".", "Tú eres el que vives por los siglos de los siglos."]}, {"ref": "Cántico Ex. 15, 1-4", "sub": "es un canto a la forta- leza de Dios, defensor en el peligro.", "amb": ["Dios, no es ajeno a nuestra historia. Nunca lo ha sido, ni lo será. Es imposible. En los momentos actuales, que nos ha tocado vivir, él está presente, aunque lo veamos lejos.", "En la Encarnación, se \"mezcló\" con nosotros, asumió la naturaleza humana con todas las consecuencias. Y por donde camina un ser humano, allí está él, en su camino. En nuestras luchas, en nuestros problemas y en nuestras dificultades, ahí está él. Como en otros tiempos, también nosotros podemos decir hoy: \"mi fuerza y mi poder es el Señor… él fue mi salvación…\"", "Siempre que unimos nuestras fuerzas a las suyas, nos sentimos fuertes con su misma fuerza. Nada ni nadie podrá contra nosotros. El es quien nos guía con \"su misericordia… y su poder…\" y siempre podremos exclamar: \"cantaré al Señor, sublime es su victoria\".", "Comenzamos un nuevo día. Necesitamos comenzarlo con perspectivas esperanzadoras. No lo comenzamos solos. El es, \"el Señor\", quien va con nosotros y en nosotros. No temamos. Seguro que la victoria será nuestra."], "oracion": ["Señor, reconocemos nuestra debilidad, aunque intentemos disimularlo, presumiendo ser fuertes. Pero tú eres el verdaderamente \"fuerte\", el que robustece nuestra debilidad con tu fortaleza.", "Te has unido a nosotros para siempre y sabemos que ya nunca estaremos solos, en cualquiera de los momentos ó circunstancias de nuestra vida. Esto nos alienta, nos abre nuevos horizontes en nuestro vivir. Gracias, Señor.", "Que en nuestra vida práctica, nunca intentemos arrinconarte. A ti que vives por los siglos de los siglos."]}, {"ref": "Salmo 116", "sub": "himno de alabanza a Dios por su misericordia y su fidelidad.", "amb": ["Dios es el presente, aunque el invisible. A través de sus obras podemos vislumbrar su grandeza y su poder. En sus designios, ha querido que nosotros seamos su voz, su palabra… que invite a todos los pueblos, a todas las gentes, a reconocerle y a amarle. Y es que su misericordia y su fidelidad, no tienen límites.", "Al comenzar este día queremos que todos lo sepan, que de todas las gargantas salga un grito unánime diciendo: ¡\"qué grande es Dios y qué maravillosas son todas sus obras!\".", "Ese grito, debe ser nuestra vida, vivida con profundidad y coherencia. El día en que nos comprometimos con Dios, lo hicimos dispuestos a todo. Tal vez, con el tiempo, nos hemos desgastado, y no siempre hemos respondido como Dios esperaba y nosotros hubiéramos querido.", "El comienzo de una nueva jornada, puede ser el momento oportuno para intentar una renovación y dar la respuesta adecuada a los deseos de Dios y a los nuestros… \"que te alaben y te aclamen todas las naciones y todos los pueblos…\" Vamos a proclamarlo, una vez más."], "oracion": ["Señor, nuestra vida debería ser la voz que invitara, a todos, a reconocerte… a amarte… a proclamar tu grandeza, tu misericordia, tu fidelidad… que no tienen límites.", "Nos has puesto en la vida, para hacer visible tu rostro de Padre, ante nuestros hermanos.", "Teníamos que ser un canto, que pudieran oír todos, cantando tu amor, tu bondad, tu sabiduría… y todo lo que has hecho y estás haciendo por nosotros.", "Este es nuestro deseo, Padre, al comenzar el nuevo día. A tí que vives por los siglos de los siglos."]}], "summary": {"breve": ["Salmo 118: Es la manifestación profunda y espontánea de nuestra necesidad de Dios: \"a ti grito… respóndeme… escucha mi voz…\" Vivir desde esta actitud, es vivir la realidad de nuestra existencia.", "Cántico EX.15: Dios está en nuestra historia de cada día. Es fuerza en nuestras luchas y alegría en nuestras victorias. Su presencia siempre es alentadora y confortante. No temamos.", "Salmo 116: Somos los \"profesionales\" de Dios. Nuestras vidas tienen que ser alabanza permanente de su bondad para con nosotros y para con todos los humanos. Deseemos que lo hagan todos los pueblos."], "oracion": ["Salmo 118: Todo él proclamado individualmente, y una vez concluido, frases espontaneas del mismo salmo, o en la misma línea", "Cántico EX.15: Proclamado al unísono, cantando cada tres estrofas \"El Señor es mi fuerza, mi roca y salvación...\"", "Salmo 116: Cantar como antífona \"A Dios den gracias los pueblos...\""], "reflexion": ["Te invoco de todo corazón... tú, Señor, estás cerca…", "Mi fuerza y mi poder es el Señor…", "Alabad al Señor, todas las naciones…"]}}]}]}, {"num": 2, "days": [{"name": "domingo", "hours": [{"key": "oración de la tarde I", "label": "Vísperas I", "psalms": [{"ref": "Salmo 118", "sub": "es una meditación sobre la ley de Dios.", "amb": ["Dios no es el que se impone o nos manipula. Ni tampoco es ley o norma fría, sin más.", "Sus relaciones con nosotros, son siempre desde el amor… siempre buscando nuestro bien, nuestra realización. Sus leyes, sus normas, son la manifestación de lo que necesitamos hacer para conseguir nuestra plena realización, nuestra felicidad.", "Por eso, con verdad podemos decir: \"tu Palabra es lámpara para mis pasos, luz en mi sendero\". Por consiguiente, es lógico que nos comprometamos con ella y digamos: \"lo juré y lo cumpliré… guardaré tus mandamientos… siempre y cabalmente\".", "Tenemos que convencernos: las relaciones de Dios con nosotros, no son como las nuestras con nuestros hermanos. Tendemos a dominar, a imponernos, y lo que es peor, a veces, tendemos a \"utilizarlos\". Nuestro sentido de la autoridad, no siempre es de servicio, de ayudar a crecer al hermano.", "Que el comportamiento que Dios tiene con nosotros, nos ilumine, para que sepamos comportarnos con nuestros hermanos.", "Acojamos, pues, la Palabra de Dios con toda su fuerza liberadora, que nos conducirá a la libertad plena. Que de verdad podamos decir \"tus preceptos son mi herencia, la alegría de mi corazón\"."], "oracion": ["Señor, no nos has puesto en el camino y nos has abandonado en nuestro caminar.", "Tú eres lámpara, tú eres luz que ilumina nuestros pasos. Y esto, nos llena de alegría, nos alienta en nuestra aparente soledad.", "No eres el Dios de la norma fría y sin entraña, sino el Dios del amor, y de la entrega. No te impones. Sencillamente, te ofreces, te regalas. Tus leyes, tus normas, son luz que necesitamos para no tropezar. Las cumpliremos. Las haremos vida. Siempre confiando en ti que vives por los siglos de los siglos."]}, {"ref": "Salmo 15", "sub": "es una manifestación confiada y gozosa en el Señor.", "amb": ["Estamos en los últimos momentos del día. A todas las horas, hemos experimentado, muy cerca, la presencia del Señor: la Eucaristía, los hermanos, la oración… las distintas ocupaciones que hemos tenido. Todo nos ha invitado a acogernos confiadamente, a la bondad de Dios, antes de entregarnos al descanso: \"protégeme Dios mío que confío en ti…\"", "Al mismo tiempo manifestamos nuestro rechazo a posibles \"ídolos\" que intentan mezclarse en nuestra vida. Y decididamente nos pronunciamos en contra de ellos: \"no nos satisfacen…\" Ni los adoraremos, ni los invocaremos.", "Por el contrario, nos declaramos los profundamente satisfechos con nuestra vocación de cristianos y de consagrados: \"el Señor es el lote de mi heredad… que me encanta…\"", "Y es lógico que brote un grito espontáneo de gratitud y de alegría: \"bendeciré al Señor… se alegra mi corazón y mis entrañas…\"", "Finalizar el día con estos sentimientos del salmo 15, nos facilitará un descanso tranquilo, y el comienzo de un nuevo día con perspectivas esperanzadoras.", "Por eso, digámoslo con verdad: \"Tengo siempre presente al Señor, con él a mi derecha no vacilaré\"."], "oracion": ["Señor, a ti nos acogemos al terminar este día, porque \"tú eres nuestro único bien\". Rechazamos nuestros posibles \"ídolos\" y nos pronunciamos en tu favor. Tú eres la gran herencia que nos ha tocado en suerte. Con ella estamos satisfechos.", "En esta tarde, te manifestamos nuestra alegría y nuestra satisfacción. Contigo, jamás vacilaremos. Tú nos das seguridad y esperanza. Y vives por los siglos de los siglos."]}, {"ref": "Cántico Flp. 2, 6-11", "sub": "se despojó de su rango pasando por uno de tantos.", "amb": ["Nuestro canto de esta tarde, es a Cristo, comprometido en favor nuestro.Lo hemos celebrado y lo hemos proclamado en nuestra Eucaristía.", "Al terminar el día nos dirigimos a él, y reconocemos todo su quehacer por nosotros. Todo un Dios, que no se desdeña de mezclarse con nuestro barro, con todas las consecuencias que eso implica… sin hacer alardes de ningún tipo. Es más: no duda en entregarse a la muerte más ignominiosa, por nosotros.", "Lo sabemos desde niños. Lo hemos escuchado muchas veces. Hasta tal vez, hemos tenido momentos en los que nos ha impresionado este proceder de Dios.", "Pero la rutina, la irreflexión, las ocupaciones de cada día… han dificultado ó están dificultando, que estas realidades tan profundas nos calen hasta lo más hondo de nuestro ser, y demos la respuesta que se impone por sí misma.", "Proclamemos, pues, este cántico. Pero que sea la proclamación de un compromiso con ese Cristo, que se comprometió con nosotros hasta las últimas consecuencias, impensadas por nuestra parte: \"… murió y se entregó a la muerte por mí\".", "Así es de desconcertante el proceder de Dios."], "oracion": ["Cristo, no podemos menos de admirarte: tu entrega y tu valentía no han conocido limites: \"nos has amado hasta el extremo…\"", "Te has querido hacer tan cercano a nosotros, que no has dudado en hacerte como uno de tantos, menos en el pecado. Es más: te has rebajado hasta someterte al suplicio de la cruz, como si fueras un criminal. Nos desconciertas.", "Sinceramente, gracias, por este gesto, que sólo desde un amor infinito, se puede comprender. Te prometemos nuestra respuesta. A ti que nos amas, por los siglos de los siglos."]}], "summary": {"breve": ["Salmo 118: Los mandatos del Señor no son fría norma. Son luz que nos ilumina y calor que nos acaricia. En guardarlos está nuestra realización y nuestra respuesta de amor a quien tanto se desvela por nosotros.", "Salmo 15: Libremente hemos optado por Dios, frente a otras posibles opciones. Nuestra vida tiene que ser una manifestación clara de esa opción: \"tú eres mi bien\".", "Cántico FLP. 2: Se decidió y lo hizo con todas las consecuencias: no se avergonzó de nuestro barro, y de pasar por uno de tantos. Se abajó y así nos levantó: en él lo tenemos todo."], "oracion": ["Salmo 118: Cantar al principio y al final \"Tus palabras alientan mi vida...\" y un solista proclama todo el salmo.", "Salmo 15: Cantar al principio, al medio y al final: \"Protégeme Dios mío…\" (Cantalapiedra) Proclamar la estrofas espontáneamente.", "Cántico FLP. 2: Proclamado al unísono con un fondo musical suave."], "reflexion": ["Lámpara es tu palabra para mis pasos…", "me saciarás de gozo en tu presencia…", "Se despojó de su rango…"]}}, {"key": "oración de la mañana", "label": "Laudes", "psalms": [{"ref": "Salmo 117", "sub": "es un himno de acción de gracias al Señor.", "amb": ["Todos los días, toda nuestra vida, debiera ser, un canto de gratitud a Dios, \"porque es eterna su misericordia\". Y todos los hombres, de cualquier raza y color, debieran de proclamarlo.", "Y es que él es \"nuestra fuerza… nuestra energía… nuestra salvación\". Con él estamos seguros de nuestro triunfo frente a problemas, ó dificultades… y frente a quienes intenten ponernos la zancadilla. Nuestra fuerza es él, el Resucitado. La fuerza de su Resurrección, es también nuestra fuerza. Por eso, todos los días podemos gritarlo: \"este es el día en que actuó el Señor, sea nuestra alegría y nuestro gozo\".De una manera especial, lo gritamos y lo celebramos cada domingo.", "Ese Cristo vivo, vive en cada uno de nosotros, comunicándonos su misma vida, su Resurrección, su alegría… su victoria: \"hay cantos de victoria en la tienda de los justos\".", "En la mañana de este domingo, nos unimos a tantos hermanos nuestros, que celebran y cantan, al mismo Cristo que nosotros cantamos y celebramos.", "El es \"la piedra que desecharon, y es ahora la piedra angular\". Fundamentados en ella, podemos decir \"el Señor está conmigo, no temo. ¿Qué podrá hacerme el hombre?\"."], "oracion": ["Señor, reconocemos de verdad, que eres bueno y que es \"eterna tu misericordia\". Todos debiéramos anunciarlo, y proclamarlo sin cesar.", "¡En cuántos momentos de nuestra vida hemos sentido tu presencia y nos has sacado de apuros!... \"Te damos gracias porque nos escuchaste y fuiste nuestra salvación\".", "En la mañana de este día que estamos comenzando, te agradecemos la Resurrección de Cristo, que es nuestra resurrección. Que le dejemos actuar libremente.", "Tú que vives y reinas por los siglos de los siglos."]}, {"ref": "Cántico Dn. 3", "sub": "es el canto de alabanza al Señor, de toda la creación.", "amb": ["Todas las obras de la creación, son ya, en sí mismas, un cántico silencioso, a la sabiduría y al poder de Dios. Somos los humanos, quienes tenemos que descubrir toda la realidad de la creación y desde ella, conocer, admirar, amar y bendecir a su Autor.", "Este cántico de Daniel, que vamos a proclamar, nos invita, reiteradamente, a glorificar y a alabar a Dios, por todas sus obras.", "Desde nuestra vocación de contemplativos y de \"admiradores\", nuestra oración de esta mañana, es una llamada a encontrarnos con Dios y a descubrir su amor, en todo lo que ha creado para nuestro servicio. Y desde ese encuentro y ese descubrimiento, intensificar nuestras relaciones con él, abandonando rutinas, mediocridades, incoherencias, en la vivencia de nuestros compromisos.", "Dios, siempre es fiel. Que encuentre fidelidad, por nuestra parte. \"A él, gloria y alabanza de los siglos\".", "Al invitar a todas las \"criaturas a bendecir al Señor y a ensalzarlo por los siglos\", no nos excluyamos a nosotros mismos, desde una oración sólo de palabras. Es nuestra vida la que tiene que invitar. Palabras sí. Pero palabras que manifiestan una actitud de vida."], "oracion": ["Señor, toda nuestra vida, desde la mañana hasta la noche, debiera ser un canto a tu bondad, a tu sabiduría, a tu amor. Siempre te manifiestas como eres; el Padre que sólo busca el bien de sus hijos.", "En esta mañana, queremos decirte, que mereces toda alabanza y toda gloria: por nuestras vidas… por todas tus obras… por el amor que nos tienes.", "En el comienzo de este domingo, queremos decirte, de corazón, que te corresponderemos. A ti que nos amas y que vives por los siglos de los siglos."]}, {"ref": "Salmo 150", "sub": "es una solemne invitación a ala- bar al Señor.", "amb": ["Todo este salmo, nos invita, insistentemente, a alabar a Dios, o mejor dicho, a ser alabanza permanente de Dios. Todo nuestro ser, con sus potencias y sentidos… utilizando toda clase de instrumentos musicales… alabe a Dios \"por sus obras magnificas y por su inmensa grandeza\". Alabarlo \"con trompetas… arpas… cítaras… flautas… tambores…\" que todos suenen y proclamen estruendosamente, lo grande que es Dios. Y no solamente los instrumentos, sino que \"todo ser que alienta alabe al Señor\".", "Para nosotros, los comprometidos, los \"incondicionales\" de Dios, es todo un reto en la mañana de este Domingo. Nuestra vida no puede discurrir, en un silencio rutinario, frente a Dios y frente a sus obras, creadas para nosotros. Desde ellas, tenemos que levantarnos hacia él. Nos comprometimos y debemos ser consecuentes con este compromiso.", "Un cristiano tendríamos que definirlo como \"música de Dios\". Todo su ser debiera ser una sinfonía, escrita en el pentagrama de su persona, e interpretada con cada una de sus acciones. De tal manera que todo él, \"suene a Dios\", en todo momento, y sea invitación a la alabanza para cuantos le contemplen."], "oracion": ["Señor, eres grande, y lo manifiestas: todas tus obras son una clara manifestación.", "Queremos que nuestra vida discurra desde de la admiración y desde la sorpresa, al contemplar tus obras. Al mismo tiempo, te decimos que queremos corresponderte, con más sinceridad y más constancia, a todo lo que has hecho y estas haciendo por nosotros.", "Tú que nos amas y vives por los siglos de los siglos."]}], "summary": {"breve": ["Salmo 117: El Señor es bueno y es eterna su misericordia. Y todos debemos proclamarlo. Nos lo ha manifestado durante toda nuestra vida. Que recojamos esta invitación y lo hagamos.", "Cántico DN.3: Nada ni nadie son ajenos al poder, a la bondad y al amor de Dios En nombre de todo y de todos, bendigamos al Señor al comenzar esta mañana.", "Salmo 150: Es todo nuestro ser y toda nuestra existencia los que tienen que alabar a Dios, \"por sus obras magníficas\". Ningún instrumento musical debe ser ajeno a esta alabanza."], "oracion": ["Salmo 117: Un solista proclama las cuatro primeras estrofas y contestan todos \"Eterna es su misericordia\". Sigue la proclamación espontánea de las estrofas, cantando \"Dad gracias al Señor porque es bueno...\" cada tres estrofas. Todos juntos el Gloria.", "Cántico DN.3: Un solista proclama la primera parte de cada estrofa y todos contestan con la segunda.", "Salmo 150: Un coro proclama la primera parte de cada estrofa y el otro contesta con la segunda. Concluyen todos juntos con la última estrofa y Gloria."], "reflexion": ["Dad gracias al Señor porque es bueno…", "A ti gloria y alabanza por los siglos…", "Todo ser que alienta alabe al Señor…"]}}, {"key": "oración de la tarde II", "label": "Vísperas II", "psalms": [{"ref": "Salmo 109", "sub": "es un canto a Cristo vencedor, Sacerdote y Rey.", "amb": ["Cristo es alguien para los demás. El Dios que se ha volcado en su humanidad, para darse a los humanos. Todos sus misterios los está viviendo unido con cada uno de nosotros. Su muerte y su resurrección están siendo nuestra muerte y nuestra resurrección. En él, todos estamos muriendo y resucitando.", "Este salmo 109 es un cántico a Cristo, pero también es un cántico a todos nosotros. Proclamamos a Cristo ensalzado y glorificado y nos proclamamos a nosotros, exaltados y glorificados en él. Con él hemos sido sentados \"ya\", a la derecha de Dios, y somos reyes… sacerdotes… profetas. El Señor lo ha jurado y no se arrepiente. La firma de nuestro cheque es la misma persona de Jesús. Podemos estar seguros de que las promesas de Dios Padre, se cumplirán.", "Con estos sentimientos de un Cristo que todo él, es para nosotros, le cantamos y nos cantamos, en la tarde de este domingo, siempre cargados de gratitud y de esperanza. El Resucitado nos ha abierto caminos nuevos.", "Que sembremos nuestro mundo de optimismo y seamos capaces de comunicar, con nuestra vida, mensajes de alegría y de compromiso.", "Nuestra oración, en estas últimas horas del día, robustezca nuestra fe y nuestra esperanza. Cristo Resucitado, alienta nuestras vidas."], "oracion": ["Señor, en la persona de Jesús, has trazado nuestro esquema, tú plan sobre todos y cada uno de nosotros. De verdad que nos has engrandecido sobre manera. Nosotros, por nuestra cuenta, nunca hubiéramos soñado en nada de eso.", "Pero tu amor y tu bondad, que no tienen límites se han desbordado. Un gracias muy grande y un compromiso serio contigo, es lo que tú esperas. Señor, desde nuestra debilidad, cuenta con nosotros. Tú que vives por los siglos de los siglos."]}, {"ref": "Salmo 113,B", "sub": "oración en la que predomina fe y confianza en Dios.", "amb": ["Son muchos los que van haciendo sus dioses, a su medida… desde un autoengaño que no conduce a nada, mejor dicho, que conduce a la no realización del ser humano, y al fracaso de los planes amorosos de Dios, sobre él.", "En el fondo, desde el vacío de sus vidas nos están interrogando: \"¿dónde está tú Dios?\"… Esa necesidad de Dios que todos tenemos, de algún modo, nos la están manifestando, y pidiéndonos una respuesta. Somos nosotros, los que decimos, que conocemos y nos relacionamos con el Dios verdadero, quienes tenemos que responderles desde nuestras vidas, y decirles dónde está nuestro Dios y cómo es nuestro Dios.", "Nuestro hablar de Dios, no deben ser meras palabras que muchas veces no dicen nada. La mejor palabra debe ser nuestra vida impregnada del sentido de Dios, que se transparenta por todos los poros de nuestra persona. Cantemos este himno al Dios verdadero y proclamemos su grandeza, su bondad, su amor.", "Ante el peligro de ser \"ateos disfrazados de cristianos\", la proclamación de este salmo, nos debe llamar a la sinceridad y a la reflexión: \"¿Dónde está tu Dios?\". o si quieres: ¿quién es de verdad tu Dios? De tal manera que podamos proclamar: \"Nosotros sí, bendeciremos al Señor ahora y por siempre\"."], "oracion": ["Señor, tú eres nuestro Dios, el único Dios verdadero, el de los blancos y de los negros, el de los pobres y de los ricos… el Dios de todos. Es lo que queremos vivir y lo que queremos anunciar a nuestro mundo de hoy.", "Que todos los pueblos, que todas las gentes, pequeños y grandes te bendigan y reconozcan lo que haces por nosotros. Tu que vives y reinas por los siglos de los siglos."]}, {"ref": "Cántico 1P.2", "sub": "Cristo padeció por nosotros.", "amb": ["Dios se encarnó con todas las consecuencias. Gráficamente podíamos decir que \"se embarró con nuestro barro\", menos con nuestro pecado. Sufrió… aguantó insultos, desprecios, dolores, injusticias… hasta morir ajusticiado como si fuera un criminal. Y todo para manifestarnos, con sangre, su amor y su entrega… hasta el extremo, al máximo.", "En todo esto, humanamente no encontramos explicación. Desde nuestra lógica, nosotros hubiéramos hecho las cosas de otra manera, sin tantas complicaciones, y sin tanto realismo. Complicarnos tanto por los demás, no entra en nuestros esquemas.", "Pero los esquemas de Dios, no son como los nuestros. Sencillamente, porque nuestro amor a los demás adolece de un egoísmo limitador. Pero el amor de Dios es desbordante,… es sin medida… no conoce límites", "Proclamemos este cántico y demostremos a Cristo nuestra admiración y nuestro compromiso, como respuesta.", "Dejémonos sorprender, una vez más, por este Cristo que se lo jugó todo por nosotros. Que la rutina, de ver al Crucificado, no tenga sentido en la vivencia de nuestra vida. Y que un crucifijo, siempre nos trasmita mensajes de amor sin medida, mensajes de entrega sin reservarse nada."], "oracion": ["Cristo, hermano nuestro, te felicitamos en esta tarde del domingo. De verdad que has sido un valiente en tu entrega y en tu amor a tus hermanos. Podemos decirte que has roto todos los esquemas y que has superado todas nuestras esperanzas. Gracias.", "Viviremos nuestra vida de gratitud como respuesta a todo lo que has hecho por nosotros. Siempre gracias y cuenta con nosotros. Tú que vives y reinas por los siglos de los siglos."]}, {"ref": "Cántico Ap.19", "sub": "es una invitación a la alegría ante un Dios enamorado de nosotros.", "amb": ["Si hemos vivido con intensidad lo que hemos celebrado en este Domingo, seguro que terminamos el día rebosantes de gozo, y necesitamos gritar: ¡Aleluya... aleluya... llegó la boda del Cordero...!", "No somos los abandonados de Dios. El mismo se ha hecho presente en nuestro mundo, se ha unido a nuestra carne, para siempre...Es uno de los nuestros. Por eso, todos, \"pequeños y grandes, alabad al Señor...\"....\"Alegrémonos y gocemos y démosle gracias\".", "Invisiblemente, pero realmente, él sigue unido a nuestras vidas, viviendo nuestra historia, acompañándonos en nuestro caminar. No importa que a veces no le correspondamos. El siempre nos será fiel, esperando pacientemente nuestra respuesta.", "Nuestra comunidad debe ser el ámbito normal en el que celebremos cada día, los esponsales de Dios con nosotros. Toda ella debe vibrar, contagiar, entusiasmar...para que todos y cada uno de sus componentes no decaigan en la vivencia de una misma vocación, de un mismo carisma. Vivimos en comunidad para que todos nos comuniquemos vida. Así haremos realidad lo que implica nuestro vivir juntos.", "No es precisamente la alegría lo que caracteriza a nuestro mundo. Tal vez sí, una alegría falsificada. Somos nosotros, los cristianos comprometidos, los que tenemos que contagiarles desde el testimonio de nuestra vida empapada de un Dios presencia y amor."], "oracion": ["Gracias, Señor, por tu amor. Tú no nos amas de cualquier manera. Lo haces como sólo tú sabes hacerlo: ¡infinitamente!...sin medida...al máximo. Y nos lo expresas con signos que nos hablan de amor total, de entrega sin reservas, de fidelidad para siempre. Con razón podemos exclamar: \"alegrémonos y gocemos y démosle gracias...\"", "Que nuestro vivir, esté empapado de esta realidad y así lo mostremos a nuestro mundo. Tú que vives y reinas por los siglos de los siglos."]}], "summary": {"breve": ["Salmo 109: Cierto, él es el mesías, el Rey, el Sacerdote. Pero en él y desde él, nosotros también lo somos. Así nos ha levantado el Padre en la persona de su Hijo.", "Salmo 113 B: Surgen interrogantes a nuestro alrededor: \"dónde está tu Dios\". Presentémosle al Dios verdadero, sin falsificaciones ni deformaciones. Esa es nuestra vocación y ese es nuestro compromiso.", "Cántico 1P.2: más no podía hacer por nosotros. Nuestra gratitud y nuestro compromiso es la respuesta que debemos darle.", "Cántico AP.19: Lancemos al viento nuestra invitación para que la recojan todos: Dios es grande y lo ha manifestado. Y desde su grandeza se acerca a nosotros con un amor sin medida. Alegrémonos."], "oracion": ["Salmo 109: Un solista inicia la primera y la tercera estrofa y el grupo contesta con el resto de cada estrofa.", "Salmo 113 B: La estrofa primera todos, y continúa un solista con las tres siguientes. La quinta y la sexta todo el grupo, y termina el solista con la séptima. Todos el Gloria.", "Cántico 1P.2: proclamado al unísono con fondo musical suave.", "Cántico AP.19: Cantarlo todo. o lo proclama un solista y todos contestan con el aleluya."], "reflexion": ["Siéntate a mi derecha…", "Nuestras bendiciones al Señor ahora y por siempre…", "Sus heridas nos han curado…", "Alegrémonos, gocemos y démosle gracias…"]}}]}, {"name": "lunes", "hours": [{"key": "oración de la mañana", "label": "Laudes", "psalms": [{"ref": "Salmo 41", "sub": "es todo un grito que expresa el deseo y la necesidad de Dios.", "amb": ["Todos los humanos somos seres profunda y radicalmente necesitados. Vamos viviendo nuestra vida con las manos abiertas, siempre mendigando, buscando… todo eso que necesitamos. Podíamos definirnos como \"los mendigos de la vida\".", "Pero sobre todo, somos los \"mendigos de Dios\". Esa es nuestra gran necesidad. De ahí, esa ansia irrefrenable que todos llevamos dentro. En el fondo, todos buscamos a Dios. El es quien ha sembrado en nuestra entraña, esa necesidad.", "Nuestra vocación es una respuesta y un compromiso a esa necesidad. Hemos descubierto el verdadero sentido de la vida y nos hemos comprometido a vivirlo con todas las consecuencias.", "En este salmo 41, lo vamos a proclamar: \"como busca la sierva corrientes de agua, así te busco a ti, Dios mío\"… tengo sed del Dios \"vivo\". Esta es la única forma de vivir, los que nos llamamos los \"mendigos de Dios\".", "Y es también la única forma de dar una respuesta a nuestro mundo, con el que nos hemos comprometido: \"¿Dónde está tu Dios?\".", "Consciente o inconscientemente, esa es la pregunta que se nos hace y que espera una respuesta.", "mendigos de Dios… buscadores de Dios… y manifestadores de Dios. Esa es nuestra vocación y esa es nuestra misión."], "oracion": ["Señor, no lo podemos ocultar. Por más que a veces intentemos disimularlo buscando nuestras compensaciones. Tú eres la gran necesidad de nuestra vida.", "Y es que tú mismo has sembrado en nosotros esa necesidad, que nos hace gritar ya desde el comienzo del día: \"como busca la sierva sedienta el agua…así te busco yo a ti…\", sabemos que no podemos prescindir de ti.", "Gracias por habernos creado así. Y perdón por las veces que no te hemos respondido y hemos intentado ahogar esa necesidad. Tú que vives y reinas por los siglos de los siglos."]}, {"ref": "Cántico Sir 36, 1 -7", "sub": "es una suplica en favor de la ciudad santa.", "amb": ["Comenzar un nuevo día, conscientes de que Dios es lo más importante en nuestra vida, es el único modo de comenzarlo correctamente. Y la respuesta a nuestra vocación, es también la respuesta a esa gran realidad.", "Comenzaremos este cántico con una palabra clave: \"sálvanos\". Es decir: somos conscientes de que te necesitamos…y que de ti lo esperamos todo.", "Somos la nueva Jerusalén donde Dios reposa y se manifiesta, el nuevo pueblo que lleva su nombre, los escogidos para hacer presente y manifiesto el reino de Dios. Desde el modo de vivir nuestra vida estamos anunciando quién es Dios… cómo es Dios…dónde está Dios. Con nuestro modo de vivir, estamos definiendo a Dios.", "Nuestra responsabilidad es grande. Podemos hacer una gran labor o defraudar a Dios y a los hermanos, que nos necesitan.", "Dios quiere renovar sus prodigios, repetir sus portentos. Pero siempre condicionado por nuestra vida. Que la proclamación de este cántico, al comenzar el día, nos despierte y nos comprometa en nuestro modo de vivir.", "Que a través de nuestra vida, estemos proclamando que \"no hay otro Dios fuera de ti\" y lo confirmamos con la palabra de cada una de nuestras acciones."], "oracion": ["Señor, es todo nuestro ser el que te grita: \"sálvanos\". Y es que te necesitamos. Nuestra vida sin ti, no tiene sentido. Lo sabemos, pero no siempre lo vivimos.", "Al comenzar este día, nos abrimos a tú perdón, nosotros, los que llevamos tu nombre, los escogidos para hacerte presente en nuestro mundo. Y continuaremos gritando una vez más \"sálvanos\", desde el modo de vivir nuestra vida. Tú que vives por los siglos de los siglos."]}, {"ref": "Salmo 18 A", "sub": "es un himno al Dios creador del universo.", "amb": ["En el fondo, nuestra vocación es de contemplativos: Saber descubrir a Dios en todas sus obras. Ellas son la palabra silenciosa que nos habla de él, de su sabiduría, de su grandeza, de su amor… de su cercanía.", "Cada una de las criaturas que existen, no nos hablan en lengua extranjera, desconocida… Siempre nos hablan en nuestra propia lengua, la que aprendimos de la fe de nuestros padres. Lo que necesitamos es, escucharla, dejarnos sensibilizar por cada una de sus palabras, y así descubrir, cada día más, y mejor, la realidad de Dios.", "Nos ha tocado vivir en una época, consumista, materialista… que intenta sacarnos fuera de nosotros mismos, y no dejarnos vivir la vida como realmente es.", "Por otra parte, la actividad nos desborda. Nos creemos más eficaces cuando hacemos más cosas. Y descuidamos la actividad que da la verdadera eficacia a todo nuestro hacer: la actividad de Dios que empape todo nuestro hacer.", "Que durante todo este día que estamos comenzando, nos resuene el mensaje de este salmo, que vamos a proclamar."], "oracion": ["Señor, queremos decirte en los comienzos de este día: \"que admirable es tú nombre en toda la tierra\". Y de verdad que eres admirable. Basta contemplar cualquiera de tus obras, para que no salgamos de nuestro asombro, al ver lo que nos dices por medio de ellas.", "No queremos pasar por la vida con solo mirar, sin ver. Queremos mirar para ver. Así iremos descubriéndote y continuaremos dando profundidad a nuestra vida. Tú que vives por los siglos de los siglos."]}], "summary": {"breve": ["Salmo 41: Somos los sedientos de Dios. Sólo él puede calmar nuestra sed. Comencemos este día como ciervos sedientos que corren hacia la fuente. Dios mismo es nuestra agua.", "Cántico SIR.36: Somos el nuevo pueblo que lleva el nombre de Dios. Que hoy, como ayer le digamos \"sálvanos… muéstranos tu gloria\" para que todos reconozcan en nosotros, que no hay \"otro Dios fuera de ti\".", "Salmo 18 A: Todas las criaturas son una palabra silenciosa que nos invitan a reconocer a Dios, a admirarle, a alabarle y a agradecerle sus bondades Hagamos nuestra esa invitación."], "oracion": ["Salmo 41: Cantar la primera estrofa al principio y al final, y proclamar espontáneamente cada una de las estrofas.", "Cántico SIR 36: Proclamado al unísono.", "Salmo 18 A: Puede ser cantado, ó proclamado a dos coros."], "reflexion": ["Tiene sed de Dios, del Dios vivo…", "Renueva los prodigios, repite los portentos…", "A toda la tierra alcanza su pregón…"]}}, {"key": "oración de la tarde", "label": "Vísperas", "psalms": [{"ref": "Salmo 44, I", "sub": "es un poema de amor, a un Dios amor.", "amb": ["Dios es un enamorado de cada uno de nosotros. En este salmo 44, con expresiones profundas e íntimas, nos manifiesta su relación de amor. Y es que el verdadero amante sabe escoger palabras, llenarlas de sentido, para comunicarse con aquel a quien ama.", "Cada uno de nosotros, es un seducido por Dios. Nuestra vocación es una respuesta de amor a esa seducción. \"Somos los ungidos con aceite de júbilo…\" y \"nuestros vestidos huelen a mirra, a aloe…\"", "Vamos a terminar un día más de nuestra vida. Seguro que a lo largo de todas sus horas, hemos experimentado que Dios nos ama de verdad. Lo hemos comprobado en la oración de la mañana… en la Eucaristía… en la convivencia con los hermanos… en nuestros momentos más íntimos:\"el Señor te bendice eternamente\".", "Nuestra comunidad, debe reflejar, constantemente, que somos un grupo de enamorados de Dios y de nuestros hermanos. Es el testimonio que espera nuestro mundo, dividido por las guerras, los odios, los egoísmos…", "Nuestra vocación es una respuesta de amor, al Amor.", "Que sea verdad “Hemos conocido el amor. Hemos puesto en él nuestro ideal”. Ideal que vivimos y que manifestamos, para que “el mundo se renueve”."], "oracion": ["Señor, nos llena de alegría, saber que estás enamorado de nosotros. Pero si te somos sinceros, esa verdad no acaba de calar hasta lo más íntimo de nuestra vida. No terminamos de dar unidad a lo que sabemos con lo que vivimos. Esta tarde nos lo has recordado a fin de que reflexionemos demos profundidad a nuestra vida, y nos dejemos empapar por la caricia de tu amor.", "Te queremos manifestar, nuestra sincera disposición frente a ti, aunque a veces te fallemos. Sabemos que tu amor de Padre nos comprende y nos perdona siempre. Tú que vives por los siglos de los siglos."]}, {"ref": "Salmo 44, II", "sub": "sigue el poema de amor, fecundo, sin fronteras.", "amb": ["Fruto de un amor, hemos recibido una llamada que nos exige dejar nuestra casa, nuestro pueblo, nuestra familia… Es un quedarnos vacíos, para llenarnos con mayor plenitud. Es él quien va a llenar nuestra existencia. Y con nosotros va a fundar la gran familia de los hijos de Dios. Nos hará fecundos con una nueva fecundidad: nuestra fraternidad no tendrá fronteras de ninguna clase. Nuestra casa será el mundo. Nuestra familia, todos los humanos. Nuestro pueblo, todos los pueblos.", "Esta es nuestra vocación, y este es nuestro destino. Nuestro paso por este mundo, tendrá su fin. Pero seguiremos permaneciendo indefinidamente por generaciones y generaciones desde el testimonio de nuestras vidas. \"Quiero hacer memorable tu nombre\", es el plan de Dios sobre cada uno de nosotros. Es más: \"los pueblos te alabarán por los siglos de los siglos\", porque tu fecundidad no está fundada en la sangre sino en el Espíritu.", "Por nuestra vocación no renunciamos a nuestra necesidad de vivir en familia. Todo lo contrario. Descubrimos esa necesidad y nos comprometemos a vivirla a niveles tan profundos, que nuestra familia será una familia siempre abierta."], "oracion": ["Señor, gracias porque nos has llamado a formar parte de una gran familia: toda la familia humana es nuestra familia. Llamada que nos exige una respuesta comprometida. Somos los que debemos hacerte presente en nuestro mundo para conseguir que todos te reconozcan como Padre.", "Te has volcado sobre nosotros, para que por el testimonio de nuestra vida, todos descubran quién eres tú y cómo eres tú.", "Queremos ser fieles a tu llamada y a tu entrega. A ti que vives por los siglos de los siglos."]}, {"ref": "Cántico Ef. 1, 3-10", "sub": "hemos sido bendecidos en Cristo, con toda clase de bendiciones.", "amb": ["más no podíamos esperar de Dios nuestro Padre. Se ha volcado totalmente en la persona de Cristo, para volcarse en nosotros desde él y en él, y así hacernos hijos en el Hijo.", "En Cristo nos ha manifestado su plan maravilloso sobre cada uno de nosotros: el mismo Cristo es su plan, el proyecto que tienen pensado realizar.", "Proyecto pensado desde siempre, antes de crear el mundo. Proyecto gratuito, fruto de su amor sin límites. Antes que existiéramos, sin que hubiéramos hecho nada por nuestra parte, él, desde su generosidad, por pura iniciativa suya… lo ha trazado y está dispuesto a realizarlo, si no se lo impedimos. Proyecto con todas las garantías. Dios no se volverá a atrás. La misma persona de Cristo es la firma que lo acredita.", "Es justo que al proclamar este cántico rebosemos de alegría y de agradecimiento. De alegría, porque no podía hacer mayor prodigio en favor nuestro: hacernos hijos suyos. Y de agradecimiento, porque un gesto de amor tan grande no debe chocar en frío.", "En verdad podemos exclamar entusiasmados: \"somos importantes para Dios\"."], "oracion": ["Señor, queremos llamarte con una palabra que te define totalmente: PADRE. No se nos hubiera ocurrido a nosotros. Hubiera sido todo un atrevimiento. Pero, desde tu amor que no conoce limites, se te ha ocurrido a ti.", "Has querido hacernos hijos tuyos. Por eso, con toda verdad, podemos llamarte PADRE.", "Asombrados te decimos que no podías hacer más por nosotros: pobres criaturas con un destino insospechado: HIJOS DE DIOS.", "Gracias Padre y que tus hijos no te defraudemos, a ti que vives por los siglos de los siglos."]}], "summary": {"breve": ["Salmo 44, I: Dios es amor y sus relaciones con nosotros son desde el amor. Nuestra vocación es una respuesta a ese Dios que nos ha seducido. Somos los seducidos por Dios, desde su amor.", "Salmo 44, II: Porque nos ha seducido lo hemos dejado todo, para testimoniar que solo Dios basta. Y así hemos programado toda nuestra vida. No hemos sido llamados a la esterilidad, sino a la \"fecundidad\".", "Cántico EF. 1: Llenos de alegría bendigamos a Dios: no podía darnos mejor bendición, nos ha bendecido en Cristo, haciéndonos partícipes de su misma vida: hijos en el Hijo."], "oracion": ["Salmo 44, I: Es proclamado forma responsorial: el grupo proclama las estrofas y un solista contesta con \"El Señor te ha bendecido eternamente...\"", "Salmo 44, II: Es proclamado forma responsorial: el grupo proclama las estrofas y un solista contesta con \"Que llega el esposo, salid a recibirlo...\"", "Cántico EF. 1: Proclamado despacio, por todo el grupo con un fondo musical suave."], "reflexion": ["El Señor te bendice eternamente…", "Quiero hacer memorable tu nombre…", "Nos eligió ...para ser santos…"]}}]}, {"name": "martes", "hours": [{"key": "oración de la mañana", "label": "Laudes", "psalms": [{"ref": "Salmo 42", "sub": "es una lamentación individual, pidiendo auxilio.", "amb": ["Comenzamos el nuevo día, sintiendo y proclamando, una vez más, la realidad de nuestra vida: necesitamos a Dios, para vivir, y para enfrentarnos a problemas y situaciones difíciles, que solos no podemos superar.", "Por eso, el grito de nuestra oración:… \"sálvame… defiéndeme…. Envíame tu luz y tu verdad…\"", "Comenzar el día con esta actitud, es el mejor modo de facilitar a Dios su acción sobre cada uno de nosotros. Y es que sólo desde una actitud de apertura, de disponibilidad, por nuestra parte, es como Dios puede entrar en nuestra vida. Nos respeta tanto, que nunca nos forzará ni violentará. Sencillamente se nos ofrecerá. De nosotros depende lo demás.", "Con sinceridad… con verdad… dialoguemos con él, esta mañana… y manifestémosle que nos \"salve… nos defienda…\"", "De hecho, Dios siempre \"es nuestro protector, el que hace suya nuestra causa\". Por eso no tiene sentido el que \"andemos sombríos, cuando nos hostiguen nuestros enemigos\". Siempre podremos proclamar \"que yo me acerque al Dios de mi alegría\"."], "oracion": ["Señor, tu ayuda es algo que nos es imprescindible. Cuando intentamos prescindir de ti, entonces caemos en la cuenta de que nos estamos equivocando.", "Reconocemos que más de una vez hemos caído en esta equivocación. Hoy te manifestamos nuestro arrepentimiento y también nuestro deseo de ser consecuentes y coherentes contigo. Tú que vives y reinas por los siglos de los siglos."]}, {"ref": "Cántico Is. 38", "sub": "es una invitación a asumir la realidad de la otra vida.", "amb": ["Seguro de que en nuestra vida hemos tenido momentos felices que recordamos con cierta nostalgia: nuestra niñez… nuestra infancia… nuestros primeros años de Vida Religiosa… y otros muchos, que recordemos en este momento.", "Pero seguro, también, que hemos pasado momentos duros, difíciles… en los que tal vez hemos llorado lágrimas de sangre… lágrimas muy amargas.", "Pero esa es, la realidad de la vida: ni todos los momentos son felices… ni todos son tristes. La vamos viviendo y amasando con esas dos realidades.", "Este cántico de Is. es una invitación a concienciar y a asumir, con madurez, la realidad de la vida humana. Pero sobre todo, una gozosa invitación a no dejarnos aplastar por los problemas y dificultades que vayamos encontrando. Siempre abiertos a la esperanza… a una luz que iluminará nuestra tiniebla: Esa esperanza y esa luz, es la fuerza y la presencia de Dios. Nunca luchamos solos. En medio de nuestras luchas, está metido él: por eso la lógica de nuestro grito: \"Señor, que me oprimen… sal fiador por mí\"… SALVAmE… ayúdame…."], "oracion": ["Señor, nuestra vida se desarrolla entre luces y sombras, entre momentos fáciles y momentos no tan fáciles. Quisiéramos descubrir que tú no eres el \"ausente\" en ninguno de esos momentos. Tú estás en medio. Nunca nos dejas solos… a la intemperie. Y así, no nos desanimaremos ni perderemos la esperanza.", "Señor, luz en nuestras sombras… confiamos en ti, que vives por los siglos de los siglos."]}, {"ref": "Salmo 64", "sub": "es un himno que canta la acción gratuita de Dios.", "amb": ["Descubrir… caer en cuenta de lo que supone Dios en nuestra vida, es un gran descubrimiento. Así como es una gran tristeza pasar por la vida ciegos, ante realidades tan maravillosas.", "Este salmo 64, nos invita insistentemente a VER… y a AGRADECER.", "Toda la creación es un gran regalo de Dios a los humanos: la firmeza de los montes… el mar con sus olas… la belleza de los valles… el verdor de las praderas... y desde esta visión alzarse con un canto de alabanza a AQUEL que ha creado todas esas cosas pensando en servir… amar... agradar a los seres humanos, con la variedad y belleza de la creación.", "Desde este salmo 64 demos una respuesta de amor y de gratitud a quien todo lo ha preparado para nuestro bien.", "El \"merece un himno en Sión\" porque siempre \"escucha nuestras suplicas\". Todo \"mortal que acude a él, es perdonado\". \"Sus signos sobrecogen a todos los habitantes\".", "Toda la tierra es objeto de la acción de Dios: \"la riega, la deja mullida, bendice sus brotes, abundan los pastos, las praderas se cubren de rebaños…\" Y todo \"aclama y canta\" las maravillas del Señor.", "En nuestra oración de esta mañana, seamos nosotros los cantores de Dios."], "oracion": ["Señor, tú mereces el mejor de los cánticos… y la mejor de las melodías que proclamen quién eres tú… cómo eres tú… y cómo son todas tus obras.", "Que nuestras vidas sean ese cántico y esa melodía viva, que puedan oír todas las gentes y se unan a nosotros para que juntos, podamos cantarte el gran cántico y la gran melodía de la creación. Te lo mereces. Tú que vives por los siglos de los siglos."]}], "summary": {"breve": ["Salmo 42: Descubrir a Dios \"como el Dios de nuestra alegría\" es todo un reto para nuestra vida. Que nos acerquemos a él al son de nuestra cítara bien templada. Nada de angustias y congojas frente a Dios.", "Cántico IS. 38: No todo es fácil en la vida. Pero no nos dejemos aplastar por las dificultades. Dios siempre es nuestra fuerza. Confiemos y dejémosle actuar. Con él, es segura la victoria.", "Salmo 64: Gratitud debiera ser nuestro himno permanente. Dios siempre se nos manifiesta solícito de nuestro bien. Saber descubrirlo es una exigencia y una responsabilidad."], "oracion": ["Salmo 42: Cantar al principio y al final \"vamos cantando al Señor....\" y proclamar espontáneamente todas las estrofas.", "Cántico IS. 38: Es proclamado por dos solistas y canta el grupo cada dos estrofas: \"Protégeme Dios mío, me refugio en ti..\"", "Salmo 64: Se puede cantar todo ó cada tres estrofas, proclamadas por el grupo, cantar la primera."], "reflexion": ["Tú eres mi Dios y protector…", "Sálvanos, Señor, y tocaremos nuestras arpas…", "Los habitantes se sobrecogen ante tus signos…"]}}, {"key": "oración de la tarde", "label": "Vísperas", "psalms": [{"ref": "Salmo 48, I", "sub": "poema sapiencial sobre la vani- dad de las riquezas.", "amb": ["En la valoración de las realidades temporales, nuestros sentidos, nos pueden jugar una mala partida. Es nuestra razón la que tiene que guiarnos.", "Como humanos necesitamos los bienes materiales para el desarrollo de nuestra vida, es cierto. Pero el peligro está en que de la necesidad, hagamos una sujeción ó una esclavitud, y estemos al servicio de lo material. Nacidos para ser dueños de las cosas, podemos convertirnos en esclavos de ellas", "Este salmo 48 nos pone en vela y nos invita a la reflexión: \"oíd esto… escuchadlo todos…\". No confiéis en la opulencia… no os jactéis de vuestras riquezas… porque en la hora de la muerte, todo tenéis que dejarlo\"…", "De hecho, nosotros, hemos tomado una postura clara ante los bienes de este mundo. Por el compromiso de vivir en pobreza, hemos manifestado nuestra actitud ante las cosas: las utilizaremos, pero no nos dejaremos esclavizar por ellas. Y hemos puesto nuestra riqueza, en la riqueza verdadera de todo ser humano: Dios.", "Pero ante una sociedad consumista, materialista, tenemos el peligro de dejarnos influir. Estemos en guardia."], "oracion": ["Señor, tú has puesto a nuestra disposición todo lo que necesitamos para vivir. Todas las realidades temporales están a nuestro servicio. Pero somos conscientes de que podemos invertir el orden que tú sabiamente has establecido, y estar al servicio de las cosas, y hacer de nuestra vida, una lucha por tener y tener, olvidando que tú eres nuestra verdadera riqueza.", "Señor, que seamos sensatos y valoremos todo en su justa medida. Tú que vives por los siglos de los siglos."]}, {"ref": "Salmo 48, II", "sub": "poema sapiencial sobre el des- tino de los necios.", "amb": ["En este mundo, aparentemente, parece que los que triunfan, los que valen… son los poderosos, los que tienen. Y los sencillos, los humildes, los pobres… no tienen nada que hacer. Ese es el criterio de nuestra sociedad, materialista y consumista.", "En teoría, nosotros, no juzgamos las cosas así. Por nuestra profesión hemos adoptado el compromiso de estar al lado de los pobres, de los que sufren, de los que no tienen nada. Nos hemos comprometido a hacer presente al Jesús, que se acercaba a todos, especialmente a los más necesitados.", "Esta segunda parte del salmo 48, es una clara descripción del destino de quienes se dejan llevar del atractivo del \"tener\": …\"son un rebaño para el abismo… se desvanece su figura… son como un animal que perece... cuando mueran no se llevarán nada…\".", "Sin embargo, a nosotros, los que hemos adoptado una postura inteligente ante las riquezas, si somos consecuentes de verdad… \"Dios nos salva… nos saca de las garras del abismo…\"", "ojalá no fallemos en nuestros principios, para que nuestro testimonio, haga recapacitar a quienes hacen de su vida una lucha por tener y más tener."], "oracion": ["Señor, somos conscientes del peligro que entraña la utilización de los bienes materiales. Nos pueden cegar y que hagamos de unos medios, nuestro fin.", "Tú has iluminado nuestra vida y nos has hecho comprender, la verdadera postura que debemos adoptar. Que no nos desviemos. Y que nuestro testimonio sea una llamada para tantos hermanos nuestros obcecados por el tener. Tú que vives por los siglos de los siglos."]}, {"ref": "Cántico AP. 4,11", "sub": "cántico de los redimidos a su Redentor.", "amb": ["Dentro de la vivencia de nuestra vida cristiana, está la gran experiencia de sentirnos redimidos. De sentir que ha habido \"alguien\" que se lo ha jugado todo por nosotros, y nos ha sumergido en él, para comunicarnos su misma vida e ir transformándonos… cristificándonos… deificándonos... siempre desde el profundo respeto a nuestra identidad.", "Por eso, es justo que se lo agradezcamos, que le glorifiquemos, que nos alegremos de su grandeza y de su poder. Que toda nuestra vida sea un canto de gratitud, por la obra tan maravillosa que ha realizado en favor de hombres de toda raza, lengua, pueblo y nación. Ha hecho de nosotros un reino de sacerdotes, de reyes, y de profetas. Es decir, de humanos con la asombrosa capacidad de convertirse en hijos de Dios: humanos pero divinizados.", "Que la proclamación de este cántico, nos llene de alegría, y provoque en todos y en cada uno, el compromiso de vivir en profundidad nuestra vida cristiana.", "Y es que no hemos sido redimidos de cualquier manera. El precio de nuestra redención \"no ha sido ni oro ni plata\". Hemos sido pagados con la moneda de Dios mismo. Su sangre, ese ha sido nuestro precio. \"Con tu sangre nos compraste para Dios\".", "Es justo, pues, que proclamemos que \"es digno de recibir la gloria, el honor, el poder, y la alabanza\" de todos los humanos."], "oracion": ["Cristo, nuestro hermano, nuestra vida, nuestro TODO: gracias por tu entrega, por tu desinterés… por tu amor. No dudaste en llevar hasta el extremo tus manifestaciones de amor hacia nosotros.", "Nuestra respuesta es la mejor alabanza que podemos dirigirte. Pero somos conscientes de nuestros fallos, de nuestros olvidos, de nuestras rutinas. Un \"perdónanos\" sincero es lo que te decimos esta tarde. A ti que vives por los siglos de los siglos."]}], "summary": {"breve": ["Salmo 48, I: Como humanos, la necesidad de lo material, nos puede ofuscar y hacernos perder de vista otros valores más fundamentales. Los medios son medios y nada más. No pararnos en ellos.", "Salmo 48, II: Los criterios de una sociedad consumista y materialista nos pueden despistar. Tengamos una postura inteligente y realista ante las cosas materiales y demos testimonio de ello a nuestro mundo.", "Cántico AP. 4, 11: Una realidad que está ahí: no se desdeñó de acercarse a nosotros, y con su muerte decirnos la gran palabra de amor. Es justo que le admiremos, le felicitemos y se lo agradezcamos."], "oracion": ["Salmo 48, I: Proclama un solista las dos primeras estrofas y se canta \"Tu Palabra me da vida....Y sigue el grupo proclamando el resto del salmo.", "Salmo 48, II: Todo él es proclamado por un solista.", "Cántico AP. 4: Proclamado despacio por todo el grupo."], "reflexion": ["Serán muy sensatas mis reflexiones…", "Pero a mí, Dios me salva…", "Compraste con tu sangre hombres de toda raza…"]}}]}, {"name": "miércoles", "hours": [{"key": "oración de la mañana", "label": "Laudes", "psalms": [{"ref": "Salmo 76", "sub": "es una lamentación individual de añoranza de un pasado.", "amb": ["Nos ha tocado vivir en una época de cambio… de profundas transformaciones en todos los sectores de la sociedad: políticos, económicos, sociales, ideológicos… etc, etc… con una repercusión muy honda en el sector \"religioso\"… y concretamente en la Vida Religiosa. Y por más que nos empeñemos, no somos ajenos a las influencias de estos cambios. Nos están influyendo.", "Y todo cambio nos cuestiona… es más, nos problematiza en los principios que creemos ó creíamos inconmovibles y seguros: \"es que el Señor nos rechaza… se ha agotado su misericordia… se ha terminado su promesa… se ha olvidado de su bondad…\". \"Recuerdo tiempos antiguos…\".", "Todo esto trasladado a nuestro ahora: \"qué ha pasado de aquello… y de aquello otro… qué sentido tiene mi vida actual… qué será de mi Congregación…\". Toda una serie de interrogantes que nos tambalean y nos llenan de inquietud.", "El mismo salmo, nos invita a la confianza… a la esperanza: \"Señor, tus caminos son santos… haciendo maravillas, mostrarte tu poder… rescataste a tu pueblo…\" tormentas… rayos… truenos… Pero tú, te abriste camino… mientras guiabas a tu pueblo…\". Hoy se cumple entre nosotros el mensaje de este salmo 76. Que se cambie nuestro pesimismo en optimismo: seamos profetas de ESPERANZA."], "oracion": ["Señor, desde las realidades que vemos, y que estamos viviendo, a veces nos invade el desaliento y la desesperanza. Se nos plantean interrogantes a los cuales no encontramos una respuesta satisfactoria, desde nuestros razonamientos.", "Pero queremos abrirnos a la \"esperanza\" que eres tú, apoyados en tu palabra. Tú no nos puedes fallar. Aunque nos parezca que todo se hunde a nuestros pies, confiados en ti, seguiremos en la lucha y sembraremos esperanza, entre los desesperanzados.", "\"Es hora de ser ESPERANZA\". Tú que vives por los siglos de los siglos."]}, {"ref": "Cántico 1ª Sm. 2", "sub": "es un cántico cargado de esperanza en el poder del Señor.", "amb": ["Necesitamos profetas de esperanza, mensajeros que nos alienten en nuestros desalientos.", "Este cántico de Samuel, está empapado de un optimismo alentador: \"los cobardes se hacen valientes… los hambrientos engordan… la mujer estéril es madre de muchos hijos… el Señor ayuda al desvalido… saca de entre las basuras al pobre… guarda a sus amigos…\" Por eso… \"mi corazón se regocija… mi poder se exalta de gozo con tu salvación… no hay nadie como el Señor…\".", "Comenzar el día abiertos a la acción de Dios es comenzarlo esperanzados y alentados ante posibles sorpresas, que nos puedan venir.", "Ser luchadores… valientes… decididos… siempre seguros de que estamos respaldados en nuestras luchas por la fuerza del ESPIRITU: \"El hombre no triunfa por su fuerza… Pero el Señor da fuerza a su Rey, exalta el poder de su Ungido\". Abrámonos a la esperanza. Cierto que nuestras fuerzas son limitadas. Pero la fuerza del Señor, no tiene límites. Y él es nuestra fuerza, nuestra roca, nuestra salvación.", "Sembremos… no nos preocupemos por la recolección del fruto. Alguien lo recogerá. Disfrutemos de la alegría de la siembra."], "oracion": ["Señor, queremos compartir contigo la alegría que sentimos por tu cercanía en nuestras vidas. Aunque a veces nos invada el desaliento, sabemos que tú estás presente en nuestros caminos, en nuestras luchas, en nuestros triunfos y… también en nuestras derrotas. Por eso nos sentimos alegres y queremos seguir en la lucha.", "Nuestro mundo nos necesita así: luchadores que contagien con su esfuerzo en la lucha por un mundo mejor: lleno de paz…de alegría…de libertad…de felicidad…de fraternidad… lleno de Dios. Que vive y reina por los siglos de los siglos."]}, {"ref": "Salmo 96", "sub": "es un himno que proclama la grandeza del Señor.", "amb": ["La presencia del Señor lo cambia todo. Por eso \"alegraos justos con el Señor… celebrad su santo nombre\".", "Por más que nos empeñemos no podemos construir un mundo marginando ó arrinconando a Dios. El intento de \"matar a Dios\", es nuestro propio suicidio. \"Los que adoran estatuas sin vida... muertas… los que construyen sus propios ídolos… viven el sonrojo… la frustración de su existencia, viven una vida sin sentido... vacía… alienante… sin más perspectivas que la tristeza de su muerte\".", "Por el contrario, cuando Dios es el centro de nuestra vida, y ocupa el puesto que él y nosotros necesitamos que ocupe… todo cambia, todo es distinto: \"amanece la luz para el justo y la alegría para los rectos de corazón\".", "Que nuestros convencimientos de estas realidades, no se nos queden tan sólo en la cabeza. Que bajen hasta los pies, y los hagamos vida de nuestras vidas: \"el valor de una idea, reside en que se haga vida\". Esta es la verdadera sabiduría que nos convierte en verdaderos sabios."], "oracion": ["Señor, todo es distinto contemplado desde ti. Y es que sol
