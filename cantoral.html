ibertat.", "2. Tu portes l’alegria<br>al pobre i al malalt.<br>Tu ets la llum que ens guia<br>vers Crist, cabdill immortal.", "3. A l’ombra dels teus braços<br>el món la pau buscarà.<br>Com Crist, amb claus per llaços,<br>per tu el cel guanyarà."]}, {"n": "543", "t": "Pare, he pecat contra el cel i contra vós", "p": ["<b>Pare, he pecat contra el cel i contra vós.<\/b>", "1. La llei vostra oblidava i, deixat el bon camí<br>m’he trobat lluny de casa enfonsat en el pecat.", "2. Vós, Senyor, perdoneu-me i salveu-me de la mort.<br>Si em renteu de les culpes seré blanc, més que la neu.", "3. Retorneu-me a la joia per un ferm penediment;<br>esborreu de ma vida els senyals dels meus pecats.", "4. Oh, Senyor, compassívol, de bonesa sense fi,<br>cantaré mentre visqui l’alegria del retorn."]}, {"n": "544", "t": "Mireu, Senyor, nostra misèria", "p": ["<b>Mireu, Senyor, nostra misèria<br>i perdoneu nostre pecat.<\/b>", "1. Damunt l’abisme de la culpa<br>Déu ha allargat el seu amor,<br>i amb peu eixut podem atènyer<br>l’ampla ribera del perdó. (2)", "2. Rondava trist per les tenebres<br>l’home indigent i pecador,<br>mes vigilava ses petjades<br>l’esguard amable del Senyor. (2)", "3. Déu s’ha oblidat de les ofenses<br>i ha estès un vel sobre el pecat,<br>com el Pastor que sempre espera<br>l’anyell perdut del seu ramat. (2 )", "4. Alcem els ulls a la clemència<br>del qui no ens nega sa amistat.<br>Tornem al Pare, que el fill pròdig<br>a preu de Sang ha rescatat. (2)", "5. Anem amb fruits de penitència<br>cap al convit de germanor,<br>i brindarem plens de gaubança<br>amb l’aigua viva del perdó. (2)"]}, {"n": "545", "t": "Jesús estén els braços", "p": ["1. Jesús estén els braços<br>i abraça tot el món.<br>Als seus botxins es lliura<br>vestit d’indignitat.<br>I es fa, per causa nostra,<br>anyell d’expiació<br>que al Pare etern s’immola,<br>sotmès i des, trossat.", "2. La carn d’assots marcada,<br>d’espines coronat,<br>és Déu i en creu expira,<br>clavat de mans i peus.<br>La llança el pit li obria,<br>els homes l’han befat...<br>Oh mort que ens dónes vida!<br>Oh glòria de la creu.", "3. Ningú com Ell no estima<br>ni es lliura al sofriment;<br>donant la pròpia vida<br>la nostra redimeix.<br>La fosca ja és vençuda;<br>la nova llum ja neix.<br>Nodreixi’ns l’esperança<br>sentint-nos fills de Déu.", "4. Ell diu: &quot;Si algú m’estima<br>que ens negui a si mateix<br>i vingui amb la creu seva<br>seguint el meu camí.&quot;<br>Seguim-lo amb fe serena,<br>no ens faci por la mort;<br>per sempre podrem viure<br>ressuscitant en Crist."]}, {"n": "548", "t": "Creu de Crist, arbre de vida", "p": ["Creu de Crist, arbre de vida.<br>Creu de Crist, de sang tenyida.<br>Creu de Crist, pau i combat.<br>Creu de Crist, mort i victòria.<br>Creu de Crist, camí de glòria.<br>Creu de Crist, que ens ha salvat."]}, {"n": "549", "t": "Escoltem la paraula que ens convida", "p": ["1. Escoltem la paraula que ens convida<br>a sortir de l’Egipte del pecat,<br>emprenent el camí de nova vida,<br>convertim-nos de cor a la veritat.", "2. Caminem pel desert, i tot fent via<br>sentirem la presència del Senyor;<br>en l’esperit, el doll fresc de l’alegria<br>del qui estima en la prova del dolor.", "3. Brollarà de la roca l’aigua viva,<br>i del cor trossejat, la nova deu,<br>guanyarem les batalles sense minva<br>amb el nou Moisès braços en creu.", "4. Del Nil al Jordà, fet profecia<br>d’una terra que raja llet i mel,<br>convertit el mannà en Eucaristia,<br>del desert, en farem camí del cel."]}, {"n": "550", "t": "Vaig sol per la terra", "p": ["1. Vaig sol per la terra,<br>però vós sou l’amic que em coneix el pas.<br>Als ulls duc tenebra,<br>vós sou la claror que me la fondrà.", "<b>Pietat, Déu benigne, tingueu pietat.<\/b>", "2. A1 meu cor hi ha cendra,<br>al vostre, aquell foc que renova el món.<br>Tot el cos em sagna,<br>de les vostres mans raja salvació.", "3. Camino entre dubtes;<br>per fer-vos company, vós us apropeu.<br>Vaig ple de tristesa,<br>m’arriba el ressò de la vostra veu.", "4. La nit em vol prendre,<br>però tot s’aclareix, si partiu el pa.<br>La mort em vol perdre;<br>vós heu ressorgit: ja no em vencerà.", "5. Tinc les mans molt plenes:<br>però em diu la creu que m’haig de buidar.<br>Visc ple de quimera:<br>sento l’esperit que em mou a estimar.", "6 El meu pou s’asseca,<br>vós hi feu brollar la deu eternal.<br>La fam em tortura:<br>menjaré la carn de l’Anyell pasqual."]}, {"n": "551", "t": "Senyor, no ens deixis, t’ho demanem", "p": ["<b>Senyor, no ens deixis, t’ho demanem,<br>en el mal que tan sovint fem.<br>No t’allunyis, Senyor, revela’t Salvador.<br>Dóna’ns un cor nou perquè et vegem.<\/b>", "1. Cercant miratges, lluny de la llar,<br>hem perdut el nom que ens vas dar.<br>El camí de retorn va de la nit al jorn;<br>l’esperança ens hi fa caminar.", "2. Que lluny seria la salvació<br>si el Senyor, com a prova d’amor,<br>no ens hagués enviat el seu Fill estimat<br>en la lluita amb el mal d’aquest món.", "3. Ens ha salvat per la seva sang:<br>cel rogent, de ponent a llevant.<br>Per la lluita del Crist la vida ha ressorgit.<br>Ens ha omplert del seu Esperit Sant."]}, {"n": "552", "t": "Pietat, oh Déu, vós que sou bo", "p": ["1. Pietat, oh Déu, vós que sou bo;<br>vós que estimeu perquè sou l’Amor;<br>renteu-me bé del meu gran pecat,<br>purifiqueu el meu mancament.", "2. Prou reconec el meu pecat,<br>i el mal que he fet, sempre el tinc present;<br>és contra vós, contra qui he pecat,<br>i en vós he ofès tots els meus germans.", "3. Creeu en mi un cor ben pur,<br>feu-me sentir vostre esperit sant;<br>no m’amagueu vostre esguard serè:<br>Torneu-me el goig de la salvació."]}, {"n": "553", "t": "El camí que féu Jesús", "p": ["1. El camí que féu Jesús,<br>Ell tot sol el va seguir,<br>oh!, Ell tot sol, per tots nosaltres,<br>Ell tot sol el va seguir.", "2. El camí que jo he de fer,<br>ningú no el pot fer per mi,<br>oh!, l’he de fer jo amb tots vosaltres;<br>ningú no el pot fer per mi.", "3. Caminant al costat vostre,<br>portaré la meva creu,<br>oh!, com féu Jesús en el Calvari,<br>portaré la meva creu.", "4. El camí que ens cal recórrer,<br>tots plegats l’hem de seguir,<br>oh!, amb els qui han anat al davant nostre,<br>tots plegats l’hem de seguir."]}, {"n": "554", "t": "Hi eres tu quan el duien a la Creu? (2)", "p": ["1. Hi eres tu quan el duien a la Creu? (2)<br>Oh, sovint quan penso això, tremolo, tremolo.<br>Hi eres tu quan el duien a la Creu?", "2. Hi eres tu quan a l’Arbre el van clavar?", "3. Hi eres tu quan la llança el va ferir?", "4. Hi eres tu quan el varen davallar?"]}, {"n": "556", "t": "T’estem cridant tota la nit, Senyor!", "p": ["<b>T’estem cridant tota la nit, Senyor!<br>Hem marcat el camí...<br>T’estem cridant tota la nit, Senyor!<br>Ja no tardis més a venir.<\/b>", "1. D’eslògans i de veus ens n’hem cregut el so,<br>i són miratges al desert, no són paraules de debò...<br>Ens hem anat venent la llibertat i el cor,<br>i ens hem comprat seguretats que eren paranys amb tanca d’or...", "2. Oh, fes-nos retornar al sol dels teus camins!<br>La teva plets és el record que hem enyorat desert endins...<br>Vas dir que el bon pastor deixa tot el ramat<br>per una ovella que en la nit –una tan sols– s’ha esgarriat..."]}, {"n": "557", "t": "Déu té nom", "p": ["1. Déu té nom: Ell és sempre amb el seu poble,<br>solidari dels pobres i oprimits,<br>consciència i clam en els profetes<br>fent memòria contra tants oblits.", "2. Quaranta anys pel desert, l’Egipte enrera,<br>fent camí, l’horitzó verge al davant:<br>llibertat que és tot festa en l’assemblea,<br>terra nova que el poble va creant.", "3. Som temptats de tornar al vell esclavatge:<br>els vells ídols són dolços d’enyorar...<br>Car seguir l’Esperit vol dir tothora<br>inventar de bell nou, recomençar.", "4. Però el nou pa el pasta un poble que treballa,<br>la suor raja alegre si és per tots;<br>llet i mel regalimarà la terra,<br>oliveres i palmes trauran brots.", "5. I Jesús ens dirà: &quot;convé que sigui&quot;<br>i obrirà al cel les branques de la creu,<br>i els clavells duran sang del seu Calvari<br>i la vida de tots tindrà aquest preu."]}, {"n": "558", "t": "Creu senyera, santa i pura", "p": ["1. Creu senyera, santa i pura,<br>que del món dus el rescat,<br>on Jesús per dar-nos vida<br>va morir sacrificat,<br>tu ets el lleny que dus els homes<br>cap al port d’eternitat.", "2. Tu est victòria, llum i guia,<br>tu ets consol de l’afligit;<br>tu ets el far que sempre brilla<br>i aclareix la fosca nit;<br>arbre sant que estens les branques<br>sobre el món que has redimit.", "3. Des que en tu Jesús moria,<br>ets senyal de salvació.<br>Instrument de mort i oprobi,<br>eres símbol del dolor.<br>Si eres signe d’esclavatge<br>ara ho ets de redempció.", "4. De l’Anyell la sang sagrada<br>en vessar-se et consagrà.<br>Creu ungida amb sang divina,<br>arbre sant que Déu regà,<br>la teva ombra el món marcava<br>d’un senyal que no es fondrà.", "5. Tu ens atreus, oh creu sagrada,<br>i ens unim al teu voltant.<br>Font d’amor i sacrifici,<br>de perdó i d’humilitat,<br>tu est la pau que el món demana<br>i només tu pots donar.", "6. Per a tots estens els braços,<br>per a tots Jesús morí.<br>Com podríem separar-nos<br>els germans que Déu uní!<br>Als teus peus, senyera santa,<br>l’univers s’ha de rendir."]}, {"n": "559", "t": "Jo era tot ple d’angoixa", "p": ["1. Jo era tot ple d’angoixa,<br>i el Senyor vaig invocar;<br>el dolor m’atuïa,<br>no em deixava respirar.<br>El meu clam pujava<br>al Senyor i Ell m’escoltà.", "2. El Senyor és benigne;<br>Ell és just amb els fidels;<br>Ell és llum en la fosca<br>i és camí que mena al Cel.<br>Ell la meva vida<br>de la mort ha deslliurat.", "3. Del Senyor tot ho espero;<br>Ell sadolla el famolenc;<br>Ell la set apaivaga;<br>només Ell em pot salvar.<br>Ja els meus ulls no ploren.<br>i els meus peus petgen segurs.", "4. Cal per sempre estimar-lo,<br>i lloar-lo a tota veu.<br>Dalt del cel, algun dia,<br>del seu rostre fruirem.<br>Tots, germans, l’Altíssim<br>lloarem eternament."]}]}, {"name": "Pasqua", "songs": [{"n": "561-1", "t": "Crist ha ressuscitat", "p": ["<b>Crist ha ressuscitat, al·leluia!<br>i ens fa passar de mort a vida, al·leluia!<br>Avui per tota la terra<br>el poble dels redimits canta: al·leluia, al·leluia!<\/b>", "1. Enaltiu el Senyor, que n&#x27;és de bo,<br>perdura eternament el seu amor.", "2. Que responguin els qui veneren el Senyor,<br>perdura eternament el seu amor.", "3. No moriré, viuré encara,<br>per contar les proeses del Senyor.", "4. Obriu-me les portes dels justos,<br>entraré a donar gràcies al Senyor.", "5. Avui és el dia en què ha obrat el Senyor,<br>alegrem-nos i celebrem-ho.", "6. Beneït el qui ve en nom del Senyor,<br>el Senyor és Déu: que Ell ens il·lumini."]}, {"n": "561", "t": "Oh! canta, canta la victòria", "p": ["1. Oh! canta, canta la victòria<br>del cèlic Redemptor;<br>poble novell canta la glòria<br>de la Redempció.<br>Al·leluia, Al·leluia, Al·leluia!", "2. Canta l’aurora que expel·lia<br>del món la tenebror;<br>avui el Crist la mort vencia<br>ornat de resplendor.<br>Al·leluia, Al·leluia, Al·leluia!", "3. Canta la Pasqua: que ens esposa<br>joiós el diví Anyell;<br>car amb sa sang que el món arrosa<br>signà el pacte novell.<br>Al·leluia, Al·leluia, Al·leluia!", "4. Canta al Senyor: que els cels conviden,<br>ja oberts, el cor amant;<br>ran del sepulcre els Àngels criden<br>a festa triomfant.<br>Al·leluia, Al·leluia, Al·leluia!", "5. Glòria a Vós, eternal Pare,<br>i al Fill que ens redimí,<br>glòria a Vós, Amor encara,<br>i honor sia sens fi.<br>Al·leluia, Al·leluia, Al·leluia!"]}, {"n": "562", "t": "El Crist Senyor ressuscità!", "p": ["<b>Al·leluia, al·leluia; al·leluia.<\/b>", "1. El Crist Senyor ressuscità!<br>Vencé la mort, i és gloriós.<br>El seu triomf volem cantar.<br>Al·leluia.", "2. Les santes dones van venir<br>fins al sepulcre del Senyor<br>el cos de Crist volent ungir.", "3. La nova un àngel va donar;<br>&quot;Per què el cerqueu ací, entre els morts?<br>Tal com digué, ressuscità!&quot;", "4. Quan els deixebles ho han sabut,<br>Joan i Pere ja hi fan cap,<br>i el sant sepulcre troben buit.", "5. A Magdalena es presentà<br>i ella Jesús reconeixent<br>als peus del Mestre es va llançar.", "6. Ara als apòstols aplegats<br>es fa present i els diu: &quot;Sóc jo.<br>Mireu les mans i els peus marcats.&quot;", "7. Tomàs no hi era i no ho cregué<br>fins que el va veure amb els seus ulls.<br>&quot;Senyor i Déu meu! &quot;, llavors digué.", "8. La benaurança prometé<br>als qui creuran amb cega fe.<br>&quot;Senyor i Déu meu! &quot;, diguem també.", "9. Els dos deixebles d’Emaús<br>en la fracció del pa també<br>van reconèixer el Crist Jesús.", "10. Cantem amb joia el Salvador<br>que vida nova ens ha donat.<br>Donem tots gràcies al Senyor!"]}, {"n": "563", "t": "Crist, el nostre Anyell Pasqual", "p": ["<b>Crist, el nostre Anyell Pasqual ha estat immolat.<\/b>", "1. Per això celebrem la festa de Pasqua<br>vivint amb sinceritat i veritat. Al·leluia.", "2. Lloeu el Senyor, tots els pobles,<br>glorifiqueu-les totes les nacions.<br>Es immens el seu amor per nosaltres,<br>la fidelitat del Senyor durarà sempre. Al·leluia."]}, {"n": "564", "t": "Quan pressentim, veient la branca nua", "p": ["1. Quan pressentim, veient la branca nua,<br>que, malgrat tot, l’ametller florirà;<br>quan esperem al cor de la nit crua,<br><b>la nostra alegria ningú no ens la prendrà! (2)<\/b>", "2. Si en soledat vetllem el ble que crema<br>per si un .amor ens allarga la mà;<br>quan l’amistat desbordi tot esquema,<br><b>la nostra alegria ningú no ens la prendrà! (2)<\/b>", "3. Jesús, d’abans, anava fent-nos veure<br>que allò que hom vol sempre ho pot abastar.<br>La fe, a la creu, s’arrapa com una heura:<br><b>la nostra alegria ningú no ens la prendrà! (2)<\/b>", "4. Ara el sabem vivent: amb amor paga<br>–memorial de partir-nos el pa–,<br>i és com un vi que es vessa i embriaga:<br><b>la nostra alegria ningú no ens la prendrà! (2)<\/b>"]}, {"n": "565", "t": "Proclamem amb gran joia i alegria", "p": ["1. Proclamem amb gran joia i alegria,<br>l’esperit ple de llum i claredat,<br>el missatge joiós del tercer dia.<br>Realment, el Senyor ha ressuscitat.", "2. Germans homes, amics, que tot fent via<br>manteniu l’esperança en el combat,<br>escolteu la paraula que anuncia:<br>Realment, el Senyor ha ressuscitat.", "3. La victòria del Crist és la certesa<br>que tot home ha estat alliberat<br>de la mort, del pecat, de la feblesa:<br>Realment, el Senyor ha ressuscitat.", "4. En el cor de la vida i la mort d’ara<br>el misteri de glòria ha començat,<br>l’Esperit de Jesús, Amor del Pare:<br>Realment, el Senyor ha ressuscitat.", "5. Cessaran en el món l’odi i la guerra,<br>tots els pobles viuran en la unitat;<br>que la joia de viure ompli la terra:<br>Realment, el Senyor ha ressuscitat."]}, {"n": "566", "t": "Al·leluia, Al·leluia!", "p": ["<b>Al·leluia, Al·leluia!<br>Ple de vida, Crist ens ha salvat!<br>Ell ens porta l’esperança.<br>Alegrem-nos tots: Al·leluia!<\/b>", "1. Crist és el nostre Anyell Pasqual;<br>l’Anyell que ha estat immolat.<br>Ell ha vençut el dol de la mort<br>i ha guanyat la llibertat.", "2. Els apòstols han vist el Crist<br>ressuscitat d’entre els morts.<br>La fe en el testimoniatge d’ells<br>porta la salvació.", "3. Submergits en la mort del Crist,<br>hem mort al món i al pecat.<br>Per l’aigua i el foc de l’Esperit<br>el seu nom ens ha donat.", "4. Si amb el Crist hem ressuscitat, <br>cerquem les coses de dalt.<br>Visquem, units amb tots els germans, <br>l’alegria i l’amistat."]}, {"n": "567", "t": "Cantarem! Dansarem!", "p": ["<b>Cantarem! Dansarem!<br>Cridarem la nostra joia a tot arreu!<\/b>", "El Crist ha vençut! Ha ressuscitat!<br>Hem estat salvats tots els germans!<br>Al·leluia! Al·leluia! <br>Au, companys, proclamem:<br>Crist ja no mor! Crist ha vençut!"]}, {"n": "568", "t": "En vós exulten tots els àngels", "p": ["1. En vós exulten tots els àngels,<br>de llum el món heu inundat;<br>plena és la terra d’alegria:<br>vós l’heu rentada del pecat.<br>En vós exulten tots els àngels,<br>oh, Crist Jesús ressuscitat.", "2. La fosca nit heu fet enrere,<br>la mort per sempre heu derrotat.<br>La Redempció tan esperada <br>s’ha fet en vós realitat.<br>La fosca nit heu fet enrere,<br>oh, Crist Jesús, ressuscitat.", "3. Vostre triomf ens renovella,<br>de l’home vell som deslliurats.<br>Ressuscitant el tercer dia<br>en homes nous ens heu tornat.<br>Vostre triomf ens renovella,<br>oh, Crist Jesús ressuscitat.", "4. En vós l’amor vencia l’odi<br>i el dol en glòria heu transformat. <br>Mort i fracàs per obra vostra<br>vida i victòria s’han tornat.<br>En vós l’amor vencia l’odi,<br>oh, Crist Jesús ressuscitat.", "5. Sigueu present enmig dels homes,<br>de l’esclavatge feu-nos francs.<br>I enrobustiu-nos l’esperança<br>del gran triomf tan desitjat.<br>Sigueu present enmig dels homes,<br>oh, Crist Jesús ressuscitat.", "6. Sigui la pau sempre amb nosaltres,<br>la pau que Vós heu predicat,<br>la pau dels homes i dels pobles,<br>feta de Llum i Veritat.<br>Sigui la pau sempre amb nosaltres,<br>oh, Crist Jesús ressuscitat.", "7. Que us puguem veure cara a cara<br>quan de la mort haurem triomfat,<br>i que a la fi dels nostres dies<br>de vostra Llum fruïm l’esclat.<br>Que us puguem veure cara a cara,<br>oh, Crist Jesús ressuscitat."]}, {"n": "569", "t": "Triomfant, triomfant, Crist Jesús es troba", "p": ["<b>Triomfant, triomfant, Crist Jesús es troba<br>triomfant, ressuscitat, es troba en l’Església.<\/b>", "1. Ell el seu poble, convoca pels apòstols<br><b>i els cors proclamen pertot arreu<br>la vida que Ells ens dóna.<\/b>", "2. Ell el seu poble, amb el baptisme renta. <br><b>I els cors.<\/b>..", "3. Ell el seu poble, amb l’Esperit fa créixer.", "4. Ell al seu poble, l’Eucaristia dóna.", "5. Ell el seu poble, perdona cent vegades.", "6. Ell el seu poble, vol ferm en l’esperança.", "7. Ell al seu poble, la fe i l’amor suscita.", "8. Ell al seu poble, hereu del Cel nomena."]}, {"n": "570", "t": "Contemplant la claror d’aquest nou dia", "p": ["1. Contemplant la claror d’aquest nou dia,<br>en que Crist, el Senyor, ha ressuscitat, <br>tots els homes esclaten d’alegria<br>i cerquen veure e1 qui els ha alliberat.", "2. Ell, que un jorn, en la creu, humil moria,<br>ara torna a ser al nostre costat,<br>com, fa poc, als deixebles prometia.<br>Novament, podem dir, que l’hem trobat.", "3. Vers el Regne futur s’obre una via:<br>Pare, Fill i Esperit ens hi han menat.<br>Si Jesús és qui a tots ens redimia,<br>glòria a Crist que un nou cel ens ha guanyat.", "Amén, al·leluia. Amén. Al·leluia, Al·leluia."]}]}, {"name": "Esperit Sant", "songs": [{"n": "571", "t": "Veniu, oh Esperit Sant, Aura divina", "p": ["1. Veniu, oh Esperit Sant, Aura divina,<br>baixeu del cel als cors que haveu creat;<br>Pentecostès l’obra del Crist culmina:<br>veniu, Amor sagrat.", "2. Veniu, oh Alè diví, que fecundàreu<br>la massa informe en el convenç del món;<br>paraules als profetes inspiràreu<br>que avui complides són.", "3. La llei d’amor que avui heu promulgada<br>el pacte Sinaític, ha marcit:<br>és plenitud la Pasqua, ben granada<br>de fruits de l’Esperit.", "4. Consolador, present de l’etern Pare<br>que avui el Crist envia des del cel;<br>baixà brumint la vostra llum preclara<br>que inflama el cor fidel.", "5. Vós segelleu la Trinitat divina,<br>de Pare i Fill Amor substancial;<br>i sou pels cors fontana cristal·lina<br>d’amor celestial.", "6. Amb vostres dons se sent l’Església ardida<br>i surt al món, el Crist glorificant;<br>Vós embelliu sa Esposa redimida,<br>verger que és d’amor sant.", "7. Del cor mortal sou vós l’hoste dolcíssim<br>on troba fortitud per triomfar;<br>feu-ne, si us plau, un temple de l’Altíssim<br>i encens del vostre altar.", "8. A vós, Pare eternal, donem lloança,<br>i a Jesucrist, el nostre Redemptor;<br>honor a vós, Amor, que sou gaubança<br>del fills d’adopció. Amén. Al·leluia."]}, {"n": "572", "t": "Ens has donat, oh Déu, el teu Esperit", "p": ["Ens has donat, oh Déu, el teu Esperit,<br>que ens convoca per formar la teva Església;<br>l’Esperit d’amor que ens dona vida,<br>que ens dóna la força d’estimar,<br>que ens aplega tots en la unitat.", "Quan envies el teu alè, reneix la creació,<br><b>i renoves la faç de la terra.<\/b><br>Per l’Esperit que habita en nosaltres,<br><b>som fills teus i clamem: &quot;Pare&quot;.<\/b><br>Amb l’impuls del teu amor<br><b>volem construir un món més fraternal,<\/b><br>i amb un sol cor i una sola ànima<br><b>cantar les teves meravelles.<\/b>", "Glòria al Pare, i al Fill, i al Sant Esperit,<br>al Déu, creador i sobirà,<br>que fou i és, i serà sempre:<br>des d’ara i pels segles del segles. Amén."]}, {"n": "573", "t": "Veniu, Esperit Sant", "p": ["<b>Veniu, Esperit Sant:<br>Veniu a il·luminar el cor dels cristians.<br>Veniu, Esperit Sant. Veniu, Esperit Sant.<\/b>", "1. Jesucrist ha tornat al si del Pare,<br>mes no ens ha deixat sols.<br>Ha enviat, com un foc que no s’apaga,<br>l’Esperit de consol.", "2. Ha florit una nova primavera<br>dins el poble de Déu.<br>Un carisma constant de renaixença<br>ha vençut l’home vell.", "3. Amb paraules de vida i testimoni<br>escrivim els creients<br>el capítol darrer de nostra història<br>en el llibre del temps.", "4. És el temps de la gran misericòrdia.<br>És el temps de la fe.<br>L’Esperit ha inundat la seva Església<br>com un aire serè.", "5. Celebrem tots units, amb cants de joia,<br>el dia del Senyor,<br>i tornem al treball amb noves forces,<br>a plantar ceps d’amor.", "6. Quan acabi el jornal de nostra vida,<br>dormirem, renovats,<br>en els braços de Déu, i l’esperança<br>fruitarà eternitat."]}, {"n": "574", "t": "Per inventar la llibertat", "p": ["1. Per inventar la llibertat,<br>esbotzarem tanques i portes.<br>Per fer brostar la veritat,<br>esporgarem les branques mortes.", "<b>Vine Esperit, mestral del món,<br>que al teu embat tot se somou.<br>Vine Esperit, caliu del món,<br>fes-nos renéixer amb un cor nou.<\/b>", "2. Perquè el món nou vagi arrelant<br>arrencarem el que li’n priva.<br>Per mantenir-nos esperant<br>ancorarem a l’altra riba.", "3. Per adonar-nos, en camí,<br>com cada passa ens agermana.<br>Per descobrir cada matí<br>l’amor que fa brotar la grana."]}, {"n": "575", "t": "Quan el goig d’aquesta vida", "p": ["1. Quan el goig d’aquesta vida<br>dóna al viure nou alè,<br>vós que sou font d’alegria<br>no ens deixeu ni un sol instant.<br><b>Veniu, Esperit Sant.<\/b>", "2. Quan la lluita és dura o llarga,<br>quan ens cansi ja el combat,<br>vós que sou força que aguanta<br>no ens deixeu ni un sol instant.<br><b>Veniu, Esperit Sant.<\/b>", "3. Quan la vida ens aclapara<br>i és feixuc de fer el treball,<br>vós que feu l’obra del Pare<br>no ens deixeu ni un sol instant.<br><b>Veniu, Esperit Sant.<\/b>", "4. A1 ponent de nostre viure,<br>quan la vida és ja comiat,<br>vós que sou font de la vida,<br>no ens deixeu ni un sol instant.<br><b>Veniu, Esperit Sant.<\/b>"]}, {"n": "576", "t": "L’Esperit de Déu omple l’univers", "p": ["<b>L’Esperit de Déu omple l’univers:<br>Esperit d’Amor, que ens guarda tots en 1a unitat.<br>L’Esperit de Déu omple l’univers:<br>Esperit d’Amor que ens dóna la força d’estimar.<\/b>", "1. Oh Senyor! Oh Senyor!<br>Amb l’impuls del teu amor volem bastir<br>un món nou, on regni la Pau, l’Amor i el Bé.", "2. Oh Déu meu! Oh Déu meu!<br>L’Esperit que hi ha en nosaltres ens fa dir<br>a una veu: &quot;Tot el que tenim és un do teu&quot;."]}, {"n": "577", "t": "Quan l’alè de l’Esperit", "p": ["<b>Quan l’alè de l’Esperit <br>jo sento dintre meu, <br>vull pregar.<\/b>", "1. L’Esperit de Déu és foc,<br>ell abranda el nostre cor.", "2. Esperit de veritat.<br>de Justícia i Santedat.", "3. L’Esperit ens donarà<br>fortalesa per a lluitar.", "4. Esperit de Caritat,<br>de Consol, Amor i Pau."]}, {"n": "578", "t": "Esperit de Pentecosta, Flama d’amor", "p": ["<b>Esperit de Pentecosta, Flama d’amor:<br>mira aquell poble que tu has aplegat,<br>Esperit de Pentecosta, Vent poderós,<br>renova’ns amb el teu alè.<\/b> (2)", "1. Flama d’amor, escalfa all ò que és fred,<br>Vent poderós, aplega allò que es perd,<br>Aigua abundant, renova el cor marcit,<br>Foc lluminós, encén la nostra nit.", "2. Poble de Déu, que escolta la Paraula,<br>Poble de Déu que viu de l’evangeli,<br>Poble de Déu que es reparteix el pa,<br>Poble de Déu, que esdevé Cos de Crist.", "3. Poble de Déu, atent als clams del món,<br>Poble de Déu, que viu els seus combats,<br>Poble de Déu que avança esperançat,<br>Poble de Deu, mogut per l’Esperit."]}, {"n": "579", "t": "L’Esperit del Senyor vindrà a vosaltres", "p": ["<b>L’Esperit del Senyor vindrà a vosaltres. <\/b><br><b>No tingueu por d’obrir de bat a bat, <\/b><br>el vostre cor,  al seu amor. (2) <br>Ell transformarà les vostre vides, <br>us donarà un cor per estimar; <br>serà foc que purifica, força en actuar. <br>Ell transformarà les vostres penes, <br>us sabreu fills seus ben estimats; <br>vostres cors obriu joiosos a la llibertat.", "Ell enfortirà tota feblesa, <br>ens dirà com hem de pregar; <br>posarà en els nostres llavis paraules de bondat. <br>Ell canviarà tota tristesa <br>pel gran goig de la fraternitat. <br>Nostre cor obrim joiosos a la llibertat."]}]}, {"name": "Mare de Déu", "songs": [{"n": "581", "t": "El Senyor ha fet en mi meravelles", "p": ["<b>El Senyor ha fet en mi meravelles.<br>Sant, el seu nom!<\/b>", "l. La meva ànima magnifica el Senyor,<br>el meu esperit celebra Déu que em salva,", "2. perquè ha mirat la petitesa de la seva serventa.<br>Des d’ara totes les generacions em diran benaurada,", "3. perquè el Totpoderós obra en mi meravelles.<br>El seu nom és sant,", "4. i l’amor que té als qui creuen en ell<br>s’estén de generació en generació.", "5. Les obres del seu braç són potents:<br>dispersa els homes de cor altiu,", "6. derroca els poderosos del soli<br>i exalça els humils.", "7. Omple de béns els pobres,<br>i els rics se’n tornen sense res.", "8. Ha protegit Israel, el seu servent,<br>com ho havia promès als nostres pares;", "9. s’ha recordat del seu amor a Abraham<br>i a la seva descendència per sempre.", "10. Glòria al Pare i al Fill i a l’Esperit Sant,<br>ara i sempre i pels segles dels segles. Amén."]}, {"n": "582", "t": "Oh Mare virginal", "p": ["1. Oh Mare virginal, santa Maria,<br>vós sou la nostra llum, la nostra guia,<br>puix Déu de terra i cel Senyora us féu:<br><b>Sigueu nostra salut, Mare de Déu.<\/b>", "2. Dels àngels i dels sants, dolça Regina,<br>per vostra intercessió la mà divina<br>ens obre el gran tresor de l’amor seu.<br><b>Sigueu nostra salut, Mare de Déu.<\/b>"]}, {"n": "583", "t": "Formosa sou, Maria", "p": ["1. Formosa sou, Maria, i tota pura<br>i en vostra vestidura<br>s’emmiralla el blau pur del firmament!<br>De cèlica esplendor sou adornada,<br>i sou, oh Immaculada,<br>l’obra sublim del Déu Omnipotent.", "2. La ment divina us contemplà amb tendresa<br>plasmant vostra puresa<br>per vèncer del serpent l’engany mortal.<br>De les fonts, el murmuri no s’oïa<br>ni encara el sol lluïa<br>que vós ja al Déu somrèieu eternal.", "3. El Verb Etern us féu el seu sagrari<br>i feia ja brillar-hi,<br>en crear-vos, els mèrits de la Creu:<br>nasquéreu pura, en la blancor primera,<br>i com la primavera,<br>ens sou reflex de les bellors de Déu.", "4. Oh excelsitud de santedat divina:<br>dels cels, feliç Regina<br>i Verge, Mare sou del Redemptor!<br>A la terra el bon Déu magnificàreu,<br>i al cel joiosa entràreu,<br>guadint per sempre més en el Senyor.", "5. Vulgueu, Puríssima Princesa i Mare<br>dels qui en l’exili encara<br>del món vivim, els cants d’amor oir;<br>obriu el nostre cor a l’esperança<br>quan de flaquesa es cansa<br>fent via vers la Glòria sens fi. Amén."]}, {"n": "584", "t": "Reina del món, Immaculada Verge", "p": ["<b>Reina del món, Immaculada Verge,<br>gloriosa santa Mare de Déu,<br>pregueu sempre per nosaltres al Senyor.<\/b>", "1. El Senyor m’ha creat des del principi<br>i existiré en el segle venidor:<br>a la seva tenda he exercit el ministeri,<br>i he estat afermada a Sió.", "2. He arrelat en un poble gloriós,<br>a la part del Senyor, a la seva herència,<br>a Jerusalem he tingut la seu reial,<br>a la ciutat estimada del Senyor.", "6. Jo sóc la Mare de l’Amor i la Temença,<br>de la Saviesa i de la Santa Esperança;<br>veniu els qui us deliu pel meu amor<br>i sadolleu-vos dels meus fruits."]}, {"n": "585", "t": "Nostres cants que a vós s’enlairen", "p": ["<b>Nostres cants que a vós s’enlairen<br>escolteu, oh virginal Mare de Déu;<br>tota la terra us canta lloances,<br>puix de vós nasqué l’Unigènit Fill del Pare,<br>nostra salut i nostra vida.<\/b>", "1. Oh, de les verges ferm escut,<br>intacta Mare de Déu Fill,<br>porta dels eternals palaus,<br>nostra esperança i el goig del cel!", "2. Sou lliri blanc dins l’esbarzer,<br>coloma tota formosor,<br>vergella, brot de pura arrel,<br>que remei porta al món ferit.", "3. Torre on el drac no pot entrar,<br>estel amic dels naufragants:<br>tingueu-nos lluny de tot engany<br>i deu-nos guia amb vostra llum.", "4. Foneu les boires del error,<br>tot enganyós escull lleveu,<br>obriu; als que ara anem errants<br>enmig del tràngol, pas segur.", "5. Glòria sigui a vós, Jesús,<br>qui de la Verge ens fóreu nat,<br>i al Pare i a l’Esperit Sant,<br>enllà dels segles sempiterns."]}, {"n": "586", "t": "Benaurada que heu cregut", "p": ["Benaurada que heu cregut:<br>s’ha acomplert en vós, Maria,<br>el que us ha dit el Senyor.", "<b>Benaurat el vostre si,<br>que ha portat el Salvador.<\/b>", "Sortosa virginitat:<br>aquell Déu heu contingut<br>que el cel no pot encabir.", "<b>Benaurat el vostre si,<br>que ha portat el Salvador.<\/b>"]}, {"n": "587", "t": "Aquell qui la terra, el mar i els cels", "p": ["Aquell qui la terra, el mar i els cels<br>veneren, adoren i aclamen,<br>aquell qui regeix el món, Maria el porta en el si.", "Contemplant amb fe el misteri<br>de la Verge, Mare de Déu,<br>fem-ne lloança tot dient:", "<b>Glòria a vós, Senyor,<br>que vàreu néixer d’una Verge.<\/b>", "1. Déu vos guard, oh Mare Santa, que vau infantar aquell Rei<br>que governa cel i terra per tota l’eternitat.", "2. Tothom ha vist, d’un cap a l’altre de la terra,<br>la salvació del nostre Déu.", "3. Aclameu el Senyor, arreu de la terra,<br>esclateu en cants i en crits d’alegria."]}, {"n": "588", "t": "Virolai", "p": ["<b>Rosa d’abril, Morena de la Serra,<br>de Montserrat estel,<br>il·lumineu la catalana terra,<br>guieu-nos cap al cel.<\/b>", "1. Amb serra d’or els angelets serraren,<br>eixos turons per fer-vos un palau.<br>Reina dels cels que els serafins baixaren,<br>deu-nos abric dins vostre mantell blau.", "2. Alba naixent d’estrelles coronada,<br>Ciutat de Déu que somnià David,<br>als vostres peus la lluna s’és posada,<br>el sol sos raigs us dóna per vestit.", "3. Dels catalans sempre sereu Princesa,<br>dels espanyols, estrella d’Orient:<br>sigueu pels bons, pilar de fortalesa;<br>pels pecadors, el port de salvament.", "4. Doneu consol a qui la pàtria enyora<br>sens veure mai els cims de Montserrat;<br>en terra i mar oïu el qui us implora;<br>torneu a Déu els cors que l’han deixat.", "5. Mística font de l’aigua de la vida,<br>rageu del cel al cor de mon país;<br>dons i virtuts deixeu-li per florida;<br>feu-ne, si us plau, el vostre paradís.", "6. Feliços ulls, Maria, aquells que us vegen,<br>feliç el cor que s’obria vostra llum.<br>Rosa del cel que els serafins voltegen,<br>a ma oració doneu vostre perfum.", "7. Cedre gentil del Líban sou corona,<br>arbre d’encens, palmera de Sion,<br>el fruit sagrat que el vostre amor ens dóna<br>és Jesucrist, el Redemptor del món.", "8. Amb vostre nom comença nostra història<br>i és Montserrat el nostre Sinaí.<br>Siguin per tots l’escala de la Glòria<br>eixos penyals coberts de romaní."]}, {"n": "589", "t": "A vós, Mare del Déu nostre", "p": ["1. A vós, Mare del Déu nostre,<br>dolça Maria,<br>aixequem nostra lloança,<br>Santa Maria.<br>Glòria al Pare que us amà;<br>glòria al Fill, el Redemptor;<br>sigui glòria a l’Esperit.<br><b>Salve, salve, salve Regina!<\/b>", "2. Del matí sou la llum bella,<br>dolça Maria,<br>d’on el món se n’emmantella,<br>Santa Maria.<br>Doneu joia en el dolor,<br>i al món pau i bé i amor,<br>i a tot cor vida i conhort.<br><b>Salve, salve, salve Regina!<\/b>", "3. Tota plena sou de gràcia,<br>dolça Maria,<br>tota neta de malura,<br>Santa Maria.<br>Doneu força a nostra ment<br>i puresa resplendent;<br>i allunyeu-nos de tot mal.<br><b>Salve, salve, salve Regina!<\/b>", "4. Oh clement, oh piadosa,<br>dolça Maria:<br>Mare i Verge gloriosa,<br>Santa Maria.<br>Del malíssim enemic<br>defenseu els vostres fills:<br>doneu-nos vida immortal.<br><b>Salve, salve, salve Regina!<\/b>"]}, {"n": "590", "t": "Déu sigui amb vós, Maria", "p": ["<b>Déu sigui amb vós, Maria,<br>Deu sigui amb vós. (2)<\/b>", "1. Sou espill de fortalesa,<br>casta Filla de Sió,<br>branca humil on s’ajocaren<br>els somriures del Senyor. (2)", "2. Sou el nord dels qui caminen<br>de la fe dins la foscor.<br>Sou els llavis on rebérem<br>la besada del Senyor. (2)", "3. Sou la Mare de l’Església.<br>Sou la Mestra de l’Amor.<br>Tots honrem la reialesa<br>de l’esclava del Senyor. (2)", "4. Vós trobàreu l’alegria<br>dins el calze del dolor<br>i tastàreu la pobresa<br>al costat del Redemptor. (2)", "5. Temple august de Déu fet home,<br>vi del cel premsat al món,<br>sou honor del nostre poble<br>i obra mestra del Senyor. (2)", "6. La corona de la glòria<br>brilla ja en el vostre front,<br>i espereu els qui us estimen<br>a la dreta del Senyor. (2)"]}, {"n": "591", "t": "Des del món us mirem, Mare nostra", "p": ["1. Des del món us mirem, Mare nostra;<br>la pregària dels fills escolteu;<br>és la fe que demana pels homes<br>el perdó de Jesús mort en Creu.", "2. El pecat ens ha dut lluny del Pare,<br>l’esperança del món s’ha enfosquit.<br>Que Jesús, l’home Déu i Fill vostre,<br>resplendeixi per tots en la nit.", "3. Quan l’Amor era estrany a la terra,<br>ens donàreu a tots un Germà; <br>d’aquest Foc deu-nos, Mare, una espurna<br>que ens abrandi d’amor cristià."]}, {"n": "592", "t": "Que Déu us guardi, estel del mar", "p": ["1. Que Déu us guardi, estel del mar,<br>oh santa Mare del bon Déu<br>i alhora Verge plenament,<br>feliç camí que porta al cel.", "2. «Ave» us va dir, tot somrient,<br>un jorn, l’arcàngel Gabriel.<br>Com si el nom d’«Eva» canviés<br>per establir-nos en la pau.", "3. Vulgueu desfer els lligams als reus<br>i concedir la llum als cecs,<br>foragiteu els nostres mals<br>i aconseguiu-nos tots els béns:", "4. Mostreu-vos mare de bondat!<br>Feu que, per vós, aculli els precs<br>Aquell qui es féu el vostre Fill<br>quan per nosaltres vingué al món.", "5. Un viure pur us demanem, <br>camí segur per a avançar,<br>per tal que amb vós puguem gaudir<br>veient Jesús eternament.", "6. Lloança es doni al Pare Déu<br>a Crist i a l’Esperit d’Amor.<br>Rebin tots tres l’honor degut<br>al seu nom sant tan gloriós. Amén."]}, {"n": "593", "t": "Noia del poble, Maria", "p": ["1. Noia del poble, Maria,<br>d’un poble de vinya i blat,<br>si tens morena la cara<br>és del sol que t’ha colrat.<br>Déu per vora teu passava,<br>vora el camí et va trobar.<br><b>Noia del poble, Maria,<br>Mare de l’amor més clar.<\/b>", "2. Era el temps de primavera,<br>era un temps per estimar:<br>et va dur vora de l’aigua,<br>als quatre rius et banyà,<br>et va cobrir amb lli i amb seda,<br>d’or i plata et va abillar.<br><b>Noia del poble, Maria,<br>Mare de l’amor més clar.<\/b>", "3. Et donà flor de farina<br>i oli dels oliverars;<br>fruit de la terra promesa,<br>mel i mató vas tastar.<br>Com un segell va posar-te<br>al seu cor i en el seu braç.<br><b>Noia del poble, Maria,<br>Mare de l’amor més clar.<\/b>", "4. Ets un badiu, una eixida<br>de la masia del pa,<br>una font que raja sempre<br>fins que de set no n’hi haurà.<br>Brot d’aquella soca antiga<br>d’on la vida va brostar.<br><b>Noia del poble, Maria,<br>Mare de l’amor més clar.<\/b>", "5. Maria de l’esperança,<br>que vetlles gresol en mà,<br>la llavor duies colgada<br>que l’Esperit va covar.<br>Déu te guard, noia del poble,<br>que tan blanc llesques el pa.<br><b>Noia del poble, Maria,<br>Mare de l’amor més clar.<\/b>"]}, {"n": "594", "t": "Honor i glòria sigui a vós, Maria!", "p": ["1. Honor i glòria sigui a vós, Maria!<br>Vostra bellesa delità el Senyor.<br>De vós naixia Crist, nostra alegria,<br>i en vós reposa tota nostra amor.<br><b>Dolça Maria, Mare d’amor,<br>guia que ens guia cap el Senyor.<\/b>", "2. Sou creatura i sant habitatge<br>dins vós hi troba Déu que és infinit.<br>La font de gràcia que de dins vós raja<br>al món abeura àrid i enfebrit.<br><b>Dolça Maria, Mare d’amor,<br>guia que ens guia cap el Senyor.<\/b>", "3. Amb el Fill fóreu la Corredemptora<br>que ens guaria de l’antic pecat,<br>oh de l’Església Mare i Protectora,<br>vida i dolcesa, flor de santedat.<br><b>Dolça Maria, Mare d’amor, <br>guia que ens guia cap el Senyor.<\/b>"]}, {"n": "595", "t": "Salve, Regina", "p": ["Salve, Regína, màter misericórdiae:<br>Víta, dulcédo, et spes nóstra, sàlve.<br>Ad te clamàmus, éxsules, fílü Hévae.<br>Ad te suspiràmus, geméntes et flentes <br>in hac lacrimàrum vàlle.<br>Eia ergo, Advocàta nóstra, <br>íllos túos misericórdes óculos <br>ad nos converte.<br>Et Jésum, benedíctum frúctum véntris túi, <br>nóbis post hoc exsílium osténde.<br>O clémens.<br>O pía.<br>O dúlcis Vírgo Maria.", "Salve, Regina;<br>tingueu misericòrdia,<br>vós que sou vida<br>i esperança nostra.<br>Escolteu el clam<br>que us adrecen els fills d’Eva;<br>amb sospirs us criden<br>angoixats de veure’s<br>en l’exili de la terra.<br>Mireu-nos, doncs,<br>advocada nostra,<br>que els vostres ulls<br>plens de misericòrdia<br>la força ens donen.<br>I Jesús, el vostre Fill<br>que vau portar a aquest món<br>vulgueu, després al paradís, mostrar-nos.<br>Oh clement,<br>oh, pia,<br>oh dolça Verge Maria."]}, {"n": "596", "t": "Regina caeli", "p": ["Regina caéli laetàre, allelúia:<br>Quia quem meruísti portàre, allelúia:<br>Resurréxit, sicut dixit, allelúia:<br>Ora pro nóbis Déum, allelúia.", "Vós, reina del cel exulteu, al·leluia,<br>perquè qui vau merèixer de portar, al·leluia,<br>ressuscità tal com va dir, al·leluia.<br>Pregueu per tots nosaltres, al·leluia."]}, {"n": "597", "t": "Us volem cantar", "p": ["1. Us volem cantar<br>perquè som fills vostres,<br>mare dels cristians<br>Reina i mare nostra.", "2. Obra sou de Déu,<br>com cap altra pura,<br>salva de pecat,<br>neta de sutzura.", "3. Vós vau dir aquell sí<br>a la veu divina,<br>la redempció<br>vàreu fer possible.", "4. Mentre vàreu ser<br>mare ací a la terra<br>qui us necessità<br>va trobar-vos sempre.", "5. Ara, provident,<br>des del cel encara,<br>dels qui som al món<br>heu de fer de mare.", "6. Set tenim de vós,<br>font de l’aigua clara:<br>ens doneu Jesús<br>i ja res no ens manca.", "7. Per Jesús, i amb vós,<br>som tots plens de força<br>per anunciar<br>la salut que ens porta.", "8. Que us veiem un jorn<br>en la glòria santa,<br>tots transfigurats<br>en l’eterna Pasqua!"]}, {"n": "598", "t": "Deu vos salve, reina i mare", "p": ["Deu vos salve, reina i mare de misericòrdia;<br>vida, dolcesa i esperança nostra, Déu vos salve.<br>A vós cridem els desterrats fills d’Eva;<br>a vós sospirem,<br>gemint i plorant en aquesta vall de llàgrimes.<br>Ara, doncs, advocada nostra,<br>gireu envers nosaltres <br>aquests ulls vostres tan misericordiosos.<br>I, després d’aquest exili, mostreu-nos Jesús,<br>fruit beneït del vostre ventre.<br>Oh clementíssima,<br>oh piadosa,<br>oh dolça Verge Maria."]}, {"n": "599", "t": "Es va veure un gran prodigi al cel", "p": ["Es va veure un gran prodigi al cel:<br>una dona vestida de sol, amb la lluna als peus<br>i sobre el cap una corona de dotze estrelles.<br>Maria, figura i primícia de l’Església<br>que ha d’arribar a la plenitud de la glòria,<br>resplendeix com una senyera de ferma esperança<br>per al poble de Déu que peregrina.", "<b>Lloança a Déu perquè amb Maria,<br>nosaltres ens manifestarem en plena glòria.<\/b>", "1. Canteu al Senyor un càntic nou,<br>a ell que ha fet meravelles.", "2. El senyor es manifesta salvador,<br>als ulls dels pobles es revela bondadós.", "3. Maria exalçada en cos i ànima el cel,<br>regna per sempre amb Crist."]}, {"n": null, "t": "Que la pau ens acompanyi", "p": ["Que la pau ens acompanyi <br>per camins de veritat, <br>tots els jorns de nostra vida:<br>pau del Crist ressuscitat.", "Cors oberts a l&#x27;esperança <br>d&#x27;una nova creació; <br>oferim la pau als homes, <br>com a signe de l’amor."]}, {"n": null, "t": "Mans, mans, mans a les mans", "p": ["Mans, mans, <br>mans a les mans (4).", "Deixem les tristeses, <br>deixem els afanys, <br>posem tot seguit <br>les mans a les mans <br>i així reviurem <br>un amor d’infants <br>que compartirem <br>amb tots els germans.", "El dia s’atansa, <br>joves i més grans, <br>tenim l’esperança <br>posada, a les mans, <br>i sols ajuntant-les <br>podrem construir."]}, {"n": null, "t": "Sigui la pau amb nosaltres", "p": ["Sigui la pau amb nosaltres<br>Sigui la pau amb nosaltres<br>Sigui la pau amb nosaltres<br>que resplendeixi sempre, sempre<br>en tots la pau."]}, {"n": null, "t": "La meva ànima canta al Senyor", "p": ["La meva ànima canta al Senyor,<br>el meu esperit celebra Déu, Salvador,<br>perquè ha mirat<br>la petitesa de la seva serventa", "<b>El seu nom es sant<br>i l&#x27;amor que te s’estén<br>de generació en generació.<br>de generació en generació.<\/b>", "Les obres del seu braç<br>són potents i grans.<br>Dispersa els homes de cor altiu,<br>derroca els poderosos<br>i exalça els humils<br>omple de béns els pobres.", "<b>El seu nom es sant<br>i l&#x27;amor que te s’estén<br>de generació en generació.<br>de generació en generació.<\/b>", "Al seu servent ha protegit el Senyor<br>com ho havia promès<br>als nostres pares fa temps,<br>i s&#x27;ha recordat del seu amor<br>a Abraham per sempre."]}]}]</script>
<script>
const SECTIONS = JSON.parse(document.getElementById('cantsData').textContent);

// Llista plana amb índexs
const ALL = [];
SECTIONS.forEach((sec, si) => {
  sec.songs.forEach(song => {
    ALL.push({...song, sec: sec.name, si, idx: ALL.length});
  });
});

// Text pla per cercar (sense accents)
const strip = s => s.normalize('NFD').replace(/[\u0300-\u036f]/g,'').toLowerCase();
const untag = h => h.replace(/<br>/g,' ').replace(/<[^>]+>/g,'').replace(/&#x27;/g,"'").replace(/&amp;/g,'&').replace(/&quot;/g,'"').replace(/\s+/g,' ');
ALL.forEach(c => {
  c.tPlain = strip(c.t);
  c.body = c.p.map(untag).join(' ');
  c.bPlain = strip(c.body);
});

const $ = id => document.getElementById(id);
const main = $('main'), chips = $('chips');

/* ---------- Renderitza índex de seccions ---------- */
SECTIONS.forEach((sec, si) => {
  const first = sec.songs.find(s=>s.n);
  const b = document.createElement('button');
  b.className = 'chip';
  b.innerHTML = (first?`<span class="cn">${first.n.split('-')[0]}</span>`:'') + sec.name;
  b.onclick = () => {
    resetSearch();
    document.getElementById('sec'+si).scrollIntoView({block:'start'});
    setActiveChip(si);
  };
  chips.appendChild(b);
});
function setActiveChip(si){
  [...chips.children].forEach((c,i)=>c.classList.toggle('active', i===si));
}

/* ---------- Llista completa ---------- */
function rowHTML(c, opts={}){
  const numHtml = c.n
    ? `<span class="num-tile">${c.n}</span>`
    : `<span class="num-tile nonum">♪</span>`;
  const secTag = opts.showSec ? `<span class="sec-tag">${c.sec}</span>` : '';
  const snip = opts.snippet ? `<span class="snippet">${opts.snippet}</span>` : '';
  const title = opts.titleHtml || esc(c.t);
  return `<button class="song-row" data-idx="${c.idx}">
    ${numHtml}
    <span class="ti">${title}${secTag}${snip}</span>
  </button>`;
}
const esc = s => s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');

function renderFull(){
  let h = '';
  SECTIONS.forEach((sec, si) => {
    h += `<div class="sec-head" id="sec${si}"><h2>${sec.name}</h2><span class="count">${sec.songs.length} cants</span></div>`;
    h += '<div class="song-list">';
    sec.songs.forEach(song => {
      const c = ALL.find(x => x.si===si && x.n===song.n && x.t===song.t);
      h += rowHTML(c);
    });
    h += '</div>';
  });
  main.innerHTML = h;
}
renderFull();

main.addEventListener('click', e => {
  const row = e.target.closest('.song-row');
  if (row) openSong(+row.dataset.idx, true);
});

/* ---------- Cerca ---------- */
const numInput = $('numInput'), txtInput = $('txtInput'), clearBtn = $('clearBtn');

function highlight(text, q){
  const plain = strip(text);
  const i = plain.indexOf(q);
  if (i < 0) return esc(text);
  return esc(text.slice(0,i)) + '<mark>' + esc(text.slice(i, i+q.length)) + '</mark>' + esc(text.slice(i+q.length));
}
function snippetFor(c, q){
  const i = c.bPlain.indexOf(q);
  if (i < 0) return '';
  const start = Math.max(0, i-32);
  let frag = c.body.slice(start, i + q.length + 48);
  if (start>0) frag = '…'+frag;
  if (i+q.length+48 < c.body.length) frag += '…';
  return highlight(frag, q);
}

function doSearch(){
  const nq = numInput.value.trim();
  const tq = strip(txtInput.value.trim());
  clearBtn.classList.toggle('show', !!txtInput.value);

  if (!nq && !tq){ renderFull(); setActiveChip(-1); return; }

  let results = [];
  if (nq){
    const exact = ALL.filter(c => c.n === nq || (c.n && c.n.split('-')[0] === nq));
    const pre = ALL.filter(c => c.n && c.n.startsWith(nq) && !exact.includes(c));
    results = [...exact, ...pre];
    if (exact.length === 1 && nq === numInput.value.trim() && exact[0].n === nq){
      // no auto-obrim; l'usuari toca el resultat
    }
    let h = `<p class="results-note">${results.length} resultat${results.length===1?'':'s'} per al número «${esc(nq)}»</p><div class="song-list single">`;
    results.forEach(c => h += rowHTML(c, {showSec:true}));
    h += '</div>';
    if (!results.length) h = noRes(`No hi ha cap cant amb el número «${esc(nq)}»`);
    main.innerHTML = h;
    return;
  }

  if (tq.length < 2){ main.innerHTML = noRes('Escriu almenys dues lletres per cercar.'); return; }
  const inTitle = ALL.filter(c => c.tPlain.includes(tq));
  const inBody  = ALL.filter(c => !c.tPlain.includes(tq) && c.bPlain.includes(tq));
  const total = inTitle.length + inBody.length;
  if (!total){ main.innerHTML = noRes(`Cap resultat per «${esc(txtInput.value.trim())}»`); return; }
  let h = `<p class="results-note">${total} resultat${total===1?'':'s'} per «${esc(txtInput.value.trim())}»</p><div class="song-list single">`;
  inTitle.forEach(c => h += rowHTML(c, {showSec:true, titleHtml: highlight(c.t, tq)}));
  inBody.forEach(c => h += rowHTML(c, {showSec:true, snippet: snippetFor(c, tq)}));
  h += '</div>';
  main.innerHTML = h;
}
function noRes(msg){
  return `<div class="no-results"><div class="big">♪</div><div class="big">Res per aquí…</div><p>${msg}</p></div>`;
}
function resetSearch(){
  numInput.value = ''; txtInput.value = '';
  clearBtn.classList.remove('show');
  renderFull();
}
numInput.addEventListener('input', () => { txtInput.value=''; doSearch(); });
txtInput.addEventListener('input', () => { numInput.value=''; doSearch(); });
clearBtn.onclick = resetSearch;

// Enter al camp de número: obre el cant si és únic
numInput.addEventListener('keydown', e => {
  if (e.key === 'Enter'){
    const nq = numInput.value.trim();
    const exact = ALL.filter(c => c.n === nq);
    if (exact.length === 1) openSong(exact[0].idx, true);
    numInput.blur();
  }
});

/* ---------- Vista de cant ---------- */
const sv = $('songView');
let currentIdx = -1;

function openSong(idx, push){
  const c = ALL[idx];
  if (!c) return;
  currentIdx = idx;
  $('svNum').textContent = c.n || '♪';
  $('svNum').style.display = '';
  $('svTitleTop').textContent = c.t;
  $('svSection').textContent = c.sec;
  $('svBigNum').textContent = c.n || '♪';
  $('svTitle').textContent = c.t;
  $('svText').innerHTML = c.p.map(p => `<p class="verse">${p}</p>`).join('');
  const prev = ALL[idx-1], next = ALL[idx+1];
  $('prevBtn').disabled = !prev;
  $('nextBtn').disabled = !next;
  if (prev){ $('prevNum').textContent = prev.n||'♪'; $('prevTitle').textContent = prev.t; }
  if (next){ $('nextNum').textContent = next.n||'♪'; $('nextTitle').textContent = next.t; }
  sv.classList.add('open');
  $('svBody').scrollTop = 0;
  document.body.style.overflow = 'hidden';
  if (push) history.pushState({song:idx}, '', '#c/' + (c.n ? encodeURIComponent(c.n) : 'i'+idx));
}
function closeSong(pop){
  sv.classList.remove('open');
  document.body.style.overflow = '';
  currentIdx = -1;
  if (pop && location.hash) history.pushState({}, '', location.pathname);
}
$('backBtn').onclick = () => { if (history.state && history.state.song!==undefined) history.back(); else closeSong(true); };
$('prevBtn').onclick = () => currentIdx>0 && openSong(currentIdx-1, true);
$('nextBtn').onclick = () => currentIdx<ALL.length-1 && openSong(currentIdx+1, true);

window.addEventListener('popstate', e => {
  if (e.state && e.state.song !== undefined) openSong(e.state.song, false);
  else closeSong(false);
});
// Enllaç profund inicial
(function(){
  const m = location.hash.match(/^#c\/(.+)$/);
  if (!m) return;
  const key = decodeURIComponent(m[1]);
  let c;
  if (key.startsWith('i')) c = ALL[+key.slice(1)];
  else c = ALL.find(x => x.n === key);
  if (c){ history.replaceState({song:c.idx}, '', location.hash); openSong(c.idx, false); }
})();

/* ---------- Mida de lletra ---------- */
let fs = parseFloat(localStorage.getItem('cantoral-fs') || '1');
function applyFs(){
  fs = Math.min(1.7, Math.max(.8, fs));
  document.documentElement.style.setProperty('--fs', fs + 'rem');
  localStorage.setItem('cantoral-fs', fs);
}
applyFs();
[['fontPlus',.1],['fontPlus2',.1],['fontMinus',-.1],['fontMinus2',-.1]].forEach(([id,d]) => {
  $(id).onclick = () => { fs += d; applyFs(); };
});

/* ---------- Mode nocturn ---------- */
if (localStorage.getItem('cantoral-night') === '1') document.body.classList.add('night');
$('nightBtn').onclick = () => {
  document.body.classList.toggle('night');
  localStorage.setItem('cantoral-night', document.body.classList.contains('night') ? '1' : '0');
};

/* ---------- Botó amunt i xip actiu ---------- */
const topBtn = $('topBtn');
window.addEventListener('scroll', () => {
  topBtn.classList.toggle('show', window.scrollY > 600);
  // xip actiu segons secció visible
  if (numInput.value || txtInput.value) return;
  let active = 0;
  SECTIONS.forEach((_, si) => {
    const el = document.getElementById('sec'+si);
    if (el && el.getBoundingClientRect().top < 140) active = si;
  });
  setActiveChip(active);
}, {passive:true});
topBtn.onclick = () => window.scrollTo({top:0});
</script>
</body>
</html>
