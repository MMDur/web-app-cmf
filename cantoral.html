 Al·leluia, Al·leluia.<\/b>", "1. Enaltim el Senyor, proclamem el seu nom.", "2. Fem conèixer entre els pobles les seves gestes."]}, {"n": "235", "t": "Alcem ben forta la veu i diguem", "p": ["<b>Alcem ben forta la veu i diguem:<br>&quot;Aquí tenim el nostre Déu.&quot;<\/b>"]}, {"n": "236", "t": "Beneeix el Senyor, ànima meva", "p": ["<b>Beneeix el Senyor, ànima meva,<br>no t’oblidis mai del seus favors.<\/b>"]}, {"n": "237", "t": "Jo sóc el bon pastor, diu el Senyor", "p": ["<b>Jo sóc el bon pastor, diu el Senyor,<br>EI bon pastor dóna la vida per les ovelles.<br>Al·leluia, Al·leluia.<\/b>"]}, {"n": "238", "t": "Tota la vida vull lloar el Senyor", "p": ["<b>Tota la vida vull lloar el Senyor. <\/b>"]}, {"n": "239", "t": "Aclama Déu, tota la terra", "p": ["<b>Aclama Déu, tota la terra. <\/b>"]}, {"n": "240", "t": "Realment, el Senyor ha ressuscitat", "p": ["1. Realment, el Senyor ha ressuscitat,<br><b>Al·leluia.<\/b><br>A Ell la glòria i el poder, pels segles dels segles. Amén.<br><b>Al·leluia (<\/b>4).", "2. Escolteu crits de festa i de victòria. <br><b>Al·leluia.<\/b><br>La dreta del Senyor em glorifica. <br>La dreta del Senyor fa proeses.<br><b>Al·leluia<\/b> (4)."]}, {"n": "241", "t": "Lloa el Senyor, ànima meva", "p": ["<b>Lloa el Senyor, ànima meva. <\/b>"]}, {"n": "242", "t": "Us estimo, Senyor, vós m’enfortiu", "p": ["1. Us estimo, Senyor, vós m’enfortiu,<br>roca i muralla que em deslliura.", "<b>Déu meu, penyal on m’emparo,<br>escut i força que em salva. (2) <\/b>", "2. En veure’m en perill, clamo el Senyor,<br>el meu socors, el meu Déu."]}, {"n": "243", "t": "Feliços els qui ploren", "p": ["<b>Feliços els qui ploren;<br>vindrà el dia en que seran consolats.<br>Feliços els qui tenen fam i set de ser justos;<br>vindrà el dia en que seran saciats.<\/b>"]}, {"n": "244", "t": "Deu estima tant el món, que ha donat el seu Fill únic", "p": ["<b>Deu estima tant el món, que ha donat el seu Fill únic <br>perquè no es perdi ningú dels qui creuen en ell, <br>sinó que tinguin vida eterna. <\/b>"]}, {"n": "245", "t": "Quan ens reunim en nom del Senyor", "p": ["<b>Quan ens reunim en nom del Senyor,<br>Crist és enmig de nosaltres.<\/b>"]}, {"n": "246", "t": "De vós davalla tot el Bé", "p": ["<b>De vós davalla tot el Bé;<br>de vós ens ve el do de la Pau:<br>lloat sigueu, vós, oh Déu!<\/b>"]}, {"n": "247", "t": "Senyor, vós m’ensenyareu el camí que duu a la vida", "p": ["<b>Senyor, vós m’ensenyareu el camí que duu a la vida.<br>Joia i festa a desdir a la vostra presència,<br>Senyor.<\/b>"]}, {"n": "248", "t": "Tasteu i veureu, que n’és, de bo, el Senyor", "p": ["<b>Tasteu i veureu, que n’és, de bo, el Senyor. <\/b>"]}, {"n": "251", "t": "Envieu, cels, vostra rosada", "p": ["<b>Envieu, cels, vostra rosada,<br>ploguin els núvols el Just.<\/b>"]}, {"n": "252", "t": "A vós elevo la meva ànima, Senyor", "p": ["<b>A vós elevo la meva ànima, Senyor. <\/b>"]}, {"n": "253", "t": "Oh cel, deixa caure ta blanca rosada", "p": ["<b>Oh cel, deixa caure ta blanca rosada;<br>que ploguin els núvols el Déu Salvador.<br>Eixampla, oh terra, ta fèrtil entranya,<br>floreixi entre els homes la salvació.<\/b>"]}, {"n": "254", "t": "Canten els pobles el Déu que s’ha fet home. Al·leluia", "p": ["<b>Canten els pobles el Déu que s’ha fet home. Al·leluia.<br>Canta la terra l’Amor que ens allibera. Al·leluia.<\/b>"]}, {"n": "255", "t": "Déu de l’univers, renoveu-nos", "p": ["<b>Déu de l’univers, renoveu-nos, <br>feu-nos veure la claror de la vostra mirada,<br>i serem salvats. <\/b>"]}, {"n": "256", "t": "Senyor, veniu a salvar-nos", "p": ["<b>Senyor, veniu a salvar-nos.<\/b>"]}, {"n": "261", "t": "Ens ha nascut el Crist, Veniu: Adorem-lo!", "p": ["<b>Ens ha nascut el Crist, Veniu: Adorem-lo! <\/b>"]}, {"n": "262", "t": "Avui ens ha nascut un Salvador", "p": ["<b>Avui ens ha nascut un Salvador,<br>que és el Messies, el Senyor.<\/b>"]}, {"n": "263", "t": "D’un cap a l’altre de la terra", "p": ["<b>D’un cap a l’altre de la terra<br>tothom ha vist la salvació del nostre Déu.<\/b>"]}, {"n": "264", "t": "Tots els pobles, Senyor, us faran homenatge", "p": ["<b>Tots els pobles, Senyor, us faran homenatge.<\/b>"]}, {"n": "271", "t": "No us recordeu, Senyor, de les nostres faltes", "p": ["<b>No us recordeu, Senyor, de les nostres faltes,<br>perdoneu els nostres pecats.<\/b>"]}, {"n": "273", "t": "Compadiu-vos, Senyor, perquè he pecat", "p": ["<b>Compadiu-vos, Senyor, perquè he pecat. <\/b>"]}, {"n": "274", "t": "Senyor, estigueu vora meu en els perills", "p": ["<b>Senyor, estigueu vora meu en els perills. <\/b>"]}, {"n": "275", "t": "Són del Senyor l’amor fidel", "p": ["<b>Són del Senyor l’amor fidel<br>i la redempció generosa.<\/b>"]}, {"n": "276", "t": "Pietat, oh Déu, vós que sou tan bo!", "p": ["<b>Pietat, oh Déu, vós que sou tan bo! <\/b>"]}, {"n": "277", "t": "Compadiu-vos de mi, Déu meu", "p": ["<b>Compadiu-vos de mi, Déu meu,<br>vós que estimeu tant.<\/b>"]}, {"n": "278", "t": "Aquí em teniu", "p": ["<b>Aquí em teniu:<br>Déu meu, vull fer la vostra voluntat.<\/b>"]}, {"n": "279", "t": "Senyor, ¿qui podrà estar-se a casa vostra?", "p": ["<b>Senyor, ¿qui podrà estar-se a casa vostra?<\/b>"]}, {"n": "280", "t": "Hosanna al Fill de David", "p": ["<b>Hosanna al Fill de David.<br>Beneït el qui ve en nom del Senyor.<br>Hosanna a dalt del cel.<br>Beneït el Rei d’Israel.<\/b>"]}, {"n": "281", "t": "Déu meu, Déu meu", "p": ["<b>Déu meu, Déu meu,<br>per què m’heu abandonat?<\/b>"]}, {"n": "282", "t": "Crist es féu per nosaltres", "p": ["<b>Crist es féu per nosaltres<br>obedient fins a la mort<br>i una mort de creu.<br>Per això Déu l’ha exalçat<br>i li ha donat aquell nom<br>que està per damunt de tot altre nom.<\/b>"]}, {"n": "283", "t": "El calze de la benedicció", "p": ["<b>El calze de la benedicció<br>és comunió amb la sang del Crist.<\/b>"]}, {"n": "284", "t": "Pare, confio el meu alè a les vostres mans", "p": ["<b>Pare, confio el meu alè a les vostres mans. <\/b>"]}, {"n": "286", "t": "Quan envieu el vostre alè, reneix la creació", "p": ["<b>Quan envieu el vostre alè, reneix la creació,<br>i renoveu la vida sobre la terra.<\/b>"]}, {"n": "287", "t": "Senyor, la terra es plena del vostre amor", "p": ["<b>Senyor, la terra es plena del vostre amor. <\/b>"]}, {"n": "288", "t": "Guardeu-me, Déu meu, en vós trobo refugi", "p": ["<b>Guardeu-me, Déu meu, en vós trobo refugi. <\/b>"]}, {"n": "289", "t": "Cantem al Senyor, que s’ha cobert de glòria!", "p": ["<b>Cantem al Senyor, que s’ha cobert de glòria!<\/b>"]}, {"n": "290", "t": "Amb quin goig us exalço, Senyor!", "p": ["<b>Amb quin goig us exalço, Senyor! <\/b>"]}, {"n": "291", "t": "Cantant de goig sortirem a buscar l’aigua", "p": ["<b>Cantant de goig sortirem a buscar l’aigua<br>de les fonts de salvació.<\/b>"]}, {"n": "292", "t": "Senyor, vós teniu paraules de vida eterna", "p": ["<b>Senyor, vós teniu paraules de vida eterna. <\/b>"]}, {"n": "293", "t": "Com la cérvola es deleix per l’aigua viva", "p": ["<b>Com la cérvola es deleix per l’aigua viva,<br>també em deleixo jo per vós, Déu meu<\/b>."]}, {"n": "294", "t": "Déu meu, creeu en mi un cor ben pur", "p": ["<b>Déu meu, creeu en mi un cor ben pur.<\/b>"]}, {"n": "295", "t": "Avui és el dia que ha obrat el Senyor", "p": ["<b>Avui és el dia que ha obrat el Senyor:<br>alegrem-nos i celebrem-lo.<\/b>"]}, {"n": "296", "t": "Ha ressuscitat el Crist, Senyor nostre", "p": ["<b>Ha ressuscitat el Crist, Senyor nostre,<br>Al·leluia, Al·leluia!<\/b>"]}, {"n": "297", "t": "Envieu el vostre Esperit", "p": ["<b>Envieu el vostre Esperit<br>i renoveu la faç de la terra.<\/b>"]}, {"n": "298", "t": "Ungiu-me, Senyor, amb el vostre Esperit", "p": ["<b>Ungiu-me, Senyor, amb el vostre Esperit.<\/b>"]}, {"n": "299", "t": "Glòria i lloança per sempre", "p": ["<b>Glòria i lloança per sempre. <\/b>"]}, {"n": "301", "t": "Lloança a vós, oh Crist, rei de la glòria eterna", "p": ["<b>Lloança a vós, oh Crist, rei de la glòria eterna. <\/b>"]}, {"n": "302", "t": "Lloança i honor a vós, Senyor Jesús", "p": ["<b>Lloança i honor a vós, Senyor Jesús.<\/b>"]}, {"n": "303", "t": "Glòria i lloança a vós, oh Crist, Senyor nostre", "p": ["<b>Glòria i lloança a vós, oh Crist, Senyor nostre. <\/b>"]}, {"n": "304", "t": "Glòria a vós, oh Crist, Paraula de Déu", "p": ["<b>Glòria a vós, oh Crist, Paraula de Déu.<\/b>"]}]}, {"name": "Cants de Comunió", "songs": [{"n": "341", "t": "Canta, llengua, el sant Misteri", "p": ["Canta, llengua, el sant Misteri<br>del gloriosíssim Cos<br>i de la Sang preciosa<br>que el Senyor de les nacions,<br>fruit d’entranya generosa,<br>ha vessat per salvar el món.", "Se’ns donà, i ens volgué néixer<br>del sant ventre virginal,<br>i, sembrada la paraula<br>en el món on habità,<br>hi acabà la seva estada<br>amb la nova institució.", "Aquell vespre de la cena,<br>la darrera amb els germans,<br>observats tots els preceptes<br>d’aquell àpat ritual,<br>per ses mans es dóna als dotze<br>ell mateix com a menjar.", "El Verb-Carn amb la paraula<br>muda en carn el que era pa;<br>sang del Crist el vi es torna.<br>Si els sentits no entenen res,<br>n’hi ha prou amb la fe sola<br>perquè el cor n’estigui cert.", "De genolls, doncs, adorem-lo,<br>aquest sagrament tan gran,<br>i el que en fou imatge antiga<br>deixi lloc al ritu nou;<br>que la nostra fe supleixi<br>el defecte dels sentits.", "A Déu Pare i al Fill únic<br>donem glòria i honor,<br>majestat i benaurança,<br>força i benedicció;<br>i donem igual lloança<br>al qui procedeix d’ambdós. Amén."]}, {"n": "342", "t": "Cantem del Redemptor, l’amor puríssim", "p": ["Cantem del Redemptor, l’amor puríssim, <br>que en Testament deixà el seu Cos santíssim<br>present al sant altar!<br>Sagrat memorial de la tendresa<br>del cor de Crist, oh Calze de dolcesa<br>i divinal Mannà!", "Del Bon Pastor sentim la veu sagrada:<br>–preneu mon Cos, beveu la Sang vessada<br>que el món ha redimit–. <br>L’encesa fe contempla en l’Hòstia santa<br>el Déu que hi és latent, contempla i canta,<br>i adora l’Infinit.", "Oh Sagrament d’amor i Pa del àngels!<br>Aquell qui adoren serafins i arcàngels<br>s’alberga al nostre cor!<br>Del Déu etern, es torna santuari<br>tota ànima fidel que vol guardar-hi<br>tan divinal tresor.", "E1 Rei del cel els nets de cor convida<br>al gran banquet, on llesca el Pa de vida<br>la mà sacerdotal.<br>És font de dolça pau i d’amor pura<br>el Cos de Crist: penyora que assegura<br>la Glòria eternal.", "Lloança a vós, oh Trinitat divina!<br>Pare eternal, i Amor que ens encamina<br>al port de salvament.<br>Honor a vós oh Crist, Rei de la Glòria,<br>que al Sagrament deixeu vostra memòria<br>i el nostre nodriment. Amén."]}, {"n": "343", "t": "La terra se sadolla", "p": ["La terra se sadolla<br>dels fruits de les vostres obres, Senyor.<br>De la terra traieu el pa i el vi<br>que envigoreixen el cor de l’home.", "<b>Tots esperem de vós, Senyor,<br>que ens doneu el pa del cel.<\/b>", "Beneeix el Senyor, ànima meva.<br>Senyor, Déu meu, que en sou de gran!<br>Aneu vestit d’esplendor i de majestat,<br>us embolcalla la llum com un mantell.", "Assentàreu la terra sobre uns fonaments,<br>incommovible per segles i segles.<br>La cobríreu amb el mantell dels oceans,<br>les aigües sepultaven les muntanyes.", "De les fonts en feu brollar torrents,<br>que s’escolen entre les muntanyes;<br>s’hi abeuren els animals feréstecs<br>els ases salvatges hi apaguen la set;<br>a les seves ribes nien els ocells,<br>refilen entre les branques.", "Des del vostre palau regueu les muntanyes,<br>sacieu la terra de pluges del cel;<br>feu néixer l’herba per al bestiar<br>que treballa al servei de l’home.", "I ell treu el pa de la terra,<br>i el vi que li alegra el cor,<br>l’oli que li ungeix el front<br>i el pa que li renova les forces.", "Tots esperen de la vostra mà<br>que els doneu l’aliment al seu temps;<br>els el doneu, i ells l’arrepleguen,<br>així que obriu la mà, mengen a desdir.", "Cantaré al Senyor tota la vida,<br>cantaré al meu Déu mentre sóc al món.<br>Que li sigui agradable aquest poema,<br>són per al Senyor aquests cants de goig."]}, {"n": "344", "t": "On hi ha caritat i amor, allí hi ha Déu", "p": ["<b>On hi ha caritat i amor, allí hi ha Déu.<\/b>", "Formant unitat ens reuneix l’Amor del Crist.<br>Exultem i en Ell alegrem-nos.<br>Temem i estimem el Déu vivent.<br>I amb cor sincer també nosaltres estimem-nos.", "Quan, doncs, tots ens ajuntem,<br>procurem no dividir-nos en l’esperit.<br>Cessin les lluites malignes, cessin les discòrdies.<br>Que el Crist Déu sigui sempre entre nosaltres.", "Juntament amb els sants, us puguem veure, <br>la vostra faç gloriosa, Crist Déu nostre.<br>Joia immensa, joia pura.<br>Pels segles infinits de seg1es.Amén."]}, {"n": "345", "t": "Diu el Senyor: \"Això és el meu cos...”", "p": ["Diu el Senyor: &quot;Això és el meu cos,<br>ofert per vosaltres;<br>aquest calze es la meva aliança<br>segellada amb la meva sang.<br>Cada vegada que en mengeu i en begueu,<br>feu-ho per celebrar el meu memorial", "<b>Com la cérvola es deleix per l’aigua viva,<br>també en deleixo jo per vós, Déu meu.<\/b>", "Tot jo tinc set de Déu,<br>del Déu que m’és vida;<br>quan podré veure<br>Déu cara a cara?", "Déu meu, la muralla que em salva sou vós.<br>per que m’abandoneu?<br>per què he d’anar de dol pertot arreu<br>seguit de prop per l’enemic?", "Envieu-me la llum i la veritat;<br>que elles em guiïn,<br>que em duguin a la muntanya sagrada,<br>al lloc on residiu.", "I m’acostaré a l’altar de Déu,<br>a Déu, que és la meva alegria;<br>ho celebraré i us lloaré amb la cítara,<br>Senyor, Déu meu."]}, {"n": "346", "t": "Com un capvespre els dos deixebles", "p": ["Com un capvespre els dos deixebles<br>allà a Emmaús us varen dir:", "<b>Senyor, quedeu-vos entre nosaltres.<\/b>", "Jo sóc el Pa vivent que ve del cel,<br>el Pa que us dono porta la salut,<br>qui em mengi amb fe no morirà mai més<br>i gaudirà del cel eternament.", "Un manament novell us dono avui:<br>que us estimeu de tot cor com germans,<br>com a tots mostro igual el meu amor<br>donant la vida, així vosaltres la trobeu.", "On regna l’amor es troba Déu!<br>Ens porta aquí la caritat del Crist:<br>alegrem-nos amb Ell, donem-li gràcies,<br>estimem-lo amb cor sincer.", "On regna l’amor es troba Déu!<br>Estem units en un mateix esperit;<br>guardem-nos del pecat que encén la lluita<br>i, enmig de nosaltres, Crist hi sigui."]}, {"n": "347", "t": "Pelegrins vers la casa del Pare", "p": ["Pelegrins vers la casa del Pare,<br>som nodrits pel cos del Crist.<br><b>Amén. Al·leluia!<\/b>", "És la nova aliança,<br>en la sang de Jesucrist.<br>Amén. Al·leluia!<br>Proclamant la seva mort<br>i esperant el seu retorn.<br><b>Amén. Al·leluia! <\/b>", "Hem estat tots invitats<br>a la taula del Senyor.<br>Amén. Al·leluia!<br>Per l’amor de Jesucrist,<br>estimem-nos: som germans.<br><b>Amén. Al·leluia!<\/b>", "Pelegrins vers la casa del Pare,<br>som nodrits pel cos de Crist.<br><b>Amén. Al·leluia!<br>Amén. Al·leluia!<\/b>"]}, {"n": "348", "t": "Senyor, doneu-nos sempre el vostre pa!", "p": ["<b>Senyor, doneu-nos sempre el vostre pa! <\/b>", "<b>Sortós aquell qui menjarà el pa al regne de Déu. <\/b>", "Jo sóc el pa de vida que ve del cel.<br>qui menja d’aquest pa viurà eternament.", "No tindrà fam qui vingui a mi<br>qui cregui en mi no tindrà set.", "El Pare us atreu perquè vingueu a mi,<br>qui em veu i creu en mi tindrà vida abundant.", "El pa que jo us dono és el meu cos;<br>l’únic que dóna la vida al món.", "Qui en menja viurà a causa de mi;<br>com Jo sempre visc pel Pare vivent.", "Qui menjarà la meva carn i beurà la meva sang,<br>en mi viurà, i jo viuré en ell.", "Si de mi us nodriu ressuscitareu,<br>i tindreu la vida sense fi."]}, {"n": "349", "t": "Tots esperem de vós, Senyor", "p": ["<b>Al·leluia!<br>Tots esperem de vós, Senyor, al·leluia!,<br>el nodriment de vida eterna. Al·leluia!<\/b>", "Jo sóc el vostre bon Pastor<br>que per vosaltres vaig morir.", "La meva vida us he donat<br>perquè vingueu al cel amb mi.", "Us he buscat amb tot l’amor<br>quan heu perdut el bon camí.", "A tots he vist i a tots conec,<br>és d’un a un que us he escollit.", "Si m’escolteu i sou humils,<br>coneixereu la meva veu.", "Teniu, mengeu: és el meu Cos,<br>que us vull donar com aliment.", "Tots els qui em mengin ja veuran<br>com sóc el Pa vingut del Cel.", "I si el meu Cos us ha nodrit,<br>viureu per sempre eternament.,"]}, {"n": "351", "t": "Senyor, que comparteixes", "p": ["Senyor, que comparteixes el teu Pa i el Vi,<br>amb els qui tu coneixes i tens com amics,<br>nosaltres estimem aquest gest teu i el teu do:<br>En tu trobem la Vida, Jesucrist, Senyor!", "Aquesta Eucaristia, Pare de bondat,<br>recordi aquell gran dia de la Llibertat;<br>nosaltres seguirem el teu camí sense por:<br>En tu trobem la Vida, Jesucrist, Senyor!", "Aplega’ns en el Regne que ens has preparat,<br>l’amor amb que tu estimes ens hi ha convidat.<br>Amb fe i amb alegria l’esperem, i amb dolor:<br>En tu trobem la Vida, Jesucrist, Senyor!", "La nostra vida sigui com el Pa i el Vi,<br>mireu-los com s’estimen&quot;, el món pugui dir.<br>Que el nostre testimoni sigui sal i llavor:<br>En tu trobem la Vida, Jesucrist, Senyor!"]}, {"n": "352", "t": "L’amor, que és Déu mateix, ha parat taula", "p": ["L’amor, que és Déu mateix, ha parat taula,<br>donem-nos-hi amb la fe que a tots convida;<br>banquet és Crist present entre nosaltres,<br>veniu, preneu, mengeu, si voleu vida.", "Fou Ell qui el Dijous Sant –sublim follia!–<br>donà el cos i la sang als qui estimava<br>quan, fent d’aquest seu gest una aliança,<br>pa i vi d’amor al món sencer ofrenava.", "La creu va segellar l’insigne pacte;<br>pa mòlt, el Crist occit, viu ressorgia!<br>Amics i comensals, cantem lloances,<br>que mai no esgotarem l’Eucaristia.", "L’aplec dels cristians en lluita i festa,<br>vivint d’aquest mannà segueix la ruta,<br>el «ja» i «l’encara no», que aquí s’abracen,<br>són doll d’una font fresca en terra eixuta.", "Donem, ben agraïts, glòria al Pare,<br>i al Fill per qui la terra és redimida,<br>que el do de l’Esperit, brollant tothora,<br>ens dugui a contemplar l’amor sens mida."]}, {"n": "353", "t": "Veniu, Senyor, doneu-nos aquell pa que ens heu promès", "p": ["<b>Veniu, Senyor, doneu-nos aquell pa que ens heu promès,<br>capaç de refer els nostres cors esgotats.<\/b>", "<b>A<\/b>.", "Jesús ha dit: Jo sóc el pa vivent que ha baixat del cel;<br>qui menja d’aquest pa, viurà eternament.", "Jesús ha dit: Un manament nou us dono:<br>que us estimeu els uns als altres, tal com j o us he estimat.", "Jesús ha dit: La meva pau us deixo,<br>us dono la meva pau, confieu sempre en mi.", "Jesús ha dit: Rebeu l’Esperit Sant,<br>i sigueu testimonis meus fins als extrems de la terra.", "<b>B<\/b>.", "Doneu el vostre pa a aquells qui tenen fam,<br>que tinguin fam de vós aquells qui tenen pa.", "Doneu la vostra força als febles d’aquest món,<br>doneu la humilitat a aquells qui es creuen forts.", "Doneu la fe joiosa a qui els falta claror,<br>que palpin la incertesa els qui es veuen segurs.", "Doneu ferma esperança a aquells qui tenen por,<br>que sentin ben present el Crist que s’ha fet Do.", "Doneu Llum veritable als qui us cerquen constants,<br>que els cors que us han trobat reposin en l’Amor."]}, {"n": "354", "t": "El vespre abans que a mort fos lliurat", "p": ["<b>El vespre abans que a mort fos lliurat,<br>sabent Jesús el temps arribat,<br>Ell com ningú mai no hagi estimat,<br>ens consagrà la seva amistat.<\/b>", "Va prendre el pa i el va repartir:<br>&quot;Es el meu cos&quot; a tots en va dir;<br>després passà la copa amb el vi:<br>&quot;La meva sang; qui en beu viurà amb mi&quot;.", "Memorial que el Crist ens deixà:<br>en el seu nom partim aquest pa.<br>Bevem el vi; i aquest breu sopar<br>té l’abundor del món que vindrà.", "Avui reunits en comunitat,<br>fem el teu gest, com t’hem recordat.<br>Que d’aquest pa, que junts hem pastat,<br>el teu amor en sigui el llevat."]}, {"n": "355", "t": "Si creiem que és vivent", "p": ["Si creiem que és vivent <br>tant com dura la vida,<br>no esperem més la fi del temps <br>perquè el vegem...<br>Badem els ulls;<br>cerquem arreu la seva imatge,<br>el seu batec al més pregon,<br>com un foc nou al cor del món.", "2. Si creiem que és vivent <br>en la nit més obscura,<br>preguem amb fe: <br>que el primer dia es feu la llum.<br>No tinguem por<br>si som moguts per la tempesta<br>que ens arrossega mar endins...<br>que ell en la mar obre camins.", "3. Si creiem que és vivent <br>en el clam d’aquest poble,<br>parem oïda i escoltem la seva veu.<br>Obrim el cor<br>al cor de qui sofreix i pena,<br>al cor de l’home de dolors<br>ofert en creu als pecadors.", "4. Si creiem que és vivent <br>com a l’alba de Pasqua,<br>no hem de faltar, <br>si ell ens convida al seu Sopar.<br>Prenem el pa,<br>bevem la copa i l’Aliança,<br>i el recordem transfigurat<br>en el moment del comiat."]}, {"n": "356", "t": "Diuen les mans: A reveure!", "p": ["<b>Diuen les mans: A reveure!<br>Llum de ponent roja clara...<br>Les molles de pa ens fan creure<br>que Ell és amb nosaltres encara.<\/b>", "Enrere neix l’enyorança,<br>els ulls fitant on marxava...<br>Camí de fe: per qui avança<br>no hi ha frontera ni trava.", "L’Esperit al món s’esbadella:<br>no acaba res, tot comença.<br>Als solcs oberts per la rella<br>colgada hi és la semença.", "A1 fort mateix de la lluita,<br>si el dubte no la suborna,<br>madura com una fruita<br>la fe que ens diu que ja torna.", "Sentim la seva paraula,<br>cantem plegats l’esperança...<br>Quan ell amb tots junts s’entaula,<br>l’amor, com vi, va vessant-se."]}, {"n": "357", "t": "Les multituds el Mestre", "p": ["<b>Les multituds el Mestre<br>seguien nit i dia;<br>Jesús se’n compadí.<br>Primer va alliçonar-los<br>amb mots que prometien<br>la pau del seu regnat diví.<\/b>", "Després volgué donar-los<br>menjar del que hi havia:<br>dos peixos i cinc pans.<br>Els beneí amb la destra,<br>manà distribuir-los<br>i es van anar multiplicant.", "La força del prodigi<br>només del cel davalla.<br>Tothom se n’és nodrit.<br>Recullen les deixalles<br>i emplenen dotze coves.<br>I els saciats són mils i mils.", "No obstant, un altra menja,<br>el, pa d’un nou miracle<br>guardava pels creients.<br>Aquells qui el Regne acceptin,<br>perquè de fam no morin<br>tindran el Pa que és E11 mateix.", "Si anem sovint a rebre’l<br>viurem de la presència<br>del Crist en el nou Pa.<br>Multiplicat se’ns dóna<br>per glòria del Pare,<br>i el seu amor ens fa germans."]}, {"n": "358", "t": "Un devot desfici", "p": ["Un devot desfici<br>m’ha impulsat Senyor;<br>vinc per adorar-vos<br>i donar-me a vós.<br>La grandesa vostra<br>feu-me contemplar<br>puix aquí s’amaga<br>en el vi i el pa.", "Vista, gust i tacte<br>no us sabran trobar;<br>per aconseguir-ho<br>és la fe el que val.<br>Fe en el que diguéreu<br>la darrera nit<br>als porucs deixebles,<br>consagrant pa i vi.", "En la creu s’amaga<br>la divinitat;<br>en l’altar s’oculta<br>fins la humanitat.<br>Jo, però, confesso<br>l’una i l’altra en vós;<br>com el lladre imploro<br>pietat, Senyor.", "No veig les ferides<br>que Tomàs veié<br>i també us confesso<br>el Senyor i Déu meu.<br>Feu que tingui sempre<br>l’esperit serè<br>i estimant-vos cregui<br>amb sincera fe.", "Vostre Pa ens conforta<br>i és memorial<br>d’una mort que és vida<br>per als cristians.<br>Tot aquell qui menja<br>vostre cos sagrat,<br>per la llum divina<br>resta transformat.", "Redemptor dels homes<br>sou, Senyor Jesús;<br>Els pecats es renten<br>amb la sang del Just.<br>Si l’Eucaristia<br>guarda vostra sang,<br>tot assaborint-la<br>ens sentim salvats.", "Si en el pa i el calze<br>ara us veig ocult,<br>sense vels vull veure-us,<br>Redemptor Jesús.<br>I si contemplar-vos<br>tant he desitjat,<br>reveleu-me un dia<br>vostra majestat. Amén."]}, {"n": "359", "t": "Pànge língua gloriósi", "p": ["Pànge língua gloriósi<br>Córporis mystérium,<br>Sanguinísque pretiósi,<br>quem in múndi prétium<br>frúctus véntris generósi<br>Rex effúdit géntium.", "Nóbis dàtus, nóbis nàtus<br>ex intàcta Vírgine,<br>et in mundo conversàtus,<br>spàrso vérbi sémine,<br>súi móras incolàtus<br>miro clàusit órdine.", "In suprémae nócte coénae<br>recúmbens cum fràtribus,<br>observàta lége plene<br>cíbis in legàlibus,<br>cíbum túrbae duodénae<br>se dat súis mànibus.", "Vérbum càro, pànem vérum<br>vérbo càrnem éfficit:<br>fítque Sànguis Chrísti mérum,<br>et si sénsus déficit,<br>ad firmàndum cor sincérum<br>sóla fïdes súfficit.", "Tàntum ergo Sacraméntum<br>venerémur cérnui:<br>et antíquum documéntum<br>nóvo cédat rítui:<br>praéstet fídes suppleméntum<br>sénsuum deféctui.", "Genitóri, Genitóque<br>Jaus et jubilàtio,<br>sàlus, hónor, vïrtus quoque<br>sit et benedíctio:<br>procedénti ab utróque<br>cómpar sit laudàtio,<br>Amén.", "Present a l’Eucaristia,<br>Jesucrist ens crida a tots.<br>Amb amor, fidel lloem-lo<br>que dels homes és Senyor.<br>Del pecat va redimir-nos<br>vessant la sang del seu cos.", "Al món vingué per salvar-nos<br>i Maria ens el donà.<br>D’Ell ens ve l’amor del Pare,<br>d’Ell ens ve l’Esperit Sant.<br>Jesucrist és llum divina<br>que ens fa el camí molt més clar.", "Darrer sopar, nit sortosa,<br>nit del testament diví.<br>Rodejat dels seus deixebles,<br>de la taula pren pa i vi<br>i en el cos i sang els muda<br>de si mateix, fet convit.", "Realitzà aquell prodigi<br>la paraula omnipotent;<br>i manà que el renovéssim<br>sempre més en el nom seu,<br>puix la Pasqua commemora<br>el gran triomf de l’Anyell.", "Postrem-nos tots i adorem-lo,<br>que la fe enardeix l’amor.<br>Ell s’és fet Eucaristia,<br>d’Ell ens ve la salvació...<br>Es l’Anyell que el món occia<br>i lleva el pecat del món.", "Per Ell donem glòria al Pare<br>puix al Crist ja pertanyem,<br>mentre l’Esperit curulla<br>de fervors la nostra fe.<br>Glòria al Déu Eucaristia,<br>glòria i honor, sempre més. Amén."]}, {"n": "360", "t": "Jo soc el Pa baixat del cel", "p": ["Jo soc el Pa baixat del cel;<br>qui em mengi a mi no morirà.<br>Jo viuré en ell, i ell viurà en mi<br>eternament vivent serà.", "Visc gloriós i triomfant,<br>i el meu triomf vostre serà<br>si com del cep els seus sarments<br>en mi viviu tots els germans.", "Seré tothora, dia i nit,<br>devora teu, com el pastor;<br>de Veritat jo et nodriré<br>i de cap mal no tindràs por.", "Si, pecador, de Mi te’n vas,<br>impacient t’esperaré;<br>quan, penedit, retornaràs,<br>de nou, fill meu, t’abraçaré.", "Vós sou camí, i sou Veritat<br>i vida sou, Senyor Jesús.<br>En vós la vida jo he posat<br>i no seré mai més confús."]}, {"n": "361", "t": "Hem menjat el pa del cel", "p": ["<b>Hem menjat el Pa del cel,<br>l’aliment de vida eterna.<\/b>", "Jesús diu:", "Jo sóc el Pa que del cel ha davallat:<br>el qui mengi d’aquest Pa,<br>romandrà en el meu Amor.", "Jo sóc el Cep i vosaltres els sarments:<br>aquell qui roman en Mi,<br>donarà fruit abundós.", "Sóc el Camí que us emmena cap al cel:<br>el qui faci via amb Mi,<br>haurà glòria eternament.", "Jo sóc la Pau que aquest món no pot donar:<br>el qui creu que he eixit de Déu,<br>amb el Pare fa amistat.", "La Vida sóc que desfà en creu la mort:<br>el qui vingui i mori amb Mi,<br>ja per sempre més viurà.", "Jo sóc el Jorn, que il·lumina vostra nit:<br>el qui hi vegi i cregui en Mi,<br>darà estatge a l’ Esperit."]}, {"n": "362", "t": "Cal que tots mengem el mateix pa", "p": ["<b>Cal que tots mengen del mateix pa.<br>Cal que tots beguem del mateix vi.<br>Ens cal dir, ben units,<br>tot pregant els uns pels altres:<br>oh germans, Crist ens ha salvat!<\/b>", "Aquest pa que el Crist ens ha donat<br>ens guareix i ens deslliura del pecat.<br>Ens cal dir, ben units,<br>tot pregant els uns pels altres:<br>oh, germans, Crist ens ha salvat!", "Quan el pa mengem al teu entorn,<br>apropem el temps del teu retorn.<br>Ens cal dir, ben units,<br>tot pregant els uns pels altres:<br>oh, germans, Crist ens ha salvat!", "Qui ha menjat, amb el Senyor viurà;<br>qui ha begut, de set no morirà.<br>Ens cal dir, ben units,<br>tot pregant els uns pels altres:<br>oh, germans, Crist ens ha salvat!"]}, {"n": "363", "t": "Jesucrist ens ha estimat", "p": ["Jesucrist ens ha estimat <br>com ningú mai no ha estimat.<br>Pels camins d’aquesta nit<br>ens va guiant com un estel.<br>Quan partim el Pa sagrat, <br>ens fa el do del seu amor:<br>És el Pa de l’amistat, <br>el Pa de Déu.", "<b>Cos sagrat! &quot;Menja i seràs fort.&quot;<br>Calze sant! &quot;Beu la meva sang,<br>que jo sóc la Vida, i jo sóc l’Amor.&quot;<br>Oh Senyor, reuneix els homes en l’amor!<\/b>", "Jesucrist ens ha estimat <br>com ningú mai no ha estimat.<br>Per a la gent de Natzaret <br>era el fuster i era l’amic.<br>Amb les mans ha treballat, <br>com fas tu i com faig jo.<br>Sap el que és amb la suor <br>guanyar-se el pa.", "Jesucrist ens ha estimat <br>com ningú mai no ha estimat.<br>Ara crida tots els pobles <br>al festí de l’amistat.<br>Si confesses que és Senyor, <br>et fa membre del seu Cos.<br>Ni la mort no ens podrà prendre <br>el seu amor!"]}, {"n": "364", "t": "Senyor, vós que cerqueu els fills", "p": ["Senyor, Vós que cerqueu els fills,<br>perquè sou l’Amor.<br>Vulgueu unir tots els vivents,<br>amb el vostre Amor.", "<b>Senyor, Senyor, rebeu dins de l’Església<br>tots els nostres germans del món,<br>en un sol amor!<\/b>", "Senyor, que satisfeu la fam,<br>perquè sou l’Amor.<br>Llesqueu per tots el vostre Pa,<br>amb el vostre Amor.", "Senyor, que ens prometeu la pau,<br>perquè sou l’Amor.<br>Porteu-la sobre el nostre món,<br>amb el vostre Amor.", "Senyor, Vós que esguardeu el món,<br>perquè sou l’Amor.<br>Que arribi a tots la vostra veu,<br>amb el vostre Amor."]}, {"n": "365", "t": "Oh, Senyor, vine, no tardis", "p": ["<b>Oh Senyor, vine, no tardis,<br>enforteix els qui esperem en tu,<br>que el cel nou, la terra nova,<br>de nosaltres encara és lluny.<\/b>", "Crist és el qui ens aplega,<br>falten molts dels nostres companys,<br>molts dels que en el món lluiten<br>per menjar del mateix pa com a germans.", "La Paraula que ens dónes<br>reviurà si junts hi creiem,<br>si nostres mans treballen<br>i en el cor sofrim perquè no ens estimem.", "El teu Pa tu ens .parteixes,<br>en el món res no és compartit:<br>no et preguem que ens n’allunyis,<br>sinó que ens omplis de força i de neguit."]}, {"n": "366", "t": "No podem pas caminar", "p": ["<b>No podem pas caminar<br>amb fam, set i calor.<br>L’aliment del vostre Cos<br>ens dóna forces, Senyor.<\/b>", "Menjant el Pa de vostre amor<br>serem més cristians<br>i ens estimarem de veritat,<br>units tots els germans.", "Així el desert travessarem<br>valents sens defallir.<br>Trepitjant la sorra d’aquest món<br>farem el llarg camí.", "Farem camí seguint fidels<br>el vostre manament,<br>fins a reposar ala vostra llar<br>per sempre, eternament."]}, {"n": "368", "t": "Cantem sempre les lloances", "p": ["Cantem sempre les lloances<br>de Jesús Eucaristia:<br>Cos i Sang de Déu fet home<br>dins l’entranya de Maria:<br>Pa del cel que ens dóna el Pare<br>llaç d’amor que ens fa a tots lliures.", "A la càtedra dels segles<br>resta viva sa Paraula:<br>&quot;El meu Cos és Pa de vida<br>que s’entrega per vosaltres,<br>i és ma Sang aquesta copa<br>amb què fem nova aliança&quot;.", "Res no veu nostra mirada,<br>res no entén la intel·ligència.<br>Sols la fe guaita l’aurora<br>dins la nit de sa presència.<br>Sols la fe tasta el miracle<br>d’aquest Pa de vida eterna.", "No deixem que les rancúnies<br>entristeixin nostra Taula.<br>Si mengem el Pa de vida<br>i bevem del mateix Calze,<br>anem tots amb les mans juntes<br>a continuar la tasca."]}, {"n": "371", "t": "De l’entranya de l’espiga", "p": ["De l’entranya de l’espiga<br>i la fruita del parral,<br>Crist n’ha tret el gran Misteri<br>que adorem els cristians,<br>on el pa es fa Carn divina<br>i és el vi la seva Sang. (2)", "<b>Adorem l’Eucaristia,<br>que ens uneix en caritat.<\/b>", "Es el vi de l’alegria.<br>Es el pa de la unitat.<br>Es reforç dels qui caminen<br>de la mà dels seus germans.<br>Es mannà de vida eterna<br>que assacia nostra fam. (2)", "Crist habita entre nosaltres<br>i ens convida al seu sopar,<br>al convit de l’Aliança<br>que amb sa sang ha rubricat.<br>Acceptem amb fe segura<br>el vi bo del seu altar. (2)", "Adorem l’Eucaristia<br>que ens uneix en caritat.<br>De la Pasqua cristiana,<br>n’és el viu memorial,<br>i és penyora de la glòria<br>que sustenta el nostre afany. (2)", "Donem gràcies al Pare<br>pel menjar que ens ha donat,<br>i al seu Fill que, per nosaltres,<br>ha vessat la seva Sang,<br>i ens congrega entorn de l’ara<br>per l’Amor, l’Esperit Sant. (2)"]}, {"n": "372", "t": "Del Crist tots som germans", "p": ["Del Crist tots som germans<br>i Déu és nostre Pare;<br>cantem plegats la fe<br>que ens fa estimar tothom.<br>A1 pobre obrim la llar<br>i el cor de bat a bat<br>si és que som de debò <br>els deixebles del Crist.", "<b>Veniu, mengeu el pa que ens agermana;<br>el pa de l’amistat, el pa dels fills de Déu.<br>El pa que hem treballat amb suor del nostre front:<br>és el pa de l’amor, és el Cos del Senyor<\/b>.", "Quan oferim el pa<br>i el vi a la taula santa,<br>pensem en tots aquells<br>que al món pateixen fam.<br>Cal que partim el pa<br>amb el nostre germà<br>si és que som de debò <br>els deixebles del Crist.", "En el darrer sopar<br>Jesús donà el precepte:<br>&quot;A tots heu d’estimar<br>com jo us he estimat’:<br>Ja no fem distinció<br>de pobres o de rics,<br>si és que som de debò <br>els deixebles del Crist."]}, {"n": "375", "t": "Cantem tots a l’Amor que ens enamora", "p": ["Cantem  tots a l’Amor que ens enamora,<br>cantem tots al Senyor! <br>Déu és ací! oh gent adoradora, <br>adorem-lo el Crist i Redemptor!", "<b>Glòria a Vós, Jesucrist!<br>Oh Cels i terra, beneïu el Senyor!<br>Honor i Glòria a Vós, Rei de la Glòria;<br>amor per sempre a Vós, Déu de l’Amor!<\/b>", "Unim la nostra veu amb la que canta<br>bells himnes dalt del cel.<br>Déu és ací; present en l’Hòstia santa<br>que ens el mostra darrere d’aquests vels.", "Oh Pa del cel vivent, dolça finesa, <br>excés d’amor suprem;<br>Déu és ací: donant-nos fortalesa<br>i nodrint-nos amb l’Hòstia que veiem."]}]}, {"name": "Salms", "songs": [{"n": "401", "t": "Al·leluia! Som a la casa del Senyor", "p": ["<b>Al·leluia! Som a la casa del Senyor.<\/b>", "1. Quina alegria quan em van dir:<br>&quot;Anem a la casa del Senyor.&quot;<br>Ja han arribat els nostres peus<br>al teu llindar, Jerusalem.", "2. Jerusalem, ciutat ben construïda,<br>conjunt harmoniós;<br>és allà que pugen les tribus<br>les tribus del Senyor,<br>a complir l’aliança d’Israel<br>a lloar el nom del Senyor.<br>Allí hi ha els tribunals de justícia,<br>els tribunals del palau de David.’", "3. Augureu la pau a Jerusalem:<br>&quot;Que visquin segurs els qui t’estimen,<br>que sigui inviolable la pau dels teus murs,<br>la quietud dels teus merlets.&quot; . _", "4. Per amor dels meus germans i amics<br>deixeu-me dir: Que hi hagi pau dintre teu.&quot;<br>Per la casa del Senyor, el nostre Déu,<br>et desitjo la felicitat."]}, {"n": "402", "t": "En vós confio, que no quedi confós", "p": ["<b>En vós confio, que no quedi confós. <\/b>", "<b>Mostreu-me, oh Senyor, els vostres camins;<br>els vostres viaranys ensenyeu-me.<\/b>", "1. A vós elevo la meva ànima, Senyor.<br>Déu meu, en vós confio,<br>que no en tingui un desengany<br>i no se n’alegrin els enemics.", "2. No s’enduran un desengany els qui esperen en vós,<br>sinó els qui us abandonen per fiar-se del no-res.<br>Feu que conegui, Senyor, les vostres rutes,<br>que aprengui els vostres camins.", "3. Encamineu-me en la vostra veritat, instruïu-me,<br>perquè vós sou el Déu que em salveu;<br>i cada moment espero en vós,<br>perquè sé que sou bo, Senyor.", "4. Recordeu-vos, Senyor, de la vostra pietat<br>i de l’amor que heu guardat des de sempre.<br>No us recordeu dels pecats que he comès de jove,<br>compadiu-vos de mi, vós que estimeu tant."]}, {"n": "403", "t": "Serviu el Senyor amb alegria", "p": ["<b>Serviu el Senyor amb alegria.<\/b>", "1. Aclameu el Senyor, arreu de la terra,<br>doneu culte al Senyor amb cants de festa,<br>entreu davant d’ell amb crits d’alegria.", "2. Reconeixeu que el Senyor és Déu,<br>que és el nostre creador i que som seus,<br>som el seu poble i el ramat que ell pastura.", "3. Entreu als seus portals enaltint-lo,<br>canteu lloances als seus atris,<br>enaltiu i beneïu el seu nom:", "4. &quot;Que n’és de bo, el Senyor!<br>Perdura eternament el seu amor,<br>és fidel per segles i segles.&quot;"]}, {"n": "404", "t": "L’adoraran tots el reis de la terra", "p": ["<b>L’adoraran tots el reis de la terra,<br>tots els pobles el serviran.<\/b>", "1. Déu meu, doneu al rei el vostre dret;<br>doneu al príncep la vostra rectitud.<br>Que governi amb justícia el vostre poble,<br>que sigui recte amb els humils.", "2. Que les muntanyes duguin pau al poble,<br>que duguin benestar els turons.<br>Que els humils es vegin emparats,<br>i salvats els fills dels pobres,<br>que desfaci els opressors.", "3. Que duri com el sol i la lluna,<br>segles i més segles.<br>que faci el bé com la pluja a l’herbei,<br>com els ruixats que assaonen la terra.", "4. Que el benestar floreixi als seus dies,<br>i mesos i anys abundi la pau.<br>Que domini des d’un mar a l’altre,<br>des del Gran Riu fins a l’extrem del país.", "5. Els adversaris li faran homenatge,<br>els enemics s’abaixaran fins a la pols.<br>Li portaran obsequis de les illes i els reis de Tarsís;<br>els reis d’Aràbia i de Sabà li oferiran presents.", "6. Li faran homenatge tots els reis,<br>se li sotmetran tots els pobles.", "7. S’apiadarà dels pobres i dels febles,<br>els salvarà de la mort;<br>els rescatarà del poder dels violents,<br>estimant com un tresor la seva vida."]}, {"n": "405", "t": "Perdó, Senyor, contra vós hem pecat", "p": ["<b>Perdó, Senyor, contra vós hem pecat.<\/b>", "1. Compadiu-vos de mi, Déu meu, <br>vós que estimeu tant;<br>vós que sou tan bo, esborreu les meves faltes;<br>renteu-me ben bé de les culpes,<br>purifiqueu-me dels pecats.", "2. Ara reconec les meves faltes,<br>tinc sempre present el meu pecat.<br>Contra vós, contra vós sol he pecat,<br>i he fet el que és dolent als vostres ulls.", "4. Vós estimeu la veritat al fons del cor,<br>dintre de mi m’ensenyeu a tenir seny.<br>Aspergiu-me amb hisop, que quedi pur;<br>renteu-me i seré més blanc que la neu.", "6. Déu meu, creeu en mi un cor ben pur,<br>feu renéixer en mi un esperit ferm.<br>No em llanceu de la vostra presència,<br>ni em prengueu el vostre esperit sant.", "9. Les víctimes no us satisfan,<br>si us oferia un holocaust, no me’l voldríeu.<br>La víctima que ofereixo és un cor penedit;<br>un esperit que es penedeix, <br>vós, Déu meu, no el menyspreeu."]}, {"n": "406", "t": "Des de l’abisme clamo a vós, Senyor", "p": ["<b>Des de l’abisme clamo a vós, Senyor.<\/b>", "1. Des de l’abisme »s crido, Senyor.<br>Escolteu el meu clam.<br>Estigueu atent, escolteu<br>aquest clam que us suplica.", "2. Si tinguéssiu en compte les culpes,<br>¿qui es podria sostenir?<br>Però és molt vostre perdonar,<br>i això ens infon respecte.", "3. Confio en la paraula del Senyor,<br>la meva ànima hi confia.<br>Espera el Senyor la meva ànima,<br>més que els sentinelles el matí.", "4. Que esperin el matí els sentinelles!<br>Israel espera el Senyor,<br>perquè són del Senyor l’amor fidel<br>i la redempció generosa.<br>Es ell qui redimeix Israel<br>de totes les seves culpes."]}, {"n": "407", "t": "El Senyor és el meu pastor", "p": ["<b>El Senyor és el meu pastor,<br>no em manca res. <\/b>", "<b>Senyor, de la vostra taula<br>menjarem el pa de l’amor.<\/b>", "1. El Senyor és el meu pastor, no em manca res,<br>em fa descansar en prats deliciosos;<br>em mena al repòs vora l’aigua,<br>i allí em retorna.", "2. Em guia per camins segurs<br>per l’amor del seu nom.<br>Ni quan passo per barrancs tenebrosos<br>no tinc por de res,", "3. perquè us tinc vora meu;<br>la vostra vara de pastor,<br>m’asserena i em conforta.", "4. Davant meu pareu taula vós mateix,<br>i els enemics ho veuen;<br>m’heu ungit el cap amb perfums,<br>ompliu a vessar la meva copa.", "5. La vostra bondat: i el vostre amor<br>m’acompanyen tota la vida,<br>i viuré anys i més anys<br>a la casa del Senyor."]}, {"n": "408", "t": "Com uns plançons d’olivera", "p": ["<b>Com uns plançons d’olivera<br>al voltant de la taula del Senyor:<br>així són els fills de l’Església.<\/b>", "<b>Que el Senyor d’Israel us uneixi per sempre!<br>En el goig i en la pena, Ell és el camí.<\/b>", "1. Feliç tu, fidel del Senyor, <br>que vius seguint els seus camins.", "2. Menjaràs del fruit del teu treball,<br>seràs feliç i tindràs sort.", "3. La teva esposa fruitarà com una parra,<br>dins la intimitat de casa teva;", "4. Veuràs els fills com plançons d’olivera<br>al voltant de la taula.", "5. Es així com els fidels del Senyor<br>seran beneïts.", "6. Que el Senyor et beneeixi des de Sió.<br>Que puguis veure els fills dels teus fills."]}, {"n": "409", "t": "Proclameu per tot el món", "p": ["<b>Proclameu per tot el món <br>que el Senyor és Rei! <\/b>", "<b>Jesucrist és Rei de reis<br>i Senyor dels qui dominen.<\/b>", "1. El Senyor és rei,<br>va vestit de majestat.<br>El Senyor va vestit<br>i cenyit de poder.", "2. Manté ferm<br>tot el món, incommovible.<br>El vostre soli es manté des del principi,<br>vós sou des de sempre.", "3. Les fonts de l’oceà, <br>Senyor,<br>les fonts de l’oceà fan sentir el seu bramul,<br>les fonts de l’oceà fan sentir el so de l’aigua.", "4. Més que el bramul<br>dels oceans,<br>més potent que les onades del mar,<br>és potent a les altures el Senyor.", "5. E1 vostre pacte<br>és irrevocable;<br>la santedat, Senyor, escau a casa vostra<br>al llarg de tots els temps."]}, {"n": "410", "t": "Al·leluia, lloem el Senyor, al·leluia, al·leluia!", "p": ["<b>Al·leluia, lloem el Senyor, al·leluia, al·leluia! <\/b>", "1. Lloeu Déu al seu santuari,<br>lloeu-lo al baluard del firmament,<br>lloeu-lo per les seves gestes,<br>lloeu-lo per la seva grandesa.", "2. Lloeu-lo al so dels corns,<br>lloeu-lo amb arpes i lires,<br>lloeu-lo amb tambors i danses<br>lloeu-lo al so de flautes i corda.", "3. Lloeu-lo amb címbals sonors,<br>lloeu-lo amb címbals triomfants.<br>Que lloï el Senyor<br>tot el que respira."]}, {"n": "411", "t": "Que el vostre amor, Senyor, no ens", "p": ["<b>Que el vostre amor, Senyor, no ens deixi mai;<br>aquesta és l&#x27;esperança que posem en vós.<\/b>", "Tenim posada l’esperança en el Senyor,<br>auxili nostre i escut que ens protegeix."]}, {"n": "414", "t": "Com la cérvola deleja l’aigua", "p": ["<b>Com la cérvola deleja l’aigua,<br>així, Senyor, us desitja la meva ànima.<\/b>", "<b>Aniré a la casa de Déu<br>amb cants de joia i lloança.<\/b>", "1. Com la cérvola es deleix<br>per l’aigua viva,<br>també em deleixo jo<br>per vós, Déu meu.", "2. Tot jo tinc set de Déu,<br>del Déu que m’és vida;<br>¿quan podré veure Déu<br>cara a cara?", "8. Que el Senyor confirmi cada dia<br>l’amor que em té.<br>I cada nit cantaré la lloança<br>del Déu que m’és vida.", "11. ¿Per què aquesta tristor, ànima meva?<br>Per què aquest torbament?<br>Espera en Déu. Jo el tornaré a lloar:<br>Salvador meu i Déu meu."]}, {"n": "415", "t": "De la muntanya del Senyor ve el meu ajut", "p": ["<b>De la muntanya del Senyor ve el meu ajut. <\/b>", "<b>El Senyor ens guardi de tot mal,<br>guardi la nostra vida.<\/b>", "1. Alço els ulls a les muntanyes:<br>d’on em vindrà l’ajuda?<br>L’ajuda em vindrà del Senyor,<br>del Senyor que ha fet cel i terra.", "2. Que no deixi relliscar el teu peu,<br>ni s’adormi el qui et guarda.<br>E1 guardià d’Israel mai no s’adorm,<br>sempre vigila.", "3. Es el Senyor qui et guarda,<br>el Senyor t’empara el teu costat mateix.<br>De dia el sol no et farà mal,<br>ni la lluna de nit.", "4. E1 Senyor et guarda de tota desgràcia,<br>et guarda la vida.<br>El Senyor guarda tots els teus passos<br>ara i per tots els segles."]}, {"n": "416", "t": "Senyor, el nostre cor té set de vós", "p": ["<b>Senyor, el nostre cor té set de vós:<br>deu-nos l’aigua de la vida.<\/b>", "<b>Els nostres llavis, Senyor,<br>canten la vostra bondat.<\/b>", "1. Vós, Senyor, sou el meu Déu; jo us cerco.<br>Tot jo tinc set de vós,<br>per vós es desviu el meu cor,<br>com terra eixuta sense una gota d’aigua.", "2. Jo us contemplava al vostre santuari<br>quan us veia gloriós i poderós.<br>L’amor que em teniu val més que la vida;<br>per això els meus llavis us lloaran.", "3. Que tota la vida us pugui beneir<br>i alçar les mans lloant el vostre nom.<br>Saciat del bo i millor,<br>us lloaré amb el goig als llavis.", "4. Quan des del llit us recordo,<br>passo les nits pensant en vós<br>perquè vós m’heu ajudat,<br>i sóc feliç sota les vostres ales.", "5. La meva ànima s’ha enamorat de vós,<br>em sosté la vostra mà."]}, {"n": "417", "t": "Us beneirem, Senyor, cada dia", "p": ["<b>Us beneirem, Senyor, cada dia<br>i recordarem la vostra bondat.<\/b>", "1. Us exalçaré, Déu meu i rei meu,<br>beneiré el vostre nom per sempre.<br>Us beneiré dia rere dia,<br>lloaré per sempre el vostre nom.", "2. El Senyor és compassiu i benigne,<br>lent per al càstig, gran en l’amor.<br>El Senyor és bo per a tothom,<br>estima entranyablement tot el que ell ha creat.", "3. Tothom té els ulls en vós, mirant esperançat,<br>i al seu temps vós els doneu l’aliment.<br>Tan bon punt obriu la mà,<br>sacieu de bon grat tots els vivents.", "4. Són camins de bondat els del Senyor,<br>les seves obres són obres d’amor.<br>El Senyor és a prop dels qui l’invoquen,<br>dels qui l’invoquen amb sinceritat."]}, {"n": "418", "t": "Les meves mans i els meus peus han foradat", "p": ["<b>Les meves mans i els meus peus han foradat,<br>puc comptar tots els meus ossos.<\/b>", "1. Déu meu, Déu meu, perquè m’heu abandonat?<br>No us arriba el meu crit d’auxili,<br>la pregària que us adreça el meu clam.<br>Crido de dia, i vós no em responeu,<br>crido de nit, i no me’n feu cas.<br>I això que vós teniu el tron al santuari,<br>esperança d’Israel.", "3. Però jo sóc un cuc, no pas un home,<br>befa de la gent i menyspreat del poble;<br>tots els qui em veuen riuen de mi,<br>amb els llavis i amb el cap prenen aires de mofa:<br>&quot;S’ha adreçat al Senyor; que l’alliberi, doncs;<br>que el salvi, si tant se l’estima.&quot;", "7. M’envolta una munió de gossos,<br>em rodeja un estol de malfactors,<br>m’han lligat les mans i els peus,<br>puc comptar tots els meus ossos.", "8. Em miren, em contemplen satisfets,<br>es reparteixen entre ells els meus vestits,<br>es juguen als daus la meva roba.<br>Almenys vós, Senyor, no us allunyeu;<br>força meva, cuiteu a defensar-me."]}, {"n": "419", "t": "Jo sóc la llum del món", "p": ["<b>Jo sóc la llum del món:<br>el qui em segueix no caminarà a les fosques,<br>sinó que tindrà la llum de la vida.<\/b>", "1. Beneiré el Senyor en tot moment,<br>tindré sempre als llavis la seva lloança.<br>La meva ànima es gloria en el Senyor;<br>se n’alegraran els humils quan ho sentin.", "2. Tots amb mi glorifiqueu el Senyor,<br>exalcem plegats el seu nom.<br>He demanat al Senyor que em guiés;<br>ell m’ha escoltat, res no m’espanta.", "3. Alceu vers ell la mirada. Us omplirà de llum,<br>i no haureu d’abaixar els ulls, avergonyits.<br>Quan els pobres invoquen el Senyor,<br>els escolta i els salva del perill.", "4. Acampa l’àngel del Senyor<br>entorn dels seus fidels, per protegir-los.<br>Tasteu i veureu que n’és, de bo, el Senyor;<br>feliç l’home que s’hi refugia.", "5. Sants del Senyor, venereu-lo;<br>venereu-lo i no us mancarà res.<br>Els rics s’empobriran, passaran fam,<br>però als qui busquen al Senyor no els faltarà cap bé."]}, {"n": "451", "t": "Déu és per a nosaltres un refugi i un castell", "p": ["<b>Déu és per a nosaltres un refugi i un castell,<br>en l’adversitat hi trobem un gran auxili.<br>Res no temem quan la terra se somou,<br>quan dins la mar les muntanyes trontollen.<\/b>", "l. Ja poden; bramular i escumejar les seves aigües,<br>i al seu embat estremir-se les muntanyes.<br>El Déu dels exèrcits és amb nosaltres,<br>E1 Déu de Jacob ens és la ciutadella.", "2. Les aigües dels canals alegren la ciutat de Déu,<br>la mansió més santa de l’Altíssim.<br>Déu és enmig d’ella, no pot trontollar;<br>és Déu que la socorre quan apunta l’alba.", "3. Bramulen tots els pobles, trontollen els reialmes:<br>trona la veu d’ell, es dissol la terra. <br>El Déu dels exèrcits és amb nosaltres,<br>el Déu de Jacob ens és la ciutadella.", "4. Veniu, contempleu les gestes del Senyor,<br>d’Ell que ha obrat prodigis a la terra.<br>Arreu del país ha fet cessar els combats,<br>ha fet miques l’arc, ha trossejat la llança.", "5. &quot;Per fi reconeixeu que jo sóc el vostre Déu,<br>que domino els pobles, domino la terra&quot;.<br>E1 Déu dels exèrcits és amb nosaltres,<br>el Déu de Jacob ens és la ciutadella."]}, {"n": "452", "t": "Quina alegria quan em digueren", "p": ["<b>Quina alegria quan em digueren:<br>Anem a la casa del Senyor!<br>Ja posem els nostres peus<br>al teu llindar, Jerusalem!<\/b>", "l. Jerusalem, ciutat ben construïda,<br>formant un bell conjunt;<br>és allà on pugen les tribus,<br>les tribus del Senyor.", "2. És llei d’Israel que hi vagin<br>a lloar el nom del Senyor.<br>S’asseuen allà els tribunals de justícia,<br>el tron de la casa de David.", "3. Augureu la pau a Jerusalem:<br>Que visquin segurs els qui t’estimen!<br>Sigui inviolable la pau dels teus murs,<br>la tranquil·litat dels teus merlets!", "4. Per amor dels meus germans i amics<br>deixeu-me-li dir: &quot;Que hi hagi pau dintre teu.&quot;<br>Per la casa del Senyor, el nostre Déu,<br>et desitjo el benestar."]}, {"n": "453", "t": "Des de l’abisme et crido, Senyor", "p": ["1. Des de l’abisme et crido, Senyor.<br>Senyor, escolta el meu clam.<br>Estigues atent, escolta<br>aquest clam que et suplica.", "<b>Confio en la paraula del Senyor,<br>la meva ànima hi confia.<br>Confio en la paraula del Senyor,<br>perquè ens porta la salvació.<\/b>", "2. Si tinguessis en compte les culpes,<br>qui es podria sostenir?<br>Però és molt teu perdonar,<br>i això ens infon respecte.", "3. Espera el Senyor la meva ànima,<br>més que els sentinelles al matí.<br>Que esperin el matí els sentinelles!<br>Israel espera el Senyor.", "4. Perquè són del Senyor l’amor fidel<br>i la redempció generosa.<br>És Ell qui redimeix Israel<br>de totes les seves culpes."]}, {"n": "454", "t": "Anima meva, recobra la calma", "p": ["<b>Anima meva, recobra la calma,<br>que el Senyor et guarda i t’empara.<br>Anima meva, recobra la calma,<br>que el Senyor escolta el teu clam.<\/b>", "1. Estimo el Senyor de tot cor,<br>perquè ha escoltat la meva súplica.<br>EI Senyor ha escoltat el meu clam<br>així que l’invocava.", "2. M’envoltaven els llaços de la mort,<br>tenia davant meu els seus paranys,<br>i dintre meu l’angoixa i el neguit.<br>Vaig invocar el nom del Senyor:<br>Senyor, salva’m la vida!", "3. El Senyor és just i benigne,<br>el nostre Déu sap compadir;<br>el Senyor salvaguarda els senzills,<br>jo era feble i m’ha salvat!", "4. Ha alliberat de la mort la meva vida,<br>els meus ulls, de negar-se en el plor,<br>els meus peus de donar un pas en fals,<br>de donar un pas en fals."]}, {"n": "455", "t": "Avui és el dia que ha obrat el Senyor", "p": ["<b>Avui és el dia que ha obrat el Senyor:<br>alegrem-nos i celebrem-lo.<br>Enaltiu al Senyor.<\/b>", "<b>Que n’és, de bo!<br> El seu amor perdura eternament.<br>Al·leluia, al·leluia.<\/b>", "1. Que respongui la casa d’Israel:<br>el seu amor perdura eternament.<br>Que respongui la casa d’Aaron:<br>el seu amor perdura eternament.<br>Que responguin els fidels del Senyor:<br>el seu amor perdura eternament.", "2. Escolteu, crits de festa i de victòria<br>al campament dels justos:<br>La dreta del Senyor em glorifica,<br>fa proeses, la dreta del Senyor. (2)", "3. Obriu-me les portes dels justos;<br>entraré a donar gràcies al Senyor.<br>Aquest és el portal del Senyor,<br>els justos hi poden entrar.<br>No moriré, viuré encara,<br>per a contar les proeses del Senyor.", "4. Ordeneu, amb rams, la processó<br>fins als corns de l’altar.<br>Sou vós el meu Déu, us dono gràcies;<br>Déu meu, us vull exalçar!<br>Reconeixeu que n’és, de bo, el Senyor,<br>el seu amor perdura eternament!"]}, {"n": "456", "t": "Que el Senyor ens construeixi la casa", "p": ["<b>Que el Senyor ens construeixi la casa,<br>que el Senyor ens guardi la ciutat;<br>que ens empleni de la seva riquesa,<br>i que ens guardi sempre de mal.<\/b>", "1. Si el Senyor no construeix la casa,<br>és inútil l’afany dels constructors. <br>Si el Senyor no guarda la ciutat,<br>és inútil que els guardes vigilin.", "2. Es inútil que us lleveu tan de matí,<br>i aneu tan tard a reposar,<br>per menjar el pa que us guanyeu amb dures penes.<br>Fins quan dormen, Déu el dóna als seus amics.", "3. La millor herència són els fills, do del Senyor,<br>els descendents són la millor recompensa;<br>els fills que heu tingut quan éreu joves<br>són com les fletxes en mans d’un guerrer.", "4. Feliç l’home que se n’omple el buirac:<br>si discuteix amb algú davant la gent,<br>no haurà de retirar-se avergonyit."]}, {"n": "457", "t": "Al·leluia, al·leluia!", "p": ["<b>Al·leluia, al·leluia!<br>El Senyor és el nostre Rei.<br>Al·leluia, al·leluia!<br>El Senyor és el nostre Rei.<\/b>", "1. Canteu al Senyor un càntic nou, <br>a Ell, que ha fet meravelles;<br>ha triomfat amb la seva dreta,<br>amb el seu braç sagrat.", "2. El Senyor es manifesta salvador,<br>als ulls dels pobles es revela;<br>es recorda fidelment del seu amor i la seva bondat<br>envers la casa d’Israel.", "3. Han vist les contrades de la terra<br>la salvació del nostre Déu.<br>Aclameu el Senyor, tota la terra,<br>danseu, exulteu i salmegeu.", "4. Canteu al Senyor amb la cítara,<br>sonin els instruments;<br>i amb tocs de corns i de trompetes<br>aclameu el Rei i Senyor.", "5. Judicarà l’univers amb justícia,<br>els pobles amb raó."]}, {"n": "458", "t": "Lloeu el Senyor, vosaltres, tots els pobles", "p": ["Lloeu el Senyor, vosaltres, tots els pobles,<br>glorifiqueu-lo, totes les nacions!<br>És immens el seu amor per nosaltres,<br>la fidelitat del Senyor durarà sempre.<br>Al·leluia. Al·leluia!"]}, {"n": "459", "t": "Al·leluia! ( 4)", "p": ["<b>Al·leluia! (<\/b>4)", "1. Lloeu Déu al seu santuari,<br>lloeu-lo al baluard del firmament,<br>lloeu-lo per les seves gestes,<br>lloeu-lo per la seva grandesa.", "2. Lloeu-lo al so dels corns,<br>lloeu-lo amb arpes i lires,<br>lloeu-lo amb tambors i danses,<br>lloeu-lo al so de flautes i corda.", "3. Lloeu-lo amb címbals sonors,<br>lloeu-lo amb címbals triomfants.<br>Que lloï el Senyor<br>tot el que respira. Al·leluia."]}, {"n": "460", "t": "Beneiré el Senyor en tot moment", "p": ["1. Beneiré el Senyor en tot moment,<br>tindré sempre als llavis la seva lloança.<br>La meva ànima es gloria en el Senyor;<br>se n’alegraran els humils quan ho sentin.", "<b>Tasteu, i veureu que n’és, de bo, el Senyor;<br>feliç l’home que s’hi refugia.<\/b>", "2. Tots amb mi glorifiqueu el Senyor,<br>exalcem plegats el seu nom.<br>He demanat al Senyor que en guiés;<br>ell m’ha escoltat, res no m’espanta.", "3. Alceu vers ell la mirada.<br>Us omplirà de la seva llum.<br>Quan els pobres invoquen el Senyor,<br>els escolta i els salva del perill.", "4. Acampa l’àngel del Senyor<br>entorn dels seus fidels, per protegir-los.<br>Els rics s’empobriran, passaran fam,<br>però als qui busquen el Senyor no els faltarà cap bé."]}]}, {"name": "Advent", "songs": [{"n": "501-1", "t": "A vós elevo la meva ànima", "p": ["<b>A vós elevo la meva ànima, Senyor;<br>Déu meu, en vós confio:<br>Feu que conegui les vostres rutes,<br>que aprengui els vostres camins.<\/b>", "1. No s&#x27;enduran un desengany <br>els qui esperen en vós.<br>Recordeu-vos de l&#x27;amor <br>que heu guardat des de sempre. <br><i>(es canta cada diumenge)<\/i>", "2. Senyor, feu-nos veure el vostre amor;<br>i doneu-nos la vostra salvació. <br><i>(es canta el Diumenge I)<\/i>", "3. Pastor d&#x27;Israel, escolteu-nos,<br>desvetlleu el vostre poder, <br>veniu a salvar-nos. <br><i>(es canta el Diumenge II)<\/i>", "4. El Senyor és a prop <br>per salvar els seus fidels,<br>i la seva glòria <br>habitarà al nostre país. <br><i>(es canta el Diumenge III)<\/i>", "5. La fidelitat germinarà de la terra,<br>i la bondat mirarà des del cel. <br><i>(es canta el Diumenge IV)<\/i>"]}, {"n": "501", "t": "Veniu, veniu, oh Emmanuel", "p": ["1. Veniu, veniu, oh Emmanuel,<br>sou l’esperança d’Israel<br>que en trist exili ací tothora<br>redempció de vós implora.<br>Exulta! Exulta! Israel, <br>a tu vindrà l’Emmanuel.", "2. Veniu, esclat del nostre hivern,<br>oh Saviesa de l’Etern!<br>De vostra llum el món fretura<br>per retrobar-vos dalt l’altura.<br>Exulta! Exulta! Israel,<br>a tu vindrà l’Emmanuel.", "3. Veniu, oh Déu i etern Senyor,<br>que al Sinaí, en l’antigor,<br>llei per al poble promulgàreu<br>i en majestat us hi mostràreu.<br>Exulta! Exulta! Israel,<br>a tu vindrà l’Emmanuel.", "4. Veniu, oh Vara de Jesè,<br>que sou senyal d’excels poder.<br>Veniu: que brilla ja el Misteri<br>que ens traurà el jou del captiveri.<br>Exulta! Exulta! Israel,<br>a tu vindrà l’Emmanuel.", "5. Veniu, oh Vós, Clau de David,<br>i obriu el cel al cor contrit<br>que en tenebrors de mort fa via<br>tot esperant vostre gran dia.<br>Exulta! Exulta! Israel,<br>a tu vindrà l’Emmanuel.", "6. Veniu, Aurora fulgurant,<br>i dissipeu el trist foscant;<br>sobre la mort deu-nos victòria<br>per cantar sempre dalt la Glòria.<br>Exulta! Exulta! Israel,<br>a tu vindrà l’Emmanuel.", "7. Veniu, oh Rei Omnipotent,<br>d’antics oracles compliment.<br>Veniu, refeu nostra flaquesa,<br>Déu eternal, font de bonesa.<br>Exulta! Exulta! Israel,<br>a tu vindrà l’Emmanuel. Amén."]}, {"n": "502", "t": "Vers tu, Terra promesa", "p": ["1. El poble de Déu que fa via,<br>travessant l’immens arenal,<br>fugí de cruel tirania<br>i ara avança sota un cel blau.<br>S’acosta a la terra llunyana,<br>pel seu Déu promesa als antics,<br>on tota dissort és llevada<br>en un món joiós i tranquil.", "<b>Vers tu, Terra promesa,<br>el Poble de Déu alça el braç.<br>Vers tu, Terra promesa,<br>adreça l’amor i la fe;<br>Vers tu, Terra promesa,<br>enmig de combats va avançant.<br>Vers tu, Terra promesa. Vers tu.<\/b>", "2. Feixucs de treballs i de penes,<br>tots els pobles van avançant,<br>recerquen la joia serena,<br>sedejant d’un món infinit.<br>¿On és doncs la Terra promesa<br>que els hi doni llum i repòs?<br>Serà llur entrada en l’Església,<br>cap on marxen amb el seu plor.", "3. Ja lliures del vell esclavatge<br>per la força del Salvador,<br>amb Ell reprendrem el viatge<br>vers un món per sempre millor.<br>EI cel és la Tena promesa<br>i la mort la porta d’entrar,<br>si amb fe caminem per les petges<br>del Senyor que passa al davant."]}, {"n": "503", "t": "Per Jesús ens ve la Vida", "p": ["<b>Per Jesús ens ve la Vida: exultem, germans. <\/b>", "1. Exultem, germans!, perquè el Senyor s’acosta;<br>exultem, germans! perquè ja arriba al món.", "2. Exultem, germans!, amb alegria santa;<br>exultem, germans!, per rebre el Fill de Déu.", "3. Exultem, germans!, parem-li un bon estatge;<br>exultem, germans!, donem-li acolliment.", "4. Exultem, germans!, tota la nostra vida,<br>exultem, germans!, aplani el seu camí.", "5. Exultem, germans!, perquè el Senyor ens porta,<br>exultem, germans!, la Llum, la Pau, l’Amor.", "6. Exultem, germans!, donem glòria a Déu Pare;<br>exultem, germans!, i glòria al Déu d’Amor."]}, {"n": "504", "t": "Prepareu la via del Senyor", "p": ["Prepareu la via del Senyor, aplaneu-li els camins,<br>perquè ve a salvar les nacions,<br>i el vostre cor en sentirà gran alegria.<br>Tota vall serà aixecada, tot turó serà abaixat,<br>i tothom veurà la salvació de Déu.", "<b>Vessa, oh cel, de dalt la rosada<br>i que els núvols facin ploure el Just.<\/b>", "1. Heu afavorit, Senyor, el vostre país,<br>í renovat el vostre poble.", "2. El Senyor donarà la pluja,<br>i la nostra terra donarà el seu fruit."]}, {"n": "505", "t": "De vós naixerà, oh Maria", "p": ["1. De vós naixerà, oh Maria,<br>el Fill etern de Déu.", "2. Déu ha beneït la terra santa,<br>deslliura el seu poble Israel.", "3. Per treure’ns de mort i de tenebres<br>com llum ens visita des del cel.", "4. Vós sou beneïda entre les dones<br>pel fruit beneit que ens donareu.", "5. Exalta el Senyor l’ànima meva<br>i el meu esperit gaudeix en Déu."]}, {"n": "506", "t": "Esperem vostra vinguda", "p": ["<b>Esperem vostra vinguda:<br>No tardeu, Senyor Jesús.<br>Veniu a alliberar-nos:<br>No tardeu, Senyor Jesús.<\/b>", "l. Som esclaus en terra estranya:<br>Tenim set d’un Redemptor,<br>i elevem des de l’abisme<br>nostres ulls a l’horitzó, (2)", "2. Som hereus d’una promesa:<br>Sabem cert que es complirà,<br>perquè a l’ombra de l’Altíssim<br>una Verge infantarà. (2)", "3. Baixarà com la rosada<br>l’esperança de l’esclau,<br>i de l’arbre de la culpa<br>brostarà la llibertat. (2)", "4. Déu és prop, truca a la porta.<br>Ve a escalfar-se a nostra llar.<br>Vol tastar nostra pobresa<br>i plantar-hi eternitat. (2)", "5. Pregonem amb alegria<br>les grandeses del Senyor,<br>i amb la torxa sempre encesa<br>esperem el seu retorn. (2)"]}, {"n": "507", "t": "Us preguem, Senyor, baixeu!", "p": ["1. Us preguem, Senyor, baixeu!<br>Vós que els núvols habiteu.<br>Amb la vostra majestat,<br>no oblideu el que heu creat!", "2. Deixant vostra seu reial<br>i la glòria divinal,<br>per ser pobre us apresseu:<br>talment un gegant correu.", "3. Per l’alè del Sant Esperit<br>us voleu fer un noi petit,<br>i en un ventre virginal,<br>Déu etern, fer-vos mortal.", "4. I un pessebre lluirà,<br>i la nit clara serà.<br>Els fidels en vós veurem<br>un infant i el Déu etern.", "5. Lloança al Pare eternal<br>i al Crist, Senyor immortal<br>i al l’Esperit d’Amor, Senyor,<br>que ens donà el Crist Salvador."]}, {"n": "509", "t": "Ressoni en el silenci la Paraula", "p": ["1. Ressoni en el silenci la Paraula<br>i freni tota llengua el parlar il·lús;<br>germans, amics, cantem amb veu ben clara:<br>Veniu, Senyor Jesús!", "2. Un devessall d’amor la terra emplena,<br>tot odi i tot pecat siguin refús,<br>l’Església, exultant, canti amb fermesa:<br>Veniu, Senyor Jesús!", "3. Ja callen patriarques i profetes,<br>la Verge que filava deixa el fus,<br>i canten homes, àngels, races, terres: <br>Veniu, Senyor Jesús! /", "4. Tots els que arreu del món lluiten i esperen,<br>sabien que vindria el diví Just,<br>joiosos, a una veu, canten i preguen:<br>Veniu, Senyor Jesús!"]}, {"n": "510", "t": "Vinguéreu entre palles de pessebre", "p": ["1. Vinguéreu entre palles de pessebre,<br>veniu darrera vels d’Eucaristia,<br>vindreu damunt els núvols ple de glòria,<br>oh Déu infant, Senyor de cels i terra.<br>Tot us espera i d’esperança viu:<br>veniu, Jesús, veniu!", "2. Llarga es la nit, tant com l’espera amarga,<br>ens pesen les cadenes i les ombres;<br>vivim de mort en una terra eixuta, <br>morim d’enyor lluny de la nostra pàtria.<br>Captiu, el poble vol que el redimiu:<br>Veniu, Jesús, veniu.", "3. Compliu d’un cop, oh Pare, la promesa,<br>prova d’amor donada a nostres pares:<br>salveu-nos de la mort i de la culpa<br>pel vostre Fill nascut de mare verge.<br>Per l’Esperit el món és rediviu:<br>Veniu, Jesús, veniu!"]}, {"n": "511", "t": "Tota la terra espera el Salvador", "p": ["1. Tota la terra espera el Salvador<br>i el solc obert, la paraula del Senyor:<br>món de lluita i de penes, que vol llibertat,<br>reclama justícia i cerca veritat.", "2. Diu el profeta al poble d’Israel:<br>de mare verge ens vindrà l’Emmanuel,<br>serà &quot;Déu amb nosaltres&quot;, i el nostre germà;<br>amb ell l’esperança, al món retornarà.", "3. Si el pas se’ns barra, camins hem desbrossar,<br>valls i muntanyes ens cal anivellar.<br>Si el Senyor ve a nosaltres, anem-lo a trobar,<br>portals i finestres obrim de bat a bat.", "4. A l’establia, Jesús bé el recordem,<br>però és entre els homes allà on el trobarem,<br>i vivim esperant-lo, perquè ha de tornar, <br>quan vingui a buscar-nos, la Vida cantarà."]}, {"n": "512", "t": "Paraula que fou llum el primer dia", "p": ["1. Paraula que fou llum el primer dia,<br>i en boca dels profetes fou sentit<br>i clam i compromís que denuncia,<br>vindrà a esquinçar la nit.", "2. Paraula com el foc que no s’apaga,<br>paraula com la pluja sobre l’erm,<br>Paraula com un sol que venç l’obaga,<br>com vent que mou de ferm.", "3. Paraula que es covava en cor de pobre<br>i en el sí d’una noia feia niu; <br>consol, viva pregària que s’obre<br>i hi té constant caliu.", "4. Paraula que, no essent paraula vana,<br>és carn de nostra carn, i sang de sang,<br>i plora amb plor d’infant i és veu humana:<br>pastat del nostre fang.", "5. Paraula, que és el sí de tota cosa,<br>l’Amén on ens durà la nostra fe<br>quan, al darrer diumenge, ja desclosa,<br>la Vida farà el ple."]}, {"n": "513", "t": "Els núvols ploguin prompte el Just", "p": ["<b>Els núvols ploguin prompte el Just;<br>l’esperen tots els homes.<\/b>", "1. Senyor, no ens deixeu<br>si anem perduts per llocs tenebrosos<br>on no arriba la vostra llum.<br>Caminem cansats<br>entre el silenci inhòspit;<br>sorra petgem només<br>del gran desert de la vida.<br>Senyor, mostreu-nos vos<br>rutes brillants que al goig ens menin.", "2. Ressona per tot<br>la veu potent que ens ve dels profetes;<br>preparats siguin nostres cors.<br>Cal posar-hi esment<br>sense desmais ni treves.<br>Tots els qui tenen fe<br>sabran que el Crist ja s’atansa.<br>Així el terreny eixut<br>prompte serà, per Ell, ubèrrim.", "3. Es Déu i és mortal<br>puix home naixerà de Maria;<br>terra i cel amistat tindran.<br>Es el Fill de Déu<br>i ara ho serà dels homes.<br>Crèdul l’esperi el món<br>amb una clara alegria;<br>i benaurats seran<br>tots els qui d’Ell la pau esperin.", "4. Vol ser llum del món<br>i néixer ben endins de nosaltres<br>perquè l’aculli el nostre amor.<br>Vol que el coneguem<br>sense el rosec dels dubtes.<br>Vol que esperem també<br>la seva fausta tornada,<br>quan vingui a judicar<br>el bé i el mal de nostres vides."]}, {"n": "514", "t": "Senyor, us esperem", "p": ["1. Senyor, us esperem,<br>i aquesta esperança ens és vida;<br>vós sou per al mortal<br>la llum, la sendera i la guia.<br>Us esperem, Senyor!<br>Us esperem, Senyor!", "<b>Visquem plens d’esperança<br>que el Senyar ja és a prop.<\/b>", "2. Sabem que sou Amor,<br>i en Vós la nostra ànima espera;<br>en vós hem de trobar<br>perdó per la nostra flaquesa.<br>Mostreu-nos el camí!<br>Mostreu-nos el camí!", "3. Que els pobles tots del món<br>s’apleguin en la vostra Església,<br>i units en vostre amor<br>segueixin del cel la drecera.<br>Hem de fer un món millor!<br>Hem de fer un món millor!", "4. Vós sou aquest germà<br>que espera el servei i amor nostres;<br>allò que per a ell fem,<br>serà pel servei i amor vostres.<br>Amb joia us esperem!<br>Amb joia us esperem!"]}]}, {"name": "Nadal", "songs": [{"n": "521-1", "t": "Avui la pau ha baixat del cel", "p": ["Avui la pau ha baixat del cel.<br>Avui brilla una llum nova.<br>Ens ha nascut un infant,<br>ens ha estat donat un fill.<br>Canten els àngels amb els homes<br>la salvació del nostre Déu.", "1. El Senyor m&#x27;ha dit: Ets el meu fill,<br>avui jo t&#x27;he engendrat.", "2. Ja eres príncep el dia que vas néixer,<br>tens la glòria sagrada des del si de la mare.", "3. Ens visitarà un sol que ve del cel,<br>per il·luminar els qui viuen a la fosca.", "4. Déu meu, doneu al rei el vostre dret,<br>doneu al príncep la vostra rectitud.", "5. Que el benestar floreixi als seus dies,<br>i mesos i anys abundi la pau.", "6. Li portaran obsequis les illes i els reis de Tarsís,<br>els reis d&#x27;Aràbia i de Sabà li oferiran presents.", "7. Canteu al Senyor un càntic nou,<br>anuncieu de dia en dia que ens ha salvat.", "8. Adoreu el Senyor, s&#x27;apareix la seva santedat.<br>El cel se n&#x27;alegra, la terra hi fa festa."]}, {"n": "521", "t": "La llum d’aquesta nit mostra el Misteri", "p": ["1. La llum d’aquesta nit mostra el Misteri<br>del Déu que s’ha encarnat:<br>comença avui, Jesús, el vostre imperi<br>d’amor i veritat.", "2. Del Pare Etern, en l’esplendor divina,<br>naixeu eternament.<br>Ja abans del món el Pare preordina<br>el vostre adveniment.", "3. La plenitud del temps és arribada,<br>és ja el voler diví:<br>baixa del cel la mística rosada<br>que el món fa reflorir.", "4. Oh Santa Nit! que dins una establia<br>nascut de nou veié<br>el Fill de Déu, Fill ara de Maria<br>com l’àngel li ho digué.", "5. Avui, oh Verb de Déu, l’humà llinatge<br>us lloa venturós,<br>com fan àngels del cel, que en pobre estatge<br>us veuen gloriós.", "6. Formós Infant, que us té la Verge en braços:<br>sou nostre Redemptor!<br>Per vós el món i el cel nuen els llaços<br>de pau i de perdó.", "7. Sou Príncep de la pau, i sou el Pare<br>del segle venidor,<br>l’Àngel del Gran Consell, i sou encara<br>de terra i cel Senyor.", "8. A vós, oh Crist, i al Pare, la lloança<br>i a l’Esperit, escau.<br>Per vós al món ja torna la bonança.<br>Llaor! I als homes pau. Amén."]}, {"n": "522", "t": "Fidels, atanseu-vos", "p": ["1. Fidels, atanseu-vos triomfants i alegres;<br>veniu-hi, veniu-hi cap a Betlem.<br>On podreu veure nat el Rei dels àngels.<br>Veniu i adorem-lo, veniu i adorem-lo,<br>veniu i adorem Jesús Salvador.", "2. Deixant les ramades els pastors anaren,<br>humils, al pessebre, cridats pel cel:<br>Ara nosaltres a bon pas anem-hi.<br>Veniu i adorem-lo...", "3. Del Pare celeste, l’Esplendor eterna,<br>velada en la blanca carn admirarem.<br>Déu, infant tendre i amb bolquers que el faixen.<br>Veniu i adorem-lo...", "4. Pels homes fet pobre, sobre el fenc reposa.<br>Besem-lo i dem-li l’amor del cor:<br>Si Ell així ens ama, qui no l’amaria?<br>Veniu i adorem-lo..."]}, {"n": "523", "t": "Aclarida, beneïda", "p": ["1. Aclarida, beneïda,<br>venturosa nit de Nadal.<br>Pel cel hi havia<br>cants d’alegria,<br>alegrem-nos, alegrem-nos, cristians.", "2. Aclarida, beneïda,<br>venturosa nit de Nadal.<br>Jesús naixia<br>i ens redimia;<br>alegrem-nos, alegrem-nos, cristians.,"]}, {"n": "524", "t": "Santa nit, plàcida nit", "p": ["1. Santa nit, plàcida nit,<br>els pastors han sentit<br>l’al·leluia que els àngels, cantant,<br>en el món han estat escampant:<br>el Messies és nat, el Messies és nat.", "2. Santa nit, plàcida nit,<br>ja està tot adormit;<br>vetlla sols a la cambra bressant<br>dolça Mare que al Nin va cantant:<br>dorm en pau i repòs, dorm en pau i repòs.", "3. Santa nit, plàcida nit,<br>el Jesús, tan petit,<br>és el Déu, Ser Suprem, Poderós,<br>en humil petitesa reclòs<br>per salvar tot el món, per salvar tot el món."]}, {"n": "525", "t": "Les dotze van tocant", "p": ["1. Les dotze van tocant:<br>és nat el Déu Infant<br>Fill de Maria.", "2. La Mare i el Fillet<br>estan mig morts de fred<br>Josep tremola.", "3. Josep a poc a poc<br>encén allà un gran foc<br>i els àngels canten.", "4. Enmig de fred i neu<br>el foc d’amor d’un Déu<br>els cors desglaça.", "5. Per’xò tots van cantant:<br>és nat el Déu Infant,<br>Fill de Maria."]}, {"n": "526", "t": "Els àngels allà a la Glòria", "p": ["1. Els àngels allà a la Glòria<br>la nova canten amb goig,<br>i el ressò de les muntanyes<br>espargeix son cant d’amor.", "<b>Glòria in excelsis Deo. (2)<\/b>", "2. Una verge a l’Establia<br>ha infantat el Fill diví,<br>ens ho diu amb alegria<br>aquest cant de mitjanit.", "3. Correm-hi, pastors, correm-hi,<br>a besar-li el front de neu,<br>bo i dansant, plens de la joia<br>d’aquest cant que sona arreu."]}, {"n": "527", "t": "Alça’t ja, Jerusalem", "p": ["<b>Alça’t ja, Jerusalem, sigues radiosa!<br>Car ha vingut del cel una Llum clara,<br>perquè il·lumini els pobles de la terra;<br>Ens ve a portar el Goig, la Veritat.<br>Alça’t ja, Jerusalem, perquè el Senyor ha vingut a tu.<\/b>", "1. La tenebra s’estén damunt la terra,<br>tots el pobles es perden en la nit.<br>Però a tu, el Senyor un jorn vindrà<br>i sa glòria en tu resplendirà.<br>Jerusalem, desvetlla’t ja.", "2. D’Orient cap a tu vénen fent via<br>tots els pobles, portant els seus presents.<br>Car en tu ha nascut un Déu Infant,<br>el Messies pel món tant esperat.<br>Jerusalem, desvetlla’t ja."]}, {"n": "532", "t": "La nit s’esberla i es torna tan clara", "p": ["1. La nit s’esberla i es torna tan clara,<br>que els homes veuen Déu nostre Senyor:<br>el Fill de Déu és el Noi de la Mare,<br>bressat a l’aire de tendra cançó.<br>Pobles, veniu, i adorem el Senyor.", "2. Si el Fill de Déu per amor s’encarnava<br>i home entre els homes es féu com es féu,<br>ens empeltava una mística saba:<br>nosaltres som de la raça de Déu.<br>El Fill de Déu ens ha fet fills de Déu.", "3. Fills en el Fill, cohereus de la glòria,<br>tots som germans retrobats a Betlem;<br>en néixer Crist, recomença la història,<br>i tots nosaltres amb ell renaixem.<br>Crist en els nostres germans estimem.", "4. Mentre de molsa guarnim el pessebre,<br>no ens adormim en un somni suau:<br>estels màgics engoleix la tenebra,<br>les bales xiulen, sens treva de pau.<br>Cessin les guerres i regni la pau.", "5. Glòria i honor al Fillet de Maria,<br>que avui naixia a recer d’un portal; <br>és el qui neix el mateix que naixia,<br>que avui naixia del Pare eternal.<br>Amb pa de goig celebrem el Nadal. Amén."]}, {"n": "533", "t": "Déu ha nascut en una establia", "p": ["<b>Déu ha nascut en una establia.<br>Déu ha nascut davall un portal<br>i amb un estel al món ho anuncia<br>la venturosa nit de Nadal.<\/b>", "1. L’amor de Déu infinit,<br>Amor que en el món s’oblida,<br>davall un senzill portal<br>humil i silent naixia,<br>silenci d’aquella nit,<br>silenci punyent que crida<br>com queixa que esqueixa el pit<br>que ens esqueixa el pit. (2)", "2. Portem tanta boira al front,<br>sentim tanta covardia,<br>hi ha tanta pols pels camins<br>i als ulls d’aquest cos de terra,<br>que no veiem els camins<br>que porten a l’establia.<br>Portem tanta boira a dins,<br>tanta boira a dins... (2)"]}, {"n": "534", "t": "S’acaben les setmanes de Daniel", "p": ["1. S’acaben les setmanes de Daniel:<br>ja de Jessè la vara neix dins el gel.<br>Muntanyes de Judea, no més tristor!", "<b>Celebrem la vinguda del Redemptor.<\/b>", "2. Al temps que escrit estava i a mitja nit,<br>neix a Betlem, sortosa, un noi petit;<br>s’omplen al punt els aires de resplendor.", "2. Del cel baixen les àngels de cent en cent,<br>corren la terra alegres, entre la gent;<br>glòria a Déu publiquen i al món repòs.", "4. La terra que, abans trista, causava espant,<br>reverdeix, s’engalana, muda el semblant;<br>broten entre les pedres mils i mils flors.", "5. Pastorets de Judea, veniu, correu;<br>reclinat sobre palles el trobareu,<br>Jesús, el dolç afecte del nostre cor.", "6. Veniu també els Reis Màgics de l’Orient,<br>cap a Betlem feu via encontinent:<br>d’un bell estel us guia la resplendor.", "7. Allí, rendits, adoren el tendre Infant,<br>en braços de Maria tot tremolant;<br>mirra li ofereixen, encens i or.", "8. Oferim-li nosaltres, els cristians,<br>de caritat encesa el cors flamants;<br>una fe la més viva, i un cast amor.", "9. Així dins el pessebre tots trobarem<br>pau, consol i alegria tan com voldrem,<br>aplegats amb els àngels, fent tots un cor."]}, {"n": "535", "t": "La flor més bella es bada", "p": ["1. La flor més bella es bada en el roser sagrat;<br>poncella desitjada, miracle somniat...<br>La rosa que ha florit, l’hivern amorosia<br>al punt de mitjanit.", "2. Es flor de profecia amb flaire d’antigor;<br>la Verge ens la collia, la mare del Senyor.<br>Desembre beneït, has vist la primavera<br>avui a mitjanit.", "3. La divinal promesa en Ella s’ha encarnat.<br>D’aquella rosa encesa ens hem enamorat.<br>I ja no ens cap al pit el goig del gran misteri<br>d’aquesta mitjanit."]}, {"n": "536", "t": "En la fosca de la nit", "p": ["1. En la fosca de la nit,<br>hem oït la veu del Pare:<br>&quot;Ets mon Fill, jo t’he engendrat<br>ans que el sol i les estrelles&quot;.<br>I els estols angelicals<br>la resposta iniciaven:<br><b>Glòria a Déu a dalt del cel,<br>i a la terra pau als homes.<\/b>", "2. Un infant ens ha nascut,<br>és el Fill, que se’ns donava;<br>duu l’imperi divinal<br>al damunt de les espatlles.<br>Fem a Déu un càntic nou<br>perquè obrava meravelles.<br><b>Glòria a Déu a dalt del cel,<br>i a la terra pau als homes.<\/b>", "3. A1 començament de tot,<br>existia la Paraula,<br>Verb de Déu, que és Déu mateix,<br>creador de tota cosa.<br>Ara el Verb es feia carn,<br>i amb nosaltres vol conviure.<br><b>Glòria a Déu a dalt del cel,<br>i a la terra pau als homes.<\/b>", "4. Oh Betlem, &quot;casal del pa&quot;,<br>ja no ets la més petita;<br>en la teva humilitat<br>hi ha divines trasmudances:<br>l’Increat hi és nadó,<br>i el Verb, paraula humana:<br><b>Glòria a Déu a dalt del cel,<br>i a la terra pau als homes.<\/b>"]}, {"n": "537", "t": "Joia en el món!", "p": ["1. Joia en el món!<br>Jesús és nat; <br>oh terra, el teu Senyor<br>rep amb amor i amb humilitat, <br>i canta a sa llaor!", "2 Joia en el món!<br>Amb nostres cants <br>lloem el Salvador;<br>muntanyes, rius, comes i plans <br>ens facin de ressò.", "3.. Joia en el món!<br>Des del coval <br>Jesús ens obrirà<br>del paradís l’auri portal <br>i allí ens acollirà."]}, {"n": "538", "t": "De goig la terra està cantant", "p": ["1. De goig la terra està cantant, al·leluia,<br>perquè ha nascut el Déu Infant. <br>Al·leluia, al·leluia.", "<b>Avui, com a Betlem,<br>el Crist Infant que ens ha nascut<br>amb joia adorarem.<\/b>", "2. El Fill del Pare celestial, <i><b>al·leluia,<\/b><\/i><br>volgué assumir la carn mortal.<br><b>Al·leluia, al·leluia. <\/b>", "3. Com Gabriel va anunciar<br>la Verge i Mare l’infantà.", "4. Damunt la palla dorm l’infant<br>que és Rei dels reis i Sant dels sants.", "5. Als bons pastors l’àngel fulgent<br>els anuncia el Naixement.", "6. D’Orient els Reis li han dut presents<br>rublets de mirra, or i encens.", "7. Aquell que és llum del món mateix<br>de Mare Verge avui ens neix.", "8. Com un de tants volia ser,<br>però el pecat no conegué.", "9. Naixent així, com un de tants, <br>a Déu mateix ens féu semblants.", "10. En l’alegria de Nadal,<br>beneirem Déu Immortal."]}]}, {"name": "Quaresma", "songs": [{"n": "541-1", "t": "Sempre que m'invoqui l'escoltaré", "p": ["<b>Sempre que m&#x27;invoqui l&#x27;escoltaré,<br>el salvaré i l&#x27;ompliré de glòria,<br>saciaré el seu desig de llarga vida,<br>li mostraré la meva salvació.<\/b>", "1. Tu que vius a recer de l&#x27;Altíssim<br>digues al Senyor: <br>Sou el meu Déu en qui confio! <br><i>(es canta cada diumenge)<\/i>", "2. El Senyor donarà ordre <br>als seus àngels<br>de guardar-te en tots els camins. <br><i>(es canta el Diumenge I)<\/i>", "3. Alceu vers ell la mirada <br>i sereu radiants,<br>i no haureu d&#x27;abaixar els ulls, avergonyits. <br><i>(es canta el Diumenge II)<\/i>", "4. Déu meu, creeu en mi un cor ben pur,<br>feu renéixer en mi un esperit ferm. <br><i>(es canta el Diumenge III)<\/i>", "5. M&#x27;ensenyareu el camí que duu a la vida:<br>joia i festa a desdir a la vostra presència. <br><i>(es canta el Diumenge IV)<\/i>", "6. En Crist tenim la redempció,<br>el perdó dels nostres pecats. <br><i>(es canta el Diumenge V)<\/i>"]}, {"n": "541", "t": "Oh Déu, digneu-vos escoltar benigne", "p": ["1. Oh Déu, digneu-vos escoltar benigne<br>la veu del vostre poble penitent<br>que altra vegada del seu viure indigne<br>perdó us demana i prega confident.", "2. És ara el temps que invita a penedir-nos,<br>el temps que ens preparà vostra Bondat;<br>doneu-nos vostre ajut per deixondir-nos<br>i ésser ben lluny de tota malvestat.", "3. Del vici impiadós els mísers llaços<br>desfer volem amb plor sincer i contrit:<br>fugint, Senyor, fugint del vostres braços,<br>espines hem trobat i amarg neguit.", "4. Traieu d’error la humana criatura<br>que en vil pecat us ha clavat en creu;<br>si plora el pecador sa desventura<br>el vostre amor oblida tot menyspreu.", "5. En el desert, quaranta jorns expia,<br>pel cor mesquí, l’Anyell immaculat.<br>Visquem, germans, el temps que el cel envia<br>d’oració, dejuni i caritat!", "6. Rebeu, oh Trinitat, la fe sincera<br>del vostre poble a l’hora quaresmal;<br>doneu-nos el perdó que el món espera<br>i un cor ben pur pel sagrament pasqual. Amén."]}, {"n": "542", "t": "Victòria! Tu regnaràs", "p": ["<b>Victòria! Tu regnaràs.<br>Oh Creu! Tu ens salvaràs.<\/b>", "1. Tu brilles sobre els homes<br>que busquen la veritat.<br>Oh Creu, font d’on rebrolla<br>l’amor i la ll
