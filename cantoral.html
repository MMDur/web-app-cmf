<meta name="mobile-web-app-capable" content="yes">

<style>
:root{
  --garnet:#4A1626;
  --garnet-soft:#6B2438;
  --gold:#B8892D;
  --gold-bright:#D2A73C;
  --cream:#FAF5EA;
  --paper:#FFFDF7;
  --ink:#2C221D;
  --ink-soft:#6E5E52;
  --line:#E7DCC8;
  --shadow:0 2px 14px rgba(74,22,38,.10);
  --fs:1rem;
}
body.night{
  --garnet:#2A0D17;
  --garnet-soft:#4A1626;
  --gold:#C79A3B;
  --gold-bright:#DDB255;
  --cream:#1C1512;
  --paper:#251C18;
  --ink:#EDE3D2;
  --ink-soft:#B3A28D;
  --line:#3D2F27;
  --shadow:0 2px 14px rgba(0,0,0,.4);
}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html{scroll-behavior:smooth}
body{
  font-family:'Literata',Georgia,serif;
  background:var(--cream);
  color:var(--ink);
  min-height:100vh;
  transition:background .3s,color .3s;
}
button{font-family:inherit;cursor:pointer;border:none;background:none;color:inherit}
input{font-family:inherit}

/* ---------- Capçalera ---------- */
header{
  background:linear-gradient(160deg,var(--garnet) 0%,var(--garnet-soft) 100%);
  color:#F5EBD8;
  padding:calc(env(safe-area-inset-top,0px) + 1.1rem) 1rem 0;
  position:sticky;top:0;z-index:40;
  box-shadow:0 2px 12px rgba(42,13,23,.35);
}
.head-row{display:flex;align-items:center;justify-content:space-between;max-width:820px;margin:0 auto}
.brand{display:flex;flex-direction:column;gap:.05rem}
.brand h1{
  font-family:'Cormorant Garamond',serif;
  font-weight:700;font-size:1.7rem;letter-spacing:.04em;line-height:1;
}
.brand h1 .orn{color:var(--gold-bright)}
.brand small{
  font-size:.62rem;letter-spacing:.22em;text-transform:uppercase;
  color:#D8BE93;font-family:'Literata',serif;font-weight:500;
}
.head-actions{display:flex;gap:.35rem}
.hbtn{
  width:2.3rem;height:2.3rem;border-radius:50%;
  display:flex;align-items:center;justify-content:center;
  color:#EFDFC0;font-size:1.05rem;border:1px solid rgba(210,167,60,.4);
  transition:background .2s;
}
.hbtn:active{background:rgba(210,167,60,.25)}
.hbtn svg{width:1.15rem;height:1.15rem;fill:none;stroke:currentColor;stroke-width:1.8;stroke-linecap:round;stroke-linejoin:round}

/* Cerca */
.search-zone{max-width:820px;margin:.9rem auto 0;padding-bottom:.9rem;display:flex;gap:.55rem}
.num-jump{
  flex:0 0 6.2rem;position:relative;
}
.num-jump input{
  width:100%;padding:.62rem .5rem .62rem 2rem;
  border-radius:.7rem;border:1px solid rgba(210,167,60,.5);
  background:rgba(255,253,247,.12);color:#FBF3E2;
  font-size:1.05rem;font-weight:600;font-variant-numeric:tabular-nums;
  outline:none;text-align:center;letter-spacing:.05em;
}
.num-jump input::placeholder{color:#C9AE82;font-weight:400;font-size:.9rem;letter-spacing:0}
.num-jump .tag{
  position:absolute;left:.55rem;top:50%;transform:translateY(-50%);
  color:var(--gold-bright);font-family:'Cormorant Garamond',serif;
  font-weight:700;font-size:1.05rem;pointer-events:none;
}
.txt-search{flex:1;position:relative}
.txt-search input{
  width:100%;padding:.62rem 2.3rem .62rem 2.4rem;
  border-radius:.7rem;border:1px solid rgba(210,167,60,.35);
  background:rgba(255,253,247,.12);color:#FBF3E2;font-size:.95rem;outline:none;
}
.txt-search input::placeholder{color:#C9AE82}
.txt-search svg{
  position:absolute;left:.8rem;top:50%;transform:translateY(-50%);
  width:1rem;height:1rem;stroke:#D8BE93;fill:none;stroke-width:2;stroke-linecap:round;
}
.clear-btn{
  position:absolute;right:.4rem;top:50%;transform:translateY(-50%);
  width:1.7rem;height:1.7rem;border-radius:50%;color:#D8BE93;
  font-size:1.1rem;display:none;align-items:center;justify-content:center;
}
.clear-btn.show{display:flex}

/* ---------- Índex de seccions ---------- */
nav.sections{
  position:sticky;top:0;z-index:30;
  background:var(--cream);border-bottom:1px solid var(--line);
  overflow-x:auto;-webkit-overflow-scrolling:touch;scrollbar-width:none;
  transition:background .3s;
}
nav.sections::-webkit-scrollbar{display:none}
.chips{display:flex;gap:.4rem;padding:.6rem 1rem;max-width:820px;margin:0 auto;width:max-content;min-width:100%}
.chip{
  white-space:nowrap;padding:.4rem .85rem;border-radius:2rem;
  border:1px solid var(--line);background:var(--paper);
  font-size:.8rem;color:var(--ink-soft);transition:all .2s;
  font-weight:500;
}
.chip .cn{color:var(--gold);font-weight:700;font-variant-numeric:tabular-nums;margin-right:.3rem;font-size:.72rem}
.chip.active{background:var(--garnet);color:#F5EBD8;border-color:var(--garnet)}
.chip.active .cn{color:var(--gold-bright)}

/* ---------- Llista ---------- */
main{max-width:820px;margin:0 auto;padding:0 1rem 6rem}
.sec-head{
  display:flex;align-items:baseline;gap:.7rem;
  margin:1.8rem 0 .8rem;padding-bottom:.45rem;
  border-bottom:2px solid var(--gold);
}
.sec-head h2{
  font-family:'Cormorant Garamond',serif;font-weight:700;
  font-size:1.45rem;color:var(--garnet-soft);letter-spacing:.01em;
}
body.night .sec-head h2{color:var(--gold-bright)}
.sec-head .count{font-size:.72rem;color:var(--ink-soft);letter-spacing:.08em}
.song-list{display:flex;flex-direction:column;gap:.45rem}
.song-row{
  display:flex;align-items:center;gap:.85rem;
  background:var(--paper);border:1px solid var(--line);
  border-radius:.75rem;padding:.6rem .8rem;
  text-align:left;width:100%;
  box-shadow:var(--shadow);transition:transform .12s,border-color .2s;
}
.song-row:active{transform:scale(.985);border-color:var(--gold)}
.num-tile{
  flex:0 0 auto;min-width:3.1rem;padding:.28rem .4rem;
  background:var(--garnet);color:var(--gold-bright);
  border-radius:.45rem;text-align:center;
  font-weight:700;font-size:1.05rem;font-variant-numeric:tabular-nums;
  border-bottom:2px solid var(--gold);
  letter-spacing:.02em;line-height:1.15;
}
.num-tile.nonum{background:transparent;color:var(--gold);border:1px dashed var(--gold);font-size:1.15rem}
.song-row .ti{flex:1;font-size:.94rem;line-height:1.35;color:var(--ink)}
.song-row .ti mark{background:rgba(210,167,60,.35);color:inherit;border-radius:.15rem;padding:0 .1rem}
.song-row .sec-tag{font-size:.62rem;color:var(--ink-soft);letter-spacing:.06em;text-transform:uppercase;display:block;margin-top:.15rem}
.snippet{font-size:.78rem;color:var(--ink-soft);margin-top:.2rem;font-style:italic;line-height:1.35}
.snippet mark{background:rgba(210,167,60,.35);color:inherit;border-radius:.15rem;padding:0 .1rem}
.no-results{
  text-align:center;padding:3rem 1rem;color:var(--ink-soft);
}
.no-results .big{font-family:'Cormorant Garamond',serif;font-size:1.4rem;color:var(--garnet-soft);margin-bottom:.4rem}
body.night .no-results .big{color:var(--gold-bright)}
.results-note{margin:1.2rem 0 .2rem;font-size:.8rem;color:var(--ink-soft);letter-spacing:.04em}

/* ---------- Vista de cant ---------- */
#songView{
  position:fixed;inset:0;z-index:60;background:var(--cream);
  display:none;flex-direction:column;transition:background .3s;
}
#songView.open{display:flex}
.sv-top{
  background:linear-gradient(160deg,var(--garnet),var(--garnet-soft));
  color:#F5EBD8;padding:calc(env(safe-area-inset-top,0px) + .6rem) .7rem .6rem;
  display:flex;align-items:center;gap:.5rem;
  box-shadow:0 2px 10px rgba(42,13,23,.3);flex:0 0 auto;
}
.sv-top .hbtn{flex:0 0 auto}
.sv-title-wrap{flex:1;min-width:0;display:flex;align-items:center;gap:.6rem}
.sv-num{
  background:rgba(210,167,60,.18);border:1px solid var(--gold-bright);
  color:var(--gold-bright);border-radius:.45rem;
  padding:.15rem .5rem;font-weight:700;font-size:1rem;
  font-variant-numeric:tabular-nums;flex:0 0 auto;
}
.sv-title{
  font-family:'Cormorant Garamond',serif;font-weight:600;font-size:1.1rem;
  white-space:nowrap;overflow:hidden;text-overflow:ellipsis;line-height:1.2;
}
.sv-body{
  flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;
  padding:1.6rem 1.3rem calc(env(safe-area-inset-bottom,0px) + 6rem);
}
.sv-inner{max-width:640px;margin:0 auto}
.sv-section-label{
  text-align:center;font-size:.66rem;letter-spacing:.28em;text-transform:uppercase;
  color:var(--gold);margin-bottom:.5rem;font-weight:600;
}
.sv-heading{
  text-align:center;margin-bottom:1.6rem;
}
.sv-heading .n{
  font-family:'Cormorant Garamond',serif;font-weight:700;
  font-size:2.6rem;color:var(--garnet-soft);line-height:1;
  display:block;
}
body.night .sv-heading .n{color:var(--gold-bright)}
.sv-heading .t{
  font-family:'Cormorant Garamond',serif;font-weight:600;font-size:1.5rem;
  color:var(--ink);line-height:1.25;margin-top:.35rem;display:block;
}
.sv-heading .rule{
  width:4.5rem;height:2px;background:var(--gold);margin:.9rem auto 0;
  position:relative;
}
.sv-heading .rule::after{
  content:'';position:absolute;left:50%;top:50%;
  width:.5rem;height:.5rem;background:var(--gold);
  transform:translate(-50%,-50%) rotate(45deg);
}
.verse{
  margin-bottom:1.15em;line-height:1.62;font-size:var(--fs);
  white-space:normal;
}
.verse b{
  color:var(--garnet-soft);font-weight:600;
}
body.night .verse b{color:var(--gold-bright)}
.sv-nav{
  position:fixed;left:0;right:0;bottom:0;
  display:flex;justify-content:space-between;align-items:center;
  padding:.6rem 1rem calc(env(safe-area-inset-bottom,0px) + .6rem);
  background:linear-gradient(to top,var(--cream) 65%,transparent);
  pointer-events:none;
}
.sv-nav button{
  pointer-events:auto;
  display:flex;align-items:center;gap:.4rem;
  background:var(--paper);border:1px solid var(--line);
  border-radius:2rem;padding:.55rem .95rem;
  font-size:.82rem;color:var(--ink);box-shadow:var(--shadow);
  max-width:46%;
}
.sv-nav button:active{border-color:var(--gold)}
.sv-nav button:disabled{opacity:0;pointer-events:none}
.sv-nav .nn{color:var(--gold);font-weight:700;font-variant-numeric:tabular-nums}
.sv-nav .nt{white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.sv-nav svg{width:.9rem;height:.9rem;fill:none;stroke:currentColor;stroke-width:2;stroke-linecap:round;stroke-linejoin:round;flex:0 0 auto}

/* Botó amunt */
#topBtn{
  position:fixed;right:1rem;bottom:calc(env(safe-area-inset-bottom,0px) + 1rem);
  width:2.7rem;height:2.7rem;border-radius:50%;
  background:var(--garnet);color:var(--gold-bright);
  box-shadow:0 3px 12px rgba(42,13,23,.4);
  display:none;align-items:center;justify-content:center;z-index:35;
}
#topBtn.show{display:flex}
#topBtn svg{width:1.1rem;height:1.1rem;fill:none;stroke:currentColor;stroke-width:2.2;stroke-linecap:round;stroke-linejoin:round}

@media(min-width:640px){
  .brand h1{font-size:2rem}
  .song-list{display:grid;grid-template-columns:1fr 1fr;gap:.55rem}
  .song-list.single{display:flex}
}
@media (prefers-reduced-motion:reduce){
  html{scroll-behavior:auto}
  *{transition:none!important}
}
</style>
</head>

<nav class="sections" id="secNav"><div class="chips" id="chips"></div></nav>

<main id="main"></main>

</div>

<script id="cantsData" type="application/json">[{"name": "Himnes i Càntics", "songs": [{"n": "1", "t": "Cantem, germans", "p": ["<b>Cantem, germans:<br>hem arribat al temple del Senyor.<\/b>", "<b>Amb Jesucrist, <br>lloem el Pare entorn d’aquest altar.<\/b>", "1. D’Ell és el món, el mar i les muntanyes,<br>la nostra vida és un do seu;<br>vinguem tots, aclamem-lo,<br>Déu i Senyor nostre.", "2. Ell ha enviat als homes la Paraula,<br>que és Jesucrist, nostre Senyor:<br>siguem la terra bona on<br>fruiti la pregària.", "3. Ell ens ha fet passar de mort a Vida,<br>ressuscitant Crist d’entre els morts:<br>fem junts l’Eucaristia<br>en memòria seva.", "4. Ell ha volgut que fóssim el seu Poble<br>i Ell se n’ha fet el nostre Déu:<br>l’Esperit Sant elevi els<br>nostres cors al Pare.", "5. Vós sou la font d’on ve tota bonesa:<br>la pau, l’amor i la virtut;<br>contents us donem gràcies<br>per tanta finesa.", "6. Vós sou, Senyor, el Pare de clemència<br>que besa el fill extraviat;<br>traieu les nostres culpes<br>de vostra presència.", "7. Deu-nos a tots salut i fortalesa<br>i us servirem més fidelment;<br>salveu el vostre Poble<br>de tota malesa."]}, {"n": "2", "t": "Fent grup entorn dels nostres pastors", "p": ["1. Fent grup entorn dels nostres pastors,<br><b>Tots venim cantant.<\/b>", "Units en una sola fe,<br><b>Tots venim cantant.<\/b>", "Alimentats pel mateix Déu,<br><b>Tots venim cantant.<\/b>", "Plens de l’Amor de l’Esperit,<br><b>Tots venim cantant.<\/b>", "<b>Ciutat celeste, dia sense nit.<br>Mare nostra, Església Santa,<br>oh, ciutat dels batejats,<br>que un gran jorn vostra lloança<br>tots els fills cantin plegats.<\/b>", "2. Feixucs amb el pes del dolor,<br>feixucs amb el pes del pecat,<br>conscients de ser fills del Senyor,<br>conscients de ser membres del Crist.", "3. Poble de Déu mirant sempre endavant,<br>Poble de Déu lluitant contra tot mal,<br>Sembrant la joia, la veritat i l’amor,<br>pedres vivents del temple del Senyor."]}, {"n": "3", "t": "Oh, quin gran goig, quina joia", "p": ["Oh, quin gran goig, quina joia,<br>quan els germans s’estimen! (2)<br>Oh, quin goig tan gran<br>quan els germans s’estimen! (2)"]}, {"n": "4", "t": "Heus ací el tabernacle", "p": ["<b>Heus ací el tabernacle <br>de Déu enmig dels homes;<br>ells seran el seu poble;<br>i &quot;Déu amb ells&quot; serà el seu Déu.<\/b>", "1. Poble convocat per la paraula dels profetes,<br>fent assemblea entorn de Crist, el Senyor,<br>poble de escolta el seu Déu, Església del Senyor.", "2. Temple sant bastit pels apòstols i els profetes,<br>temple fundat sobre el Crist, pedra angular,<br>sant tabernacle de Déu, Església del Senyor.", "3. Poble nascut en les aigües del Baptisme,<br>poble marcat pel senyal de l’Esperit,<br>poble que ens porta al Crist, Església del Senyor.", "4. Poble empeltat sobre Crist, vinya santa,<br>vinya que porta els fruits de vida nova,<br>vinya que el Pare ha plantat, Església del Senyor.", "5. Poble nodrit amb el Cos del Senyor,<br>i assaciat amb la sang de l’Aliança,<br>poble d’alegria exultant, Església del Senyor.", "6. Poble que celebra la Pasqua novella,<br>poble que passa de la mort a la vida,<br>poble que Déu s’ha guanyat, Església del Senyor.", "7. Poble redimit per la gràcia del Senyor,<br>únic hereu de la vida eternal,<br>poble reial, poble sant, Església del Senyor.", "8. Poble que Déu conquerí perquè el lloï, <br>poble cridat de les tenebres a la llum,<br>poble il·luminat per l’Anyell, Església del Senyor.", "9. Poble arrelat en la fe i en l’amor,<br>poble que posa en el Crist tota esperança,<br>poble reunit per l’Esperit, Església del Senyor.", "10. Poble que canta la glòria del Pare,<br>per Jesucrist, el Senyor, Fill únic seu,<br>en la unitat de l’Esperit, Església del Senyor."]}, {"n": "5", "t": "Un sol Senyor", "p": ["<b>Un sol Senyor, <br>una sola fe, <br>un sol baptisme,<br>un sol Déu i Pare!<\/b>", "1. Cridats a conservar <br>la unitat de l’esperit,<br>en el vincle de la pau,<br>cantem i proclamen:", "2. Cridats a formar un sol cos <br>en un sol Esperit,<br>cantem i proclamem:", "3. Cridats a participar <br>d’una sola esperança <br>en el Crist,<br>cantem i proclamem:"]}, {"n": "6", "t": "Glòria a vós, oh Crist, Senyor", "p": ["1. Glòria a vós, oh Crist, Senyor,<br>que ens heu donat la vida.<br>Que la Paraula vostra<br>resti sempre en el nostre cor.", "2. Tots hem viscut amb joia<br>les vostres meravelles.<br>Feu que la nostra història<br>trobi en vós l’acabament.", "3. Vós heu vingut avui, Senyor,<br>enmig del vostre poble.<br>Guardeu la vinya que heu plantat,<br>l’obra de les vostres mans.", "4. Vós sou el nostre Bon Pastor<br>que ens guieu amb fermesa;<br>Amb vós anem fent dret camí<br>vers la vida eterna.", "5. Glòria a vós, oh Pare etern<br>i al vostre Fill, Senyor del món,<br>i a l’Esperit que ens fa cantar<br>la lloança de glòria."]}, {"n": "7", "t": "Alcem, fidels, les veus de la lloança", "p": ["1. Alcem, fidels, les veus de la lloança.<br>Cantem al Crist, el nostre Redemptor!<br>Es Rei de pau, amor i benaurança,<br>el Rei de reis i el nostre etern Senyor.", "2. Suprema, oh Crist, és vostra reialesa,<br>de terra i cel sou vós Principi i Fi.<br>L’eternitat, als vostres peus sotmesa,<br>canta el poder del vostre braç diví.", "3. Sou Rei i Sacerdot del nou imperi<br>que al preu de la sang vostra heu rescatat;<br>l’amor us ha immolat en el misteri<br>que de l’infern per sempre ha triomfat.", "4. La vostra Creu sagrada de victòria<br>és l’estendard que ens porta a salvament.<br>Són pols al vent els regnes de la història,<br>només el vostre dura eternament.", "5. Torneu, oh Crist, al vostre jou dolcíssim<br>els cors rebels a vostra majestat.<br>Que en terra i cel s’adori el tron altíssim<br>del nostre Rei, Senyor d’eternitat. Amén."]}, {"n": "8", "t": "Agermanats anirem caminant", "p": ["Agermanats anirem caminant<br>sota un cel ben blau.<br>Joiosos himnes ressonaran<br>d’amor i de pau."]}, {"n": "9", "t": "Benaurances", "p": ["En veure les multituds,<br>Jesús pujà a la muntanya.<br>S’assegué, i se li atansaren els deixebles;<br>llavors, prenent la paraula, els ensenyava dient:", "<b>Benaurats! Benaurats!<\/b>", "1. Feliços els pobres en l’esperit,<br>perquè d’ells és el Regne dels cels.", "2. Feliços els humils,<br>perquè serà part seva la terra.", "3. Feliços els qui ploren,<br>perquè seran consolats.", "4. Feliços els qui tenen fam i set de ser justos,<br>perquè seran saciats.", "5. Feliços els compassius,<br>perquè seran compadits.", "6. Feliços els nets de cor,<br>perquè veuran Déu.", "7. Feliços els pacificadors,<br>perquè els diran fills de Déu.", "8. Feliços els perseguits per causa de la justícia,<br>perquè d’ells és el Regne dels cels.", "Alegreu-vos vosaltres i celebreu-ho:<br>la vostra recompensa és molt gran a dalt del cel."]}, {"n": "10", "t": "La mà del Senyor ha obrat meravelles", "p": ["La mà del Senyor ha obrat meravelles,<br>la mà del Senyor m’ha glorificat.<br>No moriré, sinó que viuré<br>per proclamar les obres del Senyor."]}, {"n": "11", "t": "Tothom coneixerà que som del Crist", "p": ["<b>Tothom coneixerà que som del Crist<br>si ens estimem com a germans.<\/b>", "1. Crist, Redemptor del món,<br>víctima dels nostres pecats.<br><b>Gràcies, eternament.<\/b>", "2. Crist, Fill de Déu vivent,<br>camí, veritat i vida.", "3. Crist, Bon Pastor,<br>que doneu la vida per les ovelles.", "4. Crist, Pa de la vida,<br>fortalesa dels creients.", "5. Crist, cep veritable,<br>saba dels vostres fidels.", "6. Crist, font d’aigua viva<br>que brolla fins a l’Eternitat.", "7. Crist, Rei de pau,<br>corona dels vostres servents.", "8. L’Esperit i l’Església clamen:<br>Veniu, Senyor."]}, {"n": "12", "t": "Joiosa llum santa", "p": ["<b>Joiosa llum santa,<br>que ens portes la glòria<br>del Pare del cel immortal,<br>Déu i Salvador, Jesucrist.<\/b>", "l. El sol ja s’ha post avui, <br>però essent per la fe fills de la llum,<br>lloem tots el Pare i el Fill,<br>i el Sant Esperit de Déu.", "2. Digne sou vós, Senyor,<br>d’ésser lloat per veus pures per sempre,<br>Fill de Déu, que doneu la vida,<br>que tot el món us glorifiqui!"]}, {"n": "13", "t": "Jo crec en vós, bon Déu", "p": ["1. Jo crec en vós, bon Déu,<br>jo crec en vós,<br>vivent misteriós<br>ben a prop meu.<br>Si el dubte algun cop ve<br>feu-me fort en la fe.<br>Jo crec en vós, bon Déu,<br>jo crec en vós.", "2. Jo espero en vós, bon Déu,<br>jo espero en vós,<br>sé que per mi vetlleu<br>com Pare amorós. <br>Si em sento defallir<br>i m’espanta patir.<br>Jo espero en vós, bon Déu,<br>jo espero en vós..", "3. Jo us estimo, bon Déu,<br>tan sols a vós,<br>així ho han fet els sants<br>amb el cor joiós.<br>Ells em guien a mi<br>de la creu pel camí.<br>Jo us estimo, bon Déu,<br>tan sols a vós.", "4. A prop de vós, bon Déu,<br>a prop de vós,<br>feu-me en vostre servei<br>ben generós.<br>Feu-me sempre, Senyor,<br>créixer en el vostre amor,<br>a prop de vós, bon Déu, a prop de vós."]}, {"n": "16", "t": "Lloança a vós, oh bon Déu!", "p": ["1. Lloança a vós, oh bon Déu!<br>A vós, Senyor us donem gràcies.<br>S’invoca per tot el món<br>el vostre sant nom de Pare;<br>com els cors d’àngels al cel,<br>plens de temor us adoren<br>i us canten eternament:<br>Sant, Sant, Sant Déu de la glòria.", "2. La vostra gran majestat<br>ha omplert el cel i la terra.<br>Us beneeixen els Sants,<br>us glorifica l’Església;<br>a vós, Pare omnipotent<br>i al vostre Fill adorable,<br>junt amb el Sant Esperit,<br>se us dóna eterna lloança!", "3. I vós, Jesús, Fill de Déu,<br>sou Rei excels de la glòria.<br>En fer-vos home mortal<br>per redimir-nos als homes,<br>no rebutjàreu d’entrar<br>a dins el si d’una Verge.<br>Vós el fibló de la mort,<br>morint, vencíeu per sempre.", "4. Obriu el cel als creients<br>i allí regneu amb el Pare.<br>Quan com a Jutge vindreu<br>sigueu clement per nosaltres;<br>i, ja que ens ha redimit<br>la vostra Sang preciosa;<br>vulgueu-nos sempre comptar<br>amb tots el sants de la glòria.", "5. Oh gràcies, Déu de bondat,<br>que us ens doneu a conèixer;<br>que, com a fills estimats,<br>ens feu venir al vostre regne.<br>Pels béns i goigs d’aquest món,<br>que ens donen vida i consolen<br>i a vós ens van conduïm,<br>oh gràcies, Déu de la glòria!"]}, {"n": "17", "t": "Vós sou, Senyor, ma fortalesa", "p": ["1. Vós sou, Senyor, ma fortalesa<br>ma roca viva sou, Senyor.<br>En vós s’empara ma feblesa<br>que sou el Crist, mon Salvador.<br>Retut d’angoixa us he cridat<br>i vós clement m’heu escoltat.", "2. Sou nostre ajut en la quimera,<br>refugi nostre en la dissort.<br>El qui us coneix en vós espera<br>i el conduïu sempre a bon port.<br>Mai no s’ha vist abandonat<br>el qui de cor us ha cercat."]}, {"n": "18", "t": "Poble immens, poble que avança", "p": ["1. Poble immens, poble que avança,<br>no temis la fosca que per tot s’estén:<br>la teva llum t’acompanya;<br>fes la teva ruta, la cara al vent.", "2. Pel desert ara camines,<br>cercant l’esperança que Déu t’ha promès;<br>brollen per tu fonts de vida<br>al cor de la pedra, quan tot és erm.", "3. Israel de les promeses,<br>pel desert et duia el qui et vol el cor.<br>Fareu l’aliança eterna:<br>agença’t, núvia, pel Déu espòs.", "4. Riu pregon, Jordà dels pares,<br>caldrà que travessis per entrar al repòs.<br>La terra que delejaves<br>serà tota teva, farà el teu goig."]}, {"n": "19", "t": "Enaltim el Senyor, proclamem el seu nom!", "p": ["1. El Senyor és el Déu que em salva;<br>confio i no m’espanto.", "<b>Enaltim el Senyor, <br>proclamem el seu nom!<\/b>", "2. D’Ell em ve la força i el triomf;<br>és Ell qui m’ha salvat.", "3. Cantant de goig sortirem a buscar l’aigua<br>de les fonts de salvació.", "4. Feu conèixer entre els pobles les seves gestes,<br>recordeu que el seu nom és excels.", "5. Canteu al Senyor que ha fet coses glorioses;<br>que ho publiquin per tota la terra.", "6. Poble de Sió, aclama el Senyor,<br>perquè el Sant d’Israel és gran a la teva ciutat."]}, {"n": "20", "t": "Lloem el Senyor, al·leluia!", "p": ["1. Lloem el Senyor, al·leluia!<br>perquè ens ha estimat, al·leluia!", "<b>Lloem-lo tots junts!<br>Sentim-nos germans! <br>Al·leluia, Al·leluia!<\/b>", "2. Perquè Ell és bondat, Al·leluia!<br>i el món ha creat, al·leluia!", "3. Perquè ens ha salvat, al·leluia!<br>en Crist, l’Estimat, al·leluia!", "4. Visquem tots contents, al·leluia!<br>i a tots estimem, al·leluia!"]}, {"n": "21", "t": "La terra lloï el Senyor", "p": ["1. La terra lloï el Senyor, entonant un nou himne.<br>Cantin els cels la grandesa del Rei que hi habita.<br>Tot l’univers reti homenatge al Senyor;<br>canti lloances per sempre.", "2. Cantin els homes units la bondat infinita,<br>ja que Jesús Redemptor va patir per nosaltres.<br>Ell, mort en creu, ens ha fet morts al pecat<br>i ens ha donat nova vida.", "3. Tots junts lloem el Senyor que la gràcia ens dóna.<br>L’Esperit Sant, en els cors, ens fa dir: Abbà, Pare!<br>L’hoste diví, foc que ens abrusa i empeny,<br>fa de nosaltres un temple.", "4. Rebi Déu Pare, dels fills agraïts, la lloança.<br>Soni joiós l’al·leluia pels segles dels segles.<br>Eternament cantina Déu Trinitat<br>els qui d’Ell reben la vida."]}, {"n": "22", "t": "Els vostres missatgers, Senyor", "p": ["<b>Els vostres missatgers, Senyor,<br>envieu al món!<br>i a vós, oh Déu vivent,<br>pujarà un cant de glòria, Al·leluia.<\/b>", "1. Ens escolliu, Senyor,<br>de vós ens revestiu,<br>per ser la claredat<br>que brilla dalt dels cims.", "2. Així que hem conegut<br>el do de ser cridats,<br>nosaltres hem respost,<br>amb joia, a vostra veu.", "3. Per fer vostre camí,<br>i a vós poder arribar,<br>doneu-nos, oh Senyor,<br>servir-vos plens de goig.", "4. Als qui clamen vers vós<br>i estimen sens saber,<br>voleu vós que els portem<br>la vostra veritat.", "5. El món ben lluny de vós<br>recerca un Paradís;<br>pel nostre viure, oh Crist,<br>conegui el vostre amor.", "6. El món espera encar<br>que arribi un Redemptor;<br>ens envieu a ell<br>per dur-lo fins a vós."]}, {"n": "23", "t": "Canta el teu Déu i Salvador", "p": ["<b>Canta el teu Déu i Salvador.<br>Poble de l’Aliança,<br>que la Paraula ha convocat<br>per la gran esperança.<\/b>", "1. Tot l’univers va proclamant,<br>Senyor, que és obra vostra.<br>Amb saviesa l’heu creat:<br>la llum, els astres, l’home.", "2. Les vostres gestes d’altre temps<br>ens han contat els pares;<br>vós ens torneu a visitar<br>per renovar-les ara.", "3. L’home mortal ha contemplat<br>l’Obra meravellosa,<br>quan Déu mateix s’ha fet germà<br>dels pecadors i els pobres.", "4. Vós ple d’amor veniu al món<br>per reunir tots els homes,<br>i pels camins de la unitat<br>ens guieu a la glòria.", "5. Al cor dels vostres batejats<br>vibra un cant de victòria<br>i, amb alegria, proclamem<br>la vostra bona nova.", "6. Des del llevant fins al ponent<br>arriben tots els pobles,<br>per prendre lloc en el convit<br>que heu preparat als pobres.", "7. Glòria a vós, Rei vencedor<br>Senyor que feu la història:<br>que l’Esperit ens posi al cor<br>una lloança nova."]}, {"n": "24", "t": "El misteri de Déu és inefable", "p": ["1. El misteri de Déu és inefable,<br>el seu Nom és el qui és eternament<br>la infinita grandesa és insondable<br>per la dèbil potència de la ment.", "2. Trinitat és el nom d’amor i vida,<br>efusió eternal al si de Déu,<br>Pare, Fill i Esperit, essència unida,<br>revelada en el Crist, l’Enviat seu.", "3. L’Esperit del Senyor ens fa dir: Pare,<br>clamant Déu fet germà en el Fill Jesús;<br>devassall de l’amor que brolla encara<br>dins de l’íntim del cor de l’home just.", "4. Més enllà de l’amplària de la terra,<br>més amunt de l’alçària dels estels,<br>més profunda als abismes sota terra<br>és la glòria de Déu vivent i excels.", "5. Lloem Déu, humilment, que és Pare nostre,<br>donem gràcies al Fill Senyor i germà;<br>l’Esperit il·lumini el diví rostre<br>de l’home i l’univers que Déu creà."]}, {"n": "25", "t": "Crist, esperança dels pobles", "p": ["1. Crist, esperança dels pobles;<br>reneix la llum, la por se’n va.<br>Vós sou el sol que no té posta:<br>guieu els nostres passos vacil·lants.", "2. Crist, vida eterna dels homes:<br>comença el jorn, torna el delit.<br>Vós sou Paraula sempre nova;<br>doneu sentit al nostre vell camí.", "3. Crist, estendard de victòria:<br>un nou esforç se’ns ofereix.<br>Vós heu trencat el jou de l’home:<br>doneu-nos un coratge compromès.", "4. Crist, camí dret cap el Pare:<br>la nostra fe pot trontollar. <br>Vós, gran Pastor de la ramada,<br>meneu-nos a les aigües immortals."]}, {"n": "26", "t": "Oh màrtirs del Crist!", "p": ["<b>Oh màrtirs del Crist!<br>sou foc i embranzida;<br>no hi ha amor més gran<br>que donar la vida. <\/b>", "1. Lloem Crist Senyor<br>que us féu triomfar;<br>fins per qui us occí<br>vau saber pregar.", "2. Lloem Crist Senyor<br>pel qual tot reneix;<br>quan es rega amb sang<br>la fe augmenta i creix.", "3. Lloem Crist Senyor<br>que venç amb la creu;<br>els qui heu mort per Ell,<br>d’Ell, amb goig viureu."]}, {"n": "27", "t": "Si m’estimes, pastura els meus anyells", "p": ["Si m’estimes, pastura els meus anyells.<br>Si m’estimes, pastura’m les ovelles.<br>Fes veure a tots els homes com jo estimo,<br>donant la teva vida per amor.", "<b>Mai ningú no ens arrenca la vida: <br>en fem un do d’amor.<br>Al·lelú! Al·leluia!<\/b>", "1. Quan busquem les ovelles perdudes,<br>quan guiem la que s’ha esgarriat,<br><b>mai ningú...<\/b>", "2. En posar-la a les nostres espatlles,<br>suportant amb gran goig el seu pes,", "3. Conduïm-les per valls de tenebres<br>en la pau del guiatge del Crist,", "4. Quan guarim la que està malferida,<br>quan vetllem per la forta i la feble,", "5. Aplegant-les en dies de boira,<br>al recer de l&#x27;amor del Senyor,", "6. En portar-les a l&#x27;aigua abundosa<br>caminant decidits al davant,"]}, {"n": "28", "t": "Lloat sigueu, Senyor", "p": ["1. Lloat sigueu, Senyor,<br>per tot quant heu fet vós.<br>Que us lloï l&#x27;univers,<br>immens, meravellós.", "<b>Lloat sigueu, Senyor,<br>pels béns que ens heu donat;<br>pel vostre gran amor<br>sigueu sempre lloat. (2)<\/b>", "2. Lloat sigueu pel cel,<br>muntanya, terra i mar.<br>Lloat sigueu pel Fill<br>de Déu que s&#x27;encarnà.", "3. Per l&#x27;arbre de la Creu<br>també lloat sigueu.<br>Lloat sigueu pel Pa<br>de Vida que ens doneu.", "4. Lloat sigueu pel do<br>de poder-vos parlar.<br>Lloat sigueu pel goig<br>del riure i del cantar.", "S. Lloat sigueu pels cors<br>amants de llibertat.<br>Lloat sigueu quan neix<br>el cant de l&#x27;amistat.", "6. Que us lloï qui té fe<br>en vostre amor diví:<br>així com us lloem<br>nosaltres tots aquí."]}, {"n": "29", "t": "Dels fidels sou vós, Senyor", "p": ["<b>Dels fidels sou vós, Senyor,<br>vós només, el Bon Pastor.<br>Cap al cel, pel bon camí<br>us volem seguir.<\/b>", "1. Per camins de Vida<br>el ramat meneu;<br>quan el poble us crida<br>sempre l&#x27;escolteu.", "2. Ni paranys ni abismes,<br>res ja no ens fa por;<br>som de la ramada<br>del millor Pastor.", "3. Res del món basarda<br>ni neguit no ens fa;<br>el Pastor que ens guarda<br>prou que ens vetllarà.", "4. Per donar-nos vida,<br>tot se’ns ha donat:<br>taula ben parada<br>de raïm i blat.", "5. Plens de vós, lloança<br>sempre us donarem;<br>fills de l’esperança,<br>sal del món serem."]}, {"n": "30", "t": "Ací ens teniu, Senyor!", "p": ["1. Ací ens teniu, Senyor!<br>Obriu les mans, si us plau!<br>Plens d’esperança. hem arribat,<br>cercant amor i pau.", "2. Allò que vós dieu<br>per sempre durarà;<br>que tot allò que ens heu promès<br>sabem que es complirà.", "3. Misteri sempre igual<br>i sempre renovat.<br>Damunt l’altar, i al nostre abast<br>poseu la immensitat.", "4. Vós sou de vida el pa<br>que ha de nodrir-nos tots;<br>si vós voleu, no morirem:<br>Viurem per sempre amb vós!", "5. Ja no ens fa por la creu<br>que al coll ens cal portar;<br>sabent que un dia tornareu<br>ja res no ens pot torbar.", "6. Mireu, Senyor, els germans,<br>al peu del vostre altar;<br>venim a vós cercant l’amor<br>i en vós l’hem de trobar.", "7. A casa vostra som;<br>qui s’hi pogués quedar!<br>Només de vós ens ve la llum<br>que fa el camí més clar."]}, {"n": "31", "t": "Bo és el Senyor", "p": ["1. Bo és el Senyor i les coses totes Ell ha creat:<br>els mars, els astres, les muntanyes i els éssers vius.", "<b>Vós ho sou tot per a nosaltres; a vós venim!<br>Vós teniu cura de nosaltres i ens feu més forts.<\/b>", "2. Ell és la llum en les tenebres i el Bon Pastor<br>que la perduda ovella cerca del seu ramat.", "3. Ell lliurement per tots es dóna fins a morir<br>i ens ressuscita a nova vida que no té fi.", "4. Cal que morim a l’home vell que érem fins avui,<br>per revestir-nos amb la vida del Salvador.", "5. Hem d’estimar com Ell estima i servi els germans,<br>que el nostre amor serà la prova que som cristians.", "6. Tots el Senyor adorem, lloances amb goig cantant,<br>com en el cel els sants les canten al seu voltant."]}, {"n": "32", "t": "Els pobles lloaran el Senyor", "p": ["<b>Els pobles lloaran el Senyor.<br>Canta, terra, el Déu que és bo i és gran.<br>Hosanna! Hosanna! Hosanna!<br>a vós, oh Sant dels Sants!<\/b>", "1. Canti el Senyor tothom amb viva joia;<br>aclamem-lo entre càntics de lloança.", "2. E1 Senyor salva les nostres vides<br>i escolta, provident, les nostres pregàries.", "3. Sempre és a prop dels qui l’estimen;<br>petits, mitjans i grans, donem-li gràcies.", "4. Dóna la veritat als qui la cerquen;<br>el Senyor es llum que esquinça la tenebra.", "5. Pobres i humils, el seu consol obtenen.<br>Dels seus dolors els malaurats s’obliden.", "6. Nostre camí el Senyor alliberi d’obstacles,<br>perquè a la pau ens portin nostres passos.", "7. Glòria al Pare i al Fill i a l’Esperit Sant, per sempre;<br>i que, pel Crist, puguem participar-ne."]}, {"n": "33", "t": "Amb himnes de lloança", "p": ["Amb himnes de lloança<br>a Déu el poble aclami.<br><b>Donant-vos gràcies,<br>cantem, Senyor.<\/b>", "Al Pare que ens perdona<br>i ens crida al seu reialme.<br><b>Donant-vos ...<\/b>", "Al Fill que, redimint-nos,<br>ens dóna vida nova.", "A l’Esperit Paràclit<br>que a tots ens agermana.", "Proclami la veu nostra<br>la gran bondat divina."]}, {"n": "34", "t": "Donem gràcies al bon Déu", "p": ["<b>Donem gràcies al bon Déu.<br>Donem gràcies al bon Déu<br>i Senyor.<br>Donem gràcies al bon Déu<br>i lloem-lo amb tot el cor.<\/b>", "1. Oh àngels de la glòria,<br>amb els sants que us acompanyen, <br>canteu tots per sempre més<br>la grandesa del Senyor.", "2. Oh pobles de la terra,<br>que cerqueu la pau perduda, <br>canteu tots...", "3. Oh infants de tota raça<br>que tot just tasteu el viure,<br>canteu tots...", "4. Adolescents i joves<br>que us esteu forjant la vida, <br>canteu tots...", "5. Oh pares i famílies<br>que en l’amor trobeu la joia,<br>canteu tots...", "6. Oh vells que el seny corona<br>i teniu la testa blanca,<br>canteu tots..."]}, {"n": "35", "t": "Avui, Senyor, el vostre nom", "p": ["1. Avui, Senyor, el vostre nom<br>els nostres llavis cantaran.<br>Volem seguir-vos fidelment.<br>Volem aprendre d’estimar.", "2. Vós meravelles feu, Senyor.<br>Vós vau crear el firmament,<br>la terra, els astres tots i el sol,<br>i alè doneu a tot vivent.", "3. Volem lloar-vos sempre més:<br>vós sou el just, el sant i el fort.<br>Vós sou a prop en tot moment<br>de qui us invoca amb tot el cor.", "4. Vinguin els pobles fins a vós.<br>Als vostres peus es postraran<br>i revifats per Vós mateix,<br>ja mai, Senyor, no moriran.", "5. Si en cada pobre viu el Crist<br>i amb els humils vós sou, Senyor,<br>els freturosos d’aquest món<br>volem servir pel vostre amor.", "6. Vulgueu que un dia dalt del cel<br>vegem, Senyor, la vostra faç,<br>fruint l’herència que heu promès<br>a tots aquells qui, en vós creuran. Amén."]}, {"n": "36", "t": "Que Crist venci", "p": ["<b>Que Crist venci,<br>que Crist regni.<br>El seu regne<br>no tindrà fi.<\/b>", "1. &quot;Ben cert sóc Rei&quot;, digué el Senyor.<br>&quot;Només que el regne meu<br>no és un regne d’aquest món&quot;.", "2. El Pare ens salva de la mort<br>perquè el seu Fill morí<br>per mereixe’ns el perdó.", "3. El Crist és Rei de terra i cel<br>i nostra vida és d’Ell<br>puix la conquerí amb la creu.", "4. El Crist és Rei de santedat,<br>de vida, pau i amor,<br>de justícia i veritat.", "5. Té un regne immens, serè i etern;<br>Ell és l’excels cabdill<br>i nosaltres súbdits seus.", "6. El Crist, no obstant, ens ve a servir,<br>perquè aprenent-ho d’Ell<br>als germans també servim."]}, {"n": "37", "t": "Tots aquells qui estimen ser pobres", "p": ["1. Tots aquells qui estimen ser pobres<br>entraran al regne del cel.", "<b>Benaurats seran<br>i hereus d’un cel etern.<br>Benaurats seran prop de Déu.<\/b>", "2. Els qui amb cor sincer s’humiliïn<br>fins la terra i tot serà d’ells.", "3. Els qui aquí gemeguen i ploren<br>consolats seran certament.", "4. Tots aquells qui volen justícia<br>saciar podran fam i set.", "5. Els qui el seu germà compadeixen,<br>compadits seran ells també.", "6. Tots els nets de cor entre els homes <br>cara a cara, al cel, veuran Déu.", "7. Els qui sembren pau mentre viuen,<br>s’anomenaran fills de Déu.", "8. Els qui el món injust persegueixi,<br>guanyaran el regne del cel."]}, {"n": "38", "t": "Quan creiem en vós, Senyor", "p": ["1. Quan creiem en vós, Senyor,<br>sou la llum que ens il·lumina.<br>Per l’Església a vós venim.<br>Escoltem la vostra crida, sense temor;<br>la paraula vostra és vida i ens dóna goig.", "2. Esperem en vós, Senyor,<br>amb serena confiança.<br>Sou fidel a allò promès.<br>Per camins de malaurança, quan tenim por,<br>ens conforta l’esperança i ens dóna goig.", "3. Us amem a vós, Senyor,<br>com un fill estima el pare.<br>Hem pecat i ens perdoneu.<br>Si l’amor vacil·la encara –som pecadors–<br>vostre cor l’acull i empara i ens dóna goig.", "4. Que vinguem a vós, Senyor,<br>puix sou vós qui ens dignifica.<br>Som el poble que heu salvat.<br>Som el poble que us suplica: –Vingui’ns de vós<br>l’Esperit que ens santifica i ens dóna goig."]}, {"n": "39", "t": "Senyor, vós ens coneixeu", "p": ["1. Senyor, vós ens coneixeu;<br>mireu com venim a vós.<br>Sabem que, generós,<br>acolliu i escolteu<br>sempre dels fidels la veu. (2)", "2. Senyor, us volem sentir<br>present en el nostre món.<br>Amb vós tot fent camí<br>témer res no ens caldrà:<br>vós la nit feu dia clar. (2)", "3. Perdut torni el filla vós;<br>consol trobi qui el perdé.<br>Dels pobres pecadors<br>vós podeu esborrar<br>el pecat que els ensutzà. (2)", "4. A vós, com Simó digué,<br>clamem. &quot;Vós ho sabeu tot;<br>sabeu que us estimem<br>i volem, ben sincers,<br>estimar-vos més i més&quot;. (2)", "5. De vós l’univers és ple;<br>poder té la vostra mà.<br>Us canta el món sencer!<br>El Senyor servirem;<br>plens de goig el lloarem. (2)", "6. Vós sou vida, pau i amor,<br>camí, llum i veritat.<br>Lloança a vós i honor<br>oferir desitgem<br>en la glòria eternament! (2)"]}, {"n": "40", "t": "Déu que creà la llum del sol", "p": ["1. Déu que creà la llum del sol<br>i les estrelles del firmament,<br>per Crist el cor dels seus fidels<br>ara il·lumina amb llum resplendent.<br>Crist és la llum que el món fa clar.<br>La llum que el món ha de salvar.", "<b>Victòria és la nostra fe,<br>la fe d’un poble de batejats.<\/b>", "2. Tal com la pluja amara els camps<br>fent germinar les bones llavors,<br>la nostra vida així mateix<br>pluja de gràcia espera de vós.<br>Brolli la font de salvació,<br>que tenim set de vós, Senyor.", "3. En vós trobem la pau i el goig,<br>en vós la força per estimar.<br>Fidelitat us prometem<br>a tot allò que ens vàreu manar.<br>Vostres paraules són, Senyor,<br>de vida eterna i de perdó.", "4. Tota la terra, vostre amor<br>omple, Senyor, d’Orient a Occident.<br>L’ànima nostra prou que us sap<br>entre nosaltres sempre present.<br>Res no ens espanta ni ens fa por,<br>que som el poble del Senyor.", "5. La nostra vida és viure en Crist,<br>en Crist Jesús que ha ressuscitat.<br>Ell de la mort vencé el poder<br>i ja no som esclaus del pecat.<br>Morts al pecat, en Crist vivim<br>i el Déu i Pare beneïm."]}, {"n": "41", "t": "Que n’és de bo quan viuen", "p": ["1. Que n’és de bo quan viuen<br>els germans units,<br>formant només un poble,<br>marcat per l’Esperit.", "<b>Junts mirem d’obrir pas<br>a la veritat.<br>Junts mirem d’implantar,<br>amb l’amor la pau.<\/b>", "Déu és en nosaltres,<br>i amb Ell tot ho podem.<br>Ferms en l’esperança,<br>món enllà avancem.", "<b>Junts mirem d’obrir pas<br>a la veritat.<br>Junts mirem d’implantar,<br>amb l’amor la pau.<\/b>", "2. Bé val la pena creure<br>que Déu ens vol sants;<br>amb Crist som pedres vives,<br>amb Crist que és nostre cap.", "<b>Junts mirem...<\/b>", "No tenim barreres<br>de raça o de nació;<br>som només un poble:<br>poble del Senyor.", "<b>Junts mirem...<\/b>", "3. Amb penes o alegries;<br>amb goig o amb dolor;<br>amb èxits o fracassos;<br>rient o ran del plor...", "<b>Junts mirem...<\/b>", "Crist vingué a salvar-nos<br>morint en una creu.<br>Cal que avui i sempre<br>alt ho anunciem.", "<b>Junts mirem...<\/b>"]}, {"n": "42", "t": "Beneit sigui el Senyor, Deu d’Israel", "p": ["1. Beneit sigui el Senyor, Deu d’Israel,<br>ha visitat el seu poble i l’ha redimit.", "2. Fa que s’aixequi un salvador poderós<br>a la casa de David el seu servent.", "3. com ho havia anunciat de temps antic,<br>per boca dels seus sants profetes.", "4. Així ens salva, alliberant-nos dels enemics,<br>de les mans dels qui ens volen mal,", "5. mogut per l’amor que el fa fidel als nostres pares,<br>i pel record de l’aliança santa,<br>que jurà al nostre pare Abraham,", "6. prometent de concedir-nos que, sense por,<br>lliures dels enemics,<br>li donem culte amb santedat i justícia tota la vida.", "7. I a tu, infant, et diran profeta de l’Altíssim,<br>perquè aniràs al davant del Senyor<br>a preparar els seus camins.", "8. Faràs saber al poble que li ve la salvació,<br>el perdó dels seus pecats,<br>per l’amor entranyable del nostre Déu.", "9. Perquè ens estima, ens visitarà un sol, que ve del cel,<br>per il·luminar els qui viuen a la fosca, a les ombres de la mort,<br>i guiar els nostres passos per camins de pau.", "10.Glòria al Pare i al Fill i a l’Esperit Sant.<br>Com era al principi, ara i sempre<br>i pels segles dels segles. Amén."]}, {"n": "43", "t": "La meva ànima magnifica el Senyor", "p": ["1. La meva ànima magnifica el Senyor,<br>el meu esperit celebra Deu que em salva,<br>perquè ha mirat la petitesa de la seva serventa.", "2. Des d’ara totes les generacions ‘<br>em diran benaurada,<br>perquè el Totpoderós obra en mi meravelles.", "3. El seu nom és sant,<br>i l’amor que té als qui creuen en ell<br>s’estén de generació en generació.", "4. Les obres del seu braç són potents:<br>dispersa els homes de cor altiu,", "5. derroca els poderosos del soli<br>i exalça els humils.", "6. Omple de béns els pobres,<br>i els rics se’n tornen sense res.", "7. Ha protegit Israel, el seu servent,<br>com ho havia promès als nostres pares;", "8. S’ha recordat del seu amor a Abraham<br>i a la seva descendència per sempre.", "9. Glòria al Pare i al Fill i a l’Esperit Sant.<br>Com era al principi, ara i sempre<br>i pels segles dels segles. Amén."]}, {"n": "51", "t": "Oh! Cridem amb tots els homes", "p": ["<b>Oh! Cridem amb tots els homes,<br>amb tots els germans d’arreu del món.<br>Oh! Cridem amb tots els homes:<br>Vós sou el nostre Déu. <\/b>", "1. Oh! Pobles, aplaudiu-lo.<br>Ell és el nostre Déu!<br>Aclameu-lo amb crits de joia:<br>perquè ens ha salvat!", "2. Tots junts donem-li gràcies:<br>Ell és el nostre Déu!<br>I de cor estimem-nos:<br>perquè ens ha salvat.", "3. És prop dels qui l’invoquen,<br>E11 és el nostre Déu.<br>Ell guarda els qui l’estimen,<br>perquè en ha salvat.", "4. Sigui la glòria al Pare,<br>al Fill i a l’Esperit.<br>Com era en el principi,<br>avui i en tot moment."]}, {"n": "52", "t": "Vés! Que ho sentin les muntanyes", "p": ["<b>Vés! Que ho sentin les muntanyes.<br>Digues-ho ben fort pertot arreu.<br>Vés! Que ho sentin tots els homes:<br>He vist el meu Senyor!<\/b>", "1. Sempre que em sento feble,<br>invoco el meu Senyor,<br>dient: Déu meu, ajuda’m<br>i mostra’m el camí.", "2. Sempre que em sento pobre,<br>jo cerco el meu Senyor,<br>dient: Déu meu, ajuda’m,<br>ensenya’m de pregar."]}, {"n": "53", "t": "No ho sents? Hi ha algú que està trucant!", "p": ["<b>No ho sents? Hi ha algú que està trucant! (2)<br>Oh, respon-li! Obre la porta.<br>No ho sents? Hi ha algú que està trucant!<\/b>", "1. De qui deu ser el truc?<br><b>No ho sents? Hi ha algú que està trucant!<\/b><br>De qui deu ser el truc?<br><b>No ho sents? Hi ha algú que està trucant!<br>Oh, respon-li! Obre la. porta.<br>No ho sents? Hi ha algú que està trucant!<\/b>", "2. No el deixis fora!<br><b>No ho sents? Hi ha algú que està trucant!<\/b><br>No el deixis fora!<br><b>No ho sents? Hi ha algú que està trucant!<br>Oh, respon-li! Obre la porta.<br>No ho sents? Hi ha algú que està trucant!<\/b>", "3. Jesús s’espera!<br><b>No ho sents? Jesús està trucant!<\/b><br>Jesús s’espera!<br><b>No ho sents? Jesús està trucant!<br>Oh, respon-li! Obre la porta.<br>No ho sents? Jesús està trucant!<\/b>", "4. Que no el coneixes?<br><b>No ho sents? Jesús està trucant!<\/b><br>Que no el coneixes?<br><b>No ho sents? Jesús està trucant!<br>Oh, respon-li! Obre la porta.<br>No ho sents? Jesús està trucant!<\/b>"]}, {"n": "54", "t": "Cantarem al Senyor cants de joia", "p": ["1. Cantarem al Senyor cants de joia;<br>Ell que ha obrat meravelles sens fi.<br>Als humils ha adreçat la Paraula,<br>als qui el cerquen amb plors i amb neguits.", "2. La llavor que germina a la terra,<br>les estrelles, els astres i els mars<br>i l’eterna durada dels segles,<br>anuncien arreu el seu Nom.", "3. Podem veure en l’Amor el seu rostre<br>i en la Pau, el nou Regne instaurat;<br>i és la vida dels homes qui ens mostra<br>el misteri del Crist encarnat."]}, {"n": "55", "t": "Trobarem a faltar el teu somriure", "p": ["1. Trobarem a faltar el teu somriure.<br>Diu que ens deixes, te’n vas lluny d’aquí.<br>Però el record de la vall on vas viure<br>no l’esborra la pols del camí.", "2. El teu front duu la llum de l’albada,<br>ja no el solquen dolors ni treballs,<br>i el vestit, amarat de rosada,<br>és vermell com el riu de la vall.", "3. Quan arribis a dalt la carena<br>mira el riu i la vall que has deixat,<br>i aquest cor que ara guarda la pena<br>tan amarga del teu comiat."]}, {"n": "56", "t": "Deu-me la fe dels profetes", "p": ["<b>Deu-me la fe dels profetes: ( 3 )<br>pot ser el que em manca a mi.<\/b>", "1. Ells estimen tots els homes.", "2. Han sabut donar la cara.", "3. Ells que prediquen amb l’exemple.", "4. Denuncien la injustícia.", "5. Lluiten al costat dels pobres.", "6. Ells reproven la mentida.", "7. Perquè exalten l’honradesa."]}, {"n": "57", "t": "Deu-me la fe dels meus pares", "p": ["<b> Deu-me la fe dels meus pares: (3)<br>pot ser el que em manca a mi.<\/b>", "1. Va ser bona pel meu pare.", "2. Va ser bona per la mare.", "3. Fou la fe de Pau i Siles.", "4. És amor per tots els homes.", "5. En el dol és esperança.", "6. Serà bona quan jo em mori.", "7. Ens durà tots a la glòria."]}, {"n": "58", "t": "Tu ets el nostre Déu, Salvador!", "p": ["<b>Tu ets el nostre Déu, Salvador!<br>Volem seguir els teus camins:<br>Som aquí, Senyor!<\/b>", "1. Com Abraham i Samuel,<br>Isaïes i Moisès,<br>com tants d’altres, et vull dir:", "2. Oh Senyor, Pare dels sants,<br>no ens demanes coses grans,<br>sinó que et sapiguem dir:", "3. Quan estens la teva mà,<br>amagat en el germà,<br>sense espera t’hem de dir:", "4. Quan em vinguis a buscar<br>per portar-me al Més enllà,<br>fes que estigui a punt de dir:"]}, {"n": "59", "t": "Amistat, uneix-nos!", "p": ["<b>Amistat, uneix-nos!<br>Llibertat, deslliura’ns!<br>Germans: el demà serà millor!<\/b>", "1. Amb els ulls brillants i plens de joia,<br>i amb el cor ple de fe en el demà,<br>estimant farem la nostra via<br>i serem de tothom germà.", "2. Ben segurs que es troba allò que es busca<br>quan l’esforç és noble i és constant,<br>si la ruta se’ns fa més difícil<br>obriríem camins cantant."]}, {"n": "60", "t": "Vell pelegrí, jo vaig fent via", "p": ["1. Vell pelegrí, jo vaig fent via<br>com foraster arreu del món,<br>i estic segur que a l’altra vida<br>m’acollirà Déu piadós.<br>Me’n vaig allà a veure el Pare,<br>lassat el cos de caminar;<br>al capdavall de la jornada<br>lloc de repòs penso trobar.", "2. El meu camí ja arriba a terme<br>ja sento pròxim el Jordà,! <br>mes amb la mort res no puc perdre,<br>que hi deixaria el meu penar.<br>Allà veuré la dolça Mare,<br>consoli amor em donarà;<br>al capdavall de la jornada<br>prop d’ella espero reposar.", "3. Jo veig la fi sense temença<br>com un descans per al meu cos,<br>i veig venir la recompensa<br>per Déu promesa al meu esforç.<br>Me’n vaig allà, al sojorn dels Àngels,<br>on no rebré cap més refús,<br>per cantar amb ells goigs i lloances<br>eternament al bon Jesús."]}, {"n": "61", "t": "El Senyor és qui em dóna", "p": ["<b>El Senyor és qui em dóna<br>la força i el valor. (2)<\/b>", "1. Per camins de justícia Ell em guia<br>devers la Veritat.<br>Ell em dóna el triomf i la victòria<br>i em salva en el combat.", "2. El destí de la vida li confio,<br>defectes i virtut.<br>Li confio els béns i la pobresa,<br>els mals i la salut.", "3. Ell em guia pels camps i per les prades,<br>Ell és el bon pastor;<br>m’alimenta d’amor i mai no ens nega<br>la gràcia del perdó.", "4. El Senyor és la força del seu poble<br>l’Església militant;<br>un gran poble que espera una altra vida,<br>eterna i triomfant."]}, {"n": "62", "t": "Vós sou, Senyor, la llum del meu cor", "p": ["<b>Vós sou, Senyor, la llum del meu cor,<br>vós sou la meva força.<br>En vós, Senyor, jo trobo el meu bé,<br>vós m’ompliu de joia.<\/b>", "1. Jo penso en vós de dia i nit, oh, Senyor!<br>car vós guieu mon esperit, oh Senyor!", "2. No vull servir l’argent ni l’or, oh, Senyor!<br>per sempre més us dono el cor, oh, Senyor!", "3. Havent posat els ulls en vós, oh, Senyor!<br>caminaré amb el cor joiós, oh, Senyor!", "4. Faré cantant el meu camí, oh, Senyor!<br>amb vós, la mort no em pot ferir, oh, Senyor !", "5. A dalt del cel m’acollireu, oh, Senyor!<br>i d’alegria m’omplireu, oh, Senyor!"]}, {"n": "65", "t": "Tots els homes de la terra", "p": ["<b>Tots els homes de la terra<br>som germans i hem de conviure en pau.<br>Ajudem-nos i estimem-nos<br>com el Crist ha estimat.<\/b>", "1. Crist s’ha fet com nosaltres.<br>Crist ha guarit els cecs i els malalts.<br>Crist ha estimat els homes.<br>Oh germans, nosaltres ens hem d’estimar.", "2. Crist, en l’Eucaristia<br>ens ha donat el cos i la sang.<br>Crist ha estimat els homes.<br>Oh germans, nosaltres ens hem d’estimar.", "3. Crist, al cim del Calvari,<br>clavat en creu, ens ha redimit.<br>Crist ha estimat els homes.<br>Oh germans, nosaltres ens hem d’estimar.", "4. Crist de la mort triomfa.<br>Crist ens envia el Sant Esperit.<br>Crist ha estimat els homes.<br>Oh germans, nosaltres ens hem d’estimar."]}, {"n": "66", "t": "Amb la força del Senyor", "p": ["Amb la força del Senyor, Al·leluia!<br>de cap mal no tenim por, Al·leluia!", "Vós, Senyor, ens estimeu tant..., Al·leluia!<br>escolteu el nostre cant, Al·leluia!", "Confiem en el Senyor, Al·leluia!<br>Ell ens dóna el seu perdó, Al·leluia!", "Aclamem tots el Senyor, al·leluia!<br>és el nostre Salvador, Al·leluia!", "El Senyor és el nostre Déu, Al·leluia!<br>i nosaltres, poble seu, Al·leluia!", "Us lloem perquè sou bo, Al·leluia!<br>perquè és gran el vostre amor, Al·leluia!", "Envieu-nos l’Esperit, Al·leluia!<br>Afanyeu-vos a venir, Al·leluia!", "Feu justícia als oprimits, Al·leluia!<br>doneu pa als qui tenen fam, Al·leluia!", "Concediu la llibertat, Al·leluia!<br>la justícia i la pau, al·leluia!", "Que a ningú no falti el pa, al·leluia!<br>ni la casa, ni el treball, al·leluia!", "Que el dret sigui el defensor, Al·leluia!<br>dels humils i els desvalguts, Al·leluia!", "Acolliu-nos quan sofrim, Al·leluia!<br>i guieu el nostre esforç, Al·leluia!", "Apiadeu-vos, Senyor, Al·leluia!<br>perdoneu-nos els pecats, Al·leluia!", "Escolteu el prec ardent, Al·leluia!<br>de tots els vostres fidels, Al·leluia!"]}, {"n": "68", "t": "Déu meu, quina joia!", "p": ["<b>Déu meu, quina joia!, ( 3 )<br>el jorn que arribaràs.<\/b>", "1. S’alegren els deserts,<br>la terra seca dóna fruit.<br>Canten tots els mars i els rius,<br>que el Senyor ja va arribant.", "2. Trompetes sonaran<br>per despertar els pobles del món.<br>Tots veurem el braç de Déu<br>el jorn que arribaràs."]}, {"n": "69", "t": "Glòria, Glòria, Al·leluia!", "p": ["<b>Glòria, Glòria, Al·leluia! ( 3 )<br>El Senyor ens ha salvat.<\/b>", "1. Els pobles de la terra<br>han contemplat la salvació<br>que el Senyor va disposar<br>per Israel, el seu ungit.<br>Cantem doncs la seva glòria<br>entonant un càntic nou,<br>i cridem: Al·leluia.", "2. Crist és el Salvador<br>que per nosaltres va morir,<br>i triomfant sobre la mort<br>un nou camí ens va obtenir.<br>Celebrem la seva festa<br>i agraïts reconeguem<br>que és Ell qui ens ha salvat."]}, {"n": "70", "t": "Lloeu Déu a dalt del Cel. Al·leluia!", "p": ["1. Lloeu Déu a dalt del Cel. Al·leluia!<br>lloeu-lo pertot arreu. Al·lelú! Al·leluia!<br>per les gestes que Ell ha obrat. Al·leluia!<br>per la seva majestat. Al·lelú! Al·leluia!", "2. Els infants lloeu Déu. Al·leluia! <br>i canteu-li tot arreu. Al·lelú! Al·leluia!<br>Nois i noies juntament. Al·leluia!<br>amb els grans i amb els més vells. Al·lelú! Al·leluia!", "3. Lloeu Déu sense cap por. Al·leluia!<br>amb guitarres i amb tambors. Al·lelú! Al·leluia!<br>i ajuntem totes les veus. Al·leluia!<br>en un cant al nostre Déu. Al·lelú! Al·leluia!"]}, {"n": "71", "t": "Oh, quan els sants marxin plegats", "p": ["Oh, quan els sants marxin plegats, (2)<br>Oh Déu meu, també vull ser-hi,<br>quan els sants marxin plegats.", "El company que jo estimava<br>va passar primer que jo;<br>vam quedar que ens reveuríem<br>quan el Senyor els coronarà.", "Quan el Senyor els coronarà (2)<br>Oh Déu meu, també vull ser-hi,<br>quan el Senyor els coronarà.", "El company que jo estimava<br>va passar primer que jo;<br>vam quedar que ens reveuríem <br>quan seran amb el Senyor.", "Oh, quan seran amb el Senyor (2)<br>Oh Déu meu, també vull ser-hi,<br>quan seran amb el Senyor."]}, {"n": "72", "t": "Us donem gràcies, Senyor", "p": ["<b>Us donem gràcies, Senyor,<br>per sempre i en tot lloc. (2)<\/b>", "1. Em prosterno vers el vostre santuari<br>i reconec el vostre nom, perquè sou bo.<br>M’heu escoltat tan bon punt us invocava,<br>i m’heu multiplicat les energies.", "2. Tots els reis de la terra us lloaran<br>en sentir el que han dit els vostres llavis,<br>i celebraran els designis del Senyor.<br>Es realment gran la glòria del Senyor.", "3. Quan em trobi en la desgràcia,<br>guardeu-me la vida, Senyor.<br>Poseu la mà contra el furor de l’enemic;<br> i que em salvi la vostra dreta."]}, {"n": "73", "t": "Gràcies d’aquesta aurora encesa", "p": ["1. Gràcies d’aquesta aurora encesa,<br>gràcies d’aquest nou dia clar,<br>gràcies perquè els neguits, en vós el puc abandonar.", "2. Gràcies pels bons amics que em volten,<br>gràcies per tots els meus germans,<br>gràcies perquè als meus enemics puc allargar les mans.", "3. Gràcies pel treball que m’ocupa,<br>gràcies pels meus petits encerts,<br>gràcies per l’alegria, per la música i la llum.", "4. Gràcies per moltes hores tristes,<br>gràcies per cada dolç parlar,<br>gràcies perquè arreu em condueix la vostra mà.", "5. Gràcies per la paraula vostra,<br>gràcies per l’Esperit d’Amor,<br>gràcies perquè estimeu els homes sempre i en tot lloc.", "6. Gràcies perquè heu volgut salvar-nos,<br>gràcies perquè això ens dóna pau,<br>gràcies perquè podem donar-vos gràcies tot cantant. (2)"]}, {"n": "74", "t": "Unint les mans, germans", "p": ["<b>Unint les mans, germans,<br>veureu quins prodigis pot fer l’amor;<br>unint les mans, germans,<br>veureu en la pau abraçar-se el món.<\/b>", "1. L’amor dóna força al caigut;<br>ningú més potent que l’amor;<br>si el cor defalleix de neguit,<br>et dóna esperança l’amor. (2)", "2. L’amor dins la fosca fa llum<br>i el pobre, fa lliure i serè;<br>no fiblen les guerres allà<br>a on regna sempre l’amor. (2)", "3. Qui troba l’amor ha trobat<br>la font de la vida sens fi.<br>Anem a l’altar del Senyor<br>beurem de l’amor el bon vi. (2)"]}, {"n": "75", "t": "Jo crec en l’amor", "p": ["<b>Jo crec en l’amor,<br>jo crec en la pau:<br>Senyor, crec en vós,<br>que a tots estimeu.<br>Jo crec en l’amor<br>jo crec en la pau:<br>donem-nos la mà,<br>que tots som germans.<\/b>", "1. Crec en la flor on s’amaga<br>un tresor de força viva;<br>crec en la fràgil potència<br>de l’infant sense mentida.<br>Crec en les formes amables<br>i en la mà estesa que invita.<br>Crec en la felicitat<br>d’estimar-nos sense mida.", "2. Crec en la gota de l’aigua,<br>crec en tot el que és humil;<br>crec en la força del tendre<br>i en els estels de la nit.<br>Crec en l’amor sense terme<br>i en el perdó i l’alegria.<br>Crec en la felicitat<br>d’estimar-nos sense mida.", "3. Crec en l’amor a tothom<br>i en la llum d’un dolç somriure.<br>Crec que tots som fills del Pare,<br>que és de tots el pa i la vida.<br>Crec en la festa del cel,<br>que és el premi del qui estima. <br>Crec en la felicitat<br>d’estimar-nos sense mida."]}, {"n": "77", "t": "Quan a l’Egipte era Israel", "p": ["1. Quan a l’Egipte era Israel,<br>Dóna’ns llibertat!<br>Així parlà el Senyor a Moisès:<br>Dóna’ns llibertat!", "<b>Vés-hi Moisès, <br>davant el Rei d’Egipte,<br>digues: Vell Faraó, <br>dóna’ns la llibertat!<\/b>", "2. Tanta opressió no han de sofrir,<br>Dóna’ns llibertat!<br>O el teu hereu faré morir.<br>Dóna’ns llibertat!"]}, {"n": "78", "t": "Quan desvetllarem els cors", "p": ["<b>Quan desvetllarem els cors <br>a la veu del Déu vivent,<br>junts retrobarem la font de llibertat;<br>quan aixecarem les mans <br>per cantar al Déu vivent<br>junts retrobarem la llum d’un nou demà.<\/b>", "1. Ell sabrà trencar les armes.<br>Ell sabrà canviar els cors;<br>Ell eixugarà les llàgrimes,<br>Ell farà fugir les pors.", "2. No més nit sobre la terra.<br>Ell vindrà com un gran foc.<br>No més odi ni més guerra:<br>Ell farà el món tot nou.", "3. Ell serà Déu amb nosaltres.<br>Tot el mal ja haurà passat.<br>De les cendres i les brases<br>en farà nova ciutat."]}, {"n": "79", "t": "Junts escriurem amb lletres lluminoses", "p": ["<b>Junts escriurem amb lletres lluminoses<br>la història de nostra llibertat;<br>i junts veurem brillar sobre terra<br>la llum per tots els oprimits.<\/b>", "1. Un poble s’ha aixecat<br>per cridar justícia;<br>un poble s’ha dreçat<br>per viure dempeus.", "2. La solidaritat<br>ritma la nostra marxa.<br>La solidaritat<br>guia els nostres cors.", "3. Al cor de la nostra vida<br>Jesús ens espera.<br>Per bastir junts amb Ell<br>la terra de Déu.", "4. El món tot ens espera,<br>l’Esperit ens avança.<br>Fem néixer primaveres,<br>fem créixer matins.", "5. &quot;Plegats&quot; és el nostre crit<br>per segar cadenes.<br>&quot;Plegats&quot; és el nostre crit,<br>nostre clam d’amor.", "6. No deixis caure el braç,<br>car el dia s’alça.<br>No deixis el combat<br>per un món millor."]}, {"n": "80", "t": "Mou, Senyor, mou la meva ànima", "p": ["<b>Mou, Senyor, mou la meva ànima, (3)<br>Oh, mou-la, Senyor!<\/b>", "Tan fort que jo trontolli,<br>tan suau que jo reposi,<br>tan dins que un dia estimi,<br>oh! , mou-la, Senyor.", "Oh, Déu meu, (3)<br>Tu ja em mous!"]}, {"n": "81", "t": "Que Jesús vingui sempre amb mi", "p": ["<b>Que Jesús vingui sempre amb mi. (2)<br>Tot al llarg del meu viatge,<br>que Jesús vingui sempre amb mi.<\/b>", "1. En les penes, vingui amb mi. (2)<br>Quan s’acosta la tenebra,<br>vull que Jesús vingui sempre amb mi.", "2. En la lluita, vingui amb mi. (2)<br>Quan el cos no resisteixi,<br>vull que Jesús vingui sempre amb mi.", "3. En l’angoixa, vingui amb mi. (2)<br>Quan em pesa més el viure,<br>vull que Jesús vingui sempre amb mi."]}, {"n": "82", "t": "Tots junts vencerem", "p": ["1. Tots junts vencerem... demà.", "<b>Oh! Dins del meu cor crec fermament<br>que tots vencerem demà:<\/b>", "2. Lliures hem de ser... avui.", "3. Tot el món unit... demà.", "4. Blancs i negres junts... demà.", "5. Hem de viure en pau... tots junts.", "6. Déu ens acompanya... acompanyarà.", "7. Donem-nos les mans... ben fort."]}, {"n": "83", "t": "He nascut en un poble", "p": ["<b>He nascut en un poble,<br>en un bany de llibertat;<br>nascut en el poble del Crist,<br>marcat amb el do de l’Esperit,<br>un poble que em dona la fe<br>i em fa caminar amb esperança.<\/b>", "1. El meu poble va néixer en un estable,<br>el meu poble va néixer en plena nit,<br>en un racó tan miserable,<br>en una cova, molt humil,<br>el meu poble va néixer clandestí,<br>molt abans que trenqués el matí.", "2. El meu poble va néixer en una festa,<br>el meu poble va néixer entorn d’un pa,<br>la nit, la mort tenia llesta,<br>el vi passava de m à en mà,<br>el meu poble va néixer a preu de sang<br>i la mort feria tot passant.", "3. El meu poble va néixer a Pentecosta,<br>el meu poble va néixer als quatre vents,<br>per ser llevat d’aquest món nostre<br>per dur l’Esperit a tanta gent,<br>el meu poble és un poble j oi ós,<br>fet al sol i al vent impetuós.", "4. El meu poble ha fet un llarg viatge,<br>el meu poble camina en el temps,<br> en duu ferides a la imatge,<br>en duu les senyes a la pell,<br>el meu poble reneix a la il·lusió<br>quan es dreça fidel al seu Senyor."]}, {"n": "84", "t": "Pel camí de Jericó", "p": ["1. Pel camí de Jericó<br>hi passava un home bo,<br>ben replè duia el sarró<br>per fer compres a la vila.<br>Al bell mig del seu camí<br>lladregots el van ferir.<br>Ningú no el volgué guarir.<br>Sort d’aquell de Samaria!", "<b>¿Saps qui és el teu germà?<br>És aquell samarità,<br>i el jueu i el protestant<br>i el veí del teu davant.<br>Dins dels homes que tu veus,<br>tant si són com no dels teus,<br>hi viu Crist, com amagat,<br>esperant la teva caritat.<\/b>", "2. Quan Jesús retornarà,<br>decidit a judicar,<br>a tots ens demanarà<br>si li hem donat ajuda. <br>&quot;Però, Senyor&quot; –llavors direm–.<br>&quot;¿Quan t’hem vist? No ho recordem!&quot;<br>–&quot;¿No sabíeu que el que heu fet<br>a un germà, a mi m’ho fèieu?&quot;"]}, {"n": "85", "t": "Si tu desnues lligams de servitud", "p": ["1. Si tu desnues lligams de servitud,<br>i si alliberes l’home encadenat,<br>la nit del teu camí serà com llum a ple matí. (2)<br>Llavors de les mans brollarà una aigua viva.<br>Una aigua que fa viure la terra de demà,<br>una aigua que fa viure la terra de Déu.", "2. Si destrueixes allò que oprimeix l’home,<br>si dons la mà al germà humiliat,<br>la nit del teu combat serà com llum a ple matí. (2)<br>Llavors del teu pas podrà néixer una dansa.<br>La dansa que inventa la terra de demà,<br>la dansa que inventa la terra de Déu.", "3. Si denuncies el mal que trenca l’home,<br>si fas costat al germà abandonat,<br>la nit del teu gran crit serà com llum a ple matí. (2)<br>Llavors dels teus ulls podrà néixer una estrella.<br>L’estrella que anuncia la terra de demà,<br>l’estrella que anuncia la terra de Déu.", "4. Si tu abats els murs que hi ha entre els homes<br>i si perdones el teu enemic,<br>la nit del teu patir serà com llum a ple matí. (2) <br>Llavors del teu pa podrà viure una Església.<br>L’Església que aplega la terra de demà,<br>l’Església que aplega la terra de Déu."]}, {"n": "89", "t": "Poble de Déu, poble en marxa", "p": ["Poble de Déu, <br>poble en marxa,<br>junts fem camí, <br>poble de Déu, <br>Església que avança,<br>el Regne ja és aquí (bis)", "Camina al llarg del temps,<br>travessa mars pregons,<br>marcat sovint per tantes pors,<br>però viu en el Crist lluminós.<br>És barca, és vela, és signe, és combat.<br>Poble mogut per l&#x27;Esperit,<br>és poble que canta la vida!", "En lluita per la pau, <br>som veu dels sense veu,<br>que és fosc sovint nostre dolor,<br>que dolç el gest de germanor.<br>Som força, som vida, som llum, som amor.<br>Poble mogut per l&#x27;Esperit,<br>som poble que estima la vida!"]}, {"n": "90", "t": "Pau a nosaltres per sempre", "p": ["1. Pau a nosaltres per sempre. (2)<br>Pau al qui escampa somriures<br>dins la tristor dels qui ploren.<br>Pau al qui empelta coratge<br>quan es mustien les forces.<br>Pau a nosaltres per sempre. (2)", "2. Pau a nosaltres per sempre (2)<br>Pau al qui clama justícia<br>davant els reis de la terra.<br>Pau al qui ajuda els qui cauen<br>sense exigir recompensa.<br>Pau a nosaltres per sempre. (2)", "3. Pau a nosaltres per sempre. (2)<br>Pau al qui sempre defensa<br>la veritat dels qui callen.<br>Pau al qui dins la derrota<br>planta xiprers d’esperança<br>Pau a nosaltres per sempre. (2)", "4. Pau a nosaltres per sempre. (2)<br>Pau al qui estima en silenci.<br>Pau al qui lluita pels altres.<br>Pau al qui sempre camina<br>vers l’horitzó de la Pàtria.<br>Pau a nosaltres per sempre. (2)"]}, {"n": "98", "t": "Au, pren alè, canta la vida", "p": ["Au, pren alè, canta la vida,<br>canta la teva fe.<br>Canta de cor, llança la crida,<br>canta la bona sort.<br>Obre drecera, lluny la quimera!<br>ves pel camí del sol.<br>En l’enyorança guarda esperança:<br>tot serà nou, si vols.", "Canta el matí, guaita la cima<br>que el sol ha fet florir.<br>Canta la nit, prega i estima,<br>sàpigues ser agraït.<br>Quan a vegades, les nuvolades<br>tornen de plom el cel.<br>Mai mira enrere! Lluita i espera,<br>canta amb més fort anhel."]}, {"n": "99", "t": "Les mans obertes davant vós, Senyor", "p": ["<b>Les mans obertes davant vós, Senyor:<br>el pa de cada dia;<br>les mans obertes davant vós, Senyor:<br>i el vi de l’alegria!<\/b>", "1. Deu-nos un cor obert a la Paraula,<br>som una terra on heu sembrat.<br>Deu-nos un cor obert a tots els homes<br>per compartir el pa i l’amistat.", "2. Deu-nos un cor obert a l’esperança,<br>que el vostre Regne arribarà.<br>Deu-nos un cor obert a tots els homes,<br>deu-nos un cor per a estimar."]}, {"n": "100", "t": "Marxem en pau per les places", "p": ["<b>Marxem en pau per les places,<br>pels carrers del món.<br>Marxem en pau per les places,<br>un nom portem al front:<br>hem de cantar l’esperança<br>que és alba d’un demà;<br>hem de mostrar, estimant-nos,<br>que el món nou ve ja.<br>Marxem en pau per les places,<br>diguem tot el que hem vist,<br>sense por.<\/b>", "l. Quan el Crist tornà al Pare,<br>prou ens va deixar<br>un missatge d’alegria:<br>digueu, si es veu brillar?<br>Dominats pels neguits,<br>sense esclat, amargats,<br>i amb els ulls enrogits<br>d’haver plorat.", "2. Quan el Crist tornà al Pare,<br>prou ens va donar<br>la justícia del seu regne:<br>digueu, com l’hem guanyat?<br>Dominats per la por,<br>hem triat de ser esclaus<br>perquè és dur prendre el risc<br>de la llibertat.", "3. Quan el Crist tornà al Pare,<br>prou ens va manar<br>d’estimar com ell va fer-ho:<br>digueu, si n’hem fet cas?<br>Quan vivim com estranys,<br>sense amor, en un món<br>d’oprimits i opressors,<br>lluny de la pau."]}, {"n": "101", "t": "Senyor, si els nostres ulls no et veuen", "p": ["1. Senyor, si els nostres ulls no et veuen,<br>el dia es torna nit.<br>Senyor, quan trobem les petjades<br>hem trobat el camí.", "<b>Has deixat petjades en el camí;<br>nosaltres, que et cantem, les volem seguir. (2)<\/b>", "2. Senyor, el món crida paraules:<br>que lluny són terra i cel!<br>Senyor, que la Paraula teva<br>creixi en la nostra fe.", "3. Senyor, si viure sense els altres<br>és viure sense tu,<br>Senyor, l’amor amb què tu estimes<br>acostarà el que és lluny.", "4. Senyor, si escoltes con batega<br>el món que tu has creat,<br>Senyor, escolta la pregària<br>dels qui has aplegat."]}, {"n": "102", "t": "Germans, hem arribat", "p": ["<b>Germans,<br>hem arribat dels quatre punts de l’horitzó,<br>som aquí, Senyor.<br>Germans,<br>hem arribat dels quatre punts de l’horitzó<br>amb el Senyor.<\/b>", "1. Pels camins del món hem seguit una crida,<br>hem portat al front tot el pes del sol,<br>hem sofert sovint el dol que duu la vida,<br>hem ofert només amistat i consol.", "2. Pels camins del món un amor ens convida,<br>hem portat al cor la set d’arribar,<br>hem sofert sovint desamor i mentida,<br>hem ofert només el perdó de germà.", "3. Ara som tots junts al voltant de la Taula,<br>no portem sinó la pols del camí;<br>Vós ens heu donat, amb la vostra Paraula,<br>menjar el vostre Pa i l’Amistat compartir.", "<b>Germans,<br>hem arribat dels quatre punts de l’horitzó,<br>som aquí, Senyor.<br>Germans,<br>cantem la joia de ser junts amb el Senyor<br>tots el germans.<\/b>"]}, {"n": "103", "t": "Vós heu passat vora l’aigua", "p": ["Vós heu passat vora l’aigua, <br>no cercàveu el noble ni el savi, <br>voleu només que jo us segueixi.", "<b>Senyor, em mireu amb dolcesa,<br>somrient, m’adreceu la paraula, <br>a la sorra he deixat rems i barca, <br>junt amb vós cercaré un altre mar. <\/b>", "Vós sabeu bé que a la barca <br>no conservo ni l’or ni l’espasa, <br>només la feina i les meves xarxes.", "Vos m’heu cridat a seguir-vos <br>per les ones cercant l’esperança. <br>Amic fidel, feu que no us deixi.", "Vós, pescador de mar braves, <br>ànsia eterna dels cors que es deleixen, <br>també seré company dels homes."]}, {"n": "104", "t": "Exultem d’alegria", "p": ["1. Exultem d’alegria, (2)<br>perquè Déu ens estima! (2)", "<b>El Senyor per sempre ens ha alliberat.<\/b>", "2. Estimem tots els homes (2)<br>sens barreres de races! (2)", "3. Nostra fe sigui ferma (2)<br>com la fe dels profetes! (2)", "4. Escampem esperança (2)<br>entre els homes que ploren! (2)", "5. Defensem la justícia (2)<br>quan sofreixen els pobres! (2)", "6. Que la pau sempre regni (2)<br>on clamava la guerra! (2)", "7. Pugi a Déu la lloança (2)<br>per les seves grandeses! (2)"]}, {"n": "106", "t": "Us dono un nou manament", "p": ["Us dono un nou manament:<br>que us estimeu uns als altres<br>així com jo us he estimat.", "1. Cerquem novelles fronteres<br>a la paraula germà,<br>obrint finestres amigues<br>dins l’horitzó del demà.", "2. Cremem fogars d’esperança<br>dins les tenebres del mal:<br>entre les armes de l’odi<br>alcem banderes de pau.", "3. Obrim la porta al captaire;<br>llesquem amb ell nostra pa:<br>seguint l’exemple del Mestre<br>rentem els peus a l’esclau."]}, {"n": "111", "t": "Viva llum d’alba", "p": ["1. Viva llum d’alba<br>–mar de claror–<br>tot el poble clama:<br>Vine, Senyor!<br>Goig del qui vetlla<br>contra la por:<br><b>Tots junts obrirem <br>camins pel Senyor! (2)<\/b>", "2. Bona notícia<br>–crit i cançó–<br>tot el poble clama:<br>Vine, Senyor!<br>Veu que ressona<br>i es fa pregó:<br><b>Tots junts obrirem <br>camins pel Senyor! (2)<\/b>", "3. La terra nova es<br>pasta amb dolor.<br>Tot el poble clama:<br>Vine, Senyor!<br>Pau entre els homes:<br>Festa Major!<br><b>Tots junts obrirem camins <br>pel Senyor! (2)<\/b>"]}, {"n": "112", "t": "El seu camí va ser camí de tots", "p": ["1. El seu camí va ser camí de tots:<br>Crist l’ha fet entre els pobres;<br>pel seu amor no hi ha petits ni grans:<br>és amic de tots els homes.", "<b>Obre-li el cor, ara que ens parlarà!<br>Llum per la nostra ruta.<br>Obre-li el cor, ara que tornarà!<br>a fer camí amb nosaltre<\/b>s.", "2. El seu camí farà florir el desert<br>pels damnats de la terra,<br>i del seu cor obert s’escamparan<br>rius de pau i de tendresa.", "3. El seu camí senyala l’horitzó:<br>un món sense cadenes.<br>El seu amor ens hi conduirà<br>i la joia serà plena."]}, {"n": "112", "t": "Oh, Jesucrist, Vós sou la llum del món", "p": ["Oh, Jesucrist, Vós sou la llum del món<br>sou l&#x27;enviat del Pare,<br>la vostra veu ens crida cada nit<br>esperem la vostra albada.", "<b>Tots junts lloem el Pare de la llum<br>i el Crist que és llum i força.<br>Amb l&#x27;esperit d’amor que ens fa cantar,<br>glòria a Vós, Déu nostre.<\/b>", "Vós heu trencat les portes de la mort,<br>Vós ens doneu la vida,<br>mort a la Creu salveu l&#x27;home captiu:<br>sou la vida que el deslliura."]}, {"n": "113", "t": "Els profetes han clamat", "p": ["1. Els profetes han clamat,<br>missatgers del vostre amor,<br>per deserts i per ciutats<br>amb el cor joiós.", "Glòria a vós eternament, Senyor,<br>només vós sou immortal.<br>Altres déus no servirem, Senyor.<br>Glòria a vós, oh Déu.", "2. Els apòstols de Jesús,<br>missatgers del vostre amor,<br>el seu calze han compartit<br>amb el cor joiós.", "3. Els sants màrtirs de l’Anyell,<br>missatgers del vostre amor,<br>per la sang han triomfat<br>amb el cor joiós.", "4. Sants i santes, bell estol,<br>missatgers del vostre amor,<br>han vençut l’odi i la mort<br>amb el cor joiós.", "5. Amb els àngels i amb els sants,<br>missatgers del vostre amor,<br>us lloem del món estant,<br>amb el cor joiós."]}, {"n": "121", "t": "No fixeu els ulls en ningú més que en Ell", "p": ["No fixeu els ulls en ningú més que en Ell (bis)<br>No fixeu els ulls en ningú més,<br>no fixeu els ulls en ningú més,<br>no fixeu els ulls en ningú més que en Ell.", "No espereu amics en ningú més que en Ell (bis)<br>No espereu amics en ningú més<br>No espereu amics en ningú més <br>No espereu amics en ningú més que en Ell...", "No adoreu amics a ningú més que a Ell ...", "Només Ell és el camí i la Veritat (bis)<br>No fixeu els ulls en ningú més (bis)<br>No fixeu els ulls en ningú més que en Ell."]}, {"n": "151", "t": "Doneu-los, Senyor, el repòs etern", "p": ["Doneu-los, Senyor, el repòs etern,<br>i que la llum perpètua els il·lumini."]}, {"n": "152", "t": "Ajudeu-lo, sants de Déu", "p": ["1. Ajudeu-lo, sants de Déu,<br>sortiu a rebre’l, àngels del Senyor:", "<b>Acolliu la seva ànima,<br>i presenteu-la a l’Altíssim.<\/b>", "2. Que et rebi Crist, que t’ha cridat,<br>i que els àngels et portin al si d’Abraham.", "<b>Acolliu la seva ànima,<br>i presenteu-la a l’Altíssim.<\/b>", "3. Doneu-li, Senyor, el repòs etern,<br>i que la llum perpètua l’il·lumini.", "<b>Acolliu la seva ànima,<br>i presenteu-la a l’Altíssim.<\/b>"]}, {"n": "153", "t": "Que els àngels t’acompanyin al paradís", "p": ["1. Que els àngels t’acompanyin al paradís;<br>que, a la teva arribada, et rebin els màrtirs<br>i et facin entrar a la ciutat santa de Jerusalem.", "2. Que el cor dels àngels t’aculli,<br>i tinguis amb Llàtzer, el pobre,<br>un repòs etern."]}, {"n": "154", "t": "Quan la mort és encara el vell hoste", "p": ["1. Quan la mort és encara el vell hoste,<br>convidant-nos a fer un llarg viatge,<br>fins trencar-se el fil d’or de la vida,<br>Senyor, sigueu amb n os altres .", "2. Quan la gerra a la font s’esmicola,<br>i el camí de pujada ja cansa,<br>quan la vida és gresol que s’esberla,<br>Senyor, sigueu amb nosaltres.", "3. Quan la pols a la terra retorni,<br>i l’alè vagi a Déu de tornada,<br>sigueu vós qui guieu el navili,<br>Senyor, sigueu amb nosaltres.", "4. Pare sant, acolliu en el regne<br>tots els morts en la fe i l’esperança,<br>Esperit, font eterna de vida,<br>Senyor, sigueu amb nosaltres. Amén."]}, {"n": "157", "t": "Senyor, dels vostres fills feu memòria", "p": ["1. Senyor, dels vostres fills feu memòria,<br>d’aquells que hem estimat en la terra;<br>doneu-los la claror de la Glòria,<br>la pau i vida eterna en vostre amor.", "2. Mireu amb pietat els qui moren<br>sense un amic que els digui: &quot;A reveure&quot;.<br>Obriu la vostra estança als qui ploren<br>on vós aplegareu els vostres fills.", "3. I quan vindrà la fi del viatge<br>la vostra faç, Senyor, puguem veure.<br>Malgrat tan greus pecats, vostra imatge<br>les nostres vides sempre han perseguit."]}, {"n": "158", "t": "Al Paradís t’acompanyin els àngels!", "p": ["A1 Paradís t’acompanyin els àngels!<br>a ta arribada et rebin els màrtirs<br>i et condueixin a la ciutat santa,<br>la ciutat nova de Jerusalem.", "Que els cors dels àngels t’acullin alhora,<br>i amb joia et portin al si d’Abraham!<br>Que et rebi Crist i, amb Llàtzer, el pobre,<br>al Cel et doni repòs sempitern."]}, {"n": "159", "t": "Tu vas ser senyalat", "p": ["1. Tu vas ser senyalat (senyalada)<br>amb la creu de Jesús:<br>que la marca del front<br>t’emmeni cap a l’alba...<br>I escolta el nostre Amén<br>que et porta el vent. (2)", "2. Tu vas ser empeltat (empeltada en)<br>en la saba de Déu:<br>que el batec del teu pols<br>t’emmeni cap a l’alba...<br>I escolta el nostre Amén<br>que et porta el vent. (2)", "3. Tu vas ser abrusat (abrusada al)<br>al gresol de l’Esprit:<br>que el coratge de ser<br>t’emmeni cap a l’alba...<br>I escolta el nostre Amén<br>que et porta el vent. (2)", "4. Tu vas prendre aliment<br>al sopar dels amics:<br>la penyora que en tens<br>t’emmeni cap a l’alba...<br>I escolta el nostre Amén<br>que et porta el vent. (2)", "5. Tu vas obrir el teu cor<br>al servei del teu món:<br>que la set d’un món nou<br>t’emmeni cap a l’alba...<br>I escolta el nostre Amén<br>que et porta el vent. (2)"]}]}, {"name": "Respostes i Aclamacions", "songs": [{"n": "201", "t": "Veniu, adorem el Senyor!", "p": ["<b>Veniu, adorem el Senyor! <\/b>"]}, {"n": "202", "t": "La nostra esperança és el Senyor", "p": ["<b>La nostra esperança és el Senyor;<br>confiem en sa paraula.<\/b>"]}, {"n": "203", "t": "Vivint, Senyor, segons la vostra paraula", "p": ["<b>Vivint, Senyor, segons la vostra paraula,<br>mantindrem pur el nostre camí.<\/b>"]}, {"n": "204", "t": "La vostra paraula s’estén per tots els segles", "p": ["<b>La vostra paraula s’estén per tots els segles;<br>ferma es manté com la terra que heu creat. <\/b>"]}, {"n": "205", "t": "Ens heu donat, Senyor, la vostra paraula", "p": ["<b>Ens heu donat, Senyor, la vostra paraula,<br>perquè sigui guardada fidelment.<\/b>"]}, {"n": "206", "t": "Vós sou just, Senyor", "p": ["<b>Vós sou just, Senyor,<br>i la vostra paraula és la veritat.<\/b>"]}, {"n": "208", "t": "Doneu la pau Senyor", "p": ["<b>Doneu la pau Senyor,<br>a aquells qui esperen en vós!<\/b>"]}, {"n": "209", "t": "Beneirem el Senyor, sempre i en tot lloc", "p": ["<b>Beneirem el Senyor, sempre i en tot lloc<\/b>."]}, {"n": "211", "t": "El Senyor és la meva roca", "p": ["<b>El Senyor és la meva roca,<br>el meu refugi i el meu Salvador.<br>Déu meu, ajuda meva! (2) <\/b>"]}, {"n": "212", "t": "Escoltem la veu del Crist que ens parla!", "p": ["<b>Escoltem la veu del Crist que ens parla!<br>I es farà un sol ramat i un sol pastor.<\/b>"]}, {"n": "219", "t": "El Senyor m’il·lumina i em salva", "p": ["<b>El Senyor m’il·lumina i em salva. <\/b>"]}, {"n": "222", "t": "Cantem amb veu exultant el nom del Senyor", "p": ["<b>Cantem amb veu exultant el nom del Senyor.<\/b>"]}, {"n": "223", "t": "Senyor, cantaré tota la vida els vostres favors", "p": ["<b>Senyor, cantaré tota la vida els vostres favors.<\/b>"]}, {"n": "224", "t": "Feliços els fidels del Senyor, que viuen seguint els seus camins", "p": ["<b>Feliços els fidels del Senyor, que viuen seguint els seus camins.<\/b>"]}, {"n": "225", "t": "Que Déu s’apiadi de nosaltres i ens beneeixi", "p": ["<b>Que Déu s’apiadi de nosaltres i ens beneeixi. <\/b>"]}, {"n": "226", "t": "Continuaré caminant entre els qui viuen a la presència del Senyor", "p": ["<b>Continuaré caminant entre els qui viuen a la presència del Senyor.<\/b>"]}, {"n": "227", "t": "Tant de bo que avui sentíssiu la seva veu", "p": ["<b>Tant de bo que avui sentíssiu la seva veu:<br>&quot;No enduriu els vostres cors.&quot;<\/b>"]}, {"n": "228", "t": "El Senyor és compassiu i benigne", "p": ["<b>El Senyor és compassiu i benigne,<br>lent per al càstig, ric en l’amor.<\/b>"]}, {"n": "229", "t": "Busquem el Senyor, ara que es deixa trobar", "p": ["<b>Busquem el Senyor, ara que es deixa trobar:<br>invoquem-lo, ara que és a prop.<\/b>"]}, {"n": "230", "t": "Enaltiu el Senyor. Que n’és de bo", "p": ["<b>Enaltiu el Senyor. Que n’és de bo,<br>perdura eternament el seu amor. (2)<\/b>"]}, {"n": "231", "t": "Tenim posada l’esperança en el Senyor", "p": ["<b>Tenim posada l’esperança en el Senyor,<br>auxili nostre i escut que ens protegeix.<br>Que el vostre amor, Senyor, no ens deixi mai:<br>aquesta es la esperança que posem en vós.<\/b>"]}, {"n": "232", "t": "El Senyor és a prop dels qui l’invoquen", "p": ["<b>El Senyor és a prop dels qui l’invoquen,<br>dels qui l’invoquen amb sinceritat.<\/b>"]}, {"n": "233", "t": "Que el vostre amor, Senyor, no ens deixi mai", "p": ["<b>Que el vostre amor, Senyor, no ens deixi mai:<br>aquesta és l’esperança que posem en vós. <\/b>"]}, {"n": "234", "t": "Al·leluia, Al·leluia, Al·leluia", "p": ["<b>Al·leluia,
