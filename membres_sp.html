<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<link rel="apple-touch-icon" href="apple-touch-icon.png">
<title>Miembros · Provincia Sant Pau CMF</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;0,700;1,400;1,500&family=Literata:ital,opsz,wght@0,7..72,300;0,7..72,400;0,7..72,500;0,7..72,600;1,7..72,400&display=swap" rel="stylesheet">
<style>
:root{
  --granate:#722F37;
  --granate-fosc:#5A2129;
  --granate-clar:#8E3B45;
  --or:#B8891C;
  --or-clar:#C9A227;
  --paper:#FAF6EF;
  --paper-alt:#F3EDE1;
  --card:#FFFFFF;
  --tinta:#2C2420;
  --tinta-suau:#6B5D52;
  --linia:#E4DACA;
  --ombra:0 1px 3px rgba(60,40,30,.08),0 4px 14px rgba(60,40,30,.06);
}
body.nit{
  --granate:#B06670;
  --granate-fosc:#8E3B45;
  --granate-clar:#C98790;
  --or:#D4AF37;
  --or-clar:#E0C060;
  --paper:#171310;
  --paper-alt:#221C17;
  --card:#241E19;
  --tinta:#EAE0D0;
  --tinta-suau:#A89880;
  --linia:#3A3128;
  --ombra:0 1px 3px rgba(0,0,0,.3),0 4px 14px rgba(0,0,0,.25);
}
*{margin:0;padding:0;box-sizing:border-box}
html{scroll-behavior:smooth}
body{
  font-family:'Literata',Georgia,serif;
  background:var(--paper);
  color:var(--tinta);
  line-height:1.55;
  transition:background .3s,color .3s;
  padding-bottom:env(safe-area-inset-bottom);
}
/* ---------- Capçalera ---------- */
header{
  background:linear-gradient(160deg,var(--granate-fosc) 0%,#722F37 55%,#82363F 100%);
  color:#F7EFDF;
  padding:calc(1rem + env(safe-area-inset-top)) 1rem .9rem;
  position:sticky;top:0;z-index:50;
  box-shadow:0 2px 12px rgba(60,20,25,.35);
}
body.nit header{background:linear-gradient(160deg,#2A1216 0%,#3D1B21 60%,#4A2128 100%)}
.header-top{display:flex;align-items:center;justify-content:space-between;gap:.6rem;max-width:1060px;margin:0 auto}
.titol h1{
  font-family:'Cormorant Garamond',serif;
  font-weight:600;font-size:1.45rem;line-height:1.15;letter-spacing:.01em;
}
.titol .sub{font-size:.72rem;letter-spacing:.14em;text-transform:uppercase;color:#E4C878;font-weight:400;margin-top:.1rem}
.h-btns{display:flex;gap:.45rem;align-items:center}
.btn-hoy{
  font-family:'Literata',serif;font-size:.85rem;font-weight:600;
  background:linear-gradient(135deg,#C9A227,#B8891C);color:#3A2508;
  border:none;border-radius:999px;padding:.5rem 1.05rem;cursor:pointer;
  display:flex;align-items:center;gap:.4rem;
  box-shadow:0 2px 8px rgba(0,0,0,.25);
  transition:transform .15s,box-shadow .15s;
}
.btn-hoy:hover{transform:translateY(-1px);box-shadow:0 4px 12px rgba(0,0,0,.3)}
.btn-hoy .dot{display:inline-block;min-width:1.25rem;height:1.25rem;border-radius:999px;background:#722F37;color:#F7EFDF;font-size:.7rem;line-height:1.25rem;text-align:center;font-weight:700}
.btn-ico{
  background:rgba(255,255,255,.12);border:1px solid rgba(255,255,255,.2);
  color:#F7EFDF;border-radius:999px;width:2.15rem;height:2.15rem;cursor:pointer;
  font-size:1rem;display:flex;align-items:center;justify-content:center;
  transition:background .2s;
}
.btn-ico:hover{background:rgba(255,255,255,.22)}
/* ---------- Controls ---------- */
.controls{max-width:1060px;margin:.8rem auto 0;display:flex;gap:.5rem;flex-wrap:wrap}
.cerca{
  flex:1;min-width:190px;position:relative;
}
.cerca input{
  width:100%;padding:.55rem .9rem .55rem 2.2rem;border-radius:999px;
  border:1px solid rgba(255,255,255,.25);background:rgba(255,255,255,.14);
  color:#FBF5E8;font-family:'Literata',serif;font-size:.9rem;outline:none;
  transition:background .2s;
}
.cerca input::placeholder{color:rgba(247,239,223,.55)}
.cerca input:focus{background:rgba(255,255,255,.22);border-color:#C9A227}
.cerca .lupa{position:absolute;left:.8rem;top:50%;transform:translateY(-50%);opacity:.6;font-size:.85rem}
select#fCom{
  padding:.55rem .8rem;border-radius:999px;font-family:'Literata',serif;font-size:.85rem;
  border:1px solid rgba(255,255,255,.25);background:rgba(255,255,255,.14);color:#FBF5E8;
  max-width:46vw;cursor:pointer;outline:none;
}
select#fCom option{color:#2C2420;background:#FAF6EF}
/* ---------- Cos ---------- */
main{max-width:1060px;margin:0 auto;padding:1rem 1rem 3rem}
.resum{
  display:flex;align-items:baseline;justify-content:space-between;gap:.6rem;
  margin:.3rem 0 .9rem;flex-wrap:wrap;
}
.resum .n{font-family:'Cormorant Garamond',serif;font-size:1.05rem;color:var(--tinta-suau);font-style:italic}
.resum .neteja{background:none;border:none;color:var(--granate);font-family:'Literata',serif;font-size:.8rem;cursor:pointer;text-decoration:underline;text-underline-offset:3px}
/* llista */
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:.7rem}
.card{
  background:var(--card);border:1px solid var(--linia);border-radius:14px;
  padding:.85rem 1rem;cursor:pointer;box-shadow:var(--ombra);
  transition:transform .15s,border-color .15s;
  position:relative;overflow:hidden;
}
.card::before{
  content:'';position:absolute;left:0;top:0;bottom:0;width:4px;
  background:linear-gradient(180deg,var(--granate),var(--or));
  opacity:.85;
}
.card:hover{transform:translateY(-2px);border-color:var(--or)}
.card h3{font-family:'Cormorant Garamond',serif;font-weight:600;font-size:1.12rem;line-height:1.2;color:var(--granate);padding-left:.35rem}
body.nit .card h3{color:var(--granate-clar)}
.card .com{font-size:.76rem;color:var(--tinta-suau);padding-left:.35rem;margin-top:.15rem;display:flex;align-items:center;gap:.35rem}
.card .edat{
  position:absolute;right:.8rem;top:.8rem;
  font-family:'Cormorant Garamond',serif;font-size:.95rem;font-style:italic;color:var(--or);
}
.card .festa{
  margin-top:.4rem;padding:.2rem .55rem .2rem .35rem;display:inline-flex;gap:.35rem;align-items:center;
  background:linear-gradient(135deg,rgba(201,162,39,.16),rgba(201,162,39,.08));
  border:1px solid rgba(184,137,28,.4);border-radius:999px;
  font-size:.72rem;color:var(--or);font-weight:600;margin-left:.35rem;
}
.buit{
  text-align:center;padding:3rem 1rem;color:var(--tinta-suau);
  font-family:'Cormorant Garamond',serif;font-style:italic;font-size:1.15rem;
}
/* ---------- Modals ---------- */
.overlay{
  position:fixed;inset:0;background:rgba(30,15,12,.55);backdrop-filter:blur(3px);
  z-index:100;display:none;align-items:flex-end;justify-content:center;
}
.overlay.obert{display:flex}
@media(min-width:640px){.overlay{align-items:center;padding:2rem}}
.modal{
  background:var(--paper);width:100%;max-width:560px;max-height:88vh;overflow-y:auto;
  border-radius:20px 20px 0 0;box-shadow:0 -6px 40px rgba(0,0,0,.35);
  animation:puja .28s cubic-bezier(.2,.8,.3,1);
}
@media(min-width:640px){.modal{border-radius:20px}}
@keyframes puja{from{transform:translateY(40px);opacity:0}to{transform:none;opacity:1}}
.m-cap{
  background:linear-gradient(150deg,var(--granate-fosc),#7C3039);
  color:#F7EFDF;padding:1.2rem 1.3rem 1rem;border-radius:20px 20px 0 0;
  position:sticky;top:0;z-index:2;
}
body.nit .m-cap{background:linear-gradient(150deg,#2A1216,#4A2128)}
.m-cap .tancar{
  position:absolute;right:.9rem;top:.9rem;background:rgba(255,255,255,.14);
  border:none;color:#F7EFDF;width:1.9rem;height:1.9rem;border-radius:999px;cursor:pointer;font-size:.95rem;
}
.m-cap h2{font-family:'Cormorant Garamond',serif;font-weight:600;font-size:1.5rem;line-height:1.15;padding-right:2.2rem}
.m-cap .m-sub{font-size:.78rem;color:#E4C878;margin-top:.25rem;letter-spacing:.06em}
.m-cos{padding:1.1rem 1.3rem 1.5rem}
.dada{
  display:flex;justify-content:space-between;align-items:baseline;gap:1rem;
  padding:.7rem .15rem;border-bottom:1px solid var(--linia);
}
.dada:last-child{border-bottom:none}
.dada .eti{font-size:.72rem;letter-spacing:.12em;text-transform:uppercase;color:var(--tinta-suau);display:flex;align-items:center;gap:.45rem;flex-shrink:0}
.dada .val{text-align:right;font-size:.95rem}
.dada .val .anys{display:block;font-family:'Cormorant Garamond',serif;font-style:italic;font-size:.88rem;color:var(--or)}
.dada .nd{color:var(--tinta-suau);font-style:italic;font-size:.85rem}
/* ---------- Panell HOY ---------- */
.hoy-cap{
  background:linear-gradient(150deg,#8A6410,#B8891C 60%,#C9A227);
  color:#2E2005;padding:1.2rem 1.3rem 1rem;border-radius:20px 20px 0 0;
  position:sticky;top:0;z-index:2;
}
.hoy-cap h2{font-family:'Cormorant Garamond',serif;font-weight:700;font-size:1.5rem}
.hoy-cap .data-avui{font-size:.8rem;font-weight:600;letter-spacing:.05em;margin-top:.15rem;text-transform:capitalize}
.hoy-cap .tancar{position:absolute;right:.9rem;top:.9rem;background:rgba(0,0,0,.15);border:none;color:#2E2005;width:1.9rem;height:1.9rem;border-radius:999px;cursor:pointer;font-size:.95rem}
.hoy-sec{margin-top:1.1rem}
.hoy-sec:first-child{margin-top:.2rem}
.hoy-sec h4{
  font-family:'Cormorant Garamond',serif;font-size:1.05rem;font-weight:600;color:var(--granate);
  display:flex;align-items:center;gap:.5rem;padding-bottom:.3rem;border-bottom:2px solid var(--or);margin-bottom:.4rem;
}
body.nit .hoy-sec h4{color:var(--granate-clar)}
.hoy-item{
  display:flex;justify-content:space-between;align-items:center;gap:.8rem;
  padding:.55rem .2rem;border-bottom:1px dashed var(--linia);cursor:pointer;border-radius:6px;
}
.hoy-item:hover{background:var(--paper-alt)}
.hoy-item:last-child{border-bottom:none}
.hoy-item .qui{font-size:.92rem;font-weight:500}
.hoy-item .quant{
  font-family:'Cormorant Garamond',serif;font-style:italic;color:var(--or);
  font-size:.95rem;white-space:nowrap;
}
.hoy-buit{text-align:center;padding:1.6rem 1rem .6rem;color:var(--tinta-suau);font-family:'Cormorant Garamond',serif;font-style:italic;font-size:1.1rem}
.prox-titol{
  margin-top:1.6rem;padding-top:.9rem;border-top:1px solid var(--linia);
  font-size:.72rem;letter-spacing:.14em;text-transform:uppercase;color:var(--tinta-suau);
  text-align:center;margin-bottom:.5rem;
}
.prox-item{display:flex;gap:.8rem;align-items:baseline;padding:.45rem .2rem;border-bottom:1px dashed var(--linia);cursor:pointer;border-radius:6px}
.prox-item:hover{background:var(--paper-alt)}
.prox-item:last-child{border-bottom:none}
.prox-item .pd{
  font-family:'Cormorant Garamond',serif;font-weight:600;color:var(--granate);
  min-width:3.4rem;font-size:.9rem;
}
body.nit .prox-item .pd{color:var(--granate-clar)}
.prox-item .pt{font-size:.85rem;flex:1}
.prox-item .pt .tipus{color:var(--tinta-suau);font-size:.76rem}
footer{
  text-align:center;padding:1.5rem 1rem 2.5rem;color:var(--tinta-suau);
  font-family:'Cormorant Garamond',serif;font-style:italic;font-size:.9rem;
}
footer .creu{color:var(--or);font-style:normal;font-size:1rem;display:block;margin-bottom:.2rem}
@media(max-width:520px){
  .titol h1{font-size:1.2rem}
  .btn-hoy{padding:.45rem .8rem;font-size:.8rem}
  .grid{grid-template-columns:1fr}
}
@media(prefers-reduced-motion:reduce){*{animation:none!important;transition:none!important}}
</style>
</head>
<body>

</main>

<footer>
  <span class="creu">✠</span>
  Provincia Sant Pau · Missionaris Claretians<br>120 miembros · <span id="nComs"></span> comunidades
</footer>

<!-- Modal persona -->
<div class="overlay" id="ovPersona">
  <div class="modal" role="dialog" aria-modal="true">
    <div class="m-cap">
      <button class="tancar" data-tanca="ovPersona">✕</button>
      <h2 id="pNom"></h2>
      <div class="m-sub" id="pCom"></div>
    </div>
    <div class="m-cos" id="pCos"></div>
  </div>
</div>

<!-- Modal HOY -->
<div class="overlay" id="ovHoy">
  <div class="modal" role="dialog" aria-modal="true">
    <div class="hoy-cap">
      <button class="tancar" data-tanca="ovHoy">✕</button>
      <h2>Celebramos hoy</h2>
      <div class="data-avui" id="dataAvui"></div>
    </div>
    <div class="m-cos" id="hoyCos"></div>
  </div>
</div>

"y":2006},"ordenacio":{"d":26,"m":4,"y":2008},"comunitat":"Exclaustración - Diócesis de Perpiñán"}];

/* ---------- utilitats ---------- */
const MESOS = ['enero','febrero','marzo','abril','mayo','junio','julio','agosto','septiembre','octubre','noviembre','diciembre'];
const DIES = ['domingo','lunes','martes','miércoles','jueves','viernes','sábado'];
const norm = s => s.normalize('NFD').replace(/[\u0300-\u036f]/g,'').toLowerCase();
const fmt = d => d ? `${String(d.d).padStart(2,'0')}/${String(d.m).padStart(2,'0')}/${d.y}` : null;
const fmtLlarg = d => d ? `${d.d} de ${MESOS[d.m-1]} de ${d.y}` : null;

const AVUI = new Date();
const anyActual = AVUI.getFullYear();

function edat(n){
  if(!n) return null;
  let e = anyActual - n.y;
  const m = AVUI.getMonth()+1, dd = AVUI.getDate();
  if(m < n.m || (m === n.m && dd < n.d)) e--;
  return e;
}
function anysDes(d){ // anys complerts que fa/farà enguany
  return d ? anyActual - d.y : null;
}
function esAvui(d){ return d && d.d === AVUI.getDate() && d.m === AVUI.getMonth()+1; }

const TIPUS = [
  {clau:'onomastica', ico:'🕊', nom:'Onomástica',        verb:null},
  {clau:'naixement',  ico:'🎂', nom:'Cumpleaños',        verb:'años'},
  {clau:'profPrimera',ico:'🕯', nom:'1ª Profesión',      verb:'años de profesión'},
  {clau:'profPerpetua',ico:'✠', nom:'Profesión perpetua',verb:'años de prof. perpetua'},
  {clau:'ordenacio',  ico:'⛪', nom:'Ordenación presbiteral', verb:'años de ordenación'},
];

/* ---------- estat ---------- */
let filtreCom = '', textCerca = '';

/* ---------- comunitats ---------- */
const COMS = [...new Set(DATA.map(p=>p.comunitat))].sort((a,b)=>a.localeCompare(b,'es'));
document.getElementById('nComs').textContent = COMS.length;
const sel = document.getElementById('fCom');
COMS.forEach(c=>{
  const o = document.createElement('option');
  o.value = c; o.textContent = c;
  sel.appendChild(o);
});

/* ---------- celebracions d'avui ---------- */
function celebracionsAvui(){
  const res = [];
  DATA.forEach((p,i)=>{
    TIPUS.forEach(t=>{
      const d = p[t.clau];
      if(esAvui(d)){
        let detall = '';
        if(t.clau === 'onomastica'){
          detall = d.label ? d.label.split(':')[0].trim() : 'onomástica';
        } else if(t.clau === 'naixement'){
          detall = `${anysDes(d)} años`;
        } else {
          detall = `${anysDes(d)} ${t.verb}`;
        }
        res.push({idx:i, persona:p, tipus:t, detall});
      }
    });
  });
  return res;
}

/* pròximes celebracions (proper 14 dies, excloent avui) */
function properes(){
  const res = [];
  const araMs = new Date(anyActual, AVUI.getMonth(), AVUI.getDate()).getTime();
  DATA.forEach((p,i)=>{
    TIPUS.forEach(t=>{
      const d = p[t.clau];
      if(!d) return;
      let quan = new Date(anyActual, d.m-1, d.d);
      if(quan.getTime() <= araMs) quan = new Date(anyActual+1, d.m-1, d.d);
      const dies = Math.round((quan.getTime()-araMs)/86400000);
      if(dies >= 1 && dies <= 14){
        res.push({idx:i, persona:p, tipus:t, quan, dies, d});
      }
    });
  });
  res.sort((a,b)=>a.dies-b.dies || a.persona.nom.localeCompare(b.persona.nom,'es'));
  return res;
}

/* ---------- render llista ---------- */
const $llista = document.getElementById('llista');
function render(){
  const nq = norm(textCerca);
  const vis = DATA.map((p,i)=>({p,i})).filter(({p})=>{
    if(filtreCom && p.comunitat !== filtreCom) return false;
    if(nq && !norm(p.nom).includes(nq)) return false;
    return true;
  });
  $llista.innerHTML = vis.map(({p,i})=>{
    const e = edat(p.naixement);
    const festes = TIPUS.filter(t=>esAvui(p[t.clau]));
    return `<div class="card" data-i="${i}" tabindex="0" role="button">
      ${e!==null?`<span class="edat">${e} años</span>`:''}
      <h3>${p.nom}</h3>
      <div class="com">⌂ ${p.comunitat}</div>
      ${festes.map(t=>`<span class="festa">${t.ico} ${t.nom} hoy</span>`).join('')}
    </div>`;
  }).join('');
  document.getElementById('buit').style.display = vis.length ? 'none' : 'block';
  document.getElementById('resum').textContent =
    vis.length === DATA.length ? `${DATA.length} miembros` : `${vis.length} de ${DATA.length} miembros`;
  document.getElementById('neteja').style.display = (filtreCom || textCerca) ? 'inline' : 'none';
}

$llista.addEventListener('click', e=>{
  const c = e.target.closest('.card');
  if(c) obrePersona(+c.dataset.i);
});
$llista.addEventListener('keydown', e=>{
  if(e.key==='Enter'){ const c = e.target.closest('.card'); if(c) obrePersona(+c.dataset.i); }
});

/* ---------- modal persona ---------- */
function obrePersona(i){
  const p = DATA[i];
  document.getElementById('pNom').textContent = p.nom;
  document.getElementById('pCom').textContent = p.comunitat;
  const files = [];
  // Naixement
  const e = edat(p.naixement);
  files.push(fila('🎂','Nacimiento', p.naixement ? `${fmtLlarg(p.naixement)}<span class="anys">${e} años</span>` : null));
  // Onomàstica
  let on = null;
  if(p.onomastica){
    on = `${p.onomastica.d} de ${MESOS[p.onomastica.m-1]}`;
    if(p.onomastica.label) on += `<span class="anys">${p.onomastica.label.split(':')[0].trim()}</span>`;
  }
  files.push(fila('🕊','Onomástica', on));
  files.push(filaAnys('🕯','1ª Profesión', p.profPrimera));
  files.push(filaAnys('✠','Profesión perpetua', p.profPerpetua));
  files.push(filaAnys('⛪','Ord. presbiteral', p.ordenacio));
  document.getElementById('pCos').innerHTML = files.join('');
  obre('ovPersona');
}
function fila(ico, eti, valHtml){
  return `<div class="dada"><span class="eti">${ico} ${eti}</span><span class="val">${valHtml ?? '<span class="nd">No disponible</span>'}</span></div>`;
}
function filaAnys(ico, eti, d){
  if(!d) return fila(ico, eti, null);
  return fila(ico, eti, `${fmtLlarg(d)}<span class="anys">${anysDes(d)} años</span>`);
}

/* ---------- panell HOY ---------- */
function obreHoy(){
  const avui = celebracionsAvui();
  const cos = document.getElementById('hoyCos');
  document.getElementById('dataAvui').textContent =
    `${DIES[AVUI.getDay()]}, ${AVUI.getDate()} de ${MESOS[AVUI.getMonth()]} de ${anyActual}`;
  let html = '';
  if(avui.length){
    TIPUS.forEach(t=>{
      const grup = avui.filter(c=>c.tipus.clau === t.clau);
      if(!grup.length) return;
      html += `<div class="hoy-sec"><h4>${t.ico} ${t.nom}</h4>` +
        grup.map(c=>`<div class="hoy-item" data-i="${c.idx}">
          <span class="qui">${c.persona.nom}</span>
          <span class="quant">${c.detall}</span>
        </div>`).join('') + `</div>`;
    });
  } else {
    html += `<div class="hoy-buit">Hoy no hay ningún aniversario en la Provincia.</div>`;
  }
  const prox = properes();
  if(prox.length){
    html += `<div class="prox-titol">Próximos 14 días</div>` +
      prox.map(c=>`<div class="prox-item" data-i="${c.idx}">
        <span class="pd">${c.d.d} ${MESOS[c.d.m-1].slice(0,3)}</span>
        <span class="pt">${c.persona.nom}<br><span class="tipus">${c.tipus.ico} ${c.tipus.nom}${c.tipus.clau!=='onomastica' ? ` · ${anyActual + (c.quan.getFullYear()>anyActual?1:0) - c.d.y} años` : ''}</span></span>
      </div>`).join('');
  }
  cos.innerHTML = html;
  cos.querySelectorAll('[data-i]').forEach(el=>{
    el.addEventListener('click', ()=>{ tanca('ovHoy'); obrePersona(+el.dataset.i); });
  });
  obre('ovHoy');
}

/* ---------- overlays ---------- */
function obre(id){ document.getElementById(id).classList.add('obert'); document.body.style.overflow='hidden'; }
function tanca(id){ document.getElementById(id).classList.remove('obert'); document.body.style.overflow=''; }
document.querySelectorAll('.overlay').forEach(ov=>{
  ov.addEventListener('click', e=>{ if(e.target===ov) tanca(ov.id); });
});
document.querySelectorAll('[data-tanca]').forEach(b=>{
  b.addEventListener('click', ()=>tanca(b.dataset.tanca));
});
document.addEventListener('keydown', e=>{
  if(e.key==='Escape') document.querySelectorAll('.overlay.obert').forEach(o=>tanca(o.id));
});

/* ---------- events ---------- */
document.getElementById('q').addEventListener('input', e=>{ textCerca = e.target.value; render(); });
sel.addEventListener('change', e=>{ filtreCom = e.target.value; render(); });
document.getElementById('neteja').addEventListener('click', ()=>{
  filtreCom=''; textCerca=''; sel.value=''; document.getElementById('q').value=''; render();
});
document.getElementById('btnHoy').addEventListener('click', obreHoy);

/* mode nit */
const btnNit = document.getElementById('btnNit');
function aplicaNit(on){
  document.body.classList.toggle('nit', on);
  btnNit.textContent = on ? '☀' : '☾';
  try{ localStorage.setItem('sp_nit', on ? '1':'0'); }catch(e){}
}
btnNit.addEventListener('click', ()=>aplicaNit(!document.body.classList.contains('nit')));
try{ if(localStorage.getItem('sp_nit')==='1') aplicaNit(true); }catch(e){}

/* comptador HOY al botó */
const nAvui = celebracionsAvui().length;
if(nAvui){
  const dot = document.getElementById('hoyDot');
  dot.textContent = nAvui; dot.style.display = 'inline-block';
}

render();
</script>
